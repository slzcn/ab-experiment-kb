<script>window.DATA_BASE="../";window.INIT_DOC=178281;window.INIT_MD="<span id=\"一、查看和修改指标\"></span>\n# 查看和修改指标\n\n<span id=\"查看：\"></span>\n## 查看指标组详情\n\n登录DataTester产品控制台后，单击左侧导航栏的**指标管理**\\>**指标组列表**，进入指标组列表页面后单击指标组名称，即可进入指标组详情页面，查看指标组的基本信息、配置信息等。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/2e33e005fb8641d8a040302acb69ed64~tplv-goo7wpa0wc-image.image) </span>\n\n\n* 您可以在基本信息模块查看指标组的基本信息，例如指标组的类别等。\n\n* 单击具体指标前的展开按钮，您可以查看每个指标的具体设置，例如，可查看指标的计算口径。\n\n* 您可以单击具体指标关联实验的个数，查看指标已关联的实验详情。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_26f9489432e3fcc5641999315b690c90.png) </span>\n\n   * 默认展示进行中的实验，可在实验状态列筛选实验状态进行查看\n\n   * 支持按照实验名称/实验ID/实验owner进行检索实验\n\n   * 点击实验名称，会跳转至实验详情页\n\n\n<span id=\"操作：\"></span>\n## 指标组管理操作\n\n\n* 复制指标组：点击右上角的「复制」，可复制该指标组所有配置信息及指标信息，新指标组名称会以『原指标组名称\\-复制』来默认命名，支持修改。\n\n* 编辑指标组：点击编辑，进入指标组编辑态。\n\n   * 可修改指标组基本信息中的名称、描述、负责人，**指标组类型不支持修改**\n\n   * 可修改指标的名称描述及口径设置等信息（详情参考上述指标修改）\n\n* 查看操作历史：点击右上角操作历史icon，可查看当前指标组的历史变更信息。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_8dd30376f609529af548165092296e1c.png) </span>\n\n\n<span id=\"二、指标组权限管理\"></span>\n# 指标组权限管理\n\n\n|指标组权限类型 |释义 |\n|---|---|\n|公共指标组 |指标组默认为「公共指标组」。<br><br><span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_8f434d89317d43a5e9278b05ed8ebf33.png) </span><br><br>公共指标组可被当前应用下的其他有指标组相关权限的角色用户看到：<br><br><br>* 有指标管理模块查看权限的用户，默认拥有「查看指标组详情权限」（查看指标口径、操作历史等）、「查阅指标统计值权限」。<br><br>   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_b59ae85d0f10248112f40f8488ebe8ee.png) </span><br><br>* 集团管理员、指标owner除拥有前述两种权限外，还可编辑/上下线指标组、用户赋权等。 |\n|私有指标组 |支持将指标组设置为「私有指标组」。<br><br><br>* 设置为私有指标组后，应用管理员、指标组owner可以为当前私有指标组添加用户，为其他用户单独授予指标组的「查看指标组详情权限」。<br><br>* 未被授权的其他用户在指标组列表中看不到私有指标组。<br><br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/df85b40d99434367b2f416079ed99203~tplv-goo7wpa0wc-image.image) </span> |";</script>

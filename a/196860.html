<script>window.DATA_BASE="../";window.INIT_DOC=196860;window.INIT_MD="<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">此功能私有化V4.4.0（含）以上版本支持，该功能为付费功能，如需使用需联系您的客户成功经理进行咨询。</div>\n\n\n<span id=\"一、概述\"></span>\n# 一、概述\n\n在企业系统功能较为完善的场景下，拥有的系统比较多，如有CDP、CSM、推荐系统、运营系统等，企业希望将DataTester的能力与自身的系统进行打通，减少系统之间的多次跳转。集成工作台提供不同的集成模版支持客户将DataTester的能力通过流程化引导的方式集成至客户自有系统，有效解决了此类问题。\n\n<span id=\"二、功能介绍\"></span>\n# 二、功能介绍\n\n<span id=\"_2-1集成工作台\"></span>\n## 2.1集成工作台\n\n菜单进入\"开放能力 \\> 集成工作台 \"\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_11fafb0894c04b97c61fadbabfd9d6d3.png) </span>\n\n<span id=\"新建定制\"></span>\n### 新建定制\n\n点击**新建定制**，填写信息并选择集成模版类型，并单击保存\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_f44c7a78d2f5472abd9f03d70232146c.png) </span>\n\n接着，我们就进入了定制编辑页面\n\n<span id=\"页面配置能力\"></span>\n### 页面配置能力\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_4c25625014ae968e4aa3a0db6d49df9d.png) </span>\n\n当点击可配置的蓝色区域时，展示配置面板\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_739b171bed6d864f36fe09b9019e2e54.png) </span>\n\n如果觉得每次切换配置区域很繁琐，可以直接点击配置面板顶部的标题切换到根节点，有一些配置也只会存在于根节点处\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_410557359023bc0d4e6e6a32db3f6eda.png) </span>\n\n**支持的配置页面有**\n\n\n* 实验列表\n\n* 实验报告\n\n\n支持的配置项如下\n\n\n|页面 |参数值 |描述 |\n|---|---|---|\n|实验列表 |isSkipCreateExperimentModal |跳过实验创建模式弹窗 |\n||defaultNewExperimentMode |默认跳转实验 |\n||hiddenExperimentModes |隐藏实验模式 |\n||headerModule.hidden |隐藏Header模块 |\n||headerModule.title |标题 |\n||headerModule.barHidden |帮助信息隐藏 |\n||headerModule.createHidden |创建按钮隐藏 |\n||tableModule.filterHidden |筛选项模块隐藏 |\n||tableModule.operationHiddenKeys |表格操作隐藏项 |\n|实验报告 |hiddenAsyncTask |隐藏异步查询任务 |\n||hiddenFlightToFeature |隐藏实验固化至Feature |\n||hiddenMetricSwitch |隐藏全局和详细指标视图的切换 |\n||hiddenCustomFilterBox |隐藏自定义过滤模板 |\n||initTabKey |初始化的实验报告tab |\n||hiddenTabKeys |实验报告tab隐藏keys |\n\n\n<span id=\"_2-2-主题色定制\"></span>\n## 2.2 主题色定制\n\n单点击顶导右侧的“主题配置”按钮后展示主题色配置面板\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_3a81b6b01a009b5fe4d48168e39a6fcd.png) </span>\n\n**本期支持的主题色配置是**\n\n\n* 主色\n\n* 文本色\n\n* 边框色\n\n\n<span id=\"_2-3-表单搭建能力\"></span>\n## 2.3 表单搭建能力\n\n当进入到实验创编页面的时候，顶部浮悬“进入实验创建搭建”，可进入到表单搭建页面；\n\n注：目前仅支持**编程实验**\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_7d6aff9a9d6c89f7ddc2e0b7292ea611.png) </span>\n\n初始化页面\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_866839e3ea8db8ea72f0f3f6b7638626.png) </span>\n\n\n1. 顶部导航：操作栏，提供保存，预览，关闭/开启表单配置能力，回撤/恢复，查看组件之间的联动关系图的能力\n\n2. 物料库：提供最基础的表单搭建原子组件\n\n3. 物料树：当前组成实验创编页面的各个组件顺序结构\n\n4. 属性配置：配置各个组件的展示样式，支持功能和教研，联动能力\n\n5. 画布：实时展示，当前表单搭建产物\n\n\n<span id=\"步骤\"></span>\n### **步骤**\n\n\n1. 点击物料库中的组件，展示在中间面板中，目前会预置最基本的编程实验配置；\n\n2. 对组件进行属性配置，可以隐藏后的组件，可以点击左侧组件树，打开对应配置面板；\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_dde969920cac3dc481b4312fdf9d1129.png) </span>\n\n不同组件对应了不同的配置能力；\n\n以下为一些基本配置，不同组件有自身特定支持的配置能力：\n\n\n|属性 |默认值 |描述 |\n|---|---|---|\n|key |无 |对应实验创编接口里的key |\n|标题 |无 |对应左侧展示label |\n|默认值 |无 |组件初始值 |\n|可编辑 |true |是否可以编辑 |\n|隐藏 |false |是否要展示组件，与删除组件不同的是，组件的值会存储在表单内 |\n|校验规则 |{} |提供对组件值的基本校验能力和自定义校验能力 |\n|联动规则 |无 |提供各个组件之间的联动能力配置，目前仅支持组件值的联动 |\n\n\n\n3. 对组件进行校验配置和联动配置\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_ee972535555531f168fcff13204abb4c.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_6de62a5f6b1295a3d5d26ac6a4975637.png) </span>\n\nJSON schema格式\n\n自定义函数，返回true通过，字符串错误信息\n\n<span id=\"联动逻辑规则\"></span>\n### **联动逻辑规则**\n\n目前仅支持主动模式\n\n  需要了解每个组件的value值组成，避免出现找不到值的问题\n\n  $self.value：指代当前所处组件的组件值 $target[\\*].value：指代目标组件的组件值， 其下标可以是任何数字(这些数字是选择框中选中的组件顺序，从0开始递增) 比如 $target[0].value\n\n```json\n比如说，当实验类型变化时，互斥层清空\n选择实验类型组件，在联动规则处创建1个，目标组件选择互斥层组件，联动类型时value\n联动值：{ \n     ...$target[0].value, \n     layer: '', \n   }\n```\n\n\n示例：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_dfd473ad3984bd45f23c272de3d7e279.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_85d691e4d6be6fc24a775854ad535719.png) </span>\n\n&nbsp;\n\n&nbsp;\n\n<span id=\"预览配置项\"></span>\n### **预览配置项**\n\n通过操作栏的“预览”按钮进入\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_2bef4f6e661a3b8046ca9f97c99a018f.png) </span>\n\n<span id=\"创建-编辑-详情编程实验\"></span>\n### **创建/编辑/详情编程实验**\n\n前置条件：在操作栏的“开启”开关打开\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_ec3faa84d76fd8d31be7007c82436b00.png) </span>\n\n&nbsp;\n\n<span id=\"三、功能应用-接入引导\"></span>\n# 三、功能应用&接入引导\n\n<span id=\"_3-1功能应用\"></span>\n## 3.1功能应用\n\n集成成功后即可在自有页面查看到集成后的DataTester页面。\n\n<span id=\"_3-2接入引导\"></span>\n## 3.2接入引导\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_583e8d8ae41e80422ee7af204406bdd8.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_38a46a108aa6ba28fd92e5477779ecd1.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_0fd5cd25d9610c427606caa608fa304d.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_356c34f059fdd2f2e6a8362d7ac08e1a.png) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

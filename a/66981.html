<script>window.DATA_BASE="../";window.INIT_DOC=66981;window.INIT_MD="<span id=\"集团\"></span>\n# 集团\n\n**集团，指的是公司** ，例如北京字节跳动网络科技有限公司是一个集团。\n\n在注册的时候：\n\n\n* 若填写了公司名称，则公司名称就为集团名称；\n\n* 若未填写公司名称，则集团名称将会是“您的名字的集团”。\n\n\n**集团创建者：** \n\n\n* 默认拥有集团管理员权限，后期可对权限进行修改；\n\n* 集团管理员可以在集团信息页查看包括：集团ID、集团名称、集团成员等集团信息。\n\n\n一个集团下可拥有多名集团用户，若公司旗下有多个应用，也可将多个应用接入同一个集团进行统一的管理。\n\n<span id=\"产品\"></span>\n# 产品\n\n由火山引擎用户增长提供给客户使用的工具/解决方案等内容，不同产品提供的数据分析能力。\n\n<span id=\"用户\"></span>\n# 用户\n\n**用户** ，指的是火山引擎用户增长产品的使用者，并非您应用的终端用户。\n\n<span id=\"权限\"></span>\n# 权限\n\n**权限系统详细介绍** ，可点击：[权限管理](https://www.volcengine.com/docs/6287/69594)。\n\n**温馨提示：** \n\n不同角色的用户在产品内有不同的权限\n\n\n* 权限决定了用户可以使用哪些数据分析能力以及哪些产品内具体的功能；\n\n* 同时也决定了用户可以对集团下哪些已接入的应用进行查看和操作。\n\n\n<span id=\"应用\"></span>\n# 应用\n\n<span id=\"什么是应用？\"></span>\n## 什么是应用？\n\n**应用** ，指的是属于用户（或用户所在团队）的，需要被监测数据变化及波动的产品。\n\n每一个您创建的应用都可以在应用列表中找到，如下：\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/960547e3a7d04f7c8402821e3bd6530e~tplv-em5hxbkur4-noop.image?width=2736&height=714) </span>\n\n每一个应用在火山引擎增长分析上都有一个独有的ID：appid。\n\n\n* 如果一个应用是第一次接入火山引擎增长分析，我们将会要求您为此应用申请一个 appid；\n\n* 点击应用列表中“新增接入”，为新应用申请 appid。<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/4fbd1f0e55f34222a0477b9c826dcf0d~tplv-em5hxbkur4-noop.image?width=2344&height=416) </span>\n\n\n<span id=\"申请-appid-时，需要填写什么信息？\"></span>\n## 申请 appid 时，需要填写什么信息？\n\n申请 appid 时需要填写一下信息：\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/8156d38afc914128978c79197f9edec4~tplv-em5hxbkur4-noop.image?width=673&height=331) </span>\n\n<span id=\"_1-填写您应用的中文名称以及app-name\"></span>\n### 1. 填写您应用的中文名称以及App Name\n\n中文名与 App Name 在火山引擎增长分析（及相关数据产品游戏增长分析、A/B测试及应用性能分析）平台中也是独一无二的，如果您的应用与其他公司应用重名，可以通过添加后缀的方式来进行区分。\n\n请注意：这里的中英文名只是应用在火山引擎增长分析（及相关数据产品游戏增长分析、A/B测试及应用性能分析）平台中的称呼，并不代表您的应用在各大应用市场或者发行渠道的名称。\n\n<span id=\"_2-对应填写您应用的包名。\"></span>\n### 2. 对应填写您应用的包名。\n\n\n* 如果您的应用是移动端应用，我们强烈建议您填写您应用的包名。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

    <b>✍ 写新文章</b>
    <span class="ed-close" id="edClose">✕</span>
  </div>
  <div class="ed-body">
    <div class="ed-form">
      <label>标题</label>
      <input id="edTitle" placeholder="例如：双十一大促实验复盘">
      <label>分类</label>
      <select id="edCat"></select>
      <label>检索关键词（选填，空格分隔）</label>
      <input id="edKw" placeholder="复盘 大促 转化率">
      <label>正文（Markdown）</label>
      <textarea id="edMd" placeholder="# 标题&#10;&#10;正文用 Markdown 书写，支持 **加粗**、列表、表格、代码块…&#10;&#10;## 小节&#10;- 要点一&#10;- 要点二"></textarea>
      <div class="ed-actions">
        <button class="ed-btn" id="edSubmit" style="display:none">✓ 发布文章</button>
      </div>
      <div class="ed-msg" id="edMsg"></div>
      <div class="ed-hint" id="edHint"></div>
    </div>
    <div class="ed-preview" id="edPrev">
      <div class="ed-prev-tag" id="edPrevTag"></div>
      <h1 id="edPrevTitle" style="margin:8px 0 16px"></h1>
      <div class="md" id="edPrevBody"></div>
    </div>
  </div>
</div>

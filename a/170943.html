<script>window.DATA_BASE="../";window.INIT_DOC=170943;window.INIT_MD="<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">此功能在私有化V4.2.2（含）以上版本支持，SaaS旗舰版功能灰度中，如需使用需单独联系您的客户成功经理进行开通。</div>\n\n\n<span id=\"一、概述\"></span>\n# 一、概述\n\n在企业进行数据采集时使用过其他厂商的埋点系统，不希望重复建设埋点体系，希望DataTester能够提供数据集成的方案，对历史数据资产直接复用。为了支持数据集成的需求， DataTester采用可视化数据集成的方式支持Kafka消息订阅，通过创建并执行数据集成任务，将其他厂的UBA数据上报至火山DataTester数据服务。\n\n\n* 创建数据集成任务\n\n   * 通过输入Kafka服务器、topic等信息，进行数据源的连接\n\n   * 将连接后的数据源内的元数据进行解析，支持客户通过数据映射配置进行字段映射\n\n   * 支持客户对任务配置时间/周期等进行配置\n\n   * 支持客户对任务设置任务告警\n\n* 任务运维\n\n   * 在任务列表通过任务开关对任务进行启动/停止\n\n   * 通过任务日志可以查看数据任务的执行结果\n\n   * 任务明细&邮件可以查看单次告警明细\n\n\n<span id=\"二、数据集成流程示例\"></span>\n# 二、数据集成流程示例\n\n\n* 流程示例：某厂商Kafka\\-UBA数据接入DataTester\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_651b5d047dd2ae96e9c7be4d4502318c.png) </span>\n\n&nbsp;\n\n<span id=\"三、与客户平台交互方式说明\"></span>\n# 三、与客户平台交互方式说明\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_e565c95cac3cfd4bd1240364b641a10d.png) </span>\n\n<span id=\"四、功能介绍\"></span>\n# 四、功能介绍\n\n<span id=\"_4-1-创建集成任务\"></span>\n## 4.1 创建集成任务\n\nDataTester提供两种方式进行数据集成，分别为可视化配置和自定义上传配置，两种方式带来的效果一致，二选一即可（但是如果存在函数插件的诉求：V4.4.0版本需要使用自定义配置上传实现）\n\n<span id=\"_4-1-1-可视化配置数据集成\"></span>\n### 4.1.1 可视化配置数据集成\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_1a430a77faa826a023a009eda2bdc1e1.png) </span>\n\n<span id=\"_1-基本信息\"></span>\n#### 1.基本信息\n\n\n* 新建数据集成任务，需要定义数据集成任务的基本信息\n\n\n<span id=\"_2-数据源连接\"></span>\n#### 2.数据源连接\n\n\n* 新建数据集成任务时，需输入“提供数据源”的三方/客户的消费者组名称、kafka服务器地址、kafka Topic名称，进行数据源的连接测试\n\n* 连接测试通过后可查看源数据示例\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_6c1beca87de348154a98181d32bb66a3.png) </span>\n\n\n<span id=\"_3-元数据映射\"></span>\n#### 3. 元数据映射\n\n\n* 数据源字段映射至Tester系统字段\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_c1bf4312ca5e3d6080893fc5b7d6e1fe.png) </span>\n\n\n<span id=\"_4-任务配置\"></span>\n#### 4.任务配置\n\n\n* 支持客户对任务配置时间/周期等进行配置\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_26b908fd2e9c1ade30bfc1b0ff075144.png) </span>\n\n\n<span id=\"_5-配置监控告警\"></span>\n#### 5.配置监控告警\n\n\n* 支持客户添加告警策略设置告警规则，并在触发告警后在邮件可收到提醒或在任务明细查看\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_9693f30c95ab47b29a9508959b517ad9.png) </span>\n\n\n<span id=\"_4-1-2上传配置数据集成\"></span>\n### 4.1.2上传配置数据集成\n\n<span id=\"_1-自定义配置集成任务\"></span>\n#### 1.自定义配置集成任务\n\n\n* 选择自定义配置集成任务\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_883aad17aa56d1215c9ca8be36dd3193.png) </span>\n\n\n<span id=\"_2-创建集成任务\"></span>\n#### 2.创建集成任务\n\n\n* 上传配置\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_8f80c800b8e4090c51ac04f0a49684d6.png) </span>\n\n\n<span id=\"_3-配置模版\"></span>\n#### 3.配置模版\n\n\n* 配置模版\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_99f21e7ed9db8475ad8db187600b2371.png) </span>\n\n\n<span id=\"_4-2-任务运维\"></span>\n## 4.2 任务运维\n\n<span id=\"_4-2-1-任务列表\"></span>\n### 4.2.1 任务列表\n\n\n* 任务列表\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_ab50fa28f71185bc6542170e999f7f9b.png) </span>\n\n* 任务明细\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_cf546153b5d0f1b808ac658332f56e9e.png) </span>\n\n\n<span id=\"_4-2-2-查看监控告警\"></span>\n### 4.2.2 查看监控告警\n\n\n* 告警查看形式（1）可以在任务明细模块查看报警的详情信息\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_bb30ce8ecb6db02f18b04177da75f623.png) </span>\n\n* 告警查看形式（2）在创建告警时选择的接收告警邮件，触发到告警后会接收到告警邮件\n\n\n<span id=\"_4-3-数据应用\"></span>\n## 4.3 数据应用\n\n通过数据集成的同步的用户行为数据，可以在data tester后台【数据管理】页面进行查看，并可使用该部分事件创建事件指标，示例如下：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_31aacc9cab56f0aa2f96eef75fee936a.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_11b09f03d7a95f940fcb755aa3ae8dbb.png) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

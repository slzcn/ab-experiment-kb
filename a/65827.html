<script>window.DATA_BASE="../";window.INIT_DOC=65827;window.INIT_MD="<span id=\"一-概述\"></span>\n# 背景信息\n\n用户分群是企业进行数据分析、精细化运营的关键一步。用户分群即用户信息标签化，通过用户的历史行为路径、行为特征、偏好等属性，将具有相同属性的用户划分为一个群体，并进行后续的分析。\n\n\n* 在A/B实验中使用用户分群能力圈定目标用户进行定向实验，有助于开启实验设定目标的有效性。\n\n* 同一个应用，如果用户在增长分析（DataFinder）产品中创建分群，也支持在「A/B 测试」产品创建实验、创建Feature选择目标受众的时候使用该分群。\n\n\n<span id=\"二-分群列表\"></span>\n# 分群列表\n\n分群列表为您展示分群的基本情况，如下图：\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/04c9a4d924ad4371b38c6bf33e72beba~tplv-goo7wpa0wc-image.image) </span>\n\n可操作内容如下：\n\n\n* **搜索** ：输入分群名称、创建人可搜索分群；\n\n* **创建** ：点击“+创建分群”，即可选择通过条件、文件创建分群；\n\n* **管理操作** ：可导出、编辑、刷新、删除分群信息。\n\n\n<span id=\"三-创建分群\"></span>\n# 创建分群\n\n**入口**：用户分群页面，右上角「+用户分群」\n\n支持通过事件筛选、属性筛选等条件创建用户分群，如下图：\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/9ac30ef682074a2b8c5fa8e90a51af5d~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"_3-1-通过「规则圈选」创建\"></span>\n## **创建方式1：规则圈选**\n\n\n1. 配置基本信息。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/9a564fb647004296868dbf287842aadd~tplv-goo7wpa0wc-image.image) </span>\n\n   \n   |参数 |配置说明 |\n   |---|---|\n   |分群名称 & 分群描述 |可直接编辑分群名称和描述信息； |\n   |计算周期 |手动更新：创建完成后将进行计算，计算完成后不会自动更新。若需要重新计算，请点击‘更新’。<br><br>每日例行：创建完成后将进行计算，并在每日6点计算前一日数据。 |\n   \n\n2. 配置创建规则\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/0b1f7715ad4944108bf23c3601d54121~tplv-goo7wpa0wc-image.image) </span>\n\n   \n   |输入项 |说明 |\n   |---|---|\n   |时间范围 |时间范围支持**相同时间段**和**不同时间段**<br><br><br>* **相同时间段**：所有筛选条件的时间段都一致<br><br>* **不同时间段**：自定义每个筛选条件的时间段<br><br>* 每次时间范围仅支持选择连续365天 |\n   |过滤条件 |可以选择用户“做过”，“没做”，“依次做过”的某些行为 & “用户是”“用户不是”的属性<br><br><br>* 若选择“用户是”，您仅可选择用户属性的最终值（即该用户该属性的最新值）。<br><br>* 若需要选择动态属性（如30天前的属性值），请先选择触发事件，并在过滤条件中选择所需属性。<br><br>* 过滤条件支持“且/或”切换；组合条件支持“且/或”切换； |\n   |预估人数 |点击创建规则配置提示文案后的刷新小图标，可以立即计算当前分群的人数 |\n   \n\n\n<span id=\"_3-2-通过「文件上传」创建\"></span>\n## **创建方式2：文件上传**\n\n支持通过上传用户标识id的列表文件，来创建用户分群，如下图：\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/ff8563df5be748b2a309118f963b4e15~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"四-使用分群\"></span>\n# 使用分群\n\n在创建实验和创建Feature设置目标受众的时候，可以选择用户分群。如下图：\n\n<span id=\"创建实验中实验\"></span>\n### 创建实验中使用\n\n「设置生效策略」\\-\\>「用户受众规则」时，可选择已创建的分群：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_206339f79a3236b8827e682d1ebfb687.png) </span>\n\n<span id=\"创建feature中使用\"></span>\n### 创建Feature中使用\n\n「发布受众」\\-\\>「自定义受众规则」时，可选择已创建的分群：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_d53b718ad5f7ab620ee10fe25c872ef8.png) </span>\n\n<span id=\"532b6258\"></span>\n# 参考：用户分群创建逻辑\n\n以下为您介绍主要分群创建的逻辑，更多内容可参见DataFinder的用户分群文档。\n\n<span id=\"ac30eb07\"></span>\n## **分群创建规则**\n\n\n|**规则条件** |**规则介绍** |**计算条件** |**取值范围** |\n|---|---|---|---|\n|用户做过 |选择符合业务所需的具体事件。 |* 总次数：该事件发生的总次数<br><br>* 每日次数：该事件每日发生的总次数<br><br>* 天数分布：用户触发该事件的天数分布<br><br>* 连续天数：用户连续触发该事件的天数<br><br>* 按...求和/求最大值/求最小值/求平均值/求去重数 |等于、大于、大于等于、小于、小于等于或者区间 |\n|用户没做过 |运营中一个很常见的场景是，希望找到一段时间内没做过某些事情的用户，对他们进行针对性的触达。 |* 总次数：该事件发生的总次数<br><br>* 每日次数：该事件每日发生的总次数<br><br>* 天数分布：用户触发该事件的天数分布<br><br>* 连续天数：用户连续触发该事件的天数<br><br>* 按...求和/求最大值/求最小值/求平均值/求去重数 |等于、大于、大于等于、小于、小于等于或者区间 |\n|用户依次做过 |指定事件行为序列，用户只有按顺序触发这些事件时才会被选中。 |||\n|用户是 |支持选择用户属性、用户分群、用户标签 （默认选择最新值）。 ||等于、不等于、包含、不包含、为空、不为空、自定义包含、正则匹配 |\n|用户不是 |排除特定用户属性、用户分群、用户标签的用户。 ||等于、不等于、包含、不包含、为空、不为空、自定义包含、正则匹配 |\n\n\n<span id=\"5417e402\"></span>\n## **分群计算的时间**\n\n\n* 目前分群是会在每日6点开始进行例行计算，通常在8点前会完成一次计算。\n\n* 若分群时间条件中包含‘今日’，首次计算&刷新时会触发实时计算；每日例行任务仅计算t\\-1日数据\n\n\n当前分群计算策略尽可能保障了使用者使用分群时，分群中的人群是最新的。\n\n<span id=\"bdf5fd66\"></span>\n## **静态分群的计算时间**\n\n\n* 若您的分群条件中，仅包含静态时间（如2022.1.1\\-2022.2.1），计算方式仅支持手动更新。\n\n* 若您不需要每日更新分群结果，也可以选择手动更新。\n\n\n<span id=\"6457150d\"></span>\n# 参考：用户分群在分流中的生效规则\n\n用户分群作为实验的受众规则的实现方式之一，在实验分流过程中的生效与通用的受众规则的过滤是一致的，分流的流程大致如下：\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/f05b43a679a44b2883096528e4bd310f~tplv-goo7wpa0wc-image.image) </span>\n\n由图可见，如果用户不是白名单用户，则分流时会先进行hash分桶，再进行过滤条件的过滤，即用户分群等受众规则条件在分桶后生效。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

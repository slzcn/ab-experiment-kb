<script>window.DATA_BASE="../";window.INIT_DOC=1448427;window.INIT_MD="Web个性化实验结合大模型能力，为您提供AI智能文案建议能力，对于文本修改没有思路、文案最佳版本抉择困难、Web文案千人千文的场景，您可使用AI智能文案能力，高效智能生成文案，提高实验效率。本文为您介绍AI智能文案生成的使用指导。\n\n<span id=\"377e9d48\"></span>\n# 应用场景\n\n建议基于web或者H5页面的现有内容，比如：slogon、标题、描述、CTA按钮等，都可以进行**智能文案建议**。通过大模型高效生成文案，解决以下痛点问题：\n\n\n* 文案建议。对于文本的修改，没有思路，没有资深内容运营专家指导，可以用可视化编辑器的智能文案建议，它就是资深的专家，他帮您想更多的文本，您只需要做选择题就行。\n\n* 不知道哪个文案最佳，可视化实验或者多变体实验中，可视化实验一个文案生成多个文案，从而形成多个实验版本；多变体实验中多个元素多个文案建议，笛卡尔积形成多个版本。进行文案赛马，看看哪个最佳，寻找全局最优解。\n\n* 想针对不同人群进行AB个性化，可以使用web个性化，根据不同人群属性进行不同文案个性化展示，不同人群下各种文案的效果，寻找绝对最优解。\n\n\n<span id=\"b1cc13e8\"></span>\n# 申请试用\n\n当前AI智能文案能力为灰度发布，如果您希望使用此功能，可联系火山引擎技术支持人员开启试用。\n\n<span id=\"605f1e72\"></span>\n# 使用说明\n\n\n1. 完成试用申请后，您登录进入DataTester控制台后，单击左侧导航栏 **个性化** \\> **Web个性化** 进入Web个性化页面。\n\n2. 首次进入Web个性化页面时，页面会出现AI可视化编辑器的智能文案生成开关提示弹窗，您可打开开关。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/ebbc730857b7428e951b04112ff98843~tplv-goo7wpa0wc-image.image) </span>\n\n3. 打开开关后，后续您在编辑Web个性化实验，进入到可视化编辑器时，即可使用智能文案生成能力。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/679a072955ee47af8cbcbdd899b44853~tplv-goo7wpa0wc-image.image) </span>\n\n4. 通过大模型智能生成文案。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/9b92dc1e89734fdb9fc0006e3de9b9b5~tplv-goo7wpa0wc-image.image) </span>\n\n   * 对于页面中可编辑的文本内容：单击文本内容时，右上方会自动为您生成优化的多个版本的智能文案，您可选择更优文案后一键应用。\n\n   * 当前不支持对过长的文本进行智能优化。";</script>

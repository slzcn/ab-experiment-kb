<script>window.DATA_BASE="../";window.INIT_DOC=79121;window.INIT_MD="<span id=\"一-概述\"></span>\n# 一. 概述\n\n基于用户在页面上点击、停留行为可以非常直观地通过热力图将大量用户的行为可视化。点击位置绘制的热力图可以直观地看到用户点击的区域，方便发现转化的机会，或者发生在网页或App内异常行为。本文主要介绍用户点击行为相关的热图场景及热图创建方式。\n\n<span id=\"二-使用场景\"></span>\n# 二. 使用场景\n\n\n* **需要综合而直观地了解用户在页面上发生的行为时**\n\n   虽然其它的分析方法也能提供某些和页面有关的数据指标，但他们之间的关联度低，而且需要掌握一些分析方法。而页面热力图弥补这一不足，它更直观而且简单，任何人都能快速地掌握并且了解其的含义。\n\n* **需要对比页面改版前后用户点击行为变化时**\n\n   可以将改版前后的热图放在一起比较，可以非常直观地了解到用户点击位置的差异，可以相对简单地定性改版的效果优劣。\n\n* **需要结合点击进一步判断是否存在异常流量时**\n\n   目前一些刷量工具不仅仅能够模拟访问，还能进一步地制造点击。针对这种情况，如果仅看数据，我们只能看到流量上升，但转化不好。通过 ua 我们判断不是爬虫，但无法进一步定位这些流量的其它特征。但通过点击热力图，我们就能非常直观地发现这些点击往往集中在一点，或者几点，或者非常平均地分布于页面的某些位置。这样就能判断出来存在异常流量行为，为后续定位问题提供重要的依据。\n\n   这里很重要的一点是，热力图不能只包含链接或者按钮，而要包含其它非可以点击元素的点击，因为一些不可点击元素上发生的点击更能暴露潜在的机会和问题。\n\n\n<span id=\"三-使用范围\"></span>\n# 三. 使用范围\n\n目前支持 **可视化/多链接实验报告** 支持热力图分析，帮助您直观且快速的对比不同实验版本的效果。\n\n<span id=\"四-快速入门\"></span>\n# 四. 快速入门\n\n<span id=\"_2-1-实验创建\"></span>\n## 2.1 实验创建\n\n在可视化实验和多链接实验的“创建实验”设置中，您可打开【是否开启热力图】的选项,并在接入SDK后开启热力图。[SDK接入](https://www.volcengine.com/docs/6287/101762))\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/c26948a41be64011a14b70914f015a10~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"_2-2-热力图分析\"></span>\n## 2.2 热力图分析\n\n实验报告——热力图分析，目前支持【点击热力图】和【元素热力图】，【浏览深度图】和【注意力分布图】等功能正在完善，若您有这方面的使用需求，可联系客服进行反馈。\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_0c6a182a175db303a6dda824c78adb4e.png) </span>\n\n<span id=\"_2-2-1-点击热力图\"></span>\n### 2.2.1 点击热力图\n\n适用于观察用户具体的点击行为，以此洞察页面的交互优化。（如：通过热力图发现页面的哪些部分吸引了大多数用户的注意，进一步优化；通过热力图发现用户经常会点击一些非连接/元素的地方，可以考虑在该位置增加可点击链接/元素）\n\n页面元素包括：\n\n\n* 实验版本和对照版本的核心指标数据：\n\n   <span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/bc398d804a39474fbaa547ea7a089a48~tplv-em5hxbkur4-noop.image?width=1920&height=936) </span>\n\n   1. 点击数：该页面或匹配页面用于渲染热图的任意点击（无论是否点击到元素/链接上）事件的数量；\n\n   2. 跳出率：（1\\-作为落地页时进入下一页转化率）\\* 100％；\n\n   3. 平均停留时长：在筛选条件下，用户进入该页面或匹配页面的停留时长平均值。\n\n* 实验版本和对照版本的热力图\n\n   <span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/69eb91c9f6744b6fb1d2bbbce9dcd7a0~tplv-em5hxbkur4-noop.image?width=1920&height=936) </span>\n\n   1. 时间筛选、过滤维度、热图类型、刷新、滚动同时对各个版本的热力图生效。\n\n   2. 每个页面支持多个区域圈选（封顶5个）。\n\n   3. 鼠标移至热力图上时，显示该位置的点击次数、点击人数、点击占比和点击率信息。\n\n   4. 可在界面右上方调整热图显示强度、布局情况。注：隐藏热力图之后才能对页面进行点击、查询等操作，否则只能查阅当前页面。\n\n\n<span id=\"_2-2-2-元素热力图\"></span>\n### 2.2.2 元素热力图\n\n元素热力图的使用场景主要是用户需要通过埋点信息，自动生成热力图，特别关注核心埋点部分的热力情况（点击情况），常用于优化按钮形状、位置等。\n\n页面元素包括：\n\n\n* 实验版本和对照版本的元素点击Top 20：\n\n   1. 按照 对照组+实验组 的总点击量从高到低排序显示点击最多的前20项元素。横坐标为埋点的元素名称，纵坐标为点击次数，可将鼠标悬浮在柱状图上时查看对应分组的点击数和占比。\n\n* 实验版本和对照版本的核心指标数据：\n\n   1. 点击数：该页面或匹配页面用于渲染热图的任意点击（无论是否点击到元素/链接上）事件的数量；\n\n   2. 跳出率：（1\\-作为落地页时进入下一页转化率）\\* 100％；\n\n   3. 平均停留时长：在筛选条件下，用户进入该页面或匹配页面的停留时长平均值。\n\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/ae932b60ae8941afa8138df012fa43dc~tplv-em5hxbkur4-noop.image?width=1654&height=720) </span>\n\n\n* 实验版本和对照版本的热力图\n\n   1. 时间筛选、过滤维度、热图类型、刷新、滚动同时对各个版本的热力图生效。\n\n   2. 每个页面支持多个区域圈选（目前最多支持5个，若有更多需求可联系客服同学进行反馈）。\n\n   3. 鼠标移至热力图上时，可查看该位置的点击次数、点击人数、点击占比和点击率信息。\n\n   4. 可在界面右上方调整热图显示强度、布局情况。注：隐藏热力图之后才能对页面进行点击、查询等操作，否则只能查阅当前页面。\n\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/233dbc21432d432a87f634e2832ed25d~tplv-em5hxbkur4-noop.image?width=1692&height=488) </span>";</script>

<script>window.DATA_BASE="../";window.INIT_DOC=65824;window.INIT_MD="在实验正式开启之前，通常需要先选择几名用户进入测试阶段，观察实验是否能够正常获取想要收集的数据，或客户端是否有bug等。参与这一步的用户被称为“白名单用户”。本文为您介绍测试白名单用户的应用场景和添加的操作步骤。\n\n<span id=\"8643a477\"></span>\n# 背景信息\n\n实验上线前需要保证SDK的集成过程无误，上线后才能保证实验结果的科学和有效。添加的白名单用户主要用来调试实验/feature，检查白名单用户是否可以命中实验/feature。\n\n您可以在创建实验/Feature过程中手动输入白名单用户的UUID/SSID，也可先将常用的测试用户添加至测试用户白名单中，后续在创建实验/Feature时直接选择。\n\n\n* 白名单和SSID/UUID是一一对应的，可以为每个难于记忆的SSID/UUID起个别名、打若干个分类标签，便于理解/记忆。\n\n* 在创建实验/feature的过程中，可以直接添加常用白名单，避免多次手动填写长串的SSID/UUID而出错，同时也可以降低管理成本。\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\"><strong>UUID和SSID</strong>：都是用户的唯一标识，主要区别在于UUID由您和团队为用户分配管理，SSID由火山引擎A/B测试分配管理。</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\"><strong>UUID</strong>：即User Unique Id，一般与用户的登录id（如手机号、email）一一对应，UUID由客户来维护；</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\"><strong>SSID</strong>：即标准化服务ID（Standardized Service Id），是火山引擎增长营销套件系列产品用来标记和识别用户而提供的用户标识。SSID由火山引擎增长营销套件生成和维护，客户可以根据需要使用。</div>\n\n\n\n<span id=\"二-应用场景\"></span>\n# 进入白名单列表页面\n\n您可以登录Tester控制台后，在左侧导航栏的**全局设置**\\>**受众管理**\\>**用户测试白名单**进入白名单列表页面。白名单列表为您展示白名单的基本情况，如下图：\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/a19fe05fd35746c6b090657409228414~tplv-goo7wpa0wc-image.image) </span>\n\n可操作内容如下：\n\n\n* **搜索**：可输入“白名单名称、创建人、SSID/UUID、标签”搜索白名单。\n\n* **添加测试白名单**：点击“+测试白名单”，填写“白名单名称、描述、等白名单用户信息即可创建。白名单名称和SSID/UUID添加后不可修改。\n\n* **关联实验和Feature**：点击具体数字，可查看白名单关联的“实验和Feature”的详情。\n\n* **操作**：\n\n   * **编辑**：仅白名单负责人可修改对应的白名单信息，编辑修改白名单后，已使用该白名单的实验或Feature也会生即时生效。\n\n   * **删除**：删除白名单后，创建实验或Feature将无法看到该常驻白名单。已使用该白名单的实验和Feature不影响。\n\n\n<span id=\"四-新建白名单\"></span>\n# 新建白名单\n\n单击白名单列表的\\*\\*+测试白名单\\*\\*，即可在弹窗中配置新增白名单的参数。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/0e2b0347bcdf4c37a005d1401ab1479e~tplv-goo7wpa0wc-image.image) </span>\n\n\n|**参数** |**配置说明** |\n|---|---|\n|**名称**&**描述** |自定义白名单的名称和描述，用于标识白名单。 |\n|**负责人** |白名单维护的负责人。 |\n|**用户白名单** |输入后续需参与调试的用户用户ID（SSID/UUID），用户ID字符最长不能超过100个字符。<br><br><br>* 如果为客户端实验及Feature：录入统一用ssid。<br><br>* 如果为服务端实验及Feature：请根据decision_id（分流ID）的类型来录入，如果服务端SDK中配置的 decision_id 对应的ID是类型是uuid，白名单就需要配置uuid，如果decision_id 用的是 ssid，白名单就要配置ssid。<br><br>   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div><br>   <br><br>   * <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">如果用户都是实名用户的话，decision_id用uuid，如果有匿名用户的话，建议使用ssid作为decision_id，因为匿名用户没有uuid。   </div><br>   <br><br>   * <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">客户端实验添加ssID，服务端实验添加decisionID。   </div><br>   <br><br><br>您可以在输入框中直接手动输入，也可单击输入框后的二维码标识，通过扫码录入。<br><br><br>* **手动录入**<br><br>   * 手动输入用户的UUID/SSID，通过逗号（,）或回车键进行分隔，最多支持输入1000个。<br><br>   * SSID获取方式：可通过在[用户细查](https://www.volcengine.com/docs/6287/139422)输入UUID，可查询SSID。获取SSID的方法，可参考「[应用接入](https://www.volcengine.com/docs/6287/101762)」文档。<br><br>* **扫码录入**<br><br>   手动输入的UUID、SSID数字较长（如：ssid=\"a0166a58\\-137a\\-410c\\-af02\\-04acc905\\*\\*\\*\\*\"），容易出错且不方便。因此对移动端的应用（iOS、Android），支持扫描二维码来录入设备ID。详见：[扫码录入设备ID](https://www.volcengine.com/docs/6287/67232). |\n\n\n<span id=\"_2-ssid添加方式\"></span>\n## 使用白名单\n\n\n* **创建实验**：在创建实验的过程中，“添加白名单”位置，下拉可选择常用的白名单，也可创建常用的白名单。\n\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/a1ac3fa5f4604d3e8316646d05c5d4d4~tplv-em5hxbkur4-noop.image?width=1473&height=427) </span>\n\n\n* **创建Feature**：在创建Feature的过程中，“发布受众”位置，下拉可选择常用的白名单，也可创建常用的白名单。\n\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/8dd0668c17f643089f840fa8700be843~tplv-em5hxbkur4-noop.image?width=1561&height=738) </span>\n\n如果一个用户是某个版本的白名单用户，那么实验分流对该用户是没有影响的，会固定在该版本。\n\n白名单的用户，实验开启后的数据也会被计算到实验报告里。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

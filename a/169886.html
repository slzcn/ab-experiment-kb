<script>window.DATA_BASE="../";window.INIT_DOC=169886;window.INIT_MD="<span id=\"64a5d929\"></span>\n# 背景信息\n\n\n* 预置事件公共属性即为所有事件均有的公共属性。\n\n   在APP端中可进一步细分为Android端、iOS端。其中：\n\n   * Android端和iOS端均有的事件公共属性内容可参见下文的[通用预置事件公共属性](https://www.volcengine.com/docs/6287/169886#39873564)。\n\n   * Android端特有的事件公共属性内容可参见下文的[Android特有](https://www.volcengine.com/docs/6287/169886#3f169910)。\n\n   * iOS端特有的事件公共属性内容可参见下文的[iOS特有](https://www.volcengine.com/docs/6287/169886#d8e31855)。\n\n* 特定预置事件独有的事件属性即为预置事件属性。\n\n   在APP端中可进一步细分为Android端、iOS端。其中：\n\n   * Android端和iOS端均有的事件公共属性内容可参见下文的[所有预置事件均有的事件属性](https://www.volcengine.com/docs/6287/169886#f7a53fe1)。\n\n   * Android端特有的事件公共属性内容可参见下文的[Android特有事件及属性](https://www.volcengine.com/docs/6287/169886#6f16d738)。\n\n   * iOS端特有的事件公共属性内容可参见下文的[iOS特有事件及属性](https://www.volcengine.com/docs/6287/169886#4da40a91)。\n\n* 用户属性相关的内容可参见[预置用户属性](https://www.volcengine.com/docs/6287/1237087)。\n\n\n<span id=\"da42e594\"></span>\n# 预置事件公共属性\n\n\n* 事件/属性类型说明：Android端/iOS端都有的事件公共属性。\n\n* 上报机制：SDK 默认每 60s 打包事件进行批量上报。\n\n\n<span id=\"39873564\"></span>\n## 通用预置事件公共属性\n\n\n|**属性名** |**属性展示名** |**SaaS/私有化支持情况** |**字段类型** |**数据来源** |**属性说明或示例** |\n|---|---|---|---|---|---|\n|$is_login |是否登录 |Saas |SaaS\\-云原生：int<br><br>SaaS\\-非云原生：String |服务端生成 |是否登录 |\n|is_login |是否登录 |私有化 |String |服务端生成 |是否登录 |\n|$is_first_day |是否首日访问 |Saas/私有化 |int |服务端生成 |此属性表示目标事件和首个事件发生在同一天。<br><br>与新老用户（user_is_new）属性的功能类似。<br><br><br>* 新老用户（user_is_new）：目标事件和首个事件发生在同一周期。比如在柱形图中，周期就是用户所选的时间范围。<br><br>* 新老用户（user_is_new）和是否首日访问（$is_first_day）最主要的区别在于前者受所选时间周期的影响，而后者不受影响，因此后者在不同的图表类型中得到的计算结果有更好的一致性，建议使用是否首日访问（$is_first_day）来判断新老用户。 |\n|$event_name |事件名 |Saas/私有化 |String |服务端生成 |事件的名称 |\n|$event_time |事件发生时间 |Saas/私有化 |DateTime |服务端生成 |事件触发的客户端时间 |\n|$user_register_time |注册时间 |Saas（SaaS云原生场景下暂不支持） |DateTime |服务端生成 |用户首次事件出现的时间（私有化里是用户属性first_event_time） |\n|network_type |网络类型 |SaaS\\-云原生/私有化（saas\\-非云原生里是用户属性） |String |系统 API |当前网络类型，示例: wifi |\n|aid |— |私有化 |String |用户传入 |app_id |\n|app_version |软件版本 |SaaS\\-云原生/私有化（saas\\-非云原生里是事件属性） |String |系统 API |APP 版本号，系统API获取。 |\n|bddid |设备ID |SaaS\\-非云原生 |String |服务端生成 | |\n|app_channel |渠道 |SaaS\\-云原生/私有化 |String |用户传入 |渠道，用户手动设置；SaaS\\-云原生环境用户可在事件属性中查找。 |\n|loc_country_id |国家 |SaaS云原生/私有化（saas\\-非云原生里是用户属性） |String | |根据client_ip的值进行行政区的推断。示例: 中国 |\n|language |系统语言 |SaaS云原生/私有化（saas\\-非云原生里是用户属性） |String |系统 API |系统语言，APP侧从系统API获取、小程序侧从getSystemInfo获取的。 |\n|os_name |操作系统 |SaaS云原生/私有化（saas\\-非云原生里是用户属性） |String |固定值 |操作系统 |\n|os_version |系统版本 |SaaS云原生/私有化（saas\\-非云原生里是用户属性） |String |系统 API |系统版本，APP侧从系统API获取、Web侧从ua解析的、小程序侧从getSystemInfo获取的。 |\n|platform |平台类型 |SaaS云原生/私有化（saas\\-非云原生里是用户属性） |String |固定值 |平台 |\n|region |系统地区 |SaaS云原生/私有化（saas\\-非云原生不支持） |String |系统 API |系统地区 |\n|resolution |分辨率 |SaaS云原生/私有化（saas\\-非云原生里是用户属性） |String |系统 API |屏幕分辨率，APP侧从系统API获取、小程序侧从getSystemInfo获取的 |\n|sdk_lib |SDK类型 |SaaS云原生/私有化（saas\\-非云原生里是用户属性） |String |固定值 |SDK 类型，示例: ios |\n|sdk_version |SDK版本 |SaaS云原生/私有化（saas\\-非云原生里是用户属性） |String |固定值 |SDK 版本号 |\n|$latest_search_keyword |搜索引擎关键字 |Saas\\-云原生 |String | |当符合前置条件时（当前页面地址和refer来源地址域名不相同），地址中带有keyword=xxx时，默认设置，如www.toutiao.com/xxx?keyword=sss，则此值为sss。没有则不设置。 |\n|timezone |时区 |私有化 |String |系统 API |系统时区 |\n|$latest_traffic_source_type |最近一次流量来源类型 |Saas\\-云原生 |String | |用户手动设置。 |\n\n\n<span id=\"3f169910\"></span>\n## Android特有\n\nAndroid端特有、iOS不支持的事件公共属性。\n\n\n|**属性名** |**属性展示名** |**SaaS/私有化支持情况** |**字段类型** |**数据来源** |**属性说明或示例** |\n|---|---|---|---|---|---|\n|device_brand |手机品牌 |Saas\\-云原生/私有化 |String |系统 API |示例：iPhone |\n|cpu_abi |cpu架构对应的abi |Saas\\-云原生/私有化 |String |系统 API | |\n|app_version_minor |四位版本号 |SaaS\\-云原生/私有化 |String |用户传入 |iOS从系统API获取build号，Android需手动设置。 |\n|app_language |软件语言 |Saas\\-非云原生，属于用户属性 |String |用户传入 | |\n|app_region |软件地区 |Saas\\-云原生/私有化 |String |用户传入 | |\n|network_carrier |运营商 |SaaS\\-云原生/私有化 |String |系统 API |运营商信息 |\n\n\n<span id=\"d8e31855\"></span>\n## iOS特有\n\niOS端特有的事件公共属性。\n\n\n|**属性名** |**属性展示名** |**SaaS/私有化支持情况** |**字段类型** |**数据来源** |**属性说明或示例** |\n|---|---|---|---|---|---|\n|app_version_minor |四位版本号 |Saas\\-云原生/私有化 |String |系统 API |Build 号，iOS从系统API获取build号，Android需手动设置。 |\n|app_language |软件语言 |私有化，Saas\\-非云原生里是用户属性，SaaS\\-云原生不支持 |String |用户传入,系统 API |用户手动设置。未传入会用系统语言兜底 |\n|app_region |软件地区 |Saas\\-云原生/私有化（saas\\-非云原生不支持） |String |用户传入,系统 API |用户手动设置。未传入会用系统地区兜底 |\n\n\n<span id=\"fac084ee\"></span>\n# 预置事件及事件属性\n\n预置的事件及对应事件特有的事件属性。其中也分所有预置事件均有的事件属性，和对应事件特有的事件属性。\n\n<span id=\"f7a53fe1\"></span>\n## 所有预置事件均有的事件属性\n\n\n|**属性名** |**属性展示名** |**SaaS/私有化支持情况** |**字段类型** |**数据来源** |**属性说明或示例** |\n|---|---|---|---|---|---|\n|$screen_orientation | |Saas/私有化 |Number |系统 API |事件发生的本地时间 |\n|$longitude |地理位置经度 |Saas/私有化 |Number |用户传入,系统 API |Andoid 仅支持用户传入，iOS 支持自动获取 |\n|$latitude |地理位置纬度 |Saas/私有化 |Number |用户传入 |Andoid 仅支持用户传入，iOS 支持自动获取 |\n|$geo_coordinate_system | |Saas/私有化 |String |用户传入 |Andoid 仅支持用户传入，iOS 支持自动获取 |\n|$app_version |软件版本 |Saas/私有化 |String |系统 API | |\n\n\n<span id=\"1367fd9c\"></span>\n## 应用启动事件（app_launch）\n\n\n|**事件名** |**事件说明** |**属性名** |**属性展示名** |**SaaS/私有化支持** |**属性值类型** |**属性描述** |**触发时机** |\n|---|---|---|---|---|---|---|---|\n|app_launch |应用启动 |$is_first_time |是否首次访问 |Saas |string |每个用户的第一次launch事件会添加该属性值为true，其他launch没有该属性 |* 当用户启动App（进入前台）的时候，产生一个 launch 事件。<br><br>* 当切换用户时，会结束上一次会话并重新产生一个新的 launch 事件。 |\n|||session_id |会话ID |Saas（私有化中为事件公共属性） |string | ||\n|||session_duration |本次打开应用的会话时长 |Saas/私有化 |int |session 时长，基于设备位于前台的时长求和统计，单位为秒,在app_launch里无该属性或值为0。 ||\n|||$page_title |页面标题 |SaaS\\-非云原生/私有化 |string | | |\n|||$page_key |页面名称 |SaaS\\-非云原生/私有化 |string | | |\n|||$resume_from_background |是否从后台恢复 |SaaS\\-非云原生/私有化 |string | | |\n\n\n<span id=\"7c27dc67\"></span>\n## 应用退出事件（app_terminate）\n\n\n|**事件名** |**事件说明** |**属性名** |**属性展示名** |**SaaS/私有化支持** |**属性值类型** |**属性描述** |**触发时机** |\n|---|---|---|---|---|---|---|---|\n|app_terminate |应用退出 |session_id |会话ID |Saas（私有化中为事件公共属性） |string |会话ID |* 当用户停止使用App（进入后台），会产生一个 terminate 事件，Android 中进入后台会停留 30s 才会触发，iOS 中是进入后台立即触发。<br><br>* 当切换用户时，会结束上一次会话产生一次 terminate 事件。 |\n|||session_duration |本次打开应用的会话时长 |SaaS/私有化 |int |session 时长，基于设备位于前台的时长求和统计，单位为秒。 ||\n|||$page_title |页面标题 |SaaS/私有化 |string | | |\n|||$page_key |页面名称 |SaaS/私有化 |string | | |\n\n\n<span id=\"04af8f9d\"></span>\n## 全埋点事件（bav2b_）\n\n\n|**事件名** |**事件说明** |**属性** |**属性值类型** |**属性描述** |\n|---|---|---|---|---|\n|bav2b_page |页面访问 |page_key |string |页面唯一标识 |\n|||refer_page_key |string | |\n|||is_back |int | |\n|||page_title |string |页面的标题 |\n|||page_path |string |页面的路径 |\n|||referrer_page_path |string | |\n|||refer_page_title |string | |\n|||$is_rn |int |判定是否 RN 页面 |\n|||$rn_root_tag |int |RN页面唯一编号 |\n|||$is_flutter |int |是否使用flutter全埋点 |\n|$bav2b_page_leave |页面离开 |$page_duration |int |页面时长 |\n|||page_key |string |页面唯一标识 |\n|||page_title |string |页面的标题 |\n|||$is_rn |int |判定是否 RN 页面 |\n|||$is_flutter |int |是否使用flutter全埋点 |\n|||$rn_root_tag |int |RN页面唯一编号 |\n|bav2b_click |元素点击 |page_key |string |页面唯一标识 |\n|||element_path |string |唯一标识控件,xPath的字符串 |\n|||positions |string数组 |元素在每层列表中的位置，可能为2\\-2 0\\-1 |\n|||texts |string数组 |元素文案，是个数组，数组中每个文案长度上限200字符 |\n|||element_width |string |元素宽度，单位同header.resolution |\n|||element_height |string |元素高度，单位同header.resolution |\n|||touch_x |int |点击位置相对元素左边界的距离，单位同header.resolution |\n|||touch_y |int |点击位置相对元素上边界的距离，单位同header.resolution |\n|||page_title |string |页面的标题 |\n|||element_id |string |元素ID，Android 端默认会获取；iOS 端每个控件一般不会设置 ID，因此 iOS 端默认会不获取。可手动设置 |\n|||element_type |string |元素类型，控件的类型，例如 Button |\n|||$is_rn |int |判定是否 RN 页面 |\n|||$is_flutter |int |是否使用flutter全埋点 |\n|||$rn_root_tag |int |RN页面唯一编号 |\n|$bav2b_exposure |元素曝光 |page_key |string |页面唯一标识 |\n|||element_path |string |唯一标识控件,xPath的字符串 |\n|||positions |string数组 |元素在每层列表中的位置，可能为2\\-2 0\\-1 |\n|||texts |string数组 |元素文案，是个数组，数组中每个文案长度上限200字符 |\n|||element_width |string |元素宽度，单位同header.resolution |\n|||element_height |string |元素高度，单位同header.resolution |\n|||page_title |string |页面的标题 |\n|||element_id |string |元素ID，Android 端默认会获取；iOS 端每个控件一般不会设置 ID，因此 iOS 端默认会不获取。可手动设置 |\n|||element_type |string |元素类型，控件的类型，例如 Button |\n|||$exposure_type |int |曝光类型 |\n|$bav2b_slide |滑动事件 |$direction |int |滑动方向 |\n|||$offsetX |float |横向偏移 |\n|||$offsetY |float |纵向偏移 |\n|||page_key |string |页面唯一标识 |\n|||element_path |string |唯一标识控件,xPath的字符串 |\n|||element_width |string |元素宽度，单位同header.resolution |\n|||element_height |string |元素高度，单位同header.resolution |\n|||page_title |string |页面的标题 |\n|||element_id |string |元素ID，Android 端默认会获取；iOS 端每个控件一般不会设置 ID，因此 iOS 端默认会不获取。可手动设置 |\n|||element_type |string |元素类型，控件的类型，例如 Button |\n\n\n<span id=\"51bce21b\"></span>\n## 应用崩溃事件（crash）\n\n\n|**事件名** |**事件说明** |**属性** |**属性展示名** |**SaaS/私有化支持** |**属性值类型** |**属性描述** |\n|---|---|---|---|---|---|---|\n|$crash |检测应用发生 Crash 时产生，目前 Android 支持 Java 层的 Exception，iOS 支持 NSException。 |$is_backstage |是否后台 |SaaS/私有化 |string |是否后台 |\n|||$event_time |事件发生时间 |SaaS/私有化 |datetime |崩溃时间 |\n|||$crash_thread |崩溃线程 |SaaS/私有化 |string |崩溃线程 |\n|||$crash_process |崩溃进程 |SaaS/私有化 |string |崩溃进程 |\n|||$detailed_stack |详细堆栈 |SaaS/私有化 |string |详细堆栈 |\n|||$os_version<br><br><br>* Android 未上报 |系统版本 |SaaS/私有化 |string |系统版本 |\n|||$app_version<br><br><br>* Android 未上报 |软件版本 |SaaS/私有化 |string |软件版本 |\n|||$device_model<br><br><br>* Android 未上报 |设备机型 |SaaS/私有化 |string |设备机型 |\n|||$resolution<br><br><br>* Android 未上报 |分辨率 |SaaS/私有化 |string |分辨率 |\n|||$app_channel<br><br><br>* Android 未上报 |渠道 |SaaS/私有化 |string |渠道 |\n|||$cpu<br><br><br>* Android 未上报 |CPU架构 |SaaS/私有化 |string |CPU架构 |\n|||$session_duration<br><br><br>* Android 未上报 |使用时长（秒/毫秒） |SaaS/私有化 |* SaaS\\-云原生：string<br><br>* SaaS\\-非云原生/私有化：int |使用时长（毫秒） |\n|||$rom<br><br><br>* Android 未上报 |ROM |SaaS/私有化 |string |ROM |\n\n\n<span id=\"6f16d738\"></span>\n## Android特有事件及属性\n\n暂无。\n\n<span id=\"4da40a91\"></span>\n## iOS特有事件及属性\n\niOS端特有的预置事件及对应的事件属性。\n\n\n|**事件名** |**事件说明** |**属性名** |**属性展示名** |**SaaS/私有化支持** |**属性值类型** |**属性描述** |\n|---|---|---|---|---|---|---|\n|$app_launch_passively |被动启动 |$resume_from_background |是否从后台恢复 |SaaS\\-非云原生/私有化 |bool |是否从后台恢复 |\n\n\n<span id=\"64bf9605\"></span>\n## 其他事件/属性\n\n<span id=\"d265eec5\"></span>\n### 跨端事件及属性\n\n跨端事件为各个端均有的事件，当前涉及的跨端事件及属性详情请参见[跨端预置属性](https://www.volcengine.com/docs/6287/1237086)。\n\n<span id=\"40b4f489\"></span>\n### AB曝光事件\n\n\n|**事件名** |**事件说明** |**属性** |**属性值类型** |**属性描述** |\n|---|---|---|---|---|\n|abtest_exposure |AB 实验曝光 |ab_sdk_version |string |AB 实验的 vid |\n\n\n<span id=\"c58e98e5\"></span>\n### 保留属性名\n\n\n|**属性名** |**属性展示名** |**SaaS/私有化支持情况** |**属性值类型** |\n|---|---|---|---|\n|$target_uuid_list |主动事件UUID列表 |仅私有化 |list |\n|$inactive |是否为被动事件 ||string |\n|$inline |是否为关系事件 ||string |\n|$source_uuid |主动事件UUID ||string |\n|$inactive |是否为被动事件 ||string |\n|aid | ||int |\n|__param_from_special | ||string |\n\n\n&nbsp;";</script>

    <a class="admin-link" id="adminLink" href="admin.html">⚙ 管理后台</a>
    <div class="side-foot" id="sideFoot"></div>
  </aside>

  <main>
    <div class="top">
      <div class="searchbox">
        <span class="si">🔍</span>
        <input id="q" placeholder="搜索实验设计"
          data-ph-prefix="搜索"
          data-ph-kw="实验设计,报告解读,广告投放,假设检验,指标体系,AB通识"
          autocomplete="off">
        <span class="clr" id="clr">✕</span>
      </div>
      <div class="stat" id="stat"></div>
    </div>
    <div class="body" id="listView"></div>
    <div class="body reader-scroll" id="readerView" style="display:none"></div>
  </main>
</div>

<!-- 写文章访问控制 -->
<div class="login-mask" id="loginMask">
  <div class="login-box">
    <div class="login-ic">🔒</div>
    <h3>需要授权</h3>
    <p>此操作仅限授权用户</p>
    <input id="loginPin" type="password" inputmode="numeric" placeholder="访问码" autocomplete="off">
    <button class="ed-btn" id="loginBtn">进入编辑</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-tip">登录后 2 小时内免再次验证</div>
  </div>
</div>

<!-- 写文章编辑器 -->
<div class="editor-mask" id="editorMask"></div>
<div class="editor" id="editor">
  <div class="ed-head">
    <b>✍ 写新文章</b>
    <span class="ed-close" id="edClose">✕</span>
  </div>
  <div class="ed-body">
    <div class="ed-form">
      <label>标题</label>
      <input id="edTitle" placeholder="例如：双十一大促实验复盘">
      <label>分类</label>
      <select id="edCat"></select>
      <label>检索关键词（选填，空格分隔）</label>
      <input id="edKw" placeholder="复盘 大促 转化率">
      <label>正文（Markdown）</label>
      <textarea id="edMd" placeholder="# 标题&#10;&#10;正文用 Markdown 书写，支持 **加粗**、列表、表格、代码块…&#10;&#10;## 小节&#10;- 要点一&#10;- 要点二"></textarea>
      <div class="ed-actions">
        <button class="ed-btn" id="edSubmit" style="display:none">✓ 发布文章</button>
      </div>
      <div class="ed-msg" id="edMsg"></div>
      <div class="ed-hint" id="edHint"></div>
    </div>
    <div class="ed-preview" id="edPrev">
      <div class="ed-prev-tag" id="edPrevTag"></div>
      <h1 id="edPrevTitle" style="margin:8px 0 16px"></h1>
      <div class="md" id="edPrevBody"></div>
    </div>
  </div>
</div>

<script src="../app.js?v=be73ac12"></script>
</body>
</html>

<script>window.DATA_BASE="../";window.INIT_DOC=72794;window.INIT_MD="> 案例中游戏是一款模拟经营类游戏，玩家扮演老板模拟健身房的经营。\n\n\n增长中很多时候搞不清方向或者索性佛系增长，但又希望可以实现稳定持续地增长，该如何避开佛系增长陷阱、找到增长机会点呢？\n\n<span id=\"问题是最大的增长机会点\"></span>\n## 问题是最大的增长机会点[#](https://www.volcengine.com/docs/6281/69695#%E9%97%AE%E9%A2%98%E6%98%AF%E6%9C%80%E5%A4%A7%E7%9A%84%E5%A2%9E%E9%95%BF%E6%9C%BA%E4%BC%9A%E7%82%B9)\n\n各广告点位均位于健身房场景，很多人在这里面做各种健身项目（基于脱敏要求，全文将用示意图演示）。\n\n该客户通过数据关注不同广告点位的表现，发现某个点位的人均广告观看次数非常不理想，这时，客户选择了比下掉问题点位更好的方案——优化问题点位。\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/tos-cn-v-697126/b87bfaae97b944eaa237023aabd9dce2.png) </span>\n\n<span id=\"深入挖掘问题点位的特征\"></span>\n## 深入挖掘问题点位的特征[#](https://www.volcengine.com/docs/6281/69695#%E6%B7%B1%E5%85%A5%E6%8C%96%E6%8E%98%E9%97%AE%E9%A2%98%E7%82%B9%E4%BD%8D%E7%9A%84%E7%89%B9%E5%BE%81)\n\n问题点位可以参考右下角，一个隐藏在人群中的超人。\n\n这个点位出现时会有一个超人从屏幕上飞过，最终落到人群当中，并且超人是一个激励视频的广告位，点击后会弹出激励视频。\n\n客户通过数据挖掘该点位表现差的真正原因，发现超人点位的展示次数非常高，但是点击非常低。\n\n为什么会出现这种情况？\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/tos-cn-v-697126/285e06df3d694f089e63be70d93108a3.png) </span>\n\n最终，基于数据分析与玩家调研，发现真正的原因在于这个广告点位过于原生，玩家甚至觉得它就是游戏里的一个元素，没有意识到是一个游戏点位，所以很多玩家没有主动进行点击。\n\n因此，客户考虑去提示玩家这个广告点位可以点击，并且点击之后可以得到一些奖励，那么如何找到最佳提升方式呢？\n\n<span id=\"让玩家用实际行动指明答案\"></span>\n## 让玩家用实际行动指明答案[#](https://www.volcengine.com/docs/6281/69695#%E8%AE%A9%E7%8E%A9%E5%AE%B6%E7%94%A8%E5%AE%9E%E9%99%85%E8%A1%8C%E5%8A%A8%E6%8C%87%E6%98%8E%E7%AD%94%E6%A1%88)\n\n在行动之前，客户先明确需要优化的核心指标——广告点位的广告观看次数，并且通过A/B实验来验证方案实际效果，避免盲目上线带来的未知损失。\n\n优化方案分了三个组，对照组是原方案，如果玩家不点击这个广告位不会有任何反馈这是个广告。\n\n同时，把强提示的方案做成了实验组。\n\n实验组A如果玩家不去点击这个广告，便会在屏幕顶部弹一个跑马灯，不断提示点击超人广告位有奖励。\n\n实验组B会未点击情况下，在屏幕右侧弹出一个常驻的悬浮窗，告诉玩家可以点击广告领取奖励。\n\n在实验结果显著后，发现实验组A的广告观看次数提升了17%，实验组B提升了25%。\n\n根据核心指标提升的数据结果，客户认为实验组B是一个更好的方案，并选择了该方案。\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/tos-cn-v-697126/734ab14128914aa5b7e3ef43a721d465.png) </span>\n\n客户最终把验证过的方案全量推到线上，并发现人均广告观看次数有了一个明显增长。\n\n那么增长到这里就结束了吗？\n\n<span id=\"一次增长后还能做什么\"></span>\n## 一次增长后还能做什么[#](https://www.volcengine.com/docs/6281/69695#%E4%B8%80%E6%AC%A1%E5%A2%9E%E9%95%BF%E5%90%8E%E8%BF%98%E8%83%BD%E5%81%9A%E4%BB%80%E4%B9%88)\n\n在这次优化方案取得明显增长后，客户依然持续观察提升效果是否符合预期并持续挖掘存在优化空间。\n\n围绕人均广告观看次数这一核心指标，客户持续进行更多优化尝试，比如图标设计优化、文案风格调整、奖励配置调优等。\n\n客户在循环地进行相关指标提升的探索，持续进行增长尝试。\n\n<span id=\"如何让一次增长开启下一次增长\"></span>\n## 如何让一次增长开启下一次增长[#](https://www.volcengine.com/docs/6281/69695#%E5%A6%82%E4%BD%95%E8%AE%A9%E4%B8%80%E6%AC%A1%E5%A2%9E%E9%95%BF%E5%BC%80%E5%90%AF%E4%B8%8B%E4%B8%80%E6%AC%A1%E5%A2%9E%E9%95%BF)\n\n从「问题发现」出发，分析问题所处场景，并利用数据进行「原因分析」找到问题的核心原因，基于原因产出多个优化方案，并通过A/B实验进行「方案验证」以保证上线真正可以带来增长的方案，并在方案全量上线后，对核心指标进行「效果追踪」，并且以增长结果为基础去开启新的增长。\n\n这就是从问题发现到原因分析、方案验证、效果追踪的全过程。\n\n利用「精准增长闭环」，让增长不佛系不随缘不迷茫，让增长可以持续。\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/tos-cn-v-697126/fba39a8dd225467797a91dd85a943203.png) </span>";</script>

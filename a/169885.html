4bmiJBTREs8L2Rpdj48L2Rpdj48L2Rpdj48L2ZvcmVpZ25PYmplY3Q+PC9nPjwvZz48L3N2Zz4=\" />\n\n其中：\n\n\n* 支持采集上报的事件和属性数据类型需满足系统要求，否则可能出现数据采集上报失败，或采集上报未报错但后续查询分析时无查询结果，事件及属性的数据格式要求请参见[支持的数据格式（自定义事件/属性）](https://www.volcengine.com/docs/6287/1149795)。\n\n* 各端集成SDK时，系统已预置了大量预置事件/属性，您可先了解当前已有的预置事件和属性，如果不满足业务需求，也可创建自定义事件/属性。预置事件/属性在使用过程中分为预置事件公共属性、预置事件属性、预置用户属性等类型，分类详情可参见下文的[事件/属性分类](https://www.volcengine.com/docs/6287/169885#cd0614fd)。\n\n* 预置事件/属性的数据来源有不同方式，例如有通过系统调用API获取、由用户自行传入等，且不同来源方式的预置事件/属性的关闭数据采集的方式不一致，详情请参见下文的[事件/属性的数据来源](https://www.volcengine.com/docs/6287/169885#e381158f)。\n\n\n<span id=\"cd0614fd\"></span>\n# 事件/属性分类\n\n根据业务数据分析场景，系统为您将事件和属性进行了以下业务层面的定义分类，后续您在SDK集成与埋点配置时，可根据业务需要配置对应的事件/属性。\n\n\n|**事件/属性分类** ||**业务含义说明** |\n|---|---|---|\n|系统预置 |预置事件公共属性 |系统预置的每一个事件都会上报的通用属性。比如SDK上报的设备信息类字段。 |\n||预置事件及事件属性 |系统预置的埋点事件以及事件属性。 |\n||预置用户属性 |系统预置的用于描述用户自身状态的属性。 |\n|自定义 |自定义事件公共属性 |客户在预置事件公共属性以外自定义的事件公共属性。 |\n||自定义事件及事件属性 |客户在预置事件及事件属性以外自定义的事件及事件属性。 |\n||自定义用户属性 |客户在预置用户属性以外自定义的用户属性。 |\n\n\n<span id=\"e381158f\"></span>\n# 事件/属性的数据来源\n\n\n* 数据来源：系统预置的事件/属性的数据值从哪里获取到的。\n\n* 关闭采集：是指是否可以关闭 SDK 自动采集这个动作。\n\n\n详情见下表。\n\n\n|**数据来源** |**来源说明/如何关闭采集** |\n|---|---|\n|系统API |SDK调用系统提供的API 方法获取，对于系统API类型，关闭采集就是不调用 |\n|固定值 |SDK 代码内置的常量，对于固定值类型，关闭就是不获取这个值 |\n|用户传入 |SDK 提供方法供用户调用传入，一般来说这类都不支持开关控制，不想采集不传入即可 |\n|SDK 生成 |SDK 本地计算生成的值 |\n|服务端生成 |请求服务端接口返回的内容 |\n\n\n<span id=\"24ff4ae4\"></span>\n# 其他事件/属性说明\n\n由于历史原因，部分属性名前有“$”部分属性名没有，可能会出现属性含义描述一致、属性名一个有“$”一个没有“$”的属性，此情况下以实际属性名和属性含义介绍为准。\n\n<span id=\"d6b43af7\"></span>\n# 预置属性汇总引导链接\n\n\n* 系统为您预置了各个端均有的跨端预置属性any_event、any_active_event，详情请参见[跨端预置属性](https://www.volcengine.com/docs/6287/1237086)。\n\n* 系统为您预置了用户属性，预置用户属性也不缺乏接入的端类型，各端通用，详情请参见[预置用户属性](https://www.volcengine.com/docs/6287/1237087)。\n\n* 各端的预置事件/属性按事件/属性的分类，可分为公共属性、事件属性，各端的详细列表请参见：\n\n   * [APP预置事件及属性](https://www.volcengine.com/docs/6287/169886)\n\n   * [Web预置事件及属性](https://www.volcengine.com/docs/6287/169887)\n\n   * [小程序预置事件及属性](https://www.volcengine.com/docs/6287/179778)\n\n   * [推送预置事件及属性（仅私有化）](https://www.volcengine.com/docs/6287/179077)\n\n* 此外：\n\n   * 为您汇总了全埋点相关的预置事件和属性，详情请参见[全埋点预置事件和属性](https://www.volcengine.com/docs/6287/169891)。\n\n   * 为您汇总了系统已占用的属性列表，您在创建自定义属性时务必不要创建同名属性，详情请参见[禁用属性列表](https://www.volcengine.com/docs/6287/1237088)。";</script>

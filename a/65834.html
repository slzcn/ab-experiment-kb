<script>window.DATA_BASE="../";window.INIT_DOC=65834;window.INIT_MD="开展实验前，您需要先根据实验类型和业务实际情况，规划设计好实验流量的分配方案，本文结合DataTester为您提供的流量层和互斥域功能，为您介绍在DataTester上开实验前规划实验流量分配的思路和注意事项。\n\n<span id=\"34e9b74f\"></span>\n# 为什么需要互斥域\n\n当您在规划集团的各个部门和业务线对某个指标贡献度时，需要用到很多推测和分析。互斥域直接为不同的部门和业务线规划流量区，能让您更好的度量全公司的各个部门和业务线对一个指标的贡献度。更多关于互斥域的介绍可参见[流量互斥域介绍](https://bytedance.larkoffice.com/docx/MhfVdygNwogdn1xyoK8cdErgn1g)。\n\n<span id=\"一-概述\"></span>\n# 基本概念与设计思路\n\n<span id=\"66c1a648\"></span>\n## 流量、流量分配\n\n\n|术语 |概念说明 |规划思路 |\n|---|---|---|\n|流量、流量分配 |* **流量**：互联网行业的A/B实验中，流量通常用于描述产品所拥有的总体用户数量。<br><br>* **流量分配**：开A/B实验时，一般都会小流量测试，当看到某个实验组效果后，再大流量测试，最终再全量上线。流量分配即设置每次实验时使用多少流量、每个实验分组占用实验流量的百分比。 |* 预估实验流量：对AB实验进行实验流量分配时，需结合实验目标、实验校验灵敏度等进行估算合适的流量数据，您可使用流量计算器进行估算，详情请参见[预估实验流量：流量计算器](https://www.volcengine.com/docs/6287/65814) |\n\n\n<span id=\"ba75fc47\"></span>\n## 流量层、流量互斥\n\n\n* 流量层：是对用户流量进行分层处理的一种策略，每个流量层可以看作是独立分配实验流量的一个“空间”，这样不同实验可以在各自的流量层中进行，保障它们之间的结果不会互相影响。\n\n* 流量互斥：进行A/B实验时，确保参与一个实验的用户不会同时被分配到另一个实验中。换句话说，这是一种机制，用来保证特定用户的访问只会被计入一个实验内，避免同一个用户同时参与到多个实验里，从而防止不同变量之间的相互干扰或混淆实验结果。\n\n\n<span id=\"5080d020\"></span>\n## 互斥域、互斥实验\n\n\n|术语 |概念说明 |规划思路 |\n|---|---|---|\n|互斥域、互斥实验 |* **互斥域**：也称互斥域、互斥层、实验层。互斥域技术是为了让多个实验能够并行不相互干扰，且都获得足够的流量而研发的流量分层技术。互斥域是一组流量/流量层的集合，互斥域技术可以将总体流量“复制”无数遍，形成无数个互斥域，让总体流量可以被无数次复用，从而提高实验效率。<br><br>   * **同一互斥域组不同互斥域中**的实验流量是**互斥**的，例如，创建了一个电商业务的互斥域组，其中规划了两个互斥域：迭代域和空白域，这两个互斥域的实验流量是互斥的。<br><br>   * **不同互斥域组或者同一互斥域中**的流量是**正交**的，如电商业务实验和社交业务实验。可以简单理解为：在互斥域选择正确的前提下，流量经过科学的分配，可以保证各实验的结果不会受到其他互斥域中的实验干扰。 如您想了解更多关于“正交”的内容，可阅读下一段落，也可选择性跳过。<br><br>* **互斥实验**：即处在**不同互斥域**中的实验。互斥实验之间流量是互斥的，如果一个用户命中了互斥域中的实验1，就不会命中对应互斥域组中其他互斥域的实验，但仍和处于同一互斥域的其他实验正交。 |1. **内容相同或相关、可能会彼此影响的实验，建议将实验加入到同一互斥域组的不同互斥域中。**  举例，您要同时做按钮颜色和按钮形状的实验，就需要将两个实验加入同一互斥域组的不同互斥域。<br><br>2. **彼此之间不相关的实验，可创建在不同的互斥域组中，复用流量。**  举例，您要同时进行算法实验和按钮颜色实验，即可将两个实验创建在不同的互斥域组中。<br><br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/523065622f17499885150391abd91a52~tplv-goo7wpa0wc-image.image) </span> |\n\n\n<span id=\"2e683dd2\"></span>\n# 流量层与互斥域功能说明\n\nDataTester为您提供流量层和互斥域功能，您可以在实验前根据规划创建好流量层和互斥域，便于在后续创建实验时直接选用对应流量。\n\n<span id=\"bbb67326\"></span>\n## 功能限制\n\n当前使用互斥域功能时：\n\n\n* 服务端SDK：仅 Java 和 Go 类型的服务端SDK支持使用互斥域，且Java SDK需使用2.0.19及以上版本，Go SDK需使用1.0.6及以上版本。\n\n* 客户端SDK：客户端SDK的各个版本均可使用互斥域功能。\n\n\n<span id=\"三-应用场景\"></span>\n## 应用场景\n\n\n* 如果实验流量不够用，但又想做多个实验且不想浪费时间，那么可以为实验添加互斥域组，解决实验流量不够用的问题。\n\n* 如果同时做2个实验（比如按钮颜色&按钮形状），但实验一起开启会互相影响实验结果，那么需要将这2个实验加入到一个互斥域组的不同互斥域中去。\n\n\n<span id=\"四-互斥组列表\"></span>\n## 流量层列表&互斥域列表\n\n\n* 流量层列表\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/2b8a9b6e046548b9a59dc5df46b378e7~tplv-goo7wpa0wc-image.image) </span>\n\n* 互斥域列表为您展示互斥域的基本情况，如下图：\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/049d2b76df0c4862b27830e2caa25aa5~tplv-goo7wpa0wc-image.image) </span>\n\n\n可操作内容如下：\n\n\n* **搜索**：可输入互斥域ID、名称、描述进行搜索。\n\n* **新建**：点击“新建互斥域分组”、“新建流量层”即可新建。\n\n* **实验数量**：可以查看被哪些实验使用，以及当前流量使用情况。\n\n* **修改**：可修改互斥域名称（同一应用互斥域名唯一）、互斥域描述、实验类型。\n\n* **删除**：实验数量为0时，才能删除流量层；互斥域中没有绑定流量层时，才能删除互斥域。\n\n\n<span id=\"五-新建互斥组\"></span>\n## 新建流量层、互斥域\n\n<span id=\"0e810921\"></span>\n### 新建流量层\n\n在流量层列表页，单击“新建流量层”，在弹出的侧边栏页面中配置流量层参数即可创建流量层。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/3e8febecf13847b18d15d34fdf5cbcea~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"9d37eff7\"></span>\n### 新建互斥域并绑定流量层\n\n在互斥域列表页，点击“新建互斥域”，即可弹出互斥域创建页面。如下图：\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/7629175166bc4dd0ba3dc52b99210b1f~tplv-goo7wpa0wc-image.image) </span>\n\n\n* 填写分组名称、实验类型。\n\n* 您可以安全打开嵌套子互斥域组的开关，打开后即可为互斥域绑定子互斥域。您可以选择已经创建好的互斥域作为子互斥域，或直接新建一个互斥域作为子互斥域。\n\n   <div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">注意   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"warning\" data-wrapper-indent=\"1\">选择绑定已创建好的互斥域作为子互斥域时，不支持绑定已关联过的互斥域。   </div>\n   \n\n* 为互斥域绑定流量层，您可选择已创建好的流量层，或直接新建流量层。\n\n   <div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">注意   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"warning\" data-wrapper-indent=\"1\">选择绑定已创建好的流量层时，不支持绑定已关联实验的流量层，避免直接影响已有实验。   </div>\n   \n\n<span id=\"880178d1\"></span>\n## 使用互斥域\n\n以编程实验为例，在创建实验的第二步「设置生效策略」，可在实验层选择已经创建的流量层，如果设施流量互斥，则可选择已创建好的互斥域。如下图：\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/6194940704ea489bb288ad40a35128c4~tplv-goo7wpa0wc-image.image) </span>\n\n**为实验添加互斥域，基本规则如下：** \n\n\n* 客户端实验只可添加客户端互斥域，服务端实验只可添加服务端互斥域。\n\n* 草稿箱、调试中的实验，支持添加互斥域。运行中的实验，支持添加没有运行中实验的互斥域，但不可以添加已经有运行中实验的互斥域。\n\n* 如果一个互斥域中已有运行中实验，则其他运行中实验不能再加入该互斥域，但可添加草稿箱及调试中的实验进入该互斥域。\n\n\n**为实验移除互斥域，基本规则如下：** \n\n\n* 草稿箱、调试中的实验，支持移除互斥域。运行中的实验，不支持移除互斥域。\n\n\n**权限相关**：所有互斥域全部为公共互斥域，当前集团当前应用内的任何用户都拥有“新建互斥域、查看互斥域、修改互斥域、下线互斥域”的权限。\n\n<span id=\"ad067f89\"></span>\n# 实验流量规划示例\n\n<span id=\"6f0f0ddd\"></span>\n## 示例1：单一实验流量层\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/094877963962463ab3668c5fab159578~tplv-goo7wpa0wc-image.image) </span>\n\n假设整体业务不算特别复杂，所有用户流量规划在同一个流量层中，这单一流量层内是100%的用户流量，创建实验时，可根据实验所需流量，将这单层100%的流量按照自定义比例分配给多个实验，在创建试验时，可进一步设置多个试验组，并规定各试验组可获得的流量比例。\n\n<span id=\"d25aa0d2\"></span>\n## 示例2：复杂业务的互斥域规划\n\n假设，企业有3个部门做的A/B实验需要分别评估，如果引入互斥域组，每个部门都可以通过自己互斥域组的保留对照组来评估自己部门的多个实验累计提升效果。同时，可以通过全局保留对照组评估3个部门累加的提升效果，例如评估APP的用户生命周期、停留时长、总人均GMV这类大盘级业务指标。互斥域组能帮助企业更好评估APP的累计总增长，并且评估各个团队的实际绩效。如下图：\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/9650ed35ee3d44f6b68e85634a3ed06b~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"5b800f68\"></span>\n# 拓展阅读\n\n<span id=\"b94e3280\"></span>\n## 流量正交\n\n上文提到，不同互斥域组或同一互斥域内的流量是正交的。如何理解流量“正交”？正交有什么用？\n\n举个例子。假设现在有2个实验。实验A（实验组标记为A1，对照组标记为A2）分布于互斥域组1，取用100%的流量；实验B（实验组标记为B1，对照组标记为B2）分布于互斥域组2，也取用100%的流量。（要注意，互斥域组1和互斥域组2实际上是同一批流量，互斥域组2复制了互斥域组1的流量）\n\n如果不对这两互斥域组做处理，让A1组和B1组获得的流量相同，A2组与B2组获得的流量相同（如下图）。这就意味着，一个用户被A1组命中时，同时也会被B1组命中。那么，两个实验的实验策略，均对该用户进行了展示。\n\n经过一段时间的实验，我们发现实验组B1的数据涨了。此时我们需要面临一个问题：**B1组的指标涨了，真的是B1的策略生效了吗？有没有可能是受到A1组策略的影响呢？** \n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_3e43f62b3e1e252d61df21790811b4ae.png) </span>\n\n以目前流量的分配情况来看，我们无法回答这个问题。B1组指标涨了，可能是受A1组影响，也可能不是。那么我们应该怎么分配流量，才能确定B1组指标上涨，跟A1组没关系呢？\n\n答案就是让流量“**正交**”。\n\n如果把A1组的流量分成2半，一份放进B1组，一份放进B2组；再把A2组的流量也分成2半，一份放进B1组，一份放进B2组。那么两个实验对于流量的调用就会如下图所示。此时实验A和实验B之间，就形成了**流量“正交”** 。\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_4ce4368b435062898610e1246b609fdc.png) </span>\n\n可以发现，因为A1组的一半流量在B1中，另一半流量在B2中，因此即使A1的策略会对实验B产生影响，那么这种影响也均匀的分布在了实验B的两个组之中。在这种情况下，如果B1组的指标上涨了，那么就可以排除B1是受A1影响才形成上涨。这就是流量正交存在的意义。\n\n火山引擎A/B测试的分流服务通过两次运算「哈希函数」，使得不同互斥域的流量之间呈正交关系。**在流量正交的情况下，不同互斥域中的实验，其相互之间的影响被均匀打散，使得实验的指标结果更加值得信赖。** \n\n<span id=\"b151a081\"></span>\n## 打破流量层正交性的特殊情况\n\n不同实验层之间的流量是正交的，即不同层上的实验不会相互影响。但是有种特殊情况：父子实验（dependent experiment）——流量继承。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/a402d7b36ad545bba16fc715e555f01c~tplv-goo7wpa0wc-image.image) </span>\n\n实验层的**正交性**保证不同层上的实验不会相互干扰。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/2ab8213855914b3a9cc7eabe5c6e749a~tplv-goo7wpa0wc-image.image) </span>\n\n父子实验**打破正交**，选择某个**正在运行**的实验作为“**父实验**”，从中选择**某一组**，并将新的实验（**子实验**）开设在这组流量之下。";</script>

    <div class="login-tip">登录后 2 小时内免再次验证</div>
  </div>
</div>

<!-- 写文章编辑器 -->
<div class="editor-mask" id="editorMask"></div>
<div class="editor" id="editor">
  <div class="ed-head">
    <b>✍ 写新文章</b>
    <span class="ed-close" id="edClose">✕</span>
  </div>
  <div class="ed-body">
    <div class="ed-form">
      <label>标题</label>
      <input id="edTitle" placeholder="例如：双十一大促实验复盘">
      <label>分类</label>
      <select id="edCat"></select>
      <label>检索关键词（选填，空格分隔）</label>
      <input id="edKw" placeholder="复盘 大促 转化率">
      <label>正文（Markdown）</label>
      <textarea id="edMd" placeholder="# 标题&#10;&#10;正文用 Markdown 书写，支持 **加粗**、列表、表格、代码块…&#10;&#10;## 小节&#10;- 要点一&#10;- 要点二"></textarea>
      <div class="ed-actions">
        <button class="ed-btn" id="edSubmit" style="display:none">✓ 发布文章</button>
      </div>
      <div class="ed-msg" id="edMsg"></div>
      <div class="ed-hint" id="edHint"></div>
    </div>
    <div class="ed-preview" id="edPrev">
      <div class="ed-prev-tag" id="edPrevTag"></div>
      <h1 id="edPrevTitle" style="margin:8px 0 16px"></h1>
      <div class="md" id="edPrevBody"></div>
    </div>
  </div>
</div>

<script src="../app.js?v=3de2203d"></script>
</body>
</html>

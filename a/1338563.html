<script>window.DATA_BASE="../";window.INIT_DOC=1338563;window.INIT_MD="DataTester为您提供实验编辑修改与启停等管理操作，在各个创建实验文档中已为您介绍实验的调试、启停的相关操作指导，本文为您介绍实验编辑和重启相关操作要点。\n\n<span id=\"99b6aaa3\"></span>\n# 实验编辑（缩量）\n\n实验创建成功后，您可以在实验详情页面右上角单击编辑按钮，对实验进行编辑修改。\n\n\n* 对于实验流量：您可以根据业务实际情况减小实验流量（即缩量）或增加实验流量，以下为您重点介绍缩量的操作要点。\n\n   <div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">注意   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"warning\" data-wrapper-indent=\"1\">运行以及暂停中缩量为高危操作，会导致用户出组，并且影响报告科学性，导致实验报告数据不可用，请谨慎操作。   </div>\n   \n\n* 其他参数的修改配置与创建实验时的要点一致。\n\n1. 登录并进入实验详情页面后，单击编辑按钮。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/1312881d67b84c18b674dfcb78c39a6b~tplv-goo7wpa0wc-image.image) </span>\n\n2. 在实验编辑页面中，可针对各个实验参数进行调整，如果您修改了实验流量：\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/6f865ebcb93d4f6d81ad9d3cf81eaa6d~tplv-goo7wpa0wc-image.image) </span>\n\n   * 如果您修改了实验流量：则会对原有实验流量进行增减，且增减后，实验版本和对照版本的实验流量比例与实验配置的结果保持一致。\n\n   * 如果您减少了实验流量：需根据界面提示评估实验缩量是否会影响实验报告的准确性，确认后再进行后续操作。\n\n   * 修改实验流量后，进组人数、实时指标数据当天即可查看到修改后的数据；离线指标数据需第二天才能看到变更后的结果数据。\n\n\n<span id=\"ad9068b0\"></span>\n# 实验重启\n\n<span id=\"37871c4f\"></span>\n### 注意事项\n\n\n* 实验停止后，**24小时内**可对实验进行重启操作。\n\n* 实验负责人或管理员可进行实验重启操作。\n\n\n<span id=\"a60c3a8c\"></span>\n### 操作说明\n\n\n1. 登录并进入已停止的实验详情页，单击右上角的**更多**\\>**重启实验**。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/73d2d5e5a0cc4772b2e1b7b2cd749192~tplv-goo7wpa0wc-image.image) </span>\n\n2. 在弹窗中单击确认，立即重启实验。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/5cdfe5b2ebe64a5b80a5906f2e62fdd6~tplv-goo7wpa0wc-image.image) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。

</script>

<script>window.DATA_BASE="../";window.INIT_DOC=1544686;window.INIT_MD="当前DataTester为您提供的SaaS化和私有化两大类的部署方式，其中SaaS环境随产品的发展迭代可分为旧版SaaS环境（SaaS\\-非云原生）和SaaS\\-云原生环境两类，两类SaaS环境的产品功能和操作流程基本一致，在管理员的操作和部分细节上有少许差别。本文为您介绍SaaS两类环境的识别方式。\n\n<span id=\"ae51d202\"></span>\n# 如何确认SaaS环境是否是SaaS\\-云原生环境？\n\n如果您使用的是DataTester的SaaS环境，您不确定自己的环境是否是SaaS\\-云原生环境，您可登录DataTester产品控制台后，对照以下内容来检查确定使用的是否是SaaS\\-云原生环境。\n\n\n* 切换应用方式\n\n   \n   |**旧版SaaS环境（SaaS\\-非云原生环境）**  |**SaaS\\-云原生环境** |\n   |---|---|\n   |在页面左上角切换应用时，能切换选择个集团下的某个项目。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/aa5115eb52af4764a8f9d58129a6f9c8~tplv-goo7wpa0wc-image.image) </span><br><br>由于SaaS\\-非云原生环境一个项目仅支持绑定一个应用，因此进入某个项目即代表进入了项目绑定的应用。 |在页面左上角切换应用时，有1项目多应用的是SaaS\\-云原生环境。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/96f8977843014ceeb8571e5f9d0881cf~tplv-goo7wpa0wc-image.image) </span><br><br>由于SaaS\\-云原生环境一个项目支持绑定多个应用，因此切换应用时您可以直接在左上角选择进入哪个应用。 |\n   \n\n* 查看集团设置入口：如果您当前的账号权限为管理员权限，可查看集团设置，则可根据集团设置入口来判断当前的环境类型\n\n   \n   |**旧版SaaS环境（SaaS\\-非云原生环境）**  |**SaaS\\-云原生环境** |\n   |---|---|\n   |您可以查看界面左下角位置，如果有集团设置入口，则您当前的环境为SaaS\\-非云原生环境。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/731db03488bc4676a367f095f71bd9b4~tplv-goo7wpa0wc-image.image) </span> |如果您的页面左下角没有集团设置入口，则当前环境为SaaS\\-云原生环境。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/4109a9fa6e1646b4a3334a788cf8f112~tplv-goo7wpa0wc-image.image) </span> |\n   \n\n* SaaS\\-云原生/SaaS\\-非云原生支持的地域\n\n   \n   |**旧版SaaS环境（SaaS\\-非云原生环境）**  |**SaaS\\-云原生环境** |\n   |---|---|\n   |国内地域：SaaS\\-非云原生环境中的服务不区分地域概念。 |国内地域：<br><br><br>* 华北2（北京）：cn\\-beijing |\n   |海外地域：<br><br>SaaS\\-非云原生环境当前暂不支持海外地域。如果您的业务在海外希望使用海外地域的DataTester服务：<br><br><br>* 新用户建议使用SaaS\\-云原生的海外环境。<br><br>* 存量用户建议使用BytePlus的环境。详情可联系火山引擎技术支持人员咨询。 |海外地域：<br><br><br>* 亚太东南（柔佛）：ap\\-southeast\\-1 |\n   \n\n   SaaS\\-云原生环境的用户如果希望查看当前使用的DataTester服务是哪个地域，可参考[支持的地域](https://www.volcengine.com/docs/6287/1544685)。\n\n\n<span id=\"495551a8\"></span>\n# 注意事项\n\n不同环境、不同地域的DataTester在产品功能和使用逻辑上大致相同，主要差异点在于：\n\n\n* 数据上报地址：不同环境、地域的实验指标数据上报地址不一致，您需将数据上报至对应地域的地址中，如果上报地址与地域不匹配会造成数据无法正常查询分析。各地域的数据上报地址请参见[实验指标数据上报地址](https://www.volcengine.com/docs/6287/1544684)。\n\n* 应用/项目/集团等管理操作：不同环境的管理员操作入口有差异，。\n\n\n其他更多差异可在查看对应功能文档时关注其中关于功能对于支持的环境相关描述。\n\n<span id=\"e3811312\"></span>\n# 帮助文档中关于SaaS环境的标注说明\n\n为便于您跟进当前使用的SaaS环境来查看对应的帮助文档，在帮助文档中通过以下方式来标注不同环境场景下的指导文档：\n\n\n* SaaS\\-云原生与旧版SaaS环境中，大部分的产品使用无差异，此类文档在帮助文档中不会特意区分SaaS和SaaS云原生。如果类似的内容同时标注了SaaS和私有化，则SaaS部分表明同时适用于SaaS\\-云原生与旧版SaaS环境。\n\n* 在SaaS\\-云生与旧版SaaS环境中有使用不一致的场景下，帮助文档会在内容中标注SaaS\\-非云原生和SaaS\\-云原生的区别。如果类似的内容同时标注了SaaS\\-非云原生和SaaS\\-云原生，则SaaS\\-非云原生部分适用于旧版SaaS环境，SaaS\\-云原生适用于云原生环境。";</script>

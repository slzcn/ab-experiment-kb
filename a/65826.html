<script>window.DATA_BASE="../";window.INIT_DOC=65826;window.INIT_MD="服务端实验的目标受众，无法使用客户端的公共属性、用户分群和自定义属性，需要将服务端参数在「受众管理\\-服务端请求参数」进行注册，才可支持使用。\n\n<span id=\"二-服务端过滤参数列表\"></span>\n# 服务端请求参数列表\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/a20e02edbac64cb8a5092974076ae873~tplv-goo7wpa0wc-image.image) </span>\n\n\n* **搜索** ：可输入“名称、描述、创建人”进行搜索。\n\n* **注册新的过滤参数** ：点击“+过滤参数”，在创建参数页面填写完整信息即可创建参数。\n\n* **操作：**  支持复制、删除、操作历史、添加数值合集等操作。\n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">点击「删除」会先禁用该参数，所有服务端实验和服务端Feature都无法使用该参数作为定向过滤条件，同时已使用该参数的实验和Feature的相关过滤条件将会失效。请谨慎删除。   </div>\n   \n\n<span id=\"三-如何注册服务端过滤参数\"></span>\n# 注册服务端请求参数\n\n点击列表页“+过滤参数”，弹出如下：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_bd0cf76b53b6c57138ed438efb6edbb3.png) </span>\n\n\n* **参数名称** ：不得与其他服务端请求参数同名。\n\n* **参数Key** ：需要保证不同服务端请求参数间的代码层级变量名（即Key）唯一。\n\n* **参数类型** ：支持String、Int、Version、Boolean、Float。\n\n* **负责人**：默认创建人。\n\n* **调用来源**：默认服务端。\n\n\n<span id=\"四-如何使用服务端过滤参数\"></span>\n# 使用服务端请求参数\n\n**1.**  **SDK分流使用示例**\n\n参考服务端SDK集成相关文档：[后端SDK](https://www.volcengine.com/docs/6287/65805)\n\n**2. 创建服务端实验/Feature**\n\n在创建服务端实验/Feature的时候，可以使用已经注册的服务端请求参数作为目标受众。\n\n\n* “服务端实验”目标受众，如下图：\n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">过滤参数使用需要在代码处增加服务端过滤参数。   </div>\n   \n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_e1d3fde39316b05464ffcb88079ab8cd.png) </span>\n\n\n* “服务端Feature”自定义受众规则，如下图：\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_7ea0893cbc3bcee50943413dca84722e.png) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

      </div>

    <div class="ed-preview" id="edPrev">

    </div>
  </div>
</div>

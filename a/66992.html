<script>window.DATA_BASE="../";window.INIT_DOC=66992;window.INIT_MD="<span id=\"0a88ce71\"></span>\n# 1. 概述\n\n<span id=\"dba4a5f6\"></span>\n## 1.1 什么是事件属性\n\n属性用于描述事件发生时的各维度信息，包括用户信息（user_id）、设备信息（app版本、设备号、ip地址、设备型号等）、业务自定义信息（上报到params的自定义参数）等。\n\n<span id=\"efe1d218\"></span>\n## 1.2 事件属性分类\n\n\n1. 事件属性：又称为Params，不同事件有不同的事件属性。同一个埋点可以定义多个属性。以“播放视频”事件为例，它包含如下事件属性：enter_from（动作发生的页面），video_id（视频id）等。\n\n2. 事件公共属性：又称为Header，每一个事件都会上报的通用属性。数据接入SDK会将设备信息类的字段预置到Header中。\n\n\n<span id=\"b34b4b96\"></span>\n## 1.3 事件属性状态说明\n\n\n* 启用：可用的属性，数据会正常更新。\n\n* 禁用：不可用的属性，数据会被丢弃，系统内不可查。\n\n* 不显示：数据正常更新，但系统内不可查，通常适用于系统后台消费的属性。\n\n\n<span id=\"dfff143f\"></span>\n# 2. 功能说明\n\n<span id=\"6031d986\"></span>\n## 2.1 新增事件属性\n\n您可以在登记埋点（一般事件）时一并登记事件属性，也可以单独登记事件属性。如果您需要单独登记事件属性或登记事件公共属性，可执行以下操作：\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">常见的设备、时间等通用参数，数据接入SDK已为您提供了预置事件属性，您无需重复手动创建。建议您创建自定义事件属性前先查看已支持的预置事件和预置属性，如果业务含义相同，尽量复用已预置的字段，避免随意定义后导致系统中字段泛滥。</div>\n\n\n\n1. 选择**指标管理 \\> 元数据管理 \\> 事件属性**，进入事件属性页面后，单击**新增事件属性**按钮。\n\n2. 在弹出的新建事件属性页面配置属性参数。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/1d291f13ff7645b98d2af185a2570782~tplv-goo7wpa0wc-image.image) </span>\n\n   \n   |参数 |配置说明 |\n   |---|---|\n   |属性名称 |事件属性命名时要具体，谨慎使用泛化的参数名称，反例如 time（什么的时间？是时间戳还是时长？）、name（什么的名字？），正例比如下单时间，建议命名为order_time。 |\n   |事件公共属性 |* 如果您登记一般事件属性（params），不要勾选事件公共属性，需要将属性关联到特定事件（有上报这个属性的事件），如果未关联事件，则查询事件时无法使用该事件属性。<br><br>* 如果您登记事件公共属性（header），务必勾选事件公共属性，此时不需要关联到特定事件。每一个事件都可以使用事件公共属性。 |\n   \n\n3. 单击**确定**按钮完成新增事件属性。\n\n\n<span id=\"2a3d6ceb\"></span>\n## 2.2 验收属性\n\n事件属性列表仅展示已验收/登记的事件属性，未验收属性可点击“验收属性”按钮，在“数据验收”页面查看并完成验收。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/65c2097364f747f5a2549502f60f2741~tplv-goo7wpa0wc-image.image) </span>\n\n您也可以在“数据验收”页面管理事件属性黑名单，将需要的事件属性添加或移出黑名单。\n\n<span id=\"c9ee3195\"></span>\n## 2.3 修改自定义属性的数据类型\n\n如果您此前登记的数据类型有误或变更了新的类型，可以在列表中修改数据类型字段。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/44b41f2ba7c94aa2b44399c2a2714b62~tplv-goo7wpa0wc-image.image) </span>\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">变更类型分兼容变更和非兼容变更， 大类型向小类型转不丢历史数据(比如 string \\-\\> int)，小类型往大类型转会丢历史数据(比如 int \\-\\> float)。请谨慎选择数据类型。</div>\n\n\n<span id=\"b0c1d093\"></span>\n## 2.4 编辑展示名、属性描述\n\n支持修改事件属性的展示名、属性描述。支持批量修改。如果您希望批量补全信息，你可以将展示名、属性描述为空的事件筛选出来，打包导出为csv格式文档，在csv文档中填写完整并点击**修改信息**按钮上传导入，实现批量修改/登记展示、描述信息。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/324bb5aa88a749c19713b82296bfaf35~tplv-goo7wpa0wc-image.image) </span>\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">批量导入功能仅支持修改展示名和属性描述，其他字段不支持批量修改。</div>\n\n\n<span id=\"3ff96d41\"></span>\n# 3. 常见问题FAQ\n\n<span id=\"41d61bd7\"></span>\n## 3.1 如何删除事件属性？\n\n不支持删除已登记/验收的事件属性，如果您不再需要该属性，可以修改状态将其禁用，被禁用的事件属性将不再构建数据，在分析模块不可查。\n\n<span id=\"5f930b9e\"></span>\n## 3.2 事件属性和用户属性的区别是什么？\n\n事件属性记录了描述事件的各种维度信息，例如操作系统、软件版本、软件渠道等，也可以是文章ID文章标题、文章作者等；用户属性是用户自身状态的属性，例如性别、年龄等。\n\n<span id=\"0fc87d25\"></span>\n## 3.3 事件属性验收和新增区别是什么？\n\n新增事件属性和验收事件属性的效果是一样的，都是将事件属性信息注册到数据管理\\-事件属性列表，从而能够在高级分析使用。差别在于验收属性需要先上报数据，系统检测到上报后才能进行验收；而新增事件属性在数据上报前后都可以进行登记，您可以在埋点设计阶段就将事件属性登记好，这样埋点上线后就不需要验收了，可以直接使用。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

<script>window.DATA_BASE="../";window.INIT_DOC=66385;window.INIT_MD="<span id=\"a2d492c7\"></span>\n# 功能简介\n\n若有新的功能/策略，需经常变更迭代，可创建为一个Feature作为动态配置，界面化管理和更新。\n\n示例：比如商品优惠券梳理、APP登录方式，这些功能或策略可通过创建一个Feature配置，在界面上更新生效策略。\n\n<span id=\"二、如何使用\"></span>\n# 创建Feature\n\n<span id=\"6b732382\"></span>\n## 进入操作入口\n\n\n1. 登录DataTester产品控制台后，在产品左侧导航栏单击**配置管理**\\>**Feature列表**，进入Feature列表页面。\n\n2. 单击页面右上角的“+创建Feature”，进入创建Feature页面。\n\n   配置创建Feature需填写的信息：基本信息、适用APP、自定义变量、设置变体、发布受众，配置详情可参见下文。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_c22a822c1901e8b3a45d735e0f7eb3d8.png) </span>\n\n\n<span id=\"71b627fa\"></span>\n## **配置Feature：基本信息**\n\nFeature基本信息包括Feature的名称、key等基础说明信息，旨在传达该Feature代表什么功能或策略等。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/31fd34d9d52a4ab990d8d7fb635bee94~tplv-goo7wpa0wc-image.image) </span>\n\n\n|**参数** |**参数说明** |\n|---|---|\n|**key名称** |Key是功能特性（Feature）的核心键值，填写后会在代码中嵌入。配置要求：key值全局唯一，支持英文字符、数字、下划线，最长不超过200个字符，一经创建不允许修改编辑。<br><br>示例：app_login_type。 |\n|**Feature名称** |建议取与策略相关的名称，让其他人快速理解对应什么策略上线。配置要求：名称全局唯一，支持中英文字符、数字、下划线，最长不超过100个字符(不可包含特殊符号)。<br><br>示例：APP登录方式。 |\n|**Feature描述**&**上传配图** |对feature的描述。配置要求：支持中英文字符、数字、下划线，最长不超过2048个字符。<br><br>示例：这是APP登录方式的feature。<br><br>您也可可以点击Feature描述后的上传配置，上传Feature图片或页面截图，便于快速辨识Feature的差异。 |\n|**标签** |可以自定义标签，主要用于分类和搜索查询，方便Feature的管理，比如用户性能优化的策略可以统一加上「性能优化」标签；支持添加多个标签。建议选择已有标签or添加新标签方便管理（最多支持10个，每个20个字符以内）。 |\n|**Owners** |默认创建人为Owner，可添加其他人为Owner，方便协同操作。 |\n|**终端类型** |指获取Feature分组信息并控制配置Feature生效的终端是客户端还是服务端， 可根据您的业务类型和Feature生效方式选择端类型。<br><br><br>* 客户端Feature，如客户端交互功能、UI样式等都建议创建客户端Feature。<br><br>* 服务端Feature，如内容分发算法&策略、由服务端逻辑控制产品功能的Feature都是服务端Feature。 |\n\n\n<span id=\"bda6da22\"></span>\n## **配置Feature：设置变体**\n\n设置变体即配置Feature key的取值(value）。示例：若Feature为APP登录方式，则变体可为 1:QQ登录、2:微信登录 3:抖音登录\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/4c45d8c3e103491c83d53538dd28a761~tplv-goo7wpa0wc-image.image) </span>\n\n\n|**参数** |**参数说明** |\n|---|---|\n|**变体类型** |配置变体的取值类型，当前支持boolean、string、number和json四种类型（json类型支持多层嵌套）。 |\n|**参数校验** |对于非boolean类型的变体，您可以打开**参数校验**开关，在参数校验中设置参数的取值规则，后续在配置具体变量取值时，系统将根据您配置的校验规则进行取值校验。 |\n|**变体取值** |* boolean：默认包含两个变体值True和False，可添加描述<br><br>* string：字符串格式<br><br>* number：支持整数位十位，小数位五位<br><br>* json：json类型支持多层嵌套，请按json规范填写 |\n|**添加新变体** |一个Feature可创建多个变体，boolean类的变体可添加两个变体；其他类型支持添加更多。 |\n\n\n<span id=\"ac66c43d\"></span>\n## **配置Feature：发布受众**\n\n发布受众即为该Feature设置生效规则，即最终下发按什么规则生效，包括：生效到哪个APP、生效哪个变体取值。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/a7a9006e3df34b189464294198dea6c4~tplv-goo7wpa0wc-image.image) </span>\n\n受众规则按照if...else...的逻辑生效：\n\n\n* 命中if\\-**自定义受众规则**的用户，将按照自定义受众规则中的发布范围进行发布。\n\n* 未命中if规则的用户，将按else\\-**最终默认规则**生效。\n\n\n若需设置不同条件发布不同的变体取值，则可在受众规则中进行灵活设置。\n\n\n|**参数** |**参数说明** |\n|---|---|\n|if\\-自定义受众规则 |* **过滤条件**：可对受众规则添加多个过滤条件，多个条件之间为“且”的关系。<br><br>   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div><br>   <br><br>   <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">若已有的过滤条件不满足需求，可进入用户属性页面创建新的用户属性，作为自定义过滤条件。   </div><br>   <br><br>* 发布范围：可选择发布范围“某个变体、多变体、不下发参数值”(其中多变体指多个变体可随机按比例发布)，选择某个变体或多变体后，可设置流量比例。<br><br>* 添加受众规则：可添加多组受众规则，每组关系为\"或\"，且自上而下进行判断。例如当请求命中第一条自定义规则后，无需判断后续规则 |\n|else\\-默认最终规则 |「自定义受众规则」未命中的用户，自动发布最终规则。<br><br><br>* 选择其中一个变体：比如有3个变体，可选择默认最终规则为变体1、变体2、变体3其中的一个变体。<br><br>* 不下发参数值：变体值不下发，生效本地默认值。 |\n\n\n<span id=\"c379b23d\"></span>\n# 查看Feature列表及状态\n\n您可以在左侧导航栏**配置管理**\\>**Feature列表**页后看到所有已创建的Feature及其状态。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/a0632b37d94245dab700e9ac4fcb0ff6~tplv-goo7wpa0wc-image.image) </span>\n\n\n* 开关状态：表明当前Feature是否发布生效。已开始的Feature，您可以在Feature详情页面的右上角手动关闭Feature。\n\n* 发布版状态：\n\n   * 未发布：Feature未执行发布操作。\n\n   * 灰度中：Feature已执行发布，发布生效的流量还未达100%。\n\n   * 发布确认：Feature在执行发布的过程中，当前待进行发布确认操作。\n\n   * 已全量：Feature已执行发布，发布生效的流量已达100%。\n\n   * 已回滚：已发布的Feature被回滚。\n\n\n<span id=\"edef7647\"></span>\n# 后续步骤\n\n<span id=\"33bc3a7c\"></span>\n## 查看并嵌入Feature代码\n\n创建Feature或者实验后，研发人员需要业务代码中书写对应的Feature或者实验信息。\n\n通常这些信息需要研发人员在多个平台间填写，增大了配置成本和出错风险。Tester在创建Feature时，提供了基于填写的配置信息自动生成示例代码的功能，并支持自定义生成代码规则，用户可将生成好的代码复制到客户端代码中，降低填写成本。详情请参见[嵌入Feature代码](https://www.volcengine.com/docs/6287/164636)。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/6ec2fab25ef14adb851e1087c4cfaa9d~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"5447f08b\"></span>\n## 调试Feature\n\n创建完成Feature、正式发布Feature前，您可以为Feature添加白名单用户，通过白名单用户来测试Feature配置是否符合预期，操作详情请参见[调试Feature：白名单测试](https://www.volcengine.com/docs/6287/163138)。\n\n<span id=\"db9b0af0\"></span>\n## 发布Feature\n\nFeature创建或者变更后，需发布才会生效到线上，若需发布可参考[如何发布](https://www.volcengine.com/docs/6287/66387)。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

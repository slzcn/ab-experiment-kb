<script>window.DATA_BASE="../";window.INIT_DOC=1262388;window.INIT_MD="实时埋点检测是可以实时检测、快速验证埋点是否正确及数据上传情况的功能，常用于研发或测试人员debug验证，支持移动端App(Android、iOS)、微信小程序、网页端、服务端（Java）。 当使用埋点检测功能，成功建立埋点检测连接后，进入埋点验证页面，每一次事件触发都会实时显示在埋点验证的页面内。\n\n<span id=\"48f66d63\"></span>\n# 功能入口\n\n登录DataTester控制台后，单击左侧导航栏**指标管理**\\>**元数据管理**\\>**埋点实时验证**，进入埋点实时验证页面。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/25195f52ac4c4838b962ece4149f2e4e~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"5a17b8db\"></span>\n# 建立埋点实时验证连接\n\n<span id=\"7d15dcdd\"></span>\n## **移动端App**\n\n\n1. 点击\"验证埋点\"页面上方的\"**移动端App**\"页签。\n\n2. 选择后，启动实时检测，建立实时验证连接。\n\n   1. 第一步：扫描二维码。\n\n      <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/797e92788c7d4491990deb71bf2a0dd3~tplv-goo7wpa0wc-image.image) </span>\n\n      <div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\" data-wrapper-indent=\"2\">注意      </div>\n      \n\n      <div data-tips=\"true\" data-tips-type=\"warning\" data-wrapper-indent=\"2\">确保手机已安装App的正确版本(应用名称、App_name、App_id)，且设置了正确的唤起Scheme，并在手机端已打开。      </div>\n      \n\n   2. 第二步：在手机浏览器中打开。\n\n      <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/65260f4d57aa4a47ba2d2b0786666dab~tplv-goo7wpa0wc-image.image) </span>\n\n   3. 第三步：在手机端，点击\"开始检测埋点\"，连接建立成功，开始检测。\n\n      <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/38361d1ce3294a278381c3f3a00665bf~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"9e333457\"></span>\n## **微信小程序**\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">SaaS\\-云原生环境暂不支持小程序埋点验证功能。</div>\n\n\n\n1. 点击\"验证埋点\"页面上方的\"**微信小程序**\"页签。\n\n2. 选择后，启动实时检测，建立实时验证连接。\n\n   1. 如果没有上传小程序二维码，则进入上传页面。\n\n      <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_74d8556135e85c475e47335e23be1147.png) </span>\n\n   2. 点击\"上传小程序码\"进入上传小程序码弹窗页面；根据提供的参数生成小程序码并上传，上传成功后，点击\"完成\"，即上传小程序码完成。\n\n      <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_aa4268f5d7c55957d79a842f53538f17.png) </span>\n\n   3. 页面展示生成上传的小程序二维码，二维码参数中带有启动埋点验证的相关参数。\n\n   4. 扫描小程序码。\n\n      1. 扫码进入小程序后，SDK根据埋点检测参数，启动实时检测的连接。\n\n      2. 扫码成功后，自动进入埋点检测页面。\n\n         <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/7484cbfb755c40c6a370bdf56b7a6ec6~tplv-goo7wpa0wc-image.image) </span>\n\n         如果多个用户都扫码且没有开始检测，则根据列出扫码的用户及相关信息（按扫码时间倒序排列），可以从中选择自己的手机进行扫码，成功后自动进入埋点检测页面。\n\n         <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/ca4e88a5dab84a808e91f7cc194d7001~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"6ca54157\"></span>\n## **网页端应用**\n\n\n1. 点击\"验证埋点\"页面上方的\"**网页端应用**\"页签。\n\n2. 选择后，启动实时检测，建立实时验证连接。\n\n   1. 输入网页端埋点检测网页地址(注：网页集成的JS SDK版本需要5.1.2及以上版本)\n\n      <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/050d744b398a4933b0fcd335eaae522b~tplv-goo7wpa0wc-image.image) </span>\n\n   2. 生成二维码及访问URL地址(注：该页面需要集成Web端的SDK)\n\n      <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/1c25e1c0cc404c52b517ae36c7f1c9fa~tplv-goo7wpa0wc-image.image) </span>\n\n   3. 可通过以下方式打开页面。\n\n      * 可在手机端扫码，扫码后建立链接。\n\n      * 可根据生成的访问URL，复制后在浏览器打开访问页面，也可以直接在电脑浏览器打开。\n\n\n<span id=\"9ab0eec8\"></span>\n## **服务端埋点**\n\n\n1. 点击\"验证埋点\"页面上方的\"**服务端埋点**\"页签。\n\n2. 启动实时检测，建立实时验证连接。\n\n   1. 第一步：输入验证账号的user_unique_id。\n\n   2. 第二步：获取url并根据页面提示将url设置到SDK初始化指定位置。\n\n   3. 第三步：开始上报埋点并查看实时检测数据，连接建立后页面将自动跳转。\n\n      <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_502d0ada435caba90b43023984d0058e.png) </span>\n\n\n<span id=\"bc998c08\"></span>\n# 查看实时埋点检测\n\n启动实时检测，成功建立实时验证连接后，自动进入实时验证页面，可以查看每一次的事件触发。 以移动端App为例，在手机端应用中触发上传注册事件(register)时，可进行以下操作：\n\n\n1. 在实时验证页面左侧的事件轴中可以看到register事件的触发；在页面右侧代码块中可以看到register事件实时上报的数据。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_d97544b7c9fca567c35ae727c59128ec.png) </span>\n\n2. 点击\"完成检测\"，断开连接，并跳转到埋点管理页面。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_a545d58e0ca0ded26098cb7824687ad7.png) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

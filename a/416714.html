<script>window.DATA_BASE="../";window.INIT_DOC=416714;window.INIT_MD="智能调优实验是一种序贯地评估实验数据表现，并自适应的将流量倾斜给效果更好的实验版本的实验类型。其中自适应评估与调优的算法主要是 MAB(Multi\\-Armed Bandit) 。本文为您介绍DataTester的MAB智能调优实验应用场景和创建要点。\n\n<span id=\"二-应用场景\"></span>\n# 应用场景\n\n<span id=\"_1-传统ab的弊端\"></span>\n## 传统AB的弊端\n\n传统A/B实验依赖于统计显著性的经典假设检验，为对照版本和实验版本分配相应的流量，但一般不允许在实验期间变更每个子版本的流量。因此该类实验有几个弊端，一是需要专门的给常规实验预留一定的周期（至少7天），对于一些时间比较紧急的需求，很难满足这样苛刻的条件；二是必须要有足够的样本进入到实验中，才能得出显著的结果。\n\n<span id=\"_2-智能调优实验的应用场景和优势\"></span>\n## 智能调优实验的应用场景和优势\n\n> 实验目的：指标收益最高，实验成本最小\n\n\n\n|**场景** |**智能调优实验** |**A/B实验** |\n|---|---|---|\n|高价值流量：丢失转化的机会成本较高，例如在线销售大额商品（汽车、钻石等），每个失去的转化都会造成几千/几万块的损失。 |动态调整流量，根据实验结果及时找出当前效果比较好的版本，将转化效果差的版本降低流量，减少损失 |目标是获得统计上显著的方案：在时间、机会成本允许的情况下，AB实验能更快的获得稳健的、在统计上显著的获胜方案，虽然在过程中会损失一些转化。 |\n|活动周期短：比如很多电商活动的整个周期就一两天，如果传统AB的方法一般需要7天以上，活动没法提供足够的时间进行A/B实验 |MAB的核心目标是整个活动最优，并不是帮助客户找到最优组，对实验时限没有要求 |需要足够的时间，一般至少7天以上，排除时间变量 |\n|优化目标实效性强：例如头条新闻的标题、缩略图、视频内容等的优化测试，需要在短的窗口期内获得最大点击量。 |MAB可以周期性查询各版本的转化效果，且调优频率可以自定义设置，目前最短能达到半小时 |实时性较弱：需要等到实验时间结束或者流量用尽之后产出统计结果 |\n|持续优化：可以在MAB优化过程中，随时在变体中增加或减少多个元素，比如开启界面MAB时，可以调整界面上被测试的元素 |MAB对流量/实验变体没有严格要求，可以在调优过程中切换实验流量以及实验变体的元素 |需要进行深度数据分析，AB实验收集的数据更适合在实验时或实验后进行数据的多维分析，来查看不同细分人群对于测试的变量有何反映。对MAB来说，表现不好的组可能没有足够的数据进行这些。 |\n|小流量：对于初创公司或者活动冷启动时期，可能没有足够的流量进行实验 |MAB会基于当下指标表现动态的分配，所以原则上来说MAB过程更能在总流量不多的情况下将流量收益最大化（注：本质是一种在流量较少的情况下优化收益的妥协性方案，不代表可以比AB实验使用更少的流量达到相同的效果） |想要从所有变体（特别是较差变体）中吸取一些教训：AB实验一定程度上能够保证每个变体都有足够的流量来统计以及计算置信度，如果想衡量较差变体的糟糕程度，从而指导业务决策，请选择AB实验。 |\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">如果既要拿整体流量收益，又要决策方案优劣，Tester 将在后续版本提供 MAB 与AB 实验混合的整体解决方案。</div>\n\n\n<span id=\"f41ab03b\"></span>\n# 注意事项与前提条件\n\n\n|细分 |注意事项详述 |\n|---|---|\n|版本要求 |当前仅A/B测试**旗舰版**支持MAB智能调优实验，如果您希望使用MAB智能调优实验进行实验分析，请确保您已购买A/B测试旗舰版。 |\n|MAB调优生效限制 |创建MAB调优实验后，如果实验过程中，**用户进组人数**和**指标**需同时达到以下条件才能正常进行实验调优，否则无法开启实验调优：<br><br><br>* 用户进组人数要求：每个实验组进组人数超500人。<br><br>* 指标要求：指标值大于0 |\n|准备工作 |创建MAB智能调优实验前，您需确保管理员与研发已完成对应的准备工作，包括集团的配置、应用添加。完成准备工作后，运营人员即可参考以下操作步骤创建实验。 |\n\n\n<span id=\"三-操作演示\"></span>\n# 操作演示\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/c51746b26c1a494b9e0c6a77342c8807~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"01351911\"></span>\n# 创建智能调优实验\n\n登录并进入A/B测试应用页面后，在页面左侧导航栏选择**智能优化 \\> 智能动态调优**，进入**调优列表**后单击右上角的**智能调优**按钮，进入创建智能调优实验页面。\n\n<span id=\"_4-1-1-输入基本信息\"></span>\n## step1 输入基本信息\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/01fb061bd3a64f5d912f6e412f6941b8~tplv-goo7wpa0wc-image.image) </span>\n\n\n|**参数** |**配置说明** |\n|---|---|\n|**调优名称&调优描述** |* **调优名称：**  调优名称建议取与调优内容相关的名称，如有实验版本迭代可以增加版本号后缀，让你的伙伴能够快速了解到实验是做什么的、是在哪个迭代版本的。<br><br>* **调优描述：**  调优内容简述，可以让项目相关人员更清晰地知道到这个调优是如何做的，解决什么问题，同时也便于后期查看和管理历史调优时一目了然。 |\n|**调优场景** |有【落地页优化】和【APP小程序优化】。<br><br><br>* 选择【落地页优化】，会有两种调优方式，分别为「可视化调优」和「多链接调优」。<br><br>* 选择【APP小程序优化】，则会调起「客户端调优」和「服务端调优」两种方式。 |\n|**调优方向与指标** |此处只能选择一个核心指标，智能调优只关注实验者最关心指标的提升比率，最终实验报告也是围绕该指标设计的。<br><br><div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div><br><br><br><br>* <div data-tips=\"true\" data-tips-type=\"warning\">调优指标不能带常数项，需要选取反馈较快的指标，例如是否点击、在小时粒度内是否转化等。带常数项的识别规则如下：</div><br><br><br>   * <div data-tips=\"true\" data-tips-type=\"warning\">假设C为常数，X为变量项目。</div><br><br><br>   * <div data-tips=\"true\" data-tips-type=\"warning\">则以下均为带常数项的指标：C+X、C\\-X、C\\*X。</div><br><br><br>* <div data-tips=\"true\" data-tips-type=\"warning\">对于隔天才有转化的转化率指标，当前版本的算法基本会失效。对于需要较长时间（例如超过2个及以上个调优周期）才有反馈的指标，无法及时获得效果数据来调整流量，故不建议作为调优指标。（当前只支持点击率、转化率类指标；人均点击次数、浏览时长等下一次迭代提供）</div><br> |\n|**调优时长** |默认7天，上限为60天。 |\n|**实验负责人** |默认为实验创建者。 |\n\n\n<span id=\"_4-1-2-设置生效策略\"></span>\n## step2 设置生效策略\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/c16c39213a61477b987c95c909dc4a5e~tplv-goo7wpa0wc-image.image) </span>\n\n\n|**参数** |**配置说明** |\n|---|---|\n|**参与调优的流量** |控制参与调优的总流量，系统默认100%。<br><br><div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div><br><br><br><div data-tips=\"true\" data-tips-type=\"warning\">每个调优频率内，平均每组流量累计不能小于500个，否则系统会一直等到累计到足够样本量才开始调优。</div><br> |\n|**流量生效方式** |支持「立即生效」和「平滑生效」两种生效方式。<br><br>平滑生效会在设置的时间内把流量生效到设定的大小，例如实验流量设置成30%，平滑生效时间设置成30min，则会按照每分钟生效1%的进度线性生效。平滑生效更多说明可以查看文档：[实验流量平滑生效](https://www.volcengine.com/docs/6287/1169339)。 |\n|**用户受众规则** |您可以创建多个筛选组，筛选组间为“或”的逻辑关系；每个筛选组内可设置多个过滤条件，过滤条件间为“且”的逻辑关系。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/fca4b6532f7a40c2887288d2bfcc993f~tplv-goo7wpa0wc-image.image) </span> |\n|**体验一致性** |进组不出组，保证参与调优的用户，每次进入到同一个实验版本中。 |\n|**调优设置** |持用户设定调优的频率，目前可设置的范围是[0.5h, 24h]。 |\n\n\n<span id=\"_4-1-3-配置实验版本\"></span>\n## step3 配置实验版本\n\n此处实验版本的配置取决于实验第一步中【输入基本信息】中的调优场景和调优方式的设定：\n\n\n* 与普通实验配置的主要差异\n\n   \n   |实验版本配置参考 | |\n   |---|---|\n   |实验版本 |MAB实验版本不再区分实验版本、对照版本，通过版本1、版本2来标识不同的实验版本。 |\n   |流量分配 |MAB实验支持自定义设置流量分配按钮。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/8ee0bf3d0eb04b20bc219f82c3b2ce29~tplv-goo7wpa0wc-image.image) </span><br><br><br>* **自定义设置**未打开时：流量分配仅展示**评估流量**以及**智能调优流量**整体的流量分配比例。<br><br>   * 评估流量默认按照每个版本给3%流量，此部分流量用于算法调优以及收益计算。<br><br>   * 剩余流量给到智能调优并根据版本数平均分配，如果余数超过一位小数，按照后端逻辑处理。<br><br>* **自定义设置**打开时：可手动设置评论流量智能流量初始设置。 |\n   \n\n* 其他与普通实验配置类似的配置参数，可参考普通实验的配置文档。\n\n   \n   |调优场景 |调优方式 |实验版本配置参考 |\n   |---|---|---|\n   |落地页优化 |可视化调优 |[可视化实验-配置实验版本](https://www.volcengine.com/docs/6287/65811#_4-1-3-%E9%85%8D%E7%BD%AE%E5%AE%9E%E9%AA%8C%E7%89%88%E6%9C%AC) |\n   |落地页优化 |多链接调优 |[多链接实验-配置实验版本](https://www.volcengine.com/docs/6287/65808#_4-1-3-%E9%85%8D%E7%BD%AE%E5%AE%9E%E9%AA%8C%E7%89%88%E6%9C%AC) |\n   |APP小程序优化 |客户端调优/服务端调优 |[编程实验-配置实验版本](https://www.volcengine.com/docs/6287/65809#_4-1-3-%E9%85%8D%E7%BD%AE%E5%AE%9E%E9%AA%8C%E7%89%88%E6%9C%AC) |\n   \n\n\n<span id=\"_4-2-开启实验\"></span>\n# 调试、开启、停止实验\n\n实验创建完成后，您可以在A/B测试\\>实验列表中查看已创建的实验，并查看实验状态。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/fad3f9d5a18e4a47a230b72ca7ce4a64~tplv-goo7wpa0wc-image.image) </span>\n\n\n* **调试中**：新创建完成的实验，实验状态为**调试中**，此阶段您可以邀请已添加为测试用户的用户进行实验测试，确认实验符合预期。\n\n* **进行中**：实验调试完毕后，您可以在实验列表页点击“启动”，即可开启实验。实验开始后，实验的状态变为**进行中**，此时进组用户可实时查看，指标置信度第二日产出。\n\n* **已结束**：实验开始后，当实验时长到达创建实验时配置的**实验时长**后，实验会自动停止；如果没有到达实验时长，您希望立即停止实验，也可在实验列表手动停止实验。停止实验后，实验状态变为**已结束**。\n\n\n<span id=\"472224e0\"></span>\n# 支持实验过程中调整实验版本\n\nMAB实验\\-**APP小程序优化实验\\-体验一致性关闭，即**支持在实验过程中添加、减少版本，也支持调整实验版本的下发参数。此功能适用于实验长期在线，且在实验过程中希望能够调整下发版本的参数的场景。\n\n> 例如希望对app banner做长期的择优选择，实验初期只有3个版本比较，在过程中会根据数据表现淘汰表现差的banner或者增加新的banner参与流量调优。\n\n\n<span id=\"1789bb3e\"></span>\n## 注意事项\n\n\n* 该功能仅适用于体验不一致的场景。当前支持APP小程序中的客户端调优/服务端调优，在体验一致性关闭时可使用。\n\n* 当前仅SaaS\\-云原生环境支持此功能。\n\n\n<span id=\"e361f87c\"></span>\n## 操作步骤\n\n<span id=\"4f02558e\"></span>\n### 开启功能\n\n开启该功能，除配置实验外，还需要在事件公共属性中增加mab_arm属性，并在指标计算相关的事件中正确上报该参数信息。需要手动上报曝光事件和调优指标相关的事件中携带该事件属性，属性值为分流下发的对应配置值，否则将统计不到进组和指标。\n\n> 例：实验为海报赛马实验，各版本中将海报的识别参数（如：postid）作为流量调优的目标。则需要将postid上报到mab_arm中。\n\n\n<span id=\"cd1c4e75\"></span>\n### **新建实验**\n\n\n|**操作** |**示意图** |\n|---|---|\n|输入基本信息<br><br>**实验场景选择：APP/小程序优化** |<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/d7090056a8094509a50fcd92dea2868a~tplv-goo7wpa0wc-image.image) </span> |\n|设置生效策略<br><br>体验一致性：**关闭**<br><br>> 备注：由于在实验过程中允许实验下发参数的调整，无法保证实验一致性（即用户始终体验的是同一套下发参数），所以体验一致性关的时候可以支持调整参数 |<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b1a4259d5fe14f6b8659ce4617327f23~tplv-goo7wpa0wc-image.image) </span> |\n|配置实验版本<br><br>在实验过程中不能增减配置的版本数量，所以需要提前预留足够的实验版本（即同时在线的版本数量），不需要使用的版本可以预留不下发。<br><br>预留版本配置：<br><br>当下发版本超过3个时，可以设置某版本为预留版本，在实验过程中调整。<br><br>同时下发的版本数不得小于2个<br><br>调优参数配置：<br><br>在体验不一致性场景下，调优建模由原来的对版本建模改为对下发参数建模，多参数下发时需要指定调优参数。<br><br>调优参数不支持JSON类型。<br><br>备注：若只有一个参数的情况下，不需要配置调优参数（隐藏不现实） |预留版本配置<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/39951dcbefce405ba30914f50eb26a73~tplv-goo7wpa0wc-image.image) </span><br><br>调优参数及流量配置<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/69817d35bc934925982461725eaef7e1~tplv-goo7wpa0wc-image.image) </span><br><br>备注：若只有一个参数的情况下，不需要配置调优参数 |\n\n\n<span id=\"95e650eb\"></span>\n### **编辑实验**\n\n\n|**操作** |**示意图** |\n|---|---|\n|进行中的实验，点击编辑操作，可对实验的下发版本进行编辑 |<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/8d4b3656e9fa4fb4b30b6bfc0265c8aa~tplv-goo7wpa0wc-image.image) </span> |\n|**编辑下发版本**<br><br>可对之前预留版本进行关闭，上线后对该版本参数进行下发<br><br>该版本会进入冷启动过程（冷启动流量为在线版本的平均流量）<br><br>**编辑下发参数**<br><br>允许下发版本调整下发参数<br><br>当下发参数调整后，该对应版本会进入冷启动过程（重新积累数据进行调优，冷启动流量为在线版本的平均流量） |<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b35923cf0e7643fba741d89c49cef661~tplv-goo7wpa0wc-image.image) </span> |\n|**流量配置**<br><br>当做了如下操作后流量分配会发生变化：<br><br><br>1. **预留版本 打开 \\-\\-\\> 关闭**<br><br><br>流量：进入冷启动，冷启动流量比例为在线版本的平均流量<br><br><br>2. **预留版本 关闭 \\-\\-\\> 打卡**<br><br><br>流量：调整为0，原有流量回收。<br><br><br>3. **下发参数变化**<br><br><br>流量：参数变化的版本重新进入冷启动，冷启动流量比例为在线版本的平均流量。<br><br>**其余版本：** <br><br>在流量调中过程中，在未进入冷启动的版本之间，保持调整前的流量分配比例。 |<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/c1ff5dd21519472783b8768b3c946e0f~tplv-goo7wpa0wc-image.image) </span> |\n|**保存提醒**<br><br>保存时会做弹窗确认提醒，提示本次编辑后对下发版本，参数调整的调整以及调整后冷启动流量的配置。 |<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/9aed89aff5e44c8ca1344a2a86b73523~tplv-goo7wpa0wc-image.image) </span> |\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">修改运行中MAB实验的实验版本配置的实验参数value值，实验报告中的指标数据和数据提升比率将不再可信，报告中的流量分配部分仍然可信。</div>\n\n\n<span id=\"eb040515\"></span>\n# 查看实验报告\n\n实验开启后，您也可以在实验列表中，通过实验操作入口点击进入实验报告页面，查看实验报告，详情请参见：[MAB报告综述](https://www.volcengine.com/docs/6287/196493)。\n\n对于非体验一致性场景的报告阅读，可以查看[MAB实验报告解读：非体验一致性场景](https://www.volcengine.com/docs/6287/1784547)";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

<body>
<script type="application/json" id="kbdata"></script>
<div class="loading" id="loading"><div class="spin"></div><div class="ld-t">正在加载知识库</div><div class="ld-s">首次加载稍候片刻</div></div>

<div class="app" id="app" style="display:none">

  <div class="mmask" id="mmask"></div>
  <aside id="aside">
    <div class="brand">
      <h1><span class="logo">AB</span>A/B 实验知识库</h1>
      <p>营销增长中心 · 数据驱动决策手册</p>
    </div>
    <div class="cats" id="cats"></div>
    <div class="write-btn" id="writeBtn">✍ 写新文章</div>
    <a class="admin-link" id="adminLink" href="admin.html">⚙ 管理后台</a>
    <div class="side-foot" id="sideFoot"></div>
  </aside>

  <main>
    <div class="top">
      <div class="searchbox">
        <span class="si">🔍</span>
        <input id="q" placeholder="搜索实验设计"
          data-ph-prefix="搜索"
          data-ph-kw="实验设计,报告解读,广告投放,假设检验,指标体系,AB通识"
          autocomplete="off">
        <span class="clr" id="clr">✕</span>

      <div class="ed-actions">

      </div>

    </div>
  </div>

<script>window.DATA_BASE="../";window.INIT_DOC=1157764;window.INIT_MD="<span id=\"概述\"></span>\n# 概述\n\n使用云托管版本需要您采买营销套件产品本身+数据底座（Bytehouse/las）两类产品，本文档也会涉及两类产品的配置。\n\n**相关角色\\*负责任务：** \n\n\n* 您（客户）：采购相关产品、创建具备Bytehouse/las权限的子账号、提供配置需要的信息给火山同学、配置Bytehouse中的计算组。\n\n* 火山引擎：在全流程中给您提供操作指导，帮您完成开通授权。\n\n\n<span id=\"_2-datatester-datafinder-付费接入流程\"></span>\n# 2. DataTester/DataFinder 付费接入流程\n\n<span id=\"步骤概览：\"></span>\n## 步骤概览：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_e3449e8f7a105b635d25a2fe06ae1879.png) </span>\n\n<span id=\"具体流程：\"></span>\n## 具体流程：\n\n<span id=\"step1-：产品购买\"></span>\n#### Step1 ：产品购买\n\n1）购买DataFinder\n\n[官网购买DataFinder云托管版本](https://www.volcengine.com/product/datafinder)\n\n2）购买DataTester\n\n[官网购买DataTester云托管版本](https://www.volcengine.com/product/datatester)\n\n3）开通Bytehouse\n\n[官网购买bytehouse（云数仓版）](https://www.volcengine.com/product/bytehouse)\n\n<span id=\"step2：云托管配置接入（完成全部购买之后，才可操作）\"></span>\n#### Step2：云托管配置接入（完成全部购买之后，才可操作）\n\n<span id=\"_1）bytehouse相关配置-新建finder-tester-中所需使用的计算组\"></span>\n##### 1）Bytehouse相关配置\\-\\-新建Finder/Tester 中所需使用的计算组\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">营销套件（finder/tester）产品界面的查询计算依赖BH该计算组，强烈建议您配置永不过期的token，否则可能导致token失效相关营销套件系统不可用！</div>\n\n\n1.1 进入Bytehouse，新建计算组\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_45b6300ffdbf508dd2b1bdcb4b9b3df5.png) </span>\n\n1.2复制计算组名称\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_c251e7479a275c5cc15750ba70dd70ad.png) </span>\n\n1.3进入账户设置\\-查看API Token并复制\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_b565f439644ac78ea4f0d520e7a6a779.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_fe4892e8055d8ad95e153bff49527892.png) </span>\n\n> 特别注意：Bytehouse的API token只能在生成时进行保存，需要下载CSV保存复制。\n\n\n<span id=\"_2）datafinder-datatester侧配置-填写相关信息，配置api-token-计算组：\"></span>\n##### 2）DataFinder/DataTester侧配置\\-\\-填写相关信息，配置API Token/计算组：\n\nDataFinder/DataTester云托管配置所需填写的信息包含：1、Bytehouse计算组名称 2、API TOKEN（即上方Bytehouse中生成的api token ）\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_e08c1fe1be922ae42e9345bb4f60462a.png) </span>\n\n<span id=\"_3、云托管子账号创建\"></span>\n##### 3、云托管子账号创建\n\n您需要创建一个具备Bytehouse权限的子账号，如下红框的权限都勾上。\n\n> [子账号配置参考火山文档](https://www.volcengine.com/docs/6257/64977)\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_80359c1461efead7defba366f37d2f7d.jpg) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_fe66565d0b76a9a1161ac9cb1b6b3a75.png) </span>\n\n<span id=\"_4）kafka信息配置\"></span>\n##### 4）kafka信息配置\n\n完成以上步骤之后，告知火山客户成功同学/火山销售同学（由他们联系finder/Tester技术同学）手动帮助您配置kafka信息。\n\n此处，需要您给到上一步创建的具备Bytehouse权限的子账号（包含账号和密码）。\n\n<span id=\"_5）走完以上流程就等于完成云托管相关的配置\"></span>\n##### 5）走完以上流程就等于完成云托管相关的配置\n\n后续可以进入finder/tester使用。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/

</script>

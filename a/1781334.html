<script>window.DATA_BASE="../";window.INIT_DOC=1781334;window.INIT_MD="DataTester为您提供灵活的用户权限管控能力，结合火山引擎访问控制产品，可实现对不同角色、不同用户的灵活权限管控。本文为您介绍DataTester的权限管控策略和授权操作指导。\n\n<span id=\"一、概述\"></span>\n# 背景信息\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\">本文为您介绍如何对DataTester进行操作账号进行权限管控。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\">在使用DataTester的过程中，由于DataTester的部分功能与DataFinder的产品功能有联动，因此为保障DataTester功能正常使用，您还需完成DataTester的跨服务访问请求授权，允许DataTester访问DataFinder服务，此操作需由主账号或拥有IAMFullAccess权限的用户进行操作，进入DataTester控制台界面后界面会有对应的弹窗提示，根据弹窗提示完成授权即可。</div>\n\n\n\n火山引擎官网提供访问控制产品能力，支持在一个主账号下创建多个子账号，可满足企业中，为不同业务团队创建不同权限限制的子账号，分别使用已购买的产品的场景。 其中A/B测试（DataTester）权限系统是以角色为基础的权限管理设计（RBAC），通过用户关联角色、角色关联权限的方法来间接地赋予用户权限。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_3ef5778b6c51b692fc6f7fb9c6dd0178.png) </span>\n\n例如，管理员（通常为主账号）购买DataTester后，可结合业务团队的实际情况，为产品团队、运营团队等业务团队分别创建IAM子账号，并为子账号授权，后续由业务团队使用子账号来操作DataTester。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">SaaS\\-云原生和SaaS\\-非云原生环境中的授权链路有所不同，您需要根据您实际使用的环境进行权限管控规划与操作，本文为您介绍的是SaaS\\-非云原生场景的内容，SaaS\\-云原生场景请参见<a href=\"https://www.volcengine.com/docs/6287/69594\">权限管理：SaaS\\-云原生环境</a>。如果您不确定您当前使用的是哪种环境，可参考文档<a href=\"https://www.volcengine.com/docs/6287/1544686\">SaaS云原生/非云原生&私有化环境</a>先进行确认。</div>\n\n\n\n|对比项 |SaaS\\-非云原生 |\n|---|---|\n|授权流程 |1. 管理员（主账号）开通DataTester后，（可选）在访问控制中创建子账号。操作详情请参见[访问控制-用户管理](https://www.volcengine.com/docs/6257/64977)。<br><br>2. 管理员将用户添加为集团用户，并绑定集团角色，实现在集团层面权限管控。操作详情请参见集团管理页面中的[角色管理](https://www.volcengine.com/docs/6287/66985)、[用户管理](https://www.volcengine.com/docs/6287/66983)。<br><br>3. 管理员规划好不同业务团队的DataTester角色和对应角色所需权限细则，根据规划创建好DataTester角色。详情请参见下文的 角色管理 章节。<br><br>4. 管理员将集团用户添加为DataTester用户，并绑定对应DataTester角色，实现对用户的DataTester权限管控。详情请参见下文的 用户管理 章节。 |\n|权限管控要点 |* 关于角色：<br><br>   SaaS\\-非云原生场景下，有两类用户角色：<br><br>   * 集团角色：用于管控用户拥有的集团层面的权限范围（例如是否可访问集团配置页面、是否可访问某个应用等集团层面的权限管控）。系统为您预置了集团管理员、管理员、成员这三类集团角色，您也可以根据实际情况规划集团角色。<br><br>   * DataTester角色：用于管控用户拥有的DataTester产品层面的操作权限范围（例如是否可创建指标、是否可创建实验等DataTester产品层面的权限管控）。<br><br>* 关于用户授权：<br><br>   SaaS\\-非云原生场景下：<br><br>   1. 您需要先将用户添加为集团用户，关联集团角色，实现用户在集团层面的权限管控。<br><br>   2. 再在DataTester用户管理中将集团用户添加为DataTester的用户，关联DataTester的用户角色，实现用户在DataTester产品层面的权限管控。 |\n\n\n<span id=\"fbc9435c\"></span>\n# 前提条件\n\nSaaS\\-非云原生环境中，进行DataTester产品层面的用户管理前，您需要先将用户添加为集团用户并完成集团层面的授权操作，后续才可将集团用户添加为DataTester的产品用户。集团用户和权限管控操作详情请参见：集团管理页面中的[角色管理](https://www.volcengine.com/docs/6287/66985)、[用户管理](https://www.volcengine.com/docs/6287/66983)。\n\n在集团管理页面中添加集团用户时的配置要点如下：\n\n\n1. 添加集团用户。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/7115953ff72a498d87303b575ce92fc2~tplv-goo7wpa0wc-image.image) </span>\n\n   * 如果添加的是同主账号的子账号：需配置为对应**子账号用户名**。\n\n   * 如果添加的是其他主账号时：\n\n      * 添加的是其他主账号：可配置为其他主账号的**账号UID**、**账号用户名**、**账号邮箱**均可。\n\n      * 添加的是其他主账号下的子账号：**子账号用户名**。\n\n2. 完成上述配置后单击“确定”，界面会生成一个邀请用户的URL链接，您需单击链接复制按钮，将邀请链接转发给对应邀请的人员。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/c7d83cae253c41a79d03c6d0247a2b94~tplv-goo7wpa0wc-image.image) </span>\n\n3. 被邀请的账号用户登录火山引擎官网后，单击收到的邀请链接，等候系统进行验证，当完成邀请验证后，被邀请的用户可跳转至DataTester控制台页面，且在集团用户管理页面可看到被邀请的用户信息。\n\n\n完成集团层面的用户添加后，您可参考下文进行DataTester产品层面的用户及权限管控操作。\n\n<span id=\"1f7ce533\"></span>\n# 角色管理\n\n登录并进入DataTester控制台后，单击左侧导航栏 系统管理 \\> 权限管理，进入权限管理页面后，单击顶部“角色管理”页签，即可进入DataTester的角色管理页面。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/0570bbe95951483582806e735d731463~tplv-goo7wpa0wc-image.image) </span>\n\n\n* DataTester为您提供了部分预置角色，您可了解预置角色的权限范围，管理员也可对各预置角色进行权限管控范围进行修改。\n\n* 如果预置角色不足以满足您当前业务场景下的权限管控诉求，您也可以添加自定义角色，并灵活设置自定义角色的权限管控范围，后续对用户授权时绑定对应的自定义角色即可。\n\n\n<span id=\"931ff3ab\"></span>\n## 预置角色\n\n系统默认提供了4个角色，管理员可以根据业务需要，修改系统默认角色的权限范围，或增加新的角色\n\n\n|角色名称 |角色描述 |\n|---|---|\n|管理员 |可以对产品成员、角色进行管理 |\n|安全员 |可以关闭所有实验，一般用于当实验影响用户正常使用时，紧急暂停实验。 |\n|实验人员 |可以创建实验、查看实验详情、实验报告等。一般推荐需要涉及开实验、修改实验信息的同学申请。 |\n|分析人员 |对于产品下实验拥有只读权限，可以编辑测试用户，无法创建实验。一般用于实验分析、实验功能验收测试等场景。 |\n\n\n<span id=\"43a3628c\"></span>\n## 添加自定义角色\n\n\n* 管理员可以根据业务需要，添加新的角色。\n\n* 每个角色都可以是指不同的功能权限，管理员可以根据实际场景，设置不同的功能组合。\n\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/700878e1a60d4443bb23e2a73e27da9b~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"d1f2351d\"></span>\n# 用户管理：SaaS\\-非云原生\n\n<span id=\"a27c3341\"></span>\n## 添加用户\n\n\n1. 在用户管理页面单击“添加用户”，在弹窗中选择待添加的集团用户，并配置关联的角色。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/f6c6360aa37c49de823e18e7ffa816d2~tplv-goo7wpa0wc-image.image) </span>\n\n2. 完成上述配置后单击“确定”完成授权，在用户管理页面即可看到批量添加的用户信息。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/23196b920323484f9192cffa679e0c60~tplv-goo7wpa0wc-image.image) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。

</script>

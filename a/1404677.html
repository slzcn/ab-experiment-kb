<script>window.DATA_BASE="../";window.INIT_DOC=1404677;window.INIT_MD="个性化是指根据用户的行为、兴趣、地理位置等信息，**为用户提供个性化的内容和体验**，以提高用户满意度和转化率。DataTester支持创建个性化实验，本文为您介绍创建编程个性化实验的操作步骤。\n\n<span id=\"955091b6\"></span>\n# 使用限制\n\n当前所有SaaS用户可免费试用，后续个性化功能会升级为旗舰版功能。\n\n\n* 版本要求：SaaS用户：目前灰度上线，如果您希望使用编程个性化实验，可联系A/B测试技术支持人员，申请白名单试用。\n\n* 实验类型：服务端/客户端\n\n\n<span id=\"2c96cc50\"></span>\n# 创建个性化实验\n\n<span id=\"504bd871\"></span>\n## 准备工作\n\n与普通A/B实验类似，创建个性化实验前，请先完成以下准备工作：\n\n\n* 根据实验需求完成数据接入操作。\n\n* 根据实验规划，明确实验指标，建议提前创建好实验指标。\n\n\n<span id=\"c7c41fb0\"></span>\n## step1：进入个性化实验页面\n\n登录并进入A/B测试控制台后，在页面左侧导航栏选择**个性化**\\>**编程个性化**，进入**编程个性化列表**后单击右上角的\\*\\*+编程个性化\\*\\*按钮，进入创建页面。\n\n<span id=\"2887a81c\"></span>\n## step2：配置个性化实验参数\n\n\n1. 配置个性化实验的基础信息。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/fd7b9001dfbc4ebfbfc9aef230d0a3a3~tplv-goo7wpa0wc-image.image) </span>\n\n   \n   |配置项 |配置说明 |\n   |---|---|\n   |**个性化名称** |建议与个性化内容相关的名称，比如：版本号+内容。便于让其他相关人员能够快速了解到此个性化实验是做什么的、是在哪个迭代版本的。 |\n   |**类型** |支持选择**服务端**或**客户端**实验类型。 |\n   |**负责人** |默认为个性化实验创建人。 |\n   \n\n2. 配置个性化策略。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/d3141e0ce9034595bdc13b5367795ca6~tplv-goo7wpa0wc-image.image) </span>\n\n   \n   |配置项 |配置说明 |\n   |---|---|\n   |流量层 |* 选择编程个性化实验的流量层，默认自动创建一个新的流量层。<br><br>* 您也可以选择**手动选择**，在已创建的流量层中选择一个流量层。 |\n   |流量层流量 |配置编程个性化实验需要预留的流量层的流量占比。预留流量是指应该看到您的原始页面的用户百分比，至少 5%。 |\n   |对照流量比例 |对照流量用来做个性化全局对照组，可呈现全局对照指标。<br><br>实际对照流量=流量层流量 \\* 对照流量比例 |\n   \n\n3. 添加个性化观测指标。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/23fcb9898a0c4ff793dc6e9886b47dc3~tplv-goo7wpa0wc-image.image) </span>\n\n   * 支持在指标列表中勾选添加观测指标。\n\n   * 如果指标选择的下拉框中没有实验所需的指标，可单击右上方的新建指标，跳转到创建指标页面进行创建；对已选的指标也可单击指标后的链接按钮，跳转指标组详情页面查看详情。\n\n4. 单击**保存**，进入实验构建器页面，可继续后续创建个性化实验的操作步骤。\n\n\n<span id=\"97993c55\"></span>\n## step3：创建实验策略\n\n支持为编程个性化实验创建多个实验策略，操作步骤类似，以下以创建一个实验策略为例，为您介绍详细的操作步骤。\n\n\n1. 在个性化画布页签中，单击画布中的添加实验策略。\n\n\n创建第一个实验\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/46aa0179337c477dbb8cc4622b9a0b90~tplv-goo7wpa0wc-image.image) </span>\n\n创建多个实验\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/fb2f64a2d3d64abda45706117699e5dd~tplv-goo7wpa0wc-image.image) </span>\n\n\n2. 配置实验的基础信息参数。\n\n   \n   |配置项 |配置说明 |\n   |---|---|\n   |**名称**&**描述** |建议与实验内容相关的名称，比如：版本号+内容。 |\n   |**时长** |默认是7天，自定义有效期最高设置365天。您也可以根据需要选择是否设置为长期有效。 |\n   \n\n3. 配置实验生效策略。\n\n   只有满足此受众规则的用户才能看到实验。 如果不提供条件，此实验将展示给所有访问您网站的用户。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/fc9efab658ac41ff8c3c10baa729b7ac~tplv-goo7wpa0wc-image.image) </span>\n\n   * 添加且条件、或条件：可以通过筛选**用户属性**（客户端）或\\*\\*服务端过滤参数（服务端）\\*\\*来控制参与个性化实验的用户。\n\n   * 添加分群（客户端支持）：可以通过筛选**用户分群**的方式来控制参与个性化实验的用户。\n\n4. 配置个性化实验的实验版本信息。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/da213bf9240b4fe387ec4e6c5bf0b78c~tplv-goo7wpa0wc-image.image) </span>\n\n   1. 您可根据实际实验需要，选择个性化实验的版本是多实验版本，还是单一版本。\n\n      * 多实验版本：默认为多实验版本，可通过单击下方的\\*\\*+添加实验版本\\*\\*按钮来添加多个实验版本。\n\n      * 单一版本：仅一个实验版本。\n\n   2. 在各个实验版本页面配置对应的版本类型、实验版本的版本参数。\n\n      \n      |配置项 |配置说明 |\n      |---|---|\n      |**版本名称**&**描述** |设置用于快速标识实验版本和对照版本的版本名称和描述，比如：版本号+内容。 |\n      |**测试用户** |添加后续进行实验调试的测试白名单用户，支持：<br><br><br>* 手动输入白名单用户的ssid，支持输入多个，通过逗号隔开。<br><br>* 也可选择已创建的白名单组，支持多选。 |\n      |**参数配置** |为各个实验版本添加实验参数。 |\n      |**流量分配** |配置对照组、实验组的用户流量分配，支持均匀分配，或关闭均匀分配开关后手动调整流量分配比例。 |\n      \n\n5. 单击**创建并进入调试**，返回编程个性化实验画布页面。\n\n   已添加的白名单用户可查看对应版本的页面情况，确认子实验的配置是否符合预期。如果符合预期，您可根据规划正式开启个性化实验。\n\n\n<span id=\"a6582b4f\"></span>\n# 开启/结束个性化实验\n\n已调试符合预期的个性化实验，您可按需开始实验，开始后也可以根据实验情况停止对应的个性化实验。\n\n\n* 您可以在实验列表页面，开始/停止对应的个性化实验。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/a5849bf13373467890c8075de2a002d1~tplv-goo7wpa0wc-image.image) </span>\n\n* 您也可以进入个性化实验的实验构建器，在这里您可以开启/停止整个个性实验，或仅开启/停止其中某个子实验。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/0e1950d955f94ffa90589d8df347f925~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"db1668f6\"></span>\n# 查看个性化实验报告\n\n实验开始后，您可以进入个性化实验的报告页面，查看个性化实验的指标结果等信息，结合个性化实验报告进行业务调整。\n\n<span id=\"fa6a212c\"></span>\n## 报告概览\n\n个性化更关注的是绝对最优解，也就是整体个性化整体最优解。个性化概览在核心指标中收益是最重要。\n\n\n* 选中个性化时，报告展示：\n\n   （1）总体概览\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/8915635a0fa7454e8ba15d0083fe7625~tplv-goo7wpa0wc-image.image) </span>\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/58e98fbef5c44e2680d0f9b128a9febb~tplv-goo7wpa0wc-image.image) </span>\n\n   （2）实验趋势\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/8955dfd6055447aa82a75f5504f0bf7b~tplv-goo7wpa0wc-image.image) </span>\n\n* 切换到实验时展示：\n\n   （1）个性化实验数据概览\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/e1620e40f3704359bff85e6bb7cca384~tplv-goo7wpa0wc-image.image) </span>\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/87b761c44a674b1fa13b4dc8b53b5b7c~tplv-goo7wpa0wc-image.image) </span>\n\n   （2）实验趋势\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/d6425964144e45ccbbe221af8be406b5~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"2ed67b8f\"></span>\n## 日期筛选\n\n支持天级别，范围：个性化开始日期 到 T\\-1。举个例子：个性化在20240613开启了个性化，如果我们在20240621查询，可选范围是：20240613 \\- 20240620。\n\n<div style=\"text-align: center\">\n<img src=\"https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/66e3df7a482c44bf9b1af13f9325e323~tplv-goo7wpa0wc-image.image\" width=\"464px\" /></div>\n\n\n<span id=\"a47d868c\"></span>\n# 参考：集成注意事项\n\n由于个性化编程实验本与父子实验的实现逻辑类似，个性化实验配置完成后：\n\n\n* 在个性化实验的使用总体概览页面中，实际查询的是类似“父实验”的进组数据。\n\n* 在获取画布实验的配置页面中，实际上获取的是类似“子实验”的配置信息，而非“父实验”的配置信息。\n\n\n因此，对于个性化实验，您需要在集成SDK时手动获取一下“父实验”的配置信息，用于在SDK集成时配置使用。\n\n\n1. 在如下页面中获取“父实验”的variantKey。\n\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/f70f6233179440d4b3d49aa9bdc133b8~tplv-goo7wpa0wc-image.image) </span>\n\n\n2. 在实验SDK集成时，获取“子实验”（即画布中的实验）配置前，先获取一次上面查到的配置信息，用于曝光父实验。\n\n   以Java SDK为例，仅调用一次`activate`方法，参数的`variantKey`为上面获取的`key`，不需要对其结果做处理，详细操作请参见：[Java SDK](https://www.volcengine.com/docs/6287/195562)。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

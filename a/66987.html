<script>window.DATA_BASE="../";window.INIT_DOC=66987;window.INIT_MD="<span id=\"一-权限维度\"></span>\n# 一. 权限维度\n\n权限的构成，包括三个维度：\n\n\n1. 身份：决定了用户在火山引擎增长营销套件产品中的合法使用深度，比如是否可以禁用事件、是否可以看到全部看板等；\n\n2. 应用：决定了用户可以对集团下哪些已接入的应用进行查看和操作；\n\n3. 功能：决定了用户可以使用火山引擎增长营销套件产品中的哪些功能。\n\n\n<span id=\"二-角色\"></span>\n# 二. 角色\n\n\n* 角色是赋予用户权限的基本单位，角色由身份、开放的应用、开放的产品三个要素构成，如下图：\n\n\n<span>![图片](https://p9-volceps.byteimg.com/tos-cn-i-0000/1218b0af6a6345288900741e55447df2~tplv-noop.image?width=911&height=383) </span>\n\n\n* 默认角色有三个：集团管理员、管理员、成员\n\n   * 管理员和成员，可对开放的应用以及开放的产品进行修改，其它不可修改；\n\n   * 一个用户可以同时具备多个角色。\n\n\n<span>![图片](https://p9-volceps.byteimg.com/tos-cn-i-0000/a2648d50d1d24fa4a4b7b25bfa27e65c~tplv-noop.image?width=924&height=225) </span>\n\n\n* 在集团中，有对应权限的用户可以对角色进行增加、删除、修改；\n\n   <span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/3ac02c9b675d4dc2af0401320cfb67a0~tplv-em5hxbkur4-noop.image?width=1651&height=313) </span>\n\n   * 点击具体的“用户数 蓝色数字”或者“编辑”按钮，可进入编辑角色界面；\n\n      <span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/f37b2a99762642c99b26f1452a2489a4~tplv-em5hxbkur4-noop.image?width=1390&height=632) </span>\n\n   * 点击“添加新角色”，可进入创建角色界面。\n\n      <span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/982e76857c054240a157973a19326ee0~tplv-em5hxbkur4-noop.image?width=1394&height=607) </span>\n\n* 温馨提示：\n\n   * 对于没有权限的功能，在对应产品的顶部导航栏和左侧导航栏会隐藏没有权限的功能模块；\n\n   * 分享链接时，如果用户打开的链接对应的功能没有权限，会出现“权限不足”的提示。\n\n\n<span id=\"三-权限集合\"></span>\n# 三. 权限集合\n\n用户的权限集合，指的是在一个集团内，一个用户身上所有角色权限的并集。\n\n\n* 需要注意不同身份的权限关系：\n\n   * “集团管理员权限”  包含  “管理员权限”  包含  “成员权限”\n\n\n示例，如果某集团有以下三个角色：\n\n\n|角色名称 |身份 |开放的应用 |开放的产品 |\n|---|---|---|---|\n|分析师 |管理员 |抖音，火山小视频，图虫web |增长分析 |\n|AB实验RD |管理员 |全部 |增长分析、A/B测试 |\n|头条运营 |成员 |今日头条 |增长分析 |\n\n\n用户A具有分析师和头条运营的角色，则他的权限集合如下：\n\n\n1. 他是增长分析上抖音、火山小视频、图虫web应用的管理员；\n\n2. 他是增长分析上今日头条应用的成员。\n\n\n用户B具有AB实验RD和头条运营的角色，则他的权限集合如下：\n\n\n1. 他是增长分析、A/B测试上全部应用的管理员；\n\n2. 他是游戏增长分析上今日头条、抖音的成员。\n\n\n<span id=\"四-身份-对应功能\"></span>\n# 四. 身份&对应功能\n\n各个身份与其对应的功能使用深度\n\n<span id=\"角色管理权限\"></span>\n## 角色管理权限\n\n\n|身份 |角色管理权限 |\n|---|---|\n|集团管理员 |可以创建新角色；<br><br>可以增删改所有角色，可以给所有角色分配用户。 |\n|管理员 |可以创建新角色；<br><br>可以创建的新角色权限集合必须小于等于他自己的权限集合；<br><br>只能删除和修改自己创建的角色，只可以给自己的角色或自己创建的角色分配用户。 |\n|成员 |/ |\n|备注 |默认角色（角色名称为集团管理员、管理员、成员）不可被删除；<br><br>角色名称为集团管理员不可被编辑；<br><br>新建角色不允许选择集团管理员作为身份。 |\n\n\n<span id=\"用户管理的权限\"></span>\n## 用户管理的权限\n\n\n|身份 |用户管理的权限 |\n|---|---|\n|集团管理员 |可以编辑用户的角色；<br><br>可以新建和管理所有用户的所有角色；<br><br>可以添加和删除集团用户；<br><br>可以在用户管理的右上角设置用户邀请权限；<br><br>可以管理集团所有用户的权限；<br><br>可以增加或删除其他的集团管理员；<br><br>可以修改集团信息。 |\n|管理员 |可以编辑用户的角色；<br><br>只能编辑管理员和成员的角色，<br><br>只能给其他用户赋予自己的角色或自己创建的角色。 |\n|成员 |/ |\n\n\n<span id=\"集团信息修改的权限\"></span>\n## 集团信息修改的权限\n\n\n|身份 |集团信息修改的权限 |\n|---|---|\n|集团管理员 |只有集团管理员可以修改集团信息 |\n|管理员 |/ |\n|成员 |/ |\n\n\n<span id=\"其它\"></span>\n## 其它\n\n\n|身份 |其它 |\n|---|---|\n|集团管理员 |可以接入新应用；<br><br>可以修改集团应用列表的置顶；<br><br>平台上所有已有功能、所有已接入应用均向集团管理员开放。 |\n|管理员 |可以无限制的访问及使用自己权限集合内的各应用&各功能。 |\n|成员 |可以访问及使用自己权限集合内的各产品&各功能，但会受到限制，具体限制要参考功能设计。 |";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

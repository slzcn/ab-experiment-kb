<script>window.DATA_BASE="../";window.INIT_DOC=1392557;window.INIT_MD="DataTester的购买计费方式为包年包月的产品资源包套餐+套餐外用量单独按量计费的方式，本文为您介绍DataTester的计费逻辑。\n\n<span id=\"3b299eff\"></span>\n# 计费项\n\nDataTester为您提供了产品资源包套餐+套餐外用量单独按量计费的两种计费方式，两种计费方式均是以按MAU用户数来定价计费。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">DataTester的MAU定义是在一个自然月内进入A/B测试平台的去重用户数。</div>\n\n\n\n* DataTester为您提供了不同档位的产品资源包套餐，您可以根据业务实际实验流量规模来预估MAU用户数，选择购买合适档位的产品资源包套餐。\n\n* 开通购买产品资源包套餐时，DataTester会同步为您开通按量付费的产品规格，当您在使用DataTester的过程中，MAU用量超出已购资源包上限时，会按超出的MAU量进行按量计费。\n\n\n<span id=\"59cfc508\"></span>\n# 产品规格与计费方式\n\n<span id=\"35f5a90e\"></span>\n## **产品资源包套餐**\n\n产品资源包套餐支持的计费模式为**预付费的方式（先付费后使用）** 。\n\n\n* 产品资源包按年订购，成功订购后生效，有效期为12个月。\n\n* 不同档位资源包在有效期（12个月）内可使用的MAU上限不同，在有效期内，超出资源包总量上限部分会按量计费。\n\n* 每个资源包套餐都会带有一个ABot精调Tokens包，可用于开启模拟实验等。每个精调Tokens包的具体Tokens用量请参考资源包购买页面说明。\n\n\n\n|产品版本 |资源包套餐类型 |计费方式 |计费单元与单价 |\n|---|---|---|---|\n|SaaS\\-标准版 |* 1,200,000 MAU资源包<br><br>* 2,400,000 MAU资源包<br><br>* 3,600,000 MAU资源包<br><br>* …… |预付费 |* 万MAU<br><br>* 不同产品版本的各个套餐类型的单价详情以下单购买页为准。 |\n|SaaS\\-旗舰版 ||||\n|云托管\\-旗舰版 ||||\n\n\n<span id=\"83b4be73\"></span>\n## **套餐外用量**\n\n超出产品套餐外的MAU用量的计费模式为**后付费的方式**。\n\n资源包有效期内，超出资源包可使用总量上限的MAU量，会每天按天进行按量计费，费用从当前账号的余额（含信用额度等）中进行扣除。\n\n\n|产品版本 |计费方式 |计费周期 |计费单元与单价 |\n|---|---|---|---|\n|SaaS\\-标准版 |按量计费，后付费 |按天统计，按自然月结算 |￥800 / 万MAU |\n|SaaS\\-旗舰版 ||按天统计，按自然月结算 |￥1040 / 万MAU |\n|云托管\\-旗舰版 ||按天统计，按自然月结算 |￥750 / 万MAU |\n\n\n<span id=\"bfa32fd2\"></span>\n## Tokens计费说明\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\">Tokens主要用于智能问答、智能实验解读等大模型应用相关功能；当前仅SaaS\\-云原生的华北2（北京）地域支持。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\">您可以购买以下不同用量阶梯的Tokens资源包，超出资源包的Tokens用量时，超出部分以 0.01元/千Tokens 的价格进行计费。</div>\n\n\n\n\n|产品版本 |Tokens用量 |计费方式 |计费单元与单价 |\n|---|---|---|---|\n|SaaS\\-标准版 |* 1亿<br><br>* 10亿<br><br>* 20亿<br><br>* 50亿<br><br>* 100亿<br><br>* 200亿<br><br>* 400亿<br><br>* 600亿 |预付费 |* Token<br><br>* 不同产品版本的各个Tokens用量阶梯的单价详情以下单购买页为准。 |\n|SaaS\\-旗舰版 ||||\n|云托管\\-旗舰版 ||||\n\n\n<span id=\"2b4f016c\"></span>\n## 计费示例\n\n例如，您根据业务用户数预估了下，后续每个月开展A/B测试的用户数范围如下：\n\n\n* 1月 100万\n\n* 2月 300万\n\n* 3月 50万\n\n* ……\n\n\n预估年MAU用量总计约1200万内，且您希望能使用SaaS\\-旗舰版的智能调优等高阶实验能力，此时您即可购买SaaS\\-旗舰版的1200万 MAU资源包。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/adb1f4900a1c49d5ab80ccd24fd932d9~tplv-goo7wpa0wc-image.image) </span>\n\n购买下单后，自成功下单起，资源包有效期为12个月。例如，您成功购买下单的时间为2024年11月5日，则：\n\n\n* 2024年11月5日~2025年11月4日这一年中，每个月的MAU用量累计总量上限是1200万，如果超出了1200万会单独额外按量计费，没有超出则不额外收费。\n\n* 资源包12个月后失效，即在2025年11月4日后资源包过期，不可使用。\n\n* 如果在2024年11月5日~2024年12月5日中，截止至12月3日您的MAU量已使用超过了1200万，12月1日超出了2万用户数，则：\n\n   * 在12月2日会对超出部分进行按量计费，即会额外收取 2 \\* 1040 = 2080 元。\n\n   * 12月3日~12月5日会每日计算超出的用户数并每天单独计费。\n\n\n<span id=\"e3d74652\"></span>\n# 增值服务与功能\n\nDataTester为您提供了多种增值服务：\n\n\n* 专家咨询服务：购买任意套餐可享专家咨询服务。\n\n* 云上开放能力 OpenAPI：丰富的OpenAPI接口。\n\n\n更多增值服务与功能可联系火山引擎技术支持人员进行咨询。\n\n<span id=\"8c75a4a6\"></span>\n# 付费指导与费用账单\n\n如果您希望下单购买DataTester的产品资源包，可参考以下步骤。\n\n\n1. 使用火山引擎账号登录并进入[DataTester产品首页](https://www.volcengine.com/product/datatester)，单击**产品购买**，进入产品购买页面。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/c69642cc24d747d5bdf1c26225420890~tplv-goo7wpa0wc-image.image) </span>\n\n2. 在产品购买页选择不同的产品规格，单击**立即购买**。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/af43ab520cc346c98855204eb476df3f~tplv-goo7wpa0wc-image.image) </span>\n\n3. 在购买页选择对应产品版本的资源包类型，勾选同意各类协议后单击立即购买，根据界面提示完成资源包确认、付费操作，即可完成下单购买。\n\n\n<span id=\"0856cd89\"></span>\n# 用量预警\n\n购买DataTester产品资源包后，后续在资源包有效期内，根据MAU实际用量会为您提供预警通知，您可以在系统设置 \\> 数据概览中查看每天明细的MAU数据。\n\n\n* 实际MAU用量超资源包上限80%、90%时，DataTester系统会通过站内信、邮件、短信方式提醒您MAU用量预警。\n\n* 实际MAU用量超资源包上限时，DataTester系统会通过站内信、邮件、短信、电话方式提醒您MAU用量预警。\n\n\n如果收到用量预警通知后，如果您希望增购资源包的用量上限，可联系火山引擎技术支持人员进行咨询。\n\n<span id=\"1f369e0d\"></span>\n# 产品到期\n\n\n* 到期12小时之后系统会对服务进行关停，期间内若增购资源包可恢复服务。\n\n* 关停超90天，您在火山A/B测试服务中的相关数据将被删除，删除数据无法恢复。\n\n\n<span id=\"dbce3fa5\"></span>\n# 增购（续费）、升降级和退订\n\n<span id=\"d4acf71d\"></span>\n## 增购说明\n\n如果您希望增购资源包的用量上限，可联系火山引擎技术支持人员进行咨询。\n\n<span id=\"4bb5acf2\"></span>\n## 升降级和退订\n\n\n* A/B测试不支持退订，所购资源包服务到期有未使用资源额度的，火山引擎**不支持结转**、继续调用且不支持任何形式退款。\n\n* 资源包有效期内不支持规格的升降级。\n\n\n<span id=\"9df2a7b7\"></span>\n# 账户欠费\n\n当实际MAU用量超资源包上限后，会每天按量进行计费，从您的账户余额（含信用额度等）进行自动扣费，如果您的账户余额不足导致账户欠费，则：\n\n\n* 欠费3小时后会关停DataTester产品。\n\n* 欠费168小时内，如果完成账户余额充值或增够资源包，则可恢复DataTester服务。\n\n* 欠费超168小时，您在A/B测试 DataTester服务中的数据将会被删除，删除的数据无法恢复。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/

</script>

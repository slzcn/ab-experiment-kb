<script>window.DATA_BASE="../";window.INIT_DOC=67628;window.INIT_MD="DataTester为您提供“虚拟事件”功能，您可以对DataTester中的多个一般事件通过一定的逻辑关系组合成虚拟事件，后续通过虚拟事件进行用户行为分析，便于您对于常规复合事件的组合管理、查看。\n\n<span id=\"865febd4\"></span>\n# 应用场景\n\n目前常见场景为：想看一下发生了事件A或者发生了事件B的去重用户数。比如浏览了页面A或者浏览了页面B的去重用户数有多少。\n\n此时就需要用到虚拟事件：表示发生了事件A或者事件B。\n\n<span id=\"二-使用说明\"></span>\n# 使用说明\n\n<span id=\"_1-虚拟事件列表页\"></span>\n## 进入虚拟事件列表页\n\n登录并进入DataTester控制台后，单击左侧导航栏的**数据管理**\\>**元数据管理**\\>**虚拟事件**，进入虚拟事件列表页面。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/6b0027878e0c428e832ea34212077887~tplv-goo7wpa0wc-image.image) </span>\n\n\n* 当点击进入“虚拟事件”页面时，默认要显示所有已创建虚拟事件的列表；\n\n* 对列表可以按“事件名称”、“事件展示名”进行筛选；\n\n\n<span id=\"cf8599e7\"></span>\n## 创建虚拟事件\n\n\n1. 点击页面右上角新建虚拟事件。\n\n2. 在弹出的创建虚拟事件页面，填写相应的信息。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/33f22f7344bc482ca4a5d4cfe2b1fc65~tplv-goo7wpa0wc-image.image) </span>\n\n   \n   |参数 |配置说明 |\n   |---|---|\n   |虚拟事件名称 & 展示名 |自定义虚拟事件的名称和展示名，用于标识虚拟事件，便于后续使用虚拟事件时查找使用。 |\n   |组合一般事件 |选择创建的虚拟事件需要组合的一般事件有哪些。<br><br><br>* 您可基于实际业务分析需要选择对应的一般事件，并支持对各选择的事件配置过滤筛选条件。<br><br>* 选择的多个一般事件之间是or关系，即任意命中一个一般事件则表明符合条件，虚拟事件会被触发。 |\n   \n\n\n<span id=\"d6f710a5\"></span>\n## 使用虚拟事件\n\n在创建指标时，选择指标事件的时候，可点击选择“虚拟事件”类型的事件。以下以创建一个UBA事件指标为例，为您示例虚拟事件的应用。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/1402e00ed9ad431f9037af5bad9ba882~tplv-goo7wpa0wc-image.image) </span>";</script>

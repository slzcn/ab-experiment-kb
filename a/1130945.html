<script>window.DATA_BASE="../";window.INIT_DOC=1130945;window.INIT_MD="DataTester为您提供实验报告功能，当实验启动后，您可在实验列表中进入实验详情和实验报告相关页面，查看报告相关数据指标和结论。本文为您介绍实验报告功能相关页面的功能概况和实验报告相关概念。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">您可以参考<a href=\"https://www.volcengine.com/docs/6287/65838\">如何看懂实验报告</a>了解进行实验报告分析的基本思路与流程，本文通过实验报告功能页面的逻辑为您介绍DataTester的实验报告分析能力。您可结合两篇文档进行学习了解，再进行自己实验报告的分析。</div>\n\n\n<span id=\"d38ff774\"></span>\n# 实验报告功能页面\n\n<span id=\"bded9bfc\"></span>\n## 实验报告页面\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">实验开启当天按实时统计实验进组人数。开启第二天之后会按T\\-1日天级更新，具体口径为截止当天0点的实验累计进组人数。</div>\n\n\n<span id=\"8d848c66\"></span>\n### 总览实验结论\n\nDataTester的实验报告模块，基于假设检验理论针对实验结果对比，提供结论性的推断。实验报告页面除了展示实验的基本结论外，还包含核心指标的具体表现以及对应的天级趋势图、概率分布图和箱型图（盒须快照）。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_de2a871c44dd2d78c139167cc6f5793f.png) </span>\n\n<span id=\"5eed352f\"></span>\n### 下载进组用户ID\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_5c5a8c75b2d157733c1549b5058e1710.png) </span>\n\n\n* 在实验报告页中，点击原有的进组人数可以直接下载所有进组用户ID和对应的分组信息，包含用户id、实验名称、实验分组、过滤条件（如有）信息；\n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">进组用户数的详细口径介绍请参见<a href=\"https://www.volcengine.com/docs/6287/1009098\">实验进组用户口径说明</a>。   </div>\n   \n\n* 最多可以下载500万条数据\n\n\n<span id=\"三-数据指标\"></span>\n## 数据指标页面\n\n您可以在数据指标页面分析查看核心指标、关注指标的数据详情。数据指标类型包含事件指标、留存指标以及漏斗指标三个大类。\n\n\n* 事件指标和留存指标详情请参见：[指标分析：事件指标&留存指标](https://www.volcengine.com/docs/6287/1264721)\n\n* 漏斗指标详见：[指标分析：漏斗指标分析](https://www.volcengine.com/docs/6287/67277)\n\n\n<span id=\"四、高级分析\"></span>\n## 高级分析页面\n\n<span id=\"_4-1-同期群分析\"></span>\n### **同期群分析**\n\n**同期群分析** ：即将用户按初始行为的发生时间进行划分为群组（即 **同期群）** \n\n\n* 对处于同期群的用户进行横向比较，从而得出相似群体随时间的变化，观察策略对用户整个生命周期的影响；\n\n* 对不同的同期群纵向比较，可以从总体上看到，应用的表现是否越来越好了，从而验证产品改进是否取得了效果。\n\n\n详见：[高级分析：同期群分析](https://www.volcengine.com/docs/6287/66825)\n\n<span id=\"_4-2-差异分析\"></span>\n### 差异分析与群体对比\n\n在做完实验后，实验结果是针对所有实验的受众人群的，可以通过数据得到相应策略有正向效果/负向效果的结论。但是一个策略对于面向全部用户的正向/负向结论，并不等同于面对细分用户也有相同的结论。这时可以使用群体对比+差异分析，得到针对某一细分人群，实验策略为正向/负向的结论。\n\n详见：[高级分析：差异分析与群体对比](https://www.volcengine.com/docs/6287/104940)\n\n<span id=\"e7c66a52\"></span>\n# 相关概念\n\n<span id=\"a23e7dca\"></span>\n## 实验报告指标概念汇总\n\n\n|术语 |概念含义 |对实验结果的影响 |\n|---|---|---|\n|**进组人数** |该实验版本进组人数（即参与实验的用户数量）。进组用户数据为**次日T+1数据**，即1号的进组用户数据将在2号展示在报告概览中，进组用户数的详细口径说明详情请参见[实验进组用户口径说明](https://www.volcengine.com/docs/6287/1009098)。 |1. **统计显著性**：统计显著性是指实验结果的可信度，即结果不是由于随机误差或样本偏差造成的。足够大的样本量有助于确保实验结果具有统计显著性，使得我们可以更加自信地断言观察到的效果是真实的，而不是随机波动导致的。<br><br>   您可以在实验报告页面的顶部看到实验结果是否显著；在实验指标数据处也可以看到指标数据是否显著。<br><br>2. **实验统计功效**：实验统计功效（或检验效能）是指检测到实际效果的能力，即实验能否准确识别出两个版本之间的真实差异。更大的样本量通常意味着更高的实验功效，使得实验更有可能发现存在的差异。<br><br>3. **结果的可靠性和稳定性**：可靠性和稳定性是指实验结果在重复实验中的一致性。较大的样本量能够减少结果的波动，使实验结果更加可靠和稳定。<br><br>4. **效应大小的精确估计**：效应大小是指两个实验版本之间的实际差异大小。较大的样本量可以提高效应大小估计的精确度，使得我们对实验版本的真实表现有更清晰的了解。 |\n|**绝对数值** |指的是实验组或对照组中某个关键指标的具体数值，例如转化率、点击率、平均交易额等。 |绝对取值直接展示了在实验条件下该指标的表现水平，但并不直接反映实验处理效果的大小或方向，也不体现与另一组相比的变化情况。 |\n|**差异绝对值/差异相对值** |* 差异绝对值：当前实验版本相对基准版本（对照版本）的绝对差异。<br><br>* 差异相对值：当前实验版本相对基准版本（对照版本）的绝对差异/基准版本值。<br><br><br>例如，如果实验组的转化率为10%，对照组为8%，那么差异绝对值为2%；差异相对值计算为(10% \\- 8%) / 8% = 25%。 |* 差异绝对值：直观展示了两组之间在该指标上的具体差距，但没有考虑到基数的影响，即它不反映这一差距相对于整体水平的比例大小。<br><br>* 差异相对值：这种表示方式能够更好地帮助理解变化的相对重要性，尤其是在比较不同规模或基础水平的实验时。 |\n|**置信区间/P\\-value** |* 置信区间：由样本统计量构成的总体参数的估计区间。<br><br>   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div><br>   <br><br>   <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">我们AB实验的置信区间的计算逻辑可参见<a href=\"https://en.wikipedia.org/wiki/Welch%27s_t-test\">双样本置信区间计算说明</a>（此参考文档为wiki说明，如果您无法正常打开，可查看其他通用的双样本检验的介绍材料，例如：<a href=\"https://zhuanlan.zhihu.com/p/616802259\">点此跳转至其他参考页面</a>）。   </div><br>   <br><br>* P\\-value：在原假设为真的前提下随机抽取样本出现极端情况的概率。当p\\-value<1\\-置信度水平，认为统计显著。<br><br>   习惯上，当p_value小于5%时，就是我们常说的实验效果已经“ **统计显著** ”，它意味着你观测到的差异来源于随机抽样误差的概率已经小于5%，反过来说，你的策略大概率（大于95%）是有效的。P\\-value越小说明实验发现的差异是因为抽样误差导致的概率越小，极大程度上还是由于本质上存在差异造成。<br><br><br>总结而言，置信区间提供了一个区间范围，直观展示了估计的不确定性；而P\\-Value是一个单一的概率值，用于检验假设。两者都可以作为判断实验结果是否显著的依据，但置信区间提供了更多关于效应大小和方向的信息，而P\\-Value仅表明结果的意外程度。 ||\n|**MDE** |Minimum Detectable Effect最小可检测单位（检验灵敏度），在当前条件下能有效检出置信度的diff幅度。<br><br><div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div><br><br><br><div data-tips=\"true\" data-tips-type=\"tip\">通常实验指标为提升/降低xx（某个业务指标值），那MDE建议以小于这个指标值来进行估算，尽量避免MDE取值较大，无法检测出真实的实验结果。更多MDE的介绍请参见<a href=\"https://www.volcengine.com/docs/6287/65799\">基本概念</a>中的<strong>校验灵敏度MDE</strong>部分。</div><br> |MDE对于实验结果不显著和预估实验流量方面有影响：<br><br><br>* 对于已经显著的指标，无需关注MDE。如果实验指标无显著差异，可能是因为实际效应小于MDE，而不是实验失败。<br><br>   灵敏度会随实验的样本量增加、运行时长增长而越来越灵敏（灵敏度数值越来越小）。理论上，只要你的A/B实验跑的时间足够长，样本足够多，实验总会显著的。<br><br>* 您可以指定自己需要的灵敏度，A/B测试可以推算出实验需要多少流量。使用这一功能的操作也很简单。在新建实验第四步\\-“设置目标受众”时，在“流量分配”的步骤中，可以点击“算一算开多少流量合适？”，进入到[实验流量建议工具](https://www.volcengine.com/docs/6287/65814)，输入相关信息后，A/B测试就可以轻松计算出，实验总共需要多少流量。 |\n\n\n<span id=\"五-置信度和置信区间\"></span>\n## 置信度和置信区间详解\n\n<span id=\"_5-1-概念解读\"></span>\n### 概念解读\n\n**置信度**\n\n\n* 置信度（也称置信水平、置信系数、统计显著性），指实验组与对照组之间存在真正性能差异的概率，实验组和对照组之间衡量目标（即配置的指标）的差异不是因为随机而引起的概率。置信度使我们能够理解结果什么时候是正确的，对于大多数企业而言，一般来说，置信度高于95％都可以理解为实验结果是正确的。因此，默认情况下，「A/B测试」将置信水平参数值设置为95%。\n\n* 在A/B实验中，由于我们只能抽取流量做小样本实验。样本流量的分布与总体流量不会完全一致，这就导致没有一个实验结果可以100%准确——即使数据涨了，也可能仅仅由抽样误差造成，跟我们采取的策略无关。在统计学中，置信度的存在就是为了描述实验结果的可信度。\n\n\n在实验的过程中，我们所抽取的样本流量实际上与总体流量会存在些许的差异，这些差异就决定了我们通过实验得出的结论或多或少会存在一些“误差”。\n\n> 举个例子，实验中，我通过改变落地页的颜色让购买率提升了3%，但是因为样本流量并不能完全代表总体流量，有可能“我改变颜色这一策略其实没用，购买率提升3%是抽样结果导致的”。 那么发生这种“我的策略其实没用”事件的概率有多大呢？在统计学中，我们会用“显著性水平(α)”来描述发生这一事件的概率是多少。而置信度=1\\-α。 在「A/B测试」平台上，根据业界标准，显著性水平α取0.05。在A/B实验中，如果发生“我的策略其实没用”这一事件的概率小于0.05，我们即称实验结论已经“统计显著/可置信”。这意味着你采取的新策略大概率（A/B实验中意味着大于95%）是有效的。相反，如果这一事件的概率大于0.05，则称实验结论“不显著/不可置信”。\n\n\n「A/B测试」主要采用假设检验来计算指标的置信度，实际上，要验证的是一对相互对立的假设：原假设和备择假设。\n\n> 原假设（null hypothesis）：是实验者想要收集证据予以反对的假设。A/B实验中的原假设就是指“新策略没有效果”。 备择假设（alternative hypothesis）：是实验者想要收集证据予以支持的假设，与原假设互斥。A/B实验中的备择假设就是指“新策略有效果”。\n\n\n利用反证法来检验假设，意味着我们要利用现有的数据，通过一系列方法证明原假设是错误的（伪），并借此证明备择假设是正确的（真）。这一套方法在统计学上被称作原假设显著性检验。\n\n**置信区间**\n\n主要通过某个指标或留存的实验版本均值变化值以及置信区间来判断，在当前指标或用户留存上，实验版本是否比对照版本表现得更好。\n\n\n* 如果在95%置信度下，置信区间同为正或者同为负，说明实验结果是统计显著的。\n\n* 如果在95%置信度下，置信区间为一正一负，说明实验结果是非统计显著的。\n\n\n<span id=\"_5-2-示例\"></span>\n### 示例\n\n**统计正向显著**\n\n如下图所示，表明实验版本样本均值对比对照版本的变化率为+46.822%。在95%置信度下，置信区间为[46.589%，47.055%]，统计显著正向，说明当前的样本容量条件下已经检测出实验版本优于对照版本。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_c25ccc9f9d5c6c21c86ba89767d9d044.png) </span>\n\n**统计负向显著**\n\n如下图所示，表明实验版本样本均值对比对照版本的变化率为\\-26.553%。在95%置信度下，置信区间为[\\-26.786%，\\-26.320%]，统计显著负向，说明当前的样本容量条件下已经检测出实验版本在核心指标上劣于对照版本。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_a93642ade79e854e62ad921f91af008c.png) </span>\n\n**不显著**\n\n如下图所示，表明实验版本样本均值对比对照版本的变化率为\\-0.941%。在95%置信度下，置信区间为[\\-3.552%，1.670%]，置信区间一负一正，实验结果是非统计显著的。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_97948efaa67bf9f9604c523344d0adeb.png) </span>";</script>

<!-- 写文章编辑器 -->
<div class="editor-mask" id="editorMask"></div>
<div class="editor" id="editor">
  <div class="ed-head">
    <b>✍ 写新文章</b>
    <span class="ed-close" id="edClose">✕</span>
  </div>
  <div class="ed-body">
    <div class="ed-form">
      <label>标题</label>
      <input id="edTitle" placeholder="例如：双十一大促实验复盘">
      <label>分类</label>
      <select id="edCat"></select>
      <label>检索关键词（选填，空格分隔）</label>
      <input id="edKw" placeholder="复盘 大促 转化率">
      <label>正文（Markdown）</label>
      <textarea id="edMd" placeholder="# 标题&#10;&#10;正文用 Markdown 书写，支持 **加粗**、列表、表格、代码块…&#10;&#10;## 小节&#10;- 要点一&#10;- 要点二"></textarea>
      <div class="ed-actions">
        <button class="ed-btn" id="edSubmit" style="display:none">✓ 发布文章</button>
      </div>
      <div class="ed-hint" id="edHint"></div>
    </div>
    <div class="ed-preview" id="edPrev">
      <div class="ed-prev-tag" id="edPrevTag"></div>
      <h1 id="edPrevTitle" style="margin:8px 0 16px"></h1>
      <div class="md" id="edPrevBody"></div>
    </div>
  </div>
</div>

<!-- 顶部悬浮 toast：发布结果等提示走全站统一规范 -->
<div id="toast"></div>

<script src="../app.js?v=b6e50403"></script>
</body>
</html>

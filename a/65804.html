<script>window.DATA_BASE="../";window.INIT_DOC=65804;window.INIT_MD="<span id=\"ce298622\"></span>\n# 支持的小程序\n\n当前主流小程序均可参考本文进行SDK集成，接入并上报对应小程序的数据，主要包括：\n\n\n* 微信小程序\n\n* 支付宝小程序\n\n* 百度小程序\n\n* 京东小程序\n\n* QQ小程序\n\n* 钉钉小程序\n\n* 小红书小程序\n\n* 字节跳动小程序\n\n* We码小程序\n\n\n各类小程序的数据接入操作基本一致，后续以微信小程序为例为您介绍小程序的数据集成操作指导，如果各类小程序平台的操作有差异的地方，会在对应文档中标注出来。\n\n<span id=\"_1-集成\"></span>\n# 1. 集成SDK\n\n<span id=\"_1-1-安装sdk\"></span>\n## **1.1 安装SDK**\n\n> 使用npm方式安装\n\n\n```plain\nnpm install @datarangers/sdk-mp\n```\n\n\n<span id=\"_1-2-域名配置准备\"></span>\n## **1.2 域名配置准备**\n\n<span id=\"1c49c41e\"></span>\n## 1.2 获取上报地址并配置小程序白名单\n\n进行数据接入上报时，您需要根据当前的环境类型和端类型确认您的数据上报地址，将数据上报地址添加到小程序后台的“request合法域名”中，如果上报地址设置错误，后续会导致您无法正常上报、查询到数据。\n\n<span id=\"2288ef09\"></span>\n### 获取数据上报地址\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">请在上报数据前，务必确认您当前使用的环境类型，根据环境类型配置上报地址。查看当前的环境类型请参见<a href=\"https://www.volcengine.com/docs/6287/1544686\">SaaS云原生/非云原生&私有化环境</a>。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">如果您使用的是SaaS\\-云原生环境，您也需确认您的服务所在的地域，根据所在地域配置上报地址（通常您的服务会在华北2\\-北京地域，部分用户可能会使用其他地域）。SaaS\\-云原生用户查看服务所在地域请参见<a href=\"https://www.volcengine.com/docs/6287/1544685\">支持的地域</a>。</div>\n\n\n\n<span id=\"e83eb14d\"></span>\n#### SaaS\\-云原生 & SaaS\\-非云原生\n\n\n|地址类型 |SaaS\\-云原生环境<br><br>（国内：华北2\\-北京） |SaaS\\-云原生<br><br>（海外：亚太东南\\-柔佛） |SaaS\\-非云原生环境 国内环境 |SaaS\\-非云原生 海外BytePlus环境<br><br>（以下 SG 指新加坡） |\n|---|---|---|---|---|\n|数据上报地址 |* SaaS\\-云原生（华北）：https://gator.volces.com<br><br>* 需在小程序中添加对应上报地址至小程序的白名单中 |* https://gator.uba.ap\\-southeast\\-1.volces.com<br><br>* 需在小程序中添加白名单：https://gator.uba.ap\\-southeast\\-1.volces.com |* `channel: 'cn'`<br><br>* 需在小程序中添加白名单：https://mcs.volceapplog.com |* `channel: 'sg'`<br><br>* 需在小程序中添加白名单：https://mcs.tobsnssdk.com |\n|分流地址 |* https://tab.volces.com<br><br>* 需在小程序中添加对应地址至小程序的白名单中 |* https://tab.ab.ap\\-southeast\\-1.volces.com<br><br>* 需在小程序中添加对应地址至小程序的白名单中 |无需手动配置 |无需手动配置 |\n\n\n<span id=\"4b732416\"></span>\n#### 私有化环境\n\n私有化部署场景下，您需要获取部署私有化环境时，自行规划配置的数据上送地址，将私有化部署的数据上报域名添加到小程序后台的“request合法域名”中。如您不清楚此地址，请联系您的项目经理或客户成功经理。\n\n<span id=\"1a59aa63\"></span>\n### 配置小程序白名单\n\n在 「小程序后台\\-开发\\-开发设置\\-服务器域名」 中进行配置，具体可以参考小程序相应的官方文档，如 [微信小程序文档](https://developers.weixin.qq.com/miniprogram/dev/framework/ability/network.html)。\n\n，各环境各地域的上送地址请参见上文的 获取数据上送地址 章节。\n\n<span id=\"_1-3-老版本升级\"></span>\n## **1.3 老版本升级**\n\n请注意，如果是SaaS\\-非云原生业务，升级SDK到最新版（2.x.x版本）时，需要补充将[https://mcs.volceapplog.com](https://mcs.volceapplog.com)和[https://abtest.volceapplog.com](https://abtest.volceapplog.com)添加到小程序后台的“request合法域名”中，已添加过[https://mcs.ctobsnssdk.com](https://mcs.ctobsnssdk.com)和[https://toblog.ctobsnssdk.com](https://toblog.ctobsnssdk.com)不要立即移除。\n\n<span id=\"_1-4-旧版本说明\"></span>\n## **1.4 旧版本说明**\n\n如果集成旧版本SDK(2.0以下版本)，需要将[https://mcs.ctobsnssdk.com](https://mcs.ctobsnssdk.com)和[https://toblog.ctobsnssdk.com](https://toblog.ctobsnssdk.com) 添加到微信开放平台的请求白名单中。\n\n<span id=\"_2-初始化\"></span>\n# 2. 初始化\n\n<span id=\"_2-1-获取appid\"></span>\n## **2.1 获取appid**\n\n在开始集成前，首先需要在集团中拥有一个应用，请参考：[如何创建应用](https://www.volcengine.com/docs/6287/66984)。\n\n\n* SaaS\\-云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/de1df7b557de438893f3013583ee3cfb~tplv-goo7wpa0wc-image.image) </span>\n\n* SaaS\\-非云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/11d05eafc702439cb7bdd70059dc8bad~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"_2-2-初始化sdk示例\"></span>\n## **2.2 初始化SDK**\n\n<span id=\"_2-2-1-saas业务\"></span>\n### **2.2.1 SaaS\\-云原生**\n\n```javascript\n// 在入口页面初始化SDK\n// app.js\nimport $$Rangers from '@datarangers/sdk-mp';\n$$Rangers.init({\n    app_id: 0000, // 替换成申请的app_id，参考2.1节获取，注意类型是number而非字符串\n    channel_domain: \"https://****.****.com\", // 设置数据上送域名，各环境各地域的上送地址请参见上文的 获取数据上送地址 章节。\n    log: true, // 开启后会控制台会打印日志，开发阶段有助于查看埋点上报过程\n    auto_report: true, // 开启后会上报一些预定义事件，如app_launch、app_terminate等\n    enable_ab_test: true, // 开启ab实验\n    ab_channel_domain: \"https://***.****.com\", // 分流请求域名\n});\n$$Rangers.config({\n    mp_name: 'xyz小程序', // 一些预定义属性，可以通过config进行设置mp_version: '1.1.1',\n    mp_version: '1.1.1',\n});\n$$Rangers.send();\n\nApp({\n    onLaunch: function () {\n        this.$$Rangers = $$Rangers;\n    \n        // 如果想设置用户标识，比如想使用open_id来标识用户，可以在获取到open_id后把值设置给user_unique_id\n        this.$$Rangers.config({\n            user_unique_id: '获取到的open_id', //可以是open_id，也可以union_id等其他业务觉的可以用来标识用户唯一性的值\n        });\n        // 调用event方法上报具体事件\n        this.$$Rangers.event('test_event', {\n            from: 'launch', // 支持任意属性，值支持数字、字符串等\n        });\n    }\n});\n\n// 其他页面上报事件，如：\n// pages/index/index.js\nPage({\n    onLoad() {\n        getApp().$$Rangers.event('bind_view_tap', {\n            'title': 'chart',\n        });\n    }\n});\n```\n\n\n<span id=\"_2-2-2-私有化业务\"></span>\n### **2.2.2 SaaS\\-非云原生**\n\n```JavaScript\n// 在入口页面初始化SDK\n// app.js\nimport $$Rangers from '@datarangers/sdk-mp';\n\n$$Rangers.init({\n    app_id: 0000, // 替换成申请的app_id，参考2.1节获取，注意类型是number而非字符串\n    log: true, // 开启后会控制台会打印日志，开发阶段有助于查看埋点上报过程\n    auto_report: true, // 开启后会上报一些预定义事件，如app_launch、app_terminate等\n    enable_ab_test: true, // 开启ab实验\n});\n$$Rangers.config({\n    mp_name: 'xyz小程序', // 一些预定义属性，可以通过config进行设置\n    mp_version: '1.1.1',\n});\n$$Rangers.send();\n\nApp({\n    onLaunch: function () {\n        this.$$Rangers = $$Rangers;\n    \n        // 如果想设置用户标识，比如想使用open_id来标识用户，可以在获取到open_id后把值设置给user_unique_id\n        this.$$Rangers.config({\n            user_unique_id: '获取到的open_id', //可以是open_id，也可以union_id等其他业务觉的可以用来标识用户唯一性的值\n        });\n\n        // 调用event方法上报具体事件\n        this.$$Rangers.event('test_event', {\n            from: 'launch', // 支持任意属性，值支持数字、字符串等\n        });\n    }\n});\n\n// 其他页面上报事件，如：\n// pages/index/index.js\nPage({\n    onLoad() {\n        getApp().$$Rangers.event('bind_view_tap', {\n            'title': 'chart',\n        });\n    }\n});\n```\n\n\n<span id=\"36a6138e\"></span>\n### 2.2.3 私有化\n\n私有化业务需要明确设置数据上报域名，如您不清楚此域名，请联系您的项目经理或客户成功经理。\n\n```javascript\n// 在入口页面初始化SDK\n// app.js\nimport $$Rangers from '@datarangers/sdk-mp';\n$$Rangers.init({\n    app_id: 0000, // 替换成申请的app_id，参考2.1节获取，注意类型是number而非字符串\n    channel_domain: \"{{DOMAIN}}\", // 设置私有化部署数据上送域名，如您不清楚此地址，请联系您的项目经理或客户成功经理\n    log: true, // 开启后会控制台会打印日志，开发阶段有助于查看埋点上报过程\n    auto_report: true, // 开启后会上报一些预定义事件，如app_launch、app_terminate等\n    enable_ab_test: true, // 开启ab实验\n    ab_channel_domain: \"{{ABTEST_DOMAIN}}\", // 设置ab分流接口域名，默认为channel_domain的设置\n});\n$$Rangers.config({\n    mp_name: 'xyz小程序', // 一些预定义属性，可以通过config进行设置mp_version: '1.1.1',\n    mp_version: '1.1.1',\n});\n$$Rangers.send();\n\nApp({\n    onLaunch: function () {\n        this.$$Rangers = $$Rangers;\n    \n        // 如果想设置用户标识，比如想使用open_id来标识用户，可以在获取到open_id后把值设置给user_unique_id\n        this.$$Rangers.config({\n            user_unique_id: '获取到的open_id', //可以是open_id，也可以union_id等其他业务觉的可以用来标识用户唯一性的值\n        });\n        // 调用event方法上报具体事件\n        this.$$Rangers.event('test_event', {\n            from: 'launch', // 支持任意属性，值支持数字、字符串等\n        });\n    }\n});\n \n// 其他页面上报事件，如：\n// pages/index/index.js\nPage({\n    onLoad() {\n        getApp().$$Rangers.event('bind_view_tap', {\n            'title': 'chart',\n        });\n    }\n});\n```\n\n\n<span id=\"edbd08e7\"></span>\n### 2.2.4 多实例初始化（可选）\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">不同实例的app_id需要不同。</div>\n\n\n```JavaScript\n// 导入sdk的类（构造器）\nimport SDK from '@datarangers/sdk-mp/esm/sdk';\n\n// 对构造器使用new操作产生实例1\nconst $$sdk1 = new SDK();\n// 其他api调用完全一样\n$$sdk1.init({\n    app_id: 1338,\n});\n$$sdk1.config({});\n$$sdk1.send();\n\n// 对构造器使用new操作产生实例2\nconst $$sdk2 = new SDK();\n// 其他api调用完全一样\n$$sdk2.init({\n    app_id: 1339, // app_id不能与其他实例相同\n});\n$$sdk2.config({});\n$$sdk2.send();\n```\n\n\n<span id=\"48bf923f\"></span>\n## 2.3 引入调试工具 \\- DevTools组件(可选)\n\n`DevTools`是Debug环境下辅助开发者或测试人员进行应用内埋点验证和SDK接入问题排查的组件。详细接入文档请查阅：[小程序埋点开发工具](https://www.volcengine.com/docs/76880/1033616)。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

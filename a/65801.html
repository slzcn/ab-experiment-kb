<script>window.DATA_BASE="../";window.INIT_DOC=65801;window.INIT_MD="<span id=\"一、-概述\"></span>\n# 概述\n\n「A/B 测试」 在 iOS 客户端的SDK 使用的为增长营销套件SDK ，主要的和A/B Test 相关接口有两个：\n\n\n* 实验组分流接口\n\n* 指标上报（事件埋点上报）接口\n\n\n<span id=\"二、集成说明\"></span>\n# 1. 集成SDK\n\n<span id=\"_1-1-使用cocoapods引入source源\"></span>\n### 1.1 使用CocoaPods引入source源\n\n在Podfile中，添加source源。\n\n```objectivec\nsource 'https://github.com/volcengine/volcengine-specs.git'\n```\n\n\n<span id=\"_1-2-引入sdk\"></span>\n### 1.2 引入SDK\n\n在Podfile中，引入SDK，并执行`pod install --repo-update`更新Pods。\n\n```objectivec\npod 'RangersAppLog', '6.16.6', \n    :subspecs => [\n        'Host/CN', #SaaS版本需引入，私有化版本无需引入\n        'Core',\n        'Encryptor/VOLC',\n        'UITracker',\n        'Log', #无需圈选和实时埋点检测可以移除，参考下文的 实时埋点监测和圈选功能 章节\n        'Picker', #无需圈选功能可以移除，参考下文的 开启圈选埋点 章节\n        'Unique' #用于在授权后采集IDFA，无需采集可以移除，参考下文的 关闭设备IDFA、IDFV采集 章节\n    ]\n```\n\n\n<span id=\"_1-3-引入调试工具-devtools组件-可选\"></span>\n### 1.3 **引入调试工具 \\-DevTools组件**(可选)\n\n> 6.12.0+ 支持\n\n> 开发调试阶段集成，请勿带入线上环境\n\n\n`DevTools`是辅助开发者或测试人员进行应用内埋点验证和SDK接入问题排查的组件，详细接入文档请查阅：[DevTools-iOS 快速接入](https://www.volcengine.com/docs/76880/1033613)。\n\n\n* SDK subspecs 添加 `DevTools`\n\n\n```objectivec\npod 'RangersAppLog', 'SDK-VERSION', \n    :subspecs => [\n        ...\n        'DevTools', \n        ...\n    ]\n```\n\n\n\n* 开启相关功能\n\n\n```objectivec\n#import <RangersAppLog/BDAutoTrackDevTools.h>\n//配置开启DevTool功能\nconfig.devToolsEnabled = YES;\n\n//在BDAutoTrack 初始化之后添加方法 显示悬浮按钮入口\n[BDAutoTrackDevTools showFloatingEntryButton];\n```\n\n\n<span id=\"_1-4-实时埋点检测和圈选功能-可选\"></span>\n### 1.4 实时埋点检测和圈选功能(可选)\n\n如需使用实时埋点检测或圈选功能，请引入`Log`子库。 否则可跳过此步骤。\n\n请注意，除引入子库外，您还需要完成下文`3.配置Scheme`的步骤。\n\n<span id=\"_1-5-反作弊风控子库-可选\"></span>\n### 1.5 反作弊风控子库(可选)\n\n如需使用广告监测功能，为使其反作弊识别准确度更高，请额外引入`VolMetaSecML`风控子库。否则可跳过此步骤。\n\n```objectivec\npod 'VolMetaSecML', '[4.3.0.5](http://4.3.0.5)-bugfix' #反作弊风控子库\n```\n\n\n<span id=\"_1-6-手动引入须知\"></span>\n### 1.6 手动引入须知\n\n推荐您通过CocoaPods引入SDK。如特殊情况需要手动引入，请阅读本小节。\n\n参考本章节内容进行手动引入。\n\n\n1. 请前往[iOS SDK包下载页面](https://github.com/volcengine/datarangers-sdk-packages/tree/main/iOS)获取对应版本的SDK包。\n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">iOS离线包名称为\\*<code>版本号</code>\\*<code>.zip</code>格式。例如：<code>6.17.0.zip</code>，其中6.17.0为SDK版本号。   </div>\n   \n\n2. 将安装包下的文件复制到项目文件夹下，并在XCode中依次添加到项目中。添加依赖：\n\n* libz.tbd，**离线集成必选依赖**\n\n* libsqlite3.tbd，**离线集成必选依赖**\n\n* CoreGraphics.framework，**离线集成必选依赖**\n\n* Security.framework，**离线集成必选依赖**\n\n* SystemConfiguration.framework，**离线集成必选依赖**\n\n* JavaScriptCore.framework，**离线集成必选依赖**\n\n* WebKit.framework，**离线集成必选依赖**\n\n* CoreTelephony.framework ，**离线集成必选依赖**\n\n* AdSupport.framework，**离线集成可选依赖，仅在引入 Unique 库时需要，该库仅在额外购买 Tracer 做归因业务时需要**\n\n* AppTrackingTransparency.framework ，**离线集成可选依赖，仅在引入 Unique 库时需要，该库仅在额外购买 Tracer 做归因业务时需要，且该依赖需 14+ 版本使用，请在引入依赖时做好配置**\n\n\n设置 Build Settings \\-\\> Header Search Paths 添加 Headers 文件夹路径：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_0b276b14c3f320bc20485b05e62fae60.png) </span>\n\n设置 Build Settings \\-\\> Linking \\-\\> Other Linker Flags 添加 \\-ObjC：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_3ae74616943fe217fb6c0dc04bb025c5.png) </span>\n\n<span id=\"_2-初始化sdk\"></span>\n# 2. 初始化SDK\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">SDK会在初始化的时候就采集客户信息，请确保您采集用户信息之前已经得到用户的授权，建议的操作如下：</div>\n\n\n\n1. <div data-tips=\"true\" data-tips-type=\"tip\">授权后再初始化SDK，授权前所有的信息都不会采集，一些预置事件也不会被采集；</div>\n\n\n\n<span id=\"_2-1-获取appid\"></span>\n## 2.1 获取appid\n\n在开始集成前，首先需要在集团中拥有一个应用，请参考：[如何创建应用](https://www.volcengine.com/docs/6287/66984)。\n\n\n* SaaS\\-云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/de1df7b557de438893f3013583ee3cfb~tplv-goo7wpa0wc-image.image) </span>\n\n* SaaS\\-非云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/11d05eafc702439cb7bdd70059dc8bad~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"_2-2-获取数据上送地址\"></span>\n## 2.2 获取数据上送地址\n\n进行数据接入上报时，您需要根据当前的环境类型和端类型确认您的数据上报地址，如果上报地址设置错误，后续会导致您无法查询到上报的数据。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">请在上报数据前，务必确认您当前使用的环境类型，根据环境类型配置上报地址。查看当前的环境类型请参见<a href=\"https://www.volcengine.com/docs/6287/1544686\">SaaS云原生/非云原生&私有化环境</a>。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">如果您使用的是SaaS\\-云原生环境，您也需确认您的服务所在的地域，根据所在地域配置上报地址（通常您的服务会在华北2\\-北京地域，部分用户可能会使用其他地域）。SaaS\\-云原生用户查看服务所在地域请参见<a href=\"https://www.volcengine.com/docs/6287/1544685\">支持的地域</a>。</div>\n\n\n\n<span id=\"af1c5450\"></span>\n### SaaS\\-云原生 & SaaS\\-非云原生\n\n\n|地址类型 |SaaS\\-云原生环境<br><br>（国内：华北2\\-北京） |SaaS\\-云原生环境<br><br>（海外：亚太东南\\-柔佛） |SaaS\\-非云原生环境 国内环境 |SaaS\\-非云原生 海外BytePlus环境<br><br>（以下 SG 指新加坡） |\n|---|---|---|---|---|\n|数据上报地址 |* SaaS\\-云原生（华北）：https://gator.volces.com |* https://gator.uba.ap\\-southeast\\-1.volces.com |引入：'Host/CN' 后，无需配置 |引入：'Host/SG' 后，无需配置 |\n|分流地址 |https://tab.volces.com |https://tab.ab.ap\\-southeast\\-1.volces.com |无需手动配置 |无需手动配置 |\n\n\n<span id=\"60db8fa4\"></span>\n### 私有化环境\n\n私有化部署场景下，您需要获取部署私有化环境时，自行规划配置的数据上送地址。如您不清楚此地址，请联系您的项目经理或客户成功经理。\n\n<span id=\"_2-3-初始化sdk\"></span>\n## 2.3 初始化SDK\n\n<span id=\"a7571b2b\"></span>\n### 2.3.1 SaaS\\-云原生版本\n\n如您使用Saas云原生部署版本，请参照如下代码初始化SDK，初始化代码必须在主线程执行。 `Objective-C`请参考：\n\n```objectivec\n#import <RangersAppLog/BDAutoTrack.h>\n#import <RangersAppLog/BDAutoTrackConfig.h>\n#import <RangersAppLog/BDAutoTrackURLHostItemCN.h>\n\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n    /* 初始化SDK开始 */\n    // 参数APPID: 参考2.1节获取\n    BDAutoTrackConfig*config = [BDAutoTrackConfig configWithAppID:@\"{{APPID}}\" launchOptions:launchOptions];\n    // 设置渠道，iOS一般默认App Store渠道\n    config.channel = @\"App Store\"; \n\n    // 设置数据上送地址和分流地址，各环境各地域的上送地址请参见上文的 获取数据上送地址 章节。\n    config.serviceVendor = BDAutoTrackServiceVendorPrivate;\n    BDAutoTrackRequestHostBlock block =\n        ^NSString *(BDAutoTrackServiceVendor vendor, BDAutoTrackRequestURLType requestURLType) {\n            if (requestURLType == BDAutoTrackRequestURLABTest) {\n                return @\"https://***.****.com\";\n            }\n            return @\"https://****.****.com\";\n        };\n    [BDAutoTrack setRequestHostBlock:block];\n    \n    config.autoTrackEnabled = YES; // 全埋点开关，YES开启，NO关闭\n    config.abEnable = YES; //开启ab测试，默认为YES\n    config.showDebugLog = NO; // YES:开启日志，需要参考4.3设置Logger，NO:关闭日志\n    config.logNeedEncrypt = YES; // 加密开关，YES开启，NO关闭\n    config.clearABCacheOnUserChange = YES;//默认切换用户重新获取A/B配置信息，如果要关闭则把clearABCacheOnUserChange配置项置为NO\n    // 如果需要设置当前登陆态 since 6.13.0+\n    // [[BDAutoTrack sharedTrack] setCurrentUserUniqueID:@\"当前登陆态UUID\" withType:@\"uuid_type\"]; \n    [BDAutoTrack sharedTrackWithConfig:config]; //SDK初始化\n    /* 初始化SDK结束 */\n    \n    [[BDAutoTrack sharedTrack] startTrack]; //SDK启动 \n```\n\n\n\n* Swift\n\n\n```swift\nimport RangersAppLog\n    func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {\n        /* 初始化SDK开始 */\n        // 参数APPID: 参考2.1节获取\n        let config = BDAutoTrackConfig(appID: \"{{APPID}}\")\n        // 设置渠道，iOS一般默认App Store渠道\n        config.channel = \"App Store\"\n        \n        // 设置数据上送地址，各环境各地域的上送地址请参见上文的 获取数据上送地址 章节。\n        BDAutoTrack.setRequestHostBlock {(vendor: BDAutoTrackServiceVendor, requestURLType:BDAutoTrackRequestURLType) -> String? in\n            if (requestURLType == BDAutoTrackRequestURLABTest) {\n                return \"https://tab.volces.com\"\n            }\n            return \"https://gator.volces.com\"\n        }\n        \n        config.autoTrackEnabled = true // 全埋点开关，true开启，false关闭\n        config.abEnable = true; //开启ab测试，默认为true\n        config.showDebugLog = false // true:开启日志，需要参考4.3设置Logger，false:关闭日志\n        config.logNeedEncrypt = true // 加密开关，true开启，false关闭\n        config.clearABCacheOnUserChange = true//默认切换用户重新获取A/B配置信息，如果要关闭则把clearABCacheOnUserChange配置项置为false\n        // 如果需要设置当前登陆态 since 6.13.0+\n        // BDAutoTrack.shared().setCurrentUserUniqueID(\"uuid\", withType: \"uuidtype\")\n        BDAutoTrack.sharedTrack(with: config)\n        /* 初始化SDK结束 */  \n        \n        BDAutoTrack.shared().start() //SDK启动\n        return true\n    }\n```\n\n\n<span id=\"_2-3-1-saas版本\"></span>\n### 2.3.2 SaaS\\-非云原生版本（旧版）\n\n如您使用SaaS部署版本，请参照如下代码初始化SDK。\n\n`Objective-C`请参考：\n\n```objectivec\n#import <RangersAppLog/BDAutoTrack.h>\n#import <RangersAppLog/BDAutoTrackConfig.h>\n#import <RangersAppLog/BDAutoTrackURLHostItemCN.h>\n\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n    /* 初始化SDK开始 */\n    // 参数APPID: 参考2.1节获取\n    BDAutoTrackConfig*config = [BDAutoTrackConfig configWithAppID:@\"{{APPID}}\" launchOptions:launchOptions];\n    // 设置渠道，iOS一般默认App Store渠道\n    config.channel = @\"App Store\"; \n    // 设置数据上送地址，各环境各地域的上送地址请参见上文的 获取数据上送地址 章节。\n    config.serviceVendor = BDAutoTrackServiceVendorCN;\n    config.abEnable = YES; //开启ab测试，默认为YES\n    config.autoTrackEnabled = YES; // 全埋点开关，YES开启，NO关闭\n    config.showDebugLog = NO; // YES:开启日志，需要参考4.3设置Logger，NO:关闭日志\n    config.clearABCacheOnUserChange = YES;//默认切换用户重新获取A/B配置信息，如果要关闭则把clearABCacheOnUserChange配置项置为NO\n    config.logNeedEncrypt = YES; // 加密开关，YES开启，NO关闭\n    [BDAutoTrack sharedTrackWithConfig:config]; //SDK初始化\n    /* 初始化SDK结束 */\n    \n    [[BDAutoTrack sharedTrack] startTrack]; //SDK启动 \n```\n\n\n`Swift`请参考：\n\n```swift\nimport RangersAppLog\n    func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {\n        /* 初始化SDK开始 */\n        // 参数APPID: 参考2.1节获取\n        let config = BDAutoTrackConfig(appID: \"{{APPID}}\")\n        // 设置渠道，iOS一般默认App Store渠道\n        config.channel = \"App Store\"\n        // 设置数据上送地址，各环境各地域的上送地址请参见上文的 获取数据上送地址 章节。\n        config.serviceVendor = BDAutoTrackServiceVendor.CN\n        config.abEnable = true //开启ab测试，默认为true\n        config.autoTrackEnabled = true // 全埋点开关，true开启，false关闭\n        config.showDebugLog = false // true:开启日志，需要参考4.3设置Logger，false:关闭日志\n        config.clearABCacheOnUserChange = true //默认切换用户重新获取A/B配置信息，如果要关闭则把clearABCacheOnUserChange配置项置为false\n        config.logNeedEncrypt = true // 加密开关，true开启，false关闭\n        BDAutoTrack.sharedTrack(with: config)\n        /* 初始化SDK结束 */  \n        \n        BDAutoTrack.shared().start() //SDK启动\n        return true\n    }\n```\n\n\n<span id=\"_2-3-2-私有化版本\"></span>\n### 2.3.3 私有化版本\n\n如您使用私有化部署版本，请参照如下代码初始化SDK。\n\n`Objective-C`请参考：\n\n```objectivec\n#import <RangersAppLog/BDAutoTrack.h>\n#import <RangersAppLog/BDAutoTrackConfig.h>\n#import <RangersAppLog/BDAutoTrackURLHostItemCN.h>\n\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n    /* 初始化SDK开始 */\n    // 参数APPID: 参考2.1节获取\n    BDAutoTrackConfig*config = [BDAutoTrackConfig configWithAppID:@\"{{APPID}}\" launchOptions:launchOptions];\n    // 设置渠道，iOS一般默认App Store渠道\n    config.channel = @\"App Store\"; \n    \n    // 设置私有化部署数据上送地址，参考2.2节获取，{{REPORT_URL}} 例如 https://yourdomain.com，注意域名后不要加“/”\n    config.serviceVendor = BDAutoTrackServiceVendorPrivate;\n    BDAutoTrackRequestHostBlock block =\n        ^NSString *(BDAutoTrackServiceVendor vendor, BDAutoTrackRequestURLType requestURLType) {\n            return @\"{{REPORT_URL}}\";\n        };\n    [BDAutoTrack setRequestHostBlock:block];\n    config.abEnable = YES; //开启ab测试，默认为YES\n    config.autoTrackEnabled = YES; // 全埋点开关，YES开启，NO关闭\n    config.showDebugLog = NO; // YES:开启日志，需要参考4.3设置Logger，NO:关闭日志\n    config.clearABCacheOnUserChange = YES;//默认切换用户重新获取A/B配置信息，如果要关闭则把clearABCacheOnUserChange配置项置为NO\n    config.logNeedEncrypt = YES; // 加密开关，YES开启，NO关闭\n    [BDAutoTrack sharedTrackWithConfig:config]; //SDK初始化\n    /* 初始化SDK结束 */\n    \n    [[BDAutoTrack sharedTrack] startTrack]; //SDK启动 \n```\n\n\n`Swift`请参考：\n\n```swift\nimport RangersAppLog\n    func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {\n        /* 初始化SDK开始 */\n        // 参数APPID: 参考2.1节获取\n        let config = BDAutoTrackConfig(appID: \"{{APPID}}\")\n        // 设置渠道，iOS一般默认App Store渠道\n        config.channel = \"App Store\"\n        \n        // 设置私有化部署数据上送地址，参考2.2节获取，{{REPORT_URL}} 例如 https://yourdomain.com，注意域名后不要加“/”\n        BDAutoTrack.setRequestHostBlock {(vendor: BDAutoTrackServiceVendor, requestURLType:BDAutoTrackRequestURLType) -> String? in\n            return \"{{REPORT_URL}}\"\n        }\n        config.abEnable = true //开启ab测试，默认为true\n        config.autoTrackEnabled = true // 全埋点开关，true开启，false关闭\n        config.showDebugLog = false // true:开启日志，需要参考4.3设置Logger，false:关闭日志\n        config.clearABCacheOnUserChange = true//默认切换用户重新获取A/B配置信息，如果要关闭则把clearABCacheOnUserChange配置项置为false\n        config.logNeedEncrypt = true // 加密开关，true开启，false关闭\n        BDAutoTrack.sharedTrack(with: config)\n        /* 初始化SDK结束 */  \n        \n        BDAutoTrack.shared().start() //SDK启动\n        return true\n    }\n```\n\n\n<span id=\"fc8ce3ad\"></span>\n## 2.4 多实例初始化(可选)\n\n多实例初始化，指SDK支持在同包名的App中向多个应用(多个appid)开启埋点，且埋点数据相互隔离，每一个appid对应一个单独的实例。使用场景例如：\n\n\n* 第三方SDK依赖 增长营销套件SDK 做SDK内部产生的埋点时；\n\n* 同一个App或系统中，关联多个埋点应用(多个appid)，共用 增长营销套件SDK 时。\n\n\n`Objective-C`请参考：\n\n```objectivec\nBDAutoTrackConfig* config1 = [BDAutoTrackConfig configWithAppID:@\"{{APPID_1}}\" launchOptions:launchOptions];\nBDAutoTrack *track1 = [BDAutoTrack trackWithConfig:config1];\n[track1 startTrack];\n\nBDAutoTrackConfig* config2 = [BDAutoTrackConfig configWithAppID:@\"{{APPID_2}}\" launchOptions:launchOptions];\nBDAutoTrack *track2 = [BDAutoTrack trackWithConfig:config2];\n[track2 startTrack];\n```\n\n\n`Swift`请参考：\n\n```swift\nlet config1 = BDAutoTrackConfig.init(appID: \"{{APPID_1}}\", launchOptions: launchOptions)\nlet tracker1 = BDAutoTrack.init(config: config1);\ntracker1!.start()\n\nlet config2 = BDAutoTrackConfig.init(appID: \"{{APPID_2}}\", launchOptions: launchOptions)\nlet tracker2 = BDAutoTrack.init(config: config2);\ntracker2!.start()\n```\n\n\n<span id=\"_3-配置scheme-可选\"></span>\n# 3. 配置Scheme(可选)\n\n如需使用实时[实时埋点检测](https://www.volcengine.com/docs/6285/66054)或[圈选功能](https://www.volcengine.com/docs/6285/66197)，请引入`Log`子库。 否则可跳过此步骤。 请注意，除引入子库外，您还需要完成下文`3.配置Scheme`的步骤。\n\n<span id=\"_3-1-获取url-scheme\"></span>\n## 3.1 获取URL Scheme\n\n「应用列表」\\-\\> 接入应用的「详情」\\-\\>「URL Scheme」中可查看您的scheme，一般为`rangersapplog.xxxxx`的形式。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_bfc8aa1607d3fe34c4ed7d396e3f3b5e.png) </span>\n\n<span id=\"_3-2-添加url-scheme\"></span>\n## 3.2 添加URL Scheme\n\n把URL Scheme添加到您的项目中。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_f0eee046a1f6c0865507d2abc01d0956.png) </span>\n\n<span id=\"_3-3-重写回调方法\"></span>\n## 3.3 重写回调方法\n\n请根据需要使用实时埋点检测或圈选事件功能的设备版本，并添加URL的处理。\n\n如您使用iOS 13以下的设备，则重写UIApplicationDelegate的回调方法。\n\n```objectivec\n#import <RangersAppLog/BDAutoTrackSchemeHandler.h>\n- (BOOL)application:(UIApplication *)app openURL:(NSURL *)url options:(NSDictionary<UIApplicationOpenURLOptionsKey, id> *)options {\n    // 参数APPID: 参考2.1节获取\n    if ([[BDAutoTrackSchemeHandler sharedHandler] handleURL:url appID:@\"appid\" scene:nil]) {\n        return YES;\n    }\n    // ……\n    return NO;\n}\n```\n\n\n如您使用iOS 13 及以上的设备，请重写UISceneDelegate的回调方法。\n\n`Objective-C`请参考：\n\n```objectivec\n#import <RangersAppLog/BDAutoTrackSchemeHandler.h>\n- (void)scene:(UIScene *)scene openURLContexts:(NSSet<UIOpenURLContext *> *)URLContexts {\n    for (UIOpenURLContext *context in URLContexts) {\n        NSURL *URL = context.URL;\n        // 参数APPID: 参考2.1节获取\n        if ([[BDAutoTrackSchemeHandler sharedHandler] handleURL:URL appID:@\"{{APPID}}\" scene:scene]) {\n            continue;\n        }\n        /// ……\n    }\n}\n```\n\n\n`Swift`请参考：\n\n```swift\nimport RangersAppLog\nfunc application(_ app: UIApplication, open url: URL, options: [UIApplication.OpenURLOptionsKey : Any] = [:]) -> Bool {  \n    // 参数APPID: 参考2.1节获取\n    if(BDAutoTrackSchemeHandler.shared().handle(url, appID: \"{{APPID}}\", scene: nil)) {\n       return true\n    }      \n    return false\n}\n```\n\n\n<span id=\"_4-初始化基本配置\"></span>\n# 4. 初始化基本配置\n\n以下为常用的初始化基本配置，`config` 均指初始化时的`BDAutoTrackConfig`。\n\n<span id=\"_4-1-全埋点设置开关\"></span>\n## 4.1 全埋点设置开关\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">⚠️ 请注意，全埋点开关默认开启。</div>\n\n\n`Objecetive-C`请参考：\n\n```objectivec\n// 开启全埋点事件的上送\nconfig.autoTrackEnabled = YES; // 全埋点开关，YES开启，NO关闭\n```\n\n\n`Swift`请参考：\n\n```plain\n// 开启全埋点事件的上送\nconfig.autoTrackEnabled = true // 全埋点开关，true开启，false关闭\n```\n\n\n<span id=\"_4-2-开启圈选埋点\"></span>\n## 4.2 开启圈选埋点\n\n在1.2节的引入中，引入`Picker`子库即开启圈选埋点。相反，移除`Picker`子库即关闭圈选埋点。\n\n<span id=\"_4-3-查看日志打印\"></span>\n## 4.3 查看日志打印\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">⚠️ 请注意，日志打印默认关闭，建议上线生产包关闭。</div>\n\n\n`Objecetive-C`请参考：\n\n```objectivec\n// 在控制台输出日志，可用于观察用户行为日志上报情况，建议在上线时关闭\nconfig.showDebugLog = NO; // YES:开启日志，NO:关闭日志\nconfig.logger = ^(NSString * _Nullable log) {NSLog(@\"%@\",log);}; // 开启日志时设置Logger\n```\n\n\n`Swift`请参考：\n\n```plain\n// 在控制台输出日志，可用于观察用户行为日志上报情况，建议在上线时关闭\nconfig.showDebugLog = false // true:开启日志，false:关闭日志\nconfig.logger = { (log) inprint(log ?? \"log is nil\")} // 开启日志时设置Logger\n```\n\n\n<span id=\"_4-4-ab设置开关\"></span>\n## 4.4 AB设置开关\n\n`Objecetive-C`请参考：\n\n```objectivec\n// AB功能开关\nconfig.abEnable = YES; //开启ab测试，默认为YES\n```\n\n\n`Swift`请参考：\n\n```swift\n// AB功能开关\nconfig.abEnable = true; //开启ab测试，默认为true\n```\n\n\n<span id=\"_4-5-加密设置开关\"></span>\n## 4.5 加密设置开关\n\n加密设置默认开启。您可在debug阶段关闭加密，以便于抓包联调。\n\n`Objecetive-C`请参考：\n\n```objectivec\n// 加密设置开关，线上版本建议开启\nconfig.logNeedEncrypt = YES; // YES:打开加密，NO:关闭加密\n```\n\n\n`Swift`请参考：\n\n```swift\n// 加密设置开关，线上版本建议开启\nconfig.logNeedEncrypt = true // true:打开加密，false:关闭加密\n```\n\n\n<span id=\"a525ab56\"></span>\n### 4.5.1 国密 SM2\n\n国密 SM2 算法的请求加密**仅私有化版本支持**，支持的最低版本：6.15.0。\n\n引入国密 SM2子库：\n\n```objectivec\npod 'RangersAppLog', 'SDK-VERSION', \n    :subspecs => [\n        ...\n        'Encryptor/SM2', #仅私有化版本支持\n        ...\n    ]\n```\n\n\n\n* `Objecetive-C`请参考：\n\n\n```objectivec\n#import \"BDAutoTrackEncryptorSM2.h\"\n\n// 设置 SM2 加密\nNSString * const publicKey = @\"your public key\";\n[BDAutoTrackEncryptorSM2 setPublickKey:publicKey];\nconfig.encryptionType = BDAutoTrackEncryptionTypeCstcSM2;\n```\n\n\n\n* `Swift`请参考：\n\n\n```Swift\n// 设置 SM2 加密\nlet publicKey = \"your public key\"\nBDAutoTrackEncryptorSM2.setPublickKey(publicKey)\nconfig.encryptionType = .cstcSM2\n```\n\n\n<span id=\"_4-5-切换用户清空ab信息开关\"></span>\n## 4.6 **切换用户清空AB信息开关**\n\n`Objecetive-C`请参考：\n\n```xml\n//默认切换用户重新获取A/B配置信息，如果要关闭则把clearABCacheOnUserChange配置项置为NO\nconfig.clearABCacheOnUserChange = YES;\n```\n\n\n`Swift`请参考：\n\n```xml\n//默认切换用户重新获取A/B配置信息，如果要关闭则把clearABCacheOnUserChange配置项置为false\nconfig.clearABCacheOnUserChange = true\n```\n\n\n<span id=\"_4-6-设置app-language-和-app-region\"></span>\n## 4.7 设置APP Language 和 APP Region\n\n`Objecetive-C`请参考：\n\n```objectivec\n// 修改语言和地区，设置APP Language 和 APP Region\n[BDAutoTrack setAppLauguage:@\"zh/en/jp/fr\"];\n[BDAutoTrack setAppRegion:@\"cn\"];\n```\n\n\n`Swift`请参考：\n\n```swift\n// 修改语言和地区，设置APP Language 和 APP Region\nBDAutoTrack.setAppLauguage(\"zh/en/jp/fr\")\nBDAutoTrack.setAppRegion(\"cn\")\n```\n\n\n<span id=\"_4-7-打通内嵌h5页\"></span>\n## 4.8 打通内嵌H5页\n\n开启内嵌H5页打通后，内嵌H5页上产生的事件将通过iOS SDK上报，不在js SDK上报，并复用iOS端设置的`user_unique_id`和公共属性。\n\n请注意，打通功能还需在H5页上集成js sdk，并开启js的打通开关，请参考[Web/JS SDK 集成](https://www.volcengine.com/docs/6287/96071) 3.6节。\n\n`Objecetive-C`请参考：\n\n```objectivec\n// 开启内嵌H5打通开关\nconfig.enableH5Bridge = YES;\n```\n\n\n`Swift`请参考：\n\n```swift\n// 开启内嵌H5打通开关\nconfig.enableH5Bridge = true;\n```\n\n\n开关开启后，必须配置打通白名单。仅白名单内配置的域名生效打通，白名单可用通配符方式添加，`*`表示通配符。\n\n`Objecetive-C`请参考：\n\n```objectivec\n// 内嵌H5页白名单配置\n// 示例：如需打通 www.volcengine.com 和 www.bytedance.com 两个H5页\nconfig.H5BridgeAllowedDomainPatterns = @[@\"www.volcengine.com\",@\"*.bytedance.*\"];\n\n// 适配 www.bytedance.com 的白名单有多种，请根据业务场景配置白名单，例如：\n// www.bytedance.com 或 *.bytedance.* 或 *.*.* 均可实现。\n```\n\n\n`Swift`请参考：\n\n```swift\n// 内嵌H5页白名单配置\n// 示例：如需打通 www.volcengine.com 和 www.bytedance.com 两个H5页\nconfig.h5BridgeAllowedDomainPatterns = [\"[www.volcengine.com](http://www.volcengine.com/)\", \"*.bytedance.*\"]\n```\n\n\n<span id=\"_4-8-原生端采集h5全埋点\"></span>\n## 4.9 原生端采集H5全埋点\n\n原生端内嵌webview页时，通过打开以下开关，可从原生端全埋点事件采集h5页全埋点事件。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">⚠️请注意，此开关的使用无需在h5页内集成js sdk，且与js sdk全埋点功能独立无关联。</div>\n\n\n`Objecetive-C`请参考：\n\n```objectivec\n//内嵌H5页面的全埋点事件\nconfig.H5AutoTrackEnabled = YES; // YES:开启h5全埋点事件，NO:关闭h5全埋点事件\n```\n\n\n`Swift`请参考：\n\n```swift\n//内嵌H5页面的全埋点事件\nconfig.H5AutoTrackEnabled = true; // true:开启h5全埋点事件，false:关闭h5全埋点事件\n```\n\n\n<span id=\"_4-9-关闭设备idfa、idfv采集\"></span>\n## 4.10 关闭设备IDFA、IDFV采集\n\n设备IDFA、IDFV的采集通过`Unique`子库完成。在1.2节的引入SDK中，引入`Unique`子库即开启采集，移除`Unique`子库即关闭采集。\n\n<span id=\"f22f7734\"></span>\n## 4.11 开启屏幕方向采集\n\n> 本小节功能在6.11.0+后开始支持。\n\n\n引入 DeviceOrientation 子库：\n\n```objectivec\npod 'RangersAppLog', 'SDK-VERSION', \n    :subspecs => [\n        ...\n        'DeviceOrientation', #屏幕方向采集\n        ...\n    ]\n```\n\n\n屏幕方向信息会自动带入每个埋点的`params`中，接口文档如下：\n\n```objectivec\n/*! @abstract 是否采集屏幕方向，默认不采集(NO)\n */\n@property (nonatomic) BOOL screenOrientationEnabled;\n```\n\n\n\n* Objective\\-C 请参考：\n\n\n```objectivec\nconfig.screenOrientationEnabled = YES;\n```\n\n\n\n* Swift 请参考：\n\n\n```Swift\nconfig.screenOrientationEnabled = true\n```\n\n\n<span id=\"91cfd7ee\"></span>\n## 4.12 设置GPS坐标\n\n引入 Location 子库：\n\n```objectivec\npod 'RangersAppLog', 'SDK-VERSION', \n    :subspecs => [\n        ...\n        'Location', #GPS采集\n        ...\n    ]\n```\n\n\nGPS 信息会自动带入每个埋点的 `params` 中：\n\n```objectivec\n/*! @abstract 是否采集GPS，默认不采集(NO)\n */\n@property (nonatomic) BOOL trackGPSLocationEnabled;\n```\n\n\n\n* `Objective-C` 请参考：\n\n\n```objectivec\nconfig.trackGPSLocationEnabled = YES;\n```\n\n\n\n* `Swift` 请参考：\n\n\n```Swift\nconfig.trackGPSLocationEnabled = true\n```\n\n\n您也可以自行手动设置GPS，手动设置后，SDK将不再使用自动采集的GPS信息：\n\n```objectivec\n@interface BDAutoTrack\n...\n+ (void)setGPSLocation:(enum BDAutoTrackGeoCoordinateSystem)geoCoordinateSystem longitude:(double)longitude latitude:(double)latitude;\n...\n@end\n\n// WGS84 地球坐标系\n// GCJ02 火星坐标系\n// BD09 百度坐标系\n// BDCS 北斗坐标系\ntypedef NS_ENUM(NSInteger, BDAutoTrackGeoCoordinateSystem) {\n    BDAutoTrackGeoCoordinateSystemWGS84 = 1 << 0,\n    BDAutoTrackGeoCoordinateSystemGCJ02 = 1 << 1,\n    BDAutoTrackGeoCoordinateSystemBD09  = 1 << 2,\n    BDAutoTrackGeoCoordinateSystemBDCS  = 1 << 3\n};\n```\n\n\n\n* `Objective-C` 请参考：\n\n\n```objectivec\n[BDAutoTrack setGPSLocation:BDAutoTrackGeoCoordinateSystemWGS84 longitude:116.3683244 latitude:39.915085];\n```\n\n\n\n* `Swift` 请参考：\n\n\n```Swift\nBDAutoTrack.setGPSLocation(BDAutoTrackGeoCoordinateSystem.WGS84, longitude: 116.3683244, latitude: 39.915085)\n```\n\n\n<span id=\"2e5b5e2e\"></span>\n## 4.13 开启崩溃采集\n\n引入 Exception 子库：\n\n```objectivec\npod 'RangersAppLog', 'SDK-VERSION', \n    :subspecs => [\n        ...\n        'Exception', #崩溃采集\n        ...\n    ]\n```\n\n\n\n* `Objective-C` 请参考：\n\n\n```objectivec\n// 目前仅支持采集 NSException 崩溃\nconfig.trackCrashEnabled = YES;\n```\n\n\n\n* `Swift` 请参考：\n\n\n```Swift\n// 目前仅支持采集 NSException 崩溃\nconfig.trackCrashEnabled = true\n```";</script>

  <main>
    <div class="top">
      <div class="searchbox">
        <span class="si">🔍</span>
        <input id="q" placeholder="搜索实验设计"
          data-ph-prefix="搜索"
          data-ph-kw="实验设计,报告解读,广告投放,假设检验,指标体系,AB通识"
          autocomplete="off">
        <span class="clr" id="clr">✕</span>
      </div>
      <div class="stat" id="stat"></div>
    </div>
    <div class="body" id="listView"></div>
    <div class="body reader-scroll" id="readerView" style="display:none"></div>
  </main>
</div>

<!-- 写文章访问控制 -->
<div class="login-mask" id="loginMask">
  <div class="login-box">
    <div class="login-ic">🔒</div>
    <h3>需要授权</h3>
    <p>此操作仅限授权用户</p>
    <input id="loginPin" type="password" inputmode="numeric" placeholder="访问码" autocomplete="off">
    <button class="ed-btn" id="loginBtn">进入编辑</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-tip">登录后 2 小时内免再次验证</div>
  </div>
</div>

<!-- 写文章编辑器 -->
<div class="editor-mask" id="editorMask"></div>
<div class="editor" id="editor">
  <div class="ed-head">
    <b>✍ 写新文章</b>
    <span class="ed-close" id="edClose">✕</span>
  </div>
  <div class="ed-body">
    <div class="ed-form">
      <label>标题</label>
      <input id="edTitle" placeholder="例如：双十一大促实验复盘">
      <label>分类</label>
      <select id="edCat"></select>
      <label>检索关键词（选填，空格分隔）</label>
      <input id="edKw" placeholder="复盘 大促 转化率">
      <label>正文（Markdown）</label>
      <textarea id="edMd" placeholder="# 标题&#10;&#10;正文用 Markdown 书写，支持 **加粗**、列表、表格、代码块…&#10;&#10;## 小节&#10;- 要点一&#10;- 要点二"></textarea>
      <div class="ed-actions">
        <button class="ed-btn" id="edSubmit" style="display:none">✓ 发布文章</button>
      </div>
      <div class="ed-hint" id="edHint"></div>
    </div>
    <div class="ed-preview" id="edPrev">
      <div class="ed-prev-tag" id="edPrevTag"></div>
      <h1 id="edPrevTitle" style="margin:8px 0 16px"></h1>
      <div class="md" id="edPrevBody"></div>
    </div>
  </div>
</div>

<!-- 顶部悬浮 toast：发布结果等提示走全站统一规范 -->
<div id="toast"></div>

<script src="../app.js?v=b6e50403"></script>
</body>
</html>

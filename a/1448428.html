<script>window.DATA_BASE="../";window.INIT_DOC=1448428;window.INIT_MD="**本文为您提供关于**「A/B 测试」（又名DataTester）使用功能的各项发版更新记录。\n\n<span id=\"608ea118\"></span>\n# 2025年10月30日\n\n\n|**功能模块** |**更新描述** |\n|---|---|\n|指标管理 |DataTester的指标新增支持使用虚拟用户属性进行指标过滤，例如，在创建实验指标时，您可以通过虚拟用户属性过滤实验指标。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/8d57a87774044f87a1ac6e48c893cbf1~tplv-goo7wpa0wc-image.image) </span> |\n\n\n<span id=\"1aa54f4e\"></span>\n# 2025年09月25日\n\n\n|**功能模块** |**更新描述** |\n|---|---|\n|实验创编 |编程实验\\-服务端实验新增“增强分流均匀性”功能，打开功能开关后，您可以针对某些实验指标或人群，在实验开始前的流量圈选上，对实验流量增强实验各个版本间的均匀性，即在实验开始前保障对应实验指标在各个实验版本上差异不显著，以便提高实验结果的可靠性。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b4189ba7bb824aad80716ec0d13eb5e3~tplv-goo7wpa0wc-image.image) </span><br><br><div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div><br><br><br><div data-tips=\"true\" data-tips-type=\"tip\">当前仅SaaS云原生环境的编程实验支持“增强分流均匀性”功能。更多关于增强分流均匀性的配置说明请参见<a href=\"https://www.volcengine.com/docs/6287/1851200\">增强分流均匀性</a>。</div><br> |\n\n\n<span id=\"cc17be5c\"></span>\n# 2025年09月18日\n\n\n|**功能模块** |**更新描述** |\n|---|---|\n|实验报告 |* 实验报告中的留存指标新增支持直接查看各留存指标的对比差值。<br><br>   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/0133c1b022a14fc4bde1dcd47842aaec~tplv-goo7wpa0wc-image.image) </span><br><br>   如上图所示，您可以在图表中便捷的看到指标的差值数据，提高实验指标分析体验和效率。<br><br>* 实验报告的总进组人数数据新增支持灵活累计开关（默认关闭）。<br><br>   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/96562f0b29c449f29b88ba6f1d8979e3~tplv-goo7wpa0wc-image.image) </span><br><br>   灵活累计计算资源消耗比较大，打开后可能会影响您的指标计算速度，如果您需要打开开关，可联系火山引擎技术支持人员开启开关。<br><br>* 实验报告的指标曲线图体验优化，指标曲线图可自适应当前指标数据范围，展示最佳图表查阅视觉效果。 |\n\n\n<span id=\"19da7c0f\"></span>\n# 2025年08月21日\n\n\n|**功能模块** |**更新描述** |\n|---|---|\n|实验报告 |实验报告新增支持“基准组”的页签，实验开启后，DataTester默认将实验的对照组作为基准组，在展示实验各分组的指标值的同时，其他实验组会基于基准组去计算展示差异值、置信区间的数据。新增“基准组”页签后，您可以单击对应的实验组，将默认的基准组切换为其他实验分组。<br><br>当前支持在实验报告、数据指标、高级分析中对各实验分组进行切换实验基准组的操作，如下图所示。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/99dd56640d674679b8a6fd32f7200ab5~tplv-goo7wpa0wc-image.image) </span><br><br>切换实验基准组后：<br><br><br>* 各实验组的实验指标值不变。<br><br>* 除新的基准组外，其他实验分组会基于新的基准组重新计算差异值、置信区间，同时，涉及差异值、置信区间数据展示的统计卡片、趋势图表等，也会同步更新对应差异值、置信区间的数据。 |\n|通用 |为加强产品账号资源的安全性，火山引擎加强了账号跨服务请求的授权校验，由于DataTester产品的部分功能与DataFinder产品功能有联动，因此后续在继续使用DataTester时，您需根据界面提示完成DataTester的跨服务访问请求授权，允许DataTester访问DataFinder服务，保障DataTester功能正常使用。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/e5307b4b52be4356800dc05ee3d3ef90~tplv-goo7wpa0wc-image.image) </span><br><br><div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div><br><br><br><div data-tips=\"true\" data-tips-type=\"tip\">跨服务授权仅主账号或拥有IAMFullAccess权限的子账号可操作。</div><br> |\n\n\n<span id=\"f72b1fc6\"></span>\n# 2025年08月07日\n\n\n|**功能模块** |**更新描述** |\n|---|---|\n|指标管理 |新增提供指标组模版管理功能，您可以在指标组模板页面中创建指标组模板，将常用指标添加至模板中，后续创建实验时可切换使用指标组模板来快捷配置实验指标，提高操作效率。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/c0512b1360364146b16c5c1521d40883~tplv-goo7wpa0wc-image.image) </span><br><br>更多关于指标组模板的介绍详情请参见[指标组模版管理](https://www.volcengine.com/docs/6287/1781336)。 |\n|MAB实验报告 |MAB实验报告新增支持非一致性场景下的数据展示。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/0c46fa6d834742a18e5f27ce3520e19b~tplv-goo7wpa0wc-image.image) </span> |\n|全局设置\\-权限管理 |SaaS\\-云原生环境优化了权限管理功能，当前支持对同主账号下的子账号、跨主账号（含跨主账号下的子账号）进行便捷的授权。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/ab68e82307c94c8bac4f3cbb3560aca0~tplv-goo7wpa0wc-image.image) </span><br><br><br>* 如果您希望对同主账号下的子账号进行授权，可单击“批量授权”按钮进行授权。<br><br>* 如果您希望对其他主账号（含跨主账号下的子账号）进行授权，您可单击“邀请用户”进行授权。<br><br>   * 对其他主账号授权时，添加用户的格式为：**主账号uid**。<br><br>   * 对其他主账号下的子账号授权时，添加用户的格式为：**子账号名称@主账号uid**。<br><br><br>更多关于SaaS\\-云原生环境下的权限管控操作说明请参见[权限管理：SaaS-云原生环境](https://www.volcengine.com/docs/6287/69594)。 |\n\n\n<span id=\"b0aaf44a\"></span>\n# 2025年07月10日\n\n\n|**功能模块** |**更新描述** |\n|---|---|\n|场景能力\\-智能运营 |极光推送通道新增支持配置推送自定义消息“自定义配置”。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/e7e15bc72474480da2c9516bd485f8c7~tplv-goo7wpa0wc-image.image) </span><br><br><br>* 默认配置为**极光通道优先**（推荐），如果您有自己的极光配置，可以使用自定义配置。<br><br>* 选择配置为**自定义配置**时：<br><br>   * 您需单击后方的编辑**按钮**，在弹出的侧边框中配置自定义通道。<br><br>   * 自定义配置的内容为 JSON 格式，DataTester会透传给极光通道，各个手机品牌支持的字段和字段配置指导请参考[极光推送文档。](https://docs.jiguang.cn/jpush/server/push/rest_api_v3_push#third_party_channel-%E8%AF%B4%E6%98%8E)<br><br>   * 如果**自定义配置**的 JSON 对象的实际结果与其他三个配置项（**极光通道优先**、**强制极光通道**、**强制厂商通道**）的结果相同，DataTester会自动为您修改为对应的配置项展示。 |\n\n\n<span id=\"7c593c35\"></span>\n# 2025年06月26日\n\n\n|**功能模块** |**更新描述** |\n|---|---|\n|实验创编 |新增支持对已结束的实验添加分析指标的功能，便于在实验结束后结合实际业务分析需要，灵活添加新的分析指标。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/1bdc2c716b2348cb8d3578794c063ebf~tplv-goo7wpa0wc-image.image) </span><br><br><br>* 当前对于已结束的实验，有实验编辑权限的用户可进入实验详情页面，在实验指标配置处单击编辑按钮，支持新增分析指标。<br><br>* 同时支持通过OpenAPI的方式修改实验的核心指标或关注指标，详情请参见[修改实验关联指标组](https://www.volcengine.com/docs/6287/129587#90df9025)。 |\n|通用 |SaaS\\-云原生环境新增支持多时区设置能力。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/cc487b879aed4989ae59c6a2ff2aa357~tplv-goo7wpa0wc-image.image) </span><br><br><br>* 在接入项目时，新增支持设置当前项目所使用的时区。如果您所在地域为柔佛地域希望使用其他时区的时间作为实验数据的时间，可以通过此功能设置。<br><br>* 应用的时区以应用绑定的项目设置结果为准，无需单独设置。 |\n|实验报告\\-敏感人群洞察 |优化敏感人群洞察功能页面的交互：优化、补充界面提示文案；调整分页样式等。 |\n\n\n<span id=\"2dd9887d\"></span>\n# 2025年05月29日\n\n\n|**功能模块** |**更新描述** |\n|---|---|\n|智能动态调优MAB |对修改MAB实验的实验版本功能进行了完善，MAB实验\\-**APP小程序优化**实验支持在实验过程中添加、减少版本，也支持调整实验版本的下发参数。此功能适用于实验长期在线，且在实验过程中希望能够调整下发版本的参数的场景。<br><br>> 例如希望对app banner做长期的择优选择，实验初期只有3个版本比较，在过程中会根据数据表现淘汰表现差的banner或者增加新的banner参与流量调优。<br><br><br>该功能仅适用于体验不一致的场景，当前支持APP小程序中的客户端调优/服务端调优。<br><br>更多详情请参见[创建MAB智能调优实验](https://www.volcengine.com/docs/6287/416714)。 |\n|实验报告\\-敏感人群洞察 |敏感人群洞察功能新增支持SaaS\\-云原生的云托管环境。 |\n|指标组 |给指标组授权时，变更了添加用户的操作交互，解决了此前的性能问题。 |\n\n\n<span id=\"460793bd\"></span>\n# 2025年05月15日\n\n\n|**功能模块** |**更新描述** |\n|---|---|\n|实验报告 |* 新增智能实验解读能力，在生成实验报告时，可基于事件指标的实验结果数据为您智能分析实验结果。<br><br>   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/4c3a2f95b804469c92963c028a26d4dc~tplv-goo7wpa0wc-image.image) </span><br><br>   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div><br>   <br><br>   <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">当前此功能默认关闭，如果您希望使用此功能，可联系技术支持人员打开功能开关。   </div><br>   <br><br>* 在实验报告的天级趋势图，和事件指标天级趋势图中，新增“差异相对值”分析功能。<br><br>   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/971d4fa950234317bbb056b5e258bd65~tplv-goo7wpa0wc-image.image) </span><br><br>   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/9ad4bb53822c476f8aeeb95aff9697f0~tplv-goo7wpa0wc-image.image) </span> |\n\n\n<span id=\"f266ae4c\"></span>\n# 2025年04月27日\n\n\n|**功能模块** |**更新描述** |\n|---|---|\n|实验创编\\-模拟实验 |新增模拟实验能力，支持对文案进行AI预测，即可以基于AI能力对不同文案进行PK预测，从而帮助您更快地找到最优文案。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/5d7deeede5c84ebe9c11e0746e8e6e60~tplv-goo7wpa0wc-image.image) </span><br><br><br>* 您可以直接贴入两版文案，直接进行预测；也支持单击“AI帮我写”来生成一版文案。<br><br>* 完成文案的AI预测后，页面会为您展示获胜文案和两版文案的互动次数、获胜概率等预测分析结果。<br><br><br><div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div><br><br><br><br>* <div data-tips=\"true\" data-tips-type=\"tip\">支持的环境：当前仅SaaS\\-云原生环境支持。</div><br><br><br>* <div data-tips=\"true\" data-tips-type=\"tip\">收费情况：未登录用户可免费试用3次；DataTester用户登录火山引擎账号后，有100万Tokens免费额度，超出部分按实际使用量计费。计费详情可联系火山引擎技术支持人员咨询。</div><br> |\n\n\n<span id=\"4b01d10b\"></span>\n# 2025年04月24日\n\n\n|**功能模块** |**更新描述** |\n|---|---|\n|实验报告\\-敏感人群洞察 |新增敏感人群洞察功能。敏感人群洞察功能是基于Uplift Model模型实现的一套智能洞察敏感人群的功能。是一种在营销、广告等诸多领域发挥独特作用的数据分析工具。与传统预测模型专注于预测事件是否发生（比如用户是否购买产品、病人病情是否好转）不同，它聚焦于**预估某个干预行为对结果带来的 “额外提升” 效果**。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/3ec96438e9354fda88af61dfe1de9372~tplv-goo7wpa0wc-image.image) </span><br><br><div data-tips=\"true\"

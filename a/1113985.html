<script>window.DATA_BASE="../";window.INIT_DOC=1113985;window.INIT_MD="<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">最新chrome 扩展的版本是<strong>0.0.6</strong></div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">提示：建议使用最新版本以获得最新产品能力</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\"><img src=\"https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_89e569a2c0dfd20494cc30577e9117d1.png\" width=\"500px\" /></div>\n\n\n<span id=\"一、概述\"></span>\n# 一、概述\n\n可视化编辑器是一款所见即所得（WYSIWYG）工具，可**修改**网站页面的内容设计布局；支持为任意网页进行可视化编辑，包括：**编辑元素和属性，新增widgets组件，删除元素**等能力。\n\n**解决如下问题：** \n\n **（1）基本视觉更改**\n\n使用可视化编辑器，您无需编写一行代码即可在您的网站上进行基本的视觉更改。可视化编辑器的直观界面使其易于使用，即使对于没有Web技术或编码经验的人也是可以的。\n\n **（2）高级修改**\n\n使用AB可视化编辑器，您可以修改网页上的元素，添加要跟踪的目标，如果您想进行一些高级修改，可以选择代码编辑器，新增Widgets基础组件，等等。\n\n<span id=\"二、基本概念\"></span>\n# 二、基本概念\n\n\n|**概念** |**说明** |\n|---|---|\n|无代码 |不需要编写编程语言 |\n|页面**设计** |包含内容，字体，样式，布局 |\n|元素 |DOM元素 |\n|属性 |DOM元素的属性 |\n|可交互元素 |指网页或应用程序中的一些元素，用户可以与之进行交互，例如下拉菜单、打开导航栏、打开对话框、输入框、按钮、链接等 |\n|编辑身份认证页面 |需要登陆或者鉴权之后才能访问的页面 |\n|**widgets组件** |包含基础组件（文本，链接，图片，视频，弹窗等），业务组件（公告，轮播，倒计时）等 |\n|AI文本建议 |通过AIGC对已有的内容进行文本生成 |\n\n\n<span id=\"三、应用场景\"></span>\n# 三、应用场景\n\nAB可视化编辑器的使用场景包括：\n\n\n1. **界面设计优化**：通过AB可视化编辑器，产品运营人员可以轻松创建和管理不同版本的界面设计，以确定哪个版本更能吸引用户，提高用户留存率和转化率。\n\n2. **内容优化**：通过AB可视化编辑器，产品运营人员可以轻松创建和管理不同版本的内容，以确定哪个版本更能吸引用户，提高用户留存率和转化率。\n\n3. **功能优化**：通过AB可视化编辑器，产品运营人员可以轻松创建和管理不同版本的功能，以确定哪个版本更能满足用户需求，提高用户留存率和转化率。\n\n4. **营销策略优化**：通过AB可视化编辑器，产品运营人员可以轻松创建和管理不同版本的营销策略，以确定哪个版本更能吸引用户，提高用户留存率和转化率。\n\n\n<span id=\"四、快速开始（2步）\"></span>\n# 四、快速开始（2步）\n\n推荐使用Chrome浏览器版本 \\>= 90.0.0.0，主要分为 **2** 步，整体流程为：\n\n\n* 【1.Chrome商城添加/离线下载添加】\n\n   * 方式 1：在chrome应用商城添加，搜索「VisualEditor」，添加至Chrome。\n\n   * 方式 2：或者直接下载添加，在扩展列表中，固定扩展。\n\n* 【2.直接使用/结合AB使用】\n\n   * **方式 1**：在扩展中打开可视化编辑器的开关，然后对页面的可视化操作，保存。\n\n   * **方式 2**：在DataTester/BytePlus Optimize中的可视化实验，点击进入编辑器，新开页面，**自动打开**开关，然后对页面进行可视化操作，保存。\n\n\n<span id=\"_1-chrome商城添加-离线下载添加\"></span>\n## 1.Chrome商城添加/离线下载添加\n\n提供2种下载方式：\n\n\n* **方式 1**：在chrome商城添加，[下载地址](https://chrome.google.com/webstore/detail/visualeditor/kejgjahipnbalhiagmgdpbllffppcjik)\n\n* **方式 2**：或者直接离线下载，在扩展列表中添加，固定扩展。\n\n\n<span id=\"_2-直接使用-结合ab使用\"></span>\n## 2.直接使用/结合AB使用\n\n**方式 1**：在扩展中打开可视化编辑器的开关，然后对页面的可视化操作，保存。在页面中编辑，新增，删除元素等操作。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_9f77a266c77eb10ce95ba6e034259930.gif) </span>\n\n**方式2**：在 [DataTester](https://console.volcengine.com/datatester) 中的可视化实验，点击进入编辑器，新开页面，**自动打开**开关，然后对页面进行可视化操作，保存，从而进行AB实验。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_01d296a09f16091b42a5aa4a5ba1eceb.gif) </span>\n\n<span id=\"五、使用流程\"></span>\n# 五、使用流程\n\n<video src=\"https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_8ad7a7250edb29262c4a4de13472d2e9.mp4\" controls></video>\n\n\n<span id=\"六、能力详述\"></span>\n# 六、能力详述\n\n\n|模块能力 |元素类型 |支持操作 |操作截图 |\n|---|---|---|---|\n|基础配置 |全部元素 |模式切换 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_34d131dc3b714ae69ae31847973391c0.png) </span> |\n|||刷新 ||\n|||帮助中心 ||\n|||保存 ||\n|编辑元素和属性 |文本 |编辑\\-文本\\-内容 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_7874537ae86b29eb7c70357a6dba2d1a.png) </span> |\n|||编辑\\-字体\\-颜色 ||\n|||编辑\\-字体\\-加粗 ||\n|||编辑\\-字体\\-下划线 ||\n|||编辑\\-字体\\-斜体 ||\n|||编辑\\-样式\\-背景色 ||\n|||编辑\\-样式\\-边框 ||\n|||编辑\\-布局\\-外边距 ||\n|||编辑\\-布局\\-内边距 ||\n||链接 |编辑\\-链接\\-地址 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_0d83998910ba595a7f04ce55ed2d9c71.png) </span> |\n|||编辑\\-链接\\-方式 ||\n|||编辑\\-链接\\-内容 ||\n|||编辑\\-字体\\-颜色 ||\n|||编辑\\-字体\\-加粗 ||\n|||编辑\\-字体\\-下划线 ||\n|||编辑\\-字体\\-斜体 ||\n|||编辑\\-样式\\-背景色 ||\n|||编辑\\-样式\\-边框 ||\n|||编辑\\-布局\\-外边距 ||\n|||编辑\\-布局\\-内边距 ||\n||图片 |编辑\\-图片\\-地址 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_db9ff37bb21b5740aa84c7bdf825c9c8.png) </span> |\n|||编辑\\-图片\\-描述 ||\n|||编辑\\-样式\\-宽 ||\n|||编辑\\-样式\\-高 ||\n|||编辑\\-样式\\-背景色 ||\n|||编辑\\-样式\\-边框 ||\n|||编辑\\-布局\\-外边距 ||\n|||编辑\\-布局\\-内边距 ||\n|新增widgets组件 |全部元素 |新增\\-widgets\\-文本\\-预览 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_4049d1d39dbd90d257b5826d7bfc9185.png) </span> |\n|||新增\\-widgets\\-文本\\-保存 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_d2b154ab1700d9ce1922499aa75b19dc.png) </span> |\n|||新增\\-widgets\\-链接\\-预览 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_846b2a6028861f0f48f7dd4bf6b1c994.png) </span> |\n|||新增\\-widgets\\-链接\\-保存 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_1b2c3bf07d50701372d2b9c9792622ae.png) </span> |\n|||新增\\-widgets\\-图片\\-预览 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_60d01582c45bb4600ef0c8410d200013.png) </span> |\n|||新增\\-widgets\\-图片\\-保存 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_823995a71c117004fffa5fb8d8bac777.png) </span> |\n|||新增\\-widgets\\-公告\\-预览 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_68628fad35f5b2560cb8048847acab06.png) </span> |\n|||新增\\-widgets\\-公告\\-保存 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_c606e3ab888249d41f458b831a8b8c5d.png) </span> |\n|删除元素 |全部元素 |删除\\-删除 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_a92d6faaceb1b9e69759e9c1a133bee7.png) </span> |\n|||删除\\-隐藏 ||\n|操作历史 |全部元素 |操作历史\\-编辑 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_7e60b69781b4bc75ad510ea7f8a09402.png) </span> |\n|||操作历史\\-新增 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_4780ba9b6274008ba1bde62d6c4ac4ec.png) </span> |\n|||操作历史\\-删除 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_d3d761e5b302f1c82811297ddf939a1a.png) </span> |";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

<body>
<script type="application/json" id="kbdata"></script>
<div class="loading" id="loading"><div class="spin"></div><div class="ld-t">正在加载知识库</div><div class="ld-s">首次加载稍候片刻</div></div>

<div class="app" id="app" style="display:none">
  <div class="mtoggle" id="mtoggle">☰</div>
  <div class="mmask" id="mmask"></div>
  <aside id="aside">
    <div class="brand">
      <h1><span class="logo">AB</span>A/B 实验知识库</h1>
      <p>营销增长中心 · 数据驱动决策手册</p>
    </div>
    <div class="cats" id="cats"></div>
    <div class="write-btn" id="writeBtn">✍ 写新文章</div>
    <a class="admin-link" id="adminLink" href="admin.html">⚙ 管理后台</a>
    <div class="side-foot" id="sideFoot"></div>
  </aside>

  <main>
    <div class="top">
      <div class="searchbox">
        <span class="si">🔍</span>
        <input id="q" placeholder="搜索实验设计"
          data-ph-prefix="搜索"
          data-ph-kw="实验设计,报告解读,广告投放,假设检验,指标体系,AB通识"
          autocomplete="off">
        <span class="clr" id="clr">✕</span>
      </div>
      <div class="stat" id="stat"></div>
    </div>
    <div class="body" id="bodyView"></div>
  </main>
</div>

<!-- 写文章访问控制 -->
<div class="login-mask" id="loginMask">
  <div class="login-box">
    <div class="login-ic">🔒</div>
    <h3>需要授权</h3>
    <p>此操作仅限授权用户</p>
    <input id="loginPin" type="password" inputmode="numeric" placeholder="访问码" autocomplete="off">
    <button class="ed-btn" id="loginBtn">进入编辑</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-tip">登录后 2 小时内免再次验证</div>
  </div>
</div>

<!-- 写文章编辑器 -->
<div class="editor-mask" id="editorMask"></div>
<div class="editor" id="editor">
  <div class="ed-head">
    <b>✍ 写新文章</b>
    <span class="ed-close" id="edClose">✕</span>
  </div>
  <div class="ed-body">
    <div class="ed-form">
      <label>标题</label>
      <input id="edTitle" placeholder="例如：双十一大促实验复盘">
      <label>分类</label>
      <select id="edCat"></select>
      <label>检索关键词（选填，空格分隔）</label>
      <input id="edKw" placeholder="复盘 大促 转化率">
      <label>正文（Markdown）</label>
      <textarea id="edMd" placeholder="# 标题&#10;&#10;正文用 Markdown 书写，支持 **加粗**、列表、表格、代码块…&#10;&#10;## 小节&#10;- 要点一&#10;- 要点二"></textarea>
      <div class="ed-actions">
        <button class="ed-btn" id="edSubmit" style="display:none">✓ 发布文章</button>
      </div>
      <div class="ed-msg" id="edMsg"></div>
      <div class="ed-hint" id="edHint"></div>
    </div>
    <div class="ed-preview" id="edPrev">
      <div class="ed-prev-tag" id="edPrevTag"></div>
      <h1 id="edPrevTitle" style="margin:8px 0 16px"></h1>
      <div class="md" id="edPrevBody"></div>
    </div>
  </div>
</div>

<script src="../app.js?v=fe9876e1"></script>

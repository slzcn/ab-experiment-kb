<script>window.DATA_BASE="../";window.INIT_DOC=97454;window.INIT_MD="<span id=\"一-概述\"></span>\n# 概述\n\n为了追求稳定的迭代，不希望一些激进策略的实验开启或全量上线影响到产品，一般Feature发布这些影响线上的操作，是需要有审批和Review机制；而诸如一些快速迭代的业务、紧急bugfix，则希望能够快速上线，不希望有更多流程的阻塞。 综合不同业务安全性和灵活性的诉求，我们支持不同的业务可配置不同的工作流程，将审批等作为工作流程的一个环节。\n\n\n* **场景1：重要功能的实验固化为Feature**\n\n   某短视频APP计划引入直播功能，先开实验运行一段时间后得出效果显著的结论，计划将实验固化为Feature发布全量上线。不过上线直播功能是一个大的功能迭代，需要谨慎操作，故希望这类重要功能的实验固化需要经过业务线管理员审批，审批通过后再逐步灰度放量。\n\n* **场景2：紧急bugfix的Feature发布**\n\n   某APP的登录功能出现了闪退现象，经检查发现是有小bug，经过修复后在测试环境验证OK，想快速这个Feature发布全量，快速减少用户体验问题，需快速发布，不希望有审批等更多流程。\n\n\n<span id=\"二-术语说明\"></span>\n# 术语说明\n\n工作流程：由不同环节组成的不同业务的操作流程，比如实验开启、实验固化Feature、Feature都是不同的工作流程，示例如下：\n\n\n* 实验开启：①新建实验—\\>②审批—\\>③开启成功\n\n* 实验固化Feature：①生成Feature—\\>②设置发布计划—\\>③审批\n\n\n<span id=\"三-如何使用\"></span>\n# 使用工作流\n\n<span id=\"f1305328\"></span>\n## **1. 工作流程管理**\n\n\n* 功能入口：【全局设置】\\-【工作流管理】\\-【流程设置】\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_718de0d302c9a7244fe2893929cc8a0e.png) </span>\n\n\n* 目前默认有以下四种工作流程。\n\n   * Feature发布流程\n\n   * 实验开启流程\n\n   * 实验固化Feature流程\n\n   * Feature 开启/关闭流程\n\n* 工作流程具体包含哪些环节，由应用的管理员统一配置\n\n   * 可点击编辑，选择打开或关闭某些环节，默认打开的环节不可关闭。\n\n      <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_cc86916562db3be749c6ac3b2d983713.png) </span>\n\n\n<span id=\"85a18e57\"></span>\n## **2. 工作流程生效**\n\n应用管理员配置好工作流程后，该应用下的操作将会按照对应的设置执行。比如：发布Feature若设置了①设置发布计划—\\>②审批，则发布Feature时，会按照①设置发布计划—\\>②审批的流程进行，需走完该流程后，Feature发布才生效到线上。\n\n<span id=\"ba9dff44\"></span>\n## **3. 审批**\n\n**审批设置**\n\n\n* 可在工作流程管理中，打开审批开关，即为该流程增加了审批环节。\n\n* 点击审批步骤，可设置审批的规划\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_49611b6207e100911347beb1bc921e8c.png) </span>\n\n   * 审批层级：当前默认1级审批\n\n   * 添加默认的审批成员：可按角色或人员添加，添加后，该类任务的流程均默认需这些审批成员审批\n\n   * 通过机制：当前默认1人通过即通过\n\n   * 驳回机制：当前默认驳回后需要重新发起审批\n\n\n**审批任务管理**\n\n\n* 发起审批的任务，可统一在系统管理\\>\\>审批管理中查看\n\n* 有审批权限的人员，可在对待审批任务进行审批\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_d7c8a5d1e16c8f1ee6073e1322de7f77.png) </span>";</script>

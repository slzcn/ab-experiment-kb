<script>window.DATA_BASE="../";window.INIT_DOC=66982;window.INIT_MD="<span id=\"基本信息\"></span>\n## 基本信息\n\n在集团管理中，管理员及集团管理员可看到该集团的基本信息，如下图：\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/0dc958effff94a65bdc6159527c33665~tplv-em5hxbkur4-noop.image?width=1132&height=251) </span>\n\n\n* 集团编号是该集团的唯一识别标识；\n\n* 集团管理员拥有修改集团名称的权限，管理员和成员均不能对集团名称进行修改；\n\n* 在集团应用处会显示该集团下接入火山引擎增长分析的应用数量，点击应用数量即跳转至应用列表进行应用查看；\n\n* 在集团用户处会显示该集团用户的人数，点击人数则跳转至用户管理进行用户列表的查看；\n\n* 集团管理员处会显示该集团下所有管理员姓名；\n\n\n<span id=\"集团数据用量\"></span>\n## 集团数据用量\n\n在集团被授权使用或体验产品后，集团管理员会在集团中心看到授权产品的事件量消耗情况。饼图中可以查看集团整体的事件消耗量与授权事件量的占比。饼图右侧的折线图可以查看当前授权周期（账期）内每个月的事件消耗趋势。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_7f2b4d91b4ccae7fa7d1acd249aaf4e9.png) </span>\n\n点击折线图的数据点，并进一步点击“查看当前账期明细”后，折线图下方的详细数据会聚焦到选中月份，可以查看每个应用每一天的事件消耗情况。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_5264351b02d5dec8cf698748c7419aac.png) </span>\n\n下图即为聚焦到单个月份后，一个应用内每日的事件量明细。这种状态下若想返回到按月查看的状态，可以点击应用明细表格右上角【查看整体】按钮来进行。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_906e7fe42e8a0c217db96333274dc07d.png) </span>\n\n<span id=\"指标解释\"></span>\n### 指标解释\n\n\n| |有效事件量 |日均DAU |MAU |\n|---|---|---|---|\n|计算方法 |统计有效事件量之和 |以 SSID 口径统计每天触发有效事件的用户数并每日计算自然月内平均值（有极少数应用口径为user_unique_id） |以 SSID 口径统计过去一个完整月内触发有效事件的用户数（有极少数应用口径为user_unique_id） |\n|计算时机 |次日10点完成前一日统计 |次日10点完成前一日统计 |每月1日10点完成上一月统计 |";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

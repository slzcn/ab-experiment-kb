<script>window.DATA_BASE="../";window.INIT_DOC=166070;window.INIT_MD="欢迎使用DataTester！本文为您介绍在首次使用DataTester产品前，需要管理员角色完成的账号准备、产品购买等准备工作的操作，以及后续实验员、开发者的操作引导，帮助您快速开启A/B实验之旅！\n\n<span id=\"26335520\"></span>\n## 第一步：注册火山引擎账号并进入产品控制台\n\n\n1. 进入[火山引擎官网首页](https://www.volcengine.com/)，单击右上角的**立即注册**，按界面引导完成火山引擎官网账号注册及实名认证，操作详情可参见[账号注册流程](https://www.volcengine.com/docs/6261/64925)。\n\n2. 注册完成后使用账号登录火山引擎官网，进入[A/B测试的产品首页](https://www.volcengine.com/product/datatester)，单击**进入产品**，进入A/B测试控制台。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/4b70da4345f64487af4ea5b8cb317130~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"abec09c2\"></span>\n## 第二步：购买A/B测试产品\n\n完成上述步骤后，您可联系对接的售前经理购买增长分析产品。通常购买场景有以下两种：\n\n\n* 与售前经理确认后，通过火山引擎官网下单购买A/B测试产品，下单成功后自动为您开通产品的服务，详细操作步骤请参见[购买与配置A/B产品](https://www.volcengine.com/docs/6287/166062)、[购买与配置A/B产品（云托管版）](https://www.volcengine.com/docs/6287/1157764)。\n\n* 如果您与火山引擎达成为线下合作，合作达成后将由运营人员为您人工开通产品服务。\n\n\n完成购买下单后继续后续操作，将购买的增长分析产品接入集团。\n\n<span id=\"626223a0\"></span>\n## （可选）第三步：创建子账号\n\n火山引擎官网提供访问控制产品能力，支持在一个主账号下创建多个子账号，可满足企业中，为不同业务团队创建不同权限限制的子账号，分别使用已购买的产品的场景。\n\n例如，管理员购买DataTester后，可为产品团队、运营团队等业务团队分别创建子账号，并为子账号授权，后续由业务团队使用子账号来操作DataTester。\n\n创建子账号的操作指导如下。\n\n\n1. 登录火山引擎控制台后，单击右上角的**账号名称**\\>**访问控制**，进入访问控制控制台。\n\n2. 参考[访问控制-用户管理](https://www.volcengine.com/docs/6257/64977)文档，新建一个用户，后续将子账号分配给其他研发、实验人员等角色，用于后续的操作。\n\n   * 如果后续需使用子账号创建项目，则创建子账号时，需给子账号项目全局权限。\n\n   * 如果后续需使用子账号进入DataTester产品，则需添加子账号至DataTester项目并授予DataTester的操作权限。\n\n\n详情请参见下文的操作步骤。\n\n<span id=\"29a7075f\"></span>\n## 第三步：创建项目\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\">如果您使用子账号创建项目，需确保子账号拥有全局项目权限。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\">子账号创建的项目，主账号可以在<strong>访问控制</strong>\\><strong>项目</strong>页面中看到对应的项目列表，但无法直接在DataTester的控制台切换进入对应项目直接开展A/B实验，如需进入该项目，需子账号邀请主账号。</div>\n\n\n1. 登录火山引擎控制台后，单击右上角的账号名称\\>访问控制，进入访问控制控制台。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/e194039cd34c48c4826e3603b9c172a8~tplv-goo7wpa0wc-image.image) </span>\n\n2. 单击左侧导航栏的资源管理\\>项目，进入项目页面，根据业务需求，创建项目。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/aa32611aad664a2b95d48f66b7d65433~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"081fd63a\"></span>\n## 第四步：接入项目至集团\n\n\n1. 登录并进入DataTester的产品控制台，在左侧导航栏的**项目列表**页面单击**新增接入**。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/e388d8dfdb644cc38490902148ae7532~tplv-goo7wpa0wc-image.image) </span>\n\n2. 根据界面提示配置应用项目接入参数，完成后单击**提交**。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/47845640a1c5402181e0bbc86889cf83~tplv-goo7wpa0wc-image.image) </span>\n\n   其中：\n\n   * **项目名称**：选择上述步骤中已创建好的项目，如果没有创建项目，可在下拉框中单击**新建项目**，先创建好项目。\n\n   * \\*\\*项目类型：\\*\\*需根据后续此项目需要进行的实验端类型进行选择配置。\n\n   \n   |**项目类型** |**配置参数说明** |\n   |---|---|\n   |**APP** |当后续进行A/B测试的端类型为APP端时，可选择App，并配置对应App包的包ID。您可以自定义包的ID，例如配置为App包的主类相关信息，用于标识后续进行实验的包。 |\n   |**Web** |当后续进行A/B测试的端类型为Web端时，可选择Web，并配置对应的Web页面的域名。<br><br><br>* 配置结果需满足域名格式要求，例如配置为：**https://www.volcengine.com**。<br><br>* 如果涉及多个页面时，可配置多个页面，或直接配置主站域名即可。 |\n   |**广告投放** |当后续进行A/B测试的主要场景为进行广告投放分析测试时，可选择广告投放。 |\n   \n\n\n<span id=\"操作步骤\"></span>\n## 第五步：进入DataTester产品，并查看AppID等信息\n\n\n* 进入DataTester产品。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/8bc0373ca1704daa9d9fb7ebca00e787~tplv-goo7wpa0wc-image.image) </span>\n\n* 在DataTester控制台页面的左下角进入集团设置，查看项目详情，即可查看接入的Appid等信息。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/6e0d74c49cb54f6d8f43bf6caaf48ad0~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"cac67c6e\"></span>\n## 第六步：添加子账号或其他主账号至项目\n\n登录DataTester控制台后，单击左侧导航栏的**全局设置**\\>**系统管理**\\>**权限管理**，在用户管理或角色管理页面添加子账号或主账号到当前项目中。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">添加子账号或主账号至DataTester的项目时，可能会有时延，在操作完成后请您耐心等待几分钟，完成后被添加的账号即可进入对应DataTester项目，进行DataTester的相关操作。</div>\n\n\n\n* 添加子账号。\n\n   * **用户角色**：在角色管理页面添加子账号时，可直接搜索当前主账号下的子账号名。添加当前主账号下的子账号时推荐使用此种方式，更为便捷。\n\n   * **用户管理**：在用户管理页面添加子账号时，格式为：**子账号名称@主账号uid**。添加其他主账号下的子账号时，需使用此种方式。\n\n* 添加主账号。\n\n   您需要在用户管理页面添加其他主账号，格式为：**主账号uid**。添加完成后，后续可将邀请链接发送给对应主账号进行邀请验证。\n\n\n<span id=\"aeb57991\"></span>\n## 后续操作\n\n完成上述准备工作后，您即可结合业务需要规划设计对应的实验，后续：\n\n\n* 如果有其他用户需要参与DataTester的操作，您可以参考上述步骤为其创建子账号并邀请，或邀请其他主账号。\n\n* 由研发将实验所需的数据接入A/B实验，数据接入的快速入门请参见[快速入门：研发](https://www.volcengine.com/docs/6287/663094)。\n\n* 由实验员根据规划开启实验，并在实验周期结束后查看分析实验结果报告。开启实验的快速入门请参见[开实验前准备工作](https://www.volcengine.com/docs/6287/65806)。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。

</script>

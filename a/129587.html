<script>window.DATA_BASE="../";window.INIT_DOC=129587;window.INIT_MD="<span id=\"一-概述\"></span>\n# 一. 概述\n\n本文档提供「A/B测试」应用中开放接口V3版本的说明。\n\n可用范围包括\n\n\n* 实验信息：创建实验、获取实验详情、获取实验列表、修改实验、开始实验、结束实验\n\n* 指标信息：创建指标、删除指标、获取指标详情、获取指标列表、全量修改指标信息、修改指标状态\n\n* 互斥组信息：获取互斥组列表、新建互斥组\n\n* 报告页信息：获取实验报告基础数据\n\n\n如需使用老版本开放接口，请参考：[A/B测试开放接口](https://www.volcengine.com/docs/6287/65829)\n\n<span id=\"二-联系开通\"></span>\n# 二. 联系开通\n\n为了保证您和用户的数据安全，开放接口权限默认是关闭的。\n\n在开始使用之前，您需要联系我们开通。（您可以通过服务对接的飞书/微信群或页面右下角的在线客服与我们取得联系）\n\n\n* 开通后，我们会为您提供导出所需的AK/SK，收到后请务必妥善保管和使用。\n\n* 开通时请和对接人员确认需要开放的接口范围以及接口使用额度，不在开放范围内的接口以及超出限额的接口请求将被拒绝。\n\n\n<span id=\"三-使用方式\"></span>\n# 三. 使用方式\n\n为了方便集成和使用OpenAPI，我们提供了SDK。其主要功能是提供了对签名过程和复杂查询参数的包装。\n\nSDK已经在 Github 上开源，建议使用Github 源码的方式进行集成。\n\n基本使用流程为：\n\n\n1. 根据ak, sk, API 服务地址初始化一个RangersClient\n\n2. 使用RangersClient的`request`接口或者`data_tester`来调用具体API（具体的方法名称在不同的语言上会有命名格式的区别）\n\n\n由于中国区和非中国区是隔离不互通的，OpenAPI 的服务地址需要根据所在地区进行设置：\n\n\n* 中国区：https://analytics.volcengineapi.com\n\n* 非中国区： https://analytics.byteplusapi.com\n\n* 私有化部署：根据私有化部署的环境来获取，即产品的域名地址。\n\n\n<span id=\"sdk使用说明\"></span>\n## SDK使用说明\n\n<span id=\"java\"></span>\n### Java\n\n\n* 源码：https://github.com/volcengine/datafinder\\-sdk\\-openapi\\-java\n\n* 软件包：https://github.com/volcengine/datafinder\\-sdk\\-openapi\\-java/raw/main/release/javasdk.zip\n\n* 初始化示例：\n\n\n```java\nString ak = \"{使用AK替换}\";\nString sk = \"{使用SK替换}\";\n\n// SDK 的默认url地址是指向中国区 SAAS 的\nRangersClient bc = new RangersClient(ak, sk);\n\n// 海外和私有化需要指定url地址, 可以参考上文\nString url=\"{使用非中国区或者Tester服务域名替换}\";\nRangersClient bc = new RangersClient(ak, sk, url);\n\nString result = bc.dataTester(\"/openapi/v1/openapi-test\", \"GET\");\nSystem.out.println(result);\n```\n\n\n<span id=\"python\"></span>\n### Python\n\n\n* 源码：https://github.com/volcengine/datafinder\\-sdk\\-openapi\\-py\n\n* 软件包：https://github.com/volcengine/datafinder\\-sdk\\-openapi\\-py/raw/main/release/rangersdk\\-1.2.0.tar.gz\n\n\nPython SDK 软件包的形式下载后在shell执行以下命令完成安装：\n\n```bash\n# python需要3.7及以上版本\npip install rangersdk-${version}.tar.gz\n```\n\n\n\n* 初始化示例：\n\n\n```python\nfrom rangersdk import RangersClient\n\nak = '{使用AK替换}'\nsk = '{使用SK替换}'\nbc = RangersClient(ak, sk)\n\n# 海外和私有化需要指定url地址, 可以参考上文,\nurl = '{使用非中国区或者Tester服务域名替换}'\n# 注意这里传参数，一定要写成 url=url\nbc = RangersClient(ak, sk, url=url)\n\nre = bc.data_tester(\"/openapi/v1/openapi-test\", method=\"GET\")\nprint(re.json())\n```\n\n\n<span id=\"golang\"></span>\n### Golang\n\n\n* 源码：https://github.com/volcengine/datafinder\\-sdk\\-openapi\\-go\n\n* 软件包：https://github.com/volcengine/datafinder\\-sdk\\-openapi\\-go/raw/main/release/gosdk.zip\n\n* 初始化示例：\n\n\n```go\nvar (\n   ak = \"{使用AK替换}\"\n   sk = \"{使用SK替换}\"\n)\nbc := dslcontent.NewRangersClient(ak, sk)\n\n// 海外和私有化需要指定url地址, 可以参考上文\nurl = '{使用非中国区或者Tester服务域名替换}'\nbc := dslcontent.NewRangersClientWithUrl(ak, sk, url)\n\nres, _ := bc.DataTester(\"/openapi/v1/openapi-test\", \"GET\")\ndata, err := ioutil.ReadAll(res.Body)\nfmt.Println(err, string(data))\n```\n\n\n<span id=\"js\"></span>\n### JS\n\n\n* 源码：https://github.com/volcengine/datafinder\\-sdk\\-openapi\\-js\n\n* 软件包：https://github.com/volcengine/datafinder\\-sdk\\-openapi\\-js/raw/main/release/nodejssdk.zip\n\n* 初始化示例：\n\n\n```js\nak = \"{使用AK替换}\"\nsk = \"{使用SK替换}\"\nbc = new RangersClient(ak, sk)\n\n// 海外和私有化需要指定url地址, 可以参考上文\nurl = '{使用非中国区或者Tester服务域名替换}'\nbc = RangersClient(ak, sk, url=url)\n\nbc.dataTester(\"/openapi/v1/openapi-test\", {method: \"GET\"})\n    .then(res => res.json())\n    .then(response => {\n        if (200 !== response['code']) {\n            throw \" result is not ok, code: \" + response['code'] + \", message: \" + response['message'];\n        }\n        console.log(response)\n        console.log('success.')\n    })\n    .catch(error => console.error('error:', error));\n```\n\n\n<span id=\"php\"></span>\n### PHP\n\n\n* 源码：https://github.com/volcengine/datafinder\\-sdk\\-openapi\\-php\n\n* 软件包：https://github.com/volcengine/datafinder\\-sdk\\-openapi\\-php/raw/main/release/phpsdk.zip\n\n* 初始化示例：\n\n\n```php\n$ak = \"{使用AK替换}\";\n$sk = \"{使用SK替换}\";\n$bc = new RangersClient($ak, $sk);\n\n// 海外和私有化需要指定url地址, 可以参考上文\n$url = '{使用非中国区或者Tester服务域名替换}'\n$bc = new RangersClient($ak, $sk, $url);\n\necho $bc->dataTester(\"/openapi/v1/openapi-test\", \"GET\");\n```\n\n\n<span id=\"sdk使用注意\"></span>\n## SDK使用注意\n\n<span id=\"中文编码\"></span>\n### 中文编码\n\n获取列表的相关接口（实验、指标、互斥组）支持根据关键字查询，如需查询中文，Java、Python、PHP需要调用前自行进行url转码，转码方法如下\n\ngolang SDK和nodeJs SDK不需要自行转码\n\n**Java**\n\n```java\nimport java.net.URLEncoder;\n\nString keyword = URLEncoder.encode(\"中文关键字\", \"UTF-8\")\n```\n\n\n**Python**\n\n```python\nimport urllib.parse\n\nkeyword = urllib.parse.quote(\"中文关键字\", encoding=\"UTF-8\")\n```\n\n\n**PHP**\n\n```php\n$keyword = urlencode(\"中文关键字\");\n```\n\n\n<span id=\"四-接口说明\"></span>\n# 四. 接口说明\n\n<span id=\"创建实验\"></span>\n## 创建实验\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">开放接口所创建的实验，仅管理员可编辑</div>\n\n\n**接口描述：**  创建一个编程实验或MAB实验。\n\n**请求路径：** `/openapi/v3/apps/{app_id}/experiments`\n\n**请求方法：POST**\n\n**请求参数**\n\n\n|参数名称 |参数类型 |是否必填 |描述 |备注 |\n|---|---|---|---|---|\n|name |string |是 |实验名称 |不能与当前APP下已有实验重名，长度限制200字符 |\n|description |string |否 |实验描述 |长度限制1000字符 |\n|tags |string |否 |实验标签 |[\"123\", \"456\"] |\n|owners |object |否 |创建人 |实验owner列表，owner的object数据结构包括id和name两个参数：<br><br><br>* id：int类型，必填，表示用户ID。<br><br>* name：string类型，必填，表示用户名。<br><br><br>您可以使用**用户信息查询**接口获取实验owners的数值。 |\n|endpoint_type |int |是 |实验类型 |0\\-客户端实验，1\\-服务端实验 |\n|duration |int |是 |实验时长 |单位天，范围：[1, 365] |\n|major_metric |int |是 |核心指标ID |必须在metrics中 |\n|metrics |int[] |是 |关注的指标ID列表 |必须包含major_metric |\n|versions |object[] |是 |实验版本配置 |数组长度要大于等于2，详见version结构说明 |\n|layer_info |object |是 |实验层配置 |详见layer_info说明 |\n|mab_info |object |否 |MAB实验配置信息 |如果是创建MAB实验，该字段必传。详细介绍请参见下文的mab_info结构说明。 |\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">配置mab组和对应的非mab组的配置要相同，也就是mab和非mab组的配置是一对一对的。具体参见下文的例子，例如智能调优组\"对照组\"和评估组\"对照组\\-Besfw\"是一一对应的。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">私有化480版本mab核心指标只支持单事件转化率类型的指标，uv_per_dau（算子为：转化率）。</div>\n\n\n\n**version结构说明**\n\n\n|参数名称 |参数类型 |是否必填 |描述 |备注 |\n|---|---|---|---|---|\n|type |int |是 |对照版本/实验版本 |0\\-对照版本，1\\-实验版本 versions数组中只能有一个对照版本 |\n|name |string |是 |版本名称 |长度50字符 |\n|description |string |否 |版本描述 |长度1000字符 |\n|weight |float |否 |实验版本的流量分配 |范围[0.001, 1] 0.1% ~ 100%<br><br>versions数组中不传，则默认均匀分配 如果传，则会校验所有weight的和是否为1 |\n|config |object |是 |版本配置 |version数组中所有config的key需要保持一致 |\n|users |string[] |否 |白名单用户 |不同版本的白名单用户不能有交集 |\n|is_mab |int |否 |是否为mab智能流量组，取值：0或1 | |\n\n\n**layer_info结构说明**\n\n\n|参数名称 |参数类型 |是否必填 |描述 |备注 |\n|---|---|---|---|---|\n|layer_id |int |否 |互斥组ID |使用的实验层，使用默认层则传\\-1或不传<br><br>如果指定了layer_id，则会校验实验层上可用流量是否满足实验配置 |\n|version_resource |float |是 |实验流量占比 |范围[0.001, 1]，最小精度千分之一 |\n\n\n**mab_info结构说明**\n\n\n|**参数名称** |**参数类型** |**是否必填** |**描述** |**备注** |\n|---|---|---|---|---|\n|interval_time |int |是 |调优间隔，单位：秒 |单位秒，最小间隔30分钟，并且按照30分钟增加，例如1800, 3600, 5400。 |\n|non_mab_traffic |int |是 |评估流量占比 |百分比，例如6就是6%，每个实验组最低需要3%的评估流量，例如三个实验组最低需要9%的评估流量。 |\n\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |int |新创建实验ID |\n\n\n**示例**\n\n编程实验，两个评估组，两个智能调优组，一共4个组，调优间隔30分钟，评估流量6%。\n\n```JSON\n{\n    \"name\": \"test-mab\",\n    \"duration\": 14,\n    \"versions\": [\n        {\n            \"name\": \"对照组\",\n            \"label\": \"对照组\",\n            \"weight\": 0.47,\n            \"is_mab\": 1,\n            \"type\": 0,\n            \"config\": {\n                \"HcCVhO\": \"_Lf5XM\"\n            },\n            \"users\": []\n        },\n        {\n            \"name\": \"实验组1\",\n            \"label\": \"实验组1\",\n            \"weight\": 0.47,\n            \"is_mab\": 1,\n            \"type\": 1,\n            \"config\": {\n                \"HcCVhO\": \"TAqqd4\"\n            },\n            \"users\": []\n        },\n        {\n            \"name\": \"对照组-Besfw\",\n            \"label\": \"对照组\",\n            \"weight\": 0.03,\n            \"is_mab\": 0,\n            \"type\": 1,\n            \"config\": {\n                \"HcCVhO\": \"ij45wC\"\n            },\n            \"users\": []\n        },\n        {\n            \"name\": \"实验组1-fL17k\",\n            \"label\": \"实验组1\",\n            \"weight\": 0.03,\n            \"is_mab\": 0,\n            \"type\": 1,\n            \"config\": {\n                \"HcCVhO\": \"WRDoSW\"\n            },\n            \"users\": []\n        }\n    ],\n    \"major_metric\": 100942,\n    \"metrics\": [\n        100940,\n        100941,\n        100942,\n        100943,\n        100944,\n        100945,\n        100946\n    ],\n    \"mode\": 1,\n    \"mab_info\": {\n        \"interval_time\": 1800,\n        \"non_mab_traffic\": 6\n    },\n    \"endpoint_type\": 0,\n    \"layer_info\": {\n        \"layer_id\": -1,\n        \"version_resource\": 1\n    }\n}\n```\n\n\n<span id=\"获取实验详情\"></span>\n## 获取实验详情\n\n**说明：**  根据实验ID获取实验详情\n\n**请求路径：** `/openapi/v3/apps/{app_id}/experiments/{experiment_id}`\n\n**请求方法：GET**\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |object |接口返回的实验信息 |\n\n\n**data信息**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|experiment |object |实验信息 |\n\n\n**experiment结构说明**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|id |int |实验的experiment_id |\n|name |string |实验名称 |\n|tags |string |实验标签列表 |\n|owners |object |owner信息列表，包含以下字段：<br><br><br>* id：int，账号ID<br><br>* name：string，用户名<br><br>* account：string，用户账号名称 |\n|launch_start_time |long |实验开始时间，Unix时间戳 |\n|end_time |long |实验结束时间，Unix时间戳 |\n|create_time |long |实验创建时间，Unix时间戳 |\n|modify_time |long |实验修改时间，Unix时间戳 |\n|test_start_time |long |实验调试开始时间，Unix时间戳 |\n|duration |long |实验运行时间，单位秒 |\n|confidence_level |int |置信度水平，95代表置信度水平为95% |\n|version_resource |float |实验所占流量，范围[0.001, 1]，1为100% |\n|layer_id |int |实验层id |\n|freeze_status |int |实验冻结状态 1\\-冻结，0\\-没冻结 |\n|freeze_time |long |实验冻结时间，Unix时间戳（只有冻结状态为1时才有效） |\n|version_freeze_status |boolean |是否进组不出组<br><br><br>* true：是<br><br>* false：否 |\n|pause_status |boolean |实验是否暂停<br><br><br>* true：暂停<br><br>* false：不暂停 |\n|endpoint_type |int |0\\-客户端实验，1\\-服务端实验 |\n|versions |object[] |实验版本信息 |\n|metrics |object[] |实验关注指标信息 |\n|status |int/enum |实验状态， 0:已结束 1:运行中 2: 待调度 3:调试中 |\n|filters |string |实验受众目标，json字符串 |\n|description |string |实验描述 |\n\n\n**metric结构说明**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|id |int |指标id |\n|name |string |指标名称 |\n|description |string |指标描述 |\n|is_primary |int |是否核心指标：0\\-否 1\\-是 |\n|calculate_type |string |指标计算类型 |\n|dsl |object |指标dsl |\n|status |int |指标状态 0: 已下线 1:没下线 |\n|is_composed |boolean |是否组合指标：true/false |\n|data_type |string |指标展现数值格式 |\n|metric_type |string |指标类型，枚举值如下：<br><br><br>* tea：事件指标<br><br>* funnel：漏斗指标<br><br>* retention_all：预置留存指标。<br><br>* custom_retention：自定义留存指标。<br><br>* portable：数仓指标。<br><br>* event：事件指标，过往曾使用“event”表示事件指标，当前事件指标均使用“tea”。<br><br>* 其他枚举值：其他指标类型。 |\n\n\n**version结构说明**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|id |int |版本id |\n|type |int |版本类型：0\\-对照版本，1\\-实验版本 |\n|name |string |版本名称 |\n|description |string |版本描述 |\n|config |object |版本配置 |\n|weight |int |版本权重，和为1000，1代表0.1% 为0则为均匀分配 |\n|user_list |string[] |白名单列表 |\n\n\n<span id=\"获取实验列表\"></span>\n## 获取实验列表\n\n**说明：**  分页获取APP下的实验列表\n\n**注意：如果搜索关键字keyword包含中文，则需要先进行url转义，再进行调用**\n\n**请求路径：** `/openapi/v3/apps/<app_id>/experiments`\n\n**请求方法：GET**\n\n**URL查询参数**\n\n\n|参数 |类型 |说明 |\n|---|---|---|\n|status |int |实验状态，0\\-已结束，1\\-运行中，3\\-测试中；不传则默认所有状态 |\n|page |int |分页参数，1表示第一页，不传默认为1 |\n|page_size |int |每页数量，不传默认99 |\n|keyword |string |搜索关键字，当前支持按照实验name和description模糊搜索 |\n|sort_by |string |排序规则。当前仅支持 end_time结束时间、launch_start_time实验启动时间、test_start_time测试开始时间； 不传默认实验创建时间 |\n|sort_order |string |排序顺序。desc/asc。不传默认desc降序 |\n\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |object |{<br><br>\"experiments\": [],<br><br>\"page\": {<br><br>\"current_page\": 1, // 当前页<br><br>\"total_pages\": 0, // 总页数<br><br>\"total_items\": 0 // 总条目数<br><br>}<br><br>} |\n\n\n**experiments结构说明**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|id |int |实验ID |\n|name |string |实验名称 |\n|end_time |long |实验结束时间，Unix时间戳 |\n|test_start_time |long |实验调试开始时间，Unix时间戳 |\n|launch_start_time |long |实验开始时间，Unix时间戳 |\n|duration |long |实验运行时间，单位秒 |\n|version_resource |float |实验所占流量，范围[0.001, 1]，1为100% |\n|layer_id |int |实验层id |\n|freeze_status |int |实验冻结状态 1\\-冻结，0\\-没冻结 |\n|freeze_time |long |实验冻结时间，Unix时间戳（只有冻结状态为1时才有效） |\n|version_freeze_status |boolean |是否进组不出组<br><br><br>* true：是<br><br>* false：否 |\n|pause_status |boolean |实验是否暂停<br><br><br>* true：暂停<br><br>* false：不暂停 |\n|endpoint_type |int |0\\-客户端实验，1\\-服务端实验 |\n|description |string |实验描述 |\n|status |int/enum |实验状态， 0:已结束 1:运行中 2: 待调度 3:调试中 |\n|owner |字符串 |实验创建人 |\n|versions |object[] |实验版本信息 |\n\n\n<span id=\"修改实验信息\"></span>\n## **修改实验信息**\n\n**说明：**  修改实验的配置信息。**通过Method来区分是全量修改还是部分修改**。\n\n\n* 全量修改：Method=PUT。请求参数中的所有必填参数必须包含。\n\n* 部分修改：Method=PATCH。可以任意传递支持的配置参数，请求体中有的参数，才会进行校验与修改，请求体中没有的参数，则会保持现状。\n\n\n**注意：由于使用的网络库本身不支持不支持PATCH方法，因此Java SDK暂不支持PATCH方法**\n\n**请求路径：** `/openapi/v3/apps/{app_id}/experiments/<experiment_id>`\n\n请求方法：PUT/PATCH\n\n**请求参数**\n\n\n|参数名称 |参数类型 |是否必须 |描述 |备注 |\n|---|---|---|---|---|\n|name |string |是 |实验名称 |不能与已有实验重名，长度50字符 |\n|description |string |否 |实验描述 |长度1000字符 |\n|tags |string |否 |实验标签 |[\"123\", \"456\"] |\n|owners |object |否 |创建人 |实验owner列表 |\n|duration |int |是 |实验时长 |单位天，[1, 365]，整数 |\n|major_metric |int |是 |核心指标 ID |运行中不可修改 测试中可以修改 |\n|metrics |int[] |是 |指标ID列表 | |\n|versions |object[] |是 |实验版本 |version数量不可变动，只可以修改version内容 |\n|layer_info |object |否 |互斥组 | |\n\n\n**version结构**\n\n\n|参数名称 |参数类型 |是否必填 |描述 |备注 |\n|---|---|---|---|---|\n|id |int |是 |版本ID |修改version信息必填 |\n|name |string |是 |版本名称 |长度50字符 |\n|description |string |否 |版本描述 |长度1000字符 |\n|weight |float |否 |流量分配 |范围[0.001, 1] 0.1% ~ 100%<br><br>versions数组中不传，则默认均匀分配<br><br>如果传，则会校验所有weight的和是否为1 |\n|config |object |是 |版本参数不同版本的 key<br><br>需要保持一致 |version数组中所有config的key需要保持一致 |\n|users |string[] |否 |白名单用户 | |\n\n\n**layer_info结构**\n\n\n|参数名称 |参数类型 |是否必填 |描述 |备注 |\n|---|---|---|---|---|\n|layer_id |int |否 |互斥组 ID | |\n|version_resource |float |是 |占用流量百分比 |范围[0.001, 1]，最小精度千分之一 |\n\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |object |实验ID |\n\n\n<span id=\"90df9025\"></span>\n## 修改实验关联指标组\n\n**说明：**  修改实验关联的指标组，设置结果会直接覆盖实验关联指标的配置。\n\n**请求路径**： `/openapi/v3/apps/<app_id>/metric_groups/experiments/{experiment_id}/update_watching_metric_groups`\n\n**请求方法**: PUT\n\n\n* 请求体请求参数如下。\n\n   \n   |参数名称 ||类型 |是否必须 |描述 |\n   |---|---|---|---|---|\n   |relation_metric_groups | |[object] |是 |修改后实验关联的指标组列表。指标组列表中的每个指标对象包含：metric_group_id、metric_ids、type三个字段，详细说明可参见表格下方的参数说明。<br><br><div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div><br><br><br><div data-tips=\"true\" data-tips-type=\"warning\">调用此接口修改实验关联指标组时，会将本次设置结果直接覆盖实验的指标配置，而非基于此前实验的指标配置基础上进行新增、删除的操作。因此建议在进行修改前，您可调用“获取实验详情”接口先了解当前实验的指标有哪些，需要保留的指标组需同时添加在本次的修改指标中。</div><br> |\n   | |metric_ids |[int] |是 |指标ID列表，配置为修改后实验的指标ID列表。您可以通过“获取指标列表”接口获取指标ID。<br><br><div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div><br><br><br><div data-tips=\"true\" data-tips-type=\"warning\">此处配置的指标需要为当前实验所在应用下创建的指标。</div><br> |\n   | |metric_group_id |int |是 |指标组ID，您可以通过“获取指标详情”接口，基于指标ID获取指标组ID。 |\n   | |type |string |是 |修改后实验的指标类型，支持设置为：<br><br><br>* core：实验核心指标，仅支持设置一个实验核心指标。<br><br>* watching：实验关注指标，支持设置多个实验关注指标。 |\n   \n\n* 请求示例\n\n   ```JSON\n   {\n       \"relation_metric_groups\": [\n           {\n               \"metric_group_id\": 1679062,\n               \"metric_ids\": [\n                   114314\n               ],\n               \"type\": \"core\"\n           },\n           {\n               \"metric_group_id\": 158338,\n               \"metric_ids\": [\n                   83731\n               ],\n               \"type\": \"watching\"\n           }\n       ]\n   }\n   ```\n   \n\n\n**返回参数**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |int |NULL |\n\n\n<span id=\"开始实验\"></span>\n## 开始实验\n\n**说明：**  开始一个测试中的实验。使其状态变为运行中。\n\n**请求路径：**  `/openapi/v3/apps/<app_id>/experiments/<experiment_id>/launch`\n\n**请求方法：**  PUT\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |object |实验ID |\n\n\n<span id=\"0e84d636\"></span>\n## 暂停实验\n\n**说明：**  暂停指定实验\n\n**请求路径** : `/openapi/v3/apps/<app_id>/experiments/<experiment_id>/pause`\n\n**请求方法:**  POST\n\n**请求参数**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|duration |int |暂停某个实验时，实验流量是平滑生效的，通过此参数设置平滑生效的时间是多少分钟 |\n\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n\n\n<span id=\"b1045cd1\"></span>\n## 恢复实验\n\n**说明：**  恢复指定实验\n\n**请求路径** : `/openapi/v3/apps/<app_id>/experiments/<experiment_id>/restore`\n\n**请求方法:**  POST\n\n**请求参数**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|duration |int |恢复某个实验时，实验流量是平滑生效的，通过此参数设置平滑生效的时间是多少分钟 |\n\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n\n\n<span id=\"结束实验\"></span>\n## 结束实验\n\n**说明：**  结束指定实验\n\n**请求路径** : `/openapi/v3/apps/<app_id>/experiments/<experiment_id>/stop`\n\n**请求方法:**  PUT\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |object |实验ID |\n\n\n<span id=\"创建指标\"></span>\n## 创建指标\n\n**说明**： 创建一个A/B测试指标\n\n**请求路径：**  `/openapi/v3/apps/<app_id>/metrics`\n\n**请求方法**：POST\n\n**请求参数**\n\n\n|参数名称 |类型 |是否必须 |描述 |备注 |\n|---|---|---|---|---|\n|name |string |是 |指标名称 |长度限制 50，不可与相同APP下其他指标重复 |\n|description |string |否 |指标描述 |长度限制 1000 |\n|dsl |object |是 |指标DSL |dsl详情可咨询对接人员 |\n|composed |boolean |是 |是否是组合指标 |true/false |\n|data_type |string |否 |数据展示类型 |枚举值<br><br>number_0, number_1, number_2, number_3, number_4, number_5,<br><br>percent_0, percent_1, percent_2, percent_3, percent_4, percent_5<br><br>默认为percent_4，即百分数四位小数 |\n\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |int |指标ID |\n\n\n<span id=\"基于指标模板创建指标\"></span>\n## **基于指标模板创建指标**\n\n**说明：**  基于现存的A/B测试指标，通过修改其中的属性过滤信息，创建新的A/B测试指标。只会替换模板指标中同名的属性值，模板指标中不存在的属性会忽略。如果传入多个 metrics，要修改的属性信息会分别应用于每个 metric。\n\n可以简单理解为把每个模板指标都复制一份，然后修改其已存在的 property 信息。\n\n**请求路径：**  /openapi/v3/apps/<app_id\\>/metrics/create\\-from\\-templates\n\n**请求方法：**  POST\n\n**请求参数**\n\n\n|参数名称 |类型 |是否必须 |描述 |备注 |\n|---|---|---|---|---|\n|metrics |list[metric] |是 |指标信息列表 |metric 见下表说明 |\n|properties |list[property] |是 |需要修改的属性信息 |property 见下表说明 |\n\n\nmetric字段说明\n\n\n|参数名称 |类型 |是否必须 |描述 |备注 |\n|---|---|---|---|---|\n|metric_id |int |是 |模板指标id |已存在的指标id |\n|name |string |是 |根据模板指标，新建指标的名称 |长度限制 50，不可与相同APP下其他指标重复 |\n|description |string |否 |根据模板指标，新建指标的指标信息 |长度限制 1000 |\n\n\nproperty字段说明\n\n\n|参数名称 |类型 |是否必须 |描述 |备注 |\n|---|---|---|---|---|\n|property_name |string |是 |属性名称 |模板中不存在的属性名会直接忽略，不报错 |\n|property_values |string/int/float数组 |是 |属性值 |长度限制255，如果为空，则是[]；属性值类型需要与模板指标的属性类型保持一致。具体字段说明可参考 [V3 DSL 字段详细说明](https://bytedance.feishu.cn/wiki/wikcnoc1Nr7G3hcECZeQq9zA2Pf#) |\n\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |list[object] |新创建的指标信息 |\n\n\nobject字段说明\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|id |int |新创建的指标ID |\n|name |string |新创建的指标名称 |\n\n\n```sql\ncurl --location --request POST '{host}/datatester/openapi/v3/apps/253047/metrics/create-from-template' \\\n--header 'Content-Type: application/json' \\\n--data-raw '{\n    \"metrics\": [\n        {\n            \"metric_id\": 33487,\n            \"name\": \"测试一下事件指标5\",\n            \"description\": \"这是一个description\"\n        },\n        {\n            \"metric_id\": 33488,\n            \"name\": \"测试一下事件指标6\",\n            \"description\": \"这是一个description\"\n        }\n    ],\n    \"properties\": [\n        {\n            \"property_name\": \"app_channel\",\n            \"property_values\": [\n                \"channel3\",\n                \"channel4\"\n            ]\n        },\n        {\n            \"property_name\": \"account_id\",\n            \"property_values\": [\n                \"1234556\",\n                \"7654321\"\n            ]\n        }\n    ]\n}'\n```\n\n\n<span id=\"删除指标\"></span>\n## 删除指标\n\n**说明：**  删除指定的指标。**如果指标有已经关联的实验，则无法删除**\n\n**请求路径:**  `/openapi/v3/apps/<app_id>/metrics/<metric_id>`\n\n**请求方法: DELETE**\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |int |指标ID |\n\n\n<span id=\"获取指标详情\"></span>\n## 获取指标详情\n\n**说明：**  获取指定指标的详情数据\n\n**请求路径：**  `/openapi/v3/apps/<app_id>/metrics/<metric_id>`\n\n**请求方法: GET**\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |object |指标信息 |\n\n\n**指标信息说明**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|id |int |指标ID |\n|name |string |指标名 |\n|description |string |描述 |\n|dsl |object |指标dsl |\n|composed |boolean |是否是组合指标 |\n|status |int |状态 0\\-下线 1\\-上线 |\n|is_support_major |boolean |是否支持设置为核心指标 |\n|is_required |int |是否是必看指标，0：不是，1：是 |\n|metric_group |object |该指标所属的指标组信息，详情见下文的metric_group结构说明 |\n\n\n**metric_group结构说明**\n\n\n|**参数名称** |**参数类型** |**描述** |\n|---|---|---|\n|id |int |指标组ID |\n|name |string |指标组名称 |\n|uba_report_type |int |指标组类型，枚举值：1\\-事件指标；2\\-留存指标；3\\-漏斗指标 |\n\n\n<span id=\"获取指标列表\"></span>\n## 获取指标列表\n\n**说明：**  分页获取APP下的指标列表\n\n**请求路径：** `/openapi/v3/apps/<app_id>/metrics`\n\n**请求方法：GET**\n\n**URL查询参数**\n\n\n|参数 |类型 |说明 |\n|---|---|---|\n|status |int |指标状态，0\\-下线 1\\-上线，不传则默认所有状态 |\n|page |int |分页参数，1表示第一页，不传默认为1 |\n|page_size |int |每页数量，不传默认99 |\n|keyword |string |搜索关键字，当前支持按照指标name和description模糊搜索 |\n\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |object |{<br><br>\"metrics\": [],<br><br>\"page\": {<br><br>\"current_page\": 1, // 当前页<br><br>\"total_pages\": 0, // 总页数<br><br>\"total_items\": 0 // 总条目数<br><br>}<br><br>} |\n\n\n**指标信息说明**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|id |int |指标ID |\n|name |string |指标名 |\n|description |string |描述 |\n|dsl |object |指标dsl |\n|composed |boolean |是否是组合指标 |\n|status |int |状态 0\\-下线 1\\-上线 |\n|is_support_major |boolean |是否支持设置为核心指标 |\n\n\n<span id=\"全量修改指标信息\"></span>\n## 全量修改指标信息\n\n**说明：**  全量修改指标的信息，DSL暂时无法修改，只可以修改名称、描述和数据类型\n\n**请求路径：**  `/openapi/v3/apps/<app_id>/metrics/<metric_id>`\n\n**请求方法: PUT**\n\n**请求体**\n\n\n|参数名称 |类型 |是否必须 |描述 |备注 |\n|---|---|---|---|---|\n|name |string |是 |指标名称 |最大长度50，不可重复 |\n|description |string |否 |指标描述 |最大长度1000 |\n|data_type |string |否 |指标数据类型 |枚举值<br><br>number_0, number_1, number_2, number_3, number_4, number_5,<br><br>percent_0, percent_1, percent_2, percent_3, percent_4, percent_5<br><br>默认为percent_4，即百分数四位小数 |\n\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |int |指标ID |\n\n\n<span id=\"修改指标状态\"></span>\n## 修改指标状态\n\n**说明：**  修改指标的状态（上线、下线）。**JAVA SDK暂不支持此接口**\n\n**请求路径：**  `/openapi/v3/apps/<app_id>/metrics/<metric_id>`\n\n**请求方法: PATCH**\n\n**请求体**\n\n\n|参数名称 |类型 |是否必须 |描述 |备注 |\n|---|---|---|---|---|\n|status |int |是 |指标状态 |0\\-下线 1\\-上线 |\n\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |int |指标ID |\n\n\n<span id=\"获取互斥组列表\"></span>\n## 获取互斥组列表\n\n**说明：**  分页获取APP下互斥组的列表\n\n**请求路径**： /openapi/v3/apps/<app_id\\>/layers\n\n**请求方法: GET**\n\n**URL查询参数**\n\n\n|参数 |类型 |说明 |\n|---|---|---|\n|keyword |string |查询关键字，可以根据name和description模糊查询 |\n|endpoint_type |int |互斥组的端类型。0\\-客户端层，1\\-服务端层 |\n|page |int |查询页码。默认为1 |\n|page_size |int |每页数量，默认为99 |\n\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |object |{<br><br>\"layers\": [],<br><br>\"page\": {<br><br>\"current_page\": 1, // 当前页<br><br>\"total_pages\": 0, // 总页数<br><br>\"total_items\": 0 // 总条目数<br><br>}<br><br>} |\n\n\n**互斥组信息说明**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|id |int |互斥组ID |\n|name |string |互斥组名 |\n|description |string |描述 |\n|endpoint_type |int |端类型，0\\-客户端层，1\\-服务端层 |\n|available_traffic |int |剩余流量，1000代表100% |\n\n\n<span id=\"新建互斥组\"></span>\n## 新建互斥组\n\n**说明：**  创建一个新的互斥组\n\n**请求路径：**  `/openapi/v3/apps/<app_id>/layers`\n\n**请求方法: POST**\n\n**请求参数**\n\n\n|参数名称 |类型 |是否必须 |说明 |\n|---|---|---|---|\n|name |string |是 |互斥组名，长度限制50 |\n|description |string |否 |描述，长度限制1000 |\n|endpoint_type |int |是 |端类型，0\\-客户端层，1\\-服务端层 |\n\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |int |互斥组ID |\n\n\n<span id=\"5ac82ff9\"></span>\n## 获取实验报告\\-分组结论概览\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">当前实验报告相关数据获取仅支持天粒度的数据获取，暂不支持小时等更细粒度的数据。</div>\n\n\n**说明**：用于获取实验报告分组结论概览。\n\n**请求路径** : /openapi/v3/apps/<app_id\\>/experiments/<experiment_id\\>/summary\\-data\n\n**请求方法: GET**\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |object |报告数据，详情请参见下文的报告数据结构说明。 |\n\n\n**报告数据结构说明**\n\n\n|**参数名称** |**参数类型** |**描述** |\n|---|---|---|\n|summary_infos |list[object] |报告概览数据，详情请参见下文的summary_infos结构说明。 |\n|report_type |string |报告类型：day。表示报告的查询时间粒度为天级 |\n|start_ts |int |查询开始时间，UNIX时间戳 |\n|end_ts |int |查询结束时间，UNIX时间戳 |\n|user_data |object |各版本进组人数 |\n\n\n**summary_infos结构说明**\n\n\n|**参数名称** |**参数类型** |**描述** |\n|---|---|---|\n|major_metric_name |string |核心指标名称 |\n|summary |list[object] |指标概览数据 |\n\n\n**返回示例**\n\n```JSON\n{\n    \"code\": 200,\n    \"data\": {\n        \"summary_infos\": [\n            {\n                \"major_metric_name\": \"any转化率\",\n                \"summary\": [\n                    {\n                        \"vid\": 339601,\n                        \"version_name\": \"8b4b2cfdbd73941123bce96f9ce541e2\",\n                        \"confidence\": 3,\n                        \"conf_interval\": [\n                            -0.08904,\n                            0.08904\n                        ],\n                        \"p\": 1.0\n                    }\n                ]\n            }\n        ],\n        \"user_data\": {\n            \"339600\": 799,\n            \"339601\": 799\n        },\n        \"start_ts\": 1708822800,\n        \"end_ts\": 1713801599,\n        \"report_type\": \"day\"\n    },\n    \"message\": \"success\"\n}\n```\n\n\n<span id=\"22b2fb98\"></span>\n## 获取实验报告\\-核心指标概览\n\n**说明**：用于获取实验报告分组结论概览\n\n**请求路径** : /openapi/v3/apps/<app_id\\>/experiments/<experiment_id\\>/metric\\-data\n\n**请求方法: POST**\n\n**请求参数**\n\n\n|**参数名称** |**类型** |**是否必须** |**描述** |**备注** |\n|---|---|---|---|---|\n|metric_id |int |是 |指标ID |您可以通过获取指标列表接口获取指标ID。 |\n|report_type |string |是 |查询类型 |默认天级。当前仅支持 day，表示报告的查询时间粒度为天级。 |\n|start_ts |int |是 |查询开始时间，UNIX时间戳 |默认实验开始时间，不可以早于实验开始时间 |\n|end_ts |int |是 |查询结束时间，UNIX时间戳 |默认当前时间，不可以晚于实验结束时间 |\n\n\n**返回值**\n\n\n|参数名称 |类型 |说明 |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |object |报告数据，详情请参见下文的报告数据结构说明。 |\n\n\n**报告数据结构说明**\n\n\n|**参数名称** |**参数类型** |**描述** |\n|---|---|---|\n|versions |list[object] |实验版本信息，详情请参见下文的版本信息结构说明。 |\n|start_ts |int |查询开始时间，UNIX时间戳 |\n|end_ts |int |查询结束时间，UNIX时间戳 |\n|available_start_ts |int |可用报告开始时间，UNIX时间戳<br><br><div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div><br><br><br><div data-tips=\"true\" data-tips-type=\"tip\">当查询的时间范围超出了真实的报告数据产出的时间范围时，调用接口的返回结果为报告有数据的时间范围内的数据，这里的可用报告开始/结束时间，指的是真实返回的报告数据的时间范围。</div><br> |\n|available_end_ts |int |可用结束时间，UNIX时间戳 |\n|confidence_level |int |置信度 |\n|metric_id |int |指标ID |\n|distribution |object |统计分布数据 |\n|daily_data |object |天级报告数据 |\n|user_data |object |各版本进组人数 |\n\n\n**版本信息结构说明**\n\n\n|**参数名称** |**参数类型** |**描述** |\n|---|---|---|\n|id |int |版本ID |\n|name |string |版本名称 |\n|config |object |版本配置信息 |\n|type |int |0:对照版本 1:实验版本 |\n|weight |int |版本权重，0为均分 |\n|disabled |bool |是否禁用 |\n\n\n**返回示例**\n\n```JSON\n{\n    \"code\": 200,\n    \"data\": {\n        \"available_start_ts\": 1708822800,\n        \"available_end_ts\": 1713801599,\n        \"start_ts\": 1708822800,\n        \"end_ts\": 1713801599,\n        \"versions\": [\n            {\n                \"id\": \"339600\",\n                \"name\": \"版本1\",\n                \"config\": {\n                    \"0304\": \"111\"\n                },\n                \"type\": 0,\n                \"weight\": 0,\n                \"disabled\": false\n            },\n            {\n                \"id\": \"339601\",\n                \"name\": \"版本2\",\n                \"config\": {\n                    \"0304\": \"222\"\n                },\n                \"type\": 1,\n                \"weight\": 0,\n                \"disabled\": false\n            }\n        ],\n        \"confidence_level\": 80,\n        \"metric_id\": 99196,\n        \"distribution\": {\n            \"339600\": {\n                \"339601\": {\n                    \"p\": 1.0,\n                    \"m\": 0.3416771,\n                    \"change\": 0.0,\n                    \"change_rate\": 0.0,\n                    \"conf_interval\": [\n                        -0.08904,\n                        0.08904\n                    ],\n                    \"half_interval\": 0.0890367,\n                    \"confidence\": 3,\n                    \"mean\": {\n                        \"339600\": 0.3416771,\n                        \"339601\": 0.3416771\n                    },\n                    \"variance\": {\n                        \"339600\": 0.00028152,\n                        \"339601\": 0.00028152\n                    },\n                    \"mde\": 0.14750037,\n                    \"sample_size\": {\n                        \"339600\": 799,\n                        \"339601\": 799\n                    },\n                    \"details\": {\n                        \"numerator\": 273,\n                        \"denominator\": 799\n                    }\n                }\n            },\n            \"339601\": {\n                \"339600\": {\n                    \"p\": 0,\n                    \"m\": 0.3416771,\n                    \"change\": 0,\n                    \"change_rate\": 0,\n                    \"conf_interval\": [\n                        0,\n                        0\n                    ],\n                    \"half_interval\": 0,\n                    \"confidence\": 3,\n                    \"mean\": {\n                        \"339601\": 0,\n                        \"339600\": 0\n                    },\n                    \"variance\": {\n                        \"339601\": 0,\n                        \"339600\": 0\n                    },\n                    \"details\": {\n                        \"numerator\": 273,\n                        \"denominator\": 799\n                    }\n                }\n            }\n        },\n        \"daily_data\": {\n            \"2024-03-04\": {\n                \"339600\": {\n                    \"339601\": {\n                        \"p\": 1.0,\n                        \"m\": 0.3416771,\n                        \"change\": 0.0,\n                        \"change_rate\": 0.0,\n                        \"conf_interval\": [\n                            -0.08904,\n                            0.08904\n                        ],\n                        \"half_interval\": 0.0890367,\n                        \"confidence\": 3,\n                        \"mean\": {\n                            \"339600\": 0,\n                            \"339601\": 0\n                        },\n                        \"variance\": {\n                            \"339600\": 0,\n                            \"339601\": 0\n                        },\n                        \"mde\": 0.14750037,\n                        \"details\": {\n                            \"numerator\": 273,\n                            \"denominator\": 799\n                        }\n                    }\n                },\n                \"339601\": {\n                    \"339600\": {\n                        \"p\": 0,\n                        \"m\": 0.3416771,\n                        \"change\": 0,\n                        \"change_rate\": 0,\n                        \"conf_interval\": [\n                            0,\n                            0\n                        ],\n                        \"half_interval\": 0,\n                        \"confidence\": 3,\n                        \"mean\": {\n                            \"339601\": 0,\n                            \"339600\": 0\n                        },\n                        \"variance\": {\n                            \"339601\": 0,\n                            \"339600\": 0\n                        },\n                        \"details\": {\n                            \"numerator\": 273,\n                            \"denominator\": 799\n                        }\n                    }\n                }\n            }\n        },\n        \"boxplot\": \"The current indicator does not support box plots. Please refer to the explanation below for the specific reason.\",\n        \"user_data\": {\n            \"339600\": 799,\n            \"339601\": 799\n        }\n    },\n    \"message\": \"success\"\n}\n```\n\n\n<span id=\"4605ccf9\"></span>\n## 五. 业务错误码说明\n\n返回消息体里的code详细的定义\n\n\n|错误码 |含义 |\n|---|---|\n|200 |成功 |\n|403 |对请求的资源（app、实验等）无权限 |\n|404 |请求的资源不存在，如查询了不存在的实验ID或指标ID |\n|410 |请求的资源已被删除 |\n|40000 |缺少必填参数 |\n|40001 |参数值错误 |\n|40003 |对请求的接口无访问权限 |\n|40010 |调用过于频繁（超过每秒调用次数限制） |\n|40011 |超过每天调用次数限制 |\n|60001 |DSL格式错误 |\n|60002 |指标有已关联实验，无法删除 |\n|60010 |流量不足，无法创建实验 |\n|60011 |实验的endpoint_type与所属互斥组不一致 |\n|60012 |测试中实验无法被结束 |\n|60013 |草稿态实验不可被openAPI查询或修改 |";</script>

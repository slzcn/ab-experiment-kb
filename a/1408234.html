<script>window.DATA_BASE="../";window.INIT_DOC=1408234;window.INIT_MD="<span id=\"2b0c808f\"></span>\n# 注意事项\n\n\n* **支持的环境**：\n\n   \n   |环境 |是否支持 |备注 |\n   |---|---|---|\n   |SaaS\\-云原生<br><br>私有化 492 版本 |已支持 |环境已完成适配，platform 以 openHarmony 上报。<br><br>如果是老的私有化版本升级上来的，需要联系火山引擎技术支持人员获取 HarmonyOS Next SDK 新版适配包。 |\n   |SaaS\\-非云原生 |不支持 |环境不支持或未完成适配，如果想提早集成，SDK 的 platform 会以 Android 上报。 |\n   |私有化 492 之前版本 |||\n   \n\n* **SDK版本说明**：\n\n   当前 HarmonyOS Next SDK 为 Bate / RC 版，鸿蒙系统目前已正式版推出，本 SDK 基于鸿蒙 HarmonyOS 5.0.0 Release 版本编译打包，后续会随华为系统的更新持续迭代，当前功能适配非完整版本。\n\n   * 当前支持最新版的 HarmonyOS Next SDK 已支持的功能包括：\n\n      * 自定义埋点 / 请求加密（默认加密 / 国密 sm2）/ 用户标识与用户属性 / AB 分流实验 / 事件黑名单 / web 打通 / 崩溃采集（JS 层）/ 实时埋点验证 / custom header 设置 / 全埋点（beta）/ 组件曝光 / 多 ID 口径\n\n      * Devtools 调试工具\n\n         * 查看事件信息 / 查看网络请求 / 查看接入状态 / 配置信息模块 / 内置扫一扫功能\n\n   * SDK发布日志详情请参见[SDK更新日志](https://www.volcengine.com/docs/6287/158895)。\n\n   * 暂不支持多线程 / 多进程，鸿蒙系统比较特殊，采取线程间进程隔离，需额外适配方案。\n\n\n<span id=\"5c199ece\"></span>\n# 集成增长营销套件 SDK\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">HarmonyOS SDK 要求最低接入的鸿蒙版本为 API 12 以上。</div>\n\n\n<span id=\"1c99d377\"></span>\n## 获取 SDK 与接入方式\n\n获取 SDK 与接入方式：您可前往[Github地址](https://github.com/volcengine/datarangers-sdk-packages)获取HarmonyOS SDK。\n\n<span id=\"9c68f4c0\"></span>\n## 权限声明\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">OAID 是用户弹窗权限，如需采集相关数据时，您需要在应用逻辑中添加 OAID 权限申请代码。</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">配置在 enrty 下的 module.json5 中：</div>\n\n\n```JavaScript\n\"requestPermissions\": [\n  {\n    // 网络权限，必要添加\n    \"name\": \"ohos.permission.INTERNET\"\n  },\n  {\n    // wifi 信息获取，必要添加\n    \"name\": \"ohos.permission.GET_WIFI_INFO\"\n  },\n  { \n    // 获取网络信息，必要添加\n    \"name\": \"ohos.permission.GET_NETWORK_INFO\"\n  },\n  {\n    // 资产持久化，建议添加，与 deviceId 生成相关，未声明会导致卸载重装 deviceId 变化\n    \"name\": \"ohos.permission.STORE_PERSISTENT_DATA\"\n  },\n  {\n    // oaid 权限（可选），建议添加\n    \"name\": \"ohos.permission.APP_TRACKING_CONSENT\",\n    \"reason\": \"$string:your_reason\",\n    \"usedScene\": {\n      \"abilities\": [],\n      \"when\": \"inuse\"\n    }\n  },\n],\n```\n\n\n<span id=\"20fdc4b1\"></span>\n# 获取数据上送地址\n\n进行数据接入上报时，您需要根据当前的环境类型和端类型确认您的数据上报地址，如果上报地址设置错误，后续会导致您无法查询到上报的数据。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">请在上报数据前，务必确认您当前使用的环境类型，根据环境类型配置上报地址。查看当前的环境类型请参见<a href=\"https://www.volcengine.com/docs/6287/1544686\">SaaS云原生/非云原生&私有化环境</a>。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">如果您使用的是SaaS\\-云原生环境，您也需确认您的服务所在的地域，根据所在地域配置上报地址（通常您的服务会在华北2\\-北京地域，部分用户可能会使用其他地域）。SaaS\\-云原生用户查看服务所在地域请参见<a href=\"https://www.volcengine.com/docs/6287/1544685\">支持的地域</a>。</div>\n\n\n\n<span id=\"7540d2f4\"></span>\n## SaaS\\-云原生 & SaaS\\-非云原生\n\n\n|地址类型 |SaaS\\-云原生环境<br><br>（国内：华北2\\-北京） |SaaS\\-云原生环境<br><br>（海外：亚太东南\\-柔佛） |SaaS\\-非云原生环境 国内环境 |SaaS\\-非云原生 海外BytePlus环境<br><br>（以下 SG 指新加坡） |\n|---|---|---|---|---|\n|数据上报地址 |* SaaS\\-云原生（华北）：https://gator.volces.com |* https://gator.uba.ap\\-southeast\\-1.volces.com |无需配置，使用默认的数据上报地址 |暂不支持 |\n|分流地址 |https://tab.volces.com |https://tab.ab.ap\\-southeast\\-1.volces.com |无需手动配置 |无需手动配置 |\n\n\n<span id=\"6b568ccc\"></span>\n## 私有化环境\n\n私有化部署场景下，您需要获取部署私有化环境时，自行规划配置的数据上送地址。如您不清楚此地址，请联系您的项目经理或客户成功经理。\n\n<span id=\"ad0278fa\"></span>\n# 初始化增长营销套件 SDK\n\n鸿蒙将 init 与 start 完全分离。\n\n\n* init 之后才可以调用 SDK 的各种方法，SDK 不支持 init 之前进行埋点，但 init 之后就可以开始埋点落库了。\n\n* start 之后才开始采集诸如 oaid 等敏感 header 信息，并且此时才进行数据请求。\n\n* 如果创建了 AbilityStage，可以将 init 放在 AbilityStage 的 oncreate 中，可以在这里初始化 SDK，然后在隐私弹窗后再调用 start。\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">AbilityStage 相当于 Android 中的 Application。</div>\n\n\n<span id=\"dc752ebc\"></span>\n## SaaS\\-云原生\n\n\n* 使用1.3.1及之后版本的SDK\n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">使用1.3.1及之后版本的SDK时，您需要单独设置指标数据采集的上报地址和A/B实验的分流地址。   </div>\n   \n\n   ```TypeScript\n   // 创建新的 AppLog 实例\n   let appLog = new AppLog()\n   // 鸿蒙 sdk channel 作为可选参数\n   let config = new InitConfig('yourAppId', 'yourChannel')\n     // 是否打开日志\n     .setLogEnabled(true)\n     // 设置数据采集上报地址和实验分流地址，第一个参数为 数据采集上报地址，第二个参数为实验分流地址，各环境各地域的上送地址请参见上文的 获取数据上送地址 章节。\n      .setUri(createByDomainWithSpecifyAB(\"https://****.****.com\", \"https://***.****.com\"))\n   // init sdk 传入配置，init 之后可以\n   appLog.init(context, config)\n    \n   // 鸿蒙 SDK 需要手动调用 start 才开始采集敏感信息与发送请求\n   appLog.start()\n   ```\n   \n\n* 使用1.3.1之前的版本，建议您升级至新版的SDK本进行集成。\n\n\n<span id=\"1088cfa9\"></span>\n## SaaS\\-非云原生\n\n```TypeScript\nimport { AppLog, InitConfig } from '@volcengine/applog'\n\n// 创建新的 AppLog 实例\nlet appLog = new AppLog()\n// 鸿蒙 sdk channel 作为可选参数\nlet config = new InitConfig('yourAppId', 'yourChannel')\n  // 是否打开日志\n  .setLogEnabled(true)\n// init sdk 传入配置，init 之后可以\nappLog.init(context, config)\n\n// 鸿蒙 SDK 需要手动调用 start 才开始采集敏感信息与发送请求\nappLog.start()\n```\n\n\n<span id=\"3d21cc3e\"></span>\n## **私有化**\n\n```JavaScript\nimport { AppLog, InitConfig } from '@volcengine/applog'\n\n// 创建新的 AppLog 实例\nlet appLog = new AppLog()\n// 鸿蒙 sdk channel 作为可选参数\nlet config = new InitConfig('yourAppId', 'yourChannel')\n  // 是否打开日志\n  .setLogEnabled(true)\n  // 设置私有化部署数据上送地址，各环境各地域的上送地址请参见上文的 获取数据上送地址 章节。\n  .setUri(createByDomain(\"your_REPORT_URL\"))\n// init sdk 传入配置，init 之后可以\nappLog.init(context, config)\n\n// 鸿蒙 SDK 需要手动调用 start 才开始采集敏感信息与发送请求\nappLog.start()\n```\n\n\n<span id=\"8d53251d\"></span>\n## 多实例\n\n当前版本每个实例都是新创建出来的，所以创建新的 AppLog 对应传入不同的应用实例即可。\n\n```TypeScript\nimport { AppLog, InitConfig } from '@volcengine/applog'\n\n// 创建新的 AppLog 实例\nlet appLog1 = new AppLog()\n// init sdk 传入配置，init 之后可以\nappLog1.init(context, new InitConfig('yourAppId1', 'yourChannel')\n  // 是否打开日志\n  .setLogEnabled(true))\n  \n// 鸿蒙 SDK 需要手动调用 start 才开始采集敏感信息与发送请求\nappLog1.start()\n\n// 创建新的 AppLog 实例\nlet appLog2 = new AppLog()\n// init sdk 传入配置，init 之后可以\nappLog2.init(context, new InitConfig('yourAppId2', 'yourChannel')\n  // 是否打开日志\n  .setLogEnabled(true))\n  \n// 鸿蒙 SDK 需要手动调用 start 才开始采集敏感信息与发送请求\nappLog2.start()\n```\n\n\n<span id=\"3146a8bf\"></span>\n# 敏感信息采集\n\n<span id=\"8412acfc\"></span>\n## 关闭 Oaid 采集\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">鸿蒙 Oaid 为用户授权权限，需要应用侧主动申请权限，如果申请权限且用户同意，SDK 才能采集到 Oaid，也支持在用户同意的情况下关闭 Oaid 采集。</div>\n\n\n设备的 OAID 信息采集默认开启，如需关闭：\n\n```JavaScript\nlet config = new InitConfig('yourAppId', 'yourChannel')\n  .setOaidEnabled(false)\n```\n\n\n<span id=\"de7acb74\"></span>\n## 关闭运营商信息采集\n\n设备的运营商信息默认采集，如需关闭：\n\n```JavaScript\nlet config = new InitConfig('yourAppId', 'yourChannel')\n  .setOperatorInfoEnabled(false)\n```\n\n\n<span id=\"c13f4770\"></span>\n# 配置 Scheme(可选)\n\n如需使用[实时埋点检测](https://www.volcengine.com/docs/84129/1261787)，请配置 Scheme，否则可跳过此步骤。\n\n<span id=\"8f3eb705\"></span>\n## 方式一 使用 Devtools 内置扫一扫\n\n该方式无需配置唤醒协议，\n\n集成 Devtools 后点开，控制台 \\-\\> 扫一扫 按照流程操作即可。\n\n<span id=\"e9d2db98\"></span>\n## 方式二 传统扫码跳转\n\n现阶段鸿蒙系统浏览器已支持扫码跳转。\n\n<span id=\"8c901af2\"></span>\n### 获取 URL Scheme\n\nscheme一般为`rangersapplog.xxxxx`的形式。\n\n在集团中接入一个应用后，您可以在集团相关页面查看应用的AppKey等信息，详情请参考：[如何创建应用](https://www.volcengine.com/docs/6287/66984)。\n\n\n* SaaS\\-云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/eba094f44e174faea6c7cdcdc7447d2d~tplv-goo7wpa0wc-image.image) </span>\n\n* SaaS\\-非云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b55e61ee067544deaff4939685d1475c~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"8f735898\"></span>\n### 配置 URL Scheme\n\n<span id=\"df124470\"></span>\n#### 配置跳转协议（方式二添加）\n\n```TypeScript\n// 在 entry 模块下的主 Ability 中配置 uris：\n\"uris\": [\n    {\n        // rangersapplog.xxx 请替换为官方文档中展示的 scheme  \n        \"scheme\": \"rangersapplog.xxx\",\n        \"host\": \"rangersapplog\",\n        \"path\": \"picker\"\n    }\n]\n// 示例：\n\"abilities\": [\n  {\n    \"name\": \"EntryAbility\",\n    \"srcEntry\": \"./ets/entryability/EntryAbility.ets\",\n    \"description\": \"$string:EntryAbility_desc\",\n    \"icon\": \"$media:icon\",\n    \"label\": \"$string:EntryAbility_label\",\n    \"startWindowIcon\": \"$media:startIcon\",\n    \"startWindowBackground\": \"$color:start_window_background\",\n    \"exported\": true,\n    \"skills\": [\n      {\n        // 也需要配置\n        \"actions\": [\n          \"ohos.want.action.viewData\"\n        ],\n        \"uris\": [\n          {\n            // rangersapplog.xxx 请替换为官方文档中展示的 scheme  \n            \"scheme\": \"rangersapplog.xxx\",\n            \"host\": \"rangersapplog\",\n            \"path\": \"picker\"\n          }\n        ]\n      },\n    ]\n  }\n]\n```\n\n\n<span id=\"d43a9d17\"></span>\n#### 添加实时埋点启动代码（方式二添加）\n\n```TypeScript\nimport { InitConfig } from '@volcengine/applog'\n\n// 在配置跳转协议的 Ability 中添加以下代码：\n// 在示例中的 EntryAbility 中添加：\n// onNewWant 是在启动后又有启动调用回调\nonNewWant(want: Want, launchParam: AbilityConstant.LaunchParam): void {\n  // 传入协议 uri 即可\n  appLog.simulate()?.start(want.uri)\n}\n\n// 如果还没有启动 App 就想要扫码实时埋点\nonCreate(want: Want, _: AbilityConstant.LaunchParam): void {\n  // 注意，需要在 SDK init 之后调用才可以\n  // 传入协议 uri 即可\n  appLog.simulate()?.start(want.uri)\n}\n```\n\n\n<span id=\"af865fd7\"></span>\n# 初始化基本配置\n\n<span id=\"a760f4a7\"></span>\n## SDK init\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">SDK 在 init 之前不接受任何方法调用，想要调用 SDK 内部方法，需要先进行 init，且 init 方法已做合规处理，init 不会自动采集敏感信息与发送请求。</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\"><strong>可以考虑在 AbilityStage 的 onCreate 中 sdk init，在隐私同意后进行 sdk start。</strong></div>\n\n\n```TypeScript\nappLog.init(context, config)\n```\n\n\n<span id=\"43895e6c\"></span>\n## SDK start\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">请不要在 init 之前调用 start，调用 start 后，SDK 真正开始做敏感信息采集与请求上报。</div>\n\n\n```TypeScript\nappLog.start()\n```\n\n\n<span id=\"a6a8e4bf\"></span>\n## 开启 SDK 日志\n\n<span id=\"5d4c44ad\"></span>\n### SDK 内部数据输出日志\n\n```TypeScript\nimport { InitConfig } from '@volcengine/applog'\n\nlet config = new InitConfig('yourAppId', 'yourChannel')\n  // 开启 SDK 日志\n  .setLogEnabled(true)\n```\n\n\n<span id=\"3c44d765\"></span>\n### 应用自己接管打印日志\n\n```TypeScript\nimport { InitConfig } from '@volcengine/applog'\n\nlet config = new InitConfig('yourAppId', 'yourChannel')\n  // 也需要先开启 SDK 日志\n  .setLogEnabled(true)\n  // 实现日志接管方法\n  .setLogger({\n    log: (_: hilog.LogLevel, __: string, msg: string, err?: Error) => {\n        hilog.debug(0x0100, 'AppLogH_test', `${msg} ${err ? JSON.stringify(err) : \"\"}`)\n    }\n})\n```\n\n\n<span id=\"a743933c\"></span>\n## 自定义域名\n\n```TypeScript\nimport { InitConfig } from '@volcengine/applog'\nimport { createByDomain } from '@volcengine/applog/src/main/ets/core/base/url/UriConfig'\n\nlet config = new InitConfig('yourAppId', 'yourChannel')\n  .setUri(createByDomain(\"your_REPORT_URL\"))\n```\n\n\n<span id=\"d15ec284\"></span>\n## 加密设置\n\nSDK 默认开启加密，且内置的默认加密方式与 Android 一致。\n\n如果需要修改 SDK 加密方式，建议在 init 和 start 之间插入对应代码，这样可以确保启动后请求应用加密方式。\n\n<span id=\"26fc5cd5\"></span>\n### 默认加密\n\n无需额外设置。\n\n```TypeScript\nimport { AppLog, InitConfig } from '@volcengine/applog'\n\nlet appLog = new AppLog()\nlet config = new InitConfig('yourAppId', 'yourChannel')\nappLog.init(context, config)\n// 默认无需添加，默认开启加密\nappLog.encrypt()?.enablePlugin()\n// 切换至默认加密方式，建议在 start 之前调用，因为 start 就开始请求\nappLog.encrypt()?.useDefaultEncrypt()\nappLog.start()\n```\n\n\n<span id=\"a0b3fe99\"></span>\n### 国密 SM2\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">该加密方式目前仅私有化版本支持。</div>\n\n\n```TypeScript\nimport { AppLog, InitConfig } from '@volcengine/applog'\n\nlet appLog = new AppLog()\nlet config = new InitConfig('yourAppId', 'yourChannel')\nappLog.init(context, config)\n// 默认无需添加，默认开启加密\nappLog.encrypt()?.enablePlugin()\n// 切换至国密 SM2 非对称加密，需要手动传入公钥\nappLog.encrypt()?.useSm2Encrypt(\"your_public_key\")\nappLog.start()\n```\n\n\n<span id=\"8a8ff7a7\"></span>\n### 关闭 SDK 加密\n\n对于调试阶段，可以关闭 SDK 加密，方便抓包查看数据是否正常。\n\n```TypeScript\nimport { AppLog, InitConfig } from '@volcengine/applog'\n\nlet appLog = new AppLog()\nlet config = new InitConfig('yourAppId', 'yourChannel')\nappLog.init(context, config)\n// 关闭加密\nappLog.encrypt()?.disablePlugin()\nappLog.start()\n```\n\n\n<span id=\"14de2aa0\"></span>\n## 打通内嵌 H5 页\n\n如果您的应用同时集成 Web/JS SDK 以及 Harmony SDK，默认情况下，所有 H5 事件会通过 Web/JS SDK 上报，如果您希望 H5 事件由 Harmony SDK 接管上报，可以使用打通内嵌 H5 功能，此时 H5 页上产生的事件将通过 Harmony SDK 上报，而不在 Web/JS SDK 上报，这种接管上报场景下会复用 Harmony 端设置的`user_unique_id`和公共属性，但是也支持打通时 web 侧设置 / 更新端上的 uuid / 公共属性，请在打通时注意采用哪边数据，如果完全以端上为准可以去掉 web sdk 侧的 uuid / 公共属性操作。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">打通功能需要 Web/JS SDK 与 Harmony SDK 同时集成并彼此配合，且当前版本 Web/JS SDK 打通后默认屏蔽 H5 全埋点功能，因为此时上报都由 Harmony SDK 接管，如果还想采集 H5 全埋点，需要查看 5.7 小节：原生端采集 H5 全埋点 。 Web/JS SDK 集成请参考<a href=\"https://www.volcengine.com/docs/84129/1261745\">《Web/JS SDK 集成》</a> 以及 3.4 小节。</div>\n\n\n\n* 初始化SDK\n\n\n```TypeScript\nimport { AppLog, InitConfig } from '@volcengine/applog'\n\nlet appLog = new AppLog()\nlet config = new InitConfig('yourAppId', 'yourChannel')\nappLog.init(context, config)\n// ...\nappLog.start()\n\nexport {\n    appLog\n}\n```\n\n\n\n* 在Web组件上使用\n\n\n<span id=\"77c2787e\"></span>\n### 方式一：使用 javaScriptProxy 注入\n\n```TypeScript\nimport web_webview from '@ohos.web.webview'\nimport { appLog } from './applog'\n\n@Component\nexport struct Webview {\n    controller: web_webview.WebviewController = new web_webview.WebviewController()\n    bridgeProxyInfo = appLog.bridge()!.injectJsBridgeByJsProxy()\n    \n    build() {\n        Web({ src: $rawfile('webview.html'), controller: this.controller })\n          .javaScriptAccess(true)\n          .javaScriptProxy({\n            object: this.bridgeProxyInfo.object,\n            name: this.bridgeProxyInfo.name,\n            methodList: this.bridgeProxyInfo.methodList,\n            controller: this.controller,\n          })\n    }\n}\n```\n\n\n<span id=\"187d19cc\"></span>\n## 开启崩溃采集\n\n当前 SDK 支持通过 errorManager 采集 JS crash，SDK 内部默认关闭。\n\n```TypeScript\nlet appLog = new AppLog()\nlet config = new InitConfig('yourAppId', 'yourChannel')\nappLog.init(context, config)\n// 主动开启 JS Crash 采集\nappLog.crash()?.enablePlugin()\nappLog.start()\n```\n\n\n<span id=\"2b73c8f6\"></span>\n# AB 实验\n\nAB 实验默认关闭（与 Android 一致），如果需要使用 AB 实验需要先手动开启。\n\n<span id=\"06c36b76\"></span>\n## 开启 AB 实验功能\n\n```JavaScript\nimport { AppLog, InitConfig } from '@volcengine/applog'\n\nlet appLog = new AppLog()\nlet config = new InitConfig('yourAppId', 'yourChannel')\nappLog.init(context, config)\n// 开启 AB 实验，建议在 init 与 start 之间调用\nappLog.abTest()?.enablePlugin()\nappLog.start()\n```\n\n\n<span id=\"9adfacb2\"></span>\n## 获取 AB 实验服务端配置\n\n```JavaScript\n// 建议每次在获取最新 AB 后获取所有实验结果\nappLog.topicReceiver().on(Topic.ABTestConfigReady, (_) => {\n    appLog.abTest()?.getAllAbTestConfigs()\n})\n```\n\n\n<span id=\"7dddafc8\"></span>\n## 进行 AB 实验曝光\n\n```JavaScript\n// 建议每次在获取最新 AB 后触发实验\nappLog.topicReceiver().on(Topic.ABTestConfigReady, (_) => {\n    appLog.abTest()?.getAbConfig(\"ab_key\", defaultValue)\n})\n```\n\n\n<span id=\"d604294c\"></span>\n## 获取已曝光实验 Vid 列表\n\n```JavaScript\nappLog.abTest()?.getAbSdkVersion()\n```\n\n\n<span id=\"b04a0d2b\"></span>\n## 订阅 AB 服务端分流配置获取\n\n```JavaScript\nappLog.topicReceiver()?.on(Topic.ABTestConfigReady, (abTestConfig) => {\n  hilog.info(0x0000, 'AppLogH', `AppLog abtest config ready:  ${JSON.stringify(abTestConfig)}`)\n})\n\nabTestConfig 格式：\n就是具体的实验配置\n{\n    \"ab\": {\n        \"val\": \"访问页面 A\",\n        \"vid\": \"1\"\n    },\n    \"ba\": {\n        \"val\": \"对照版\",\n        \"vid\": \"2\"\n    },\n    \"tt\": {\n        \"val\": true,\n        \"vid\": \"3\"\n    }\n}\n```\n\n\n<span id=\"ba68403e\"></span>\n## 订阅新曝光 Vid 记录\n\n```JavaScript\nappLog.topicReceiver()?.on(Topic.ABTestVidChanged, (vids) => {\n  hilog.info(0x0000, 'AppLogH', `AppLog abtest vids:  ${JSON.stringify(vids)}`)\n})\n\nvids 格式：\n{\n  // 最新曝光的 vid\n  \"new_vid\":\"1\",\n  // 已曝光的 vid 集合（包含最新的）\n  \"vids\":\"1\"\n}\n```\n\n\n<span id=\"78d156d3\"></span>\n# DevTools 工具\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">SDK 提供了 DevTools 工具，支持在开发时方便观察 SDK 的一些运行信息。</div>\n\n\n<span id=\"928b8d68\"></span>\n## Devtools 集成\n\n初始化 SDK 和注册 DevTools 插件（**初始化方式新老版本一致**）\n\n```TypeScript\nimport { AppLog, InitConfig } from '@volcengine/applog'\nimport { DevTools } from '@volcengine/applog_devtools'\n\nlet appLog = new AppLog()\nlet config = new InitConfig('yourAppId', 'yourChannel')\nappLog.init(context, config)\n\n// 注册 DevTools 插件\nDevTools.applyDevTools(appLog)\n\nappLog.start()\n\nexport {\n    appLog\n}\n```\n\n\n<span id=\"55b0bdec\"></span>\n## 新版使用方式：1.2.0 及以上版本\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">新版使用方式：1.2.0 及以上版本</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\"><strong>新版本 Devtools 实现了和 Android 一样的全局悬浮能力（使用子窗口功能），所以无需额外挂载，直接使用即可。</strong></div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\"><strong>如果是老版本升级上来，需要移除之前的使用方式。</strong></div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">新版版监听 onWindowStageActive，如果 SDK 初始化比较晚可能错过监听，前后台切换一下即可，显示出来，正常情况无需手动调用显示。</div>\n\n\n```Go\n//  如果需要手动打开 可以手动调用：\nDevtools.show(windowStage: window.WindowStage)\n\n//  支持手动关闭：\nDevtools.close()\n```\n\n\n<span id=\"fcf40e0e\"></span>\n## 老版使用方式：1.0.0 / 1.1.0 版本\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">老版本 Devtools 并非像 Android 那样的全局悬浮窗，需要在哪个页面使用，需要在对应页面挂载。</div>\n\n\n在需要的页面挂载 DevTools 组件，推荐在根组件上挂载\n\n```TypeScript\nimport DevToolsPage from '@volcengine/applog_devtools'\n\n@Entry\n@Component\nstruct Index {\n  // ...\n  \n  build() {\n    Column() {\n      // ...\n      \n      DevToolsPage()\n    }\n  }\n}\n```\n\n\n<span id=\"d68fe538\"></span>\n# 参考：数据上报流程与机制\n\n默认是一分钟上报一次，但是没有具体上报条数，SDK 策略为新的按体积查询事件的上报策略（Android / iOS 为按条数查询）， 每次上报查询 1M 左右数据进行上报，不再以 200 条为准（可以尽量多的上报）。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

  </div>
</div>

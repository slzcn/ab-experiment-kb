<meta property="og:description" content="DataTester为您提供指标组模版管理功能，您可以在此页面中创建指标组模板，将常用指标添加至模板中，后续创建实验时可切换使用指标组模板来快捷配置实验指标，提高操作效率。本文为您介绍指标组模板管理的操作详情。 注意事项">

<script>window.DATA_BASE="../";window.INIT_DOC=1781336;window.INIT_MD="DataTester为您提供指标组模版管理功能，您可以在此页面中创建指标组模板，将常用指标添加至模板中，后续创建实验时可切换使用指标组模板来快捷配置实验指标，提高操作效率。本文为您介绍指标组模板管理的操作详情。\n\n<span id=\"7a0d652c\"></span>\n# 注意事项\n\n仅拥有指标组模板编辑权限的用户可创建、管理指标组模板。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/1bd71cbc64f54b5f83d311b26b754ccf~tplv-goo7wpa0wc-image.image) </span>\n\n如果您没有对应权限，可联系管理员添加此权限，DataTester通过角色对用户进行权限管控，授权操作请参见[权限管理：SaaS-云原生环境](https://www.volcengine.com/docs/6287/69594)。\n\n<span id=\"25ddd03c\"></span>\n# 新建指标组模板\n\n\n1. 登录并进入DataTester的控制台后，单击左侧导航 **指标管理** \\> **指标组模板管理**，进入指标组模板管理页面后，单击页面右上角的“**新建模板**”。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/c98a8979708b4cc7bbd8d5318948d4fd~tplv-goo7wpa0wc-image.image) </span>\n\n2. 在弹出的页面中配置指标组模板参数。\n\n   1. 配置基础信息。\n\n      <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/fd3b0a2aa4c24012b518630a345e5341~tplv-goo7wpa0wc-image.image) </span>\n\n      \n      |参数 |配置说明 |\n      |---|---|\n      |模板名称 & 模板描述 |自定义配置模板名称和描述，用于标识创建的指标组模板。 |\n      |模板Owner |在下拉框中选择模版Owner。 |\n      |模板类别 & 指定人可用 |选择模版的类别，支持：<br><br><br>* 个人模版：<br><br>   * 选择模板类别为“个人模板”时，您还可以在下方设置此模板可以放开给其他哪些用户使用。<br><br>   * 设置完成后，当前模版仅模板Owner和下方设置的“指定人可用”的用户可使用此模板。<br><br>* 通用模板：应用内的所有用户均可以使用此模板。 |\n      \n\n   2. 配置展示指标。\n\n      <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/f160bceeaa4b4610a490792a76dc92e3~tplv-goo7wpa0wc-image.image) </span>\n\n      * 在左侧的指标列表中勾选需要添加至当前指标模板中的指标。\n\n      * 您可以在已选指标组列表框中：\n\n         * 单击某个已添加指标组后的删除按钮，去除对应的指标组。\n\n         * 您也可以单击右上角的“重置”或“清空”将已选指标一键清空。\n\n3. 完成上述配置后，单击页面右上角的“保存”按钮，保存新建的指标组模板。\n\n\n<span id=\"04862136\"></span>\n# 查看指标组模板列表\n\n完成指标组模板创建后，您可在指标组模板页面查看已创建的指标组模板列表。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/554f6233190e4608b20d3f71252f949b~tplv-goo7wpa0wc-image.image) </span>\n\n\n* 您可以在页面上方通过切换“个人”和“通用”的页签，查看当前个人可使用的指标组模板和应用内所有的通用指标组模板；也可以直接在搜索框中直接进行搜索。\n\n* 单击某个指标组模板后的编辑或删除按钮，可对指标组进行编辑修改或删除操作。\n\n\n<span id=\"f6edc159\"></span>\n# 使用指标组模板\n\n创建完成指标组模板后，后续在创建实验的配置实验关注指标过程中，您可以直接选择已创建的指标组模板，无需一个一个搜索选择每个指标，通过指标模板快速完成实验关注指标的配置。\n\n以下以编程实验为例，为您示例使用方式。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/0bc3749684f04587bdd4a76c379006d7~tplv-goo7wpa0wc-image.image) </span>\n\n同时，创建实验时，您也可以将已勾选的指标组快速存为指标组模板，在已选指标组上方单击“存为模板”即可将已选指标创建为指标组模板。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

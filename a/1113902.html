<script>window.DATA_BASE="../";window.INIT_DOC=1113902;window.INIT_MD="广告投放需要用到广告素材、落地页、人群包以及应用等相关的广告资产，添加完成广告账户后，您后续即可直接在DataTester上管理您广告实验所需的广告资产，便于后续高效的进行广告实验。本文为您您介绍如何在DataTester上管理您的广告资产。\n\n<span id=\"276bf4d1\"></span>\n# 背景与前提\n\n\n* 通常使用DataTester进行广告实验时，您已有巨量引擎账号并在巨量引擎上进行过广告投放，在巨量引擎侧已有部分广告素材，您可以通过广告账户便捷的将巨量引擎中已有的广告资产同步至DataTester侧进行管理，同时您也可以在DataTester上直接上传新的资产，新上传的资产也会存储至巨量引擎账号中。\n\n* 在DataTester上添加与管理广告资产时，您需要先在DataTester上添加并启用了广告账户，以便后续通过此账户同步巨量引擎侧的一些广告资产到DataTester。广告账户的操作详情请参见[添加与管理广告账户](https://www.volcengine.com/docs/6287/1113901)。\n\n* 当前主要涉及的广告资产包括广告素材、广告落地页、广告人群包、广告应用、监测链接这几部分。您可登录DataTester控制台后，在**场景能力**\\>**广告场景**\\>**资产管理**页面进行添加管理操作，操作详情可参见下文文档。\n\n\n<span id=\"_1-资产管理-素材管理\"></span>\n# 素材管理\n\n您可将广告实验所需的视频或图片素材上传到「素材管理」页面进行管理。后续创建广告实验时可直接选用已上传的素材。\n\n<span id=\"4e78025d\"></span>\n## **上传素材**\n\n点击【素材上传】按钮将会打开二级页面，点击上传文件会打开本地文件夹，一次最多可以上传20个素材。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_6e5a5dc5d9eb3698feca67433fbb224a.png) </span>\n\n **⚠️注意事项：** \n\n\n* 选择素材上传时，可能会出现稍等一会后才显示开始上传的问题，这个是因为在进行素材的封面裁剪。\n\n* 素材上传后，会进行素材重复性监测，需要注意，即使一个素材内容完全相同，但如果它们大小、分辨率等有一点点不同，都不会认为是重复素材。\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_281abbc36504ebc05cca9b0eb012eee7.png) </span>\n\n<span id=\"5311c526\"></span>\n## **查看素材详情**\n\n点击素材封面，会有展示素材详情的抽屉弹出，具体详情信息有素材样式、素材ID、上传账号、分辨率、上传时间、大小、素材标签等。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_0f079b35b193e9ef100b906c39be841b.png) </span>\n\n<span id=\"f0787672\"></span>\n## 搜索/编辑素材\n\n对于已上传的素材，您可以在页面的筛选框按照素材名称&素材ID、素材的版式、素材上传者、标签、时间框进行搜索查找已有的素材，也可对其进行编辑修改。\n\n\n* 搜索素材\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_a9ccebf89d219fac070c874a79bd3b0c.png) </span>\n\n* 编辑素材\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_ac51a2ffef4c67017607897ffff4bc9d.png) </span>\n\n   * 1处展示的修改按钮可以修改素材的名称。\n\n   * 2处展示的删除按钮可以删除素材。\n\n\n<span id=\"c58233f3\"></span>\n# 落地页管理\n\n广告落地页指用户点击广告后被引导至的具体页面，例如进行广告推广时通过一个页面引导用户填写联系信息，便于后续进行销售线索跟踪等广告场景。此类场景下您可以把后续广告落地页面搭建好后将页面链接同步至DataTester进行管理。当前建议您使用橙子建站搭建您的广告落地页，并将其通过巨量引擎同步至DataTester侧管理。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">不使用橙子建站搭建落地页时，即直接自行搭建广告落地页（自有落地页）时，需要您自己上传落地页的URL并自行管理落地页所需的一些素材，不推荐使用此种方式。</div>\n\n\n<span id=\"97748c9f\"></span>\n## （推荐）橙子建站落地页\n\n**前提条件**\n\n已在橙子建站完成广告的落地页搭建。\n\n**同步橙子建站落地页**\n\n点击「同步」按钮，您需要选择需要同步橙子落地页的账户，选择之后系统会自动拉取该账户下所有的落地页。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_a9a8ce08de3501cf57f374dedd28cb6f.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_a9d26252c3186e954fd2a61133e450c8.png) </span>\n\n**管理橙子建站落地页**\n\n对于不再需要的落地页，您可单击删除按钮进行删除。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_97bd4e1bfe3f690696b2e94ac1685167.png) </span>\n\n<span id=\"d0c360fd\"></span>\n## （不推荐）自有落地页\n\n**新建自有落地页**\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_4c7b187ec7fba02148c4c07595a90dc9.png) </span>\n\n\n* 点击新建自有落地页，弹出用户需要填写的落地页信息，其中包含落地页名称、落地页链接和投放账户。\n\n   * 落地页名称：会做重命名校验，名称不能超过50个字符\n\n   * 落地页链接：将您开发好的落地页的URL复制到该输入框中\n\n   * 投放账户：下拉框展示您在Tester中可使用的广告账户\n\n* 点击确定后，会在自有落地页的列表中生成一条记录，该落地页也会同步在巨量引擎的落地页管理中创建。\n\n\n**同步自有落地页**\n\n此同步的流程和橙子建站落地页的同步流程一致，点击「同步」按钮，您需要选择需要同步自有落地页的账户，选择之后系统会自动拉取该账户下所有的自有落地页。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_9057362c3b90664102b4b9cdb1f91d93.png) </span>\n\n**管理自有落地页**\n\n\n* 操作\\-重命名：修改落地页的名称\n\n* 操作\\-删除：删除自有落地页\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_0b1de765213db6b48525267cbf17db7f.png) </span>\n\n<span id=\"e52c7456\"></span>\n# 人群包管理\n\n创建人群包有两种方式，一种是将在巨量引擎DMP平台中圈取的人群同步过来，另一种方式是将本地的人群包以文件上传的方式同步过来。人群包创建完成后，后续在DataTester上创建广告实验时可选用已上传的人群包，对人群包进行进一步的广告投放人群圈选。\n\n<span id=\"fe36c67f\"></span>\n## 媒体侧（巨量引擎）同步\n\n\n1. 点击【媒体侧同步】按钮。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_d094d7377f29d5b953ef3046316df5d0.png) </span>\n\n2. 选择需要同步人群包的广告账户。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_9e5d485060172c13ec2c1475aa1197c9.png) </span>\n\n3. 点击确定之后，会将所选广告账户下所有的人群包都同步到DataTester。\n\n\n<span id=\"3432fb79\"></span>\n## 自定义上传人群包\n\n\n1. 点击【自定义上传人群包】\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_0d4f996d5c92b2bd603eb2feff8d899d.png) </span>\n\n2. 选择人群包，填写人群包信息以及选择该人群包所要同步到的广告账户。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_06c3277e4ce35bc5dd95ee2acab38930.png) </span>\n\n   * 上传人群包到Tester：根据界面提示配置人群包名称，选择匹配的类型，并上传人群包文件。您可以先下载人群包文件模板，在模板中输入人群包ID信息后再上传。\n\n   * 将人群包推送至媒体账户：如果您希望在DataTester侧上传的人群包同步到巨量引擎侧，您可勾选对应的推送账户。\n\n      <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"2\">说明      </div>\n      \n\n      <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"2\">勾选推送账户后，DataTester会将人群包信息推送到巨量引擎侧，通常推送会需要一段时间，请您耐心等待。您可以在后续人群包列表的<strong>推送状态</strong>列查看是否完成推送。      </div>\n      \n\n<span id=\"5f19404d\"></span>\n## 人群包列表管理\n\n\n* 授权账户：人群包上传者以及管理员，可以将人群包分享给其他广告账户，点击「授权账户」，再选择相应的广告账户。\n\n   <div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">注意   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"warning\" data-wrapper-indent=\"1\">当前可授权给在同一巨量引擎组织下的账户，如果账户跨组织会授权推送失败。   </div>\n   \n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_b57f6332d261c5628dc2ee18abc8ffa0.png) </span>\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_7c27ddac75605f61473100d1987a7226.png) </span>\n\n* 删除人群包：人群包上传者以及管理员可以删除人群包\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_7e2a5a6eee0562ce94aac4eb7fd1a69e.png) </span>\n\n\n<span id=\"a2b374ab\"></span>\n# 应用管理\n\n如果后续广告实验的目标是进行应用推广或其他涉及应用下载推广的场景，您可以将应用同步到DataTester上进行管理。将应用同步至DataTester上管理通常整体流程一共有“应用集成DataTester数据接入SDK\\-\\-\\>应用同步\\-\\-\\>应用关联”三个核心步骤。\n\n<span id=\"5d956f55\"></span>\n## step1：应用集成DataTester数据接入SDK\n\n将应用同步至DataTester进行管理前，您需要在应用代码中嵌入DataTester的数据接入SDK，后续通过SDK上报广告实验的明细数据。\n\n嵌入DataTester的数据接入SDK时，需要注意，需将SDK代码中的APPID替换为DataTester创建项目时的DataTester侧的APPID。详细描述和操作引导请参见[iOS SDK集成开发指南](https://www.volcengine.com/docs/6287/65801)、[Android SDK集成开发指南](https://www.volcengine.com/docs/6287/65802)。\n\n<span id=\"6534aadb\"></span>\n## step2：应用同步\n\n将所需投放广告实验的应用从媒体侧（巨量引擎）同步到DataTester中。\n\n\n* **前提条件**\n\n   * Android应用已完成数据接入SDK集成，应用开发完成后上传至巨量引擎。\n\n   * IOS应用已完成数据接入SDK集成，完成应用开发并上架APP Store，获取到应用下载链接。\n\n* **Android 应用同步**\n\n   1. 登录DataTester控制台进入广告场景下资产管理的应用管理页面，点击右上方的**同步**按钮。\n\n      <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_ac0dc32edf2aa72b097b6a01c50d4c71.png) </span>\n\n   2. 在同步账号的弹窗中选择需要同步哪些巨量引擎账号下的安卓应用。点击确定后会同步该账户下所有的Android应用资产。\n\n      <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_07c752b76c474157130a487944d2dbb8.png) </span>\n\n* **IOS应用同步**\n\n   IOS应用需要在DataTester页面上手动创建，单击页面左上方的**iOS应用**切换到IOS应用页面后，单击**新建应用**按钮。在弹窗中填写应用的IOS下载链接、解析IOS应用包、选择应用所属的广告账户。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_b45dd1f66e0e639ba00f6b95017ed104.png) </span>\n\n\n<span id=\"723c2f92\"></span>\n## step3：（Android需要）关联应用\n\nAndroid应用同步到DataTester页面后，您还需要将应用和DataTester的应用项目进行关联。此处的关联本质上是将DataTester应用项目的APPID与Android应用的巨量引擎的APPID进行关联映射，便于后续SDK上报数据。\n\n您可以在已同步至DataTester的应用列表页面，单击未关联应用的**立即关联应用**提示，在弹窗中选择需要关联的DataTester应用项目。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/fd37f60e9ed54a60a866f0adff7fcea6~tplv-goo7wpa0wc-image.image) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_af95e4f568dfb4503b5909dbded1b52b.png) </span>\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">关联配置参数中，您仅需选择<strong>关联Tester应用</strong>即可，后续的监测链接当前不生效，无需配置。</div>\n\n\n<span id=\"52364138\"></span>\n## step4：操作开启应用\n\n完成以上操作后，应用即已可以在DataTester侧进行管理，后续进行广告实验时如果您希望直接选用已在DataTester侧管理的应用，您还需开启应用，即在应用列表的**操作**列，打开操作按钮。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/45d4100e678847769b72b50ef0ef0092~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"6cfe8eb1\"></span>\n# 广告监测管理\n\n为保障广告投放更科学、广告实验结果更可信，您还需要配置并管理广告监测链接，广告监测链接也是广告资产的一种。\n\n使用DataTester进行广告实验时，您需要在巨量引擎配置好广告监测链接的同时，在DataTester侧也添加与管理广告监测链接，后续广告监测的数据会通过巨量引擎的广告监测链接同步至巨量引擎侧，再通过DataTester侧的广告监测链接同步至DataTester侧。\n\n\n1. 前提条件：\n\n   * 在DataTester侧创建监测链前，您需要提前完成应用集成DataTester的数据接入SDK相关操作。\n\n   * （可选）在巨量引擎侧创建好巨量引擎侧的监测链接。\n\n      如果您在巨量引擎配置好广告监测链接的同时，在DataTester侧也添加与管理广告监测链接，后续创建广告实验时就可灵活选择使用巨量引擎的监测链接或DataTester侧的监测链接进行数据监测回传。使用巨量引擎的监测链接时，监测的数据可通过巨量引擎的广告监测链接同步至巨量引擎侧，再通过DataTester侧的广告监测链接同步至DataTester侧；使用DataTester侧监测链接时，可在下方步骤中配置是否需要将监测数据回传给巨量引擎侧的监控链接。\n\n2. 在DataTester侧创建监测链接。您可在**监测链接管理页签**点击“**新建监测链接**”。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_b5428c5c326f9e0103acd316bc183fa2.png) </span>\n\n   监测链接配置详情如下：\n\n   * 移动端：信息有**基础配置**和**渠道回传配置**两项\n\n      * **基础配置**：\n\n         包含监测链接名称、选择要监测的应用、操作系统及该应用是Android还是iOS。\n\n      * **渠道数据回传配置**：\n\n         该配置项是可选的配置项，DataTester支持将曝光和点击事件的数据回传到巨量引擎的监测链接，您可以根据需要配置是否需要回传更深链路的事件。深度的回传事件当前支持付费和注册两个事件，选择回传事件之后需要去选择对应的SDK上报事件，以关联具体埋点的名称。\n\n         <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_1d675dfd3814f2409f1058e5e5ad1b20.png) </span>\n\n   * WEB端：下拉框中为您展示可选择的落地页链接，您可根据需要选择目标跳转链接。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

<script>window.DATA_BASE="../";window.INIT_DOC=1144121;window.INIT_MD="<span id=\"_1-使用说明\"></span>\n# 1. 使用说明\n\n<span id=\"_1-1-基本用法\"></span>\n## 1.1 基本用法\n\n```Plain Text\nselect event, event_time \nfrom events \nwhere event_date >= '2020-08-10' \nand event_date <= '2020-08-18' \nand event_time > 1597161600\nlimit 20;\n```\n\n\n前端展示1000条，下载可下载1000000条。\n\n<span id=\"_1-2-字段说明\"></span>\n## 1.2 字段说明\n\n<span id=\"_1-2-1-events表\"></span>\n### 1.2.1 events表\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">原为all_data表，现更名为events表。</div>\n\n\n**本表查询范围为：用户SSID/UUID、事件、事件属性、事件公共属性、all_value类型的公共属性与业务对象属性。** \n\n\n|字段 |说明 |\n|---|---|\n|stat_standard_id |* 统计口径ID，SSID或UUID，取决于app的统计口径。<br><br>* 列名曾为user_unique_id，现已废弃。 |\n|user_profiles.user_id |* 用户ID，匿名时通过device_id/web_id填充。<br><br>* 列名曾为user_profiles.uuid，先已废弃。 |\n|hash_uid |与users表进行join时，建议采用hash_uid以提升join效率，加速查询。 |\n|bddid |可以理解为处理后的device_id。该字段只支持in、not in、=、!=这四种运算符，不支持like、字符串函数等。 |\n|event |事件名 |\n|event_date |事件发生日期，任何SQL都建议指定事件发生时间，否则根据event_time进行推导。 |\n|event_time |* 事件发生时间戳，10位。<br><br>* 当且仅当使用event_time作为约束条件时，会自动推导event_date；因此不建议使用time和server_time进行时间条件的约束。 |\n|time |事件发生时间戳，历史为10位，现为13位。 |\n|server_time |服务端接收到事件的时间戳，10位。 |\n|event_params.xxx.yyy |* 事件属性，格式为 **event_params.事件名.事件属性名** ，此时sql只会查询该事件相关的数据。<br><br>* 事件名可省略，写作 **event_params.事件属性名** ，此时sql会查询所有事件。 |\n|user_profiles.xxx |公共属性，格式为 **user_profiles.公共属性名**。user_profiles.user_id 对应产品中的user_unique_id。 |\n|item_profiles.xxx.yyyy |* 业务对象属性，格式为 **item_profiles.业务对象名.业务对象属性名**。<br><br>* 查出来的值均为array类型，使用方法可见FAQ。 |\n|其他字段 |\\- |\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">event_params.xxx.yyy、user_profiles.xxx 、item_profiles.xxx.yyy三种字段建议起别名，否则查询可能存在问题。</div>\n\n\n<span id=\"_1-2-2-users表\"></span>\n### 1.2.2 users表\n\n**本表查询范围为：用户SSID/UUID、all_value/last_value类型的公共属性与业务对象属性。** \n\n\n|字段 |说明 |\n|---|---|\n|stat_standard_id |统计口径ID，与events表含义相同。 |\n|user_id |用户ID。 |\n|ssid |ssid |\n|bddid |可以理解为处理后的device_id。该字段只支持in、not in、=、!=这四种运算符，不支持like、字符串函数等。 |\n|last_active_date |* 表示该用户的最后活跃时间，可以理解为users表该记录的最后刷新时间。目前支持“YYYY\\-MM\\-dd”与“YYYYMMdd”的格式，例如：last_active_date='2020\\-08\\-10'。<br><br>* events表和users表进行join时，会自动根据events表的event_date限制推导last_active_date；比如查询事件发生事件为2021\\-08\\-01，那么last_active_date将会自推导为大于等于2021\\-08\\-01（因为如果last_active_date小于2021\\-08\\-01，那么该用户在2021\\-08\\-01之后必然没有发生过任何事件）。 |\n|user_profiles.xxxx |* 公共属性，格式为 **user_profiles.公共属性名**。<br><br>* all_value和last_value均可，但是users表中保存的值都是最新值；如需查询all_value类型的公共属性的历史值，可以在events表中进行查询。 |\n|其他字段 |\\- |\n\n\n<span id=\"_1-2-3-items表\"></span>\n### 1.2.3 items表\n\n**本表查询范围为：all_value/last_value类型的业务对象相关信息**。\n\n\n|字段 |说明 |\n|---|---|\n|item_name |业务对象名。 |\n|last_active_date |表示该业务对象属性最后的刷新时间。 |\n|item_profiles.xxx.yyyy |业务对象属性，格式为 **item_profiles.业务对象名.业务对象属性名**。 |\n|其他字段 |\\- |\n\n\n<span id=\"_1-2-4-cohorts表\"></span>\n### 1.2.4 cohorts表\n\n**本表查询范围为：分群中包含的用户统计口径id、hash_uid、分群id等**。\n\n\n|字段 |说明 |\n|---|---|\n|stat_standard_id |统计口径id。 |\n|hash_uid |对统计口径id进行了hash处理，通常用于join和in子查询，查询速度比用stat_standard_id更快。 |\n|cohort_id |分群id。 |\n\n\n\n* 在\"元数据\"标签下，可以查看所有的分群名、分群id以及分群人数。\n\n* 当前暂不支持查询分群历史版本，因此目前通过分群id查询的是 **最近一次成功刷新的分群，和其他高级分析场景一致。** \n\n\n<span id=\"_1-3-查询范围\"></span>\n## 1.3 查询范围\n\n\n* 时间范围：近一年（包含今天）\n\n* 数据范围：事件、事件属性、公共属性与业务对象属性。\n\n\n<span id=\"_1-4-日期过滤\"></span>\n## 1.4 日期过滤\n\n**针对event_date与last_active_date，目前支持以下函数，如对其他函数有需求，可向客服反馈。** \n\n\n* **支持函数：**  subtractMonths,subtractWeeks,subtractDaysaddMonths, addWeeks, addDaystoStartOfQuarter,toStartOfMonth,toStartOfISOYear,toMonday,toStartOfWeek\n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">toStartOfWeek函数，mode为偶数时，起始为周一，否则为周日。   </div>\n   \n\n* **错误用法：** \n\n   ```sql\n   select event from events where toMonth(event_date) = 9；\n   select event from events where subtractDays(event_date, 10) = '2021-09-20'；\n   ```\n   \n\n   上述写法，自定义查询会提示无法推导出event_date。\n\n* **正确用法:** \n\n   ```sql\n   select event from events where event_date >= subtractDays(today(), 10)；\n   ```\n   \n\n\n<span id=\"_1-4-1-events表\"></span>\n### 1.4.1 events表\n\n在任何情况下，都强烈建议采用event_date作为日期过滤条件，如需更加精确的时间区间，可采用event_date+event_time进行限制。\n\n\n* event_dateevent_date表示事件发生的日期，精确到天，可用于加快查询速度，缺省时默认为过去7天(包含今天)。目前仅支持“YYYY\\-MM\\-dd”的格式，例如：event_date='2020\\-08\\-10'。\n\n* event_timeevent_time表示事件的发生时间，为10位时间戳，精确到秒，可用于提供更精确的时间区间。\n\n* 时区国内站接入应用的event_date均为UTC+8（东八区）时间，国际站接入应用的event_date均为UTC（零时区）时间。例如：event_time = 1597273200，国内站event_date为'2020\\-08\\-13'event_time = 1597273200，国际站event_date为'2020\\-08\\-12'国内站接入应用: 查询北京时间2020年8月10日6：00至2020年8月12日14:00所发生的事件\n\n   ```Plain Text\n   select event\n   from events \n   where \n   event_time >= 1597010400\n   and event_time <= 1597212000\n   and event_date >= '2020-08-10'\n   and event_date <= '2020-08-12'\n   ```\n   \n\n   国际站接入应用，应用的时区为UTC时间: 查询UTC时间2020年8月10日6：00至2020年8月12日14:00所发生的事件\n\n   ```Plain Text\n   select event\n   from events \n   where \n   event_time >= 1597039200\n   and event_time <= 1597240800\n   and event_date >= '2020-08-10'\n   and event_date <= '2020-08-12'\n   ```\n   \n\n   国际站接入应用，应用的时区为UTC+7时间: 查询UTC+7时间2020年8月10日6：00至2020年8月12日14:00所发生的事件，相当于查询UTC时间2020年8月9日23:00至2020年8月12日7:00所发生的事件:\n\n   ```Plain Text\n   select event\n   from events \n   where \n   event_time >= 1597014000\n   and event_time <= 1597215600\n   and event_date >= '2020-08-09'\n   and event_date <= '2020-08-12'\n   ```\n   \n\n   <div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">注意   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"warning\" data-wrapper-indent=\"1\">无论何时，都建议您在SQL中指定event_date的起、止时间，以此加速查询速度。如果您未添加，SQL自定义查询功能会自动拼装时间限制，可能会产生与您预计时间段不同的数据。   </div>\n   \n\n<span id=\"_1-4-2-users、items表\"></span>\n### 1.4.2 users、items表\n\n与events表进行join时，last_active_date可以通过event_date进行自动推导，其他情况建议用户指定last_active_date范围。\n\n**语义举例：** \n\n\n1. 查询2020年8月10日 **后** 的活跃用户的性别。\n\n   ```sql\n   select user_profiles.gender from users where last_active_date >= '2020-08-10'\n   ```\n   \n\n2. 查询2020年8月10日 **前** 的做过A事件的用户的性别\n\n   ```sql\n   select gender, hash_uid, user_id\n       from events as table_a\n               left join\n               (   \n                   select hash_uid, user_profiles.gender as gender from users\n                   where user_profiles.gender is not null\n               ) as table_b \n       on table_a.hash_uid == table_b.hash_uid\n      where event_date <= '2020-08-10' and event = 'A'\n       limit 500;\n   ```\n   \n\n\n该sql未指定事件的起始event_date，因此默认起始event_date为今日的365天前，假设为'2019\\-10\\-11'。此时，join子句中，也默认查询last_active_date\\>='2019\\-10\\-11'的用户。\n\n值得注意的是，该案例的 **典型错误写法** 为：\n\n```sql\nselect gender, hash_uid, user_id\n    from events as table_a\n            left join\n            (   \n                select hash_uid, user_profiles.gender as gender from users\n                where user_profiles.gender is not null where last_active_date <= '2020-08-10'\n            ) as table_b \n    on table_a.hash_uid == table_b.hash_uid\n   where event_date <= '2020-08-10'\n    limit 500;\n```\n\n\n如果用户填写last_active_date <= '2020\\-08\\-10'，其join子句的语义就变为——查询2020年8月10号之后就没有事件的那些用户，而不是查询2020年8月10号之前有活动的用户。\n\n<span id=\"_1-5-常用函数\"></span>\n## 1.5 常用函数\n\n\n1. 近似分位数函数 quantile 与 近似中位数 medianquantile(level)(expr)参数\n\n   * Level —— 分位数层次。可选参数，level的推荐取值范围为[0.01, 0.99]，默认值level=0.5，即为计算中位数。\n\n   * expr —— 表达式。 可选数值、日期或时间数据类型\n\n   median(expr)相当于是quantile(0.5)(expr)注意: 该函数采用Reservoir_sampling随机算法，因此结果是近似且非确定的。举例：查询2020年8月10日的订单事件中，分位数为0.2的金额。\n\n   ```Plain Text\n   select quantile(0.2)(event_params.order.money) from events where event = 'order' and event_date = '2020-08-10' limit 1;\n   ```\n   \n\n2. 方差函数 varSamp计算 `Σ((x - x̅)^2) / (n - 1)`，这里 `n` 是样本大小， `x̅`是`x`的平均值。\n\n&nbsp;\n\n   举例: 查询2020年8月10日的订单事件中，金额的方差\n\n   ```Plain Text\n   select varSamp(event_params.order.money) from events where event = 'order' and event_date = '2020-08-10' limit 1;\n   ```\n   \n\n3. 条件函数 if语法：\n\n   ```Plain Text\n   SELECT if(cond, then, else)\n   如果条件cond的计算结果为非零值，则返回表达式then的结果，并且跳过表达式else的结果（如果存在）。如果cond为零或NULL，则跳过then表达式的结果，并返回else表达式的结果（如果存在）。、\n   ```\n   \n\n   参数：\n\n   * cond: 条件表达式\n\n   * then: 条件满足时返回的表达式\n\n   * else: 条件不满足时返回的表达式\n\n   举例：查询2020年10月6日至12日中，触发A事件比触发B事件次数多的人。\n\n   ```Plain Text\n   select distinct user_unique_id\n   from (select user_unique_id                      as `user_unique_id`,\n              if(event = 'A', count(1), 0) as `event1_cnt`,\n              if(event = 'B', count(1), 0) as `event2_cnt`\n       from events\n       where event in ('A', 'B')\n         and event_date >= '2020-10-06'\n         and event_date <= '2020-10-12'\n       group by user_unique_id, event\n       limit 1000)\n   group by user_unique_id\n   having sum(event1_cnt) > sum(event2_cnt)\n   ```\n   \n\n4. 数组函数 arrayEnumerate(arr)返回与源数组大小相同的数组，其中每个元素表示与其下标对应的原数组元素在原数组中出现的次数。常用用法类似hive中的开窗函数row_number()参数：\n\n   * arr 数组举例：查询2020年10月25日至11月1日中，不同事件的前三次发生时间\n\n      ```Plain Text\n      select *\n      from (\n            select event, time_arr, row_number\n            from (\n                  select event,\n                         groupArray(time)         as time_arr,\n                         arrayEnumerate(time_arr) as row_number\n                  from (select distinct event, event_time as time\n                        from events\n                        where event_date >= '2020-10-25'\n                          and event_date <= '2020-11-01'\n                        order by time) a\n                  group by event\n                )\n                array join\n                time_arr\n               , row_number\n               )\n      where row_number <= 3;\n      ```\n      \n\n      结果集：\n\n      \n      |event |time_arr |row_number |\n      |---|---|---|\n      |wechat_unsubscribe |1603967567 |1 |\n      |wechat_unsubscribe |1603968269 |2 |\n      |wechat_unsubscribe |1603968275 |3 |\n      |goods_detail_view |1603469824 |1 |\n      |goods_detail_view |1603473124 |2 |\n      |goods_detail_view |1603479424 |3 |\n      \n\n      补充：该用法类似于HQL的row_number()，在上述例子中的HQL写法为：\n\n      ```Plain Text\n      select *\n      from \n           (\n               select event, \n                      row_number() over(partition by event order by event_time) as row_number\n               from events\n           ) a\n      where a.row_number <= 3;\n      ```\n      \n\n   * 类似函数：arrayEnumerateUniq、arrayEnumerateDense\n\n5. match、multiMatchAny、multiMatchAnyIndexmatch(haystack, pattern)\n\n   * haystack 需要匹配的字段\n\n   * pattern 符合RE2语法的正则表达式 re2: https://github.com/google/re2/wiki/Syntax\n\n   * 返回值为0表示未匹配，1表示匹配。\n\n   举例：\n\n   ```sql\n   select distinct user_profiles.user_id, multiMatchAny(user_profiles.user_id, ['^[0-9]*$', '^d{10}$']) as is_match from events where event_date > '2021-03-01' limit 20;\n   ```\n   \n\n   结果集：\n\n   \n   |user_profiles.user_id |is_match |\n   |---|---|\n   |209041 |1 |\n   |unknown |0 |\n   \n\n   multiMatchAny(haystack, [pattern1, pattern2, ...])\n\n   * [pattern1, pattern2, ...] 任意符合PCRE语法的正则表达式。\n\n   * 返回值为0表示均为匹配，1表示至少存在一个pattern匹配。\n\n   * 在匹配子串时，该函数匹配速度更快。\n\n   * haystack字符串需要小于2^32字节。\n\n&nbsp;\n\n      multiMatchAnyIndex(haystack, [pattern1, pattern2, ...])\n\n   * 与multiMatchAny类似\n\n   * 返回值为与haystack匹配的索引，索引从1开始，无匹配返回0，\n\n   举例：\n\n   ```Plain Text\n   select distinct user_profiles.user_id, multiMatchAnyIndex(user_profiles.user_id, ['^[0-9]*$', '^([a-zA-Z0-9_-].)+@[a-zA-Z0-9_-]+(.[a-zA-Z0-9_-]+)+$', '(.[a-zA-Z0-9_-]@)+']) as regex_index from events where event_date > '2021-03-01' limit 2;\n   ```\n   \n\n   结果集：\n\n   \n   |user_profiles.user_id |regex_index |\n   |---|---|\n   |209041 |1 |\n   |xxxx.xxx@xxx.com |3 |\n   |aaa@aaa.com |2 |\n   |unknown |0 |\n   \n\n\n<span id=\"_1-6-常见用法举例\"></span>\n## 1.6 常见用法举例\n\n\n* **根据uuid查询用户在某一天的行为**\n\n   ```Plain Text\n   select event \n   from events \n   where user_profiles.user_id = 'datafinder@datarangers.com' \n   and event_date = '2020-08-10'\n   limit 20\n   ```\n   \n\n* **查询在某一时间段内的用户的某个事件的发生总量**\n\n   ```Plain Text\n   select count(event)\n   from events\n   where \n   event = 'event_name'\n   and event_time > 1596988800\n   and event_time < 1597161600\n   limit 20\n   ```\n   \n\n* **查询发生过行为1和行为2，但是没有发生过行为3的用户数**\n\n   ```Plain Text\n   select count(distinct hash_uid)\n   from events\n   where \n   (event = 'event_1' or event = 'event_2' and event != 'event_3')\n   and event_time > 1596988800\n   and event_time < 1597161600\n   limit 20\n   ```\n   \n\n* **查询用户的首次行为属性**\n\n   ```plain\n   select user_profiles.user_id, event_params.{event_name}.{event_param_name} from events\n   where event = 'sogo'\n   and event_date > '2020-01-01'\n   order by event_time desc\n   limit 10;\n   ```\n   \n\n* **查询一段时间内用户购买数量分布情况**\n\n   ```plain\n   select \n       case\n           when amount > 10 then 'x>10'\n           when amount >5 and amount <= 10 then '5<x<=10'\n           else 'x<=5'\n       end\n   from\n   (\n       select event_params.buy.amount as amount\n       from events\n       where event = 'buy'\n       and event_date > '2020-06-01' and event_date < '2020-08-02'\n       limit 200\n   )\n   ```\n   \n\n   查询事件相关信息时，把分群作为条件。\n\n   ```sql\n   select event from events where hash_uid in (select hash_uid from cohorts where cohort_id = 154) and event_date = yesterday()\n   sql\n   ```\n   \n\n* **查询分群中用户的user_id**\n\n   ```sql\n   select user_id from users where hash_uid in (select hash_uid from cohorts where cohort_id = 154) and last_active_date >= '2021-01-01'\n   sql\n   ```\n   \n\n\n<span id=\"_2-函数列表\"></span>\n# 2. 函数列表\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\

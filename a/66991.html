<script>window.DATA_BASE="../";window.INIT_DOC=66991;window.INIT_MD="一般事件模块可查询和维护当前支持的一般事件（除虚拟事件、圈选事件外的事件）的详细信息，支持进行新增事件、编辑事件、设置事件状态、验收埋点等操作。本文为您介绍一般事件的基本概念和功能的操作指导。\n\n<span id=\"2986075d\"></span>\n# 基本概念\n\n\n|术语 |概念介绍 |\n|---|---|\n|事件 |描述您的用户在产品内触发的一系列动作（比如：点击、滑动、访问页面等），事件采集主要通过应用内埋点来实现，因此也称为“埋点数据”。 |\n|事件属性 |在事件触发时，可以采集到事件发生的形式、位置等，用来描述事件的信息，称为事件属性。<br><br>例如开始播放视频的事件属性可以是用户所使用设备相关的属性，如操作系统、软件版本、软件渠道、IP地址等信息；也可以是业务相关的视频ID、视频名称、视频分类、视频标签等。 |\n|预置事件 & 预置属性 |* 预置事件：系统提供的SDK自带的事件，由系统统一配置上报时机。<br><br>* 预置属性：预置事件自带的事件属性。<br><br><br>不同数据上报端支持的预置事件列表不同，预置事件列表详情请参见[预置属性总表](https://www.volcengine.com/docs/6287/169885)。 |\n\n\n<span id=\"f3c4e646\"></span>\n# 功能介绍\n\n登录DataTester产品控制台后，您可以在左侧导航栏单击**指标管理**\\>**元数据管理**\\>**一般事件**进入一般事件页面。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/77ebb8057f0b4256b13e4c6d2b6d8612~tplv-goo7wpa0wc-image.image) </span>\n\n\n* 您可以在当前页面查看当前应用下的所有一般事件的列表，单击对应事件名称即可查看事件详情。顶部的过滤条件可帮助您快速过滤查询。\n\n* 拥有一般事件管理权限的用户，还可以进行一般事件的修改、新建、状态修改等管理操作。\n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">如果您需要管理一般事件，请联系您的应用管理员为您开通“数据管理\\-一般事件\\-可管理”功能权限，无权限用户只能查看，无法进行操作。   </div>\n   \n\n* 一般事件列表仅展示已验收的事件，未验收事件可点击“验收事件”查看并完成验收。\n\n* 实时埋点检测是可以实时检测、快速验证埋点是否正确及数据上传情况的功能；支持移动端App(Android、iOS)、微信小程序。\n\n\n<span id=\"26e82e03\"></span>\n## 查看事件详情\n\n在一般事件页面可查看所有事件列表，列表同时展示了事件的展示名、描述等信息。单击事件名，在右侧弹出的侧边页面中可查看更多详细信息。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/3acb0243375a435baf303ac9b65544bd~tplv-goo7wpa0wc-image.image) </span>\n\n\n* 您可以查看对应事件是否是预置事件、事件的属性有哪些等。\n\n* 当前系统已为您提供了大量预置事件、预置属性，建议您在数据分析前跟进业务需求，规划好需要上报分析的埋点后，先查看预置事件是否已满足业务需求，如果不满足可再手动创建自定义事件。\n\n\n<span id=\"0466d67b\"></span>\n## 新增事件\n\n支持单个新增事件，也支持批量新增，操作指导如下。\n\n<span id=\"aba36941\"></span>\n### 单个新建事件\n\n打开**元数据管理 \\> 一般事件**页面，点击页面右上角“新建事件\\>单个新建事件”按钮，您可以在弹窗中登记事件信息，一次只能提交一个事件。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/8cd7607726ad4fa9a3813e8d27aad0c7~tplv-goo7wpa0wc-image.image) </span>\n\n\n|参数 |配置说明 |\n|---|---|\n|事件名称 |自定义新增事件的事件名称，配置要求如下：<br><br><br>* 事件名称不得与已存在的事件名称或虚拟事件名称重复。<br><br>* 事件名称命名规范：以字母或数字开头，后面可以跟字母、数字、下划线、点号、空格和短横线，总长度为 1 到 255 个字符。 |\n|展示名 & 事件分类 & 事件描述 |* 展示名：建议填写事件含义，例如：点击提交按钮。<br><br>* 事件分类：建议选择与事件应用场景相关的分类。<br><br>* 事件描述：建议填写事件上报时机、业务场景等信息，例如：用户点击注册页面的提交按钮时上报。 |\n|属性设置 |您可以为当前新增的事件选择事件属性。支持添加多个事件属性。<br><br><br>* 当前可选的事件属性为一般事件属性（在params上报的属性），即选择后此属性为当前新增事件专属的属性。<br><br>* 事件公共属性（在header上报的属性）为所有事件共有的属性，无需在单个事件中设置，需要新增公共属性时可前往“事件属性”页面进行创建。 |\n\n\n<span id=\"5eac2b7f\"></span>\n### 批量新建事件\n\n如果您需要一次性登记多个事件，您可以使用批量新建事件功能提高操作效率，一次最多可以提交200个事件。\n\n打开**元数据管理 \\> 一般事件**页面，点击页面右上角“新建事件\\>批量新建事件”按钮，根据界面提示下载《埋点设计模板》，按照格式说明填写埋点信息并上传。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/38218731eb214b0b8aa1b8960180de0a~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"9c570002\"></span>\n## 修改事件的事件属性\n\n如果您需要对已经上报的事件追加事件属性，可以点击列表中的事件名称，在事件详情页点击“添加事件属性”，为当前事件追加属性；同时也可删除事件已添加的自定义属性。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/2e95e3be5e9f41188e1768530df3c8ec~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"ae9deefa\"></span>\n## 编辑事件展示名、描述、分类\n\n建议您及时维护事件展示名、事件描述信息，这有助于应用成员更好的理解埋点业务含义。支持单个修改或批量修改。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/cf68b5ded6ba4f5d9759216c3b90cb3b~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"2ceae500\"></span>\n## 启用/禁用/隐藏事件\n\n您可以在列表调整事件的状态。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/29100ad6053546f3b066b303e4ca8319~tplv-goo7wpa0wc-image.image) </span>\n\n不同状态下的事件处理逻辑如下：\n\n\n|**状态** |**是否占用配额** |**是否构建存储** |**是否产品内可用** |**是否计费** |**是否支持导出数据到本地** |\n|---|---|---|---|---|---|\n|**禁用** |否 |否 |否 |否 |否 |\n|**启用** |是 |是 |是 |是 |是 |\n|**隐藏** |是 |是 |否 |是 |是 |\n\n\n<span id=\"63a37c12\"></span>\n## 验收事件\n\n如果您开启了数据的埋点入库校验，那么只有验收过的事件才能查到数据，即一般事件列表仅展示已验收的事件，未验收事件可点击“验收事件”查看并完成验收。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/2920dc59475c4feb8da99847d083401a~tplv-goo7wpa0wc-image.image) </span>\n\n\n* 待验收事件列表上限展示1000个事件，超出部分不可查。\n\n* 您也可以在“数据验收”页面管理事件黑名单，将需要的事件添加或移出黑名单，黑名单事件数量不限。\n\n\n<span id=\"c1fa424e\"></span>\n## 验证埋点\n\n实时埋点检测是可以实时检测、快速验证埋点是否正确及数据上传情况的功能；支持移动端App(Android、iOS)、微信小程序，相关操作说明请参见[埋点实时验证](https://www.volcengine.com/docs/6287/1262388)。\n\n<span id=\"8b576edb\"></span>\n# 常见问题\n\n<span id=\"72a6e043\"></span>\n## **Q1：如何删除事件？** \n\n当前Finder不支持删除已经存在的事件，您可以将不需要的事件状态设置为“禁用”。\n\n<span id=\"3d4d7e9e\"></span>\n## **Q2：为什么事件在分析模块找不到？** \n\n建议先检查事件状态，被禁用的事件无法使用。如需使用可以重新启用。\n\n<span id=\"f98de2f8\"></span>\n## **Q3：如何添加事件属性？** \n\n如果您需要对已有的事件添加事件属性，您可以点击“登记埋点”对已有的事件添加事件属性。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">一般事件只能登记非事件公共属性，事件公共属性需要在“事件属性”模块登记。</div>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

<script>window.DATA_BASE="../";window.INIT_DOC=81360;window.INIT_MD="配置管理\\-Feature Flag（后简称Feature Flag）本质是按用户指定的规则下发不同的功能参数，以达到敏捷发布的使用效果。除常见的“功能开关”外，还可以实现动态下发“应用配置”、“业务配置”、“环境配置”、“安全配置”等诸多参数的能力。本文为您概要介绍DataTester的配置管理功能以及应用场景和优势。\n\n<span id=\"46e63e0f\"></span>\n# 功能概述\n\nFeature Flag是一种结合功能开关+动态配置+灰度发布+配置管理的敏捷开发技术，基于先进的Feature flag引擎和一站式配置托管能力，满足应用新功能灰度发版、A/B 实验到全量、人群定向发布等不同应用场景。帮助开发、产品、运维人员在低风险环境下迭代新 Feature，实现精益敏捷开发。\n\nFeatureFlag通过If/else或更复杂的决策树声明，将Feature的开发部署与发布生效解耦，从而实现：\n\n\n1. **提升开发效率**：多个Feature可并行开发，随时部署上线，准备好时再发布生效\n\n2. **降低发布风险**：基于Feature细粒度地渐进式灰度发布、基于Feature的秒级版本回滚\n\n\n<span id=\"9c45f470\"></span>\n# 应用场景\n\n<span id=\"940935cc\"></span>\n## 行业痛点\n\n在互联网竞争炙热的红海时代，精益开发高效迭代越来越成为成为产品竞争的利器。产品迭代过程中，如何保障高效的功能迭代安全上线，如何快速实现不同人群的精细化运营，成为了产研人员的新挑战，各产研角色面临着以下常见痛点。\n\n\n|**研发痛点** |**运营痛点** |**运维痛点** |**QA痛点** |\n|---|---|---|---|\n|* 新功能发布，如何保障安全上线？<br><br>* A/B实验后，该如何正确全量？ |* 想做个运营活动，如何便捷实现不同城市不同的策略？<br><br>* 活动要在双十一准点上线，如何实现自动上下线？ |* APP、H5、小程序，多端配置如何管理？<br><br>* 冗余代码越来越多，如何做配置治理？ |* 新功能发布，如何才能及时发现异常？<br><br>* 异常问题如何快速定位？又如何将损失降到最低？ |\n\n\n为了帮助企业解决如此种种的迭代痛点，Feature Flag应运而生。\n\n<span id=\"bfa5b65a\"></span>\n## 应用场景与解决方案\n\nFeature Flag有着丰富的使用场景，为研发、运营、运维、QA等各个角色提供针对性解决方案。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_03cf6106930ad4e865b64471b19a09f1.png) </span>\n\n<span id=\"0c83037f\"></span>\n## 一. 缓解上线发布风险\n\n新功能发版可逐步灰度扩量，先让小部分用户体验新功能，观察用户反馈和数据表现，再初步扩量，潜藏问题及时发现快速止损。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_15d896da46d548e253b2ec22e22ecfae.png) </span>\n\n\n* 蓝绿发布：对于有两个相同的生产环境中的软件发布方式（优点是易于故障转移，并且避免发布停机），FeautreFlag提供了较大版本中的单个功能有问题，则无需回滚所有功能的能力，针对特定用户，可以将内部QA/测试人员，外部Beta测试人员或用户群的特定细分受众群暴露给新的Feature。\n\n* 金丝雀发布：许多组织要同时测试/使用Canary版本，属于程序包级别的工作，因此需要FeatureFlag来打开/关闭每个部分的功能。\n\n* 渐进式交付：灵活的发布排期管理+关键操作审核+发布回滚，为降低新功能爆炸半径的风险提供了基础，Feature flag将FeatureFlag与运营和客户数据配对，实时监控新代码的推出。\n\n* 生产测试：在生产中直接测试代码是验证Feature正常工作的最可靠方法之一，Feature flag允许直接在生产环境中圈选一小部分用户执行功能QA和性能测试，从而提供了一种安全有效的扩展方式，如果出现问题，错误跟踪和性能监控的数据会提醒用户注意对应功能，可以立即关闭任何Flag而无需回滚代码。\n\n* Beta测试：通常由产品经理或工程师运行，试图验证新功能的性能，可用性和功能参数，是软件发布生命周期中的关键阶段，使开发团队有机会运行受控的用户测试。通常在进行QA和内部测试人员的Alpha测试之前。\n\n\n**典型场景1 AB实验安全快捷全量**\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_146872850599e833624a7c30d96add7a.png) </span>\n\n**典型场景2 新功能灰度发版降低风险**\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_63b4295e4df64e4527b5df04b2f1f4b4.png) </span>\n\n<span id=\"b431b928\"></span>\n## 二. 减少开发周期\n\n\n* 持续交付：采用基于主干的开发流程（确保共享分支始终可释放的唯一方法是将未完成的功能隐藏在默认关闭的Flag后面，通过关闭该标志并随时将其部署到主服务器上来构建新功能，防止新功能完成之前发生合并冲突 ），减少部署和发布的代码量，加快部署并降低发布风险。\n\n* 暗启动：一种在其中部署新功能而不将其暴露给用户的上线策略，准备就绪后再打开，Feature Flag可简化暗启动功能的过程。将代码包装在Flag中，保持Flag关闭，释放新功能。\n\n* 微服务改造：跨服务的大型特性更改通常存在依赖性，利用FeatureFlag来打开和关闭功能，可以使传统架构向微服务架构下的过渡安全且受控。\n\n\n**典型场景 多feature并行持续开发提升迭代效率**\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_ee5719f8acadf6300f05ed90ee846cb9.png) </span>\n\n<span id=\"3ed995f0\"></span>\n## 三. 精细化运营\n\n\n* 功能个性化：可根据不同人群特点展示不同的功能，比如安卓用户推荐QQ登录，iOS用户推荐微信登录，提升不同人群的个性化体验\n\n* 差异化运营：运营活动时，可针对不同地域、人群采用差异化的运营策略，实现细分人群的精细化运营\n\n* 定制化发布：Feature Flag支持按公共属性、用户分群、画像分群、事件流圈人等多种圈人群方式，并支持用户自定义人群受众，满足业务定制化的定向发布需求\n\n\n<span id=\"147bab0f\"></span>\n# 产品优势\n\n<span id=\"50836d39\"></span>\n## 一. 营销：智能定向，千人千面，数据洞察\n\nFeature flag丰富的定向圈人能力，可以实现包括 **落地页** 、 **活动策略** 、 **产品功能** 甚至 **产品流程** 的千人千面。例如对于 Geek 用户，开通最新最有趣的能力，紧紧抓住其眼球，对于不那么精准的新用户，缩短转化流程，以最便捷的方式留住客户。如果您能够把客群分 10 类，产品变成各种 Flag 排列组合出的 10 个版本，岂不有趣？\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_fd05c22f7638635eeacf93fc8a40d0ee.png) </span>\n\n<span id=\"036cab52\"></span>\n## 二. 稳定：360° 全方位上线保护\n\nAPM底层直接赋能，接入包括崩溃、错误、性能问题的所有指标，支持 Feature 级甚至变体级别的上线监控，确保第一时间发现问题并定位问题，将发布风险降至最小。后续还会上线更丰富的能力，Feature 地图、档案详尽管理，确保变体时刻保持最优且可用的布局。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_3dab24dd1b59acc39d203480b62cc3a9.png) </span>\n\n<span id=\"ec69dcb7\"></span>\n## 三. 高效：多角色衔接，加速迭代\n\n版本上线异常时，可轻松实现 Feature 级的回滚，而非针对版本的直接下架，不影响已下载新版本的客户体验，也不影响其他正常功能的上线。通过权限控制，部分 Flag 支持非技术人员介入管理，让业务需求能够更敏捷的体现在功能上，及时传递给用户，同时也规避了复杂的上线审批。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/

</script>

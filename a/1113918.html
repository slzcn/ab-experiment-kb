<script>window.DATA_BASE="../";window.INIT_DOC=1113918;window.INIT_MD="<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">如果您用的是是云原生的SaaS产品，那么：</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">集团id不是火山的账号id；火山的账号id是「210000xx」这样的形式，集团id不是这个形式哈！</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">集团id需要的是进入产品后查看，可以看下方的说明。</div>\n\n\n<span id=\"快速找到集团id\"></span>\n# 快速找到集团id\n\n\n|1 |[注册](https://www.volcengine.com/docs/6261/64925)火山并登陆火山官网 | |\n|---|---|---|\n|2 |进入「[增长分析](https://www.volcengine.com/product/datafinder)」or 「[A/B测试](https://www.volcengine.com/product/datatester)」产品页，并点击「进入产品」 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_582854944bec1f612c7eb0c9c37c264b.png) </span><br><br><span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_af057a233a6f1e6a8a2e18c2403420f0.png) </span> |\n|3 |点击「集团信息」，找到集团id<br><br>> 注意：不要demo集团哦，需要创建一个属于你的集团（即你的公司） |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_af8472da320595c5edf5f1a8381e746c.png) </span> |\n\n\n<span id=\"q：如何创建一个集团？\"></span>\n## Q：如何创建一个集团？\n\n\n|**A/B测试** |**增长分析** |\n|---|---|\n|点击右下角设置进入集团设置 |点击左上角设置进入集团设置 |\n|<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_2de730097ad1b6ebaeb3d4077a6d5730.gif) </span> |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_cf73e5146476e55c894b74bc6aedc87e.gif) </span> |\n\n\n<span id=\"【详细步骤说明】\"></span>\n# 【详细步骤说明】\n\n<span id=\"一、登录火山官网\"></span>\n## 一、登录火山官网\n\n<span id=\"方式一：进入火山引擎官网后，找到你所购买的产品，并登录火山官网\"></span>\n### 方式一：进入火山引擎官网后，找到你所购买的产品，并登录火山官网\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_b31235427d820f5d16ebd6da411cd5c2.png) </span>\n\n如果你购买的为「增长分析」进入增长分析产品页面，点击进入产品，先登录后就可以进入了；\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_a2946394624af5ef0ca7117a0a1a0d26.png) </span>\n\n如果你购买的为「A/B测试」进入增A/B测试产品页面，点击进入产品，先登录后就可以进入了；\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_200eec2bf3aa46fabf6854bf1404f66a.png) </span>\n\n<span id=\"方式二：从控制台登录后，搜索你购买的产品，如「增长分析」、「a-b测试」；\"></span>\n### 方式二：从控制台登录后，搜索你购买的产品，如「增长分析」、「A/B测试」；\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_96475ea77ba2289b109c6068ece4ef3d.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_544c5e6666940c055f842eb590852455.png) </span>\n\n&nbsp;\n\n<span id=\"二、进入产品后找到集团设置\"></span>\n## 二、进入产品后找到集团设置\n\n<span id=\"「增长分析」产品页面进入设置，切换到自己的集团，如下图：\"></span>\n### 「增长分析」产品页面进入设置，切换到自己的集团，如下图：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_6c5208bbdd9b33e4e984f001c4bedb64.gif) </span>\n\n&nbsp;\n\n<span id=\"「a-b测试」产品的集团设置页面入口：\"></span>\n### 「A/B测试」产品的集团设置页面入口：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_d6af0b372fe012bd6b20cdb25228025a.gif) </span>\n\n&nbsp;\n\n<span id=\"三、进入集团设置后，点击集团信息就可以找到集团id了\"></span>\n## 三、进入集团设置后，点击集团信息就可以找到集团id了\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_9d5e3b53d10e1c43e49f028a7bb040f9.png) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

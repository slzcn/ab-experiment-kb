<script>window.DATA_BASE="../";window.INIT_DOC=1144120;window.INIT_MD="虚拟属性可以满足属性值二次加工的需求，您可以通过编写SQL表达式中的四则运算和部分字符串操作函数来创建一个虚拟属性，后续用于用户属性、部分或全部事件属性。本文为您介绍虚拟属性的注意事项和使用指导。\n\n<span id=\"d754c338\"></span>\n# 使用限制\n\n一个应用允许创建的虚拟属性个数有限，当创建的虚拟属性数量达到上限后，“创建虚拟属性”按钮将不可点击。\n\n\n* SaaS\\-云原生、SaaS\\-非云原：一个应用最多创建200个虚拟属性。\n\n* 私有化：一个应用最多创建5000个虚拟属性。\n\n\n<span id=\"e6f8c14b\"></span>\n# 创建虚拟属性\n\n\n1. 登录DataTester控制台后，单击左侧导航栏**数据管理**\\>**元数据管理**\\>**虚拟属性**，进入虚拟属性页面。\n\n2. 单击页面右上角的**创建虚拟属性**按钮，新建一个虚拟属性，在弹出的侧边框中配置虚拟属性参数。\n\n3. 配置虚拟属性参数。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/70534f66c9ce4268bde2589657108b63~tplv-goo7wpa0wc-image.image) </span>\n\n   \n   |**参数** |**配置说明** |\n   |---|---|\n   |属性类型 |* 事件虚拟属性：通过现有属性计算得到的新的事件属性。原属性可以来自于事件属性、用户属性。<br><br>* 用户虚拟属性：基于用户表的属性计算得到的新的用户属性。 |\n   |属性名称 |必填，仅可命名为英文和字符。规则为[a\\-zA\\-Z_][0\\-9a\\-zA\\-Z_]\\*，长度100 字符以内。大小写敏感（与现状保持一致）。我们会增加默认前缀为 $*vp* |\n   |数据类型 |配置虚拟属性的取值数据类型：string，int，float，datetime，list |\n   |SQL表达式 |填写对属性的加工的 SQL 表达式片段。您可以手动填写SQL表达式，当前已支持引用数字、中文等特殊字符开头的属性，通过使用反引号包裹，比如**event_params.** **`123`**，**user_profiles.** **`123`**。<br><br><div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div><br><br><br><br>* <div data-tips=\"true\" data-tips-type=\"warning\">当前暂不限制表达式中涉及到的属性个数，只有第一段 SQL 会被执行。</div><br><br><br>* <div data-tips=\"true\" data-tips-type=\"warning\">SQL表达式的通用配置能力如下，更多场景化的示例Demo可参见下文的\\*\\*<ins>SQL表达式Demo</ins>\\*\\*章节。</div><br> |\n   |关联方式<br><br>（仅事件属性需配置） |配置虚拟属性的关联方式：<br><br><br>* 只要其中一个有值就关联（任一）：关联了 SQL 中用到的任何一个属性的事件就会与虚拟属性关联<br><br>* 全部都有值才关联（全部）：关联了 SQL 中全部属性的事件才会与虚拟属性关联<br><br><br>关联事件的异同说明如下：<br><br><span>![图片](https://lf3-volc-editor.volccdn.com/obj/tos-cn-v-697126/273ab8570b2b466c8906a8cb4ef93480) </span> |\n   \n\n4. 完成以上操作，单击**确定**，即可创建一个虚拟属性。\n\n\n<span id=\"884a0d1a\"></span>\n# SQL表达式Demo\n\n<span id=\"e031bfb0\"></span>\n## Demo1：对属性值进行四则运算\n\n **【举例 1】** \n\n\n* 示例场景：\n\n   假设埋点的时候埋了两个属性：事件属性（float类型的属性）「成本价格 cost_price」和「销售价格 sale_price」，当我们想计算利润时，可以直接创建一个新的虚拟事件属性「利润 $vp_profit」。此时，我们可以使用「加减乘除运算」\n\n* SQL 表达式：\n\n   ```SQL\n   event_params.sale_price - event_params.cost_price\n   ```\n   \n\n\n **【举例 2】** \n\n\n* 示例场景：\n\n   假设埋点的时候埋了属性：事件属性「本金 principal」、「利率(月) interest_rate」和 「月数 duration」，需要对「理财产品的本息总和」进行计算。\n\n* SQL 表达式：\n\n   ```SQL\n   event_params.principal + event_params. principal * pow(event_params.interest_rate, event_params.duration)\n   ```\n   \n\n\n<span id=\"7660cc53\"></span>\n## Demo2：抽取属性值中的部分字段\n\n **【举例 1】** \n\n\n* 示例场景：假设埋点的时候有属性：事件属性「网址 full_url」，希望提取出域名信息。比如`https://console.volcengine.com/DataTester/app/178497/dashboard/6807670720953319944`，希望提取出`console.volcengine.com`\n\n* SQL 表达式：\n\n   ```SQL\n   domain(event_params.full_url)\n   ```\n   \n\n   具体的URL相关函数，具体的URL相关函数，请请参考[SQL自定义查询](https://www.volcengine.com/docs/84129/1261551)中的函数列表。\n\n\n **【举例 2】** \n\n\n* 示例场景：假设埋点的时候有属性：事件属性「内容详情 body_json」，属性内容为json格式的字符串，比如：\n\n   ```json\n   {\"product\": \"DataTester\", \"user_name\": \"管理员\"}\n   ```\n   \n\n   希望提取出product信息: DataTester\n\n* SQL 表达式：\n\n   ```SQL\n   JSONExtractString(event_params.body_json,'product')\n   ```\n   \n\n   具体的JSON相关函数，请请参考[SQL自定义查询](https://www.volcengine.com/docs/84129/1261551)中的函数列表。\n\n\n<span id=\"840cdb08\"></span>\n## Demo3：合并多个属性值\n\n **【举例 1】** \n\n\n* 示例场景：\n\n   假设埋点时上报错了属性名，比如 首先上报了事件属性「产品名称 produc_name」，运行一个月后发现名字拼错了，然后新上报了一个事件属性 「产品名称 product_name」。那么分析时希望能同时分析全部的数据。\n\n* SQL 表达式：\n\n   ```SQL\n   if(event_params.product_name IS NOT NULL, event_params.product_name, event_params.produc_name)\n   ```\n   \n\n\n **【举例 2】** \n\n\n* 示例场景：假设埋点的时候有属性：事件属性「价格 price」，为float类型，有值为10.56、200.345\n\n   希望展示是增加显示为￥10.56，￥200.345 可以使用如下规则创建虚拟属性：\n\n* SQL 表达式：\n\n   ```SQL\n   concat('￥',toString(event_params.price))\n   ```\n   \n\n\n<span id=\"55b624ab\"></span>\n## Demo4：统一属性值的计算精度\n\n\n* 示例场景：\n\n   假设埋点的时候有属性：事件属性「价格 price」，为float类型，有值为10.56、200.345\n\n   希望计算时四舍五入只考虑整数部分，比如11、200，可以使用如下规则创建虚拟属性：\n\n* SQL 表达式：\n\n   ```SQL\n   round(event_params.price,0)\n   ```\n   \n\n\n<span id=\"fd1397e4\"></span>\n## Demo5：给客户打标签\n\n\n* 示例场景：\n\n   假设埋点的时候有属性：用户属性「累计消费金额 total_cost」，为float类型\n\n   希望根据消费金额来对用户进行会员等级的区分，比如:\n\n   \n   |**累计消费金额** |**VIP** **等级** |\n   |---|---|\n   |＞=1000 |黑金 |\n   |[500,1000) |钻石 |\n   |[200,500) |白金 |\n   |[100,200) |黄金 |\n   |<100 |青铜 |\n   \n\n* SQL 表达式：\n\n   ```SQL\n   multiIf(\n   user_profiles.total_cost<100,'青铜',\n   user_profiles.total_cost>=100 and user_profiles.total_cost<200 ,'钻石',\n   user_profiles.total_cost>=200 and user_profiles.total_cost<500,'白金',\n   user_profiles.total_cost>=500 and user_profiles.total_cost<1000,'黄金',\n   '黑金'\n   )\n   ```\n   \n\n\n<span id=\"7090a35d\"></span>\n## Demo6：类型转换\n\n\n* 示例场景：\n\n   假设埋点的时候有属性：事件属性「视频时间 media_duration_info」，为float类型，表示毫秒，希望将其转换成int型，同时转化成分钟，方便计算。\n\n* SQL 表达式：\n\n   ```SQL\n   cast(event_params.media_duration_info/1000/60 as Nullable(int))\n   ```\n   \n\n   注意：槽位化后Map列中所有事件属性均是nullable类型的，因此在通过cast对属性类型进行强制转化的时候，无论转化成什么类型（int、float等），都需要使用函数assumeNotNull对属性包装一下，保证转化后的属性类型是nullable类型的，否则会导致类型转化出问题，使用办法：Nullable(int)、Nullable(float)等。\n\n\n<span id=\"236250cb\"></span>\n# 编辑/删除虚拟属性\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/tos-cn-v-697126/49b98dc75df7425cb359b803d03793e2) </span>\n\n\n* 编辑虚拟属性\n\n   进入「虚拟属性」界面后可见已经创建的所有虚拟属性，选择你想要编辑的虚拟属性在操作列下方点击“编辑”即可进行编辑。\n\n* 删除虚拟属性\n\n   如果你需要删除一个虚拟属性，选择你想要编辑的虚拟属性在操作列下方点击“删除”即可删除此虚拟属性。\n\n\n<span id=\"52857bd9\"></span>\n### “展示名、属性描述、字典、数据类型”的编写和修改说明\n\n虚拟属性提供了“展示名、属性描述、字典、数据类型”的编写和修改，有关说明如下：\n\n\n* 修改任何字段，都会重新发起验证 sql；\n\n* SQL表达式改动后已有字典会被删除；\n\n* 如果虚拟属性旁边出现如下图提示，说明此虚拟属性已经失效，失效情况如下：\n\n\n1）使用到的用户或事件公共属性被禁用了；\n\n2）使用到的属性类型被修改了；\n\n3）被删除。\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/tos-cn-v-697126/f118943127cb4393bf85301b346ab68d) </span>\n\n\n* 失效的虚拟属性，将不支持任何字段的编辑；\n\n* 如果编辑时展示名时出现（如下图）提示说明，请进入编辑页面进行排查或者查看是否拥有此权限；\n\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/tos-cn-v-697126/16d334ce14764f04b603ba12c9d81819) </span>\n\n<span id=\"fae05aed\"></span>\n# 参考：虚拟属性的适用范围\n\n\n|**功能** |**描述** |\n|---|---|\n|自定义查询 |不适用。 |\n|虚拟事件 |适用。被用于查询时，只要所含一个事件包含的虚拟事件属性就可以被选择。 |\n|圈选事件 |事件虚拟属性不适用，用户虚拟属性适用。 |\n|任意事件 |不适用，包括：any_event 和 any_active_event。 |\n|分析主体 |适用，创建和使用时作为普通属性。 |\n|属性关联 |适用。 |\n|用户路径 |适用。 |\n|虚拟属性 |不适用。不允许基于虚拟属性创建虚拟属性，用户类型的虚拟属性的表达式中不允许包含事件属性。 |";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。

</script>

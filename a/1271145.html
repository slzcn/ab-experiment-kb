<script>window.DATA_BASE="../";window.INIT_DOC=1271145;window.INIT_MD="<span id=\"91c9300b\"></span>\n# 1. 用户与用户属性\n\n<span id=\"a39b49a3\"></span>\n## 1.1 登录态变化调用\n\n<span id=\"eac6de6c\"></span>\n### 1.1.1 账户登录\n\n如您的产品中有账户体系，请在用户登录后立即设置 uuid，以保证用户登录前后口径一致性。 6.13.0+ 版本支持在初始化 AppLog 之前调用，用于设置已登录的用户 uuid。\n\n```java\n// 设置您账号体系的 ID, 并保证其唯一性\n// 6.13.0+ 版本支持此方法在初始化 AppLog 前调用\nAppLog.setUserUniqueID(\"your_USER_UNIQUE_ID\");\n// 如果使用多实例，可以使用对应实例设置\nIAppLogInstance other = Applog.newInstance();\nother.setUserUniqueID(\"{{USER_UNIQUE_ID}}\");\n```\n\n\n（6.13.0+ 版本不推荐使用）通过该方法设置 uuid，仅在首次冷启动时设置生效。由于 AppLog.setUserUniqueID 在 6.13.0+ 已支持在初始化之前调用，所以不再推荐使用该方法设置 uuid，建议统一使用 AppLog.setUserUniqueID。\n\n```java\n// 初始化时设置uuid\n// 6.13.0+版本请勿使用此方法\nconfig.setUserUniqueId(\"your_USER_UNIQUE_ID\");\n```\n\n\n<span id=\"8f303c71\"></span>\n### 1.1.2 账户登出\n\n在账户登出时调用。\n\n```java\n// 登出时设置uuid为null\nAppLog.setUserUniqueID(null); \n// 多实例同 7.1.1\n```\n\n\n请注意，不要误写成`(\"null\")` 或 `(\"\")`，否则会影响数据和用户的绑定关系。\n\n<span id=\"72a09ded\"></span>\n## 1.2 设置用户属性\n\n<span id=\"743f58d6\"></span>\n### 1.2.1 profileSet\n\n设置用户属性，存在则覆盖，不存在则创建。\n\n```java\n// 示例：设置用户属性，属性名为key，属性值为value\nJSONObject paramsObj = new JSONObject();\ntry {\n    paramsObj.put(\"key\", \"value\"); \n} catch (JSONException e) {\n    e.printStackTrace();\n}\nAppLog.profileSet(paramsObj);\n```\n\n\n<span id=\"d3f923f8\"></span>\n### 1.2.2 profileSetOnce\n\n设置用户属性，存在则不设置，不存在则创建，适合首次相关的用户属性，比如首次访问时间等。\n\n```java\n// 示例：设置用户属性，属性名为key_once，属性值为value_once\nJSONObject paramsObj = new JSONObject();\ntry {\n    paramsObj.put(\"key_once\", \"value_once\");\n} catch (JSONException e) {\n    e.printStackTrace();\n}\nAppLog.profileSetOnce(paramsObj);\n```\n\n\n<span id=\"cc7838c2\"></span>\n### 1.2.3 profileIncrement\n\n设置数值类型的属性，可进行累加。\n\n```java\n// 示例：设置用户属性，属性名为key，属性值为1\nJSONObject paramsObj = new JSONObject();\ntry {\n    paramsObj.put(\"key\", 1);\n} catch (JSONException e) {\n    e.printStackTrace();\n}\nAppLog.profileIncrement(paramsObj);\n```\n\n\n<span id=\"77a0f91c\"></span>\n### 1.2.4 profileAppend\n\n设置List类型的用户属性，可持续向List内添加。\n\n```java\n// 示例：设置用户属性，属性名为key，原本已有属性值，现添加属性值为value_append\nJSONObject paramsObj = new JSONObject();\ntry {\n    paramsObj.put(\"key\", \"value_append\");\n} catch (JSONException e) {\n    e.printStackTrace();\n}\nAppLog.profileAppend(paramsObj);\n```\n\n\n<span id=\"0fae4129\"></span>\n### 1.2.5 profileUnset\n\n删除用户的属性。\n\n```java\n// 示例：删除用户属性，属性名为key\nAppLog.profileUnset(\"key\");\n```\n\n\n<span id=\"2f45b084\"></span>\n# 2.获取实验参数\n\n通常在SDK 初始化后会向分流服务发送一个分流请求（request），在获取到分流服务的响应（response）后，客户端开发可以根据分流的结果参数完成代码分支。\n\n\n* 请注意此步骤的前置条件：已经根据实验的需求方创建好了实验及相关的参数，具体见“[创建实验](https://www.volcengine.com/docs/6287/65809#_4-1-%E5%88%9B%E5%BB%BA%E5%AE%9E%E9%AA%8C)”。\n\n* 请注意每次调用getAbConfig时,会默认上报一条曝光事件 abtest_exposure\n\n\n```java\nAppLog.addDataObserver(new com.bytedance.applog.IDataObserver() {\n    \n    /**\n     * 本地的id数据加载结果通知\n     * @param did device id\n     * @param iid install id\n     * @param ssid ssid\n     */\n    @Override\n    public void onIdLoaded(@NonNull String did, @NonNull String iid, @NonNull String ssid) {\n \n    }\n \n    /**\n     * 通知注册结果，以及id变化情况\n     * 仅主进程会被调用\n     * @param changed 是否和本地缓存有所不同\n     * @param oldDid 原device id\n     * @param newDid server返回新的device id\n     * @param oldIid 原install id\n     * @param newIid server返回新install id\n     * @param oldSsid 原ssid\n     * @param newSsid server返回新ssid\n     */\n    @Override\n    public void onRemoteIdGet(boolean changed, @Nullable String oldDid, \n                        @NonNull String newDid,@NonNull String oldIid, \n                        @NonNull String newIid, @NonNull String oldSsid, \n                        @NonNull String newSsid) {\n \n    }\n \n    /**\n     * Config拉取数据，和本地数据对比有变化的通知\n     * 仅主进程会被调用\n     * @param changed 是否和本地缓存有所不同\n     * @param config server返回新config内容\n     */\n    @Override\n    public void onRemoteConfigGet(boolean changed, @Nullable JSONObject jsonObject) {\n \n    }\n \n    /**\n     * server拉取AbConfig数据，和本地数据对比有变化的通知\n     * 仅主进程会被调用\n     * @param changed 是否和本地缓存有所不同\n     * @param abConfig server返回新abConfig内容\n     */\n    @Override\n    public void onRemoteAbConfigGet(boolean changed, @NonNull JSONObject jsonObject) {\n        // 比如配置的ab实验参数名称是 \"MyTest\", 参数类型是 string，对照组参数值 \"groupA\", 实验组参数值 \"groupB\"// 通过applog接口获取实验分流结果// 第一个参数是实验名称，第二个参数是获取实验分流结果失败时的默认参数值，如默认为对照组参数值或null// 返回值是获取的ab实验分流结果，即实验参数值\n        String group = AppLog.getAbConfig(\"MyTest\", null);\n        if (\"groupA\".equals(group)) {\n          // 执行对照组逻辑\n        } else if (\"groupB\".equals(group)) {\n          // 执行实验组逻辑\n        } else {\n          // 其它\n        }\n    }\n \n    /**\n     *  Vid变化通知\n     */\n    @Override\n    public void onAbVidsChange(@NonNull String vids, @NonNull String extVids) {\n \n    }\n});\n```\n\n\n如果想实时拉取实验分流结果，可以通过 pullABTestConfigs 方法手动触发实验配置更新  **(10秒内多次调用只会触发一次请求)** \n\n```plaintext\nAppLog.pullAbTestConfigs();//此功能需要6.7.0以上版本\n// 执行该接口后，如果拉取到实验数据，会触发 IDataObserver.onRemoteAbConfigGet 回调。\n```\n\n\n<span id=\"5f3041f5\"></span>\n# 3. 上报实验指标（用户行为事件）\n\n<span id=\"368fe085\"></span>\n## 3.1 上报代码埋点\n\n用户行为日志采用事件event+属性params的形式，事件一般对应多个属性，也可以仅有事件没有属性。代码埋点方案一般由数据分析师或产品运营设计。\n\n仅上报事件的代码埋点，示例如下：\n\n```java\n// 示例：上报事件event，该事件不包含属性\n// 置于业务逻辑对应位置\nAppLog.onEventV3(\"event\");\n```\n\n\n上报事件和对应属性的代码埋点，示例如下：\n\n```java\n// 示例：上报事件event，该事件包含两个属性\n//      一个string类型的属性，属性名为key_string，属性值为value_string\n//      一个int类型的属性，属性名为key_int，属性值为10\n// 置于业务逻辑对应位置\nJSONObject paramsObj = new JSONObject();\ntry {\n    paramsObj.put(\"key_string\", \"value_string\"); \n    paramsObj.put(\"key_int\", 10);\n} catch (JSONException e) { \n    e.printStackTrace();\n}\nAppLog.onEventV3(\"event\", paramsObj);\n```\n\n\n<span id=\"5bc262b8\"></span>\n## 3.2 事件公共属性\n\n如需在每个事件中都包括某属性，可通过公共属性设置，无需在每个事件中重复设置。公共属性只需设置一次，即可包括在所有代码埋点事件、预置事件和全埋点事件中。\n\n<span id=\"94b06796\"></span>\n### 3.2.1 设置公共属性\n\n```java\n/* \n * 示例：设置自定义的公共属性，属性名为key_public，属性值为value_public\n * 关于自定义 “公共属性” 请注意：\n * 1. 上报机制是随着每一次日志发送进行提交，默认的日志发送频率是1分钟，\n *    所以如果在一分钟内连续修改自定义公共属性，按照日志发送前的最后一次修改为准； \n * 2. 不推荐高频次修改，如每秒修改一次。\n */\n Map<String,Object> headerMap = new HashMap<String, Object>();\n headerMap.put(\"key_public\", \"value_public\");\n AppLog.setHeaderInfo((HashMap<String, Object>)headerMap);\n```\n\n\n<span id=\"f3779889\"></span>\n### 3.2.2 移除公共属性\n\n```java\n// 示例：移除属性名为 key_public 的公共属性\nAppLog.removeHeaderInfo(\"key_public\");\n\n// 通过传入 null 移除所有设置过的公共属性\nAppLog.setHeaderInfo(null);\n```\n\n\n<span id=\"3f4ca71f\"></span>\n# 4. 获取平台ID与通知\n\n<span id=\"7e959977\"></span>\n## 4.1 获取平台生成ID\n\n```java\n// 请在初始化完成的3秒后开始获取，否则可能返回为空\nString ssid = AppLog.getSsid(); // 获取SSID\nString did = AppLog.getDid(); // 获取设备bddid\n```\n\n\n<span id=\"9e7a76b0\"></span>\n## 4.2 获取SDK版本号\n\n```java\n// SDK版本号格式为X.X.X\nString sdk_version = AppLog.getSdkVersion();\n```\n\n\n<span id=\"acabc3d0\"></span>\n## 4.3 获取实验版本ID\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">开展AB实验必须调用获取实验参数的api（详情请参见 <strong><ins>获取实验参数</ins></strong> 章节）。如需获取用户所有曝光或命中实验的版本ID（vid）时，可使用此API，此API不会上报abtest_exposure曝光事件。</div>\n\n\n```JSON\nAppLog.getAbSdkVersion();\n```\n\n\n<span id=\"5c8cbe9c\"></span>\n## 4.4 切换账号设置数据发送方式\n\n切换账号时，同时切换数据发送方式\n\n```java\nAppLog.setPrivacyMode(true); //默认是false，设置后true，不采集不上报\n```\n\n\n<span id=\"ab2593aa\"></span>\n## 4.5 常用回调介绍：获取各类通知\n\nSDK提供addDataObserver方法，用以获取各类通知，建议放在 Application 中。\n\n```java\npublic static void addDataObserver(IDataObserver listener)\n```\n\n\n设置iid、ssid、did、abconfig从本地加载和server加载成功的回调。\n\nIDataObserver接口方法的参数说明如下：\n\n```java\n// step1：添加数据集观察回调，this 指代实现了 IDataObserver 的类\nAppLog.addDataObserver(this);\n// step2：通过 IDataObserver 的 onIdLoaded 或 onRemoteIdGet 到数据后使用或者使用以下方式获取： \n默认实例：Applog.getDid() / 使用多实例：IAppLogInstance.getDid()\n\n\n// IDataObserver 主要功能介绍与参数介绍：\n//  - did、iid、ssid 获取都可以通过该回调获取\n//  - 服务端配置获取\n//  - ab 实验配置获取\npublic interface IDataObserver {\n    /**\n     * 本地的id数据加载结果通知\n     * @param did device id\n     * @param iid install id\n     * @param ssid 数说id\n     */\n    void onIdLoaded(@NonNull String did, @NonNull String iid, @NonNull String ssid);\n\n    /**\n     * 通知注册结果，以及id变化情况\n     * 仅主进程会被调用\n     * @param changed 是否和本地缓存有所不同\n     * @param oldDid 本地老的 oldDid，可能为空\n     * @param newDid server返回新的 device id\n     * @param newIid server返回新 install id\n     * @param newSsid server返回新数说 id\n     */\n    void onRemoteIdGet(boolean changed, @Nullable String oldDid, @NonNull String newDid,\n                       @NonNull String oldIid, @NonNull String newIid, \n                       @NonNull String oldSsid, @NonNull String newSsid);\n\n    /**\n     * Config拉取数据，和本地数据对比有变化的通知\n     * 仅主进程会被调用\n     * @param changed 是否和本地缓存有所不同\n     * @param config server返回新config内容\n     */\n    void onRemoteConfigGet(boolean changed, @Nullable JSONObject config);\n\n    /**\n     * server拉取AbConfig数据，和本地数据对比有变化的通知\n     * 仅主进程会被调用\n     * @param changed 是否和本地缓存有所不同\n     * @param abConfig server返回新abConfig内容\n     */\n    void onRemoteAbConfigGet(boolean changed, @NonNull JSONObject abConfig);\n\n    /**\n     * 客户端ab实验曝光vid集合发生变化的通知\n     * @param vids 客户端ab实验曝光vid集合\n     * @param extVids 外部设置的external vid集合\n     */\n    void onAbVidsChange(@NonNull String vids, @NonNull String extVids);\n}\n```\n\n\n<span id=\"6686527d\"></span>\n# 5. 默认公共属性字段\n\nSDK 默认采集以下信息，并作为用户公共属性，可在增长分析（DataFinder）中分组和筛选。\n\n\n|字段名称 |字段类型 |参数名称 |\n|---|---|---|\n|os |string |设备系统，对应产品内属性为 os_name。 |\n|os_version |string |操作系统版本 |\n|app_version |string |App 版本 |\n|app_version_minor |string |次版本号，App四位版本号，需要初始化调用如： config.setVersionMinor( 1.2.3.r6 ) |\n|channel |string |下载渠道（设置后可覆盖），对应产品内属性为 app_channel。 |\n|device_model |string |设备机型 |\n|region |string |操作系统地区 |\n|language |string |系统语言 |\n|sdk_version |string |SDK版本 |\n|timezone |int |时区 |\n|timezone_offset |int |时区偏移量，对应产品内属性为 tz_offset。 |\n|timezone_name |string |时区名称 |\n|sim_region |string |SIM卡地域 |\n|carrier |string |运营商 |\n|resolution |string |分辨率 |\n|device_brand |string |设备品牌 |\n|access |string |网络类型 |\n\n\n<span id=\"46df1f37\"></span>\n# 6.View 曝光事件采集\n\n> 本功能在 6.10.1+ 后开始支持，使用曝光建议及早初始化 SDK，比如在 Application 中先初始化。\n\n\n用户需要手动标记监听某个 View 的曝光事件。当这个 View 出现在屏幕可视范围内时，会自动触发一个曝光事件。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\"><strong>6.16.0 以下版本，进入页面后只会触发一次曝光事件，6.16.0 及以上页面内的 View 会根据不同行为多次触发曝光。</strong></div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">可以根据曝光事件内部的 $exposure_type 属性区分：</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">$exposure_type:0 首次曝光</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">$exposure_type:3 重复曝光</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">$exposure_type:6 从其他页面返回的曝光</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">$exposure_type:7 后台返回曝光</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">如果想在 6.16.0 以后版本实现之前只曝光一次的效果，可以在新版曝光回调中通过 $exposure_type == 0 进行首次曝光过滤。</div>\n\n\n在初始化配置中可开启曝光配置开关，开启方法：\n\n```java\nconfig.setExposureEnabled(true);\n```\n\n\n开启配置后，在需要曝光的 View 上增加曝光监听，示例代码：\n\n\n<Tabs>\n<Tab zoneid=\"pQC5cl89GJ\" title=\"6.16.2 及以上\">\n<TabTitle>6.16.2 及以上</TabTitle>\n\n```Java\nView banner = findViewById(R.id.banner);\n// Optional，自定义曝光事件属性\nJSONObject properties = new JSONObject();\nproperties.put(\"custom_key\", \"custom_value\");\n// Optional，默认为 \"$bav2b_exposure\"\nString eventName = \"custom_exposure\";\n\n// 6.16.2 后：曝光支持按面积+时间检测，并提供了曝光回调进行事件处理\n// Optional, 曝光配置，有效曝光面积、可视化调试开关、有效曝光时间和曝光事件回调\n// 有效曝光面积: 有效曝光的 View 显示面积的比例，默认是 0，取值 0-1\n// 可视化调试开关: 默认 false，线上不要开启，开启后曝光的 View 会增加 background 红色边框，用于调试\n// 有效曝光时间: 有效曝光的 View 时间，默认是 0，单位 ms\n// 曝光事件回调: 触发曝光事件时回调，会携带当前曝光事件相关属性，可以进行自定义追加以及支持过滤\nViewExposureConfig config = new ViewExposureConfig(0.5F, false, 200, viewExposureParam -> {\n      try {\n            // 在回调中添加自定义属性\n            viewExposureParam.getExposureParam().put(\"key\", \"value\");\n            // 打印曝光类型\n            Log.d(\"Exposure\", \"ExposureType: \" + viewExposureParam.getExposureParam().get(\"$exposure_type\"));\n      } catch (JSONException e) {\n            // 在发生异常时过滤当前曝光事件\n            return false;\n      }\n      // true 保留曝光事件\n    return true;\n});\nViewExposureData<ViewExposureConfig> callbackData = new ViewExposureData<>(eventName, null, config);\n\n// 开始监听 View 曝光事件，viewExposureManager字段通过AppLog.getViewExposureManager()来定义，详情可参见 曝光检测频率配置  章节\nviewExposureManager.observeViewExposure(banner, data);\n// 取消监听\nviewExposureManager.disposeViewExposure(banner);\n```\n\n\n\n</Tab>\n<Tab zoneid=\"lK6h98ZIRC\" title=\"6.16.2 以下\">\n<TabTitle>6.16.2 以下</TabTitle>\n\n```Java\nView banner = findViewById(R.id.banner);\n// Optional，自定义曝光事件属性\nJSONObject properties = new JSONObject();\nproperties.put(\"custom_key\", \"custom_value\");\n// Optional，默认为 \"$bav2b_exposure\"\nString eventName = \"custom_exposure\";\n\n// 6.16.2 前：曝光仅支持按面积检测是否曝光\n// Optional, 曝光配置，有效曝光面积和可视化调试开关\n// 有效曝光面积: 有效曝光的 View 显示面积的比例，默认是 0，取值 0-1\n// 可视化调试开关: 默认 false，线上不要开启，开启后曝光的 View 会增加 background 红色边框，用于调试\nViewExposureConfig config = new ViewExposureConfig(0.5F, false);\nViewExposureData data = new ViewExposureData(eventName, properties, config);\n\n// 开始监听 View 曝光事件，viewExposureManager字段通过AppLog.getViewExposureManager()来定义，详情可参见 曝光检测频率配置  章节\nviewExposureManager.observeViewExposure(banner, data);\n// 取消监听\nviewExposureManager.disposeViewExposure(banner);\n```\n\n\n\n</Tab>\n</Tabs>\n\n\n<span id=\"13c4cdf6\"></span>\n## 6.1 设置全局曝光配置\n\n<span id=\"9af04af9\"></span>\n### 6.1.1 全局曝光配置介绍：\n\n\n<Tabs>\n<Tab zoneid=\"N0wMG4zlQ5\" title=\"6.16.2 及以上\">\n<TabTitle>6.16.2 及以上</TabTitle>\n\n```Java\n// 6.16.2 后：曝光支持按面积+时间检测，并提供了曝光回调进行事件处理\n// Optional, 曝光配置，有效曝光面积、可视化调试开关、有效曝光时间和曝光事件回调\n// 有效曝光面积: 有效曝光的 View 显示面积的比例，默认是 0，取值 0-1\n// 可视化调试开关: 默认 false，线上不要开启，开启后曝光的 View 会增加 background 红色边框，用于调试\n// 有效曝光时间: 有效曝光的 View 时间，默认是 0，单位 ms\n// 曝光事件回调: 触发曝光事件时回调，会携带当前曝光事件相关属性，可以进行自定义追加以及支持过滤\nViewExposureConfig config = new ViewExposureConfig(0.5F, false, 200, viewExposureParam -> {\n      try {\n            // 在回调中添加自定义属性\n            viewExposureParam.getExposureParam().put(\"key\", \"value\");\n            // 打印曝光类型\n            Log.d(\"Exposure\", \"ExposureType: \" + viewExposureParam.getExposureParam().get(\"$exposure_type\"));\n      } catch (JSONException e) {\n            // 在发生异常时过滤当前曝光事件\n            return false;\n      }\n      // true 保留曝光事件\n    return true;\n});\n```\n\n\n\n</Tab>\n<Tab zoneid=\"bbOLb8iSe9\" title=\"6.16.2 以下\">\n<TabTitle>6.16.2 以下</TabTitle>\n\n```Java\n// 6.16.2 前：曝光仅支持按面积检测是否曝光\n// Optional, 曝光配置，有效曝光面积和可视化调试开关\n// 有效曝光面积: 有效曝光的 View 显示面积的比例，默认是 0，取值 0-1\n// 可视化调试开关: 默认 false，线上不要开启，开启后曝光的 View 会增加 background 红色边框，用于调试\nViewExposureConfig config = new ViewExposureConfig(0.5F, false);\n```\n\n\n\n</Tab>\n</Tabs>\n\n\n<span id=\"5f7c1e48\"></span>\n### 6.1.2 全部配置更新\n\n\n<Tabs>\n<Tab zoneid=\"uIGEOvK8Wa\" title=\"6.15.2 及以上\">\n<TabTitle>6.15.2 及以上</TabTitle>\n\n```Java\n// 6.15.2 后调整至 ViewExposureManager 中，用以代替之前 InitConfig.setViewExposureConfig 的方法\n// 请在 SDK init 之后调用\nAppLog.getViewExposureManager().updateViewExposureConfig(config);\n```\n\n\n\n</Tab>\n<Tab zoneid=\"HorT0yXVJo\" title=\"6.15.2 以下\">\n<TabTitle>6.15.2 以下</TabTitle>\n\n```Java\n// 6.15.2 前通过 InitConfig 设置全局曝光配置\nconfig.setViewExposureConfig(config);\n```\n\n\n\n</Tab>\n</Tabs>\n\n\n<span id=\"875b6cba\"></span>\n## 6.2 曝光检测频率配置\n\n在部分特殊场景下可能会由于页面不断重绘导致一直无法触发曝光，目前新增了两种曝光检测策略以供选择，可动态调整：\n\n```java\n// 6.16.2 新增\n// 默认检测策略 如果有多次频繁触发 会在最后一次触发的 100ms 后触发曝光检测\nAppLog.getViewExposureManager().updateExposureCheckStrategy(ExposureCheckType.DEBOUNCE);\n\n// 新增检测策略 如果有多次频繁触发 会在每隔 500ms 触发一次曝光检测\nAppLog.getViewExposureManager().updateExposureCheckStrategy(ExposureCheckType.THROTTLE);\n```\n\n\n<span id=\"abaf9c25\"></span>\n# 7.全埋点事件\n\n> 本小节功能在 6.9.0+ 后开始支持。\n\n\n开启全埋点事件采集开关后，会默认采集页面事件和 View 点击事件等。\n\n<span id=\"fcf3c42d\"></span>\n## 7.1 自定义页面事件属性\n\n有 2 种自定义配置页面事件（$bav2b_page）的属性： **@PageMeta 注解**和**实现 IPageMeta 接口**。\n\n<span id=\"1f5bc448\"></span>\n### 7.1.1 @PageMeta 注解(已废弃)\n\n`@PageMeta`注解支持自定义标题和路径，在 Activity 或 Fragment 上添加该注解和配置参数，例如：\n\n```java\n@PageMeta(path = \"/mypath\", title = \"自定义页面\")\npublic class MyActivity extends Activity {\n\n}\n```\n\n\n<span id=\"48eb994a\"></span>\n### 7.1.2 实现IPageMeta接口（推荐）\n\n`IPageMeta`接口类支持自定义标题、路径和属性，优先级高于`@PageMeta`。在 Activity 或 Fragment 上实现该接口和对应的函数，例如：\n\n```java\npublic class MyActivity extends Activity implements IPageMeta {\n    @Override\n    public String title() {\n        return \"自定义页面\";\n    }\n    \n    @Override\n    public String path() {\n        return \"/mypath\";\n    }\n    \n    @Override\n    public JSONObject pageProperties() {\n        JSONObject params = new JSONObject();\n        try {\n            params.put(\"key\", \"value\");\n        } catch (JSONException e) {\n            \n        }\n        return params;\n    }\n}\n```\n\n\n<span id=\"05c688e9\"></span>\n## 7.2 自定义 View 点击事件属性\n\n<span id=\"659c45cf\"></span>\n### 7.2.1 设置 View 的元素 ID\n\n支持对指定的 View 对象设置一个元素 ID，字符串即可，示例：\n\n```java\nAppLog.setViewId(view, \"myElementId\");\n```\n\n\n<span id=\"9b9b334c\"></span>\n### 7.2.2 设置 View 的属性\n\n支持对指定的 View 对象设置属性值，示例：\n\n```java\nJSONObject props = new JSONObject();\ntry {\n    props.put(\"key\", \"value\");\n} catch (Exception e) {\n}\nAppLog.setViewProperties(view, props);\n```\n\n\n<span id=\"52bab683\"></span>\n## 7.3 忽略全埋点事件\n\n<span id=\"7df68ab2\"></span>\n### 7.3.1 忽略特定的页面访问事件\n\n支持忽略特定的 Activity 或 Fragment 的全埋点事件，示例：\n\n```java\nAppLog.ignoreAutoTrackPage(MyActivity.class, MyFragment.class);\n```\n\n\n<span id=\"37f79e94\"></span>\n### 7.3.2 忽略特定 View 的点击事件\n\n\n* 忽略指定 View 对象的点击事件，示例：\n\n   ```java\n   AppLog.ignoreAutoTrackClick(findViewById(R.id.button1));\n   ```\n   \n\n* 忽略指定 View 类型的点击事件，示例：\n\n   ```java\n   // 忽略所有 Switch 组件的点击事件\n   AppLog.ignoreAutoTrackClickByViewType(Switch.class);\n   ```\n   \n\n\n<span id=\"c67a4151\"></span>\n## 7.4 手动采集页面事件\n\n支持手动采集特定的 Activity 和 Fragment 对象的页面事件以及属性，示例：\n\n```java\nJSONObject params = new JSONObject();\ntry {\n    params.put(\"param1\", \"test\");\n} catch (JSONException e) {\n}\nAppLog.trackPage(MyActivity.this, params);\n```\n\n\n<span id=\"61d7482e\"></span>\n## 7.5 手动采集 View 点击事件\n\n支持手动采集特定 View 的点击事件以及属性，示例：\n\n```java\nJSONObject params = new JSONObject();\ntry {\n    params.put(\"param1\", \"test\");\n} catch (JSONException e) {\n}\nAppLog.trackClick(myView, params);\n```\n\n\n<span id=\"386668bf\"></span>\n# 8.采集时长事件\n\n> 本小节功能在 6.10.1+ 后开始支持。\n\n\n带有时间属性的事件可以使用时长事件采集接口，例如采集视频播放时长事件等。示例：\n\n```java\n// 在视频开始播放时调用\nAppLog.startDurationEvent(\"play\");\n\n// 在视频暂停播放时调用\nAppLog.pauseDurationEvent(\"play\");\n\n// 在视频继续播放时调用\nAppLog.resumeDurationEvent(\"play\");\n\n// 在结束播放时调用，此时会上报一个 play 事件，且带有 $event_duration 属性（记录了播放时长，单位毫秒） \nJsonObject params = new JsonObject() \n// 可以在 params 填入自己的自定义参数\nAppLog.stopDurationEvent(\"play\", params);\n// 6.16.10 后自持自定义时长事件事件名，默认情况事件名为方法第一个参数\nAppLog.stopDurationEvent(\"play\", params, \"custom_play\");\n```";</script>

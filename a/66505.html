<script>window.DATA_BASE="../";window.INIT_DOC=66505;window.INIT_MD="必看指标看板，该功能主要给用户提供一个“应用视角”，一方面可以查看应用下的各个必看指标趋势；另一方面通过必看指标反向关联实验，以便及时、准确的了解具体哪些实验对必看指标趋势造成了影响。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">必看指标，指的是必须守护的业务线指标，实验功能可能对其无直接的因果关联、无法直接带来提升，但一般而言不能对其有显著负向影响。</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">若某个指标被设置为必看指标，则该应用下的每个实验都会默认选择该必看指标为实验关注指标。</div>\n\n\n<span id=\"三-如何设置必看指标\"></span>\n# 前提条件：设置指标为必看指标\n\n\n* 操作入口：指标管理\\-指标组列表。\n\n* 操作权限要求：只有集团管理员、应用管理员才可创建必看指标。\n\n* 操作步骤：\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_a856c70d1cfdae543a202e96e9baf13d.png) </span>\n\n   1. 通过列表查找或直接搜索的方式，定位到想要设置为必看的指标。\n\n   2. 将对应的指标设置为必看指标。\n\n\n<span id=\"四-必看指标看板\"></span>\n# 查看必看指标看板\n\n<span id=\"_1-设置筛选条件\"></span>\n## 1. 设置筛选条件\n\n筛选条件支持的维度如下：\n\n\n|**维度名称** |**支持内容** |\n|---|---|\n|时间 |支持“天级、小时级、5分钟级”的数据聚合粒度，提供“最近”和“范围”两种筛选方式 |\n|实验模式 |分为主动触发型实验（其他实验）和被动接受型实验（Push实验）两种类别，选择实验模式后，即可选择“实验及版本”进行数据查阅 |\n|实验及版本 |采用“实验名称\\-实验版本”的双层结构，便于定位到实验详情 |\n|筛选维度 |支持“公共属性、用户分群”两大类筛选 |\n\n\n\n* 实验及版本筛选，如下：\n\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/7c7ed27954704e5a9722ead2f07a71a4~tplv-em5hxbkur4-noop.image?width=1700&height=428) </span>\n\n\n* 筛选维度，如下：\n\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/02277884d4eb41b2aec7e9d593583bfc~tplv-em5hxbkur4-noop.image?width=1706&height=514) </span>\n\n<span id=\"_2-查看指标趋势\"></span>\n## 2. 查看指标趋势\n\n\n* 支持查看”事件指标、技术指标“趋势。\n\n* 如果指标所属的事件、属性被下线，则对应的指标趋势图没有数据。\n\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/5c5a91c0c93741f6ac4ec3ea7fbf9b0a~tplv-em5hxbkur4-noop.image?width=1673&height=882) </span>\n\n<span id=\"_3-一键查看指标关联的实验\"></span>\n## 3. 一键查看指标关联的实验\n\n\n* 鼠标hover指标趋势图，展示具体的指标数值。\n\n* 时间筛选为“天级”时，展示“日环比”和“周环比”的趋势情况。\n\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/b22d0df832494d2db918943a10b51ab3~tplv-em5hxbkur4-noop.image?width=832&height=482) </span>\n\n\n* 点击「查看当时新增实验」和「查看当时运行实验」，会带着具体的时间信息跳转到“实验列表”页面，一键查询跟必看指标相关联的所有实验。\n\n   * 当时新增实验，如下：\n\n      <span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/f836677c20954b12b945f3490ffa8ade~tplv-em5hxbkur4-noop.image?width=1673&height=355) </span>\n\n* 当时运行实验，如下：\n\n   <span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/16394f36bcdd491aa090545e7c1f6e00~tplv-em5hxbkur4-noop.image?width=1668&height=353) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>
<script src="../marked.min.js"></script>

<body>
<script type="application/json" id="kbdata"></script>
<div class="loading" id="loading"><div class="spin"></div><div class="ld-t">正在加载知识库</div><div class="ld-s">首次加载稍候片刻</div></div>

<div class="app" id="app" style="display:none">
  <div class="mtoggle" id="mtoggle">☰</div>
  <div class="mmask" id="mmask"></div>
  <aside id="aside">
    <div class="brand">
      <h1><span class="logo">AB</span>A/B 实验知识库</h1>
      <p>营销增长中心 · 数据驱动决策手册</p>
    </div>
    <div class="cats" id="cats"></div>
    <div class="write-btn" id="writeBtn">✍ 写新文章</div>
    <a class="admin-link" id="adminLink" href="admin.html">⚙ 管理后台</a>
    <div class="side-foot" id="sideFoot"></div>
  </aside>

  <main>
    <div class="top">
      <div class="searchbox">
        <span class="si">🔍</span>
        <input id="q" placeholder="搜索实验设计"
          data-ph-prefix="搜索"
          data-ph-kw="实验设计,报告解读,广告投放,假设检验,指标体系,AB通识"
          autocomplete="off">
        <span class="clr" id="clr">✕</span>
      </div>
      <div class="stat" id="stat"></div>
    </div>
    <div class="body" id="listView"></div>
    <div class="body reader-scroll" id="readerView" style="display:none"></div>
  </main>
</div>

<!-- 写文章访问控制 -->
<div class="login-mask" id="loginMask">
  <div class="login-box">
    <div class="login-ic">🔒</div>
    <h3>需要授权</h3>
    <p>此操作仅限授权用户</p>
    <input id="loginPin" type="password" inputmode="numeric" placeholder="访问码" autocomplete="off">
    <button class="ed-btn" id="loginBtn">进入编辑</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-tip">登录后 2 小时内免再次验证</div>
  </div>
</div>

<!-- 写文章编辑器 -->
<div class="editor-mask" id="editorMask"></div>
<div class="editor" id="editor">
  <div class="ed-head">
    <b>✍ 写新文章</b>
    <span class="ed-close" id="edClose">✕</span>
  </div>
  <div class="ed-body">
    <div class="ed-form">
      <label>标题</label>
      <input id="edTitle" placeholder="例如：双十一大促实验复盘">
      <label>分类</label>
      <select id="edCat"></select>
      <label>检索关键词（选填，空格分隔）</label>
      <input id="edKw" placeholder="复盘 大促 转化率">
      <label>正文（Markdown）</label>
      <textarea id="edMd" placeholder="# 标题&#10;&#10;正文用 Markdown 书写，支持 **加粗**、列表、表格、代码块…&#10;&#10;## 小节&#10;- 要点一&#10;- 要点二"></textarea>
      <div class="ed-actions">
        <button class="ed-btn" id="edSubmit" style="display:none">✓ 发布文章</button>
      </div>
      <div class="ed-msg" id="edMsg"></div>
      <div class="ed-hint" id="edHint"></div>
    </div>
    <div class="ed-preview" id="edPrev">
      <div class="ed-prev-tag" id="edPrevTag"></div>
      <h1 id="edPrevTitle" style="margin:8px 0 16px"></h1>
      <div class="md" id="edPrevBody"></div>
    </div>
  </div>
</div>

<!-- 顶部悬浮 toast：发布结果等提示走全站统一规范 -->
<div id="toast"></div>

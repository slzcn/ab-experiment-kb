<script>window.DATA_BASE="../";window.INIT_DOC=1316454;window.INIT_MD="<span id=\"1a233816\"></span>\n# 操作前须知\n\n\n* SDK版本：当前SDK版本在不断迭代发布中，您可前往[Git开源页面](https://github.com/volcengine/datarangers-sdk-packages/tree/main)查看各端的SDK版本情况，推荐使用最新版本SDK。本文中的代码示例以一个版本号作为示例，您实际使用时，需根据使用的实际SDK版本修改其中的版本号。\n\n* 下载SDK包：集成SDK时，如果您需要手动引入SDK，需前往[Git开源页面](https://github.com/volcengine/datarangers-sdk-packages/tree/main)下载对应版本的SDK包。\n\n\n<span id=\"8d3b93ff\"></span>\n# 1. 获取配置参数\n\n<span id=\"e80e8a7d\"></span>\n## 1.1 版本支持须知\n\n目前仅支持32位和64位的Windows平台。\n\n<span id=\"7aa07f0d\"></span>\n## 1.2 获取appid\n\n在开始集成前，首先需要在集团中拥有一个应用，请参考：[如何创建应用](https://www.volcengine.com/docs/6287/66984)。\n\n\n* SaaS\\-云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/7f186b68302f40ae8822331615ea0e71~tplv-goo7wpa0wc-image.image) </span>\n\n* SaaS\\-非云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/3e7d3fad463c4ead987cf2b5db65203b~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"78167912\"></span>\n## 1.3 获取数据上送地址\n\n私有化部署版本需要获取数据上送地址 `reportURL`。\n\n如您不清楚此地址，请联系您的项目经理或客户成功经理。\n\n<span id=\"741c0e26\"></span>\n# 2. 集成 增长营销套件SDK\n\n<span id=\"d6b9bb2e\"></span>\n## 2.1 下载SDK\n\n请前往[Windows SDK包下载页面](https://github.com/volcengine/datarangers-sdk-packages/tree/main/Windows)获取对应版本的SDK包。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\">Windows离线包名称为<code>windows_</code><code><em>版本号</em></code><code>.zip</code>格式。例如：<code>windows_1.2.4.zip</code>，其中1.2.4为SDK版本号。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\">下载SDK离线包后请解压压缩包，其中：</div>\n\n\n   * <div data-tips=\"true\" data-tips-type=\"tip\">WindowsSDK（32位）：为解压后名称为<code>._x86.zip</code>的SDK包</div>\n\n\n   * <div data-tips=\"true\" data-tips-type=\"tip\">WindowsSDK（64位）：为解压后名称为<code>._x64.zip</code>的SDK包</div>\n\n\n\n<span id=\"fcbb37f0\"></span>\n## 2.2 SDK文件说明\n\n请下载对应平台的SDK文件压缩包，解压后会出现applogrs.hpp、applogrs.dll、applogrs.dll.lib三个文件：\n\n\n* applogrs.hpp：公开的接口头文件。\n\n* applogrs.dll：动态链接库的运行时加载的dll文件。\n\n* applogrs.dll.lib：applogrs.dll文件对应的函数导出声明文件。\n\n\n<span id=\"170b3231\"></span>\n## 2.3 集成\n\n将下载的SDK文件复制到项目中，需要注意平台架构的文件放在项目的对应平台构建目录中。\n\n<span id=\"f5bab1ec\"></span>\n#### 2.3.1 添加附加库目录\n\n修改项目属性\\-配置属性\\-连接器\\-常规\\-附加库目录，增加`applogrs.dll`文件所在的目录。\n\n<span id=\"8012737d\"></span>\n#### 2.3.2 添加函数导出文件\n\n修改项目属性\\-配置属性\\-连接器\\-常规\\-附加依赖项，增加文本内容`applogrs.dll.lib`。\n\n<span id=\"f3dccc29\"></span>\n#### 2.3.3 添加头文件\n\n修改项目属性\\-配置属性\\-C/C++\\-附加包含目录，增加`applogrs.hpp`文件所在的目录。\n\n<span id=\"62c4f7cd\"></span>\n#### 2.3.4 代码中引入头文件\n\n在需要调用SDK的代码文件头部，显示的引入`applogrs.hpp`头文件：\n\n```C++\n#include \"applogrs.hpp\"\n```\n\n\n<span id=\"967c83b3\"></span>\n# 3. 初始化 增长营销套件SDK\n\n**说明**：\n\n初始化SDK后会采集系统的部分设备信息，包括设备序列号、操作系统软件版本等。\n\n<span id=\"a8ecb846\"></span>\n## 3.1 初始化SDK\n\nSDK会缓存埋点等数据，为保障数据不丢失，需要将数据持久化到本地磁盘中。需要提前准备可以写入数据的文件目录（SDK不会自动创建目录）。\n\n```C++\n// 1. 设置数据缓存目录，需要已经存在的有访问和写入数据权限的文件目录\napplog::setDbDir(\"/xx/xx\");\n// 2. 设置域名，如果是私有化部署请传入私有化的域名；如果是SaaS，请忽略下面的代码\nchar* domain = \"https://xxx.xxx.xxx\"\napplog::setCustomDomain(domain); // 服务域名\n// 3. 开启A/B测试，默认关闭，如关闭请设置为(0)\napplog::setAbTestEnabled(1); \n// 4. 初始化SDK，需要提前准备好appId和appChannel（appChannel一般为发布的渠道名）\napplog::init_rangers(appId, appChannel);\n```\n\n\n<span id=\"d65146ee\"></span>\n# 4. 上报实验指标（用户行为事件）\n\n<span id=\"a4990efb\"></span>\n## 4.1 获取实验参数\n\n通常在SDK 初始化后会向分流服务发送一个分流请求（request），在获取到分流服务的响应（response）后，客户端开发可以根据分流的结果参数完成代码分支。\n\n\n* 请注意此步骤的前置条件：已经根据实验的需求方创建好了实验及相关的参数，具体见“[创建实验](https://arcosite.bytedance.net/sites/1701397953589/656945ea5ea2b103017bbd2c/editor/656945ef9099560417f2a1b7/?docLang=zh#_4-1-%25E5%2588%259B%25E5%25BB%25BA%25E5%25AE%259E%25E9%25AA%258C)”。\n\n* 请注意每次调用getAbTestConfig时，会默认上报一条曝光事件 **abtest_exposure**。\n\n\n```TypeScript\n// 获取全部实验参数\nconst char* allConfigs = applog::getAllAbTestConfigs();\n\n// 获取指定的实验参数，并上报曝光事件abtest_exposure\n// params1: 实验配置key\n// params2: 默认参数，如果没有获取到远程实验配置接口返回该参数值\nconst char* config = applog::getAbTestConfig(\"key\", \"defaultValue\");\n```\n\n\n<span id=\"764cd0f7\"></span>\n## 4.2 上报埋点\n\n支持在任意位置采集埋点，埋点内容包含埋点名称和埋点参数两部分，接口示例：\n\n```C++\n// 这里采集一个埋点\n// 参数说明：\n// 参数1：埋点名称，不能为空\n// 参数2：参数的json字符串，不能为空，且必须为合法的json字符串\napplog::onEvent(\"my_click\", \"{\\\"my_param\\\": 1}\");\n```\n\n\n<span id=\"1e08e762\"></span>\n## 4.3 公共属性\n\n如需在每个事件中都包括某属性，可通过公共属性设置，无需在每个事件中重复设置。公共属性只需设置一次，即可包括在所有代码埋点事件中。\n\n\n* 设置公共属性：\n\n\n```C++\n// 添加公共属性\n// 参数说明：\n// 参数1：属性名\n// 参数2：属性值（仅支持字符串）\napplog::addCustomHeader(\"header\", \"value\");\n```\n\n\n\n* 移除公共属性：\n\n\n```C++\n// 移除公共属性\n// 参数说明：\n// 参数1：属性名\napplog::removeCustomHeader(\"header\");\n```\n\n\n<span id=\"56f13e55\"></span>\n# 5. 登录态\n\n如您的产品中有账户体系，请在用户登录后立即设置 uuid，以保证用户登录前后口径一致性。\n\n```C++\n// 设置用户的uuid\napplog::setUserUniqueId(\"your_user_unique_id\");\n```\n\n\n<span id=\"13e3ad09\"></span>\n# 6. 其他配置\n\n<span id=\"9451fd31\"></span>\n## 6.1 打印日志\n\n如果需要查看SDK内部运行日志，需要调用日志开关接口切换日志打印：\n\n```C++\n// 配置日志开关\n// 参数说明：\n// 参数1：1-开启日志打印 0-关闭日志打印\napplog::setLogEnabled(1);\n```";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/

</script>

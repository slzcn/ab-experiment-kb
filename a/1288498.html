<script>window.DATA_BASE="../";window.INIT_DOC=1288498;window.INIT_MD="实验上线前需要保证前面的集成过程无误，上线后才能保证实验结果的科学和有效 ！小程序SDK的调试及数据验证思路一致，以下已微信小程序SDK为例，为您介绍调试及验证的核心流程与操作要点。\n\n<span id=\"b758530a\"></span>\n## **1. 开启调试状态**\n\n参照“[创建实验](https://www.volcengine.com/docs/6287/65809)”章节，使实验处于“调试中” 状态，如下图所示：\n\n\n* 实验状态一共分三种：调试中、运行中、已结束。\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_2f66f0e4ae2661808ad071db4f19c224.png) </span>\n\n<span id=\"457680ef\"></span>\n## **2. 通过接口获取调试设备的统计口径**\n\n\n* 分别在微信小程序SDK init和config中打开日志和A/B Test开关，并完成初始化，详情请参见[小程序SDK集成（通用）](https://www.volcengine.com/docs/6287/65804)。\n\n* 通过[4.6 获取平台生成的各种ID](https://www.volcengine.com/docs/6287/1288499#e3b1b22c)方法获取对应的ssid。\n\n\n<span id=\"3dbf97f2\"></span>\n## **3. 添加至白名单**\n\n创建实验时，将您的测试设备 ssid 添加到白名单中，并在右下角点击\"保存\"按钮。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_3883aefa4b186b1ba8d308a25ee4f7d2.png) </span>\n\n<span id=\"700f9d88\"></span>\n## **4. 微信小程序参数调试**\n\n设置完上述步骤后，清空缓存并编译，观察ab数据包（即abtest_config接口返回的实验数据），是否获取到了Tester 中的配置。下图中是成功获取到了实验参数：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_b116a0dc3025f69cc461a33c00563eba.png) </span>\n\n如果您的微信小程序没有发出实验请求，或实验请求为空, 请按下面步骤排查：\n\n\n* 初始化时是否正确设置 enable_ab_test: true；\n\n* 微信小程序是否将“A/B Test域名”和“事件上报域名”添加到 微信开发者后台/开发/开发者设置/服务器域名 \"request合法域名\" 中，具体域名参考1.2～1.4章节。\n\n\n触发实验事件后，您可以在事件数据包头观察到 ab_sdk_version 字段和内容（下图以ab_exposed事件举例，其他事件以此类推）：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_ceb652719d7e57b2ce5d8758973e46ca.png) </span>\n\n<span id=\"c2bab1da\"></span>\n## **5. 真机或模拟器实验场景调试**\n\n在实验参数调试正常的情况下，开发或者是QA/PM/运营 同学需要观察实验所在的页面是否符合之前实验设计的预期。\n\n\n* 关于实验设计和准备，请参照“[创建实验](https://www.volcengine.com/docs/6287/65809)”章节。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/

</script>

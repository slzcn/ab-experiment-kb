<script>window.DATA_BASE="../";window.INIT_DOC=663094;window.INIT_MD="当需要使用DataTester进行A/B实验时，您需要先明确实验所需的埋点数据，通过集成SDK并采集上报指标事件相关数据，用于A/B实验的结果分析。DataTester提供了客户端、Web端、服务端等多种接入方式以满足各类需求，数据接入工作主要由研发人员完成。本文为您介绍数据接入的基本能力和操作指导。\n\n<span id=\"620eff33\"></span>\n# 数据接入能力概览\n\n\n|**支持的数据接入方式** |**客户端埋点支持分类** |**用户标识的数据分类** |\n|---|---|---|\n|* **客户端接入：** <br><br>   支持Android SDK、iOS SDK、小程序等多种客户端SDK的接入。<br><br>* **服务端接入及导入工具**：<br><br>   除了客户端接入，您也可以通过服务端SDK，比如Java以及Httpapi完成数据的接入，对于私有化部署，也可以使用导入工具，完成数据的接入，将线下数据、业务数据库、三方数据、历史数据等导入，进行统筹数据分析。 |* **全埋点**：<br><br>   打开开关即可通过标准SDK采集的页面浏览和按钮点击数据，可选开启或不开启，局限性在于采集数据量大，无法精准分析，通常只能看pv和uv，对于和业务强相关的数据不建议采取全埋点。<br><br>* **可视化埋点**：<br><br>   支持在页面进行可视化手动圈选来设置埋点，方便没有代码基础的业务人员快速使用，缺点在于依赖于全埋点，因此全埋点有的局限在可视化埋点同样存在。<br><br>* **代码埋点（推荐）** ：<br><br>   需要研发工程师手动编写代码进行数据上报，如业务位置埋点，优点是代码埋点可结合业务设计埋点方案，可方便业务侧进行更灵活或者符合业务侧的分析。 |* **设备数据**：<br><br>   用以唯一识别一个设备，尤其当用户未登录App时，我们通过设备来区分用户。<br><br>* **行为数据**：<br><br>   也就是埋点数据，应用在用户交互的操作流中，找到关键事件进行埋点，当用户触发关键事件，应用就会将事件埋点交给AppLog，AppLog采集到埋点，上报给后台。<br><br>* **用户数据**：<br><br>   当用户登录账号，或账号切换时，或App收集到用户的其他信息时，可以将用户信息交给AppLog，AppLog上报到后台，做统一处理。 |\n\n\n数据流向简图\n\n（1）数据通过各种上报方式（客户端sdk/服务端sdk/HTTP API等）进行上报，数据第一步会先到AppLog服务，第二步进入Kafka，第三步数据在众多topic中经过一系列的处理，第四步入库；\n\n（2）当我们在系统查询数据的时候，它会通过查询引擎查询仓库的数据然后展示在系统界面。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/1c65be124382449ba2d408d746a24e7a~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"_2-集成准备及相关文档说明\"></span>\n# 集成前准备\n\n<span id=\"a66f64de\"></span>\n## 准备工作\n\n\n1. 已完成创建集团、接入应用等操作。\n\n   详情请参见[快速入门：管理员（云原生）](https://www.volcengine.com/docs/6287/166070)（管理员完成，非研发人员操作）。\n\n2. 获取后续数据接入所需的应用ID等信息。\n\n   登录DataTester控制台，进入集团设置页面后，点击项目列表获取后续数据接入所需的应用ID等信息。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/83f4d3f9507a4c54bd821c0efa5e303e~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"b4c7cf51\"></span>\n## 了解接入注意事项\n\n<span id=\"ffce85ac\"></span>\n### 了解支持的预置事件与属性\n\n根据数据接入方案，明确后续需要采集上报的事件及其属性，了解当前系统已支持的预置事件及属性列表是否满足业务需求，各端支持的预置事件及属性详情请参见[预置属性总表](https://www.volcengine.com/docs/6287/169885)。\n\n<span id=\"48d2ef89\"></span>\n### 了解自定义属性需满足的数据格式要求\n\n如果预置事件/属性不满足需求，需要自定义事件，则需要了解对应自定义事件及其属性的数据格式要求，详情请参见[支持的数据格式（自定义事件/属性）](https://www.volcengine.com/docs/6287/1149795)。\n\n<span id=\"c89b023c\"></span>\n### 了解支持的数据统计口径\n\n根据数据接入方案，了解数据接入时支持的用户标识类型，统一统计口径，详情请参见[支持的用户唯一标识](https://www.volcengine.com/docs/6287/65800)。\n\n<span id=\"89982ff6\"></span>\n### 了解隐私合规\n\n根据数据接入方案，了解隐私政策及开发者使用合规规范，详情请参见[【增长营销套件SDK】隐私政策](https://www.volcengine.com/docs/6285/72216)、[【增长营销套件SDK】开发者使用合规规范](https://www.volcengine.com/docs/6285/69647)\n\n<span id=\"b3a521b9\"></span>\n# 集成接入\n\n数据集成接入的通用流程如下。\n\n<img src=\"data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHhtbG5zOnhsaW5rPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5L3hsaW5rIiB2ZXJzaW9uPSIxLjEiIHdpZHRoPSI3MTVweCIgaGVpZ2h0PSIyOTZweCIgdmlld0JveD0iLTAuNSAtMC41IDcxNSAyOTYiPjxkZWZzLz48Zz48cGF0aCBkPSJNIDEzMiAyMyBMIDE5NS42MyAyMyIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMDAwMDAwIiBzdHJva2UtbWl0ZXJsaW1pdD0iMTAiIHBvaW50ZXItZXZlbnRzPSJzdHJva2UiLz48cGF0aCBkPSJNIDIwMC44OCAyMyBMIDE5My44OCAyNi41IEwgMTk1LjYzIDIzIEwgMTkzLjg4IDE5LjUgWiIgZmlsbD0iIzAwMDAwMCIgc3Ryb2tlPSIjMDAwMDAwIiBzdHJva2UtbWl0ZXJsaW1pdD0iMTAiIHBvaW50ZXItZXZlbnRzPSJhbGwiLz48cmVjdCB4PSIyIiB5PSIzIiB3aWR0aD0iMTMwIiBoZWlnaHQ9IjQwIiBmaWxsPSIjNjY2NmZmIiBzdHJva2U9Im5vbmUiIHBvaW50ZXItZXZlbnRzPSJhbGwiLz48ZyB0cmFuc2Zvcm09InRyYW5zbGF0ZSgtMC41IC0wLjUpIj48Zm9yZWlnbk9iamVjdCBzdHlsZT0ib3ZlcmZsb3c6IHZpc2libGU7IHRleHQtYWxpZ246IGxlZnQ7IiBwb2ludGVyLWV2ZW50cz0ibm9uZSIgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSI+PGRpdiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMTk5OS94aHRtbCIgc3R5bGU9ImRpc3BsYXk6IGZsZXg7IGFsaWduLWl0ZW1zOiB1bnNhZmUgY2VudGVyOyBqdXN0aWZ5LWNvbnRlbnQ6IHVuc2FmZSBjZW50ZXI7IHdpZHRoOiAxMjhweDsgaGVpZ2h0OiAxcHg7IHBhZGRpbmctdG9wOiAyM3B4OyBtYXJnaW4tbGVmdDogM3B4OyI+PGRpdiBzdHlsZT0iYm94LXNpemluZzogYm9yZGVyLWJveDsgZm9udC1zaXplOiAwOyB0ZXh0LWFsaWduOiBjZW50ZXI7ICI+PGRpdiBzdHlsZT0iZGlzcGxheTogaW5saW5lLWJsb2NrOyBmb250LXNpemU6IDE1cHg7IGZvbnQtZm     <div class="login-tip">登录后 2 小时内免再次验证</div>
  </div>
</div>

<!-- 写文章编辑器 -->
<div class="editor-mask" id="editorMask"></div>
<div class="editor" id="editor">
  <div class="ed-head">
    <b>✍ 写新文章</b>
    <span class="ed-close" id="edClose">✕</span>
  </div>
  <div class="ed-body">
    <div class="ed-form">
      <label>标题</label>
      <input id="edTitle" placeholder="例如：双十一大促实验复盘">
      <label>分类</label>
      <select id="edCat"></select>
      <label>检索关键词（选填，空格分隔）</label>
      <input id="edKw" placeholder="复盘 大促 转化率">
      <label>正文（Markdown）</label>
      <textarea id="edMd" placeholder="# 标题&#10;&#10;正文用 Markdown 书写，支持 **加粗**、列表、表格、代码块…&#10;&#10;## 小节&#10;- 要点一&#10;- 要点二"></textarea>
      <div class="ed-actions">
        <button class="ed-btn" id="edSubmit" style="display:none">✓ 发布文章</button>
      </div>
      <div class="ed-hint" id="edHint"></div>
    </div>
    <div class="ed-preview" id="edPrev">
      <div class="ed-prev-tag" id="edPrevTag"></div>
      <h1 id="edPrevTitle" style="margin:8px 0 16px"></h1>
      <div class="md" id="edPrevBody"></div>
    </div>
  </div>
</div>

<!-- 顶部悬浮 toast：发布结果等提示走全站统一规范 -->
<div id="toast"></div>

<script src="../app.js?v=640e650c"></script>
</body>
</html>

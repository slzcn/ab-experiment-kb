<script>window.DATA_BASE="../";window.INIT_DOC=96071;window.INIT_MD="<span id=\"一-概述\"></span>\n# 概述\n\n「A/B 测试」 在 Web/H5/WAP 端不提供单独的SDK，而是依赖增长营销套件SDK 中的A/B Test 相关接口。增长营销套件 SDK 主要的和A/B Test 相关接口有两个：\n\n\n* 实验组分流接口。\n\n* 指标上报（事件埋点上报）接口。\n\n* 和其他端不同，web/h5 做页面元素可视化编辑的相关实验（实验可视化实验，多变体可视化实验，多页可视化实验等），可能需要在实验参数返回前，对被实验页面或元素有进行遮罩，以免页面跳变影响用户体验。\n\n\n该SDK支持编程实验、可视化实验，多链接实验，多变体可视化实验等客户端实验。\n\n<span id=\"二-集成sdk\"></span>\n# 1. 集成SDK\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\"><strong>此文档针对5.0版本以上的SDK阅读</strong></div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">如果已经集成了RangerAppLog web SDK 可以跳过此部分；</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">如果没有，请参照下面：</div>\n\n\n   * <div data-tips=\"true\" data-tips-type=\"warning\">请注意5.0版本以上变量名称是LogAnalyticsObject，5.0之前版本为TeaAnalyticsObject</div>\n\n\n   * <div data-tips=\"true\" data-tips-type=\"warning\">同时请注意，你的版本必须大于等于V5.0.0</div>\n\n\n\n复制对应的代码片段，放到标签内尽可能靠前的位置。如您使用SaaS版本，请参考1.1节；如您使用私有化版本，请参考1.2节。这段代码的作用是：\n\n\n* 定义了一个全局函数`window.collectEvent`，可以用来配置和发送事件。（为了避免与其他全局变量名冲突，`collectEvent`可以被替换为任意自定义的变量名）\n\n* 引入一段 SDK 的脚本文件。\n\n\n<span id=\"_1-1-安装代码-saas版本\"></span>\n## 1.1 安装代码 (SaaS版本)\n\n如您使用SaaS部署版本，请参照如下代码。\n\n```html\n<script>    \n(function(win, export_obj) {\n    win['LogAnalyticsObject'] = export_obj;\n    if (!win[export_obj]) {\n        function _collect() {\n            _collect.q.push(arguments);\n        }\n        _collect.q = _collect.q || [];\n        win[export_obj] = _collect;                \n    }\n    win[export_obj].l = +new Date();\n})(window, 'collectEvent');\n<\/script>\n<script async src=\"https://lf3-data.volccdn.com/obj/data-static/log-sdk/collect/5.0/collect-rangers-v5.1.12.js\"><\/script>\n```\n\n\n<span id=\"_1-2-安装代码-私有化版本\"></span>\n## 1.2 安装代码 (私有化版本)\n\n私有化版本需要获取js文件的私部地址，一般在`{{domain}}/minio.byterangers.onpremise.docor.static/collect-privity-v5.1.12.js`，如您不清楚此地址，请联系您的项目经理或客户成功经理。\n\n如您使用私有化部署版本，请参照如下代码。\n\n```html\n<script>    \n(function(win, export_obj) {\n    win['LogAnalyticsObject'] = export_obj;\n    if (!win[export_obj]) {\n        var _collect = function() {\n            _collect.q.push(arguments);\n        }\n        _collect.q = _collect.q || [];\n        win[export_obj] = _collect;                \n    }\n    win[export_obj].l = +new Date();\n})(window, 'collectEvent');\n<\/script>\n<script async src=\"{{domain}}/minio.byterangers.onpremise.docor.static/collect-privity-v5.1.12.js\"><\/script>\n```\n\n\n您也可使用火山提供的私部地址：\n\n```HTML\n<script async src=\"https://lf3-data.volccdn.com/obj/data-static/log-sdk/collect/5.0/collect-privity-v5.1.12.js\"><\/script>\n```\n\n\n如果不能远程集成，请联系您的项目经理或客户成功经理，也可以直接把上方js文件下载下来做离线引入。\n\n<span id=\"_2-初始化-sdk\"></span>\n# 2. 初始化SDK\n\n<span id=\"_2-1-获取appid\"></span>\n## 2.1 获取appid\n\n在开始集成前，首先需要在集团中拥有一个应用，请参考：[如何创建应用](https://www.volcengine.com/docs/6287/66984)。\n\n\n* SaaS\\-云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/de1df7b557de438893f3013583ee3cfb~tplv-goo7wpa0wc-image.image) </span>\n\n* SaaS\\-非云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/11d05eafc702439cb7bdd70059dc8bad~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"_2-2-获取数据上送地址\"></span>\n## 2.2 获取数据上送地址\n\n进行数据接入上报时，您需要根据当前的环境类型和端类型确认您的数据上报地址，如果上报地址设置错误，后续会导致您无法查询到上报的数据。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">请在上报数据前，务必确认您当前使用的环境类型，根据环境类型配置上报地址。查看当前的环境类型请参见<a href=\"https://www.volcengine.com/docs/6287/1544686\">SaaS云原生/非云原生&私有化环境</a>。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">如果您使用的是SaaS\\-云原生环境，您也需确认您的服务所在的地域，根据所在地域配置上报地址（通常您的服务会在华北2\\-北京地域，部分用户可能会使用其他地域）。SaaS\\-云原生用户查看服务所在地域请参见<a href=\"https://www.volcengine.com/docs/6287/1544685\">支持的地域</a>。</div>\n\n\n\n<span id=\"7d03a6ed\"></span>\n### SaaS\\-云原生 & SaaS\\-非云原生\n\n\n|地址类型 |SaaS\\-云原生环境<br><br>（国内：华北2\\-北京） |SaaS\\-云原生环境<br><br>（海外：亚太东南\\-柔佛） |SaaS\\-非云原生环境 国内环境 |SaaS\\-非云原生 海外BytePlus环境<br><br>（以下 SG 指新加坡） |\n|---|---|---|---|---|\n|数据上报地址 |* SaaS\\-云原生（华北）：https://gator.volces.com |* https://gator.uba.ap\\-southeast\\-1.volces.com |`channel: 'cn'`，即使用默认的数据上报地址 |`channel: 'sg'` |\n|分流地址 |https://tab.volces.com |https://tab.ab.ap\\-southeast\\-1.volces.com |无需手动配置 |无需手动配置 |\n\n\n<span id=\"9f341c3b\"></span>\n### 私有化环境\n\n私有化部署场景下，您需要获取部署私有化环境时，自行规划配置的数据上送地址。如您不清楚此地址，请联系您的项目经理或客户成功经理。\n\n<span id=\"_2-3-初始化sdk\"></span>\n## 2.3 初始化SDK代码\n\n<span id=\"5078a9bb\"></span>\n### 2.3.1 SaaS\\-云原生版本\n\n如您使用SaaS云原生部署版本，请参照如下代码初始化SDK。\n\n```javascript\nwindow.collectEvent('init', {\n    app_id: {{APPID}}, // 参考2.1节获取，注意类型是number而非字符串\n    channel_domain: 'https://****.****.com', // 设置数据上送地址，各环境各地域的上送地址请参见上文的 获取数据上送地址 章节。\n    ab_channel_domain: 'https://***.****.com', // 分流请求域名，各环境各地域的上送分流域名请参见上文的 获取数据上送地址 章节。\n    log: true, // true:开启日志，false:关闭日志\n    autotrack: false, // 全埋点开关，true开启，false关闭\n    enable_ab_test: true, // boolean类型，是否开启A/B实验功能\n    enable_ab_visual: false, // boolean类型，按需开启，默认关闭，是否开启A/B实验的可视化编辑模式功能\n    enable_multilink: false, //boolean类型，按需开启，默认关闭，是否开启A/B实验的多链接实验功能，默认为false\n    multilink_timeout_ms:1000 //number类型，A/B实验的多链接实验中关闭遮罩层的时间，默认500毫秒\n});\n// 此处可添加设置uuid、设置公共属性等代码\nwindow.collectEvent('start'); // 通知SDK设置完毕，可以真正开始发送事件了\n```\n\n\n<span id=\"_2-3-1-saas版本\"></span>\n### 2.3.2 SaaS\\-非云原生版本\n\n如您使用SaaS部署版本，请参照如下代码初始化SDK。\n\n```javascript\nwindow.collectEvent('init', {\n    app_id: {{APPID}}, // 参考2.1节获取，注意类型是number而非字符串\n    channel: 'cn', // 设置数据上送地址，各环境各地域的上送地址请参见上文的 获取数据上送地址 章节。\n    log: true, // true:开启日志，false:关闭日志\n    autotrack: false, // 全埋点开关，true开启，false关闭\n    enable_ab_test: true, // boolean类型，是否开启A/B实验功能\n    enable_ab_visual: false, // boolean类型，按需开启，默认关闭，是否开启A/B实验的可视化编辑模式功能\n    enable_multilink: false, //boolean类型，按需开启，默认关闭，是否开启A/B实验的多链接实验功能，默认为false\n    multilink_timeout_ms:1000 //number类型，A/B实验的多链接实验中关闭遮罩层的时间，默认500毫秒\n});\n// 此处可添加设置uuid、设置公共属性等代码\nwindow.collectEvent('start'); // 通知SDK设置完毕，可以真正开始发送事件了\n```\n\n\n<span id=\"_2-3-2-私有化版本\"></span>\n### 2.3.3 私有化版本\n\n如您使用私有化部署版本，请参照如下代码初始化SDK。\n\n```javascript\nwindow.collectEvent('init', {\n    app_id: {{APPID}}, // 参考2.1节获取，注意类型是number而非字符串\n    channel_domain: '{{REPORT_URL}}', // 设置私有化部署数据上送地址，参考2.2节获取\n    ab_channel_domain: '{{REPORT_URL}}' // 设置私有化域名，通常为数据上送地址，参考2.2节获取\n    log: true, // true:开启日志，false:关闭日志\n    autotrack: false, // 全埋点开关，true开启，false关闭\n    enable_ab_test: true, // boolean类型，是否开启A/B实验功能\n    enable_ab_visual: false, // boolean类型，按需开启，默认关闭，是否开启A/B实验的可视化编辑模式功能\n    enable_multilink: false, //boolean类型，按需开启，默认关闭，是否开启A/B实验的多链接实验功能，默认为false\n    multilink_timeout_ms:1000 //number类型，A/B实验的多链接实验中关闭遮罩层的时间，默认500毫秒\n});\n// 此处可添加设置uuid、设置公共属性等代码\nwindow.collectEvent('start'); // 通知SDK设置完毕，可以真正开始发送事件了\n```\n\n\n<span id=\"50a93747\"></span>\n## 2.4 **配置完毕**\n\n初始化结束后，需要通知SDK设置完毕，可以真正开始发送事件了。\n\n**说明：**  `start`方法调用前，同样可以上报事件，这些事件被缓存在内存中，没有真正的发送给服务端；直到`start`调用后，缓存的事件才会与设置的用户属性等参数合并成完整的事件结构，然后通过网络请求发送给服务端。`start`方法调用后发送的事件，则直接合并参数后然后发给服务端。\n\n```javascript\n// 必须在初始化配置完成后，加入这行代码，否则SDK不会发送数据\nwindow.collectEvent('start');\n```\n\n\n<span id=\"_2-5-使用调试工具\"></span>\n## 2.5 使用调试工具\n\n5.1.4以上的版本支持调试埋点，详细请查看[调试工具](https://www.volcengine.com/docs/76880/1033615)。\n\n在初始化时设置以下参数：\n\n```TypeScript\nwindow.collectEvent('init', {\n  //....\n  enable_debug: true // 上线前关闭此参数\n})\n```\n\n\n同时在需要验证的页面URL后增加如下参数 （**5.1.7以后的版本可以不加下面的参数**）：\n\n```javascript\n?open_devtool_web=true&app_id=${appid} // 你的appid\n```\n\n\n<span id=\"_3-初始化基本配置\"></span>\n# 3. 初始化基本配置\n\n以下为常用初始化配置。配置时需参考2.3/2.4节，添加到`window.collectEvent('init', {/` ` *...* ` `/})`中。\n\n<span id=\"_3-1-全埋点设置开关\"></span>\n## 3.1 全埋点设置开关\n\n全埋点开关默认关闭。\n\n```javascript\n// 开启全埋点功能\nwindow.collectEvent('init', {\n    // ...... 其他初始化配置\n    autotrack: true\n})\n```\n\n\n<span id=\"_3-2-查看日志打印\"></span>\n## 3.2 查看日志打印\n\n日志打印默认关闭。\n\n```javascript\n// 在控制台打印详细的log信息，协助排查\nwindow.collectEvent('init', {\n    // ...... 其他初始化配置\n    log: true\n})\n```\n\n\n<span id=\"_3-3-ab功能相关\"></span>\n## 3.3 AB功能相关\n\n```javascript\nwindow.collectEvent('init', {\n    enable_ab_test: true, // boolean类型，是否开启A/B实验功能\n    enable_ab_visual: false, // boolean类型，按需开启，默认关闭，是否开启A/B实验的可视化编辑模式功能\n    enable_multilink: false, //boolean类型，按需开启，默认关闭，是否开启A/B实验的多链接实验功能，默认为false\n    multilink_timeout_ms:1000 //number类型，A/B实验的多链接实验中关闭遮罩层的时间，默认500毫秒\n    auto_exposure_expriment: false // boolean类型，按需开启，默认关闭，是否自动曝光全量实验 5.1.10版本支持\n})\n```\n\n\n<span id=\"6f829cf4\"></span>\n## 3.3 自动曝光全量\n\n```javascript\nwindow.collectEvent('init', {\n    enable_ab_test: true, // boolean类型，是否开启A/B实验功能\n    auto_exposure_expriment: false // boolean类型，按需开启，默认关闭，是否自动曝光全量实验 5.1.10版本支持\n})\n```\n\n\n**开启后，SDK会根据下发的实验结果，自动曝光所有实验（除了多链接实验和可视化实验），不需要再额外调用getVar方法，5.1.10版本开始支持。** \n\n<span id=\"_3-4-禁止ab数据重置\"></span>\n## 3.4 禁止AB数据重置\n\n是否在变更user_unique_id时，禁止AB数据的重置。通常用于匿名状态转为实名状态。多用户之间切换，请不要开启。\n\n```javascript\nwindow.collectEvent('init', {\n    disable_ab_reset: true | false // 默认false\n})\n```\n\n\n<span id=\"_3-5-关闭pv事件上报\"></span>\n## 3.5 关闭pv事件上报\n\n当访问页面时，SDK会默认上报一次pv事件(事件名predefine_pageview)，此预置事件默认上报。如需关闭，请在初始化配置中禁用此事件。\n\n```javascript\n// 在控制台打印详细的log信息，协助排查\nwindow.collectEvent('init', {\n    // ...... 其他初始化配置\n    disable_auto_pv: true // 开启禁用PV上报的开关\n})\n```\n\n\n<span id=\"_3-6-内嵌h5页打通原生端\"></span>\n## 3.6 内嵌H5页打通原生端（客户端）\n\n客户端开启内嵌H5页打通后，内嵌H5页上产生的事件将通过客户端SDK上报，不在js SDK上报，并复用客户端设置的`user_unique_id`和公共属性。此时，还需在集成js sdk的H5页上开启打通开关。\n\n```javascript\n// H5内嵌到原生端并打通\nwindow.collectEvent('init', {\n    // ...... 其他初始化配置\n    enable_native: true \n    // 5.1.3以下版本参数为Native，\n    // 5.1.3以上版本修改为enable_native，但仍然兼容了Native的设置\n})\n```\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">⚠️ 请注意，原生端也需做初始化适配，请分别参考Android和iOS集成开发指南。</div>\n\n\n**如果客户端初始化的时候采用了多实例的方式，可能会导致打通失败。有以下两种方式来调整：** \n\n\n1. 客户端调用上报方式，使用默认实例初始化，不用多实例。\n\n2. H5页面手动绑定以下多实例的appid。在init方法之后，start方法之前调用如下代码。\n\n\n```TypeScript\nwindow.collectEvent('setNativeAppId', appid)\n```\n\n\n<span id=\"_3-7-初始化配置一览表\"></span>\n## 3.7 初始化配置一览表\n\n\n|字段 |是否必须 |字段值 |字段说明 |示例/备注 |\n|---|---|---|---|---|\n|app_id |是 |预先申请。 number类型 |业务产品的唯一标识 | |\n|channel |否 |可选值：cn,sg,va |上报通道标识。和channel_domain二选一。 |国内，新加坡，美东 |\n|channel_domain |否 |合法域名。字符串。 |和channel二选一。设置该项后 channel 项会被忽略。 自定义上报的域名及其路径前缀。 |[https://xx.ccc.yy](https://xx.ccc.yy) |\n|ab_channel_domain |否 |合法域名。字符串。 |私有化域名<br><br>设置此参数时，ab实验获取域名则会根据此参数来获取。 |[https://xx.ccc.yy](https://xx.ccc.yy) |\n|log |否 |布尔类型。默认false。 |是否在控制台打印详细的 log 信息。 |建议开启 |\n|enable_ab_test |是 |布尔类型。默认false。 |是否开启A/B实验功能 | |\n|enable_ab_visual |否 |布尔类型。默认false。 |是否开启可视化实验<br><br>设置此参数时，ab实验读到可视化配置时会执行可视化逻辑<br><br>前提是必须开启enable_ab_test的总开关 | |\n|enable_multilink |否 |布尔类型。默认false。 |是否开启多链接实验<br><br>注：开启多链接实验需要开启AB实验的前提，必须开启enable_ab_test的总开关 | |\n|multilink_timeout_ms |否 |number类型 |多链接实验中默认的关闭遮罩层的时间<br><br>默认：500毫秒<br><br>前提是必须开启enable_ab_test的总开关 |ebable_ab_test:true<br><br>enable_multilink: true,<br><br>multilink_timeout_ms:3000 |\n|disable_auto_pv |否 |布尔类型。默认false。 |是否禁止SDK上报默认PV | |\n|disable_sdk_monitor |否 |布尔类型。默认false。 |用于禁止SDK启动后自身监控事件的上报，（但目前并不会禁止错误日志的上报。） | |\n|autotrack |否 |布尔类型。默认false。 |开启无埋点上报。 |具体能力请参考全埋点文档 |\n|enable_stay_duration |否 |布尔类型。默认false。 |开启停留时长。 |具体请参考停留时长文档 |\n|cross_subdomain |否 |布尔类型。默认false。 |是否自动跨子域名识别用户，设置为true时多个子域名下使用同一浏览器访问的匿名用户会被自动识别为同一个用户，比如 a.[yourdomain.com](http://yourdomain.com) 和 b.[yourdomain.com](http://yourdomain.com)的情况。 | |\n|cookie_domain |否 |string类型 |在开启上述配置后使用，可配置存储token或者utm参数的cookie域名，如你需要'a.[bytedance.com](http://bytedance.com)'和'b.[bytedance.com](http://bytedance.com)'串通，则传入'.[bytedance.com](http://bytedance.com)',不传则默认存储在当前域名下 | |\n|cookie_expire |否 |number类型，默认7天（单位ms） |cookie过期时间 | |\n|max_report |否 |number类型,默认20 |自定义埋点合并上报的条数 | |\n|reportTime |否 |number类型,默认30ms |埋点上报异步队列的时间间隔 | |\n|configPersist |否 |number类型，默认0 |设置config参数是否需要持久化存储 |0：不需要；1：session会话级存储；2：localstorage持久化存储 |\n|timeout |否 |number类型，默认100000ms |埋点上报的超时时间 | |\n|enable_native (5.1.3版本以下为Native) |否 |boolean类型 |是否走原生native sdk上报 |开启后，所有的埋点和config设置都会通过原生native sdk完成 |\n|spa |否 |boolean类型 |是否开启路由变化的监控 |开启后，当路由发生变化后，会重新上报PV和停留时长 |\n|disable_track_event |否 |boolean类型 |事件禁用参数 |开启后，所有的埋点都不再上报 |\n|enable_custom_webid |否 |boolean类型 |是否使用自定义webid | |\n|allow_hash |否 |boolean类型 |是否支持监听hash路由 |5.1.3以上支持 |\n|ab_cross |否 |boolean类型 |是否AB数据跨域名存储 |5.1.3以上支持 |\n|ab_cookie_domain |否 |string类型 |AB数据跨域名存储开启后，存储的域名 |5.1.3以上支持 |\n|disable_ab_reset |否 |boolean类型 |禁止切换uuid时的AB重置，注:切换uuid时，会清除之前uuid的缓存，并重发AB分流请求，在这个过程中，可能会造成vid不上报（uuid不匹配），请注意 |5.1.4以上支持 |";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

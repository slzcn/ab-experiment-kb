<script>window.DATA_BASE="../";window.INIT_DOC=66993;window.INIT_MD="本文为您介绍新人上手的通用流程和Demo体验引导。\n\n<span id=\"db17ef22\"></span>\n# 产品使用通用流程\n\n\n1. 管理员：购买开通DataTester产品，并完成前期的成员、角色授权等操作，详细操作可参见[购买与配置A/B产品](https://www.volcengine.com/docs/6287/166062)。\n\n2. 实验员：了解如何开启一个A/B实验，并结合业务需求规划A/B实验，做好实验前的准备工作。详情请参见[开实验前准备工作](https://www.volcengine.com/docs/6287/65806)。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/4d3c16fabf8c4bba877870bba63f6952~tplv-goo7wpa0wc-image.image) </span>\n\n   例如，根据通用的海盗增长模型，上方的图刻画了一个企业在它用户的整个生命周期里，到底进行了哪些日常工作。从左到右，描述了各个阶段的一些具体场景，从获取用户到推荐传播。上半部分主要表示了各个部门的各个角色所从事的具体业务活动。下半部分对应应用场景，可以做哪些 A/B 实验。\n\n3. 开发者：\n\n   1. 了解DataTester的数据接入能力和实验分流原理。\n\n      <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/25e2052d607c459da0bc93eabd379570~tplv-goo7wpa0wc-image.image) </span>\n\n   2. 根据实验规划进行实验需要采集的各端数据接入和配置下发操作，详情可参见[快速入门：研发](https://www.volcengine.com/docs/6287/663094)。\n\n4. 实验员：\n\n   1. 了解各类实验报告类型和对应的实验结果报告的关键指标含义。\n\n      \n      |**假设检验的报告：传统A/B实验** |**基于贝叶斯的MAB实验报告：MAB智能调优实验** |\n      |---|---|\n      |基于经典假设检验框架+字节跳动内部多年应用和优化升级，保障实验科学性的重要模块是统计报告，DataTester提供了 P\\-Value 和置信区间等统计信息来帮助用户甄别数据的可靠性。同时还提供了一些高级统计功能来修正统计结果，比如多重比较修正、序贯检验等功能，可以进一步提升统计评估的准确度，帮助用户在一些复杂场景下更好地做判断。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/3aab22011171484398b2de959eca6c6f~tplv-goo7wpa0wc-image.image) </span><br><br>详细点击查看：[A/B实验报告综述](https://www.volcengine.com/docs/6287/65837) |MAB是基于贝叶斯理论设计的一套测试调优方案，从实验目的上来说是想让整个活动最优，而不是找出最优组。所以DataTester提供了单独的MAB实验报告。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/ea5e9d8243db4239b176ba223ad0f419~tplv-goo7wpa0wc-image.image) </span><br><br>详细点击查看：[MAB报告综述](https://www.volcengine.com/docs/6287/196493) |\n      \n\n   2. 根据规划在DataTester上开启A/B实验，并查看对应实验的结果报告。\n\n\n<span id=\"6f7f22ea\"></span>\n# Demo体验\n\nDataTester为您提供的Demo项目，开通进入DataTester控制台后，您可以切换至Demo项目中，Demo项目区分体验Demo、操作Demo，便于在初始使用时体验DataTester的实验能力和上手体验操作。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/390c447303764d34ac25728873dc4872~tplv-goo7wpa0wc-image.image) </span>";</script>

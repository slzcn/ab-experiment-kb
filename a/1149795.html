<script>window.DATA_BASE="../";window.INIT_DOC=1149795;window.INIT_MD="DataTester支持多种语言的SDK，这些SDK接口上报的数据，在底层数据模型中需要使用统一的数据格式，系统为您提供的预置事件/属性已遵循此统一的数据格式，如果您需要自定义事件/属性，需严格按照支持的数据格式来定义自定义事件/属性的数据格式。本文为您介绍详细的数据格式要求。\n\n<span id=\"c2936b36\"></span>\n# 背景信息\n\n使用各类型SDK采集上报数据时：\n\n\n* 需要先在各端中集成对应的SDK。\n\n* 后续SDK会将采集的数据通过JSON格式进行上报。\n\n* 收到上报数据后，系统会对JSON数据进行处理并落库，落库后的数据类型与上报的JSON中的数据类型有对应关系。\n\n\n<img src=\"data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHhtbG5zOnhsaW5rPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5L3hsaW5rIiB2ZXJzaW9uPSIxLjEiIHdpZHRoPSI1MTlweCIgaGVpZ2h0PSI5NXB4IiB2aWV3Qm94PSItMC41IC0wLjUgNTE5IDk1Ij48ZGVmcy8+PGc+PHBhdGggZD0iTSAzMTIgNjIgTCAzODUuNjMgNjIiIGZpbGw9Im5vbmUiIHN0cm9rZT0iIzAwMDAwMCIgc3Ryb2tlLW1pdGVybGltaXQ9IjEwIiBwb2ludGVyLWV2ZW50cz0ic3Ryb2tlIi8+PHBhdGggZD0iTSAzOTAuODggNjIgTCAzODMuODggNjUuNSBMIDM4NS42MyA2MiBMIDM4My44OCA1OC41IFoiIGZpbGw9IiMwMDAwMDAiIHN0cm9rZT0iIzAwMDAwMCIgc3Ryb2tlLW1pdGVybGltaXQ9IjEwIiBwb2ludGVyLWV2ZW50cz0iYWxsIi8+PHJlY3QgeD0iMTkyIiB5PSIzMiIgd2lkdGg9IjEyMCIgaGVpZ2h0PSI2MCIgcng9IjkiIHJ5PSI5IiBmaWxsPSIjZmZmZmZmIiBzdHJva2U9IiMwMDAwMDAiIHBvaW50ZXItZXZlbnRzPSJhbGwiLz48ZyB0cmFuc2Zvcm09InRyYW5zbGF0ZSgtMC41IC0wLjUpIj48Zm9yZWlnbk9iamVjdCBzdHlsZT0ib3ZlcmZsb3c6IHZpc2libGU7IHRleHQtYWxpZ246IGxlZnQ7IiBwb2ludGVyLWV2ZW50cz0ibm9uZSIgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSI+PGRpdiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMTk5OS94aHRtbCIgc3R5bGU9ImRpc3BsYXk6IGZsZXg7IGFsaWduLWl0ZW1zOiB1bnNhZmUgY2VudGVyOyBqdXN0aWZ5LWNvbnRlbnQ6IHVuc2FmZSBjZW50ZXI7IHdpZHRoOiAxMThweDsgaGVpZ2h0OiAxcHg7IHBhZGRpbmctdG9wOiA2MnB4OyBtYXJnaW4tbGVmdDogMTkzcHg7Ij48ZGl2IHN0eWxlPSJib3gtc2l6aW5nOiBib3JkZXItYm94OyBmb250LXNpemU6IDA7IHRleHQtYWxpZ246IGNlbnRlcjsgIj48ZGl2IHN0eWxlPSJkaXNwbGF5OiBpbmxpbmUtYmxvY2s7IGZvbnQtc2l6ZTogMTJweDsgZm9udC1mYW1pbHk6IEhlbHZldGljYTsgY29sb3I6ICMwMDAwMDA7IGxpbmUtaGVpZ2h0OiAxLjI7IHBvaW50ZXItZXZlbnRzOiBhbGw7IHdoaXRlLXNwYWNlOiBub3JtYWw7IHdvcmQtd3JhcDogbm9ybWFsOyAiPkpTT048L2Rpdj48L2Rpdj48L2Rpdj48L2ZvcmVpZ25PYmplY3Q+PC9nPjxyZWN0IHg9IjIxMiIgeT0iMiIgd2lkdGg9IjgwIiB 5OiBIZWx2ZXRpY2E7IGNvbG9yOiAjMDAwMDAwOyBsaW5lLWhlaWdodDogMS4yOyBwb2ludGVyLWV2ZW50czogYWxsOyB3aGl0ZS1zcGFjZTogbm9ybWFsOyB3b3JkLXdyYXA6IG5vcm1hbDsgIj7lkITnq6/ku6PnoIHpm4bmiJBTREs8L2Rpdj48L2Rpdj48L2Rpdj48L2ZvcmVpZ25PYmplY3Q+PC9nPjwvZz48L3N2Zz4=\" />\n\n其中：\n\n\n* 各端集成SDK时，部分系统预置事件/属性支持在代码中配置是否需要采集上报，也支持定义自定义事件/属性。\n\n* 支持采集上报的JSON数据类型，以及与落库后的数据库数据类型的对应关系详情请参见下文的**属性数据类型**章节；上报的JSON示例可参见下文的**日志结构**章节。\n\n* 数据采集上报后，系统对上报数据进行处理落库时，不同类型的数据可进行计算生成不同的指标数据，便于后续的分析使用，支持的计算应用详情请参见下文的**不同数据类型应用**章节。\n\n* 数据采集上报时，采集上报的限制条件详情请参见下文的**上报数据的限制**章节。\n\n\n<span id=\"1a3b1443\"></span>\n# 事件/属性分类\n\n根据增长分析的业务数据分析场景，Finder为您将事件和属性进行了以下业务层面的定义分类，后续您在SDK集成与埋点配置时，可根据业务需要配置对应的事件/属性。\n\n\n|**事件/属性分类** ||**业务含义说明** |\n|---|---|---|\n|系统预置 |预置事件公共属性 |系统预置的每一个事件都会上报的通用属性。比如Finder SDK上报的设备信息类字段。 |\n||预置事件及事件属性 |系统预置的埋点事件以及事件属性。 |\n||预置用户属性 |系统预置的用于描述用户自身状态的属性。 |\n|自定义 |自定义事件公共属性 |客户在预置事件公共属性以外自定义的事件公共属性。 |\n||自定义事件及事件属性 |客户在预置事件及事件属性以外自定义的事件及事件属性。 |\n||自定义用户属性 |客户在预置用户属性以外自定义的用户属性。 |\n\n\n<span id=\"_1-属性数据类型\"></span>\n# 1.属性数据类型\n\n<span id=\"b8b41b92\"></span>\n## 注意事项\n\n\n* **自定义事件/属性时，取值不要包含转义字符。** \n\n   创建自定义事件或属性时，需保障对应事件及属性的格式符合本文的格式要求，且自定义属性的取值不要包含例如转义字符类的特殊字符，例如“\\n”。如果包含这类特殊字符，可能会导致后续数据能上报成功，但是查询分析时会导致查询结果不正确，您需要删除其中的特殊字符或使用虚拟属性。\n\n* **一个属性的数据类型由首次落库时的数据类型决定。** \n\n   例如，您在控制台界面新增了一个事件属性，此事件属性的数据类型为string。新建完成后此属性即已落库，后续在进行数据上报时，如果上报的属性数据类型又变为number，则不影响已落库的属性数据类型，只会导致上报的属性数据类型与已落库的属性数据类型不一致而导致可能出现上报错误等问题。\n\n* 您可以在产品界面应用管理\\-数据管理中，可查看现有环境中属性的数据类型。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_f511c02b1ee01c96fe2082f139e9ca61.png) </span>\n\n\n<span id=\"b1779cb5\"></span>\n## 属性数据类型对应关系\n\n数据类型有以下几种：\n\n\n|**采集数据类型\\-中文名** |**采集数据类型\\-JSON** |**数据库类型** |**额外说明** |**示例数据** |\n|---|---|---|---|---|\n|**整数** |number |int64 |取值范围：[\\-9223372036854775808, 9223372036854775807] |1024 |\n|**浮点数** |number |float64 |8字节，最大精度16位 |10.24 |\n|**字符串** |string |string |长度不超过 1024 字符，utf\\-8编码 |\"1024\" |\n|**数组** |array |list |最多支持500个元素，元素数据类型支持 string，一个数组中所有元素类型需保持一致。<br><br><div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div><br><br><br><div data-tips=\"true\" data-tips-type=\"warning\">数据落库时，会对 list 的元素进行去重，例如 [5,5,5] ，变成[5] ； [5,5,6] ，变成[5,6] ； [5,6,5] ，变成[5,6] 。</div><br> |[\"10\", \"24\"] |\n|**日期时间** |string |datetime |上报格式：<br><br><br>* \"yyyy\\-MM\\-dd HH:mm:ss\"<br><br>* \"yyyy\\-MM\\-dd HH:mm:ss+Offset\"（其中 +Offset 为时区偏移）<br><br>* \"yyyy\\-MM\\-dd HH:mm:ss.SSS\"（其中 SSS 为毫秒）<br><br>* \"yyyy\\-MM\\-dd HH:mm:ss.SSS+Offset\"（同前）<br><br><br>日期的取值范围：[1970, 2099]<br><br><div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div><br><br><br><div data-tips=\"true\" data-tips-type=\"tip\">如果是形如 \"2020\\-07\\-07 01:22:33\" 的 datetime 上报，默认按应用级的时区；</div><br><br><br><div data-tips=\"true\" data-tips-type=\"tip\">如果您需要指定 timezone，需要上报 “2020\\-07\\-07T13:46:08.342+08:00” 格式的方式。</div><br> |\"2020\\-10\\-24 23:47:12\"<br><br>\"2020\\-10\\-24 23:47:12+08:00\"<br><br>\"2020\\-10\\-24 23:47:12.102\"<br><br>\"2020\\-10\\-24 23:47:12.102+08:00\" |\n|**版本** |string |string |版本类数据的上报格式为：<br><br><br>* 2段~6段<br><br>* 英文句点分隔<br><br>* 每段最长5位数字。<br><br><br>系统发现上报数据的取值的格式匹配时，会自动将数据类型设置为版本类型。版本类型可按数值排序规则进行排序，也可进行大于及小于的运算符进行筛选。<br><br>对应格式要求的正则表达式为：^[0\\-9]{1,5}(.[0\\-9]{1,5}){1,5}$<br><br><div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div><br><br><br><div data-tips=\"true\" data-tips-type=\"warning\">版本类型的数据在入库存储时，数据格式为string，在后续查询分析时会进一步处理为version类的数据，查询时支持的过滤条件为version类型数据支持的过滤条件。</div><br> |\"10.2\"<br><br>\"1.02.4\"<br><br>\"1.02.4.12345.22345.32345\" |\n|**其他类型** |object/boolean |string |支持上报 object 和 boolean （bool：是/否）数据类型的数据，但会被转化成 string 进行存储。 |\\-\\- |\n\n\n<span id=\"_2-不同数据类型应用\"></span>\n# 2.不同数据类型应用\n\n\n* **不同属性数据类型，可计算的指标**\n\n\n\n|类别 |分析功能 |数据类型 |计算方法 |\n|---|---|---|---|\n|事件 |实验报告 |\\-（全部） |总次数<br><br>总人数<br><br>人均次数 |\n|事件 |实验报告 |\\-（全部） |总次数<br><br>天数<br><br>小时数 |\n|事件属性 |通用 |int<br><br>float |按……求和<br><br>按……求平均值<br><br>按……求人均值<br><br>按……求分位数 |\n|事件属性 |通用 |Int<br><br>float<br><br>string<br><br>list<br><br>datetime |按……求去重数<br><br>按……和用户去重 |\n\n\n\n* **不同属性数据类型，作为筛选条件可用的操作符**\n\n\n\n|类型 |为空 |不为空 |= |≠ |大于 |小于 |大于等于 |小于等于 |包含 |不包含 |正则匹配 |\n|---|---|---|---|---|---|---|---|---|---|---|---|\n|字符串 |✓ |✓ |✓ |✓ | | | | |✓ |✓ |✓ |\n|整型 |✓ |✓ |✓ |✓ |✓ |✓ |✓ |✓ | | | |\n|浮点型 |✓ |✓ |✓ |✓ |✓ |✓ |✓ |✓ | | | |\n|数组 |✓ |✓ | | | | | | |✓ |✓ | |\n|日期时间 |✓ |✓ | | | | | | | | | |\n|版本 |✓ |✓ |✓ |✓ |✓ |✓ |✓ |✓ |✓ |✓ |✓ |\n\n\n\n* 字符串类型可以选择“为空”和“不为空”用于匹配 null 或非 null。\n\n* 日期类型属性有一个单独的筛选规则（如下表）：\n\n\n\n|**操作符名称** |**说明** |\n|---|---|\n|**固定范围** |所选属性的时间在一个固定的时间范围内，可以是过去365天到未来365天内的任何一天或多天。 |\n|**在当前时间** |所选属性的时间位于查询发起的时刻到用户所设定的相对时段之间。<br><br>可选条件：<br><br><br>1. 过去 {N} 小时 {之前,之内,至 {M} 天之间}（取值范围：1<= N <= 365，N 须大于 M，365 \\>= N \\> M \\>0）<br><br>2. 未来 {N} 小时 {之前,之内,至 {M} 天之间}（取值范围：1<= N <= 365，N 须小于 M，365 \\>= N \\> M \\>0） |\n|**在今天和** |所选属性的时间位于查询发起的当天（自然天）到用户所设定的相对天数（自然天）范围之间。<br><br>可选条件：<br><br><br>1. 过去 {N} 天 {之前,之内,至 {M} 天之间}（取值范围：1<= N <= 365，N 须大于 M，365 \\>= N \\> M \\>0）<br><br>2. 未来 {N} 天 {之前,之内,至 {M} 天之间}（取值范围：1<= N <= 365，N 须小于 M，365 \\>= N \\> M \\>0） |\n|**在事件发生** |所选属性的时间位于相对当前事件的发生时间的一段时间内。由于用到了事件的发生时间，所以仅当作为事件的过滤条件时才会出现这种操作符。<br><br>可选条件：<br><br><br>1. 当天、当周和当月：事件发生时所在的自然天、周或月<br><br>2. 之前 {N} {天,秒,分,小时,周} 内（此时的天、周计算时不是自然天、自然周，而是相对事件发生时刻推算出的时刻）<br><br>3. 之后 {N} {天 , 秒,分,小时,周} 内（同前）<br><br><br>N 的取值范围：<br><br><br>* 天：1 <= N <= 365（当前都按天级的限制执行）<br><br>* 秒：1 <= N <= 365<br><br>* 分：1 <= N <= 365<br><br>* 小时：1 <= N <= 168<br><br>* 周：1 <= N <= 52 |\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">选择不同数据格式注意事项：</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\">需要求和、平均值、按照区间范围筛选的必须要用int、float数值类型。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\">需要时间筛选条件的必须定义数据类型为datetime格式。</div>\n\n\n\n<span id=\"_3-上报数据限制\"></span>\n# 3.上报数据限制\n\n<span id=\"_3-1-一般限制\"></span>\n## **3.1 一般限制**\n\n\n* 单个应用的上报的事件数总量不限制；\n\n* 单个应用支持元事件种类不超过1000个（不同应用之间互不影响，不含虚拟事件）；\n\n* 单个事件的属性数量推荐300个以内，最多不超过500个（不同事件之间互不影响）；\n\n* 用户属性的属性数量最多不超过 500个；\n\n* 单个应用自定义事件公共属性数量不超过100个；\n\n* 事件名建议不超过64个字符，最长不超过255个字符；\n\n* 事件属性名和用户属性名称最长不超过64个字符；\n\n* 属性值长度建议不超过255字符，特殊情况如url等最大支持1024字符；\n\n* 事件属性名称禁止命名为user_unique_id、ssid、event_id；\n\n* 属性名不允许和预置属性名称相同；预置属性文档可查看[预置属性](https://www.volcengine.com/docs/6287/169885)。\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">超过上述限制时，超过的事件、属性数据可能会被系统自动丢弃。</div>\n\n\n<span id=\"_3-2-事件时间限制\"></span>\n## **3.2 事件时间限制**\n\n使用客户端 SDK （iOS、Android）导入的数据，服务端默认只接收事件发生时间在接收时间向前 7 天内和向后24小时内数据。\n\n<span id=\"_3-3-命名限制\"></span>\n## **3.3 命名限制**\n\n\n1. events表中，同一个属性名，不允许存在多个属性类型，只有一种属性类型。\n\n2. users表中，同一个属性名，不允许存在多个属性类型，只有一种属性类型。\n\n3. 同一个属性名，如果在events和users表中同时存在，在两表中数据类型可以相同，也可以不同。\n\n\n<span id=\"_3-4-属性长度和范围的限制\"></span>\n## **3.4 属性长度和范围的限制**\n\n\n|中文名 |数据库类型 |额外说明 |\n|---|---|---|\n|整数 |int64 |取值范围：[\\-9223372036854775808, 9223372036854775807] |\n|浮点数 |float64 |8字节，最大精度16位 |\n|字符串 |string |最大支持 1024 字符。 |\n|版本(字符串) |version(string) |格式：1. 2段~6段 2. 英文句点分隔 3. 每段最长5位<br><br>示例：1.1.2.4321 |\n|数组 |list |最多支持500个元素，元素数据类型支持 string，一个数组中所有元素类型需保持一致。 |\n|日期时间 |datetime |日期取值范围：[1900, 2099] |\n\n\n<span id=\"_4-日志结构\"></span>\n# 4.日志结构\n\n入库后可看到的数据格式分别如下：\n\n\n* **私有化**\n\n\n```json\n{\n    \"time\": 1606301031,\n    \"server_time\": 1606249381,\n    \"local_time_ms\": 1606301031000,\n    \"device_id\": \"6912716898461553676\",\n    \"os\": \"ios\",\n    \"params\": {\n        \"package\": \"package\",\n        \"app_version\": \"1.0.6\",\n        \"device_model\": \"iphone 6s plus\",\n        \"timezone\": \"8.0\",\n        \"os_version\": \"10.3.2\",\n        \"session_depth_range\": \"5\",\n        \"session_id\": \"762891435873043\",\n        \"network_carrier\": \"TELCEL\",\n        \"language\": \"zh\",\n        \"exit_page\": \"http://datarangers.com.cn/pages/index/3\",\n        \"product_name\": \"default_to_b\",\n        \"resolution\": \"375x667\",\n        \"platform\": \"ios\",\n        \"loc_country_id\": \"1814991\",\n        \"app_channel\": \"线下扫码下载\",\n        \"device_brand\": \"苹果\",\n        \"browser\": \"chrome\",\n        \"os_name\": \"ios\",\n        \"loc_province_id\": \"1280239\",\n        \"session_duration_range\": \"100-200\",\n        \"client_ip\": \"118.213.201.135\",\n        \"loc_city_id\": \"1279540\",\n        \"browser_version\": \"68.0.3440\",\n        \"network_type\": \"mobile\",\n        \"duration\": 117,\n        \"session_depth\": 5,\n        \"screen_width\": 375,\n        \"localtime_ms\": 1606301031000,\n        \"screen_height\": 667,\n        \"session_duration\": 117,\n        \"is_login\": 1\n    }\n}\n```\n\n\n\n* **SaaS**\n\n\n```plain\n{\n        \"user\": {\n            \"ssid\": \"\",                // SSID\n            \"user_unique_id\": \"\",      // user_unique_id，存储于 string_profiles{'uuid'}\n            \"web_id\": 0,               // 网页端的匿名ID，存储于 string_profiles{'web_id'}\n            \"device_id\": 0,            // 移动端,小程序端的匿名ID\n            \"user_register_time\": \"\"   // 用户首次事件触发时间\n        },\n        \"params\": {\n            \"language\": \"zh-CN\",\n            \"region\": \"\",\n            \"app_version\": \"unknown\",\n            \"app_region\": \"\",\n            \"app_channel\": \"\",\n            \"app_language\": \"\",\n            \"os_version\": \"10\",\n            \"os_name\": \"10\",\n            \"device_model\": \"Windows NT 10.0\",\n            \"device_brand\": \"\",\n            \"network_type\": \"\",\n            \"network_carrier\": \"\"\n        },\n        \"items\":{\n            \"sku\": [{\n                \"id\": \"\",\n                \"property_1\": \"\",     // 当前item定义的属性1\n                \"property_1\": \"\",     // 当前item定义的属性2\n            }]\n        },\n        \"event_name\": \"predefine_pageview\",\n        \"app_id\": \"2174\",             // string, rangers 中的应用id\n        \"app_name\": \"数据发现者\",       // string, rangers 中的应用名\n        \"server_time\": 1606783082,    // int(timestamp), 服务端收到事件的时间, 精确到 ms\n        \"time\": 1606783080,           // int(timestamp), time = local_time_ms/1000，单位为秒。\n        \"event_date\": 1606783080      // date, 基于 time 计算，但只精确到天\n}\n```\n\n\n<span id=\"_5-faq\"></span>\n# 5.FAQ\n\n<span id=\"q1：-各端数据类型传输不一致，系统如何处理？如何修改？\"></span>\n### **Q1： 各端数据类型传输不一致，系统如何处理？如何修改？** \n\n描述：例如IOS端先传入A属性的格式为数值类型，安卓端后传入A属性的格式为字符串类型，此时系统如何处理，结果会如何？\n\n**A2**：一个属性的类型由首次导入的数据类型决定，如果后续传入不同数据类型的数据，系统会尝试做转换，如果转换成功，则入库。如果转换失败，则属性信息值为‘0’入库，相当于属性信息丢失，但事件正常上报。\n\n具体转换成功信息如下表：\n\n\n|原数据类型 |新数据类型 |是否转换成功 |其他说明 |\n|---|---|---|---|\n|int、float、datetime、list |string |是 | |\n|数值型string，例如‘1’，‘0.1’ |int、float |是 |原数据类型虽为string，但是值为数字123456 |\n|float |int |是 |但是会丢失小数点后面的数据。 |\n|int |float |是 | |\n|其余数据类型均转换失败。 | | | |\n\n\n注意\n\n需要在数据校验侧规避这一问题，如果发生，请错误端及时调整数据格式，否则会引发数据丢失。\n\n<span id=\"q2：-是否接受时间戳string的上报，会自动解析成datetime格式吗？\"></span>\n### **Q2： 是否接受时间戳string的上报，会自动解析成datetime格式吗？** \n\n**A3**：时间戳不支持，只支持日期时间的格式。\n\n<span id=\"q3：datetime是否接受按天级别格式的数据，-yyyy-mm-dd\"></span>\n### **Q3：datetime是否接受按天级别格式的数据，\"yyyy\\-MM\\-dd\"** \n\n**A4**：支持。（上报格式：\"yyyy\\-MM\\-dd\"）\n\n<span id=\"q4：-埋点设计时，如何选择正确的数据类型？\"></span>\n### **Q4： 埋点设计时，如何选择正确的数据类型？** \n\n\n|中文名 |数据库类型 |应用场景 |\n|---|---|---|\n|整数 |int64 |需要数值求和，平均值等计算，并且不会出现小数的情况。例如：年龄，整数金额。 |\n|浮点数 |float64 |需要数值求和，平均值等计算，并且会出现小数的情况。例如：折扣金额，时长。 |\n|字符串 |string |常用的文本类属性，例如：页面标题，按钮名称，商品分类。不需要计算的ID类型，例如：内容ID，商品ID。 |\n|数组 |list |集合，一个属性有多个值，但筛选又需要按单个筛选的。例如：一篇娱乐新闻属于多个内容标签,{‘热门’，‘娱乐’，‘新闻’}例如：一个商品属于多个商品标签 |\n|日期时间 |datetime |需要按照日期范围筛选的 |\n|版本 |string |需要对版本进行排序时 |\n\n\n<span id=\"q5：为什么会一段的版本值？不是版本格式要求至少两段么？\"></span>\n### **Q5：为什么会一段的版本值？不是版本格式要求至少两段么？** \n\n默认情况下，系统在遇到被“.”切割为至少两段的数据时（例如 2.0），会自动判断其为版本类型。而对于已知的版本类型的字段，我们会将这个限制放开，允许没有“.”，例如：2 这样的值上报。因为在一些情况下，版本号只有一段。当然对于这种情况，你也可以选择将版本号作为 int 类型上报。";</script>

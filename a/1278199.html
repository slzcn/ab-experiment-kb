<script>window.DATA_BASE="../";window.INIT_DOC=1278199;window.INIT_MD="> 上报事件和属性前，请先阅读[数据格式](https://www.volcengine.com/docs/6287/1149795)介绍。\n\n\n<span id=\"e9405076\"></span>\n# 1. 用户与用户属性\n\n<span id=\"573aa948\"></span>\n## 1.1 登录态变化调用\n\n<span id=\"1133229f\"></span>\n### 1.1.1 账户登录\n\n如您的产品中有账户体系，请在用户登录后立即设置uuid，以保证用户登录前后口径一致性。\n\n```javascript\nwindow.collectEvent('config', {\n    user_unique_id: \"{{USER_UNIQUE_ID}}\"  \n});\n```\n\n\n<span id=\"b6025414\"></span>\n### 1.1.2 账户登出\n\n在账户登出时调用。\n\n```javascript\nwindow.collectEvent('config', {\n    user_unique_id: null \n});\n```\n\n\n<span id=\"e717d81e\"></span>\n## 1.2 设置用户属性\n\n<span id=\"04f4a6fb\"></span>\n### 1.2.1 profileSet\n\n设置用户属性，存在则覆盖，不存在则创建。\n\n```javascript\n// 示例：设置用户属性，属性名为key，属性值为value\nwindow.collectEvent('profileSet', {\n    key: 'value' // 值支持字符串，数字，数组\n})\n```\n\n\n<span id=\"4d9f2074\"></span>\n### 1.2.2 profileSetOnce\n\n设置用户属性，存在则不设置，不存在则创建，适合首次相关的用户属性，比如首次访问时间等。\n\n```javascript\n// 示例：设置用户属性，属性名为key_once，属性值为value_once\nwindow.collectEvent('profileSetOnce', {\n    key_once: 'value_once' // 值支持字符串，数字，数组\n})\n```\n\n\n<span id=\"b70e1254\"></span>\n### 1.2.3 profileIncrement\n\n设置数值类型的属性，可进行累加。\n\n```javascript\n// 示例：设置用户属性，属性名为key，属性值为1\nwindow.collectEvent('profileIncrement', {\n    key: 1\n})\n```\n\n\n<span id=\"9c91a9ef\"></span>\n### 1.2.4 profileAppend\n\n设置List类型的用户属性，可持续向List内添加。\n\n```javascript\n// 示例：设置用户属性，属性名为key，原本已有属性值，现添加属性值为value_append\nwindow.collectEvent('profileAppend', {\n    key: 'value_append'\n})\n```\n\n\n<span id=\"b98f8b8d\"></span>\n### 1.2.5 profileUnset\n\n删除用户的属性。\n\n```javascript\n// 示例：删除用户属性，属性名为key\nwindow.collectEvent('profileUnset', 'key')\n```\n\n\n<span id=\"870a4361\"></span>\n## 1.3 匿名ID\n\n匿名用户ID，用于代替webid的功能。开启匿名用户ID的设置后，不再请求和上报webid，统一由匿名ID代替。\n\n<span id=\"3c8fceb4\"></span>\n### 1.3.1 开启匿名ID\n\n```javascript\n// 示例\nwindow.collectEvent('init', {\n   enable_anonymousid: true\n})\n```\n\n\n<span id=\"a64e7f2f\"></span>\n### 1.3.2 设置匿名ID\n\n```JavaScript\n// 示例\nwindow.collectEvent('setAnonymousId', 'xxxx')\n```\n\n\n<span id=\"be1ae5b2\"></span>\n# 2. 获取实验参数\n\n「A/B 测试」通常在SDK 初始化后会向分流服务发送一个分流请求（'/service/2/abtest_config/'），在获取到分流服务的结果后，客户端开发可以根据分流的结果参数完成代码分支。\n\n\n* 请注意此步骤的前置条件：已经根据实验的需求方创建好了实验及相关的参数，请参照：[创建实验](https://www.volcengine.com/docs/6287/65809#_4-1-%E5%88%9B%E5%BB%BA%E5%AE%9E%E9%AA%8C)\n\n\n```javascript\nwindow.collectEvent('getVar', 'ab-key', 'ab-default-value', (value) => { \n//ab-key 为实验参数的 key ，用户开发做代码分支，ab-default-value 为异常时的兜底方案，建议和对照组 value 一致\n    // 以下为业务代码\n    window.collectEvent('发送业务指标事件')\n})\n```\n\n\ngetVar是一个异步方法，getVar的回调只有在ab实验结果返回之后才会执行，所以如果想要业务自定义的事件指标也能带上ab_sdk_version，那么需要在getVar的回调中调用业务自定义事件。完整代码如下：\n\n```javascript\nwindow.collectEvent('getVar', 'abcdefg', 'default', (res)=> {\n   window.collectEvent('自定义事件')\n   // 这样，你的自定义事件上报时就会有对应的ab_sdk_version\n})\n```\n\n\n注意：在web端和小程序中，「A/B 测试」在调用getVar成功后，会自动上报一个曝光事件（**abtest_exposure**），如果业务并没有自定义的指标事件作为统计，可以使用**abtest_exposure**作为内部处理进组用户的相关统计。\n\n<span id=\"cb63ea05\"></span>\n# 3. 上报实验指标（行为事件）\n\n「A/B 测试」 中的实验指标计算依赖Finder中的事件日志，示例代码如下：\n\n\n* 也可参见Finder SDK 集成文档 “上报埋点日志” 部分：\n\n\n<span id=\"8c7c306a\"></span>\n## 3.1 上报事件\n\n用户行为日志采用事件event+属性params的形式，事件一般对应多个属性，也可以仅有事件没有属性。代码埋点方案一般由数据分析师或产品运营设计。\n\n仅上报事件的代码埋点，示例如下：\n\n```javascript\n// 示例：上报事件event，该事件不包含属性\n// 置于业务逻辑对应位置\nwindow.collectEvent('event');\n```\n\n\n上报事件和对应属性的代码埋点，示例如下：\n\n```javascript\n// 示例：上报事件event，该事件包含两个属性\n//      一个string类型的属性，属性名为key_string，属性值为value_string\n//.     一个int类型的属性，属性名为key_int，属性值为10\n// 置于业务逻辑对应位置\nwindow.collectEvent('event', {\n   key_string: 'value_string',\n   key_int: 10\n});\n```\n\n\n<span id=\"96e2997b\"></span>\n## 3.2 事件公共属性\n\n如需在每个事件中都包括某属性，可通过公共属性设置，无需在每个事件中重复设置。公共属性只需设置一次，即可包括在所有代码埋点事件、预置事件和全埋点事件中。\n\n<span id=\"b0afdc59\"></span>\n### 3.2.1 设置公共属性\n\n```javascript\n// 示例：设置自定义的公共属性，属性名为key_public，属性值为value_public\nwindow.collectEvent('config', {\n   key_public: 'value_public'\n});\n```\n\n\n<span id=\"8ac290f0\"></span>\n## 3.3 页面跳转前上报埋点\n\n请注意，在埋点设计时，不建议在发送事件后紧接着进行页面跳转。这种情况下，上报请求可能会失败，统计数据可能缺失。请考虑以下两种方式之一：\n\n1）使用`beconEvent`。\n\n`beconEvent`会将埋点通过浏览器的特性`sendbeacon`来发送，尽可能补偿数据上报。\n\n```TypeScript\nwindow.collectEvent('beconEvent', 'event', {})\nwindow.location.href = 'https://xxx.com';\n```\n\n\n2）添加延时，给`ajax`一些时间。\n\n```TypeScript\nwindow.collectEvent('event');\nsetTimeout(()=>{\n    window.location.href = 'https://xxx.com'\n}, 150)\n```\n\n\n<span id=\"449d9a18\"></span>\n# 4. API说明\n\n<span id=\"ba36a13f\"></span>\n## 4.1 config(paramsObj)\n\nconfig 命令用于设置上报自定义字段和一些配置项。\n\n\n* 需在 init 之后调用\n\n* 可多次调用，新的配置会和旧的配置合并，同名的设置会被覆盖（等同 Object.assign）\n\n* 参数为一个对象\n\n   * 参数分类：\n\n      * SDK自身配置项及调试相关字段\n\n      * 用户标识相关字段\n\n      * 用户属性（公共属性），\n\n         * 预设\n\n         * 自定义\n\n      * 事件共有的事件属性\n\n\n```plain\n// 1. 第1次调用，此时发送的事件都包含 cn ， Monday\n\nwindow.collectEvent('config', {\n    language: 'cn',\n    weeks: 'Monday',\n})\n// 2.  第2次调用，此时发送的事件都包含 en ， Monday\n\nwindow.collectEvent('config', {\n    language: 'en',\n})\n```\n\n\nconfig中包含预设字段，例如用户标识、用户属性、公共属性、系统占用等。以下字段为被SDK占用的字段，每个字段有特定的含义，可设置字段的优先级高于SDK默认的赋值。\n\n\n|类型 |字段 |值类型 |字段说明 |实例 |\n|---|---|---|---|---|\n| | | | | |\n|用户标识 |user_unique_id |string |用户唯一标识。 没有设置 user_unique_id 时，则设置为 web_id。 |业务方自行设置 \\* 设置为以下值时，会被忽略。 【'null', 'undefined', '0', '', 'None'】 |\n|公共属性 |device_model |string |设备机型 |3.3.4开始，针对移动端做简单的ua解析。如：（iphone/ipad/mi1 metal/SM\\-A8000/等） |\n|公共属性 |os_name |string |操作系统 |sdk 默认上报：windows/mac/android/ios |\n|公共属性 |os_version |string |操作系统版本 |sdk 默认上报 |\n|公共属性 |platform |string |平台类型 |默认上报 wap/web |\n|公共属性 |browser |string |浏览器名 |默认上报 |\n|公共属性 |browser_version |string |浏览器版本 |默认上报 |\n|公共属性 |language |string |浏览器语言 |默认上报 |\n|公共属性 |referrer |string |前向地址 |默认上报 |\n|公共属性 |referrer_host |string |前向域名 |默认上报 |\n|公共属性 |resolution |string |分辨率 |默认上报 |\n|公共属性 |screen_height |number |屏幕高度 |默认上报 |\n|公共属性 |screen_width |number |屏幕宽度 |默认上报 |\n|公共属性 |sdk_version |string |ByteFinder\\-sdk版本 |默认上报 |\n|公共属性 |timezone |int |时区 |默认上报 |\n|公共属性 |region |string |地域 |业务方自行设置 |\n|公共属性 |traffic_type |string |流量类型 | |\n|公共属性 |utm_source |string |推广来源 |SDK默认采集 |\n|公共属性 |utm_campaign |string |推广活动 |SDK默认采集 |\n|公共属性 |utm_medium |string |推广媒介 |SDK默认采集 |\n|公共属性 |utm_content |string |推广内容 |SDK默认采集 |\n|公共属性 |utm_term |string |推广关键词 |SDK默认采集 |\n|系统占用 |custom | | | |\n\n\n<span id=\"6b96e52f\"></span>\n## 4.2 页面浏览事件\n\n<span id=\"d262aee6\"></span>\n### 4.2.1 SDK 默认调用\n\npredefine_pageview事件默认调用，如需关闭，请参考3.4节。\n\n<span id=\"a58e3cef\"></span>\n### 4.2.2 业务手动调用\n\n调用该方法以主动上报一次 pv 事件，参数类型同普通事件的事件属性。\n\n如果传入了自定义的事件属性，会和预设的事件属性进行合并；如果有同名属性，则会覆盖掉预设属性。\n\n```plain\nwindow.collectEvent(\"predefinePageView\")\nwindow.collectEvent(\"predefinePageView\", {/**...*/})\n// 覆盖默认的属性\n\nwindow.collectEvent(\"predefinePageView\", {\n    url: 'xxx',\n    url_path: 'xxx'\n    // ...\n})\n```\n\n\n<span id=\"bdc511c3\"></span>\n### 4.2.3 事件预置属性\n\n\n|字段 |类型 |必传 |说明 |取值示例 |\n|---|---|---|---|---|\n|url |string |否 |当前页面地址 | |\n|url_path |string |否 |当前页面路径，不含协议和主机头部分 |/tea/app/10000/behaviorDetail |\n|title |string |否 |页面标题 |首页 |\n|time |number |是 |时间戳 | |\n|referrer |string |否 |页面来源，document.referrer的值 | |\n\n\n<span id=\"790c11d7\"></span>\n### 4.2.4 对SPA的支持\n\n因为默认情况下，SDK只会在页面加载后，并初始化完成后上报一次 pv 事件，但SPA页面会存在多个页面路由，SDK只会在主页面加载一次，所以在切换页面的时候不会再发起pv，造成后续的页面没有pv数据。因此可以开启SPA参数，SDK会在路由变化时重新上报PV：\n\n```plain\nwindow.collectEvent(\"init\", {\n    spa: true\n})\n```\n\n\n当然，可能会存在SDK监听到路由变化时，一些页面参数并不是最新的，您也可以手动在路由变化时去上报PV。以react示例：\n\n```plain\n// <Router history={history} onUpdate={onUpdate}>\n\nfunction onUpdate() {\n    window.collectEvent(\"predefinePageView\")\n}\n```\n\n\n<span id=\"dcaf3422\"></span>\n## 4.3 获取平台生成的各种ID\n\n获取SDK的token信息，里面包含web_id、ssid、user_unique_id信息。 如果您需要获取SDK的ID信息，进行其他设置的话，可以如下：\n\n```plain\nwindow.collectEvent('getToken', (token) => {\n    //token数据内容类似如下：\n    {\n        \"web_id\":\"6748002161499735560\",\n        \"ssid\":\"579bc89a-bd45-4021-8314-669c35f38e3d\",\n        \"user_unique_id\":\"xxx\",\n    }\n    window.collectEvent('test', {\n      id: web_id/ssid\n    })\n});\n```\n\n\n<span id=\"db37913f\"></span>\n## 4.4 开启实验及实验相关方法\n\n<span id=\"bed8d66a\"></span>\n### 开启模块\n\n使用此模块，在SDK初始化时，在init接口中除了通用参数需要配置外，还需打开A/B实验的模块开关：`enable_ab_test: true`，同时配置A/B实验的分流地址（ab_channel_domain字段）。\n\n```TypeScript\nwindow.collectEvent('init', {\n    enable_ab_test: true,\n    ab_channel_domain: 'https://tab.volces.com',\n    enable_multilink: false,// 是否开启多链接实验，默认false\n    enable_ab_visual: false, //是否开启可视化实验，默认false\n    ab_timeout: 10000// 分流请求的超时时间，默认10000ms\n    disable_ab_reset: false // 是否禁止切换用户时重新获取A/B实验的配置信息，默认false\n    ...\n});\n```\n\n\n<span id=\"098c187a\"></span>\n### getVar：获取实验参数\n\n\n* 方法：getVar\n\n* **作用：** 获取AB实验配置中的实验对应的配置项值，同时SDK会收集对应的vid（业务一般不用直接关心该vid），命中实验后，会自动上报一个`abtest_exposure`事件。\n\n* **参数：** \n\n   \n   |参数名 |类型 |必填 |说明 |\n   |---|---|---|---|\n   |name |string |是 |实验配置中的key。<br><br><div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div><br><br><br><div data-tips=\"true\" data-tips-type=\"tip\">提示：业务调用getVar方法，SDK发现实验配置中有对应的key时，会上报一个预置事件<code>abtest_exposure</code>。</div><br> |\n   |defaultValue |any |是 |兜底值，当实验配置中没有相应的key的配置项，该方法会返回这个兜底值。 |\n   |callback |(value: any) =\\> void |否 |当获取到实验配置项值时，如果有设置callback就会执行该callback，并把实验配置项值作为callback的参数。 |\n   \n\n* **示例：** \n\n   ```TypeScript\n\n   ```Plain Text\n   window.collectEvent('getVar',' color', 'red', (value) => {\n       // 当配置中存在color实验，value值为配置中的color对应的值，否则值为red\n   });\n   ```\n   ```\n   \n\n\n<span id=\"b03385f0\"></span>\n### getAllVars：获取实验所有配置信息\n\n\n* 方法：getAbSdkVersion\n\n* **作用：** 获取已曝光的实验，返回的结果是所有曝光实验的vid，使用逗号连接起来，格式例如：123,234,678\n\n* **返回值：** \n\n   \n   |类型 |说明 |\n   |---|---|\n   |string |所有曝光实验的vid，使用逗号连接起来，格式例如：123,234,678 |\n   \n\n* **示例：** \n\n   ```TypeScript\n   // vids值类似 123,234,678\n   const vids = window.collectEvent('getAbSdkVersion');\n   ```\n   \n\n\n<span id=\"77c5c476\"></span>\n### getAbSdkVersion：获取实验版本ID\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">开展AB实验必须调用获取实验参数的api（详情请参见 <strong><ins>获取实验参数</ins></strong> 章节）。如需获取用户所有曝光或命中实验的版本ID（vid）时，可使用此API，此API不会上报abtest_exposure曝光事件。</div>\n\n\n```JSON\nwindow.collectEvent('getAbSdkVersion', function(vids) {\n    // vids\n});\n```\n\n\n<span id=\"c09d8338\"></span>\n### setExternalAbVersion：手动设置额外的AB实验配置\n\n\n* 方法：setExternalAbVersion\n\n* **作用：** 手动设置额外的AB实验配置。\n\n* **参数：** \n\n   \n   |参数名 |类型 |必填 |说明 |\n   |---|---|---|---|\n   |vids |string 或 null |是 |vids的格式要求：使用逗号将vids值连接起来，大概这样'123,234,678'。<br><br><br>* 通过此方式设置的额外的实验配置vids，会合并到通过getVar处理获得到的vids中。<br><br>* 多次调用时，最后一次设置的额外的实验配置vids会覆盖之前的。<br><br>* 当设置null时，SDK会清空设置的额外的实验配置vids，并且不会影响通过getVar处理获得到的vids。 |\n   \n\n* **示例：** \n\n   * 设置额外的实验配置\n\n      ```TypeScript\n      // 手动设置额外的\n      window.collectEvent('setExternalAbVersion', '25,225,2225');\n      ```\n      \n\n\n<span id=\"44a2faaf\"></span>\n## 4.5 自定义webid\n\n如需更改SDK默认的webid，请在SDK初始化的时候设置`enableCustomWebid: true`，然后通过setWebIDviaUnionID或者setWebIDviaOpenID设置，示例如下：\n\n```javascript\nwindow.collectEvent('init', {\n    enableCustomWebid: true\n});\nwindow.collectEvent('setWebIDviaUnionID', 'ssss')\nwindow.collectEvent('setWebIDviaOpenID', 'ssss')\n```\n\n\n需要注意的是，当设置了enableCustomWebid，必须调用setWebIDviaUnionID或者setWebIDviaOpenID其中的一个设置了webid后，SDK才会继续执行后续的流程。\n\n这种场景适合H5页面在微信小程序中打开，需要传递微信的unionID或者openID给H5页面。\n\n<span id=\"b065608d\"></span>\n## 4.6 打开遮罩层\n\n在页面上打开一个全局的遮罩层（相当于白屏），当你需要用AB实验修改页面的UI时，防止用户看到明显的UI变化，可以进行使用。注，当你手动打开遮罩层后，一定记得手动关闭。\n\n开启遮罩层\n\n```bash\nwindow.collectEvent('openOverlayer')\n```\n\n\n关闭遮罩层\n\n```bash\nwindow.collectEvent('closeOverlayer')\n```";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>
<script src="../marked.min.js"></script>
<link rel="stylesheet" href="../app.css?v=5809a63d">
</head>
<body>
<script type="application/json" id="kbdata"></script>
<div class="loading" id="loading"><div class="spin"></div><div class="ld-t">正在加载知识库</div><div class="ld-s">首次加载稍候片刻</div></div>

<div class="app" id="app" style="display:none">
  <div class="mtoggle" id="mtoggle">☰</div>
  <div class="mmask" id="mmask"></div>
  <aside id="aside">
    <div class="brand">
      <h1><span class="logo">AB</span>A/B 实验知识库</h1>
      <p>营销增长中心 · 数据驱动决策手册</p>
    </div>
    <div class="cats" id="cats"></div>
    <div class="write-btn" id="writeBtn">✍ 写新文章</div>
    <a class="admin-link" id="adminLink" href="admin.html">⚙ 管理后台</a>
    <div class="side-foot" id="sideFoot"></div>
  </aside>

  <main>
    <div class="top">
      <div class="searchbox">
        <span class="si">🔍</span>
        <input id="q" placeholder="搜索实验设计"
          data-ph-prefix="搜索"
          data-ph-kw="实验设计,报告解读,广告投放,假设检验,指标体系,AB通识"
          autocomplete="off">
        <span class="clr" id="clr">✕</span>
      </div>
      <div class="stat" id="stat"></div>
    </div>
    <div class="body" id="bodyView"></div>
  </main>
</div>

<!-- 写文章访问控制 -->
<div class="login-mask" id="loginMask">
  <div class="login-box">
    <div class="login-ic">🔒</div>
    <h3>需要授权</h3>
    <p>此操作仅限授权用户</p>
    <input id="loginPin" type="password" inputmode="numeric" placeholder="访问码" autocomplete="off">
    <button class="ed-btn" id="loginBtn">进入编辑</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-tip">登录后 2 小时内免再次验证</div>
  </div>
</div>

<!-- 写文章编辑器 -->
<div class="editor-mask" id="editorMask"></div>
<div class="editor" id="editor">
  <div class="ed-head">
    <b>✍ 写新文章</b>
    <span class="ed-close" id="edClose">✕</span>
  </div>
  <div class="ed-body">
    <div class="ed-form">
      <label>标题</label>
      <input id="edTitle" placeholder="例如：双十一大促实验复盘">
      <label>分类</label>
      <select id="edCat"></select>
      <label>检索关键词（选填，空格分隔）</label>
      <input id="edKw" placeholder="复盘 大促 转化率">
      <label>正文（Markdown）</label>
      <textarea id="edMd" placeholder="# 标题&#10;&#10;正文用 Markdown 书写，支持 **加粗**、列表、表格、代码块…&#10;&#10;## 小节&#10;- 要点一&#10;- 要点二"></textarea>
      <div class="ed-actions">
        <button class="ed-btn" id="edSubmit" style="display:none">✓ 发布文章</button>
      </div>
      <div class="ed-msg" id="edMsg"></div>
      <div class="ed-hint" id="edHint"></div>
    </div>
    <div class="ed-preview" id="edPrev">
      <div class="ed-prev-tag" id="edPrevTag"></div>
      <h1 id="edPrevTitle" style="margin:8px 0 16px"></h1>
      <div class="md" id="edPrevBody"></div>
    </div>
  </div>
</div>

<script src="../app.js?v=3de2203d"></script>
</body>
</html>

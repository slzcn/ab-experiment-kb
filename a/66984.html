<script>window.DATA_BASE="../";window.INIT_DOC=66984;window.INIT_MD="<span id=\"如何找到应用列表？\"></span>\n# 查看应用列表\n\n<span id=\"9e5fe1c0\"></span>\n## SaaS\\-云原生\n\n进入产品后点击左下角项目管理按钮，即可进入项目列表，点击项目后的详情按钮，即可查看对应的appid等项目应用信息。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/6f7826e1a58b4454823c25d9f92c2b0c~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"a986da28\"></span>\n## SaaS\\-非云原生\n\n进入产品后点击左下角设置按钮，即可进入应用列表，如下图：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_59643e217c845cbad80ba6237864bfeb.png) </span>\n\n应用列表中页面，会为您展示您在该集团下所拥有的权限的应用信息，如下图：\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/bb0dac170eff4f80baafd53cc3ef3286~tplv-em5hxbkur4-noop.image) </span>\n\n\n* 集团管理员，默认能看到该集团下所有接入的应用信息；\n\n* 在应用列表中，您也可以选择”新增接入“进行新应用的添加及接入。\n\n\n<span id=\"e596421c\"></span>\n# 多应用说明\n\nDataTester的**SaaS\\-云原生环境**当前支持多应用能力，即支持在一个项目中绑定多个应用。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/a46aa1a2365e4320840ff7d31eb50445~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"dd4050cf\"></span>\n## 绑定多个应用\n\n\n1. 您在创建项目，或编辑已创建项目时，可在项目的应用信息处绑定多个应用。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/6f89dc6134524448ae9a173de62db012~tplv-goo7wpa0wc-image.image) </span>\n\n2. 在弹出的应用配置窗口中，配置应用名称、主体信息等，即可万能充应用绑定。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/0dad85e64dd54270b0e4d52805081c47~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"78d98c95\"></span>\n## 多应用使用：切换应用\n\n为项目绑定多应用后，后续在进行A/B实验时，您可以根据需要切换实验生效在哪个应用上。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/a0a4c36dfdbb436689625a6f28d50a5c~tplv-goo7wpa0wc-image.image) </span>\n\n您可以在左上角切换，选择使用某个集团下、某个项目中的具体某个应用。\n\n<span id=\"d4711ebf\"></span>\n## 多应用使用：应用授权\n\n\n* 方式一：选择应用，进入全局设置\\>系统管理\\>权限管理，在角色管理页签中，编辑已有角色，为角色添加新成员，完成将应用授权给对应用户。完成授权后，用户即拥有角色的权限。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/c1253d48da4f4f8887fb38b1edd7421b~tplv-goo7wpa0wc-image.image) </span>\n\n* 方式二：选择应用，进入全局设置\\>系统管理\\>权限管理，在用户管理页签中，单击邀请用户按钮，直接选择邀请的用户并选择给用户赋予的角色，完成授权后，用户即拥有角色的权限。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/56473566e5ad467e8cc3f0fb6bbeb26e~tplv-goo7wpa0wc-image.image) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

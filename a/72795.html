<script>window.DATA_BASE="../";window.INIT_DOC=72795;window.INIT_MD="我们在游戏运营中，都会去倾听玩家的声音并采取反馈动作。\n\n但有时候，在前方等我们的可能也会是个坑。\n\n我们通过一个内部射击类游戏的案例，来探讨如何倾听玩家的声音。\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/tos-cn-v-697126/66e7045ddba847bbbc84adf67babf9e8.png) </span>\n\n<span id=\"到底怎么倾听玩家的声音\"></span>\n## 到底怎么倾听玩家的声音[#](https://www.volcengine.com/docs/6281/69696#%E5%88%B0%E5%BA%95%E6%80%8E%E4%B9%88%E5%80%BE%E5%90%AC%E7%8E%A9%E5%AE%B6%E7%9A%84%E5%A3%B0%E9%9F%B3)\n\n在游戏运营过程中，我们做了很多的玩家调研，深入了解玩家对于游戏的想法和希望解决的问题。\n\n在调研中发现，玩家集中反馈希望在游戏里面能够获取更多的游戏金币，群、商店、邮件等多个渠道都有这样的反馈。\n\n这款游戏变现的方式是激励视频广告。\n\n所以我们的改进思路是「一举两得」，希望在整个广告激励过程中能够给予玩家更多的金币，从而吸引他们观看激励视频的广告。\n\n方案选在了一个转盘抽奖的广告位。转盘有四个区域，其中有一个区域是英雄，如果在抽奖过程中没有抽到满意的奖项，可以观看广告再次抽奖。\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/tos-cn-v-697126/9281c36fef014794935ea2cede287bff.png) </span>\n\n基于收集的玩家反馈，我们觉得玩家更希望得到金币，调整了转盘的奖励方案，把原来英雄的奖项拿掉了，给了一个更高金币的奖项。\n\n当时我们的想法：玩家想要更多的金币那就提供更多的金币。\n\n我们结合真实的玩家反馈，我们做了针对性的调整，是不是就能得到更好的增长了呢？\n\n<span id=\"知道真相的我眼泪掉下来\"></span>\n## 知道真相的我眼泪掉下来[#](https://www.volcengine.com/docs/6281/69696#%E7%9F%A5%E9%81%93%E7%9C%9F%E7%9B%B8%E7%9A%84%E6%88%91%E7%9C%BC%E6%B3%AA%E6%8E%89%E4%B8%8B%E6%9D%A5)\n\n然而实际结果没有想象得那么理想。\n\n在新方案上线了三天之后，我们发现整个转盘广告点位点击次数下降了60%，广告点击渗透率下降了32%，次留与3留也分别下降了3%与7%，这里面就出现了问题。\n\n回顾来看，首先我们得到的信息反馈是玩家表示需要更多的金币，但我们忽略了玩家拿到这些金币干什么，他们其实也是想兑换更多的英雄。\n\n英雄代表了这款游戏的核心符号和核心价值，英雄给予玩家的冲击力和激励的价值会比金币更高。\n\n在这个故事里，不仅仅要聆听玩家表面告诉我们的信息，更要深层次地挖掘玩家的行为到底传递给了我们哪些真实的信号。\n\n并且，我们需要满足玩家真正的深层次的需求。\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/tos-cn-v-697126/869697dd9af84deb95170afa0f3eaf37.png) </span>\n\n虽然刚才讲到方案上线三天之后，基本上广告的观看降了60%，渗透率降了30%多，实际上当时我们还好做了一个A/B实验。\n\n我们通过A/B实验的方式得到了一个负向的效果，所以我们没有全量推到线上，因而规避了将近60%的广告收入的损失。\n\n<span id=\"总结\"></span>\n## 总结[#](https://www.volcengine.com/docs/6281/69696#%E6%80%BB%E7%BB%93)\n\n我们在设计新方案、上线新方案之前，我们需要把方案进行验证，以小流量的方式进行验证。\n\n在得到了科学结果之后，再决定这个方案是不是要发布给全量玩家，或者及时下线规避风险。\n\n因此，在收集玩家反馈时，一方面要倾听真正的声音，另一方面要借助A/B实验规避一些主观猜测或者主观设计的风险，从而实现精准的增长。";</script>

<script>window.DATA_BASE="../";window.INIT_DOC=159260;window.INIT_MD="<span id=\"_1-检查项验证\"></span>\n# 1. 检查项验证\n\n（1）SDK文件是否引入，初始化集成代码是否增加\n\n（2）appid是否是要上报应用的appid\n\n（3）数据上报地址是否正确\n\nsaas\\-国内：看channel是否为cn\n\nsaas\\-海外：看channel是否为sg\n\n私有部署：init方法中看channel_domain参数是否添加，如果有添加，确定channel_domain配置的是否为数据上报地址，配置的数据上传地址本机是否可以访问的通（channel_domain: 'https://xxxx.com'）。\n\n（4）是否开启AB开关：enable_ab_test: true\n\n（5）如果是私有部署，确定init方法，是否配置ab_channel_domain，如果配置了，确定ab_channel_domain是否为数据上报地址（ab_channel_domain: 'https://xxx.com'）\n\n（6）如果是可视化实验，是否开启可视化开关：enable_ab_visual: true\n\n（7）如果是多链接实验，是否开启多链接实验开关及设置遮罩层：enable_multilink: true,multilink_timeout_ms:1000；\n\n（8）是否增加获取实验参数的方法getvar，调用此方法才会上报AB曝光事件。\n\n<span id=\"_2-实验调试\"></span>\n# 2. 实验调试\n\n<span id=\"_2-1-为什么要调试实验\"></span>\n## 2.1 为什么要调试实验\n\n实验上线前需要保证前面的集成过程无误，上线后才能保证实验结果的科学和有效！\n\n<span id=\"_2-2-开启调试状态\"></span>\n## 2.2 开启调试状态\n\n参照[创建实验](https://www.volcengine.com/docs/6287/65809)，使实验处于“调试中” 状态，如下图所示：\n\n\n* 实验状态一共分三种：调试中、运行中、已结束。\n\n&nbsp;\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_3e258121d02e525f21f5b16d47fe095f.png) </span>\n\n<span id=\"_2-3-开始调试验证\"></span>\n## 2.3 开始调试验证\n\n（1）【SDK初始化验证】打开开发者工具，在控制台可以看到“sdk is ready ”证明sdk初始化成功。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_e2157d287cdf491b3e14f53046260e07.png) </span>\n\n（2）【ssid获取】在浏览器中获取调试设备的统计口径（ssid） 在 Web/H5/Wap 端 SDK 打开A/B Test 和日志开关，并完成初始化：\n\n\n* 在代码中调用getToken来获取ssid!\n\n\n```javascript\nwindow.collectEvent('getToken', (res)=> {\n   console.log(res)\n})\njavascript\n```\n\n\n\n* 在开发者工具中查询到ssid（chrome 举例）\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_c10c1a266404a991a5b44f1b35fc3d10.png) </span>\n\n（3）获取到ssid后，将ssid添加到白名单的任意版本做测试，并在右下角点击\"保存\"按钮。如下：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_0b4ab34001c845e26792d5c86f52f434.png) </span>\n\n白名单功能说明（详情请参考此文档：https://www.volcengine.com/docs/6287/65824）\n\n【1】白名单功能主要是用于测试调试实验/feature，添加白名单的用户会被强制命中实验，方便在测试的过程中可以测试实验版本和对照版本的效果。\n\n【2】白名单需要添加分流id，客户端实验分流id是ssid，服务端实验分流id使用的decisionid（也就是代码的第一个id），一般我们建议使用uuid，所以我们也会看到有些白名单是uuid。\n\n（4）ab分流接口验证\n\n选择网络找到abtest_config接口查看data里返回的是不是白名单里添加的实验版本信息，举例：测试中把ssid添加到实验版本，那么abtest_config应该返回的是实验版本的vid和value，如果看到获取到对应的实验版本信息，那么证明分流成功。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_52dba9fd5a201b35cb7f690dbd2e3df5.png) </span>\n\n（5）【曝光事件验证】对于AB系统不管什么sdk，只要命中实验sdk侧都会上报一个预置事件（abtest_exposure）来记录这个用户的进组信息，因此我们可以在控制台\\-网络中查看list接口有没有abtest_exposure事件触发，如果有触发看下曝光事件的ab_sdk_version是不是加白名单的实验vid。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_c1331dc52af449d81edf817025f1bae6.png) </span>\n\n如果这五个步骤验证成功，那么就证明我们实验调试成功了。\n\n<span id=\"_3-数据验证\"></span>\n# 3. 数据验证\n\n<span id=\"_3-1-控制台验证\"></span>\n## 3.1 控制台验证\n\n选择网络，当做了代码埋点，那么每点击一次就会上报一次list接口，查看list接口，接口是否为200，并且在载荷中看自定义的事件、属性上报及事件的ab_sdk_version。如果接口为200，并且可以看到自定义的事件及自定义属性证明事件上报成功。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_4cd9e5e0b0ecaccb6fe602f2569699c4.png) </span>\n\n<span id=\"_3-2-系统验证\"></span>\n## 3.2 系统验证\n\n在指标管理\\-数据管理验证，上报的自定义事件和自定义属性在事件列表、事件属性和用户属性列表是否存在。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_7596d637e327ced978fe12d371b8a702.png) </span>\n\n在全局设置\\-受众管理\\-用户细查，查看上报用户的详细行为，当在用户细查验证数据都OK，整个集成及上报就验证完成。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_69f6bd071f67db4ca28967c01b0ca085.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_680162c3fd7948c57dcdabe689ef52fd.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_dcf8e19c17b9c0660c72257def4c752a.png) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

<script>window.DATA_BASE="../";window.INIT_DOC=65818;window.INIT_MD="创建指标组时，支持创建的指标组类型包含事件指标、留存指标、漏斗指标，同类型的指标可创建并分组到同一个指标组中，便于后续创建实验时选择使用。本文为您介绍创建事件指标的详细操作步骤。\n\n<span id=\"922df39f\"></span>\n# 使用限制\n\n当前一个事件指标组最多支持添加100个事件指标。\n\n<span id=\"一、新建事件指标\"></span>\n# 操作步骤\n\n\n1. 登录DataTester产品控制台后，单击左侧导航栏的**指标管理**\\>**指标组列表**，进入指标组列表页面后单击右上角的「创建指标组」进入指标组创建页面。\n\n2. 配置基本信息。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b641c26b0df24d18b31a3fda596418c8~tplv-goo7wpa0wc-image.image) </span>\n\n   * 选择**指标组类型**为**事件指标**，并选择指标所属的分组。\n\n   * 如果您希望新建一个指标分组，可以在分组下拉框的右下角单击**新建指标组**，根据界面提示，先创建一个指标分组。\n\n3. 配置指标。为当前指标组添加指标。\n\n   您可单击**添加指标**按钮，添加多个指标，每个指标的配置方式一致，以下为您介绍添加的指标的配置说明。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/e1b232fd58724377b9e9d814eb43d565~tplv-goo7wpa0wc-image.image) </span>\n\n   \n   |参数 |配置说明 |\n   |---|---|\n   |**指标名称** & **指标描述** |* **指标名称**：必填，建议取与事件内容相关的名称，如“点击登录按钮人均次数”，便于快速知道是关于哪个事件的指标；名称指标组内唯一，最长不超过50个字符。<br><br>* **指标描述**：选填，简述指标代表的含义、计算逻辑、用途等，可以让业务相关人员更加合理的使用指标。 |\n   |**指标类型** |对于事件指标，从指标计算逻辑上，又可分为两种类型：<br><br><br>* **单一指标**：指针对某一个事件建立的指标。<br><br>* **组合指标**：指针对多个事件建立的组合指标，如A/B类型的组合指标CTR、CVR、PV/SUM等，可支持置信度计算。置信度介绍详情请参见[事件指标置信度](https://www.volcengine.com/docs/6287/65818#%E4%B8%89%E3%80%81%E4%BA%8B%E4%BB%B6%E6%8C%87%E6%A0%87%E7%BD%AE%E4%BF%A1%E5%BA%A6)。<br><br>   选择**组合指标**时，需添加多个事件并配置事件的计算逻辑，作为组合指标的指标结果。 |\n   |**计算口径** |由「事件」和「事件的计算方式」组成。<br><br><br>* 选择指标事件：可以选择一般事件、虚拟事件、圈选事件，如下：<br><br>   * **一般事件**：指的是通过埋点上报的事件，和您在代码中添加的事件上报名称相同。<br><br>   * **虚拟事件**：指的是对多个原始事件（如一般事件、圈选事件）通过「或」的关系进行组合，组合后的事件称为“虚拟事件”。用户点击虚拟事件里面的任意一个原始事件，则表明符合条件，会被触发。<br><br>   * **圈选事件**：指的是选定某个元素创建事件。<br><br>* 配置事件的计算方式：常见的指标计算方式可查看[事件指标的计算方式 （算子）](https://www.volcengine.com/docs/6287/65818#%E4%BA%8C%E3%80%81%E4%BA%8B%E4%BB%B6%E6%8C%87%E6%A0%87%E7%9A%84%E8%AE%A1%E7%AE%97%E6%96%B9%E5%BC%8F-%EF%BC%88%E7%AE%97%E5%AD%90%EF%BC%89)。<br><br>* 添加过滤条件：<br><br>   * 支持把事件属性、公共属性作为事件的过滤条件。<br><br>   * 支持指标属性聚合函数过滤能力，即当用户选择的事件定义口径包括「UV」、「PV/UV」、「PV/AU」、「UV/AU」、「SUM/UV」，事件属性为数值型的时候，可以按照「人」、「事件属性」、「公共属性」（包含「自定义属性」）这些聚合维度进行聚合，默认值是「人」。<br><br>* 高级设置：配置灵活属性。详情请参见[高级功能：指标灵活属性](https://www.volcengine.com/docs/6287/1253449)。 |\n   |**指标关系** |组合指标需要填写，指组合指标的计算公式，允许事件编号大写字母、支持一层括号()、加号+、减号\\-、乘号\\*、除号/计算公式可任意组合。 |\n   |**数字格式** |可选择数字/百分比格式，并设置小数位数 |\n   |**必看指标** |开启“设为必看指标”，则每个实验都会自动添加该指标。 |\n   \n\n4. 以上信息填写/设置完毕，一个指标就添加好了，您可以单击\\*\\*「添加指标」\\*\\* 按钮在当前指标组一次性创建多个指标。\n\n5. 完成指标添加后，单击右上角的「保存」，完成指标组创建。\n\n\n<span id=\"二、事件指标的计算方式-（算子）\"></span>\n# 事件指标的计算方式 （算子）\n\n\n|序号 |指标计算方式 |含义 |示例（以“**支付”事件及其属性“支付金额”举例：**  ） |\n|---|---|---|---|\n|1 |进组人均次数 |触发当前事件的进组用户人均发生数量。pv/au，进组用户当前事件总发生次数/进组用户数。 |pv/au，支付活跃均次=支付事件的点击次数/进入支付实验组的样本数 |\n|2 |转化率 |触发当前事件的进组用户比例。uv/au，某事件发生的总进组用户数/进组用户数。 |uv/au，支付转化率=支付事件的点击人数/进入支付实验组的样本数（au表示进入实验组的活跃用户） |\n|3 |按…求进组人均值 |sum/au，某属性值求和/进组用户数。 |sum/au，按支付金额求实验活跃均值（选择pay_amount属性） |\n|4 |按...求每日活跃均值（失效） |sum/sum(dau)，某属性值求和/用户活跃天数。<br><br><div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div><br><br><br><div data-tips=\"true\" data-tips-type=\"warning\">当前此算子已下线。历史已包含这种算子的指标会保留，新增指标不再支持此算子。</div><br> |sum/sum(dau)，按支付金额求每日活跃均值（选择pay_amount属性） |\n|5 |每日活跃均次（失效） |pv/sum(dau)，事件发生的总次数/用户活跃天数。<br><br><div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div><br><br><br><div data-tips=\"true\" data-tips-type=\"warning\">当前此算子已下线。历史已包含这种算子的指标会保留，新增指标不再支持此算子。</div><br> |pv/sum(dau)，支付每日活跃均次=支付事件总次数/用户活跃天数 |\n|6 |人均次数 |事件的人均触发数。pv/uv，进组用户当前事件的总发生次数/进组用户上报当前事件的人数。 |pv/uv，支付人均次数=支付次数/支付人数 |\n|7 |按…求人均值 |sum/uv，某属性值求和/事件触发进组人数。 |sum/uv，按支付金额求人均值（选择pay_amount属性） |\n|8 |按…求平均值 |sum/pv，某属性值求和/事件发生次数。 |sum/pv，按支付金额求平均值（选择pay_amount属性） |\n|9 |总次数 |pv，事件发生的次数。 |pv，支付次数=支付事件触发次数 |\n|10 |总人数 |uv，事件的总触发进组人数。 |uv，支付人数=支付事件触发人数 |\n|11 |按…求和 |sum，某属性值之和（仅支持数值类型的求和，不支持string类型求和）。 |sum，按支付金额求和（选择pay_amount属性） |\n|12 |按…求去重数 |某属性值的去重数 |如事件[应用退出]按[会话id]求去重数，即发生应用退出的会话id个数（count distinct session_id) |\n\n\n<span id=\"三、事件指标置信度\"></span>\n# 事件指标置信度\n\n<span id=\"_1-哪些指标支持计算置信度？\"></span>\n### **1. 哪些指标支持计算置信度？** \n\n<span id=\"以下算子的单一指标：\"></span>\n#### **以下算子的单一指标：** \n\n\n* 进组人均次数：触发当前事件的进组用户人均发生数量。pv/au，进组用户当前事件总发生次数/进组用户数。\n\n* 转化率：触发当前事件的进组用户比例。uv/au，某事件发生的总进组用户数/进组用户数。\n\n* 按…求进组人均值：sum/au，某属性值求和/进组用户数。\n\n* 人均次数：事件的人均触发数。pv/uv，进组用户当前事件的总发生次数/进组用户上报当前事件的人数。\n\n* 按…求人均值：sum/uv，某属性值求和/事件触发进组人数。\n\n* 按…求平均值：sum/pv，某属性值求和/事件发生次数。\n\n\n<span id=\"组合指标：\"></span>\n#### **组合指标：** \n\n\n* 分子为uv类型，分母为uv类型。\n\n* 分子为pv类型，分母为pv类型。\n\n* 分子为pv类型，分母为uv类型。\n\n* 分子为pv类型，分母为sum类型。\n\n* 分子为sum类型，分母为sum类型。\n\n* 分子为sum类型，分母为uv类型。\n\n* 分子为sum类型，分母为pv类型。\n\n\n<span id=\"_2-哪些指标不支持计算置信度？\"></span>\n### **2. 哪些指标不支持计算置信度？** \n\n<span id=\"以下算子的单一指标：\"></span>\n#### 以下算子的单一指标：\n\n\n* 总次数：事件发生的次数。\n\n* 总人数：事件的总触发进组人数。\n\n* 按…求和：某属性值之和。\n\n* 按…求去重数：某属性值的去重数。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/

</script>

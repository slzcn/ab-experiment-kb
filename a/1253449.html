<script>window.DATA_BASE="../";window.INIT_DOC=1253449;window.INIT_MD="DataTester为您提供实验指标的灵活属性功能，创建事件指标、留存指标时，新增支持设置指标事件的灵活属性。打开并添加灵活属性后，后续在实验创编选择指标时可通过灵活属性，指定所选指标按照所选属性及属性值进行口径的定义、计算及展示实验结果。\n\n<span id=\"b816b996\"></span>\n# 应用场景\n\n在一些场景的实验过程中（比如：运营实验），需要创建大量的相似指标进行实验评估，例如：指标所选择的事件相同、计算口径相同，只是过滤属性不同。针对每个实验都需要创建一批这样的指标/指标组，长此以往会累积大量的相似指标，导致指标管理混乱，也不利于建立良性的实验评估指标体系。\n\n实验指标的灵活属性功能希望能解决上述问题，增加指标可复用性，建立更健康的客户指标体系。\n\n<span id=\"0c80e0c8\"></span>\n# 操作步骤\n\n<span id=\"f0835e2a\"></span>\n## step1：配置灵活属性\n\n在创建事件指标、留存指标时，设置灵活属性，配置入口如下图所示，创建指标的详细操作步骤请参见[新建事件指标](https://www.volcengine.com/docs/56651/786738)、[新建留存指标](https://www.volcengine.com/docs/56651/786739)。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/d8e6c5c633744071a66a6a92f2947b91~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"bd6ae382\"></span>\n## step2：通过灵活属性过滤\n\n在创建实验\\-选择指标时，对相应指标进行该实验特定的「属性\\-属性值」设置即可。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/a268a32a0dea4d0288d29c9b6c1ce496~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"e4ce19d0\"></span>\n## step3：查看报告指标信息\n\n在该实验报告页查看该指标的时候，指标口径中会展示设置的灵活属性。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/6e9c991dffdc46e09891937ae4912c79~tplv-goo7wpa0wc-image.image) </span>";</script>

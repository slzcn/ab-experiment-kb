<script>window.DATA_BASE="../";window.INIT_DOC=169887;window.INIT_MD="<span id=\"89e20c1f\"></span>\n# 预置事件公共属性\n\n<span id=\"6691574c\"></span>\n## 通用预置事件公共属性\n\n\n|**属性名** |**属性展示名** |**SaaS/私有化支持情况** |**字段类型** |**数据来源** |**属性说明或示例** |\n|---|---|---|---|---|---|\n|os_name |操作系统 |SaaS\\-云原生/私有化 |String |系统 API |取值为ios/android/windows/mac |\n|os_version |系统版本 |SaaS\\-云原生/私有化 |String |系统 API | |\n|device_model |设备型号 |SaaS\\-云原生/私有化 |String |系统 API | |\n|language |系统语言 |SaaS\\-云原生/私有化 |String |系统 API | |\n|platform |平台类型 |SaaS\\-云原生/私有化 |String |固定值 | |\n|sdk_version |SDK版本 |SaaS\\-云原生/私有化 |String |SDK 生成 | |\n|sdk_lib |SDK类型 |SaaS\\-云原生/私有化 |String |固定值 | |\n|timezone |时区 |私有化 |String |系统 API | |\n|resolution |分辨率 |SaaS\\-云原生/私有化 |String |系统 API | |\n|screen_width | |SaaS\\-非云原生 |Number |系统 API | |\n|screen_height | |SaaS\\-非云原生生 |Number |系统 API | |\n\n\n<span id=\"7aa04085\"></span>\n## Web端特有预置事件公共属性\n\n\n|**属性名** |**属性展示名** |**SaaS/私有化支持情况** |**字段类型** |**数据来源** |**属性说明或示例** |\n|---|---|---|---|---|---|\n|browser |浏览器 |SaaS\\-云原生/私有化（saas\\-非云原生生生里是用户属性） |String |系统 API |示例: chrome |\n|browser_version |浏览器版本 |SaaS\\-云原生/私有化（saas\\-非云原生里是用户属性） |String |系统 API |示例: 8.7 |\n|referrer |来源地址 |Saas/私有化 |String |系统 API | |\n|referrer_host |前向域名 |Saas/私有化 |String |系统 API | |\n|$latest_referrer |最近一次站外地址 |Saas |String | | |\n|$latest_referrer_host |最近一次站外域名 |Saas |String | | |\n\n\n<span id=\"b6410524\"></span>\n# 预置事件公共属性\n\n<span id=\"54e5cd78\"></span>\n## 通用预置事件公共属性\n\nWeb端和小程序端均有的事件公共属性。\n\n\n|**属性名** |**属性展示名** |**SaaS/私有化支持情况** |**字段类型** |**数据来源** |**属性说明或示例** |\n|---|---|---|---|---|---|\n|event_index | |Saas |float |SDK 生成 |仅 Web， |\n|$current_path |当前页面path |Saas/私有化 |String |系统 API |仅 小程序，当前页面的 path |\n|$current_query |当前页面query |Saas/私有化 |String |系统 API |仅 小程序，当前页面的 query |\n\n\n<span id=\"a0b0ae93\"></span>\n## 页面访问事件（predefine_page_）\n\n\n|**事件名** |**事件显示名** |**属性名** |**SaaS/私有化支持** |**属性展示名** |**属性值类型** |**属性说明** |\n|---|---|---|---|---|---|---|\n|predefine_pageview |页面访问<br><br>pv事件，当sdk初始化完成后，即调用start事件，会发送一次pv，仅发送一次。会带上页面title、url、path、referrer等属性。<br><br>当你是SPA页面，页面发生改变，想重新上报PV时，可调用如下API，传入一些自定义参数，会和默认参数进行合并。（ Tea.predefinePageView(params)） |_ip_int |SaaS/私有化 |无 |int | |\n|||referer_full_domain |SaaS/私有化 |来源域名 |string | |\n|||referer_site_name |SaaS/私有化 |来源网站(名称) |string | |\n|||referer_type |SaaS/私有化 |来源类型 |string |1. 网页的referrer与和domain一样则referer_type属性为inner，此时判断为站内跳转inner；<br><br>2. 社交网络social_network分类和搜索引擎search_engine分类的下的站点我们是穷举写死的；<br><br>3. referrer如果为空视为直接访问direct；<br><br>4. 除了站内跳转inner、社交网络social_network、搜索引擎search_engine，其余的归给外部链接referring_site。 |\n|||url_full_domain |SaaS/私有化 |访问域名 |string |通过url推导，将url字符串解析为java.net.URL对象，并调用getHost()方法获得。 |\n|||event_index |SaaS |无 |float |默认所有的事件都会有,不用关心。 |\n|||visit_from_outside |SaaS/私有化 |是否站外访 |string |通过url和referrer推导，若url和referrer的顶级域名不相同则为true，否则为false（若url/referrer的其中一个因上报格式有问题无法解析出host，则恒为false）。 |\n|||url |SaaS/私有化 |访问链接 |string |sdk初始化完成后,pv会获取当前页面的location.href作为url。 |\n|||url_path |SaaS/私有化 |* SaaS\\-云原生/私有化：URL地址<br><br>* SaaS\\-非云原生：访问 |string |sdk初始化完成后,pv会获取当前页面的location.pathname作为url_path。 |\n|||$is_first_time |SaaS/私有化 |是否首次访问 |string | |\n|predefine_page_alive |停留时长活跃 |tiltle |SaaS/私有化 |页面标题 |string | |\n|||url |SaaS/私有化 |访问链接 |string | |\n|||url_path |SaaS/私有化 |* SaaS\\-云原生/私有化：URL地址<br><br>* SaaS\\-非云原生：访问路径 |string | |\n|||duration |SaaS/私有化 |停留时长 |int | |\n|predefine_page_close |停留时长关闭 |tiltle |SaaS/私有化 |页面标题 |string | |\n|||url |SaaS/私有化 |访问链接 |string | |\n|||url_path |SaaS/私有化 |* SaaS\\-云原生/私有化：URL地址<br><br>* SaaS\\-非云原生：访问路径 |string | |\n|||duration |SaaS/私有化 |停留时长 |int | |\n\n\n<span id=\"3ba604c0\"></span>\n## 全埋点事件（bav2b_）\n\n\n|**事件名** |**事件显示名** |**属性名** |**SaaS/私有化支持** |**属性展示名** |**属性值类型** |**属性值示例或说明** |\n|---|---|---|---|---|---|---|\n|bav2b_click |全埋点点击 |is_html |SaaS/私有化 |is_html |int |默认为1 |\n|||page_key |SaaS/私有化 |页面 key |string |页面的key等同于页面的地址 |\n|||page_title |SaaS/私有化 |页面标题 |string |页面的标题\"xx页面\" |\n|||element_path |SaaS/私有化 |元素路径 |string |元素相对于body的绝对路径'body/div.div' |\n|||positions |SaaS/私有化 |元素位置 |string |元素相对于body的位置<br><br>[1,0,1,0] |\n|||element_title |SaaS/私有化 |元素标题 |string |元素的标题，dom上设置了title属性的话会有 |\n|||texts |SaaS/私有化 |元素文本内容 |string |元素的内容，比如:'我是一行文本' |\n|||element_id |SaaS/私有化 |元素 id |string |元素的id，dom上设置了id属性的话会有 |\n|||element_class_name |SaaS/私有化 |元素类名 |string |元素的class，dom上设置了class属性的话会有 |\n|||element_type |SaaS/私有化 |元素类型 |string |元素的类型，不同的元素类型不同，有0,1,3等 |\n|||element_width |SaaS/私有化 |元素宽度 |int |点击元素的宽度 |\n|||element_height |SaaS/私有化 |元素高度 |int |点击元素的高度 |\n|||touch_x |SaaS/私有化 |点击位置 X 坐标 |int |点击的位置相对于元素左上角的横坐标 |\n|||touch_y |SaaS/私有化 |点击位置 Y 坐标 |int |点击位置相对于元素左上角的纵坐标 |\n|||page_start_ms |SaaS/私有化 |页面打开时间 |int |页面打开的时间戳 |\n|||since_page_start_ms |SaaS/私有化 |点击发生时距离页面打开的时间 |int |点击发生的时候距离页面打开过去的时间，毫秒级 |\n|||page_path |SaaS/私有化 |页面路径 |string |页面的路径，/aa/b.html |\n|||page_host |SaaS/私有化 |页面域名 |string |页面的域名，www.aaaa.com |\n|bav2b_page |全埋点访问 |is_html |SaaS/私有化 |is_html |int | |\n|||is_back |SaaS/私有化 |is_back |int | |\n|||page_key |SaaS/私有化 |页面 key |string | |\n|||url |SaaS/私有化 |页面地址 |string | |\n|||page_title |SaaS/私有化 |页面标题 |string | |\n|||page_path |SaaS/私有化 |页面路径 |string | |\n|||page_host |SaaS/私有化 |页面域名 |string | |\n|||page_total_height |SaaS/私有化 |页面总高度 |int | |\n|||page_total_width |SaaS/私有化 |页面总宽度 |int | |\n|||scroll_height |SaaS/私有化 |页面滚动条高度 |int | |\n|||scroll_width |SaaS/私有化 |页面滚动条宽度 |int | |\n|||page_manual_key |SaaS/私有化 |页面 manual_key |string | |\n|||page_start_ms |SaaS/私有化 |页面打开时间 |int | |\n|||refer_page_title |SaaS/私有化 |来源页面标题 |string | |\n|||refer_page_duration_ms |SaaS/私有化 |来源页面访问时长 |int | |\n|||refer_page_key |SaaS/私有化 |来源页面 key |string | |\n|||refer_page_manual_key |SaaS/私有化 |来源页面manual_key |string | |\n|||is_first_time |SaaS/私有化 |是否首次访问 |int | |\n|bav2b_beat |全埋点心跳 |is_html |SaaS/私有化 |is_html |int | |\n|||page_key |SaaS/私有化 |页面 key |string | |\n|||beat_type |SaaS/私有化 |beat 类型 |int | |\n|||page_title |SaaS/私有化 |页面标题 |string | |\n|||page_viewport_width |SaaS/私有化 |页面可视窗口宽度 |int | |\n|||page_viewport_height |SaaS/私有化 |页面可视窗口高度 |int | |\n|||page_total_height |SaaS/私有化 |页面总高度 |int | |\n|||page_total_width |SaaS/私有化 |页面总宽度 |int | |\n|||scroll_height |SaaS/私有化 |页面滚动条高度 |int | |\n|||scroll_width |SaaS/私有化 |页面滚动条宽度 |int | |\n|||page_manual_key |SaaS/私有化 |页面 manual_key |string | |\n|||page_start_ms |SaaS/私有化 |页面打开时间 |int | |\n|||since_page_start_ms |SaaS/私有化 |since_page_start_ms |int | |\n|bav2b_page_statistics |全埋点统计 |is_html |SaaS/私有化 |is_html |int | |\n|||page_key |SaaS/私有化 |页面 key |string | |\n|||page_title |SaaS/私有化 |页面标题 |string | |\n|||page_manual_key |SaaS/私有化 |manual_key |string | |\n|||page_start_ms |SaaS/私有化 |页面打开时间 |int | |\n|||page_init_cost_ms |SaaS/私有化 |页面打开耗时 |int | |\n|||refer_page_key |SaaS/私有化 |来源页面 key |string | |\n|||refer_page_manual_key |SaaS/私有化 |来源页面 manual_key |string | |\n|$bav2b_exposure |曝光事件 |$exposure_type |SaaS/私有化 |曝光类型 |int | |\n|||is_html |SaaS/私有化 |is_html |int | |\n|||page_key |SaaS/私有化 |页面key |string | |\n|||page_title |SaaS/私有化 |页面标题 |string | |\n|||element_path |SaaS/私有化 |元素路径 |string | |\n|||positions |SaaS/私有化 |元素位置 |string | |\n|||element_title |SaaS/私有化 |元素标题 |string | |\n|||element_id |SaaS/私有化 |元素id |string | |\n|||element_class_name |SaaS/私有化 |元素class名 |string | |\n|||element_type |SaaS/私有化 |元素类型 |int | |\n|||element_width |SaaS/私有化 |元素宽度 |int | |\n|||element_height |SaaS/私有化 |元素高度 |int | |\n|||touch_x |SaaS/私有化 |点击位置X坐标 |int | |\n|||touch_y |SaaS/私有化 |点击位置Y坐标 |int | |\n|||page_start_ms |SaaS/私有化 |页面打开时间 |int | |\n|||since_page_start_ms |SaaS/私有化 |since_page_start_ms |int | |\n|||page_path |SaaS/私有化 |页面标题 |string | |\n|||page_host |SaaS/私有化 |页面域名 |string | |\n|$bav2b_slide |滑动事件 |$direction |SaaS/私有化 |滑动方向 |int | |\n|||$offsetX |SaaS/私有化 |横向偏移 |float | |\n|||$offsetY |SaaS/私有化 |纵向偏移 |float | |\n|||element_path |SaaS/私有化 |元素路径 |string | |\n|||positions |SaaS/私有化 |元素位置 |string | |\n|||texts |SaaS/私有化 |元素文本 |string | |\n|||element_title |SaaS/私有化 |元素标题 |string | |\n|||element_id |SaaS/私有

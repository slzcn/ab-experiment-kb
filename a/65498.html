<script>window.DATA_BASE="../";window.INIT_DOC=65498;window.INIT_MD="「A/B 测试」为大规模在线 A/B Testing 平台，曾用名「DataTester」。\n\n<span id=\"e7eb4424\"></span>\n# 基础概念与实验咨询问题\n\n<span id=\"88fecf03\"></span>\n## 多少量级的产品可以开A/B实验？\n\n建议日活在1000以上。\n\n<span id=\"60799f36\"></span>\n## 如何针对目标用户做A/B实验？\n\n在创建实验时，可以配置过滤条件，如只针对新用户开实验。\n\n<span id=\"e8061395\"></span>\n## 互斥组是什么意思？\n\n**互斥组，也称互斥层、实验层。**   **“实验层”技术是为了让多个实验能够并行不相互干扰，且都获得足够的流量而研发的流量分层技术。** \n\n> 举个例子，假如我现在有4个实验要进行，每一个实验要取用30%的流量才能够得出可信的实验结果。此时为了同时运行这4个实验就需要4\\*30%=120%的流量，这意味着100%的流量不够同时分配给这4个实验。\n\n> 那么此时我们只能选择给实验排序，让几个实验先后完成。但这会造成实验效率低下。实验层技术就可以完美解决这个问题。\n\n\n我们把总体流量“复制”无数遍，形成无数个流量层，让总体流量可以被无数次复用，从而提高实验效率。各层之间的流量是正交的，你可以简单理解为：在流量层选择正确的前提下，流量经过科学的分配，可以保证各实验的结果不会受到其他层实验的干扰。\n\n<span id=\"0d594925\"></span>\n## vid是什么？\n\n版本ID\n\n<span id=\"4bda593c\"></span>\n## 如何保证流量比例准确（如何控制10%，就是真实流量的10%）\n\n互斥组=互斥层=实验层\n\n分流服务在分配流量时，会先把每一层的流量平均分配为固定的份数，比如100份，每一份被称为一个“哈希桶（bucket）”。经过分流服务的处理，我们把所有用户都扔进了桶里，那么这100个桶里，每桶都有1%的流量。同一层的不同实验在调用流量时，就会按照实验所需的流量的百分比，随机领取到不同数量的桶（且桶不重合）。\n\n分流原理请参考：[此处](https://static.googleusercontent.com/media/research.google.com/zh-CN//pubs/archive/36500.pdf)。\n\n<span id=\"cc0d04e0\"></span>\n## 如何保证人群没有特殊性？\n\n哈希函数在对用户进行分组的时候，由于只用到了用户标识，而且能把有规律的id集合散列的很均，所以在其他属性（比如机型、地域、年纪、性别等）上能分得很均匀。\n\n<span id=\"7a12e22b\"></span>\n## 如何保证用户不会跳组？（比如保证不会出现：上午在A版本，下午在B版本）\n\n在分流服务中，承担这项重任的还是「哈希函数」。「哈希函数」之所以能够担此重任，源于它的一个特性：如果输入值是固定的，那么哈希函数的输出值也是固定的。\n\n<span id=\"81197909\"></span>\n# 实验开启等操作咨询\n\n<span id=\"d62b46fd\"></span>\n## 停止的试验是否能重新开始？\n\n不能。因为在实验停止的时间内，用户群体可能会发生变化，再开实验时不能保证数据的准确性。\n\n<span id=\"84e75f13\"></span>\n## 如何实现灰度发布的功能？\n\n可以将实验固化至Feature，详见：[实验固化至Feature](https://www.volcengine.com/docs/6287/65813)\n\n<span id=\"faa7e3b4\"></span>\n# 实验指标与实验报告相关\n\n<span id=\"6174b799\"></span>\n## 开实验后，多久才能看到实验指标数据？\n\n开始实验后，进组用户可实时查看，指标置信度第二日产出。\n\n<span id=\"c91225c4\"></span>\n## 哪些指标支持计算置信度？\n\n**单一指标：** \n\n\n* 进组人均次数：触发当前事件的进组用户人均发生数量。pv/au，进组用户当前事件总发生次数/进组用户数。\n\n* 转化率：触发当前事件的进组用户比例。uv/au，某事件发生的总进组用户数/进组用户数。\n\n* 按…求进组人均值：sum/au，某属性值求和/进组用户数。\n\n* 人均次数：事件的人均触发数。pv/uv，进组用户当前事件的总发生次数/进组用户上报当前事件的人数。\n\n* 按…求人均值：sum/uv，某属性值求和/事件触发进组人数。\n\n* 按…求平均值：sum/pv，某属性值求和/事件发生次数。\n\n\n**组合指标：** \n\n\n* 分子为uv类型，分母为uv类型。\n\n* 分子为pv类型，分母为pv类型。\n\n* 分子为pv类型，分母为uv类型。\n\n* 分子为pv类型，分母为sum类型。\n\n* 分子为sum类型，分母为sum类型。\n\n* 分子为sum类型，分母为uv类型。\n\n* 分子为sum类型，分母为pv类型。\n\n\n<span id=\"9beff792\"></span>\n## 为什么埋点上报后，无法在Tester中配置指标？\n\n埋点上报后，需要6个小时构建数据，6个小时后可以在Tester配置该指标。\n\n<span id=\"d3663c5c\"></span>\n## 如果获取AB参数失败，那么有没有重发的机制？如果有重发机制，那么AB参数下发的时间点是哪些？\n\n获取AB参数失败后，如果app在前台，每10分钟会重新获取，或是app下次启动时也会重新获取。\n\n<span id=\"3e85d8d9\"></span>\n## sum(dau)的数据口径是什么？\n\nsum(dau)是每天dau的直接相加，表达dau纯数值求和，求和时不对dau做“人”维度的去重。\n\n<span id=\"63d53716\"></span>\n## 埋点有正常上报的记录，但是实验报告里面又没有任何进组记录数据，是什么原因？\n\n对于实验报告中的指标数据，需要对应的用户先触发实验曝光事件后，再触发对应的指标事件后，才可以在实验报告中统计到。\n\n<span id=\"767e77e3\"></span>\n## 实验报告里，“从头累计”和“灵活累计”数据统计区别？\n\n\n|对比项 |从头累计 |灵活累计 |\n|---|---|---|\n|进组用户数 |从实验开始第一天累计到当前日期 |从筛选日期的开始时间\\-截止时间之间的累计 |\n|其他指标 |* 从筛选日期的开始时间\\-截止时间之间的累计；<br><br>* 若组合指标中有进组用户数，进组用户数是从实验开始第一天累计到当前日期 |* 从筛选日期的开始时间\\-截止时间之间的累计；<br><br>* 若组合指标中有进组用户数，进组用户数是从筛选日期的开始时间\\-截止时间之间的累计 |\n\n\n<span id=\"a7923ee7\"></span>\n## 实验报告的筛选为什么不能选事件属性？\n\n实验报告只支持基于用户属性和事件公共属性进行筛选，因筛选是作用于下方所有指标的，只能选择通用的属性，比如事件公共属性和用户属性，对于想针对单一事件的属性，需要对该指标增加属性筛选，即按照需求编辑指标。\n\n<span id=\"ff4769ab\"></span>\n# 实验SDK集成相关\n\n<span id=\"_1-tester提供哪些语言的sdk\"></span>\n## Tester提供哪些语言的SDK\n\n\n* 客户端：iOS、Android、Web/H5/WAP、微信小程序\n\n* 服务端：Java、Python、Go、Node.js\n\n\n<span id=\"_16-客户端是否支持采集页面停留时长，如何实现的？\"></span>\n## 客户端是否支持采集页面停留时长，如何实现的？\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">iOS、Android、Web、Mp SDK 均支持页面停留时长的采集</div>\n\n\n<span id=\"ios\"></span>\n### iOS\n\n\n1. 开启全埋点，并设置采集离开页面的事件。6.11.0+ 版本起支持。应用退出时所在的页面采集不到。\n\n\n```objectivec\n//开启全埋点\nconfig.autoTrackEnabled = YES；\n//BDAutoTrackDataTypePageLeave为采集$bav2b_page_leave事件的枚举，包含$page_duration页面时长参数,单位是毫秒\n//默认值为BDAutoTrackDataTypePage | BDAutoTrackDataTypeClick\nconfig.autoTrackEventType = BDAutoTrackDataTypePage | BDAutoTrackDataTypeClick | BDAutoTrackDataTypePageLeave；\n```\n\n\n\n2. 用户细查看，通过 $bav2b_page_leave 事件的 $page_duration 参数。\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_4f75e55c733f3144878e6451c640823d.png) </span>\n\n\n3. 事件分析查看，可以根据页面浏览时长求和、求人均值等\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_b65ed0b8578baa9eb7a3b32d296c049b.png) </span>\n\n<span id=\"android\"></span>\n### Android\n\n\n1. 开启全埋点即可采集，并设置采集离开页面的事件。6.11.0+ 版本起支持。应用退出时所在的页面采集不到。\n\n\n```java\nconfig.setTrackPageLeaveEnabled(true);\n// 默认值：AutoTrackEventType.PAGE | AutoTrackEventType.CLICK//// AutoTrackEventType.ALL: 全埋点所有事件// AutoTrackEventType.PAGE: 全埋点页面事件 默认开启// AutoTrackEventType.CLICK: 全埋点点击事件 默认开启// AutoTrackEventType.PAGE_LEAVE: 全埋点页面时长事件 默认关闭// 本功能仅支持6.11.0及以上版本\nconfig.setAutoTrackEventType(AutoTrackEventType.PAGE | AutoTrackEventType.CLICK | AutoTrackEventType.PAGE_LEAVE);\n```\n\n\n\n2. 用户细查看，通过 $bav2b_page_leave 事件的 $page_duration 参数。同 iOS。\n\n3. 事件分析查看同 iOS。\n\n\n应用退出时所在的页面采集不到。\n\n<span id=\"小程序\"></span>\n### 小程序\n\n\n1. 开启预置事件predefine_pageview_hide（页面隐藏）的采集，包含duration参数，单位毫秒。\n\n\n```json\n//auto_report设置为true\n$$Rangers.init({\n    auto_report: true, // 开启后会上报一些预定义事件，如app_launch、app_terminate等\n});\n\n//或者设置auto_report为对象\n$$Rangers.init({\n    auto_report: {\n        //上报predefine_pageview_hide事件，false时不上报，或者pageShow为false时该事件也不会上报\n        pageShow?: true;\n        pageHide?: true;  \n}\n});\n```\n\n\n\n2. 用户细查看\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_19b87d51e34f3593661379178091c853.png) </span>\n\n\n3. 事件分析查看\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_718c9aff6a476d4154e752dc2859aaac.png) </span>\n\n<span id=\"web-js\"></span>\n### Web/JS\n\n\n1. 初始化时开启页面停留时长\n\n\n```javascript\nwindow.collectEvent('init', {\n    // ...... 其他初始化配置\n    enable_stay_duration: true // true：开启停留时长\n});\n```\n\n\n\n2. 开始后上报事件介绍\n\n* predefine_page_alive 采集时长时推荐使用\n\n   * 开启功能之后，predefine_page_alive事件会在页面活跃状态下，每分钟定时上报一次，或者在切换为非活跃状态时上报一次。 **活跃状态：页面处于可视，或者可操作的状态。**  **非活跃状态：页面处于后台，隐藏，最小化等不可视状态。** \n\n   \n   |event |含义 |params |说明 |\n   |---|---|---|---|\n   |predefine_page_alive |页面活跃 |title |string |\n   |||url |string |\n   |||url_path |string |\n   |||duration |int，ms，毫秒，一般是60s，在切换为非活跃状态时小于等于60 |\n   |||tea_event_index |当前事件触发的时间戳的变体 |\n   |||is_support_visibility_change |int，浏览器是否支持visibility_change |\n   \n\n   * **分析方式：** \n\n      * 人均使用时长=sum（duration）/uv\n\n      * 次均使用时长=sum（duration）/pv\n\n* predefine_page_close\n\n   * 开启功能之后，会记录用户每次【进入页面，切换状态，离开页面】的时间戳，然后在离开或者关闭页面的时候上报predefine_page_close事件，将每一段【活跃状态】的时长相加作为整体的使用时长。\n\n   \n   |event |含义 |params |说明 |\n   |---|---|---|---|\n   |predefine_page_close |页面关闭 |title |string |\n   |||url |string |\n   |||url_path |string |\n   |||duration |int，ms，毫秒 |\n   |||active_times |页面活跃的次数 |\n   |||total_duration |int, ms, 毫秒，页面打开到关闭的总时长 |\n   |||is_support_visibility_change |int，浏览器是否支持visibility_change |\n   \n\n   * **分析方式：** \n\n      * 人均使用时长=sum（duration）/uv\n\n      * 次均使用时长=sum（duration）/pv\n\n      * 每次活跃平均使用时长=sum（duration）/sum（active_times）\n\n      * 使用时长分布\n\n\n<span id=\"eed583fc\"></span>\n## DataTester的服务端SDK可以上报自定义事件/事件公共属性吗？\n\n\n* DataTester的服务端SDK主要用于实现A/B实验分流，因此基于服务端SDK上报的事件、属性都是固定的，因此DataTester的服务端SDK不支持上报自定义事件/事件公共属性。\n\n* 如果您需要上报自定义事件/事件公共属性，可以通过HTTP API或客户端SDK进行上报。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

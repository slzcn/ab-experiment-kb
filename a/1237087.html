<script>window.DATA_BASE="../";window.INIT_DOC=1237087;window.INIT_MD="系统为您提供了大量预置用户属性，也为您提供了自定义绑定用户属性的预置事件，便于您通过此事件自定义用户属性。\n\n<span id=\"057adc6a\"></span>\n# 预置用户属性\n\n\n|**属性名** |**SaaS/私有化支持** |**属性值类型** |**数据来源** |**属性描述** |\n|---|---|---|---|---|\n|web_id |Saas/私有化（事件公共属性） |String |服务端生成 | |\n|device_id |私有化 |String |用户传入 | |\n|region |Saas |String |系统 API |系统地区 |\n|loc_country_id |Saas |String |服务端生成 |国家（数据构建时根据client_ip生成） |\n|sdk_version |Saas |String |固定值 |SDK版本 |\n|utm_term |Saas |String |服务端生成 |广告推广字词 |\n|app_version |Saas |String |系统 API |软件版本 |\n|app_language |Saas |String |用户传入 |软件语言 |\n|client_ip |Saas |String | | |\n|resolution |Saas |String |系统 API |分辨率 |\n|continent |Saas |String |服务端生成 |国家所属大洲（数据构建时根据client_ip生成） |\n|app_channel |Saas |String | |渠道 |\n|loc_province_id |Saas |String |服务端生成 |省份（数据构建时根据client_ip生成） |\n|language |Saas |String |系统 API |系统语言 |\n|age |Saas |String | | |\n|browser_version |Saas |String |系统 API |浏览器版本 |\n|sdk_lib |Saas |String |固定值 |SDK类型 |\n|user_is_new |Saas/私有化 |Number |服务端生成 |新老用户（user_is_new）和是否首日访问（$is_first_day）最主要的区别在于前者受所选时间周期的影响，而后者不受影响，因此后者在不同的图表类型中得到的计算结果有更好的一致性，建议使用是否首日访问（$is_first_day）来判断新老用户。<br><br>是否首日访问（$is_first_day）：目标事件和首个事件发生在同一天。<br><br>新老用户（user_is_new）：目标事件和首个事件发生在同一周期。比如在柱形图中，周期就是用户所选的时间范围。 |\n|os_version |Saas |String |系统 API |系统版本 |\n|platform |Saas |String |固定值 | |\n|custom_mp_platform_app_version |Saas |String | |平台版本号 |\n|custom_mp_platform |Saas |String | |小程序平台 |\n|utm_source |Saas |String |服务端生成 |广告推广渠道 |\n|os_name |Saas |String |系统 API |操作系统 |\n|network_type |Saas |String |系统 API |网络类型 |\n|ab_version |Saas |Number | |AB实验VID |\n|custom_mp_platform_basic_version |Saas |String | |小程序基础库版本号 |\n|utm_medium |Saas |String |服务端生成 |广告推广媒介 |\n|device_model |Saas |String |系统 API |设备型号 |\n|browser |Saas |String |系统 API |浏览器 |\n|custom_rangers_mp_from_uid |Saas |String | | |\n|network_carrier |Saas |String |系统 API |运营商（数据构建时会有清洗逻辑到设备库进行映射，如果映射不到就使用上报的值） |\n|utm_campaign |Saas |String |服务端生成 |广告推广活动 |\n|utm_content |Saas |String |服务端生成 |广告推广内容 |\n|brand |Saas |String |系统 API |手机品牌 |\n|app_region |Saas |String | |软件地区 |\n|loc_city_id |Saas |String |服务端生成 |城市（数据构建时根据client_ip生成） |\n|user_id |Saas |String | |用户ID |\n|first_event_time |私有化 |String |服务端生成 |激活时间 |\n|last_active_date |私有化 |String |服务端生成 |最后活跃日期 |\n\n\n<span id=\"8b4d0fbb\"></span>\n# 用户属性绑定\n\n\n|**事件名** |**事件显示名** |**属性** |\n|---|---|---|\n|__profile_set |用户属性 |属性为自定义的用户属性 |\n|__profile_set_once |用户属性 |属性为自定义的用户属性 |\n|__profile_unset |取消用户属性 |属性为自定义的用户属性 |\n|__profile_increment |增量用户属性 |属性为自定义的用户属性 |\n|__profile_append |增加用户属性 |属性为自定义的用户属性 |";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

  </div>
</div>

<script>window.DATA_BASE="../";window.INIT_DOC=65822;window.INIT_MD="<span id=\"一-概述\"></span>\n# 背景信息\n\nDataTester为您提供「Feature」资源实体的细粒度权限管控，以满足以下权限管控场景需求。\n\n\n* 将功能按不同层级或者属性进行划分，更细粒度的进行权限管控，可以一定程度上增强数据的安全性，增强相关业务稳定性。\n\n* 权限不同，可以查看、操作的项目不同，避免由于误操作带来的一系列负面问题。\n\n* 职责不同所需要的页面/信息不同，提供最有效的信息可提升操作效率，避免无关页面带来的干扰。\n\n\n<span id=\"3c624059\"></span>\n# 设置用户角色的Feature操作权限\n\n<span id=\"5973c9b1\"></span>\n## 权限说明\n\nFeature的权限管控粒度可细分为查看Feature列表/详情（**查看权限**）、新建/编辑Feature（**协作者权限**）两类。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/80eeff71f52f486aa327e10767ad7789~tplv-goo7wpa0wc-image.image) </span>\n\n两类权限管控粒度下可对Feature进行的操作范围如下。\n\n\n|**Feature操作类型** |查看Feature列表/详情<br><br>（**查看权限**） |新建/编辑Feature<br><br>（**协作者权限**） |\n|---|---|---|\n|查看Feature详情页 |✔️ |✔️ |\n|查看Feature操作历史 |✔️ |✔️ |\n|开启Feature |不支持 |✔️ |\n|关闭Feature |不支持 |✔️ |\n|关联实验 |不支持 |✔️ |\n|编辑Feature |不支持 |✔️ |\n|删除Feature |不支持 |✔️ |\n|权限管理 |不支持 |✔️ |\n\n\n对Feature进行权限管控时，其实就是对DataTester的用户角色授予Feature的查看权限、协作者权限。\n\n<span id=\"0e6b871b\"></span>\n## 操作指导\n\n登录并进入DataTester的全局设置\\>系统管理\\>权限管理页面，修改角色的Feature操作权限。\n\nDataTester为您提供了一些预置角色，例如集团管理员、应用管理员，您也可以自行创建自定义角色关联给普通用户，然后给自定义角色进行授权，实现对普通用户的权限管控。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\"><strong>集团管理员</strong> ，指的是当前集团的管理员，比如“Demo体验”集团的集团管理员。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\"><strong>应用管理员</strong> ，指的是当前集团接入应用的应用管理员。比如“Demo体验”集团下“电商APP、教育APP、小程序Demo、网页端Demo、移动端Demo、DataPlayer移动端demo”应用的应用管理员。</div>\n\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">您可以在“集团管理\\-角色管理”添加角色，可给普通用户开通某个应用的“应用管理员、成员”权限。</div>\n\n\n<span id=\"三-操作入口\"></span>\n# 设置Feature类型\n\n<span id=\"a68326e4\"></span>\n## 权限说明\n\nDataTester的Feature可分为「公共Feature」和「私有Feature」两类，不同角色与不同类型的Feature间的默认关系表如下：\n\n\n|分类 |**集团管理员** |**应用管理员** |**Feature创建者** |**普通用户** |\n|---|---|---|---|---|\n|公共Feature |查看权限、协作者权限 |查看权限、协作者权限 |查看权限、协作者权限 |查看权限 |\n|私有Feature |查看权限、协作者权限 |查看权限、协作者权限 |查看权限、协作者权限 |不可见 |\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">新创建的Feature默认为公共Feature。</div>\n\n\n<span id=\"5374f7e5\"></span>\n## 操作指导\n\n登录并进入DataTester的Feature列表页，点击“操作\\-权限管理”，可对已创建的Feature进行类型修改。新创建的Feature默认为公共Feature。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">只有具有「协作者权限」的用户才可点击该选项进行权限管理。</div>\n\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/548ac0f2a7344acab1b31a55d702adc5~tplv-goo7wpa0wc-image.image) </span>\n\n\n* 公共Feature，当前集团当前应用的“集团管理员、应用管理员、Feature创建者”默认拥有「协作者权限」。 **当前集团可访问该应用的用户默认拥有「查看权限」。** \n\n* 私有Feature，当前集团当前应用的“集团管理员、应用管理员、Feature创建者”默认拥有「协作者权限」。";</script>

<script>window.DATA_BASE="../";window.INIT_DOC=139422;window.INIT_MD="DataTester的 **用户细查** 功能，为您提供单个用户详细信息及行为流的查询。\n\n<span id=\"_1-概念介绍\"></span>\n# 背景信息\n\n<span id=\"4e30716b\"></span>\n## 基本概念\n\n\n|术语 |详细说明 |\n|---|---|\n|UUID、SSID |UUID和SSID都是用户的唯一标识，主要区别在于UUID由您和团队为用户分配管理，SSID由DataRanges分配管理。<br><br><br>* **UUID** ：即User Unique Id，一般与用户的登录id（如手机号、email）一一对应，UUID由您和团队来维护；<br><br>* **SSID** ：即标准化服务ID（Standardized Service Id），是火山引擎增长分析产品用来标记和识别用户而提供的用户标识。SSID由火山引擎增长分析生成和维护，您和团队可以根据需要使用。<br><br><br>更多关于uuid、ssid的说明请参见[支持的用户唯一标识](https://www.volcengine.com/docs/6287/65800)。 |\n|行为流 |行为流，即按事件在客户端发生的时间顺序展示的单个用户的详细行为轨迹。 |\n\n\n<span id=\"c84a0959\"></span>\n## 应用场景\n\n行为细查是研究用户和用户行为极为高效的工具。典型使用场景包括（但不限于）：\n\n\n* 产品&用户体验团队：了解用户使用产品的过程，及制作persona；\n\n* 运营&增长团队：了解用户的转化路径，发现影响转化的问题和提升点；\n\n* 服务团队：回放用户遇到问题前的行为流，了解所服务用户的产品使用过程；\n\n* 研发团队：回放用户的Crash或异常使用的行为流，还原问题场景。\n\n\n<span id=\"_2-快速入门\"></span>\n# 操作步骤\n\n登录DataTester产品控制台后，在左侧部导航单击**全局设置**\\>**受众管理**\\>**用户细查**，进入用户细查页面，这里展示了最近的100个当天发生了事件的用户，页面默认单页展示20个。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/429064eec4d84917a7ac48a16162b31d~tplv-goo7wpa0wc-image.image) </span>\n\n\n* 您可在页面顶部的过滤条件中配置用户查询的过滤条件，包括设置查询时间范围、查询模板、参与分析的事件范围（默认为全部）。\n\n   其中，查询模版保存的范围包括查询条件和查询结果的配置，您可以设置埋点排查、反馈分析、异常复现等场景化的细查配置模板，后续仅需变更查询ID即可场景复用，模版也将同步于项目其他成员可见，用于经验沉淀。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/50fbf4c088f14c378de697d91e3fe07a~tplv-goo7wpa0wc-image.image) </span>\n\n* 您也可以直接通过用户标识ID来查询具体的用户，当前支持按UUID或SSID来过滤查找用户。\n\n* 单击用户列表中的用户名，即可跳转至用户信息和行为流详情页面，查看对应的详细信息。\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">如开启多应用，用户细查默认查询的该项目下多个应用的指定用户的行为数据串联。</div>\n\n\n<span id=\"_3-2-查看用户信息和行为流\"></span>\n## 查看用户信息和行为流\n\n查看用户信息\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/83ef582d4df24896adfd74d8811c09b6~tplv-goo7wpa0wc-image.image) </span>\n\n包括：\n\n\n* 用户的UUID/SSID、Device ID等其他ID类型、首次事件时间、最近使用、城市等基本信息。\n\n* 用户最近使用设备的信息，如操作系统、设备型号、分辨率等。\n\n* 最近个体画像，即用户属性、用户标签（如存在）等与该用户相关的信息补充。可自由增减展示。\n\n\n<span id=\"14742710\"></span>\n## 查看用户行为流\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/4a1dbe0be94b415d87f87e1724f96b92~tplv-goo7wpa0wc-image.image) </span>\n\n您可以：\n\n\n* 按应用、端/设备、事件、属性筛选行为流，还可选择重要的事件和属性以高亮显示。\n\n* 按时间顺序查看用户的行为事件，默认以事件发生时间倒序查看。\n\n* 支持下载为csv，您可以通过时间组件控制下载数据的时间段，下载最长时间周期为30天，数据范围是页面已经加载的行为数据，您可以通过下拉以加载更多/更早的数据。\n\n* 快速锚定用于切换当前行为流的区域内展示的首个行为所在时间，时间范围为整体配置区设置的时间范围子集。\n\n* 点击查看单个事件的详细数据，目前支持列表和json两种展现形式。其中，时间类型属性默认经过当前所在时区换算，如需查看时间戳可切换至json类型查看原始值。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

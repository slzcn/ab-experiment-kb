<script>window.DATA_BASE="../";window.INIT_DOC=189139;window.INIT_MD="您在使用A/B测试产品的过程中遇到难以解决的问题，可以通过售后在线客服或者提交工单进行咨询。\n\n<span id=\"售后在线客服\"></span>\n## 售后在线客服\n\n\n1. 入口：\n\n   1. 火山引擎官网页面右下角，「售后」\\-\\-\\>「在线客服」；\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_03e7bc241e0753e1a801610805f63722.png) </span>\n\n   2. A/B测试产品内右下角，「展开浮层」\\-\\-\\>「售后」\\-\\-\\>「在线客服」；\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_5f5148c7855de5e2473b448c7ea88b1b.gif) </span>\n\n\n\n&nbsp;\n\n2. 在对话内选择「人工客服」\\-\\-\\>「数据产品（增长分析｜AB测试）」。\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_81e1bb483c9811798bc30011ead4c058.png) </span>\n\n说明：售后在线客服工作时间为每天9:00\\-21:00。\n\n<span id=\"创建工单\"></span>\n## **创建工单**\n\n\n1. 登录[火山引擎控制台](https://console.volcengine.com/)，进入A/B测试产品界面；\n\n2. 在A/B测试产品内，右下角点击「提交反馈工单」；\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_4e8a6e2d8e26503fc2f2fa4cb536f6e1.png) </span>\n\n3. 根据您碰到的问题，选择合适的问题类型，然后单击**立即创建。** \n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_a4c6a82df5514ee134a3b16849613fd5.png) </span>\n\n\n4. 详细描述问题并选择问题等级，设置消息提醒方式等，然后单击**提交工单；** \n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_4f6f43bde48ffb9f46027d4d70c6c7c5.png) </span>\n\n<span id=\"查看工单\"></span>\n#### **查看工单**\n\n\n1. 登录[火山引擎控制台](https://console.volcengine.com/)。\n\n2. 在顶部菜单栏右侧，选择**支持 \\> 我的工单**。\n\n3. 在**工单列表**页面，您可以根据工单编号搜索并查看工单状态及进展。\n\n\n&nbsp;\n\n<span id=\"开通运维权限\"></span>\n## 开通运维权限\n\n您的问题可能涉及技术支持人员进入运维排查，可在产品内右下角点击「允许运维人员进入本集团服务」；\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_40e83a1872dd88fdb332e05c133e0308.png) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

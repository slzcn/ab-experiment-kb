<script>window.DATA_BASE="../";window.INIT_DOC=489210;window.INIT_MD="在首次使用DataTester产品时，需要管理员角色完成的账号准备、产品购买等准备工作的操作，并完成为后续实验员、开发者的账号进行邀请/授权等管理操作。本文为您介绍管理邀请用户及权限管理的注意事项及操作指导。\n\n<span id=\"需要了解基本概念有哪些？\"></span>\n# 背景信息\n\n<span id=\"faebb1c1\"></span>\n## 了解基本信息\n\n\n* 在开始使用DataTester时，管理员需要了解一些基本的概念，比如集团、应用、appid是什么，这样更方便我们更加快速熟悉产品。详细的内容，可以查看[基本概念](https://www.volcengine.com/docs/6287/66981)。\n\n* 作为管理员需要了解DataTester的权限管理策略，DataTester的权限系统是以角色为基础的权限管理设计（RBAC），通过用户关联角色、角色关联权限的方法来间接地赋予用户权限。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_8b8d2588fa62149b2d192f964352f3fa.png) </span>\n\n   DataTester默认提供了4个角色，其中管理员可以根据业务需要，修改系统默认角色的权限范围，或增加新的角色。\n\n   \n   |角色名称 |角色描述 |\n   |---|---|\n   |管理员 |可以对产品成员、角色进行管理 |\n   |安全员 |可以关闭所有实验，一般用于当实验影响用户正常使用时，紧急暂停实验。 |\n   |实验人员 |可以创建实验、查看实验详情、实验报告等。一般推荐需要涉及开实验、修改实验信息的同学申请。 |\n   |分析人员 |对于产品下实验拥有只读权限，可以编辑测试用户，无法创建实验。一般用于实验分析、实验功能验收测试等场景。 |\n   \n\n   更多详细的内容，可以查看[权限管理](https://www.volcengine.com/docs/6287/69594)。\n\n\n<span id=\"管理员一般需要做的事项有哪些？\"></span>\n## 了解管理员工作流程\n\n通常管理员需要完成最初账号准备、下单购买、账号资源创建、项目集团等资源创建、用户及权限管理等操作，以SaaS\\-云原生场景为例，主要的工作流程如下，管理员的快速入门操作指导可参见[快速入门：管理员（云原生）](https://www.volcengine.com/docs/6287/166070)。\n\n<img src=\"data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHhtbG5zOnhsaW5rPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5L3hsaW5rIiB2ZXJzaW9uPSIxLjEiIHdpZHRoPSIxMDI1cHgiIGhlaWdodD0iNjVweCIgdmlld0JveD0iLTAuNSAtMC41IDEwMjUgNjUiPjxkZWZzLz48Zz48cGF0aCBkPSJNIDE4MiAzMiBMIDIwMiAzMiBMIDE4OSAzMiBMIDIwMi42MyAzMiIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMDAwMDAwIiBzdHJva2UtbWl0ZXJsaW1pdD0iMTAiIHBvaW50ZXItZXZlbnRzPSJzdHJva2UiLz48cGF0aCBkPSJNIDIwNy44OCAzMiBMIDIwMC44OCAzNS41IEwgMjAyLjYzIDMyIEwgMjAwLjg4IDI4LjUgWiIgZmlsbD0iIzAwMDAwMCIgc3Ryb2tlPSIjMDAwMDAwIiBzdHJva2UtbWl0ZXJsaW1pdD0iMTAiIHBvaW50ZXItZXZlbnRzPSJhbGwiLz48cmVjdCB4PSIyIiB5PSIyIiB3aWR0aD0iMTgwIiBoZWlnaHQ9IjYwIiByeD0iOSIgcnk9IjkiIGZpbGw9IiNmZmZmZmYiIHN0cm9rZT0iIzAwMDAwMCIgcG9pbnRlci1ldmVudHM9ImFsbCIvPjxnIHRyYW5zZm9ybT0idHJhbnNsYXR saW5lLWhlaWdodDogMS4yOyBwb2ludGVyLWV2ZW50czogYWxsOyB3aGl0ZS1zcGFjZTogbm9ybWFsOyB3b3JkLXdyYXA6IG5vcm1hbDsgIj48dWw+PGxpPuWFtuS7lueuoeeQhuaTjeS9nO+8mue7ree6puWQiOWQjOOAgeWinui0reeUqOmHj+etiTwvbGk+PC91bD48L2Rpdj48L2Rpdj48L2Rpdj48L2ZvcmVpZ25PYmplY3Q+PC9nPjwvZz48L3N2Zz4=\" />\n\n下文为您详细介绍其中与账号资源及权限管理等管理操作相关的操作指导。\n\n<span id=\"733e351b\"></span>\n# 创建子账号\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">也存在后续需要邀请其他主账号来使用DataTester的场景，此场景下，被邀请的主账号需提前完成注册，主账号注册的操作指导可查看：<a href=\"https://www.volcengine.com/docs/6261/64925\">账号注册流程</a>。</div>\n\n\n火山引擎官网提供访问控制产品能力，支持在一个主账号下创建多个子账号，可满足企业中，为不同业务团队创建不同权限限制的子账号，分别使用已购买的产品的场景。\n\n例如，管理员购买DataTester后，可为产品团队、运营团队等业务团队分别创建子账号，并为子账号授权，后续由业务团队使用子账号来操作DataTester。\n\n创建子账号的操作指导如下。\n\n\n1. 登录火山引擎控制台后，单击右上角的**账号名称**\\>**访问控制**，进入访问控制控制台。\n\n2. 参考[访问控制-用户管理](https://www.volcengine.com/docs/6257/64977)文档，新建一个用户，后续将子账号分配给其他研发、实验人员等角色，用于后续的操作。\n\n   * 如果后续需使用子账号创建项目，则创建子账号时，需给子账号项目全局权限。\n\n   * 如果后续需使用子账号进入DataTester产品，则需添加子账号至DataTester项目并授予DataTester的操作权限。\n\n\n详情请参见下文的操作步骤。\n\n<span id=\"_1-邀请新的用户-给其他账号授权\"></span>\n# 邀请其他账号并授权\n\n一般一个产品会有多个不同角色的用户需要使用，如果有新用户计划使用DataTester产品，那么需要管理员邀请用户加入或者为该用户授权。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">管理员的账号在DataTester默认一定是主账号。</div>\n\n\n<span id=\"_1-1-邀请用户：即通过账号邀请\"></span>\n## SaaS\\-云原生\n\n登录DataTester控制台后，单击左侧导航栏的**全局设置**\\>**系统管理**\\>**权限管理**，在用户管理或角色管理页面添加子账号或主账号到当前项目中。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/14a59f2856224b099a820075f2824ba8~tplv-goo7wpa0wc-image.image) </span>\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">添加子账号或主账号至DataTester的项目时，可能会有时延，在操作完成后请您耐心等待几分钟，完成后被添加的账号即可进入对应DataTester项目，进行DataTester的相关操作。</div>\n\n\n\n* 添加主账号。\n\n   您需要在用户管理页面添加其他主账号，格式为：**主账号uid**。添加完成后，后续可将邀请链接发送给对应主账号进行邀请验证。\n\n* 添加子账号。\n\n   * **角色管理**：在角色管理页面添加子账号时，可直接搜索当前主账号下的子账号名。添加当前主账号下的子账号时推荐使用此种方式，更为便捷。\n\n   * **用户管理**：在用户管理页面添加子账号时，格式为：**子账号名称@主账号uid**。添加其他主账号下的子账号时，需使用此种方式。\n\n\n<span id=\"0310c00e\"></span>\n## SaaS\\-非云原生\n\n\n* 添加子账号：\n\n   **需要主账号或者集团管理员手动把子账号邀请到当前集团**\n\n   进入「集团设置」\\-\\-\\-「用户管理」\\-\\-\\-\\-找到子账号的「用户名」\\-\\-\\-\\-复制「用户名」\\-\\-\\-\\-「邀请用户」——粘贴「用户名」\\-\\-\\-根据实际情况配置角色的身份，如集团管理、管理员、成员\\-\\-\\-\\-确定后复制链接给到被邀请人\\-\\-\\-\\-\\-被邀请人进入邮箱点击接受邀请\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_6057c349d35dad314ee86f417bd0d6f4.gif) </span>\n\n* 添加主账号：\n\n   集团设置\\-\\-\\>用户管理\\-\\-\\>邀请用户\\-\\-\\>输入账号id\\-\\-\\>授权「管理员/成员」\\-\\-\\>确定后复制链接给到被邀请人\\-\\-\\>被邀请人进入邮箱点击接受邀请\n\n\n<span id=\"_2-续约合同-增购用量\"></span>\n# 续约合同/增购用量\n\n管理员需要关注产品的用量和到期情况，以免影响使用。\n\n关于如何购买产品，详细内容可查看：[付费购买 A/B 测试](https://www.volcengine.com/docs/6287/166062)";</script>

</script>

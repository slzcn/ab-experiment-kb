<script>window.DATA_BASE="../";window.INIT_DOC=72574;window.INIT_MD="> 彩云天气是一款通过人工智能技术对中央气象台的雷达数据进行挖掘，来进行分钟级别天气预报的应用。\n\n> 不同于其他天气软件只能预报一个笼统的“局部地区阵雨”，通过手机定位，彩云天气可以根据用户当前位置，做出未来一小时内几点几分下雨、什么时候雨停的精准预报，从而帮助用户决定出行方案。除此之外，彩云天气面向农业、交通等受天气影响较大的行业企业，开放API接口，提供企业级的气象服务。\n\n\n<span id=\"展示样式提升主页分享率\"></span>\n# **展示样式提升主页分享率**\n\n<span id=\"实验目标\"></span>\n## 实验目标\n\n为了优化APP的使用体验，彩云天气想了解天气数据的展示样式，以及“反馈天气”的按钮样式对用户认知的影响与使用，彩云天气计划设计一组实验。\n\n<span id=\"实验设计\"></span>\n## 实验设计\n\n\n* 对照组：天气数据的展示样式略为简单，“反馈天气”的按钮在天气数据下方；\n\n* 实验组A：新方案A，天气数据的展示更为醒目，“反馈天气”的入口按钮调整至上方；\n\n* 实验组B：新方案B，在方案A的基础上对反馈天气入口做了调整，主要用于检验按钮样式对用户认知的影响与使用。\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_d446d2946bbd0d10b33e1e0fe00b2628.png) </span>\n\n&nbsp;\n\n<span id=\"实验结论\"></span>\n## 实验结论\n\n实验运行60天后，数据显示，实验组A的主页分享率相较于对照组提高了13%，天气反馈提高了3%，综合起来比对照组效果更好。最终新用户次留相对于对照组也提升了2%。";</script>

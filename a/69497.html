<script>window.DATA_BASE="../";window.INIT_DOC=69497;window.INIT_MD="<span id=\"一-概述\"></span>\n# 功能概述\n\n**自定义过滤模版：**  可对过滤的组件配置保存至模版，可进行复用和公用。避免相同过滤纬度多次配置，而且能进行协同统一口径核对实验的结论效果。每个实验仅可配置最多10个自定义模版。\n\n**应用过滤模版：**  该app内其他实验配置好的模版规则，仅为用户配置时方便调用其他人存储的模版规则，依旧走现查询路线。每个app仅可配置最多50个自定义模版。\n\n<span id=\"二-应用场景\"></span>\n# 应用场景\n\n\n* **单实验\\-单过滤纬度举例：**  某红包活动中做了push推送a/b实验，重点渠道为oppo和vivo，每次回顾和观测指标时都会点击oppo和vivo的渠道进行筛选。\n\n* 这时可对配置一个重点渠道的过滤模版，点击保存的icon，并对该模版进行命名，即可在每次查看整体报告后，再产出oppo和vivo的过滤纬度下的报告数据，方便进行复用。\n\n* **单实验\\-多维度的组合举例** ：某优惠券下放做了可视化a/b实验，在本实验的基础上，需要展开某类一线用户的高版本专项跟踪分析，数据分析师定义了针对针对一线城市，14版本以上，新用户进行专项实验的分析，产品和运营都需要对该口径的实验数据进行查看和跟进。\n\n* 这时可分析师对该专项配置一个过滤模版，即可不用重复点击配置过滤条件，也能与产品和运营同学在该模块进行统一口径的专项复用。\n\n* **app\\-过滤模版复用举例 ：**  例如在某电商类产品需过滤某机型或低版本用户，多个实验均需要过滤，但部分实验不需要过滤。\n\n* 这时可配置低版本和低机型过滤模版，在一个实验内配置，在该app_id内均可进行复用。\n\n\n<span id=\"三-如何设置过滤模版\"></span>\n# 创建过滤模版\n\n<span id=\"_1-操作入口\"></span>\n## 操作入口\n\n**入口：**  实验列表页\\-点击某一实验报告页面\\-数据指标\\-自定义过滤模版。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/23378ea9d45c461cb007d445076022cf~tplv-goo7wpa0wc-image.image) </span>\n\n\n* **实验模版：**  该实验的管理员，创建者，协作者，保存的模版均属于该实验自定义模版。【可为用户自定义配置的模版，可以通过调用app模版后点击保存至实验自定义模版】\n\n* **应用模版：**  可调用在该app下其他实验配置的过滤模版，点击后呈现模版规则，保存后存至该实验自定义模版，app模版不包含新增自定义模版。\n\n\n<span id=\"_2-操作路径\"></span>\n## 保存新的过滤模板\n\n\n1. 配置所需的过滤维度的组合，单击**存为模板**。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/8faf96fa9ca34920a6e04a6cfb257f37~tplv-goo7wpa0wc-image.image) </span>\n\n2. 在弹出的自定义模版弹窗中配置相关参数。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/82b056721d9f4ef999aaa1ef2e82fb22~tplv-goo7wpa0wc-image.image) </span>\n\n   * 模版名称：可定义模版名称，根据业务的情况配置。例如高付费用户，重点监测渠道等。\n\n   * 模版描述：备注相关模版内容，起提示说明作用。（字数的限制在50字符内）\n\n3. 配置完上述信息，点击**确定**后，即可生成自定义过滤模版。\n\n\n<span id=\"四-使用过滤模版\"></span>\n# 使用过滤模版\n\n在实验或应用页签中，单击对应的过滤模板即可直接使用对应过滤模板。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/9b0fc4a149fb4133b17573ceba807c4b~tplv-goo7wpa0wc-image.image) </span>\n\n\n* 复用实验模版：该实验配置完的自定义模版，可以直接点击，进行复用填充至筛选维度。\n\n* 复用应用模版：在其他实验配置的自定模版，可在app模版中进行复用，方便多实验的模版协同应用。\n\n\n<span id=\"9fc7567a\"></span>\n# 查看过滤模板列表\n\n\n* 查看已创建的过滤模版列表\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b4907dc393d84fe383394adb609aa362~tplv-goo7wpa0wc-image.image) </span>\n\n* 删除过滤模版\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b671fbf8fb8147deb9850dc44cd1ddad~tplv-goo7wpa0wc-image.image) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

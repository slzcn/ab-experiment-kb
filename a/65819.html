<script>window.DATA_BASE="../";window.INIT_DOC=65819;window.INIT_MD="转化漏斗模型，本质上是分解和量化，寻找目标过程中各个环节的转化效率，从而帮助运营和产品人员找到薄弱环节、针对异常步骤调优。漏斗模型可以广泛应用于流量监控、用户运营、产品目标转化、营销广告等日常数据运营工作中，称之为转化漏斗。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">漏斗指标每个指标组仅限创建一个指标。</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">原因：漏斗指标的转化链路中也包含多个转化率指标，所以相较于其他事件指标，本身即为一组指标的概念，在报告页会按照指标粒度呈现漏斗数据和图表。</div>\n\n\n<span id=\"5829c607\"></span>\n# 背景信息\n\n<span id=\"一、概述\"></span>\n## 相关概念\n\n\n* CVR：转化率，通常是用来衡量CPA广告效果的指标，后泛化为针对某一特定目标，启动人群达成的情况。\n\n* 转化时间窗口：漏斗的各个事件必须按照配置顺序在「转化时间窗口」时间限制内完成，计为一次成功的转化。晚于转化时间窗口的后续目标事件，不计入转化。\n\n* 查询时间区间：长期观察的漏斗，通过查询时间区间，过滤目标时间区域内的转化事件形成的漏斗。\n\n\n<span id=\"652e1710\"></span>\n## 常见漏斗类型\n\n在AB实验场景下，常见的漏斗类型有如下三类：\n\n\n* 获客：此类型主要吸引新的潜在客户并将其转换为客户。\n\n   部分广告投放机构经常使用优惠或赠品吸引潜在客户提供电子邮件地址或其他联系信息等，形成客户转化。\n\n* 激活：此类型针对的是尚未真正开始高频使用产品的新客户。\n\n* 营利：此类型旨在提高现有客户的CLV。\n\n\n<span id=\"bc0e0755\"></span>\n# 新建漏斗指标\n\n\n1. 登录DataTester产品控制台后，单击左侧导航栏的**指标管理**\\>**指标组列表**，进入指标组列表页面后单击右上角的「创建指标组」进入指标组创建页面。\n\n2. 配置基本信息。选择**指标组类型**为**漏斗指标**，并配置指标组名称、指标组描述、负责人信息。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/95eebe2f313c4c48b08a8c183f18bc61~tplv-goo7wpa0wc-image.image) </span>\n\n3. 配置指标。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/88bd388b5a2b4e27ab4848d43140fd61~tplv-goo7wpa0wc-image.image) </span>\n\n   \n   |参数 |配置说明 |\n   |---|---|\n   |**指标名称** & **指标描述** |* **指标名称**：必填，建议取与事件内容相关的名称，如“点击登录按钮人均次数”，便于快速知道是关于哪个事件的指标；名称指标组内唯一，最长不超过50个字符。<br><br>* **指标描述**：选填，简述指标代表的含义、计算逻辑、用途等，可以让业务相关人员更加合理的使用指标。 |\n   |**转化窗口期** |指用户完成转化的时间，用户在设定的窗口期内完成完整的转化流程才算做转化成功。可选分钟、小时、天。 |\n   |**漏斗事件** |* 添加漏斗指标计算的漏斗事件，最少2个漏斗事件，最多10个漏斗事件。<br><br>   * 虚拟事件、一般事件、圈选实际都可作为漏斗转化事件。<br><br>   * 指标计算时，会严格遵守事件的先后发生顺序进行漏斗转化计算。<br><br>      如果实验到访者在转化时间窗口内，没有按照转化漏斗的顺序完成所有事件，不会计入转化数据统计。<br><br>* 支持为各个漏斗事件分别添加对应事件的过滤条件。 |\n   |**全局过滤条件** |支持为所有漏斗事件添加全局过滤条件，可选择通过用户属性（含预置属性和自定义属性）进行过滤。 |\n   \n\n4. 完成指标添加后，单击右上角的「保存」，完成指标组创建。\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">一旦漏斗指标开始启动收集、统计和分析数据之后，不建议编辑漏斗，修改漏斗的操作将会触发所有数据的自动更新。</div>\n\n\n<span id=\"220f2a9c\"></span>\n# 使用漏斗指标\n\n\n* 在创建实验时，可以将设置好的转化漏斗指标添加到关注指标中。\n\n* 在一个实验中，最多只能添加一个转化漏斗指标，且暂不可设置为核心指标，以及不支持进行监控报警。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。

</script>

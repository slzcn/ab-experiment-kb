<script>window.DATA_BASE="../";window.INIT_DOC=1851200;window.INIT_MD="编程实验\\-服务端实验新增“增强分流均匀性”功能，打开功能开关后，您可以针对某些实验指标或人群，在实验开始前的流量圈选上，对实验流量增强实验各个版本间的均匀性，即在实验开始前保障对应实验指标在各个实验版本上差异不显著，以便提高实验结果的可靠性。\n\n<span id=\"d1fb40af\"></span>\n# 注意事项\n\n当前仅SaaS\\-云原生环境的编程实验支持增强分流均匀性功能。\n\n<span id=\"69004b35\"></span>\n# 配置增强分流均匀性\n\n在编程实验创编的第二步，设置实验的生效策略时，您可配置是否打开增强分流均匀性开关。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/aca479570d1e434d809e82bb55c35657~tplv-goo7wpa0wc-image.image) </span>\n\n打开开关后，您可以选择均匀分流的方式是“按指标值”还是“按分群”（仅客户端实验支持）。\n\n<span id=\"f01a8ffe\"></span>\n## 按指标值均匀分流\n\n\n* 参数配置说明\n\n   \n   |参数 |配置说明 |\n   |---|---|\n   |需调平的指标 |* 在下拉框中选择需均匀分流的指标，此处选择的指标后续会默认为实验的关注指标。后续在实验开始时，这些需调平的指标在实验各版本间的流量分配上差异不显著。<br><br>* 当前最多支持选择3个指标。 |\n   |选择时间范围 |设置均匀分流的时间范围。 |\n   |重随机停止条件 |设置重随机的条件，重随机是多次运行模拟分流，寻找到条件下的最佳的分流方式。<br><br><br>* 最大运行次数：为防止重随机无限循环，设置最大运行次数。<br><br>* p\\-value：设置判断实验前差异不显著的p\\-value阈值。 |\n   \n\n* 均匀分流逻辑：此处配置的实验指标在实验开始前，在各个实验版本中没有显著差异。\n\n\n<span id=\"e4b68d12\"></span>\n## 按分群均匀分流（仅客户端实验支持）\n\n\n* 参数配置说明\n\n   \n   |参数 |配置说明 |\n   |---|---|\n   |选择分群 |在下拉框中选择需要均匀分流的人群。后续在实验开始前，会将此处选择的人群平均分配给各个实验版本中。 |\n   |重随机停止条件 |设置重随机的条件，重随机是多次运行模拟分流，寻找到条件下的最佳的分流方式。<br><br><br>* 最大运行次数：为防止重随机无限循环，设置最大运行次数。<br><br>* p\\-value：设置判断实验前差异不显著的p\\-value阈值。 |\n   \n\n* 均匀分流逻辑：此处配置的人群在各个实验版本中平均分布。\n\n\n<span id=\"5482ef1b\"></span>\n# 查看实验前的重随机状态\n\n实验创建完成后，实验在开始前的调试阶段时，会先根据上述配置开始对实验流量进行均匀性分配，您可以在实验详情查看当前的重随机状态。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/eff40ba1380b4ae58cd380e9ed6278c0~tplv-goo7wpa0wc-image.image) </span>\n\n当达到重随机停止条件时，实验才可正式开始运行。";</script>

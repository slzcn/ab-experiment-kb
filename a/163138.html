<script>window.DATA_BASE="../";window.INIT_DOC=163138;window.INIT_MD="在实验正式开启之前，通常需要先选择几名用户进入测试阶段，观察实验是否能够正常获取想要收集的数据，或客户端是否有bug等。参与这一步的用户被称为“白名单用户”。添加的白名单，主要用来调试Feature，检查白名单用户是否可以命中实验/Feature。\n\n<span id=\"65d68551\"></span>\n# 应用场景\n\n通过白名单测试来调试Feature主要有以下几个使用场景：\n\n\n* **场景1**: Feature创建人在创建过程中，添加白名单用户，用作Feature的测试验证。添加白名单后，后续无需发布Feature，白名单测试用户即可查看Feature生效情况。\n\n* **场景2:**  Feature创建后，发布之前，QA人员对该Feature进行测试验证。\n\n   * 无需发布Feature，白名单人员即可查看Feature生效情况。\n\n   * QA能便捷添加白名单人员。\n\n* **场景3:**  Feature发布后，若出现线上问题，快速回滚，回滚后想复现下这个版本的问题，已回滚的版本，可以支持加白名单测试。\n\n* **场景4:**  针对同一个Feature： ①需测试的逻辑不同/②不同的人进行各自的测试验证，比如想测试安卓生效取值1的情况或安卓生效取值2分别的情况，哪种没问题即使用哪种策略\n\n\n<span id=\"二、如何使用\"></span>\n# 新建白名单\n\n\n1. 在**配置管理**\\>**Feature列表**页面，单击Feature名称进入Feature详情页，单击顶部的**白名单测试**页签，在白名单页面右上角单击**新建白名单**。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/941325ab131f4233852026e0f9ab7fab~tplv-goo7wpa0wc-image.image) </span>\n\n2. 在弹出的白名单配置页面，配置白名单信息。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/f810e9bd7e064576bafeeb130417b450~tplv-goo7wpa0wc-image.image) </span>\n\n   核心配置参数如下。\n\n   \n   |参数 |参数说明 |\n   |---|---|\n   |**测试版本** |用户可选择测试已有的Feature版本，或选择自定义，自行修改变体和生效规则进行白名单测试。 |\n   |**失效时间** |选择失效日期(到时分秒)，只能选择7天内的日期<br><br>示例：当前是2022.03.24，可选择日期范围03.24\\-03.30<br><br>注: 选择了某天后，默认到当天23:59:59失效 |\n   |**变体信息** |可查看当前Feature的变体信息。可根据需要编辑变体名称。 |\n   |**添加白名单** |即为不同的受众规则添加对应的白名单<br><br><br>* 上方展示自定义变量和变体信息，下方展示受众规则和白名单输入框<br><br>* **自定义变量&变体信息和受众规则**：和编辑Feature一致，支持用户修改(包括：新增编辑自定义变量、增删编辑变体/变体名称、增删编辑受众规则)<br><br>* **白名单输入框**：每个发布规则(含默认发布规则)对应一个白名单输入框<br><br>* **请选择测试白名单**：支持下拉选择一组用户白名单。维护白名单的方式，请参见[用户测试白名单](https://www.volcengine.com/docs/6287/65824) |\n   \n\n3. 添加白名单并写好测试的内容后，点击下方【提交测试】按钮，即保存成功并进入测试中，白名单生效。\n\n\n<span id=\"59591338\"></span>\n# 查看Feature调试结果\n\n白名单配置成功提交测试后，大约1分钟左右，白名单用户即可登录APP查看对应的Feature配置是否生效、是否符合预期，确认Feature调试结果。\n\n<span id=\"22e00426\"></span>\n# 后续步骤\n\n完成调试后，您可以正式发布Feature，操作详情请参见[发布/回滚Feature](https://www.volcengine.com/docs/6287/66387)。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

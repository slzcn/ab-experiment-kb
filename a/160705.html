<script>window.DATA_BASE="../";window.INIT_DOC=160705;window.INIT_MD="<span id=\"_1-检查项验证\"></span>\n# 1. 检查项验证\n\n（1）SDK是否引入，可以通过远程引入和离线引入两种方式引入，推荐远程引入，如果是远程引入检查下app级别的gradle文件是否在dependencies里引入SDK\n\n（2）检查project级别gradle中allprojects的repositories中是否添加maven仓库\n\n（3）如果使用全埋点功能，确定project级别gradle中buildscript的repositories中是否添加maven仓库及dependencies是否增加plugin\n\n（4）如果使用实时埋点监测或者圈选功能，需要做以下验证[https://www.volcengine.com/docs/6285/106883](https://www.volcengine.com/docs/6285/106883)\n\n（5）验证plugin，sdk，scheme的版本号是否一致\n\n（6）检查是否集成初始化代码\n\n（7）检查appid是否为想上传应用的appid\n\n（8）检查appid后面的channel字段是否有值，这个字段必填，含义渠道，比如oppo、vivo、huawei等渠道\n\n（9）检查数据上报地址是否设置正确，saas使用默认即可，如果是私有部署需要配置私有部署的数据上传地址，在做数据上报的时候需要保证手机和电脑访问这个地址是通的，本机可以ping下域名\n\n（10）检查ab开关是否开启：config.setAbEnable(**true**)\n\n（11）检查实验代码是否调用getabcofig方法\n\n（12）以上检查验证完之后就可以调用相关api，比如分流、用户、事件等api上报\n\n<span id=\"_2-实验调试\"></span>\n# 2. 实验调试\n\n<span id=\"_2-1-为什么要调试实验\"></span>\n## 2.1 为什么要调试实验\n\n实验上线前需要保证前面的集成过程无误，上线后才能保证实验结果的科学和有效！\n\n<span id=\"_2-2-开启调试状态\"></span>\n## 2.2 开启调试状态\n\n参照[创建实验](https://www.volcengine.com/docs/6287/65809)，使实验处于“调试中” 状态，如下图所示：\n\n\n* 实验状态一共分三种：调试中、运行中、已结束。\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_b4fb8be61de973881a49fa3749a5435c.png) </span>\n\n<span id=\"_2-3-开始调试验证\"></span>\n## 2.3 开始调试验证\n\n（1）看到图片标注的两个Applog相关日志，证明sdk初始化成功（前提需要在初始化打开日志开关）\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_052aa5c3bb5cf54a692db47c04518a7e.png) </span>\n\n（2）通过获取ssid api获取ssid，由于sdk初始化之后会去id服务请求ssid，因此请在初始化完成3秒后获取；\n\n```bash\n// 请在初始化完成的3秒后开始获取，否则可能返回为空\nString ssid = AppLog.getSsid(); // 获取SSID\n```\n\n\n（3）获取到ssid后，将ssid添加到白名单的任意版本做测试，并在右下角点击\"保存\"按钮。如下：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_28b52f73a44c1f6cfeece8b7e1f45e5e.png) </span>\n\n白名单功能说明（详情请参考此文档：[https://www.volcengine.com/docs/6287/65824](https://www.volcengine.com/docs/6287/65824)）\n\n【1】白名单功能主要是用于测试调试实验/feature，添加白名单的用户会被强制命中实验，方便在测试的过程中可以测试实验版本和对照版本的效果。\n\n【2】白名单需要添加分流id，客户端实验分流id是ssid，服务端实验分流id使用的decisionid（也就是代码的第一个id），一般我们建议使用uuid，所以我们也会看到有些白名单是uuid。\n\n（4）运行app，看日志中实验参数是否为添加白名单对应的版本value，未命中实验会返回默认值。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_5b78efba0a5531e2f87c5552bba13874.png) </span>\n\n如果返回的是默认值，需要检查\n\n【1】ssid添加后是否做保存\n\n【2】ssid添加的是否正确，运行的ssid是否为添加白名单的ssid\n\n【3】abtest_config接口返回是否为200\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_624dda65f752c15e8d5e4b6c7e40dcf5.jpg) </span>\n\n【4】如果以上都不是，确定下获取实验参数的代码是否在初始化前执行\n\n（5）如果实验参数获取正常，那么整个实验调试就完成了。\n\n<span id=\"_3-数据验证\"></span>\n# 3. 数据验证\n\n<span id=\"_3-1-埋点验证功能验证\"></span>\n## 3.1 埋点验证功能验证\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">如果单独购买AB的私有部署版本，只有超管权限可以使用，如果其他成员需要验证，可以使用抓包，saas和同时购买AB和finder的可以正常使用。</div>\n\n\n功能说明：[https://www.volcengine.com/docs/6285/66054](https://www.volcengine.com/docs/6285/66054)\n\n需要按照实时埋点的相关要求集成，当集成成功后在系统管理\\-数据管理\\-一般事件，点击验证埋点，选择移动端。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_3b9aeced3df635a3ff51b2d19c715d1a.png) </span>\n\n扫码之后会实时看到上报的行为数据，左侧为实时的行为，右侧为对应行为的属性信息。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_984b5036ad8fb6b03f32371045770de0.png) </span>\n\n<span id=\"_3-2-抓包验证\"></span>\n## 3.2 抓包验证\n\n配置好抓包工具，选择数据上报地址对应的接口，查看app_log中的event_v3的接口，也可以通过抓包看abtest_config接口返回的结果。\n\nsaas地址：[http://toblog.volceapplog.com](http://toblog.volceapplog.com)，私有部署需要选择对应的数据上报地址。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_6a706f2e1ccea8a2454fe00c3d64f345.png) </span>\n\n<span id=\"_3-3-系统验证\"></span>\n## 3.3 系统验证\n\n说明：用户细查功能仅SaaS系统支持\n\n在指标管理\\-数据管理验证，上报的自定义事件和自定义属性在事件列表、事件属性和用户属性列表是否存在。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_0cfa47616f7dab8cedf8ac4f2bd09c91.png) </span>\n\n在全局设置\\-受众管理\\-用户细查，查看上报用户的详细行为，当在用户细查验证数据都OK，整个集成及上报就验证完成\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_cb9cbbb4aa1ef1f6909d6bb7d45d4644.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_73993d11fc9e061bdd84a013f4d320f5.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_0c572700940b5bfb4658e55c16ad7cc3.png) </span>\n\n&nbsp;";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

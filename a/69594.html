<script>window.DATA_BASE="../";window.INIT_DOC=69594;window.INIT_MD="DataTester为您提供灵活的用户权限管控能力，结合火山引擎访问控制产品，可实现对不同角色、不同用户的灵活权限管控。本文为您介绍DataTester的权限管控策略和授权操作指导。\n\n<span id=\"一、概述\"></span>\n# 背景信息\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\">本文为您介绍如何对DataTester进行操作账号进行权限管控。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\">在使用DataTester的过程中，由于DataTester的部分功能与DataFinder的产品功能有联动，因此为保障DataTester功能正常使用，您还需完成DataTester的跨服务访问请求授权，允许DataTester访问DataFinder服务，此操作需由主账号或拥有IAMFullAccess权限的用户进行操作，进入DataTester控制台界面后界面会有对应的弹窗提示，根据弹窗提示完成授权即可。</div>\n\n\n\n火山引擎官网提供访问控制产品能力，支持在一个主账号下创建多个子账号，可满足企业中，为不同业务团队创建不同权限限制的子账号，分别使用已购买的产品的场景。 其中A/B测试（DataTester）权限系统是以角色为基础的权限管理设计（RBAC），通过用户关联角色、角色关联权限的方法来间接地赋予用户权限。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_3ef5778b6c51b692fc6f7fb9c6dd0178.png) </span>\n\n例如，管理员（通常为主账号）购买DataTester后，可结合业务团队的实际情况，为产品团队、运营团队等业务团队分别创建IAM子账号，并为子账号授权，后续由业务团队使用子账号来操作DataTester。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">SaaS\\-云原生和SaaS\\-非云原生环境中的授权链路有所不同，您需要根据您实际使用的环境进行权限管控规划与操作，本文为您介绍的是SaaS\\-云原生场景的内容，SaaS\\-非云原生场景请参见<a href=\"https://www.volcengine.com/docs/6287/1781334\">权限管理：SaaS\\-非云原生环境</a>。如果您不确定您当前使用的是哪种环境，可参考文档<a href=\"https://www.volcengine.com/docs/6287/1544686\">SaaS云原生/非云原生&私有化环境</a>先进行确认。</div>\n\n\n\n|权限管控细分 |SaaS\\-云原生 |\n|---|---|\n|授权流程 |1. 管理员（主账号）开通DataTester后，（可选）在访问控制中创建子账号。操作详情请参见[访问控制-用户管理](https://www.volcengine.com/docs/6257/64977)。<br><br>2. 管理员规划好不同业务团队的角色和对应角色所需权限细则，根据规划创建好角色。详情请参见下文的 [角色管理](https://www.volcengine.com/docs/6287/69594#1f7ce533) 章节。<br><br>3. 管理员将其他用户添加为DataTester用户，并绑定对应角色，实现对用户授权。详情请参见下文的 [用户管理：SaaS-云原生](https://www.volcengine.com/docs/6287/69594#d1f2351d) 章节。 |\n|权限管控要点 |* 关于角色：<br><br>   * SaaS\\-云原生场景下，主账号默认为集团管理员，拥有所有权限。<br><br>   * SaaS\\-云原生场景下DataTester为您预置了部分角色，您仅需根据实际情况规划DataTester的用户角色，后续基于DataTester的角色进行权限管控。<br><br>* 关于用户授权：<br><br>   * 添加同主账号下的子账号并授权时，可通过界面提供的“批量授权”的方式，直接通过搜索的方式，批量添加多个子账号并关联角色，完成批量授权。<br><br>   * 添加跨主账号的用户（含跨主账号下的子账号）时，可通过界面提供的“邀请用户”的方式，完成跨主账号用户的授权。 |\n\n\n<span id=\"1f7ce533\"></span>\n# 角色管理\n\n登录并进入DataTester控制台后，单击左侧导航栏 系统管理 \\> 权限管理，进入权限管理页面后，单击顶部“角色管理”页签，即可进入DataTester的角色管理页面。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/0570bbe95951483582806e735d731463~tplv-goo7wpa0wc-image.image) </span>\n\n\n* DataTester为您提供了部分预置角色，您可了解预置角色的权限范围，管理员也可对各预置角色进行权限管控范围进行修改。\n\n* 如果预置角色不足以满足您当前业务场景下的权限管控诉求，您也可以添加自定义角色，并灵活设置自定义角色的权限管控范围，后续对用户授权时绑定对应的自定义角色即可。\n\n\n<span id=\"931ff3ab\"></span>\n## 预置角色\n\n系统默认提供了4个角色，管理员可以根据业务需要，修改系统默认角色的权限范围，或增加新的角色\n\n\n|角色名称 |角色描述 |\n|---|---|\n|管理员 |可以对产品成员、角色进行管理 |\n|安全员 |可以关闭所有实验，一般用于当实验影响用户正常使用时，紧急暂停实验。 |\n|实验人员 |可以创建实验、查看实验详情、实验报告等。一般推荐需要涉及开实验、修改实验信息的同学申请。 |\n|分析人员 |对于产品下实验拥有只读权限，可以编辑测试用户，无法创建实验。一般用于实验分析、实验功能验收测试等场景。 |\n\n\n<span id=\"43a3628c\"></span>\n## 添加自定义角色\n\n\n* 管理员可以根据业务需要，添加新的角色。\n\n* 每个角色都可以是指不同的功能权限，管理员可以根据实际场景，设置不同的功能组合。\n\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/700878e1a60d4443bb23e2a73e27da9b~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"d1f2351d\"></span>\n# 用户管理：SaaS\\-云原生\n\n在用户管理页面中，您可以通过“**批量授权**”或“**邀请用户**”的方式添加DataTester用户并绑定角色进行授权，其中：\n\n\n* “**批量授权**”：当您需要添加同主账号下的子账号为DataTester用户并授权时，建议使用“批量授权”的方式。\n\n* “**邀请用户**”：当您需要添加其他主账号下（含其他主账号下的子账号）为DataTester用户并授权时，建议使用“邀请用户”的方式。\n\n\n<span id=\"4a13c3a7\"></span>\n## 批量授权：添加同主账号下的子账号\n\n\n1. 在用户管理页面单击“批量授权”，在弹窗中选择需要添加的子账号名称，并配置关联的角色。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/bb66bd73f1f547aa9029c048925b7408~tplv-goo7wpa0wc-image.image) </span>\n\n   此场景下：\n\n   * “名称”需配置为同主账号下的子账号名称。\n\n   * 可一次性批量添加多个子账号。\n\n2. 完成上述配置后单击“确定”完成授权，在用户管理页面即可看到批量添加的用户信息。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/a064b533a7844eccb61199c46e906eff~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"e621c384\"></span>\n## 邀请用户：添加其他主账号（含其他主账号下的子账号）\n\n\n1. 在用户管理页面单击“邀请用户”，在弹窗中填写邀请的账号信息，并配置关联的角色。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/3ca25622ce1c462c93bcc66143d6c907~tplv-goo7wpa0wc-image.image) </span>\n\n   <div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">注意   </div>\n   \n\n   * <div data-tips=\"true\" data-tips-type=\"warning\" data-wrapper-indent=\"1\">如果您邀请的是其他主账号，“<strong>选择成员</strong>”处需配置为：<strong>主账号uid</strong>的形式。   </div>\n   \n\n   * <div data-tips=\"true\" data-tips-type=\"warning\" data-wrapper-indent=\"1\">如果您邀请的是其他主账号下的子账号，“<strong>选择成员</strong>”处需配置为：<strong>子账号名称@主账号uid</strong>的形式。   </div>\n   \n\n   * <div data-tips=\"true\" data-tips-type=\"warning\" data-wrapper-indent=\"1\">您可单击“添加新用户及角色”一次邀请多个用户   </div>\n   \n\n2. 完成上述配置后单击“确定”，界面会生成一个邀请用户的URL链接，您需单击链接复制按钮，将邀请链接转发给对应邀请的人员。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/c7d83cae253c41a79d03c6d0247a2b94~tplv-goo7wpa0wc-image.image) </span>\n\n3. 被邀请的账号用户登录火山引擎官网后，单击收到的邀请链接，等候系统进行验证，当完成邀请验证后，被邀请的用户可跳转至DataTester控制台页面，且在DataTester的用户管理页面可看到被邀请的用户信息。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

<script>window.DATA_BASE="../";window.INIT_DOC=65813;window.INIT_MD="<span id=\"一-概述\"></span>\n## **一. 概述**\n\n在创建A/B实验时，在配置实验版本步骤支持与Feature进行关联；针对**运行中**、**结束后**的独立实验，用户可以在实验详情页右上角「固化至Feature」将实验固化到Feature上。\n\n\n* 独立实验，指的是从未关联过Feature，也非从任何一个Feature创建而来的实验。实验一旦固化到Feature后，为避免冲突，无法再关联其他Feature；\n\n* 调试中的实验不支持固化至Feature。\n\n\n**前置条件：**  目前支持包含1个参数变量（boolean、string、number和json）的编程实验，允许实验固化至Feature。\n\n**权限相关** ：对实验具有「协作者权限」的用户，可以从独立实验或其中某一个效果较好的实验版本直接固化为Feature。\n\n<span id=\"二-应用场景\"></span>\n## **二. 应用场景**\n\n\n* 实验关联Feature：\n\n   * 可以更加方便管理和排查问题，如线上崩溃，进组用户不符合预期（用户反馈没有体验到功能），均可以排查配置在哪里发布了；\n\n* 实验固化至Feature：\n\n   * 已经通过AB实验验证某个版本为优胜版本，需要 **全量发布** 到线上；\n\n   * 实验结果已经非常显著，希望将优胜版本 **灰度发布** 到线上。\n\n\n<span id=\"三-固化至feature基本原则\"></span>\n## **三. 固化至Feature基本原则**\n\n实验固化至Feature的基本原则如下：\n\n\n* 当前Feature与实验是1对多的关系，允许一个Feature上开启多个同一互斥层的实验，不允许一个实验固化到多个Feature。\n\n* 运行中（含冻结/解冻）、结束的实验均可固化至Feature，草稿箱实验不可固化至Feature。\n\n* 如果一个实验固化至Feature，实验在运行中，Feature处于开启状态，那么实验命中优先级高于Feature命中优先级。具体影响如下所示：\n\n\n\n|用户 |是否为实验受众 |是否进入实验流量分配 |是否为Feature受众 |是否进入Feature流量分配 |结果 |\n|---|---|---|---|---|---|\n|user1 |是 |是 |是&否 |是&否 |命中实验 |\n|user2 |是 |否 |是 |是 |命中Feature |\n|user3 |是 |否 |是 |否 |无行为 |\n|user3 |是 |否 |否 |N/A |无行为 |\n|user4 |否 |N/A |是 |是 |命中Feature |\n|user4 |否 |N/A |是 |否 |无行为 |\n|user5 |否 |N/A |否 |N/A |无行为 |\n\n\n<span id=\"四-操作入口\"></span>\n## **四. 操作入口**\n\n**1. 实验详情页/实验报告页**\n\n在实验详情页/实验报告页，点击“固化至Feature”，如下图：\n\n\n|进行中实验 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_4de9bf3e159c9b51ada9d8eb1369db2c.png) </span> |\n|---|---|\n|已结束实验 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_33505e3e509d992c0e730a1baa07ae35.png) </span> |\n\n\n**2.实验创编页**\n\n在实验创建「配置实验版本」中，点击“关联”，如下图\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_4cdb3fe1e368307918c664904240ab4f.png) </span>\n\n<span id=\"五-固化至feature页面\"></span>\n## **五. 固化至Feature页面**\n\n在以上入口将实验固化至feature，即进入创建/编辑feature页面。后续流程，可参考[创建feature](https://www.volcengine.com/docs/6287/66385)的流程。";</script>

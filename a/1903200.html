<script>window.DATA_BASE="../";window.INIT_DOC=1903200;window.INIT_MD="MAB实验的APP/小程序优化场景支持关闭体验一致性，即允许用户进组/出组；关闭后，调优会针对实验的配置参数来进行调优，而未关闭场景下会针对实验组版本（VID）进行调优，两个场景下的实验SDK集成方式有差异。本文以客户端实验为例，为您介绍关闭体验一致性后的实验集成思路与操作要点。\n\n<span id=\"b573f351\"></span>\n# 背景信息\n\n\n|对比项 |MAB实验未关闭“体验一致性” |MAB实验关闭“体验一致性” |\n|---|---|---|\n|调优基准 |调优会针对实验的实验组版本（VID）来进行调优 |调优会针对实验的配置参数来进行调优 |\n|实验SDK集成思路 |MAB实验SDK集成方式与普通A/B实验类似，没有特殊逻辑。 |为了获取MAB实验的配置参数，并计算对应进组与转化指标，您需要客在使用该功能时，同步上报MAB实验配置参数对应的维度值到事件公共属性`mab_arm`中，确保用户后续行为事件能关联到对应的实验分组，无需手动在每个事件中添加该属性。 |\n\n\n下文为您介绍关闭“体验一致性”后，实验SDK集成的操作要点。\n\n<span id=\"9b910ba5\"></span>\n# 准备工作\n\n您需要先手动创建一个自定义的“事件公共属性”，用于后续上报MAB实验配置参数的维度值。事件公共属性的配置要求如下：\n\n\n* 事件公共属性名称：`mab_arm`。\n\n* 属性类型：必须为`string`。\n\n\n配置示例如下。\n\n<div style=\"text-align: center\">\n<img src=\"https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/ca9e8c03209949d981f91a2879eb0eb4~tplv-goo7wpa0wc-image.image\" width=\"2870px\" /></div>\n\n\n<span id=\"a4cfc7ab\"></span>\n# SDK集成\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">当前支持两种方式进行实验SDK集成，详细介绍参见下文的 <strong>集成方案说明</strong> 章节。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">以下以客户端为例为您介绍示例代码，服务端的操作类似。</div>\n\n\n\n<span id=\"74572dda\"></span>\n## 方式一：通过`getVar`获取配置val\n\n<span id=\"f40ea328\"></span>\n## 集成方案说明\n\n此种方式进行客户端集成时，需要调用两次`getVar`方法：\n\n\n* 在实际获取分流结果的时机，首先调用一次`getVar`，拿到分流结果值后将该分流结果值以事件公共属性`mab_arm`的方式进行设置。\n\n* 再紧接着调用一次`getVar`，保障第二次调用`getVar`时，能将`mab_arm`的属性值给带过来。\n\n\n建议您可以在调用第二次`getVar`时，再做业务逻辑判断。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">通过两次调用<code>getVar</code>方法，先获取分流结果并设置为公共属性，再二次调用确保属性生效，实现后续事件自动携带<code>mab_arm</code>。</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">优点：设置公共属性后，后续所有曝光事件及行为事件会自动携带<code>mab_arm</code>，无需手动处理。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">缺点：会触发两次曝光事件上报，若客户按事件量计费，需注意由此产生的成本。</div>\n\n\n\n<span id=\"31745bec\"></span>\n### 操作步骤\n\n\n1. 首次调用`getVar`，获取实验分流结果；\n\n2. 将结果通过`config`方法设置为事件公共属性`mab_arm`；\n\n3. 二次调用`getVar`，确保请求携带已设置的`mab_arm`属性，再在此回调中处理业务逻辑。\n\n\n参考代码：\n\n```JavaScript\nwindow.collectEvent('getVar', 'ab-key', 'ab-default-value', (res) => {\n    console.log(res)\n    if(res){\n\n        window.collectEvent('config',{\n            mab_arm: res, // 用户实验配置value\n        });\n        \n        window.collectEvent('getVar', 'ab-key', 'ab-default-value', (res) => {\n            // 业务逻辑处理\n            // XXX\n        })\n    }\n});\n```\n\n\n<span id=\"1d34c7ec\"></span>\n## 方式二：使用getAllVars先获取vid和配置\n\n<span id=\"294c6794\"></span>\n## 集成方案说明\n\n此种方式进行客户端集成时，建议在实验SDK接入时，先通过getAllVar获取所有的配置，遍历拿到指定配置后，设置公共属性后，然后再正常调用getVar方法并处理逻辑。\n\n\n* 您需要先调用`getAllVars`获取所有实验配置，提取目标配置值并设置为公共属性。\n\n* 再调用`getVar`处理业务逻辑，减少曝光事件上报次数。\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">事件属性的方式：</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">优点：仅触发一次曝光事件上报，降低事件量成本。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">缺点：当实验配置较多时，加载全量配置可能造成一定资源消耗，客户端内存可能会有额外占用的情况。</div>\n\n\n\n<span id=\"61783975\"></span>\n### 操作步骤\n\n\n1. 调用`getAllVars`获取所有实验配置；\n\n2. 从全量配置中提取目标实验的`val`（配置值），通过`config`方法设置为公共属性`mab_arm`；\n\n3. 正常调用`getVar`处理业务逻辑（此时请求已携带`mab_arm`）。\n\n\n参考代码：\n\n```JavaScript\nwindow.collectEvent('getAllVars', (res) => {\n    console.log(res);\n    config_val = res['test_key']\n    if(config_val) {\n        vid = config_val['vid']\n        val = config_val['val']\n        console.log(vid, val)\n        window.collectEvent('config',{\n            mab_arm: val, // 用户实验配置value\n        });\n    }\n});\n window.collectEvent('getVar', 'ab-key', 'ab-default-value', (res) => {\n    // 业务逻辑处理\n    // XXX\n});\n```\n\n\n<span id=\"0dc45b51\"></span>\n# 参考：实验SDK调试\n\n完成实验SDK集成配置后，您可进行SDK调试，验证接入的结果，各端的调试操作可参考对应端的SDK调试文档。以Web/Js SDK为例，调试的详细操作可参考：[Web/JS SDK 调试及数据验证](https://www.volcengine.com/docs/6287/159260)。";</script>

</script>

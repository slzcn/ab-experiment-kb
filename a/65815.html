<script>window.DATA_BASE="../";window.INIT_DOC=65815;window.INIT_MD="<span id=\"一、功能简介\"></span>\n# 功能简介\n\nDataTester支持在创建实验后，将实验参数固化为一个Feature，并发布到线上；或先创建好一个Feature，再手动关联到某个实验并发布到线上，这两种方式均可将Feature与AB实验进行关联，一般有以下两种应用场景：\n\n\n* 场景1：实验得出结论后，希望将效果好的一组全量到线上，此时可通过将实验固化为Feature，在得出实验结论后即可便捷地将Feature发布到全量（常用场景)。\n\n* 场景2：实验暂未得出哪组效果好，但该功能后续会继续探索，此时可先将实验参数固化为一个Feature，在FeatureFlag中管理。\n\n\n<span id=\"二、如何使用\"></span>\n# 功能入口\n\n\n* **入口1**：实验详情页右侧操作区，单击**固化至Feature**，即可从实验粒度发起固化。操作详情如下文的**配置实验固化至Feature**。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/c64f38ba5ee84caf820195b628cc776a~tplv-goo7wpa0wc-image.image) </span>\n\n* **入口2**：Feature列表页面，单击**创建关联实验**，即可将已创建的Feature关联到实验。操作详情与创建实验的操作步骤类似，在本文中不再赘述，您可查看创建实验的相关文档。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/fca0bf69be10416889787725e1206f75~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"0ca0ec5e\"></span>\n# 配置实验固化至Feature\n\n\n1. **选择全量组**。 即选择要固化(全量)哪个实验分组。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/12dfac7cf10e4aa2b284f1b78e3be71c~tplv-goo7wpa0wc-image.image) </span>\n\n   \n   |**参数** |**参数描述** |\n   |---|---|\n   |选择全量的实验分组 |选择全量实验分组后，将会以该组信息生成Feature（配置）信息；且生成的Feature支持编辑。支持选择多组按实验流量配比固化。<br><br><br>* 选择某个实验分组后，左侧展示该组的AB参数信息(不可编辑)，右侧展示以该AB参数生成的Feature信息(可编辑)。<br><br>* 注意：实验和Feature（配置）是两个独立的概念，可同时存在；若遇冲突，优先级为：实验 \\> Feature（配置）。<br><br><br>例：Test开了一个20%的实验(对照组A，实验组B，流量各10%），若将实验组全量到100%，线上20%的用户按实验策略生效，剩余80%按全量的Feature生效(即生效新策略1）。 |\n   |Feature信息编辑&确认 |确认Feature信息，也可配置Feature的生效的过滤条件。 |\n   |上线key选择&信息补充 |选择需要上线的Feature对应的实验参数，并可配置参数的标签等信息。 |\n   |不同组流量配比 |Feature的生成实验版本如果选择为**多组按实验分组流量比例固化**，则可配置多个实验版本生成的流量比例。 |\n   \n\n2. **确认生效信息**。 即确认Feature的生效信息是否符合预期。请仔细检查生成的Feature和生效规则是否符合预期，若不符合预期，可在该步骤进行更改。详细参数介绍与手动创建Feature一致，请参见[创建Feature：手动创建](https://www.volcengine.com/docs/6287/66385)。\n\n3. **发布Feature**。 即按照Feature发布流程(系统默认的工作流程)进行发布，生效到线上。操作详情请参见[创建Feature：手动创建](https://www.volcengine.com/docs/6287/66385)。";</script>

<script>window.DATA_BASE="../";window.INIT_DOC=69644;window.INIT_MD="<span id=\"_1-计费概述\"></span>\n### **1.计费概述**\n\n**a)**  **充值订购** ：您在使用火山引擎产品或服务前，需按平台支持的支付方式和币种（人民币）提前预充值，以订单方式订购产品或服务。产品或服务定价、计费规则将在您的【订购页面】展示。 任何情况下，您均应按开通、购买某项产品或服务时接受并同意的相关规则按时付款。若您以线下协议的方式开通、订购产品或服务的，具体计费结算规则以线下协议约定为准。 **无论以何种方式计费或付款，付款主体应与您向我们申请** **产品或** **服务使用的在本平台注册或实名认证的账号主体名称一致，如因付款主体与认证主体不一致导致金融合规风险，相关后果由您自行承担。** \n\n**b)**  **支付方式** ：您可通过网银，支付宝，微信，线下银行对公支付等方式向我们进行预充值（为保证产品或服务的持续性，如您选择线下支付费用的，应预留合理时间以便我们核实到账情况，以及在适用情况下计入完成您的账号充值）。您可直接使用预充值款项向我们支付相关产品或服务费用。您有义务及时支付您的到期费用，且需注意并及时补足账户余额，以确保您订购的产品或服务的持续使用，或您应及时关闭或终止相关产品或服务。\n\n<span id=\"_2-计费说明\"></span>\n### **2.计费说明**\n\n**a)    计费方式**\n\nA/B测试产品/服务目前支持【预付费和后付费】 计费方式，详细计费规则见下方说明。您需先下单预付费资源包才能使用A/B测试产品/服务，如服务期内您提前消耗完毕资源包或资源包到期后，至我方关停服务前您消耗的事件量，火山引擎平台将按照后付费价格进行计费。\n\n遵循火山引擎平台统一出账周期和扣费规则，预付费部分火山引擎平台将在您下单订购时进行扣费，后付费部分按【日】 结算，火山引擎平台将于【次日】 出具 上一自然日产品/服务账单并完成扣费。 资源包抵扣明细和账单统计数据以火山引擎系统记录为准，您可通过火山引擎控制台查询到具体数据。\n\n其中预付费是指：先付费后使用产品/服务。您可通过预充值账户余额直接下订单购买产品/服务或通过我们支持的支付方式直接下订单购买产品/服务。\n\n后付费是指：先使用产品/服务后付费。您购买的资源包提前耗尽或到期后超出的事件量，将按照后付费价格计费，相关费用将直接从您的预充值余额扣除，为保证产品/服务的正常使用，请提前向您在火山引擎注册的账户中完成预充值。如您在后付费期间欠费，需要及时补缴，补缴完成后，方可重新订购。\n\n为保护您的权益，火山引擎控制台展示账单数据最小计费单位为：百万条事件量。\n\ni.    预付费 ：\n\n\n| | | | | |\n|---|---|---|---|---|\n|&nbsp;<br><br>**计费项** |&nbsp;<br><br>**产品/服务方式** |&nbsp;<br><br>**计费标准** |&nbsp;<br><br>**服务期/授权期** |&nbsp;<br><br>**相关文档** |\n|&nbsp;<br><br>A/B测试 |&nbsp;<br><br>API/在线SDK/SaaS |&nbsp;<br><br>包年 |&nbsp;<br><br>1年 | |\n\n\n备注：\n\n\n* 预付费包年合作模式下，您订购的具体产品或服务的服务期以订购页面展示为准，服务到期的，如您所订购的产品或服务仍有未使用或消耗余额的，我方不支持您继续使用也不支持任何形式退订及退款。\n\n* 服务按【年】订购，所有规格的资源包有效期均为1年，开通时间以火山引擎平台记录为准。每个规格的资源包的有效期独立计算，多个规格资源包有效期不会叠加。\n\n* 资源包服务期限直到甲方订购的资源包服务期限到期或资源包中的服务被使用完毕为止（以前述二者早发生为准）。\n\n* 资源包支持叠加购买，若购买的多个资源包均在有效期内，按有效期先结束的优先扣减。\n\n* 资源包生效时点：支持下单订购成功后立即生效， 以您在火山引擎下单订购页面展示为准。\n\n\nii. 预付费计费报价：\n\n\n|&nbsp;<br><br>资源包<br><br>（亿条事件量） |&nbsp;<br><br>年报价<br><br>（元） |\n|---|---|\n|&nbsp;<br><br>5 |&nbsp;<br><br>¥ 80,000 |\n|&nbsp;<br><br>10 |&nbsp;<br><br>¥ 150,000 |\n|&nbsp;<br><br>20 |&nbsp;<br><br>¥ 220,000 |\n|&nbsp;<br><br>30 |&nbsp;<br><br>¥ 297,000 |\n|&nbsp;<br><br>40 |&nbsp;<br><br>¥ 356,000 |\n|&nbsp;<br><br>50 |&nbsp;<br><br>¥ 370,000 |\n|&nbsp;<br><br>60 |&nbsp;<br><br>¥ 432,000 |\n|&nbsp;<br><br>70 |&nbsp;<br><br>¥ 490,000 |\n|&nbsp;<br><br>80 |&nbsp;<br><br>¥ 536,000 |\n|&nbsp;<br><br>90 |&nbsp;<br><br>¥ 576,000 |\n|&nbsp;<br><br>100 |&nbsp;<br><br>¥ 600,000 |\n\n\nii. 后付费：  **（仅限耗尽或到期欠费情况）** \n\n您在资源耗尽或服务到期至火山引擎停止服务期间超出的事件量消耗将会产生费用，超出的部分将按后付费价格“超额累进”计费。由于火山引擎平台最小计费单位为百万条事件，小于百万的事件量将会被四舍五入。如您超额消耗150万条事件量，将按200万条事件量计费；如您超额消耗140万条事件量，将按100万条事件量计费。\n\n未免疑义，举例说明：\n\n如您超额消耗35亿条事件量，则该日账单金额=5亿条\\*5亿条事件量包单价+5亿条\\*10亿条事件量包单价+10亿条\\*20亿条事件量包单价+10亿条\\*30亿条事件量包单价+5亿条\\*40亿条事件量包单价=16000\\*5+15000\\*5+11000\\*10+9900\\*10+8900\\*5=408500元\n\n**b)**  **报价调整**\n\n您理解并认可，服务期内，我们可能酌情调整报价及收费方式，请以产品/服务相关页面最新公布的内容为准。如您不同意前述收费调整，应立即停止使用产品/服务，如您继续使用本产品/服务，则应被视为您理解并同意按公司最新公布的收费标准及收费方式支付相应费用。火山引擎产品/服务涉及收费标准或收费方式调整的，您在火山引擎官网发布计费调整相关公告生效日后下单的产品/服务，按调整后方式计费。\n\n<span id=\"_3-资源耗尽、欠费及关停\"></span>\n### **3.**  **资源耗尽、欠费及关停**\n\n**a)**  **资源耗尽和到期提醒**\n\n我们会按一定周期检查您购买A/B测试产品/服务的资源消耗情况和服务到期日期，若资源消耗至全部额度的80%，或服务到期前1个月时，火山引擎系统会不限于产品内部弹窗和页面提醒等方式向您发送资源消耗和服务到期通知。\n\n**b)**  **欠费提醒**\n\n您在资源耗尽或服务到期至火山引擎停止服务期间超出的资源消耗将会产生费用，火山引擎系统会不限于站内信/邮件等方式向您发送欠费提醒通知。\n\n**c)**  **关停步骤**\n\n如果您从资源耗尽或服务到期起【24】个小时内，仍未能完成重新订购，火山引擎将关停您在火山引擎平台服务入口。资源耗尽或服务到期【72】小时内补缴A/B测试产品/服务的欠费账单后，服务将恢复正常。当资源耗尽或服务到期超过【72】小时，视为您主动放弃火山引擎平台已订购的所的服务，火山引擎将终止所有协议服务并停止为您继续提供服务，直至补缴欠款并重新订购后，方可继续使用。\n\n<span id=\"_4-产品-服务退订\"></span>\n### **4.**  **产品/服务退订**\n\na) 预付费计费的产品/服务退订规则如下：\n\n**不支持预付退订**\n\nb) 您认可并同意，若您提前退订相关产品/服务，则我们有权以恢复原价计费、收取违约金或收取退订/退款手续费、要求您补偿已经使用的代金券等方式进行处理，具体规则以《A/B测试产品/服务等级协议》、本平台上相应活动页面或订单约定的方式为准。\n\n<span id=\"_5-账户提现\"></span>\n### **5.**  **账户提现**\n\n您火山引擎账户中充值余额如有提现需求的，可在控制台提交工单，我们将及时协助为您进行相关处理。\n\n<span id=\"_6-优惠促销\"></span>\n### **6.**  **优惠促销**\n\n火山引擎平台将时不时开展优惠或促销活动，具体活动规则和开展方式将以活动页面展示文案约定为准。\n\n<span id=\"_7-税费及发票\"></span>\n### **7.**  **税费及发票**\n\na) 除非另有说明，否则火山引擎平台上产品或服务定价均为包含增值税的金额。在服务提供过程中或产品使用期内，如遇国家税收政策调整，导致增值税税率发生变化的，增值税适用税率应按照国家税收政策相应调整，不含税价格保持不变。\n\nb) 我们支持您根据您在火山引擎账户已成功订购的订单和/或已出具的账单金额向您开具等额增值税发票，您可以通过火山引擎控制台\\-费用中心\\-发票管理或我们不时指定并及时通知的其他渠道向我们申请增值税发票，我们将在收到您的发票申请后及时向您开具增值税发票。如您使用的服务对应的服务规则与本条约定不一致或双方另有约定的，应适用该等特定服务规则或双方另行约定的条款和条件。针对周期结算服务及具体使用量，公司亦保留要求用户提供资信证明、预付款、保证金或其他公司认为必要的开通和订购条件。\n\nc) 我们将根据您购买的具体产品或服务类型，按照如下发票内容向您开具增值税发票。\n\n\n| | | | | |\n|---|---|---|---|---|\n|&nbsp;<br><br>**产品/服务** |&nbsp;<br><br>**产品或服务交付方式** |&nbsp;<br><br>**服务期或授权期** |&nbsp;<br><br>**发票内容** |&nbsp;<br><br>**税率** |\n|&nbsp;<br><br>A/B测试产品 |&nbsp;<br><br>API/在线SDK/SaaS |&nbsp;<br><br>1年 |&nbsp;<br><br>\\*信息技术服务\\*技术服务费 |&nbsp;<br><br>6% |";</script>

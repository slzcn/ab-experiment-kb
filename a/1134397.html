<script>window.DATA_BASE="../";window.INIT_DOC=1134397;window.INIT_MD="彩云天气是一款通过人工智能技术对中央气象台的雷达数据进行挖掘，来进行分钟级别天气预报的应用。\n\n不同于其他天气软件只能预报一个笼统的“局部地区阵雨”，通过手机定位，彩云天气可以根据用户当前位置，做出未来一小时内几点几分下雨、什么时候雨停的精准预报，从而帮助用户决定出行方案。除此之外，彩云天气面向农业、交通等受天气影响较大的行业企业，开放API接口，提供企业级的气象服务。\n\n<span id=\"显示样式提升会员转化率\"></span>\n# **显示样式提升会员转化率**\n\n<span id=\"实验目标\"></span>\n## 实验目标\n\n为了提升会员转化率，彩云天气对会员中心的显示样式进行了A/B实验。\n\n<span id=\"实验设计\"></span>\n## 实验设计\n\n\n* 对照组：当前彩云天气的会员中心设计；\n\n* 实验组A：调整会员样式和价格显示，确保会员状态与价格信息更显著，并新增价格折扣提示；\n\n* 实验组B：在实验组A的基础上调整会员显示方案。\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_e8173c73d99ca679794a56f0c420850e.png) </span>\n\n<span id=\"实验结论\"></span>\n## 实验结论\n\n实验运行32天后，数据显示，相比对照组，实验组A、实验组B的试用会员转化率分别提升了2%、1.2%。在会员购买转化率上，实验组A相比对照组提升了1.3%。虽然数据提升不多，但也给后续的产品迭代计划提供了一些方向。";</script>

<script>window.DATA_BASE="../";window.INIT_DOC=66387;window.INIT_MD="Feature若需生效到线上，则需要发布才能生效，如果线上的版本在发布中、已全量的状态，若出现异常，您也可以可点击“回滚”，回滚至上一个生效的全量版本，降低影响面。本文为您介绍发布和回滚Feature的操作。\n\n<span id=\"9b0c5991\"></span>\n# Feature操作场景\n\n\n|**操作场景** |**详细介绍** |**应用场景** |\n|---|---|---|\n|**发布** |将创建的Feature发布到线上，使Feature生效。 ||\n|**回滚** |指的将线上生效的变体值恢复到上一个生效全量版本的正确状态的行为。<br><br>比如线上生效的版本在发布中、已全量，可点击“回滚”，回滚至上一个生效的全量版本。 |比如正在发布的某个版本有用户的很多负面反馈，那么可以回滚到上一个生效的全量的相对安全版本。 |\n|**取消发布** |指的是已设置定时未来某个时刻发布，但是还未到该时刻，选择取消发布。 |比如已经设置定时发布，但忽然发现发布设置的变体值、发布范围等信息还有不正确的地方，那么可以选择取消该版本的发布。修改正确后，再重新发布。 |\n|**关闭Feature** |将生效中的Feature手动关闭。 ||\n\n\n<span id=\"一、功能简介\"></span>\n# 发布Feature\n\n为了保证发布安全性，降低上线风险，FeatureFlag提供了灰度发布功能，即可控制流量由小到大逐步放量，上线过程中观测用户反馈和数据指标，保证功能平滑上线。\n\n<span id=\"fa87a860\"></span>\n## 发布Feature\n\n\n1. 登录DataTester控制台后，单击左侧导航栏**配置管理**\\>**Feature列表**，进入Feature列表页后可看到所有已创建的Feature。在状态为未发布的Feature中，单击Feature名称，进入Feature详情页面。\n\n2. 在Feature版本详情页，单击右上角的**发布/回滚**按钮，在弹出的侧边页面中填写发布计划信息。\n\n   1. 确认发布信息。\n\n      根据界面提示填写**发布描述**，并查看本次发布的版本与上个版本之间的差异，确认无误后单击**提交**。\n\n      <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/554beacf7f0446ca8c33be7417deb05c~tplv-goo7wpa0wc-image.image) </span>\n\n   2. 配置增量发布方案。\n\n      \n      |**参数** |**参数说明** |\n      |---|---|\n      |**选择发布方案** |配置本次Feature发布是**手动发布**还是**定时自动发布**。<br><br><br>* 手动发布：适用于单次发布Feature。<br><br>* 定时自动发布：适用于希望定时周期性发布Feature的场景。 |\n      |**开始发布计划**&**预置发布频率** |仅**定时自动发布方案**需配置，您需要根据业务需要，选择开始发布的实际和每次发布的频率和流量，然后单击**一键设置**。<br><br>系统会根据您的设置，自动为您配置好流量至100%时，每次发布的流量控制，您也可以手动进行调整。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/dd9569ecbdb14415af73be3268cd41ed~tplv-goo7wpa0wc-image.image) </span> |\n      |**流量控制** |* 手动发布：配置Feature发布后，后续什么时间回滚改版本的Feature。到达定时下线时间后，Feature会自动回滚上一个全量版本，若无则生效本地默认值<br><br>* 定时发布：您可设置首次发布的时间和发布的频率、流量值，一键生成所有发布中的流量后，可手动调整每次发布的流量。 |\n      |**定时下线** |您可以根据业务需要，配置Feature发布后，是否需要在某个时间自动回滚该版本的Feature。<br><br>如果打开定时下线开关，到达设置的定时下线时间后，Feature会自动回滚上一个全量版本，若无则生效本地默认值。 |\n      \n\n\n<span id=\"f3184d5e\"></span>\n## 查看Feature状态\n\nFeature发布后，您可以在Feature详情页面查看Feature状态。\n\n\n* Feature发布流量未达100%时，Feature状态为**灰度中**。\n\n* Feature发布流量达100%时，Feature状态为**已全量**。\n\n\n<span id=\"_2-出现问题快速回滚\"></span>\n# 回滚Feature\n\n若在某个版本发布过程中，发现异常，可点击回滚本次发布，回滚后，将会回到（即生效）上一个已全量版本；若历史无全量版本，会关闭Feature继续生效本地默认值。\n\n<span id=\"ee17b319\"></span>\n## 回滚Feature\n\n当前版本发布中、灰度中、已全量这些已执行发布操作的版本，可以进行回滚。回滚成功，默认会立即生效上一个生效的全量版本。若线上无正在生效的全量版本，则关闭feature生效本地默认值。\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/76bd77c10a194f7fb42dc21caa90b2bc~tplv-em5hxbkur4-noop.image?width=1881&height=400) </span>\n\n<span id=\"557688bc\"></span>\n## 查看Feature状态\n\n\n* Feature回滚后，Feature本版本的状态会变为**已回滚**，生效状态为**已失效**。\n\n* 回滚的Feature版本不支持直接再次发布，如果希望再次发布Feature，您需要编辑一下Feature，生成新的Feature版本，然后重新发布新版本的Feature。\n\n\n<span id=\"e95041fe\"></span>\n# 取消发布\n\n发布方案为「定时自动发布」且当前版本待发布，可以进行取消发布。取消成功，默认会立即生效上一个生效的全量版本。若线上无正在生效的全量版本，则关闭feature生效本地默认值。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

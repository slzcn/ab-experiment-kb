<script>window.DATA_BASE="../";window.INIT_DOC=158895;window.INIT_MD="2023年及后续的更新日志可前往[SDK发版记录](https://www.volcengine.com/docs/6285/69616)页面查看详情。\n\n<span id=\"_2022年12月21日\"></span>\n## 2022年12月21日\n\n<span id=\"android-v6-14-2\"></span>\n### Android: V6.14.2\n\n\n1. 支持 RN 圈选；\n\n2. 支持用户多口径绑定 OneID；\n\n3. 扩展埋点API、支持事件级 A/B Testing 曝光设置；\n\n4. 内嵌 H5 ABTest 分流打通；\n\n5. 上报策略调整：切后台默认上报一次(和手动调用flush共享10s频控)；\n\n6. 支持商业化 IPID 需求；\n\n7. 修复已知问题；\n\n\n<span id=\"ios-v6-14-1\"></span>\n### iOS: V6.14.1\n\n\n1. 支持用户多口径绑定 OneID；\n\n2. 支持新用户模式；\n\n3. Tester H5 功能打通；\n\n4. 扩展埋点API、支持事件级 A/BTesting 曝光设置；\n\n5. 修复已知问题；\n\n\n<span id=\"reactnative-v0-2-4\"></span>\n### ReactNative: V0.2.4\n\n\n1. 支持 RN 圈选；\n\n2. element_path 增加元素所属的 pagename，增加每一级元素相对于父节点的 index；\n\n3. 极大的缩短了 reactnavigation 页面元素的路径长度；\n\n4. 对抗 js 压缩，常用的点击组件名字在 js 压缩后不再是乱码；\n\n5. 修复已知问题；\n\n\n<span id=\"_2022年11月18日\"></span>\n## 2022年11月18日\n\n<span id=\"web-v5-1-4\"></span>\n### web: V5.1.4\n\n\n1. 新增了埋点调试工具；\n\n2. 客户端打通支持了AB API的调用\n\n3. 新增了disable_ab_rest参数，用于禁止切换uuid时的AB重置\n\n\n<span id=\"_2022年10月18日\"></span>\n## 2022年10月18日\n\n<span id=\"web-v5-1-3\"></span>\n### web: V5.1.3\n\n\n1. 新增hash路由监听；\n\n2. 支持AB多链接实验回退；\n\n3. 支持AB跨域名存储数据；\n\n4. 客户端打通参数由Native变更为enable_native；\n\n\n<span id=\"_2022年10月14日\"></span>\n## 2022年10月14日\n\n<span id=\"ios-v6-13-1\"></span>\n### iOS: V6.13.1\n\n\n1. 新增拉取DataTester实验方法，支持设置超时时间以及响应回调函数；\n\n2. 埋点实时验证提示优化；\n\n3. 允许用户自定义SDK请求的部分HTTPHeader；\n\n4. 支持SDK初始化前设置用户uuid；\n\n5. 修复已知问题。\n\n\n<span id=\"android-v6-13-3\"></span>\n### Android: V6.13.3\n\n\n1. 新增应用崩溃事件采集；\n\n2. 新增禁用事件配置；\n\n3. 新增采集Google AID配置开关；\n\n4. 新增获取多实例接口；\n\n5. 新增可设置超时和回调的拉取AB实验配置接口；\n\n6. 实时埋点验证新增页面访问事件验证；\n\n7. 支持SDK初始化前设置用户uuid；\n\n8. 优化Fragment全埋点采集；\n\n9. 修复已知问题。\n\n\n<span id=\"_2022年9月5日\"></span>\n## 2022年9月5日\n\n<span id=\"ios-v6-12-5\"></span>\n### iOS: V6.12.5\n\n\n1. 新增支持激活服务自定义参数 ；\n\n2. 删除 CoreLocation 的强依赖；\n\n3. 新增对调试工具的支持；\n\n4. 修复已知问题。\n\n\n<span id=\"android-v6-12-0\"></span>\n### Android: V6.12.0\n\n\n1. 新增多实例单独配置调试日志开关和自定义打印；\n\n2. 新增对调试工具的支持；\n\n3. 修复已知问题。\n\n\n<span id=\"_2022年07月20日\"></span>\n## 2022年07月20日\n\n<span id=\"web-v5-1-2\"></span>\n### web: V5.1.2\n\n\n* 新增H5页面的埋点验证功能；\n\n\n<span id=\"_2022年07月14日\"></span>\n## 2022年07月14日\n\n<span id=\"ios-v6-11-0\"></span>\n### iOS: V6.11.0\n\n\n1. 新增支持配置全埋点事件类型；\n\n2. 新增事件名称和属性的合法性校验日志提示；\n\n3. 新增反作弊模块手动上报；\n\n4. 修复已知问题。\n\n\n<span id=\"android-v6-11-0\"></span>\n### Android: V6.11.0\n\n\n1. 新增支持配置全埋点事件类型；\n\n2. 新增事件名称和属性的合法性校验日志提示；\n\n3. 修复已知问题。\n\n\n<span id=\"_2022年06月2日\"></span>\n## 2022年06月2日\n\n<span id=\"web-v5-1-1\"></span>\n### web: V5.1.1\n\n\n* 新增曝光事件采集；\n\n* 新增追踪事件采集；\n\n* 新增事件&属性合法性校验；\n\n* 新增user_unique_id_type属性；\n\n* 新增全埋点事件单事件开关。\n\n\n<span id=\"_2022年05月23日\"></span>\n## 2022年05月23日\n\n<span id=\"ios-v6-10-0\"></span>\n### iOS: V6.10.0\n\n\n* 新增采集屏幕方向、GPS坐标；\n\n* 新增时长事件、离开页面事件时长；\n\n* 新增曝光事件采集；\n\n* 支持设置用户ID类型；\n\n* 支持清理缓存事件。\n\n\n<span id=\"android-v6-10-0\"></span>\n### Android: V6.10.0\n\n\n* 新增采集屏幕方向、GPS坐标；\n\n* 新增时长事件、离开页面事件时长；\n\n* 新增曝光事件采集；\n\n* 支持设置用户ID类型。\n\n\n<span id=\"_2022年03月29日\"></span>\n## 2022年03月29日\n\n<span id=\"ios-v6-8-1\"></span>\n### iOS: V6.8.1\n\n\n* 新增事件采集回调，支持自定义修改参数；\n\n* 新增实时埋点验证能力的国际化支持；\n\n* 修复已知问题。\n\n\n<span id=\"android-v6-9-6\"></span>\n### Android: V6.9.6\n\n\n* 适配鸿蒙系统；\n\n* 适配x5webview、支持自定义webview；\n\n* 新增忽略、手动采集页面和点击事件的能力 ；\n\n* 新增事件采集回调，支持自定义修改参数；\n\n* 新增Fragment全埋点事件开关；\n\n* 新增实时埋点验证能力的国际化支持；\n\n* 新增设置当前进程为主进程的配置；\n\n* 适配支持ASM9；\n\n* 新增OAID和Androidid的采集开关；\n\n* 剥离不必要的依赖包；\n\n* 修复已知问题。\n\n\n<span id=\"_2022年02月11日\"></span>\n## 2022年02月11日\n\n<span id=\"ios：v6-7-0\"></span>\n### iOS：v6.7.0\n\n\n* SDK支持多实例；\n\n* Alink接口attribute_data和alink_data增加加密；\n\n* 全埋点支持自定义属性；\n\n* 修复已知问题。\n\n\n<span id=\"android：v6-8-0\"></span>\n### Android：v6.8.0\n\n\n* SDK支持多实例；\n\n* Alink接口attribute_data和alink_data增加加密；\n\n* alink短链重复唤起app时都上报$invoke事件；\n\n* 支持Activity、View设置自定义埋点属性；\n\n* 增加plugin黑名单配置埋点采集；\n\n* 优化了vivo、酷派手机获取oaid的适配性；\n\n* 修复已知问题。\n\n\n<span id=\"_2021年12月13日\"></span>\n## 2021年12月13日\n\n<span id=\"ios：v6-6-0\"></span>\n### iOS：v6.6.0\n\n\n* 新增autoTrackEnabled开关；\n\n* 优化后台与被动启动；\n\n* 新增手动拉取AB实验配置的接口；\n\n* 优化Alink功能。\n\n\n<span id=\"android：v6-7-0\"></span>\n### Android：v6.7.0\n\n\n* 增加启动、推出预置事件属性；\n\n* 优化imei、meid获取，适配隐私合规；\n\n* 新增手动拉取AB实验配置的接口；\n\n* 修复已知问题。\n\n\n<span id=\"_2021年11月15日\"></span>\n## 2021年11月15日\n\n<span id=\"ios：v6-5-0\"></span>\n### iOS：v6.5.0\n\n\n* 新增全埋点事件属性；\n\n* ALink去除is_retargeting回调限制；\n\n* 新增初始化trackEventEnabled开关，关闭所有事件上报。\n\n\n<span id=\"android：v6-6-2\"></span>\n### Android：v6.6.2\n\n\n* 新增全埋点事件属性；\n\n* 新增初始化配置字段：上报事件开关；\n\n* 取消再营销的上报条件限制；\n\n* 修复已知问题。\n\n\n<span id=\"_2021年10月20日\"></span>\n## 2021年10月20日\n\n<span id=\"ios：v6-4-0\"></span>\n### iOS：v6.4.0\n\n\n* 新增app_launch和invoke事件支持$deeplink_url预置属性；\n\n* 支持事件params中增加uuid上送；\n\n* 修复已知问题。\n\n\n<span id=\"_2021年10月15日\"></span>\n## 2021年10月15日\n\n<span id=\"android：v6-5-0\"></span>\n### Android：v6.5.0\n\n\n* 新增支持多实例；\n\n* 新增app_launch和invoke事件支持$deeplink_url预置属性；\n\n* 插件plugin适配ASM7；\n\n* 修复已知问题。\n\n\n<span id=\"_2021年9月08日\"></span>\n## 2021年9月08日\n\n<span id=\"ios：v6-3-0\"></span>\n### iOS：v6.3.0\n\n\n* 新增自定义加密方式（私有化部署可用）；\n\n* 修复BDAutoTrackDefaults类文件锁crash问题；\n\n* 新增isNewUser是否为新用户。\n\n\n<span id=\"android：v6-4-1\"></span>\n### Android：v6.4.1\n\n\n* 修复launch中的uuid和ssid对应关系错误问题；\n\n* 支持oaid1.0.26版本。\n\n\n<span id=\"_2021年8月04日\"></span>\n## 2021年8月04日\n\n<span id=\"ios：v6-2-3\"></span>\n### iOS：v6.2.3\n\n\n* 支持Apple Search Ads；\n\n* 支持Alink相关数据采集。\n\n\n<span id=\"_2021年8月03日\"></span>\n## 2021年8月03日\n\n<span id=\"android：v6-3-0\"></span>\n### Android：v6.3.0\n\n\n* 增加切换用户时，设置数据发送方式；\n\n* 增加Debug模式下关闭日志；\n\n* 支持Alink相关数据采集。\n\n\n<span id=\"_2021年7月21日\"></span>\n## 2021年7月21日\n\n<span id=\"小程序：v1-7-0\"></span>\n### 小程序：v1.7.0\n\n\n* 增加自定义WebID；\n\n* 增加默认从接口获取utms相关数据；\n\n\n<span id=\"_2021年6月18日\"></span>\n## 2021年6月18日\n\n<span id=\"android：v6-2-0\"></span>\n### Android：v6.2.0\n\n\n* 增加获取applog版本号接口；\n\n* 修复埋点检测中断问题；\n\n* 切换用户支持清除A/B配置缓存信息开关，默认为true；\n\n\n<span id=\"_2021年6月15日\"></span>\n## 2021年6月15日\n\n<span id=\"ios：v6-2-0\"></span>\n### iOS：v6.2.0\n\n\n* 支持四位版本号上报接口；\n\n* 支持内嵌H5关闭全埋点事件采集；\n\n* 切换用户支持清除A/B配置缓存信息开关，默认为true；\n\n\n<span id=\"_2021年5月15日\"></span>\n## 2021年5月15日\n\n<span id=\"android：v6-1-2\"></span>\n### Android：v6.1.2\n\n\n* 把scheme拆成单独模块，可不设置scehem参数；\n\n* 初始化时增加开关控制是否采集内嵌H5数据；\n\n* 发送事件之前更新access字段；\n\n* 切换用户时清除vid缓存。\n\n\n<span id=\"_2021年4月15日\"></span>\n## 2021年4月15日\n\n<span id=\"android：v6-0-2\"></span>\n### Android：v6.0.2\n\n\n* 支持profile用户属性上报；\n\n* 支持内嵌H5从Native上报埋点；\n\n* 修复客户端时间上报问题。\n\n\n<span id=\"ios：v6-0-0\"></span>\n### iOS：v6.0.0\n\n\n* 支持profile用户属性上报；\n\n* 支持内嵌H5从Native上报埋点；\n\n* 优化切换用户时AB数据更新策略。\n\n\n<span id=\"_2021年02月08日\"></span>\n## 2021年02月08日\n\n<span id=\"android：v5-5-6\"></span>\n### Android：v5.5.6\n\n\n* 支持首次触发事件标记$is_fisrt_time上报；\n\n* 增加游戏侧埋点模版接口；\n\n* 修复playesession计算时长问题。\n\n\n<span id=\"ios：v5-6-5\"></span>\n### iOS：v5.6.5\n\n\n* 支持首次触发事件标记$is_fisrt_time上报；\n\n* 增加游戏侧埋点模版接口；\n\n* 优化获取AB配置时机,SDK初始化后立即获取。\n\n\n<span id=\"_2021年01月06日\"></span>\n## 2021年01月06日\n\n<span id=\"ios：v5-6-4\"></span>\n### iOS：v5.6.4\n\n\n* 支持bitcode；\n\n* 支持platform端属性；\n\n* 提供类方法单独初始化和单独启动SDK的接口。\n\n   +[BDAutoTrack sharedTrackWithConfig:]\n\n   +[BDAutoTrack startTrack]\n\n\n<span id=\"_2020年12月30日\"></span>\n## 2020年12月30日\n\n<span id=\"android：v5-5-5\"></span>\n### Android：v5.5.5\n\n\n* 增加platform属性，作为端；\n\n* AB配置客户端缓存机制变化；\n\n* 特殊情况webview刷新的问题。\n\n\n<span id=\"_2020年12月04日\"></span>\n## 2020年12月04日\n\n<span id=\"微信小程序：v1-3-11\"></span>\n### 微信小程序：v1.3.11\n\n\n* 新增enable_filter_crawler参数，开启后过滤爬虫场景(scene:1129，目前只有微信小程序有此场景)。\n\n\n<span id=\"_2020年11月25日\"></span>\n## 2020年11月25日\n\n<span id=\"android：v5-5-1\"></span>\n### Android：v5.5.1\n\n\n* 新增车机圈选数据采集；\n\n* 适配信通院1.0.23SDK。\n\n\n<span id=\"ios：v5-6-3\"></span>\n### iOS：v5.6.3\n\n\n* 优化GlobalDID算法。\n\n\n<span id=\"_2020年11月20日\"></span>\n## 2020年11月20日\n\n<span id=\"微信小程序：v1-3-6\"></span>\n### 微信小程序：v1.3.6\n\n\n* 优化mp_platform字段类型为string。\n\n\n<span id=\"_2020年10月20日\"></span>\n## 2020年10月20日\n\n<span id=\"android：v5-4-1\"></span>\n### Android：v5.4.1\n\n\n* 新增profile接口(私有化环境支持)；\n\n* 新增vue支持\\-Cordova。vue打包App；\n\n* 修复埋点检测相关问题。\n\n\n<span id=\"_2020年10月19日\"></span>\n## 2020年10月19日\n\n<span id=\"微信小程序：v1-3-6\"></span>\n### 微信小程序：v1.3.6\n\n\n* 新增utm参数处理；\n\n* 优化profile数据类型检测(私有化V3.X版本)。\n\n\n<span id=\"_2020年09月22日\"></span>\n## 2020年09月22日\n\n<span id=\"微信小程序：v1-3-0\"></span>\n### 微信小程序：v1.3.0\n\n\n* 新增自动上报predefine_pageview_hide(页面退出)事件。\n\n\n<span id=\"_2020年09月11日\"></span>\n## 2020年09月11日\n\n<span id=\"微信小程序：v1-2-0\"></span>\n### 微信小程序：v1.2.0\n\n\n* 新增profile功能，提供profileSet、profileUnset等方法(私有化V3.X版本)。\n\n\n<span id=\"_2020年08月29日\"></span>\n## 2020年08月29日\n\n<span id=\"android：v5-3-0\"></span>\n### Android：v5.3.0\n\n\n* 新增全埋点开关；\n\n* 修复无法自定义消息头；\n\n* 听云集成兼容。\n\n\n<span id=\"_2020年08月20日\"></span>\n## 2020年08月20日\n\n<span id=\"ios：v5-4-1\"></span>\n### iOS：v5.4.1\n\n\n* 新增query加密；\n\n* 修复私有化环境下，服务端回包解析失败问题。\n\n\n<span id=\"_2020年07月29日\"></span>\n## 2020年07月29日\n\n<span id=\"ios：v5-4-0\"></span>\n### iOS：v5.4.0\n\n\n* 优化IDFA采集策略，提供单独采集。\n\n\n<span id=\"_2020年07月28日\"></span>\n## 2020年07月28日\n\n<span id=\"android：v5-2-6\"></span>\n### Android：v5.2.6\n\n\n* 修复切换uuid时机导致崩溃问题。\n\n\n<span id=\"_2020年07月13日\"></span>\n## 2020年07月13日\n\n<span id=\"android：v5-2-4\"></span>\n### Android：v5.2.4\n\n\n* 修复oaid；\n\n* 修复启动崩溃问题。\n\n\n<span id=\"_2020年06月19日\"></span>\n## 2020年06月19日\n\n<span id=\"ios：v5-3-1\"></span>\n### iOS：v5.3.1\n\n\n* 新增自定义公共属性Custom header接口；\n\n* 新增立即上报数据flush接口。\n\n\n<span id=\"_2020年06月17日\"></span>\n## 2020年06月17日\n\n<span id=\"android：v5-2-1\"></span>\n### Android：v5.2.1\n\n\n* 优化uuid切换后，origin_session_id策略；\n\n* 修复了bug。\n\n\n<span id=\"_2020年06月15日\"></span>\n## 2020年06月15日\n\n<span id=\"ios：v5-3-0\"></span>\n### iOS：v5.3.0\n\n\n* 优化uuid切换缓存策略；\n\n* 修复了bug。\n\n\n<span id=\"_2020年06月09日\"></span>\n## 2020年06月09日\n\n<span id=\"android：v5-2-0\"></span>\n### Android：v5.2.0\n\n\n* 新增实时埋点检测上报接口；\n\n* 优化uuid切换用户后，增加session策略。\n\n\n<span id=\"ios：v5-2-0\"></span>\n### iOS：v5.2.0\n\n\n* 新增实时埋点检测上报接口；\n\n* 修复了bug。\n\n\n<span id=\"_2020年04月28日\"></span>\n## 2020年04月28日\n\n<span id=\"android：v5-1-2\"></span>\n### Android：v5.1.2\n\n\n* 优化弹窗模拟功能；\n\n* 修复bug。\n\n\n<span id=\"ios：v5-1-0\"></span>\n### iOS：v5.1.0\n\n\n* 优化setAbEnable接口；\n\n* 修复了bug。\n\n\n<span id=\"_2020年04月12日\"></span>\n## 2020年04月12日\n\n<span id=\"android：v5-0-0\"></span>\n### Android：v5.0.0\n\n\n* 优化圈选数据采集能力；\n\n* 支持私有化A/B请求。\n\n\n<span id=\"ios：v5-0-0\"></span>\n### iOS：v5.0.0\n\n\n* 优化ABTestConfigValueForKey接口defaultValue问题。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

<div class="app" id="app" style="display:none">

    </div>
    <div class="cats" id="cats"></div>
    <div class="write-btn" id="writeBtn">✍ 写新文章</div>
    <a class="admin-link" id="adminLink" href="admin.html">⚙ 管理后台</a>

  </aside>

  <main>
    <div class="top">
      <div class="searchbox">
        <span class="si">🔍</span>
        <input id="q" placeholder="搜索实验设计"

</div>

  </div>

      <textarea id="edMd" placeholder="# 标题&#10;&#10;正文用 Markdown 书写，支持 **加粗**、列表、表格、代码块…&#10;&#10;## 小节&#10;- 要点一&#10;- 要点二"></textarea>
      <div class="ed-actions">

      </div>

    </div>

      <div class="md" id="edPrevBody"></div>
    </div>
  </div>
</div>

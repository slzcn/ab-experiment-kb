<script>window.DATA_BASE="../";window.INIT_DOC=72129;window.INIT_MD="Feature 和 实验发布之后，即等同于发布了新版本，即使是小流量实验，也意味着可能对线上业务产生影响。DataTester的指标监控模块提供了报警监控的能力，可以对上线之后的功能进行监控，当业务指标或技术指标出现变动时，报警任务会及时触达到对应的负责人。本文为您介绍创建报警任务的操作指导。\n\n<span id=\"0433b607\"></span>\n# 创建报警\n\n<span id=\"_1-新建报警任务\"></span>\n## 1. **新建报警任务**\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_baf57f1b93865d386ad9fcf0178f23ce.png) </span>\n\n<span id=\"_2-选择报警类型\"></span>\n## 2. **选择报警类型**\n\n总共有两种报警类型：大盘报警和实验报警\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_548dbcea6953e5cf859e28e6c5be3859.png) </span>\n\n\n* 大盘报警：系统会根据整体大盘数据触发报警\n\n* 实验报警：系统会将关联实验关联的数据整合成指标，按照指标定制报警\n\n\n<span id=\"_3-报警任务-基本配置\"></span>\n## 3. **报警任务\\-基本配置**\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_44426889bc076ae5cee937a98ffaadab.png) </span>\n\n\n* 基本信息：填写任务名称、任务说明等\n\n* 报警等级：可以选择对应的报警等级（注意、警告、危急）\n\n* 任务间隔：1小时、24小时，每隔所选间隔时间就会完成一次报警策略的计算，以判断是否要报警\n\n* 关联场景：对应所选的报警场景\n\n\n<span id=\"_4-报警任务-设置报警策略\"></span>\n## 4. 报警任务\\-设置报警策略\n\n\n|配置参数 |大盘报警配置说明 |实验报警配置说明 |\n|---|---|---|\n|界面示例 |<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_697bc794c6fdc56240a6605bcdc08f07.png) </span> |<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/7b61a776d2724416b8508c6d357de884~tplv-goo7wpa0wc-image.image) </span> |\n|报警规则 |选择报警规则：<br><br><br>* **同时满足以下规则**：代表只有满足所有报警策略的情况下才会触发报警。<br><br>* **满足下述一条规则**：代表只要满足其中一个报警策略就会触发报警。 ||\n|报警策略 |* 指标名称：选择需要监控的指标。<br><br>* 报警策略：支持绝对数值、同比、环比的报警策略。<br><br>* 支持添加多条报警策略，多个报警策略对最终报警触发的影响由上述报警规则的配置结果决定。 |* 指标名称：选择需要监控的指标。<br><br>* 报警策略：仅支持对比对照组的报警策略。<br><br>   * 您需要根据业务监控需要配置对比对照组的指标变动百分比数值。<br><br>   * 支持勾选变化显著时报警，勾选后，只有数据变化存在统计学显著的概念才会触发报警。<br><br>* 支持添加多条报警策略，多个报警策略对最终报警触发的影响由上述报警规则的配置结果决定。 |\n\n\n<span id=\"_5-报警任务-通知方式配置\"></span>\n## 5. 报警任务\\-通知方式配置\n\n报警方式：飞书、钉钉、企业微信、邮件\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_e9fbbecb7b557e8fa502b14bd9b1c04d.png) </span>\n\n\n* [飞书](https://www.feishu.cn/hc/zh-CN/articles/360024984973)：进入飞书群组中，打开会话设置，找到群机器人，并点击添加机器人。选择 自定义机器人 加入群组\n\n* [企业微信](https://work.weixin.qq.com/api/doc/90000/90136/91770)：进入微信群聊中，打开会话设置，找到群机器人，并点击右上角的添加，选择 机器人 添加到群聊\n\n* [钉钉](https://developers.dingtalk.com/document/robots/custom-robot-access)：打开机器人管理页面。以PC端为例，打开PC端钉钉，点击头像，选择机器人管理。在机器人管理页面选择自定义机器人。在配置安全设置时，选择自定义关键词，填写报警作为关键词，否则可能会造成报警信息丢失\n\n* 完成机器人配置后，将对应WebHook地址复制进对应输入框，并妥善保存好此地址，避免地址泄露后被恶意调用发送垃圾消息\n\n\n<span id=\"三-报警任务管理\"></span>\n# 报警任务管理\n\n点击任务名称进入任务详情可以进行编辑修改、删除等管理操作。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_9b078dc633f5910ca2c0d3a3a4045d23.png) </span>\n\n<span id=\"四-接收组管理\"></span>\n# 接收组管理\n\n在接收组中可以创建、编辑、删除接收组。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_e96b5bffc6469cf7ef8ea96aea3b5b2e.png) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

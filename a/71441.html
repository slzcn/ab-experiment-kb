<script>window.DATA_BASE="../";window.INIT_DOC=71441;window.INIT_MD="<span id=\"_1-界面组成\"></span>\n## 1. 界面组成\n\n\n* 搜索推送任务：可输入任务ID、推送任务名称、创建日期进行搜索\n\n* 新建推送任务\n\n* 新建推送实验：仅DataTester支持，点击后可跳转至创建推送实验流程\n\n* 列表包含：任务ID、推送任务名称、任务类型（可筛选）、创建时间、更新时间、创建人（可筛选）、发送范围、任务状态（可筛选）、操作\n\n   * 以创建时间从近到远排序展示\n\n   * 任务类型：包含单次推送、例行推送、自动推送\n\n   * 任务状态：包含待审批、被驳回、运行中、暂停中、已结束\n\n   * 发送范围：包含测试、正式两种，选择测试范围，将只会对「通用设置\\-测试白名单」中的用户进行推送；选择正式范围，任务正常进行推送；**注意先选择「发送范围」，再「审批」任务，发送范围的设置才能正常生效**\n\n   * 操作：包含审批、驳回、修改、复制、删除、暂停、数据报表、激活\n\n      * 不同任务状态，可操作项不同\n\n      * 不同操作项，创建人、管理员、集团管理员的权限不同\n\n* 支持翻页\n\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_97b5079d7ba86cefb3eeda729f36b0e8) </span>\n\n<span id=\"_2-新建推送任务\"></span>\n## 2. 新建推送任务\n\n推送任务分为手动推送和自动推送，其中手动推送分为单次推送和例行推送，各推送模式的含义如下，按需进行选择即可\n\n\n* 单次推送：对圈选的目标用户进行「立即推送」或「定时推送」\n\n* 例行推送：对圈选的目标用户进行「定时循环推送」\n\n* 自动推送：基于事件、时间设置推送时机，对满足推送时机的人群进行推送\n\n\n<span id=\"_2-1-推送目标\"></span>\n### **2.1 推送目标**\n\n点击上图界面的“+新建推送任务”，选择手动推送或自动推送\n\n\n* 推送任务名称：设置任务名称，同一应用内不可重复\n\n* 推送人群：\n\n   * 全部用户：最近90天活跃的用户（活跃用户定义为主动触发任意事件的用户）\n\n   * 用户分群：仅「手动推送」支持，已经保存好的用户分群，默认会与「最近90天活跃的用户」取交集\n\n   * 细分用户：根据时间、事件、属性圈选用户，逻辑同「用户分群」模块，默认会与「最近90天活跃的用户」取交集\n\n* 推送平台：仅「手动推送」支持，支持设置推送平台为全部、Android、iOS\n\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_9ab67c1e4c166deb9ffb69680ec34393) </span>\n\n<span id=\"_2-2-推送时机，仅「自动推送」支持\"></span>\n### **2.2 推送时机，仅「自动推送」支持**\n\n推送时机设置分为两阶段，一阶段为用户触发某些行为，二阶段为用户的后续动作，满足两阶段条件的用户会运行推送动作，其中，\n\n\n* 一阶段：用户触发某些行为可分为三类，细分如下，\n\n   * 触发单个行为：用户发生某个行为即为满足条件\n\n   * 触发多个行为：用户在「设置时间」内，按任意顺序完成「设置行为」达到「设置次数」，即为满足条件\n\n   * 按顺序触发多个行为：用户在「设置时间」内，按顺序完成「设置行为」，即为满足条件\n\n* 二阶段：用户的后续动作也可分为分类，细分如下，\n\n   * 等待一段时间：满足一阶段条件后，等待「设置时间」，即为满足条件\n\n   * 未触发特定行为：满足一阶段条件后，在「设置时间」内未触发「设置行为」，即为满足条件\n\n   * 触发特定行为：满足一阶段条件后，在「设置时间」内触发「设置行为」，即为满足条件\n\n\n您可设置自动推送任务的截止时间，不选择则默认从创建任务时间开始，365天后截止\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_3f17ee0a1757c1c8ae726190cf2863db) </span>\n\n<span id=\"_2-3-推送动作\"></span>\n### **2.3 推送动作**\n\n分为设置推送内容和任务设置，其中推送内容会区分AppPush和Webhook；\n\n<span id=\"_2-3-1-apppush推送内容\"></span>\n#### 2.3.1 AppPush推送内容\n\n主要包含选择通道、所选通道的推送配置、测试用户预览。其中，\n\n\n* 选择通道：支持极光、个推、友盟三种通道，需要您在「推送通道管理」处正确配置相应通道才可进行推送\n\n* 通道的推送配置\n\n   * **极光**\n\n      * 推送标题：消息的标题\n\n      * 推送内容：消息的内容\n\n      * 角标数字增加：角标数字增加值，此字段目前仅针对华为 EMUI 8.0 及以上、小米 MIUI 6 及以上设备生效； 此字段如果不填，表示不改变角标数字（小米设备由于系统控制，不论推送走极光通道下发还是厂商通道下发，即使不传递依旧是默认+1的效果。）；建议配置为1； 举例：此字段设置为1，应用之前角标数为2，发送此角标消息后，应用角标数显示为3。\n\n         * Android应用入口：桌面图标对应的应用入口Activity类，比如“com.test.badge.MainActivity”，**仅Android推送需要配置且生效，需配合角标数字一起使用**\n\n      * 后续动作\n\n         * 启动应用：将会以**通知消息**（包含消息标题和内容）下发\n\n         * 自定义行为：将会以**通知消息**（包含消息标题、消息内容和自定义key、value）+**透传消息**（包含消息标题、消息内容和自定义key、value）下发。**透传消息不会展示到通知栏上，消息内容会透传给 App，需要 App 自行处理**\n\n            * 透传消息：可设置自定义key、value，消息推送至客户端后，可通过极光SDK获取该部分消息\n\n            * 转厂商通知：自定义消息转厂商通知下发，针对 Android 设备，如果 APP 长连接不在线，则消息没法及时的下发，可通过厂商通道下发以**厂商通知**形式展示，及时提醒到用户。**仅支持Android系统，需要极光VIP账号**\n\n               * uri_activity：指定跳转页面；该字段用于指定开发者想要打开的 activity，值为 activity 节点的 “android:name”属性值；适配华为、小米、vivo厂商通道跳转\n\n               * uri_action：指定跳转页面；该字段用于指定开发者想要打开的 activity，值为 \"activity\"\\-\"intent\\-filter\"\\-\"action\" 节点的 \"android:name\" 属性值；适配 oppo、fcm跳转\n\n      * 更多选项\n\n         * Android\n\n            * 提醒：通知提醒方式\n\n            * 优先级：通知栏展示优先级\n\n            * 可设置APP在前台时依然展示提醒\n\n         * iOS：支持选择生产环境或开发环境，默认推送生产环境；可在极光控制台配置APNs生产和开发证书，消息将使用所选环境进行推送\n\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_78b7f08b0a0212083dcbaa98d7908a6e) </span>\n\n\n* **个推**\n\n   * 后续动作：\n\n      * 打开应用首页：**点击通知打开应用模板，支持通知消息**\n\n         * 推送标题：消息的标题\n\n         * 推送内容：消息的内容\n\n         * 更多选项\n\n            * Android\n\n               * 提醒：通知提醒方式\n\n               * 通知渠道重要性：不同重要性具有不同的展示形式\n\n               * 通知可清除\n\n            * iOS\n\n               * 角标数字增加：下发消息后，角标数字增加值，建议设置为1\n\n      * 自定义动作：**自定义消息模板，支持通知消息 + 透传消息**\n\n         * 描述\n\n         * 透传消息：设置透传消息key、value，**透传消息不会展示到通知栏上，消息内容会透传给 App，需要 App 自行处理**\n\n         * 更多选项\n\n            * 推送标题：通知消息的标题\\*\\*（该通知消息将从厂商通道下发）\\*\\*\n\n            * 推送内容：通知消息的内容\n\n            * Android\n\n               * 厂商通知类型\n\n                  * Intent：点击通知打开应用特定页面，intent格式必须正确且不能为空，长度 ≤ 4096；示例：intent:#Intent;component=你的包名/你要打开的 activity 全路径;S.parm1=value1;S.parm2=value2;end 参考：[个推文档中心](https://docs.getui.com/getui/mobile/vendor/androidstudio/?id=doc-title-5)\n\n                  * url：点击通知打开链接，长度 ≤ 1024\n\n            * iOS\n\n               * 角标数字增加：下发消息后，角标数字增加值，建议设置为1\n\n   * 保持离线消息：设置离线是否也进行推送\n\n   * 保持离线消息过期时间：消息离线存储有效期\n\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_978c2d3b9e461ccafac62579e2a80677) </span>\n\n\n* **友盟**\n\n   * 后续动作\n\n      * 打开应用：**通知消息模板，支持通知消息**\n\n         * 推送标题：消息的标题\n\n         * 推送内容：消息的内容\n\n         * 更多选项\n\n            * Android\n\n               * 提醒：通知提醒方式\n\n            * iOS\n\n               * 提醒：通知提醒方式\n\n               * 角标数字增加：下发消息后，角标数字增加值，建议设置为1\n\n               * 静默推送\n\n      * 自定义动作：**自定义消息模板，Android支持透传消息，iOS支持通知消息+透传消息**\n\n         * 描述\n\n         * 透传消息：设置透传消息key、value，**透传消息不会展示到通知栏上，消息内容会透传给 App，需要 App 自行处理**\n\n         * 更多选项\n\n            * iOS\n\n               * 提醒：通知提醒方式\n\n               * 角标数字增加：下发消息后，角标数字增加值，建议设置为1\n\n               * 推送标题：通知消息的标题\\*\\*（该通知消息将从APNs通道下发）\\*\\*\n\n               * 推送内容：通知消息的内容\n\n               * 静默推送\n\n   * 保持离线消息：是否设置消息过期时间\n\n   * 保持离线消息过期时间：设置消息过期时间，默认72小时\n\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_630780af28a8fc1f4787e955a053f4e1) </span>\n\n\n* 测试用户预览：填入测试用户的口径id（webhook通道输入uuid），发送预览消息\n\n\n<span id=\"_2-3-2-webhook推送内容\"></span>\n#### 2.3.2 Webhook推送内容\n\n主要包含选择通道、参数配置、测试用户预览，其中参数配置项与所选通道在「推送通道管理」中的设置一一对应\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_1771a279f0175094c0521df893a82377) </span>\n\n<span id=\"_2-3-3-任务设置\"></span>\n#### 2.3.3 任务设置\n\n\n* 任务类型：**仅手动推送支持**\n\n   * 单次推送\n\n      * 推送时间：立即推送、定时推送（可设置日期、小时、分钟，到时间开始推送）\n\n   * 例行推送\n\n      * 循环周期：可设置每日、每周、每月的固定时间，以及周期的起止时间\n\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_77ee1c2ebffb006f356b777d012d9507) </span>\n\n\n* 频控规则：\n\n   * 全局频控：默认频控是每个用户1天内，最多接收20条Push，且每小时最多1条，可在「通用设置」页面修改\n\n   * 不受频控：1个用户在1天内可能会收到多条Push\n\n* 任务参与限制：**仅自动推送支持**，设置是否允许用户在完成该任务后再次进入。如果开启该项，则可能会多次触达同一用户\n\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_123967cb25d2f0e4a5ca32ca04ab2cfc) </span>\n\n以上内容填写完毕，即可点击“提交”，跳转到推送任务管理页，任务进入待审批状态，不会进行推送，**选择正确的发送范围**，在管理员审批后，任务将会进入运行状态，正常推送\n\n<span id=\"_3-任务操作\"></span>\n## 3. 任务操作\n\n\n* **查看**\n\n\n可点击“操作\\-查看”查看推送任务的配置内容\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_e5b6aac1f0fa1dfe039f396a4b2eb20d) </span>\n\n\n* **复制**\n\n\n可点击“操作\\-复制”复制对应推送任务\n\n\n* 复制任务名称会添加“（复制）”后缀\n\n* 复制任务为待审批状态\n\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_01c266d7967d40c9e6a6038c49ca8f0c) </span>\n\n\n* **修改**\n\n\n**状态为「已结束」的任务不支持修改，其他状态的任务均可以修改**\\*\\*，运行中的任务需先暂停再修改\\*\\*\\*\\*；\\*\\*可点击“操作\\-修改”进行推送任务的修改\n\n\n* 可对之前的任务配置进行修改\n\n* 修改并提交后，任务重新进入待审批状态，不会进行推送，在管理员审批后，任务将会进入运行状态，正常推送\n\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_79ce63821376d8c8ac3402f104945dd2) </span>\n\n\n* **删除**\n\n\n\\*\\*只有创建人、管理员、集团管理员可以删除任务，任务删除后无法恢复；\\*\\*可点击“操作\\-删除”，删除推送任务；\n\n\n* 删除后，推送任务停止工作，后续将不再进行推送；正在进行的推送也将停止，停止过程将持续几分钟。\n\n* 任务被清理，后续任务列表不再展示该任务\n\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_8815ad6e282c44d44417c74d09f127df) </span>\n\n\n* **暂停、激活**\n\n\n\\*\\*只有创建人、管理员、集团管理员可以激活任务；\\*\\*可点击“操作\\-暂停/激活”，即可暂停或激活推送任务。\n\n\n* 暂停：暂停后，当前任务正在进行的推送以及后续推送全部停止，任务状态变更为暂停中\n\n* 激活：激活后，当前任务正常运行，任务状态变更为运行中\n\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_2e809960dcafd3d075206a2eec4ff4ad) </span>\n\n\n* **审批、驳回**\n\n\n**只有管理员、集团管理员可以审批或驳回任务，**  可点击“操作\\-审批/驳回”，即可审批或者驳回推送任务。\n\n\n* 审批：审批后，任务状态变成运行中\n\n* 驳回：驳回后，任务状态变成被驳回，被驳回的任务可进行任务查看、修改后发起下一次审批\n\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_fbfe036fd0034d55ba1a1a47e21f2531) </span>\n\n<span id=\"_4-不同任务状态说明\"></span>\n## 4. 不同任务状态说明\n\n\n* 待审批：任务设置/修改完成，但不运行，需要审批后任务运行并进行推送\n\n* 被驳回：任务不运行，需对任务配置进行修改，重新发起审批\n\n* 运行中：任务运行中，根据任务配置进行推送，并统计数据\n\n* 暂停中：任务暂不运行，需“激活”后重新开启运行并推送\n\n* 已结束：任务不再继续运行并推送，统计数据正常进行\n\n\n<span id=\"_5-数据报表\"></span>\n## 5. 数据报表\n\n\n* 可点击“操作\\-数据报表”，即可进入数据报表页面\n\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_c4e68671cac78d96533315f752b42321) </span>\n\n推送数据报表如下：\n\n\n* 数据统计范围：时间支持选择「启动后」至今/7天/30天、最近x天、选择时间范围。数据按天级展示。\n\n* 分析图：推送效果的数据概览，以柱状图/折线图展示；图上方的卡片展示最近一天的指标\n\n* 详细数据：以表格展示统计数据，支持下载\n\n* 报表指标说明：\n\n   * 计划触发人次：计划发送的推送数量\n\n   * 实际触达人次：实际送达的推送数量\n\n   * 点击人次：用户点击的推送数量\n\n   * 成功发送人次：成功发送的推送数量\n\n   * 到达率：实际触达人次/成功发送人次\n\n   * 点击率：点击人次/实际触达人次\n\n\n注：计划触发人次和成功发送人次之间有时会存在折损，其原因一是调用通道接口进行实际发送之前，可能被各种原因过滤掉：如触发频控、推送用户信息校验不通过等；二是被通道拦截、调用通道接口返回失败而未被发送。\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_7fac64b3ebd9c7b172a9c055e0980822) </span>\n\n\n* Webhook数据报表（webhook报表与其他通道报表有所不同：展示了成功发送人次指标，未展示到达和点击等指标，后续会进行支持）\n\n   * 计划触发人次：计划发送的推送数量\n\n   * 成功发送人次：成功发送的推送数量\n\n   * 成功发送率：成功发送人次/计划触发人次\n\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_a407c884287cccd3ab9a333db4a3bccf) </span>\n\n\n* 多任务分流/任务赛马数据报表\n\n   * 任务1、任务2...对应推送任务中设置的实验组1、实验组2...\n\n   * 下拉框中支持选择不同指标：「计划触发人次、实际触达人次、点击人次」，以及「到达率和点击率」，指标含义同上\n\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_a1341651f3e2dda49f256135ae80e2e7) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

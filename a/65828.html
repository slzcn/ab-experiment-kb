<script>window.DATA_BASE="../";window.INIT_DOC=65828;window.INIT_MD="在系统管理\\-系统设置模块，火山引擎A/B测试为您提供了【实验创建/编辑】、【置信水平】和【系统提示】的全局设置能力。系统设置中的参数设置成功，将会对当前应用内新建实验以及历史的“草稿+调试中+运行中”的实验生效，历史“已结束”的不会发生改变。\n\n<span id=\"二-功能介绍\"></span>\n# 功能介绍\n\n<span id=\"_1-实验创建-编辑\"></span>\n## 1. 实验创建/编辑\n\n<span id=\"_1-1-支持去除被动事件\"></span>\n### 1.1 进组用户剔除被动事件触发条件\n\n在火山引擎A/B测试，实验进组条件可以按【主动任意事件和被动事件】进行区分，您可对【被动事件】设置为不作为进组标准，使实验数据满足您真实业务情况。\n\n您可对【进组用户剔除被动事件触发条件】这一选项进行设置， 系统默认为\"否\", 如修改为\"是\"的话则在进组用户中, 将剔除仅触发被动事件的用户。\n\n关于主动事件和被动事件，详细可参考：[被动和关系事件](https://www.volcengine.com/docs/6287/877770)\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_a82a89444d0539892570777ea8a74900) </span>\n\n<span id=\"_1-2-置信水平\"></span>\n### 1.2 置信水平\n\n<span id=\"_1-2-1-置信水平概述\"></span>\n#### 1.2.1 置信水平概述\n\n置信水平（也称置信度、置信系数、统计显著性），指实验组与对照组之间存在真正性能差异的概率，实验组和对照组之间衡量目标（即配置的指标）的差异不是因为随机而引起的概率。置信水平使我们能够理解结果什么时候是正确的， **对于大多数企业而言，一般来说，置信水平高于95％都可以理解为实验结果是正确的。因此，默认情况下，**   **「A/B 测试」产品** **将置信水平参数值设置为95%，您也可按需设置。** \n\n在A/B实验中，由于我们只能抽取流量做小样本实验，样本流量的分布与总体流量不会完全一致。这就导致没有一个实验结果可以100%准确——即使数据涨了，也可能仅仅由抽样误差造成，跟我们采取的策略无关。在统计学中， **置信度的存在就是为了描述实验结果的可信度。** \n\n<span id=\"_1-2-2-置信水平与实验结果\"></span>\n#### 1.2.2 置信水平与实验结果\n\n实验结果需要从两方面评估：第一是数据结果的涨跌；第二是判断是否可以相信数据结果，即结果是否“显著”。\n\n**如何理解数据是否显著呢？** \n\n\n* A/B实验是一种小流量实验，我们需要从总体流量中抽取一定量的样本来验证新策略是否有效。抽样过程中，样本并不能完全代表整体。样本分布不均导致实验结果可能出现一种情况——“我采取的策略其实没用，但是实验结果显示策略有效”。\n\n* 统计学告诉我们，这种错误不可能完全避免，但是我们可以通过一些统计学方法，在得出实验数据结果的过程中，计算上述错误发生的概率。换句话说，我们可以判断我们的实验有百分之多少的概率是可信的。\n\n\n根据业界的公认标准，在A/B实验中，如经统计学计算，实验数据结果有95%以上的概率可信，我们便称数据结果是显著的。这样的数据结果才能够用于判断实验假设是否成立。\n\n<span id=\"_1-2-3-使用场景\"></span>\n#### 1.2.3 使用场景\n\n**置信水平参数值，可以理解为是一个标准、一个门槛，同一个实验，门槛越高显著的指标就越少，门槛越低显著的指标就越多。置信水平参数值设置的越高，实验结果越可信。** \n\n\n* 如果你想显著的指标数量越多，那么可以设置较低的置信水平参数值，但实验结果的可信度就会降低；\n\n* 如果你想提升实验结果的可信度，那么可以设置较高的置信水平参数值，但显著的指标数量就会越少。\n\n\n<span id=\"_1-2-4-如何操作\"></span>\n#### 1.2.4 如何操作\n\n火山引擎AB测试默认置信水平参数值为95%，您可按需进行设置，可设置的参数值为99%、95%、90%、80%，点选百分比数字后保存即可。\n\n\n* 权限：只有集团管理员、应用管理员才可设置该参数值。\n\n* 说明：置信水平参数设置成功，将会对当前应用内新建实验以及历史的“草稿+调试中+运行中”的实验生效，历史“已结束”的不会发生改变。\n\n\n如下图：\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_d4abd61a6c78116017dcf61b7d127d81) </span>\n\n<span id=\"_1-3-系统设置\"></span>\n### 1.3 系统设置\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/fd92b5e4cf8d44cab1918d0cfc7211c1~tplv-goo7wpa0wc-image.image) </span>\n\n\n* 在系统设置处，您可对**单个实验支持最多的指标**数进行设置，上限为1000。\n\n* 在系统设置处，您可以为全局实验设置一个**上报指标数据截止时间**，即后续实验结束后，实验指标数据计算任务可以持续执行天数，支持设置0~7天，默认为0天。\n\n   配置完成后，后续实验结束后的N天，依旧会自动计算实验指标结果数据，以满足部分指标结果比较滞后的实验场景，例如，进行对转化量有影响的实验时，在实验结束的一两天后依旧会有转化数据，因此需在实验结束后的一两天继续计算实验指标——转化数据的结果，来评估分析实验结果，此场景下您可以在系统设置中设置上报截止时间为2天，并在实验结束后2天查看实验报告和指标数据。\n\n* 在系统设置处，您可以设置**指标查询时间偏移**参数，如果您在实验开启后发现有某些指标事件的数据明显偏少，可能是由于指标事件的触发早于实验曝光事件的触发，此种场景下您可以通过设置指标查询时间偏移来进一步提高查询指标的正确性。\n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\"><strong>指标查询时间偏移</strong>当前仅支持能计算置信度的指标。   </div>\n   \n\n   例如，将参数设置为3秒，则后续指标计算时会包含实验曝光事件前3秒内上报的指标事件数据。\n\n\n<span id=\"_2-系统提示\"></span>\n## 2. 系统提示\n\n火山引擎AB测试支持您自定义设置无权限提示信息，您可通过修改文案，对您无权限的用户/同事进行提示和引导。具体位置如下图：\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_3a8da00786aab785aae74ac199848a8c) </span>\n\n<span id=\"ddf55ea0\"></span>\n## 3. 浏览器新标签页打开设置\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/8186e90867a64375920f489f365d9708~tplv-goo7wpa0wc-image.image) </span>\n\n配置在各个列表页面进入数据页面时，是否需要打开新的页面。";</script>

<script>window.DATA_BASE="../";window.INIT_DOC=65833;window.INIT_MD="<span id=\"一-概述\"></span>\n# 概述\n\n权限管理，一般指根据系统设置的安全规则或者安全策略，用户可以访问而且只能访问自己被授权的资源。\n\n**为什么要做权限管理？** \n\n\n* 将功能按不同层级或者属性进行划分，更细粒度的进行权限管控，可以一定程度上增强数据的安全性，增强相关业务稳定性；\n\n* 权限不同，可以查看、操作的项目不同，避免由于误操作带来的一系列负面问题；\n\n* 职责不同所需要的页面/信息不同，提供最有效的信息可提升操作效率，避免无关页面带来的干扰。\n\n\n「A/B 测试」为用户提供「实验」资源实体的细粒度权限管控，新创建的实验默认为公共实验。\n\n<span id=\"二-权限模型\"></span>\n# 权限模型\n\n权限模型分为「公共实验」和「私有实验」两类，不同角色与不同权限模型之间的关系表如下：\n\n\n|分类 |**集团管理员** |**应用管理员** |**实验创建者** |**普通用户** |\n|---|---|---|---|---|\n|公共实验 |查看权限 |查看权限 |查看权限 |查看权限 |\n|私有实验 |查看权限 |查看权限 |查看权限 |不可见 |\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\"><strong>实际上授权只是针对普通用户/角色的授权，可授予「查看权限」。</strong></div>\n\n\n\n|**操作类型** |**查看权限** |\n|---|---|\n|查看实验详情 |支持 |\n|查看实验报告 |支持 |\n|查看实验操作历史 |支持 |\n|关联Feature |不支持 |\n|冻结/解冻实验 |不支持 |\n|修改实验 |不支持 |\n|诊断实验 |不支持 |\n|复制实验 |不支持 |\n|调试实验 |不支持 |\n|开启实验 |不支持 |\n|结束实验 |不支持 |\n|删除实验 |不支持 |\n|权限管理 |不支持 |\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\"><strong>集团管理员</strong> ，指的是当前集团的管理员，比如“Demo体验”集团的集团管理员。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\"><strong>应用管理员</strong> ，指的是当前集团接入应用的应用管理员。比如“Demo体验”集团下“电商APP、教育APP、小程序Demo、网页端Demo、移动端Demo”应用的应用管理员。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"tip\"><strong>角色</strong> ：可在“集团管理\\-角色管理”添加角色，可给普通用户开通某个应用的“应用管理员、成员”权限。</div>\n\n\n\n<span id=\"三-操作入口\"></span>\n# 操作步骤\n\n<span id=\"dfbe8c60\"></span>\n## 操作入口\n\n\n1. 登录控制台后，在左侧导航栏选择“A/B测试\\>实验列表”。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/365afb750a1b447cbcee479d2f56a3b6~tplv-goo7wpa0wc-image.image) </span>\n\n2. 在实验列表页，点击“操作”栏的“更多\\-权限管理”。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/f053521fe7684d65ace001485b3cda1b~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"efb0cea0\"></span>\n## 为公共实验添加权限\n\n\n1. 在“实验权限管理”弹窗，选择“公共实验”。\n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\"><strong>公共实验：</strong>当前集团可访问该应用的用户默认拥有「查看权限」。   </div>\n   \n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/e8e8821f5cfb4dc6afc40429064a9314~tplv-goo7wpa0wc-image.image) </span>\n\n2. 如需添加某用户为该实验的协作者，需要将该用户设置为实验人员即可，可点击左侧的“系统管理\\>权限管理”。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/f831647a2c4d4c5289923e00398061fb~tplv-goo7wpa0wc-image.image) </span>\n\n3. 在“权限管理”页面，点击“邀请用户”，在对话框中选择成员，设置对应角色为“实验人员”，然后点击“确定”。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/5ddbaa587fc14be0bd91c8eab0110e37~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"五-私有实验\"></span>\n## 为私有实验添加权限\n\n\n1. 在“实验权限管理”弹窗，选择“私有实验”。\n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\"><strong>私有实验：</strong>当前集团当前应用的“集团管理员、应用管理员、实验创建者”默认拥有「权限」。   </div>\n   \n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/8925c2d0c9ae4d8ba23678dc2a10f6af~tplv-goo7wpa0wc-image.image) </span>\n\n2. 在“实验权限管理”弹窗，点击“添加用户角色”。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/a6ea1842760c415f80085b8c6163574c~tplv-goo7wpa0wc-image.image) </span>\n\n3. 选择用户/角色，开启查看权限，然后点击“确定”。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/2b73825b06af495db081f4afff40b91c~tplv-goo7wpa0wc-image.image) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

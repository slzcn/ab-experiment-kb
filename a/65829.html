<script>window.DATA_BASE="../";window.INIT_DOC=65829;window.INIT_MD="<span id=\"一-概述\"></span>\n# 一. 概述\n\n本文档提供「A/B测试」应用中开放接口的说明。\n\n可用范围包括：\n\n\n* 实验信息：实验配置、实验过滤参数\n\n* 报告信息：实验指标报告、实验留存报告\n\n* 实验操作：创建实验、修改实验状态\n\n* 其他：指标列表、互斥组列表\n\n\n<span id=\"二-联系开通\"></span>\n# 二. 联系开通\n\n为了保证您和用户的数据安全，开放接口权限默认是关闭的。\n\n在开始使用之前，您需要联系我们开通。（您可以通过服务对接的飞书/微信群或页面右下角的在线客服与我们取得联系）\n\n\n* 开通后，我们会为您提供导出所需的AK/SK，收到后请务必妥善保管和使用。\n\n* 开通时请和对接人员确认接口使用额度，超出限额的接口请求将被拒绝。\n\n\n<span id=\"三-使用方式\"></span>\n# 三. 使用方式\n\n<span id=\"sdk接入\"></span>\n## SDK接入\n\n实验数据的导出需要接入openapi的相关sdk，我们提供了Python SDK和Java SDK，SDK下载地址：\n\n[SDK下载](https://byterangers.bytedance.com/byterangers/api/doc?id=88&op_type=download_doc_by_id&sdk_type=openapi)。\n\nPython SDK下载完成后在shell中执行命令完成安装\n\n```Plain Text\n# 需要 python 2.7\neasy_install rangersdk-0.0.1-py2.7.egg\n```\n\n\n<span id=\"调用示例\"></span>\n## 调用示例\n\n```Plain Text\nfrom rangersdk.client import RangersClient\nimport ujson\n\nak = '{使用AK替换}'\nsk = '{使用SK替换}'\nbc = RangersClient(ak, sk)\n\n# Get Method Example\ndef test1():\n    params = {'{key}': '{value}'} # 参数，选填\n    resp = bc.data_tester('/openapi/v1/164287/details', params=params, method='get') # get请求方法\n    print(resp.content) # 打印返回结果\n    res = resp.json() # 将结果转化为json格式\n    self.assertEqual(200, res['code'], 'err message: {}'.format(res['message']))\n\n# Post Method Example\ndef test2():\n    params = {'{key}': '{value}'} # 参数，选填\n    resp = bc.data_tester('/openapi/v1/openapi-test', body=ujson.dumps(params), method='post') # post请求方法\n    print(resp.content) # 打印返回结果\n    res = resp.json() # 将结果转化为json格式\n    self.assertEqual(200, res['code'], 'err message: {}'.format(res['message']))\n```\n\n\n<span id=\"四-可用接口\"></span>\n# 四. 可用接口\n\n<span id=\"获取实验配置\"></span>\n## 获取实验配置\n\n接口描述：获取实验相关配置的基础信息\n\n请求路径：`/openapi/v1/apps/<app_id>/experiment/<experiment_id>/details`\n\n请求方式：GET\n\n请求所需参数：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|app_id |int |应用的id |\n|experiment_id |int |实验的id |\n\n\n接口返回值：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |object |接口返回实验信息配置 |\n\n\ndata信息：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|id |int |实验的flight_id |\n|name |string |实验名称 |\n|start_ts |string |实验开始时间 |\n|end_ts |string |实验结束时间 |\n|owner |string |实验创建人的user_id |\n|description |string |实验描述 |\n|status |int |实验状态，0:已结束 1:进行中 2: 待调度 3:测试中 4:草稿中 |\n|type |string |实验类型，client:客户端 server:服务端 |\n|mode |int |实验模式，1:编程实验 2:多链接实验 3:可视化实验 |\n|layer |object |实验所在层相关属性，详见示例描述 |\n|version_resourse |float |该实验分配的流量比例 |\n|versions |list |实验版本相关属性，详见示例描述 |\n|metrics |list |实验指标相关属性，详见示例描述 |\n|features |object |实验feature相关属性，详见示例描述 |\n|filter |string |用户过滤条件 |\n|whitelist |list |用户白名单，详见示例描述 |\n\n\n接口返回示例：\n\n```Plain Text\n{\n  'code'：200\n  \"data\": {\n    \"id\": 3799, # 实验ID\n    \"name\": \"实时指标报告测试\", # 实验名称\n    \"start_ts\": \"2020-07-08 11:39:02\", # 实验开始时间\n    \"end_ts\": \"2021-07-08 11:39:02\", # 实验结束时间\n    \"owner\": \"203870\", # 创建者\n    \"description\": \"\", # 实验描述\n    \"status\": 1, # 实验状态，0:已结束 1:进行中 2: 待调度 3:测试中 4:草稿中\n    \"type\": \"client\", # 实验类型，client:客户端 server:服务端\n    \"mode\": 1, # 实验模式，1:编程实验 2:多链接实验 3:客户端实验\n    \"layer\": { # 实验层\n      \"name\": \"互斥组1\", # 互斥层名称\n      \"status\": 1, # 互斥层状态，0:已关闭 1:已开启\n       \"description\": \"LS的测试场景五实验时创建时默认层\", # 互斥层描述\n       \"type\": \"NULL\" # 互斥层类型，default: mutex: NULL: \n    },\n    \"version_resource\": 1.0, # 流量分配\n    \"versions\": [\n      {\n        \"id\": 8572, # 版本ID\n        \"name\": \"对照版本\", # 版本名称\n        \"type\": 0, # 版本类型，0:对照版本 1:实验版本\n        \"config\": { # 版本配置\n          \"hello12341\": false\n        },\n        \"description\": \"\", # 版本描述\n        \"weight\": 30 # 版本权重\n      },\n      ...\n    ],\n    \"metrics\": [\n      {\n        \"id\": 10065, # 指标ID\n        \"name\": \"测试指标\", # 指标名称\n        \"metric_description\": \"测试指标描述\", # 指标描述\n        \"type\": \"major\", # 指标类型，major:核心 normal:普通\n        \"support_conf\": true, # 是否可计算置信度\n        \"offline\": false, # 是否离线指标\n        \"dsl\": {\n          \"queries\": [ # 事件详情\n            {\n              \"show_label\": \"A\",\n              \"event_type\": \"origin\", # 事件类型\n              \"show_name\": \"活跃均次（pv/au）\", # 事件属性\n              \"event_name\": \"predefine_pageview\", # 事件名称\n              \"filters\": [ # 事件过滤条件\n                {\n                  \"property_operation\": \"!=\", # 过滤操作符\n                  \"property_type\": \"event_param\", # 过滤条件的类型\n                  \"property_name\": \"title\", # 过滤条件的名称\n                  \"property_values\": [ # 过滤条件的值\n                    \"这是一个title\"\n                  ]\n                }\n              ],\n            },\n            ...\n          ]，\n          \"event_relation\": \"A*1\" #  混合指标的关系\n        },\n        \"composed\": false # 是否是组合指标\n      },\n    ],\n    \"features\": {\n      \"id\": -1, # 关联feature的ID，无则-1\n      \"name\": \"\",\n      \"key\": \"\"\n    },\n    \"filter\": \"\", # 用户过滤条件\n    \"whitelist\": [ # 各实验白名单\n      {\n        \"对照版本\": [\n          {\n            \"ssids\": [\"bbc33321-4352-4b95-91d1-lishanlishanlishan\"], # 用户ssid\n            \"id\": 81, # 白名单ID\n            \"is_deleted\": false,\n            \"name\": \"李珊\", # 创建者\n            \"description\": \"\", # 白名单描述\n            \"tags\": [] # 白名单tag\n          }，\n        ]\n      },\n    ],\n  }\n  'message'：'success'\n}\n```\n\n\n<span id=\"获取实验过滤参数\"></span>\n## 获取实验过滤参数\n\n接口描述：获取过滤实验报告的参数，使用该接口返回的参数对实验报告与实验留存进行筛选\n\n请求路径：`/openapi/v1/apps/<app_id>/filters`\n\n请求方式：GET\n\n请求所需参数：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|app_id |int |应用的id |\n\n\n接口返回值：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |object |接口返回过滤参数信息 |\n\n\ndata信息：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|filter_rule |list |接口返回的过滤参数列表 |\n\n\nfilter_rule信息：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|key |string |过滤参数主键名称 |\n|label |string |过滤参数显示的名称，可理解为参数描述 |\n|type |string |参数类型 |\n|preset |int |是否为默认参数，区别于用户自定义属性 |\n|values |list |过滤参数可选值 |\n|mode |string |过滤参数的模式，填空:input 枚举:select 混合:multiple |\n|operators |list |过滤参数可选操作 |\n\n\n接口返回示例：\n\n```Plain Text\n{\n  \"code\": 200\n  \"data\": {\n    'filter_rule': [ # 过滤参数 \n      {\n        \"key\": \"referrer\", # 过滤参数key\n        \"label\": \"前向地址\",  # 过滤参数名称\n        \"type\": \"string\", # 参数类型\n        \"preset\": 1, # 是否为默认参数\n        \"values\": [\n          {\n            'value': 'https://www.sogou.com/web?query=xxxx' # value值\n            'label': 'https://www.sogou.com/web?query=xxxx' # value名称\n          },\n          ...\n        ],\n        'mode': 'multiple', # 过滤参数的模式，填空:input 枚举:select 混合:multiple\n        'operators': [ # 过滤参数操作方式\n          {\n            \"label\": \"≠\", # 操作符\n            \"value\": \"ne\", # 操作代码\n            \"desc\": null, # 操作描述\n            \"mode\": \"select\" # 操作的输入方式，填空:input 枚举:select\n          }\n        ]\n      },\n      ...\n    ]\n  },\n  'message': 'success'\n}\n```\n\n\n过滤参数使用方式：\n\n```Plain Text\nfliters = [\n  {\n    'type': 'string',\n    'op': 'ne',\n    'key': 'app_channel',\n    'value': '23' / ['a', 'b'] # 单值/多值筛选\n  },\n  ...\n]\n```\n\n\n<span id=\"计算实验指标\"></span>\n## 计算实验指标\n\n接口描述：计算并返回实验指标报告\n\n请求路径：`/openapi/v1/apps/<app_id>/experiment/<experiment_id>/metrics`\n\n请求方式：GET\n\n请求所需参数：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|app_id |int |应用的id |\n|experiment_id |int |实验的id |\n|report_type |string |报告类型，day:天级 hour:小时级 five_minute:五分钟级 |\n|start_ts |string |计算起始时间（时间戳） |\n|end_ts |string |计算结束时间（时间戳） |\n|filters |list |实验过滤参数，从“获取实验过滤参数”接口处获取 |\n\n\n接口返回值：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |object |接口返回实验指标信息 |\n\n\ndata信息：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|report_type |string |报告类型，day:天 hour:小时 five_minute:5分钟 |\n|versions |list |实验版本信息，详见示例描述 |\n|metrics |list |实验相关指标，详见示例描述 |\n|start_ts |string |计算起始时间（时间戳） |\n|end_ts |string |计算结束时间（时间戳） |\n|user_data |object |各版本总进组人数 |\n|calculation_results |object |实验指标计算结果，详见示例描述 |\n\n\n接口返回示例：\n\n```Plain Text\n{\n  \"code\": 200,\n  \"data\": {\n    \"report_type\": \"day\", # 报告类型，day:天 hour:小时 five_minute:5分钟\n    \"versions\": [\n      {\n        \"id\": 8572, # 版本ID\n        \"name\": \"对照版本\", # 版本名称\n        \"config\": {\n          \"hello12341\": false\n        },\n        \"type\": 0, # 版本类型，0:对照版本 1:实验版本        \n        \"weight\": 0  # 版本权重\n      },\n    ],\n    \"metrics\": [\n      {\n        \"id\": 10065,\n        \"name\": \"测试指标\",\n        \"metric_description\": \"测试指标描述\",\n        \"type\": \"major\", # 指标类型，major:核心 normal:普通\n        \"support_conf\": true,\n        \"offline\": false,\n        \"composed\": false\n      },\n      ...\n    ],\n    \"start_ts\": 1594179542, # 实验开始时间\n    \"end_ts\": 1597247999, # 实验结束时间\n    \"user_data\": {\n      \"8572\": 415248, # 实验总进组人数\n      \"8573\": 415261\n    },\n    \"calculation_results\": {\n      \"10013\": { # 指标ID\n        \"8572\": { # 实验版本ID，以下类似数字代表该实验相对于另一实验计算得出的值\n          \"m\": 1.367, # \n          \"p\": {\n            \"8573\": -1 # -1为不存在，小于0.05则置信\n          },\n          \"change\": 0.09640731971910832, # 变化值\n          \"change_rate\": {\n            \"8573\": -0.00053 # 变化率\n          },\n          \"conf_interval\": {\n            \"8573\": [0,0] # 置信区间\n          },\n          \"half_interval\": {\n            \"8573\": 0 # 置信区间中点\n          },\n          \"confidence\": {\n            \"8573\": 3 # 置信情况，1:正向 2:负向 3:不置信 4:新开实验 \n                      # 5:数据待更新 6:置信度无法计算 7:没有用户进组 8:已暂停\n          }，\n          \"mde\": 0.012623757553642818 # 最小观测差值MDE(minimum detectable effect)\n        },\n        ...\n      },\n      ...    \n    }\n  },\n  \"message\": \"success\"\n}\n```\n\n\n<span id=\"计算实验留存\"></span>\n## 计算实验留存\n\n接口描述：计算并返回实验指标报告\n\n请求路径：`/openapi/v1/apps/<appid>/experiment/<experiment_id>/retention`\n\n请求方式：GET\n\n请求所需参数：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|app_id |int |应用的id |\n|experiment_id |int |实验的id |\n|start_ts |string |计算起始时间（时间戳） |\n|end_ts |string |计算结束时间（时间戳） |\n|filters |list |实验过滤参数，从“获取实验过滤参数”接口处获取 |\n\n\n接口返回值：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |object |接口返回实验留存信息 |\n\n\ndata信息：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|start_ts |string |计算起始时间（时间戳） |\n|end_ts |string |计算结束时间（时间戳） |\n|versions |object |实验版本信息，详见示例描述 |\n|confidence_level |int |置信度 |\n|calculation_details |object |实验留存每日数据，详见示例描述 |\n|calculation_results |object |实验留存统计数据，详见示例描述 |\n\n\n接口返回示例：\n\n```Plain Text\n{\n  \"code\": 200\n  \"data\": {\n    \"available_start_ts\": 1594137600, # 实验开始时间\n    \"available_end_ts\": 1597247999, # 实验结束时间\n    \"start_ts\": 1594656000, # 开始时间\n    \"end_ts\": 1597247999, # 结束时间\n    \"versions\": [\n      {\n        \"id\": 8572, # 版本ID\n        \"name\": \"对照版本\", # 版本名称\n        \"config\": {\n          \"hello12341\": false\n        },\n        \"type\": 0, # 版本类型\n        \"weight\": 0 # 版本权重\n      },\n    ],\n    \"confidence_level\": 90, # 置信度\n    \"calculation_details\": { # 留存每日数据\n      '当日进组用户': { # \n        '8672': [ # 实验ID\n          [\n            1597161600, # 日期（时间戳）\n            5, # 留存率，-1表示不存在，“当日进组用户”时该值等于新进组人数\n            5.0 # 新进组人数，-1表示不存在\n          ],\n          ...\n        ],\n        ...  \n      },\n      ...\n    }，\n    'calculation_results': { # 留存统计数据\n      \"次日留存\": {\n        \"data\": { # 留存率\n          \"8572\": 0.0022,\n          \"8573\": 0.0022\n        },\n        \"confidence\": { # 置信情况，1:正向 2:负向 3:不置信 4:新开实验 \n                        # 5:数据待更新 6:置信度无法计算 7:没有用户进组 8:已暂停\n          \"8572\": {\n            \"8573\": 0\n          },\n          \"8573\": {\n            \"8572\": 0\n          }\n        },\n        \"p\": { # p值\n          \"8572\": {\n            \"8573\": 0.998318\n          },\n          \"8573\": {\n            \"8572\": 0.998318\n          }\n        },\n        \"half_interval\": { # 置信区间中点\n          \"8572\": {\n            \"8573\": 0.17499327964828007\n          },\n          \"8573\": {\n            \"8572\": 0.17504366124523396\n          }\n        },\n        \"change_rate\": { # 变化率\n          \"8572\": {\n            \"8573\": -0.000288\n          },\n          \"8573\": {\n            \"8572\": 0.000288\n          }\n        },\n        \"conf_interval\": { # 置信区间\n          \"8572\": {\n            \"8573\": [\n              -0.175281,\n              0.174705\n            ]\n          },\n          \"8573\": {\n            \"8572\": [\n              -0.174756,\n              0.175332\n            ]\n          }\n        },\n        \"nums\": { # 当日总计新进组人数\n          \"8572\": 107,\n          \"8573\": 107\n        }\n      },\n    }\n  },\n  'message': 'success'\n}\n```\n\n\n<span id=\"创建实验\"></span>\n## 创建实验\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">开放接口所创建的实验，仅管理员可编辑</div>\n\n\n接口描述：创建实验\n\n请求路径：`/openapi/v2/apps/<app_id>/experiments`\n\n方法: POST\n\n请求所需参数：\n\n\n|**参数名称** |**参数类型** |**是否必填** |**描述** |**备注** |\n|---|---|---|---|---|\n|app_id |int |是 |应用的id | |\n|name |string |是 |实验名称 |不能与已有实验重名，长度50字符 |\n|mode |int |是 |实验类型 |目前只能是 1 |\n|description |string |否 |实验描述 |长度1000字符 |\n|endpoint_type |int |是 |实验类型 |客户端实验：0，服务端实验：1 |\n|duration |int |是 |实验时长 |单位天，[1, 365]，整数 |\n|major_metric |int |是 |核心指标 ID |目前只支持一个核心指标 |\n|metrics |list |是 |指标ID列表 |1.必须包含【major_metric】 id，2.必须包含【必看指标】id，3.如果有漏斗类型指标只能有一个 |\n|versions |list |是 |实验版本 |version结构，版本数\\>=2 |\n|layer_info |object |否 |互斥组 |layer_info结构 |\n\n\nversion结构：\n\n\n|**参数名称** |**参数类型** |**是否必填** |**描述** |**备注** |\n|---|---|---|---|---|\n|type |int |是 |对照版本/实验版本 |0：对照版本1：实验版本 |\n|name |string |是 |版本名称 |长度50字符 |\n|description |string |否 |版本描述 |长度1000字符 |\n|weight |float |否 |流量分配 |0.5 最小粒度0.01, 不传均匀分配 |\n|config |object |是 |版本参数不同版本的 key 需要保持一致 | |\n|users |list |否 |白名单用户 |[{\"ssids\": [\"009e50ea\\-fb8e\\-4bb3\\-a2a1\\-4b14ba9ce007\",\"009e50ea\\-fb8e\\-4bb3\\-a2a1\\-4b14ba9ce006\"],\"type\": \"id\"}] |\n\n\nlayer_info结构：\n\n\n|**参数名称** |**参数类型** |**是否必填** |**描述** |**备注** |\n|---|---|---|---|---|\n|layer_id |int |是 |互斥组 ID |没有传 \\-1 |\n|version_resource |float |是 |占用流量百分比 |0.7 小于等于该层剩余流量（available_traffic） |\n\n\n接口返回值：\n\n\n|**参数名称** |**参数类型** |**描述** |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |int |新创建实验ID |\n\n\n接口请求参数示例：\n\n```Plain Text\n{\n    \"name\":\"测试实验2022041901\",\n    \"mode\": 1,\n    \"endpoint_type\": 1,\n    \"duration\": 20,\n    \"major_metric\": 29806,\n    \"metrics\": [29806],\n    \"versions\": [\n        {\n            \"type\": 0,\n            \"name\": \"实验组2022041901\",\n            \"config\": {\"shiyu_key\": \"hello\"}\n        },\n        {\n            \"type\": 1,\n            \"name\": \"对照组2022041901\",\n            \"config\": {\"shiyu_key\": \"world\"}\n        }\n    ],\n    \"layer_info\": {\n        \"layer_id\": -1,\n        \"version_resource\": 0.7\n    }\n}\n```\n\n\n<span id=\"修改实验状态\"></span>\n## 修改实验状态\n\n接口描述：实验开启、结束状态操作\n\n请求路径:\n\n\n* 开始实验：`/openapi/v2/apps/<app_id>/experiments/<experiment_id>/launch/`\n\n* 结束实验：`/openapi/v2/apps/<app_id>/experiments/<experiment_id>/stop/`\n\n\n请求方式: PUT\n\n请求所需参数：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|app_id |int |应用的id |\n|experiment_id |int |实验ID |\n\n\n<span id=\"获取指标列表\"></span>\n## 获取指标列表\n\n接口描述：获取当前APP下所有指标信息\n\n请求路径: `/openapi/v2/apps/<app_id>/metrics`\n\n请求方式: GET\n\n接口请求参数：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|app_id |int |应用的id |\n|keyword |string |模糊搜索关键字，为空时查询所有 |\n|need_page |int |0：不需要分页，page等参数不生效，1：需要分页，page等参数生效 |\n|page_size |int |每页显示条数 |\n|page |int |当前页，从1开始 |\n\n\n接口返回信息：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |object |接口返回指标信息和分页信息 |\n\n\ndata信息：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|page |object |分页信息，page结构 |\n|metrics |list |指标名称，metric结构 |\n\n\npage结构：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|current_page |int |当前页 |\n|total_page |int |总页数 |\n|total_items |int |总条数 |\n\n\nmetric结构：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|id |int |指标ID |\n|name |string |指标名称，长度50字符 |\n|description |string |指标描述，可能为空 |\n|type |string |指标类型 |\n|is_support_major |boolean |是否能设置为核心指标 |\n|is_required |int |是否为必看指标，0：必看指标，1：非必看指标 |\n\n\n<span id=\"获取互斥组列表\"></span>\n## 获取互斥组列表\n\n接口描述：获取当前APP下所有层信息(互斥组)\n\n请求路径: `/openapi/v2/apps/<app_id>/layers`\n\n请求方式: GET\n\n接口请求参数：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|app_id |int |应用的id |\n|keyword |string |模糊搜索关键字，为空时查询所有 |\n|need_page |int |0：不需要分页，page等参数不生效，1：需要分页，page等参数生效 |\n|page_size |int |每页显示条数 |\n|page |int |当前页，从1开始 |\n\n\n接口返回值：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|code |int |接口返回状态，200为成功 |\n|message |string |接口返回信息，成功时默认为success |\n|data |list |接口返回互斥组列表 |\n\n\ndata信息：\n\n\n|**参数** |**类型** |**描述** |\n|---|---|---|\n|id |long |互斥组ID |\n|name |string |互斥组名称，长度50字符 |\n|available_traffic |int |剩余流量 |\n|type |string |互斥组类型，客户端实验只可添加客户端互斥组，服务端实验只可添加服务端互斥组。客户端：client，服务端：server |\n\n\n<span id=\"五-接口返回码列表\"></span>\n# 五. 接口返回码列表\n\nHTTP状态码约束如下：\n\n\n|**HTTP状态码** |**返回的模块** |语义 |**解释** |**客户端如何处理** |\n|---|---|---|---|---|\n|200 |业务模块 |业务完成了本次请求处理。（不管是成功还是失败） |在失败的情况下，具体错误原因，通过返回消息体中code进行定义。 |正常处理 |\n|302 |业务模块 |请求重定向 |将请求重定向到对应地址 |重新发出请求 |\n|403 |业务模块 |禁止访问 |比如接口鉴权失败，token失效，无效access_token，指定用户无操作权限 |客户端需记录上下文日志，以便查找问题。 |\n|404 |网关 |没有这个接口 |接口未实现 |按出错处理，不要重试 |\n|499 |网关 |请求未处理完。 | |按出错处理，可以重试 |\n|500 |业务模块 |业务在处理过程中，发生了非预期的错误。 |例如某个异常未捕捉； |按出错处理，可以重试 |\n|502/503 |网关 |网关在转发请求过程中出错 |例如到业务模块的连接数过多 |按出错处理，可以重试 |\n\n\n返回消息体里的code详细的定义：\n\n\n|**错误码** |**含义** |\n|---|---|\n|200 |成功 |\n|4001 |参数校验失败，具体信息在message中给出 |\n|4002 |权限校验失败 |\n|5001 |接口内部异常 |\n|5002 |数据库操作失败 |\n|5003 |依赖服务请求失败 |";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

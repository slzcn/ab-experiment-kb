<script>window.DATA_BASE="../";window.INIT_DOC=166062;window.INIT_MD="DataTester提供了SaaS和私有化两种版本的产品，本文介绍如何付费购买火山引擎 A/B 测试产品。\n\n<span id=\"购买saas版本\"></span>\n# 购买SaaS版本\n\n<span id=\"前提条件\"></span>\n## **前提条件**\n\n\n* 已注册火山引擎账号并完成了企业实名认证。如果没有注册火山引擎账号，请先完成[账号注册](https://console.volcengine.com/auth/signup)。\n\n* 已有默认创建好的集团，并切换到自己的集团中，在集团信息页面中获取默认的集团 ID。\n\n\n<span id=\"注意事项\"></span>\n## **注意事项**\n\n\n* 关于付费购买 A/B 测试时的计费说明，请参见[产品计费](https://www.volcengine.com/docs/6287/122529)。\n\n* 如有任何疑问，欢迎与火山引擎联系。咨询电话：400\\-850\\-0030。\n\n\n<span id=\"操作步骤\"></span>\n## 操作步骤\n\n<span id=\"一、确认合同及报价\"></span>\n### 一、确认合同及报价\n\n如果您已经与火山引擎协商并确认合作意向，合作事宜在双方达成一致意见后，火山引擎将按照约定的合作，通过“站内信”&“邮件”发给您约定的合同，您在收到后，需要做以下步骤：\n\n\n1. 登录火山引擎官网，进入**费用中心**；\n\n2. 在**账户总览**页面，单击**去确认**，进入**合同管理**页面。\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_3b6d0087252fd6813499a82dca0c362c.png) </span>\n\n\n3. 在**合同管理**页面，找到报价合同并下载查看。确认无误后，单击**同意**；若不同意，单击**拒绝**。\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_d2dcd5a4c4b7f252996b356f6697cd48.png) </span>\n\n\n4. 等待合同生成，无需操作。合同生效后，您可单击**下载**查看合同，此时合同是已盖我方电子章的 PDF 文件。\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_d2ccd83098530b6adc30b72176ff3ded.png) </span>\n\n<span id=\"二、充值\"></span>\n### 二、充值\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">付款时，必须进入“控制台\\-费用中心”完成付款，不可单独进行对公付款。</div>\n\n\n\n1. 登录[火山引擎控制台](https://console.volcengine.com/home)，在右上角点击**费用** \\> **账户总览**。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_7a818626b30a9c1b19675ca170931667.png) </span>\n\n2. 参见[充值操作指引](https://www.volcengine.com/docs/6269/100434)进行充值。火山引擎支持两种方式充值：**在线充值**和**线下汇款**。其中，对公打款可以采取**线下汇款**的方式。受银行处理时间影响，线下汇款方式到账会有延误。一般 1 天内可到账，最快 2 小时。\n\n3. 在**订单管理**页面，找到下单时所创建的订单，单击**余额支付**完成支付。\n\n\n<span id=\"三、下单\"></span>\n### 三、下单\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">如果您与火山引擎通过合同达成一致合作价格，那么需要确保合同是生效的状态，才能进行下单操作，以保障合作价格是生效的。下单之前，请再次确认选择的集团是否正确。</div>\n\n\n\n1. 进入[产品页面](https://www.volcengine.com/product/datatester)，点击**产品购买**，打开购买页面。\n\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/edce20f74b56488080c93d44f216f791~tplv-goo7wpa0wc-image.image) </span>\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">下单前，请您再次确认实付款金额是否与合同保持一致，如果不一致，请联系销售人员。</div>\n\n\n\n2. 在购买页面中，选择需要购买的套餐，勾选协议后，点击**立即购买**提交订单并完成付款。\n\n\n<span id=\"购买私有化版本\"></span>\n# 购买私有化版本\n\n如果您计划使用私有化本地部署的模式使用DataTester产品，请联系咨询商务。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>
<script src="../marked.min.js"></script>

<body>
<script type="application/json" id="kbdata"></script>
<div class="loading" id="loading"><div class="spin"></div><div class="ld-t">正在加载知识库</div><div class="ld-s">首次加载稍候片刻</div></div>

<div class="app" id="app" style="display:none">
  <div class="mtoggle" id="mtoggle">☰</div>
  <div class="mmask" id="mmask"></div>
  <aside id="aside">
    <div class="brand">
      <h1><span class="logo">AB</span>A/B 实验知识库</h1>
      <p>营销增长中心 · 数据驱动决策手册</p>
    </div>
    <div class="cats" id="cats"></div>
    <div class="write-btn" id="writeBtn">✍ 写新文章</div>
    <a class="admin-link" id="adminLink" href="admin.html">⚙ 管理后台</a>
    <div class="side-foot" id="sideFoot"></div>
  </aside>

  <main>
    <div class="top">
      <div class="searchbox">
        <span class="si">🔍</span>
        <input id="q" placeholder="搜索实验设计"
          data-ph-prefix="搜索"
          data-ph-kw="实验设计,报告解读,广告投放,假设检验,指标体系,AB通识"
          autocomplete="off">
        <span class="clr" id="clr">✕</span>
      </div>
      <div class="stat" id="stat"></div>
    </div>
    <div class="body" id="listView"></div>
    <div class="body reader-scroll" id="readerView" style="display:none"></div>
  </main>
</div>

<!-- 写文章访问控制 -->
<div class="login-mask" id="loginMask">
  <div class="login-box">
    <div class="login-ic">🔒</div>
    <h3>需要授权</h3>
    <p>此操作仅限授权用户</p>
    <input id="loginPin" type="password" inputmode="numeric" placeholder="访问码" autocomplete="off">
    <button class="ed-btn" id="loginBtn">进入编辑</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-tip">登录后 2 小时内免再次验证</div>
  </div>
</div>

<!-- 写文章编辑器 -->
<div class="editor-mask" id="editorMask"></div>
<div class="editor" id="editor">
  <div class="ed-head">
    <b>✍ 写新文章</b>
    <span class="ed-close" id="edClose">✕</span>
  </div>
  <div class="ed-body">
    <div class="ed-form">
      <label>标题</label>
      <input id="edTitle" placeholder="例如：双十一大促实验复盘">
      <label>分类</label>
      <select id="edCat"></select>
      <label>检索关键词（选填，空格分隔）</label>
      <input id="edKw" placeholder="复盘 大促 转化率">
      <label>正文（Markdown）</label>
      <textarea id="edMd" placeholder="# 标题&#10;&#10;正文用 Markdown 书写，支持 **加粗**、列表、表格、代码块…&#10;&#10;## 小节&#10;- 要点一&#10;- 要点二"></textarea>
      <div class="ed-actions">
        <button class="ed-btn" id="edSubmit" style="display:none">✓ 发布文章</button>
      </div>
      <div class="ed-hint" id="edHint"></div>
    </div>
    <div class="ed-preview" id="edPrev">
      <div class="ed-prev-tag" id="edPrevTag"></div>
      <h1 id="edPrevTitle" style="margin:8px 0 16px"></h1>
      <div class="md" id="edPrevBody"></div>
    </div>
  </div>
</div>

<!-- 顶部悬浮 toast：发布结果等提示走全站统一规范 -->
<div id="toast"></div>

</body>

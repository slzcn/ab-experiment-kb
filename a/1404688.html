<script>window.DATA_BASE="../";window.INIT_DOC=1404688;window.INIT_MD="DataTester为您提供实验看板功能页面，可以在多个实验×指标的粒度看数，实现在一个表格里跟进关键指标在多个实验策略的数据效果。例如：某个业务方向的重要实验监控、产品各方向大反转实验的长期监控等，本文为您介绍实验看板的使用流程和注意事项。\n\n<span id=\"f69b7538\"></span>\n# 功能入口\n\n登录并进入DataTester控制台后，单击左侧导航栏 **实验经营**\\>**实验看板**，进入实验看板页面。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/e52cb7fbdcd042089d7b1b3fd8089abe~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"2a1d1019\"></span>\n# 创建看板\n\n进入实验看板页面后，单击页面中的**新建看板**按钮，在弹窗中配置看板参数，完成后单击**确定**。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/98984294409b422e81e583efc836f28a~tplv-goo7wpa0wc-image.image) </span>\n\n\n|参数 |配置说明 |\n|---|---|\n|**看板名称** & **看板描述** |自定义看板名称和描述，用于后续标识、查找对应的看板。 |\n|**owner** |默认是当前看板创建人。 |\n|**看板类型** |类型分为「个人看板」和「公共看板」，默认为「个人看板」<br><br><br>* 个人看板：仅**owner**及**被授权的用户**可查阅<br><br>* 公共看板：看板全公开。 |\n|**选择归属文件夹** |可将看板归类到某个文件夹下（支持新建新的文件夹） |\n\n\n创建看板后，页面会自动跳转至看板编辑页面，您需要为看板添加数据源、添加监控的实验数据图表，将图表保存为固定看板，后续即可直接使用看板来查看监控对应实验数据。\n\n<span id=\"8a2dcdac\"></span>\n# 编辑看板\n\n看板中的元素由**数据源**模块和**文本**模块组成，数据源指定了要展示的实验组和指标。编辑看板时，主要操作包括：添加/编辑数据源模块、文本模块，也可调整各模块的顺序等，详细操作指导如下。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">仅看板owner可编辑配置看板内容。</div>\n\n\n<span id=\"d1a4025a\"></span>\n## 添加/编辑数据源\n\n\n1. 进入看板编辑页面后，单击顶部**添加数据源**按钮可新增一个数据源，或单击已创建数据源的编辑按钮，可对已创建的数据源进行修改编辑。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/3176805316164b1996162fa336421001~tplv-goo7wpa0wc-image.image) </span>\n\n2. 在弹出的页面中配置数据源参数。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/50bdc3ba5a8543b9bbf59c5446030fd8~tplv-goo7wpa0wc-image.image) </span>\n\n   您可根据界面提示完成参数配置，核心参数配置指导如下：\n\n   \n   |参数 |配置说明 |\n   |---|---|\n   |添加实验 |单击添加实验按钮后，可在弹窗中选择待监控的实验，并选择监控的实验版本。<br><br><div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div><br><br><br><div data-tips=\"true\" data-tips-type=\"warning\">一个数据源最多添加20个实验。</div><br><br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/8e62065c80c94cd897fea1d98d6b169f~tplv-goo7wpa0wc-image.image) </span><br><br>您也可根据实验业务需要选择是否将选择的实验标注为反转实验，标注后续选择反转组。<br><br><div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div><br><br><br><div data-tips=\"true\" data-tips-type=\"tip\">选中的实验如果是反转实验，或者选择的是普通实验但是手动标记为反转实验，在看板数据源配置\\-选择实验分组处，会默认开启反转实验开关。</div><br><br><br><br>* <div data-tips=\"true\" data-tips-type=\"tip\">普通实验组diff（相对差）计算逻辑：（实验组\\-基准组）/基准组</div><br><br><br>* <div data-tips=\"true\" data-tips-type=\"tip\">反转实验组diff（相对差）计算逻辑：（基准组\\-实验组）/实验组</div><br> |\n   |添加指标 |单击添加指标按钮，在弹窗中选择指标。<br><br><div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div><br><br><br><div data-tips=\"true\" data-tips-type=\"warning\">当前仅支持选择事件指标。</div><br> |\n   |展示视图 |添加指标完成后，您可勾选展示视图的类型：<br><br><br>* 默认展示数据源汇总表。<br><br>* 您也可根据分析需要选择是否要展示各个指标的单独图表。 |\n   \n\n3. 编辑数据源过滤条件、图表样式等。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/49083a8fef8345d5b89fcfe85bcdd436~tplv-goo7wpa0wc-image.image) </span>\n\n   * 您可单击数据源右上方的属性过滤，为数据源图表配置整体的过滤条件。\n\n   * 单击数据源图表后，可在右侧侧边栏配置图表类型、转置等样式设置。\n\n\n<span id=\"c0e1eb45\"></span>\n## 添加富文本\n\n在看板编辑页顶部单击**添加文本**，即可在看板中新增一个文本框，您可在其中编辑看板文本。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/68d1a4462ea040d9bc56c1dee89daf2a~tplv-goo7wpa0wc-image.image) </span>\n\n单击文本框区域后，您可以在右侧侧边栏中修改文本区域标题，或选择隐藏头部区域。\n\n<span id=\"a10edc29\"></span>\n## 调整元素顺序\n\n单击看板顶部的元素排序，可对已创建的数据源或文本框等多个元素进行拖动排序。\n\n<span id=\"0a7090e3\"></span>\n## 配置看板图表的默认时间\n\n单击看板顶部的时间配置后，可勾选设置为看板默认时间，设置默认时间后，下次进入看板会以自定义的默认时间进行数据获取和展示。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/60d4f0fba8af40a6ae21d8f3a7fdb376~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"a59e3da1\"></span>\n# 看板授权与链接分享\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/6d8480f67a964b84b123417a4671b97a~tplv-goo7wpa0wc-image.image) </span>\n\n\n* 看板创建完成后，您可单击右上角的**授权**按钮，将看板授权给指定用户。\n\n* 授权完成后，您可以单击右上角的**复制链接**，将看板链接分享给有权限的用户。\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">获取看板链接后，如果用户没有权限，可根据界面引导主动申请看板权限，申请后，后续权限审批流程会触发至看板owner，看板owner审批通过后，对应用户也可查看看板。</div>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

<script>window.DATA_BASE="../";window.INIT_DOC=1408236;window.INIT_MD="<span id=\"7f8b5f8f\"></span>\n# 用户与用户属性\n\n```JavaScript\n// 获取用户信息模块\nappLog.user()\n```\n\n\n<span id=\"5b4c2c9f\"></span>\n## 登录态变化调用\n\n<span id=\"dc31b648\"></span>\n### 账户登录\n\n如您的产品中有账户体系，请在用户登录后立即设置 uuid，以保证用户登录前后口径一致性。 6.13.0+ 版本支持在初始化 AppLog 之前调用，用于设置已登录的用户 uuid。\n\n```JavaScript\n// 设置 UUID\nappLog.user()?.setUserUniqueID(\"your_uuid\")\n\n// 如果有多口径需求可以看下面的设置\n// 设置 UUID + UUIDType\nappLog.user()?.setUserUniqueID(\"your_uuid\", \"your_uuid_type\")\n// 单参数的 setUserUniqueID(uuid) 等效于 双参数的 setUserUniqueID(uuid, lastuuidType) 只是默认情况下 uuidType 没有，如果设置过 uuidType 想要清空，需要额外设置:\nappLog.user()?.setUserUniqueID(\"your_uuid\", null)\n```\n\n\n<span id=\"cbeb60af\"></span>\n### 账户登出\n\n在账户登出时调用。\n\n```JavaScript\n// 登出 UUID\nappLog.user()?.setUserUniqueID(null)\n\n// 如果有多口径需求可以看下面的设置\n// 登出 UUID + UUIDType\nappLog.user()?.setUserUniqueID(null, null)\n```\n\n\n<span id=\"fe7b6402\"></span>\n## 多 ID 口径\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">1.3.0 之后版本支持，仅私有化支持，多ID口径功能需单独申请开通，使用时，需在上报用户 ID、ID type 时，同时配置 id_bind 关系，以尽可能准确还原一个真实的用户。更多关于多 ID 口径的介绍和使用指导请参见<a href=\"https://www.volcengine.com/docs/56651/1362118\">高阶功能：多应用/多主体/多ID类型</a>。</div>\n\n\n```TypeScript\n// 示例演示\nappLog.user()?.bind({\n  \"id_type_1\": \"id_type_value_1\",\n  \"id_type_2\": \"id_type_value_2\"\n}, (result: IDBindParams) => {\n  hilog.info(0x0000, 'AppLogH', `IDBindSuccess result: ${JSON.stringify(result)}`)\n  // 更新用户状态\n  appLog.user()?.setUserUniqueID(\"id_type_value_1\", \"id_type_1\")\n}, (code: number, message: StringOrNull) => {\n  hilog.info(0x0000, 'AppLogH', `IDBindFail code: ${code}, message: ${message}`)\n})\n```\n\n\n<span id=\"7c6df339\"></span>\n## 设置用户属性\n\n<span id=\"1420ad7f\"></span>\n### ProfileSet\n\n设置用户属性，存在则覆盖，不存在则创建。\n\n```TypeScript\nappLog.profile()?.set({\n  \"set1\": \"value\",\n  \"set2\": \"value\"\n})\n```\n\n\n<span id=\"3fd33c92\"></span>\n### ProfileSetOnce\n\n设置用户属性，存在则不设置，不存在则创建。适合首次相关的用户属性，比如首次访问时间等。\n\n```TypeScript\nappLog.profile()?.setOnce({\n  \"setOnce\": \"value\"\n})\n```\n\n\n<span id=\"a46d1475\"></span>\n### **ProfileIncrement**\n\n设置数值类型的属性，可进行累加。\n\n```TypeScript\nappLog.profile()?.increment({\n  \"increment\": 1\n})\n```\n\n\n<span id=\"83b8727c\"></span>\n### **ProfileAppend**\n\n设置List类型的用户属性，可持续向 List 内添加。\n\n```TypeScript\nappLog.profile()?.append({\n  \"appendStr\": \"1\",\n  \"appendNum\": 1\n})\n```\n\n\n<span id=\"f1beecd0\"></span>\n### **ProfileUnset**\n\n删除用户的属性。\n\n```TypeScript\nappLog.profile()?.unset(\"set2\")\n```\n\n\n<span id=\"17e2c7d3\"></span>\n# 事件与事件属性\n\n<span id=\"4c833d29\"></span>\n## 上报代码埋点\n\n用户行为日志采用**事件 event + 属性 params** 的形式，事件一般对应多个属性，也可以仅有事件没有属性。代码埋点方案一般由数据分析师或产品运营设计。\n\n\n* 仅上报事件的代码埋点，示例如下：\n\n\n```TypeScript\n// 示例：上报事件 event，该事件不包含属性\n*// 置于业务逻辑对应位置\nappLog.event(\"event\")\n```\n\n\n\n* 上报事件和对应属性的代码埋点，示例如下：\n\n\n```TypeScript\n// 示例：上报事件 event，该事件包含两个属性\n*// 一个 string 类型的属性，属性名为 key_string，属性值为 value_string\n*// 一个 int 类型的属性，属性名为 key_int，属性值为 10\n*// 置于业务逻辑对应位置\nappLog.event(\"event\", {\n  \"key_string\": \"value_string\",\n  \"key_int\": 10\n})\n```\n\n\n<span id=\"4cc3b7e4\"></span>\n## 事件公共属性\n\n如需在每个事件中都包括某属性，可通过公共属性设置，无需在每个事件中重复设置。公共属性只需设置一次，即可包括在所有代码埋点事件、预置事件和全埋点事件中。\n\n<span id=\"f166818c\"></span>\n### 设置公共属性\n\n```TypeScript\n/*\n * 示例：设置自定义的公共属性，属性名为 key_public，属性值为 value_public\n * 关于自定义 “公共属性” 请注意：\n * 1. 上报机制是随着每一次日志发送进行提交，默认的日志发送频率是 1 分钟，\n *    所以如果在一分钟内连续修改自定义公共属性，按照日志发送前的最后一次修改为准；\n * 2. 不推荐高频次修改，如每秒修改一次。\n */\nappLog.setHeaderInfo(\"key_public\", \"value_public\")\n```\n\n\n<span id=\"e42dbff8\"></span>\n### 移除公共属性\n\n```TypeScript\n// 示例：移除属性名为 key_public 的公共属性\nappLog.removeHeaderInfo(\"key_public\")\n```\n\n\n<span id=\"bc0b7464\"></span>\n# 订阅平台 ID\n\n<span id=\"07e460b1\"></span>\n## 订阅 Did Ready\n\n```JavaScript\nappLog.topicReceiver()?.on(Topic.DidReady, (didInfo) => {\n  setTimeout(() => {\n    hilog.info(0x0000, 'AppLogH', `AppLog did ready:  ${didInfo[\"bd_did\"]}`)\n  })\n})\n\ndidInfo 格式：\n// device_info_from 表示该信息来自本地还是服务端请求返回\n// device_info_from: did_from_remote 表示数据来自服务端返回\n// device_info_from: did_from_local 表示数据来自本地缓存\n{\n    \"bd_did\": \"xxxx\",\n    \"install_id\": xxxx,\n    \"device_info_from\": \"did_from_remote\"\n}\n```\n\n\n<span id=\"781888ff\"></span>\n# 组件曝光事件采集\n\n用户需要手动标记监听某个 View 的曝光事件。当这个 View 出现在屏幕可视范围内时，会自动触发一个曝光事件。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">1.2.0 之后版本支持，用户需要手动标记监听某个 View 的曝光事件。当这个 View 出现在屏幕可视范围内时，会自动触发一个曝光事件。</div>\n\n\n> 目前版本能力基本和 Android 对齐，暂不支持按时间曝光配置以及调试视图。\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">可以根据曝光事件内部的 $exposure_type 属性区分：</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">$exposure_type:0 首次曝光</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">$exposure_type:3 重复曝光</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">$exposure_type:6 从其他页面返回的曝光</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">$exposure_type:7 后台返回曝光</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">如果想在实现组件只曝光一次的效果，可以在新版曝光回调中通过 $exposure_type == 0 进行首次曝光过滤。</div>\n\n\n```JavaScript\n//  需要给组件添加 ID\nButton('Test', { stateEffect: true, type: ButtonType.Capsule })\n  .id(\"test_btn\"))\n\n//  请在页面 build 后开始监控，如果传入过早，无法通过 NodeId 找到对应组件，就无法处理曝光\n//  开始曝光监控，曝光时给 SDK 传给 ID，来确定需要监控哪个组件的曝光\nappLog.exposure()?.observeByNodeId(\"test_btn\", this.getUIContext(), {\n    //  Optional，默认为 \"$bav2b_exposure\"\n    eventName: \"custom_exposure\",\n    //  Optional，自定义曝光事件属性\n    properties: {\n        \"test\": \"test\"\n    },\n    //  Optional, 曝光配置，有效曝光面积和曝光事件回调\n    //  有效曝光面积: 有效曝光的 View 显示面积的比例，默认是 0，取值 0-1\n    //  曝光事件回调: 触发曝光事件时回调，会携带当前曝光事件相关属性，可以进行自定义追加以及支持过滤\n    config: {\n        exposureCallback: (param) => {\n          //  支持在回调中添加自定义属性\n          //  true 保留曝光事件\n          return true\n        }\n    }\n})\n\n//  在适当实际停止曝光监控，如离开页面或者其他逻辑\nappLog.exposure()?.disposeByNodeId(\"test_btn\")\n```\n\n\n<span id=\"0ed3b8d3\"></span>\n# 全埋点\\-beta\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">1.2.0 之后版本支持，由于鸿蒙已不再推荐 route 页面路由，主推 Navigation 组件导航，所以 SDK 以 Navigation 组件导航为主。</div>\n\n\n> 暂不支持 Tab 切换监听，目前系统 Tab 监听不完善，无法监听到 Tab 进入、退出，只能监听到 Tab 切换。\n\n\n```JavaScript\nonWindowStageCreate(windowStage: window.WindowStage): void {\n  // 推荐在 EntryAbility loadContent 时开启，以便对页面生命周期更完整\n  windowStage.loadContent('pages/Index', (err, data) => {\n    appLog.bav()?.enablePlugin(windowStage.getMainWindowSync().getUIContext(), {\n      // 是否采集页面离开事件\n      enablePageLeaveEvent: true,\n      // 是否采集组件点击事件\n      enableClickEvent: true\n    })\n  })\n}\n```";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

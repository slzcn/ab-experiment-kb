<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A/B 实验知识库 · 营销增长中心</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{
    /* 乳白 / 米色系亮色主题 */
    --bg:#faf7f2; --bg2:#ffffff; --panel:#f4efe7; --line:#e8e0d4;
    --ink:#2c2a26; --sub:#6b6459; --dim:#9a9184;
    --brand:#e0632e; --brand2:#c9541f; --accent:#c07a2e;
    --ok:#3fb950; --mark:rgba(224,99,46,.22);
    --r:14px; --sh:0 8px 26px rgba(120,100,70,.14);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);
    font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--brand);color:#fff}
  /* ---- 布局 ---- */
  .app{display:grid;grid-template-columns:280px 1fr;height:100vh}
  /* 侧栏 */
  aside{background:var(--bg2);border-right:1px solid var(--line);
    display:flex;flex-direction:column;overflow:hidden}
  .brand{padding:22px 22px 16px;border-bottom:1px solid var(--line)}
  .brand h1{font-size:17px;font-weight:800;letter-spacing:.3px;display:flex;align-items:center;gap:9px}
  .logo{width:26px;height:26px;border-radius:8px;flex:none;
    background:linear-gradient(135deg,var(--brand),var(--brand2));
    display:grid;place-items:center;font-weight:900;color:#fff;font-size:13px;box-shadow:0 3px 10px rgba(224,99,46,.4)}
  .brand p{color:var(--dim);font-size:11.5px;margin-top:7px;letter-spacing:.2px}
  .cats{flex:1;overflow-y:auto;padding:12px 12px 30px}
  .cat{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;
    color:var(--sub);cursor:pointer;font-size:13.5px;transition:.15s;user-select:none}
  .cat:hover{background:var(--panel);color:var(--ink)}
  .cat.on{background:linear-gradient(90deg,rgba(224,99,46,.16),transparent);color:var(--ink);
    box-shadow:inset 2px 0 0 var(--brand)}
  .cat .ic{font-size:15px;width:20px;text-align:center;flex:none}
  .cat .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cat .ct{font-size:11px;color:var(--dim);background:var(--panel);
    padding:1px 8px;border-radius:20px;min-width:24px;text-align:center}
  .cat.on .ct{background:rgba(224,99,46,.2);color:var(--brand2)}
  .side-foot{padding:14px 18px 16px;border-top:1px solid var(--line);font-size:11px;color:var(--dim);line-height:1.7}
  .sf-stat{display:flex;gap:8px;margin-bottom:9px}
  .sf-pill{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:9px;
    padding:7px 6px;text-align:center}
  .sf-pill b{display:block;font-size:16px;font-weight:800;color:var(--brand);line-height:1.2}
  .sf-pill span{font-size:10px;color:var(--sub)}
  .sf-line{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--dim)}
  .sf-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);flex:none;
    box-shadow:0 0 0 3px rgba(63,185,80,.16)}
  .sf-src{margin-top:7px;padding-top:9px;border-top:1px dashed var(--line);
    font-size:10.5px;color:var(--dim)}
  .sf-src b{color:var(--sub);font-weight:700}
  /* 主区 */
  main{display:flex;flex-direction:column;overflow:hidden}
  .top{padding:20px 34px 16px;border-bottom:1px solid var(--line);background:var(--bg)}
  .searchbox{position:relative;max-width:760px}
  .searchbox input{width:100%;background:var(--panel);border:1px solid var(--line);
    color:var(--ink);border-radius:12px;padding:14px 46px 14px 46px;font-size:15px;
    font-family:var(--font);outline:none;transition:.2s}
  .searchbox input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(224,99,46,.15)}
  .searchbox .si{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:16px}
  .searchbox .clr{position:absolute;right:14px;top:50%;transform:translateY(-50%);
    color:var(--dim);cursor:pointer;font-size:18px;display:none}
  .stat{margin-top:11px;color:var(--dim);font-size:12.5px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .stat b{color:var(--brand2)}
  .body{flex:1;overflow-y:auto;padding:22px 34px 60px;scroll-behavior:smooth}
  /* 列表卡片 */
  .list{display:grid;gap:12px;max-width:1000px}
  /* 瀑布流新卡片淡入上浮 */
  @keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .card.new{animation:cardIn .42s cubic-bezier(.22,.61,.36,1) both}
  /* 底部“加载更多”指示器 */
  .loadmore{max-width:1000px;text-align:center;color:var(--dim);font-size:12.5px;
    padding:18px 0 8px;display:flex;align-items:center;justify-content:center;gap:9px}
  .loadmore .dot{width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--brand);
    border-radius:50%;animation:sp .7s linear infinite}
  .loadmore.done{color:var(--dim);opacity:.7}
  .loadmore.done .dot{display:none}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);
    padding:17px 19px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
    background:var(--brand);transform:scaleY(0);transform-origin:center;transition:.18s}
  .card:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:var(--sh)}
  .card:hover::before{transform:scaleY(1)}
  .card h3{font-size:16px;font-weight:750;line-height:1.45;color:var(--ink)}
  .card .excerpt{color:var(--sub);font-size:13px;line-height:1.65;margin-top:8px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .meta{margin-top:13px;font-size:11.5px;color:var(--dim);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .card .ct-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;
    color:var(--brand2);background:rgba(224,99,46,.1);padding:3px 10px;border-radius:20px;font-weight:600}
  .card .mdot{display:inline-flex;align-items:center;gap:4px}
  .card .meta .src{margin-left:auto;color:var(--brand2);font-weight:600}
  mark{background:var(--mark);color:var(--brand2);border-radius:3px;padding:0 2px;font-weight:600}
  .empty{text-align:center;color:var(--dim);padding:80px 20px}
  .empty .big{font-size:48px;margin-bottom:14px;opacity:.6}
  /* 阅读态 */
  /* 阅读态：舒适阅读宽度、克制的头部、可呼吸的正文 */
  .reader{max-width:720px;margin:0 auto;padding:0 4px}
  .rback{display:inline-flex;align-items:center;gap:7px;color:var(--sub);cursor:pointer;
    font-size:13px;margin-bottom:22px;padding:7px 13px;border-radius:9px;background:var(--panel);transition:.15s}
  .rback:hover{color:var(--ink);background:var(--line)}
  .rhead{margin-bottom:28px}
  .rhead .ct-tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;
    color:var(--brand2);background:rgba(224,99,46,.12);padding:3px 11px;border-radius:20px}
  .rhead h1{font-size:30px;font-weight:800;margin:0 0 16px;line-height:1.32;letter-spacing:-.01em;color:var(--ink)}
  .rhead .rmeta{display:flex;gap:12px;align-items:center;font-size:12.5px;color:var(--dim);flex-wrap:wrap;
    flex-wrap:wrap;padding-bottom:20px;border-bottom:1px solid var(--line)}
  .copylink{display:inline-flex;align-items:center;gap:5px;cursor:pointer;user-select:none;
    color:var(--brand2);background:rgba(224,99,46,.1);border:1px solid rgba(224,99,46,.25);
    padding:4px 11px;border-radius:8px;font-size:12px;font-weight:600;transition:.15s}
  .copylink:hover{background:rgba(224,99,46,.18)}
  .copylink.copied{background:rgba(63,185,80,.14);border-color:rgba(63,185,80,.4);color:#2f9e44}
  .rfoot{margin-top:44px;padding-top:18px;border-top:1px solid var(--line);
    color:var(--dim);font-size:12.5px;text-align:center}
  /* markdown 正文 */
  .md{font-size:16px;line-height:1.9;color:#3a3733}
  .md h1,.md h2,.md h3,.md h4{color:var(--ink);font-weight:750;line-height:1.4;
    margin:1.9em 0 .7em;scroll-margin-top:20px;letter-spacing:-.005em}
  .md h1{font-size:23px}
  .md h2{font-size:20px;padding-left:11px;border-left:4px solid var(--brand)}
  .md h3{font-size:17px}
  .md h4{font-size:15.5px;color:var(--sub)}
  .md h2:first-child,.md h1:first-child{margin-top:0}
  .md p{margin:1em 0}
  .md strong{color:var(--ink);font-weight:700}
  .md a{color:var(--accent);border-bottom:1px solid rgba(192,122,46,.4)}
  .md ul,.md ol{margin:.8em 0;padding-left:1.5em}
  .md li{margin:.45em 0}
  /* 配图：按高度约束，不放大糊图，居中；成对图并排 */
  .md img{max-width:100%;height:auto;border-radius:12px;border:1px solid var(--line);
    box-shadow:0 4px 16px rgba(120,100,70,.1)}
  .md p>img{display:block;margin:20px auto;max-height:460px;width:auto}
  /* 相邻配图并排成一行（由 JS 包进 .imrow） */
  .imrow{display:flex;gap:14px;justify-content:center;align-items:flex-start;flex-wrap:wrap;margin:20px 0}
  .imrow img{margin:0;max-height:520px;width:auto;max-width:calc(50% - 7px);flex:0 1 auto}
  .md blockquote{border-left:3px solid var(--brand);background:var(--panel);
    padding:12px 18px;margin:1.2em 0;border-radius:0 10px 10px 0;color:var(--sub)}
  .md hr{border:none;border-top:1px solid var(--line);margin:2em 0}
  .md code{background:var(--panel);padding:2px 6px;border-radius:5px;font-size:.88em;
    font-family:"SF Mono",Menlo,Consolas,monospace;color:var(--brand2)}
  .md pre{background:#2c2a26;border:1px solid var(--line);border-radius:10px;
    padding:15px 17px;overflow-x:auto;margin:1em 0}
  .md pre code{background:none;padding:0;color:#f0ebe2;font-size:13px;line-height:1.6}
  .md table{border-collapse:collapse;width:100%;margin:1.1em 0;font-size:13.5px;display:block;overflow-x:auto}
  .md th,.md td{border:1px solid var(--line);padding:8px 12px;text-align:left}
  .md th{background:var(--panel);color:var(--ink);font-weight:700}
  .md tr:nth-child(even){background:rgba(180,150,100,.06)}
  /* 提示框 (data-tips) */
  .md [data-tips]{background:var(--panel);border-left:3px solid var(--accent);
    padding:10px 14px;border-radius:0 8px 8px 0;margin:.6em 0;color:var(--sub);font-size:14px}
  .md [data-tips-is-title]{border:none;background:none;padding:0;margin:.8em 0 -.2em;
    color:var(--accent);font-weight:700;font-size:13px}
  .md [data-tips-type="warning"],.md [data-tips-type="danger"]{border-color:var(--brand)}
  /* 加载/滚动条 */
  .loading{display:grid;place-items:center;height:100vh;color:var(--sub);font-size:14px;gap:14px}
  .spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--brand);
    border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
  ::-webkit-scrollbar-thumb:hover{background:#c8bda9}
  /* 写文章按钮 */
  .write-btn{margin:6px 14px 4px;padding:11px;border-radius:11px;text-align:center;
    font-size:13.5px;font-weight:700;color:#fff;cursor:pointer;transition:.15s;
    background:linear-gradient(135deg,var(--brand),var(--brand2));
    box-shadow:0 3px 12px rgba(224,99,46,.32)}
  .write-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(224,99,46,.42)}
  /* 编辑器抽屉 */
  /* 登录门 */
  .login-mask{display:none;position:fixed;inset:0;background:rgba(60,50,35,.4);z-index:100;
    backdrop-filter:blur(3px);align-items:center;justify-content:center}
  .login-mask.on{display:flex}
  .login-box{background:var(--bg2);border:1px solid var(--line);border-radius:16px;
    padding:32px 30px;width:min(360px,90vw);text-align:center;box-shadow:var(--sh)}
  .login-ic{font-size:34px;margin-bottom:6px}
  .login-box h3{font-size:18px;font-weight:800;color:var(--ink);margin-bottom:6px}
  .login-box p{font-size:12.5px;color:var(--sub);margin-bottom:18px}
  .login-box input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:12px 14px;font-size:16px;text-align:center;letter-spacing:3px;
    outline:none;transition:.15s;font-family:var(--font)}
  .login-box input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(224,99,46,.14)}
  .login-box .ed-btn{width:100%;margin-top:14px}
  .login-err{color:var(--brand2);font-size:12.5px;min-height:18px;margin-top:10px}
  .login-tip{font-size:11px;color:var(--dim);margin-top:6px}
  .editor-mask{display:none;position:fixed;inset:0;background:rgba(60,50,35,.34);z-index:80;backdrop-filter:blur(2px)}
  .editor-mask.on{display:block}
  .editor{position:fixed;top:0;right:0;bottom:0;width:min(920px,94vw);z-index:90;
    background:var(--bg);box-shadow:-10px 0 40px rgba(120,100,70,.22);
    transform:translateX(100%);transition:.28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .editor.on{transform:none}
  .ed-head{display:flex;align-items:center;justify-content:space-between;
    padding:16px 22px;border-bottom:1px solid var(--line);font-size:16px}
  .ed-close{cursor:pointer;color:var(--dim);font-size:20px;padding:0 6px}
  .ed-close:hover{color:var(--brand)}
  .ed-body{flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden}
  .ed-form{padding:20px 22px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;border-right:1px solid var(--line)}
  .ed-form label{font-size:12.5px;color:var(--sub);font-weight:600;margin-top:8px}
  .ed-form input,.ed-form select,.ed-form textarea{background:var(--bg2);border:1px solid var(--line);
    color:var(--ink);border-radius:9px;padding:10px 12px;font-size:14px;font-family:var(--font);outline:none;transition:.15s}
  .ed-form input:focus,.ed-form select:focus,.ed-form textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(224,99,46,.13)}
  .ed-form textarea{flex:1;min-height:260px;resize:vertical;line-height:1.7;
    font-family:"SF Mono",Menlo,Consolas,monospace;font-size:13px}
  .ed-actions{display:flex;gap:10px;margin-top:12px}
  .ed-btn{flex:1;padding:11px;border:none;border-radius:9px;font-size:13.5px;font-weight:700;cursor:pointer;
    color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2));transition:.15s;font-family:var(--font)}
  .ed-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(224,99,46,.35)}
  .ed-btn.ghost{background:var(--panel);color:var(--sub);box-shadow:none}
  .ed-btn.ghost:hover{color:var(--ink);background:var(--line);transform:none}
  .ed-btn.ghost2{background:var(--panel);color:var(--sub);box-shadow:none;flex:0 0 auto;padding:11px 14px}
  .ed-btn.ghost2:hover{color:var(--ink);background:var(--line);transform:none;box-shadow:none}
  .ed-msg{font-size:12.5px;margin-top:10px;padding:9px 12px;border-radius:9px;display:none}
  .ed-msg.ok{display:block;background:rgba(63,185,80,.12);color:#2f9e44;border:1px solid rgba(63,185,80,.3)}
  .ed-msg.err{display:block;background:rgba(224,99,46,.1);color:var(--brand2);border:1px solid rgba(224,99,46,.3)}
  .ed-msg.load{display:block;background:var(--panel);color:var(--sub)}
  .ed-hint{font-size:11.5px;color:var(--dim);line-height:1.6;margin-top:12px;
    background:var(--panel);padding:11px 13px;border-radius:9px}
  .ed-hint code{background:var(--bg2);padding:1px 6px;border-radius:5px;color:var(--brand2);font-size:11px}
  .ed-preview{padding:22px 26px;overflow-y:auto;background:var(--bg2)}
  .ed-prev-tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;
    color:var(--brand2);background:rgba(224,99,46,.12);padding:3px 11px;border-radius:20px}
  .ed-preview h1{font-size:24px;font-weight:800;color:var(--ink)}
  /* 移动端 */
  .mtoggle,.mmask{display:none}
  @media(max-width:820px){
    .app{grid-template-columns:1fr}
    aside{position:fixed;left:0;top:0;bottom:0;width:min(280px,82vw);z-index:50;
      transform:translateX(-100%);transition:.25s;box-shadow:var(--sh)}
    aside.open{transform:none}
    .mtoggle{display:grid;place-items:center;position:fixed;left:12px;top:12px;z-index:60;
      width:40px;height:40px;border-radius:11px;background:var(--brand);color:#fff;
      font-size:18px;box-shadow:var(--sh);cursor:pointer}
    .top{padding:14px 14px 12px 62px}
    .searchbox input{padding:12px 40px 12px 40px;font-size:14px}
    .searchbox .si{left:13px;font-size:15px}
    .stat{font-size:11.5px;gap:10px;margin-top:9px}
    .body{padding:14px}
    .list{gap:10px}
    .card{padding:14px 15px}
    .card h3{font-size:15px}
    .mmask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:45}
    .mmask.on{display:block}
    /* 阅读态：小屏占满、内边距收紧 */
    .reader{max-width:100%;padding:0}
    .rhead{margin-bottom:22px}
    .rhead h1{font-size:23px;margin:0 0 12px;line-height:1.35}
    .md{font-size:15.5px;line-height:1.85}
    .md h2{font-size:18px}
    .md h3{font-size:16px}
    .md img{border-radius:10px}
    .md p>img{margin:16px auto;max-height:70vh}
    .imrow{gap:10px;margin:16px 0}
    .imrow img{max-height:56vh;max-width:calc(50% - 5px)}
    .md pre{font-size:12px}
    .rfoot{margin-top:36px}
    .md table{font-size:12.5px}
    /* 编辑器：小屏全屏、编辑与预览上下堆叠 */
    .editor{width:100vw}
    .ed-body{grid-template-columns:1fr;overflow-y:auto}
    .ed-form{border-right:none;border-bottom:1px solid var(--line)}
    .ed-form textarea{min-height:180px}
    .ed-preview{min-height:200px}
    /* 登录门 */
    .login-box{padding:26px 22px}
  }
</style>
</head>
<body>
<script type="application/json" id="kbdata"><!--KB_DATA--></script>
<div class="loading" id="loading"><div class="spin"></div><div>正在加载知识库…</div></div>

<div class="app" id="app" style="display:none">
  <div class="mtoggle" id="mtoggle">☰</div>
  <div class="mmask" id="mmask"></div>
  <aside id="aside">
    <div class="brand">
      <h1><span class="logo">AB</span>A/B 实验知识库</h1>
      <p>营销增长中心 · 数据驱动决策手册</p>
    </div>
    <div class="cats" id="cats"></div>
    <div class="write-btn" id="writeBtn">✍ 写一篇新文章</div>
    <div class="side-foot" id="sideFoot"></div>
  </aside>

  <main>
    <div class="top">
      <div class="searchbox">
        <span class="si">🔍</span>
        <input id="q" placeholder="搜索实验设计 / 报告解读 / 广告投放 / 假设检验…（支持标题+正文全文检索）" autocomplete="off">
        <span class="clr" id="clr">✕</span>
      </div>
      <div class="stat" id="stat"></div>
    </div>
    <div class="body" id="bodyView"></div>
  </main>
</div>

<!-- 写文章登录门 -->
<div class="login-mask" id="loginMask">
  <div class="login-box">
    <div class="login-ic">🔒</div>
    <h3>发布文章需要口令</h3>
    <p>写入知识库为受限操作，请输入口令</p>
    <input id="loginPin" type="password" inputmode="numeric" placeholder="请输入口令" autocomplete="off">
    <button class="ed-btn" id="loginBtn">进入编辑</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-tip">登录后 24 小时内免再次验证</div>
  </div>
</div>

<!-- 写文章编辑器 -->
<div class="editor-mask" id="editorMask"></div>
<div class="editor" id="editor">
  <div class="ed-head">
    <b>✍ 写一篇新文章</b>
    <span class="ed-close" id="edClose">✕</span>
  </div>
  <div class="ed-body">
    <div class="ed-form">
      <label>标题</label>

        即可入库（右侧为实时预览）。想「点一下直接提交」？在本机跑 <code>python3 serve.py --push</code>
        并访问它给出的本地地址即可。

</div>

<script>
let KB=null, CUR="all", Q="", INDEX=[];
const $=s=>document.querySelector(s);
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// Supabase 数据源（A方案：文章存数据库，前端实时读）
const SB={
  url:'https://cddkniwbhvcbfgkgomtl.supabase.co',
  key:'***REMOVED_PUBLISHABLE_KEY***'
};
let DB_ONLINE=false;   // 是否成功连到数据库

async function sbGet(path){
  const r=await fetch(SB.url+'/rest/v1/'+path,{headers:{apikey:SB.key,Authorization:'Bearer '+SB.key}});
  if(!r.ok) throw new Error('DB '+r.status);
  return r.json();
}
// 从数据库拉分类+文章，组装成前端用的 KB 结构
async function loadFromDB(){
  const [cats,arts]=await Promise.all([
    sbGet('ab_categories?select=key,icon,name,descr,ord&order=ord'),
    sbGet('ab_articles?select=doc_id,title,cat,keywords,md,body_text,updated,source_url,is_internal&order=doc_id')
  ]);
  if(!arts.length) throw new Error('数据库暂无文章');
  return {
    meta:{total:arts.length, source:'Supabase 实时'},
    categories:cats.map(c=>({key:c.key,icon:c.icon,name:c.name,desc:c.descr})),
    docs:arts.map(a=>({id:a.doc_id,title:a.title,cat:a.cat,keywords:a.keywords||'',
      md:a.md||'',text:a.body_text||'',updated:a.updated||'',url:a.source_url||'',
      internal:!!a.is_internal}))
  };
}

function applyKB(kb){
  KB=kb;
  INDEX=KB.docs.map(d=>({d, t:(d.title+' '+d.keywords+' '+d.text).toLowerCase()}));
  renderCats(); renderFoot();
  // 若正停在列表页则重渲染（阅读态不打断用户）
  if(!document.querySelector('.reader')) render();
}
// 数据“指纹”：篇数 + 最新更新日期，用于判断缓存是否过期
function kbSig(kb){
  const ds=kb.docs.map(d=>d.updated).filter(Boolean).sort();
  return kb.docs.length+'|'+(ds[ds.length-1]||'');
}

async function boot(){
  marked.setOptions({breaks:true, gfm:true});
  let shown=false;
  // 纯静态：只读静态内容，不连数据库。静态文件由数据库变化触发 Action 重新生成。
  // 1) 首屏只下轻量列表 kb_index.json（无正文，几百KB → 快）；正文点开时按需拉
  try{
    const r=await fetch('kb_index.json',{cache:'no-cache'});
    if(r.ok){
      const idx=await r.json();
      if(idx&&idx.docs&&idx.docs.length){ applyKB(idx); shown=true; }
    }
  }catch(e){}
  // 2) 回退：完整 kb_cache.json（含正文）
  if(!shown){
    try{
      const r=await fetch('kb_cache.json',{cache:'no-cache'});
      if(r.ok){ const c=await r.json(); if(c&&c.docs&&c.docs.length){ applyKB(c); shown=true; } }
    }catch(e){}
  }
  // 3) 回退：打包内嵌数据（standalone 离线可用）
  if(!shown){
    try{
      const embed=document.getElementById('kbdata');
      const raw=embed?embed.textContent.trim():'';
      if(raw && raw[0]==='{'){ applyKB(JSON.parse(raw)); shown=true; }
      else{ const r=await fetch('kb.json'); applyKB(await r.json()); shown=true; }
    }catch(e){}
  }
  if(!shown){ $('#loading').innerHTML='加载失败，请刷新重试'; return; }
  $('#loading').style.display='none'; $('#app').style.display='grid';
  detectBackend();
  // 支持 URL 直达某篇文章：#doc=<id>
  const m=/#doc=(\d+)/.exec(location.hash||'');
  if(m){ const id=+m[1]; if(KB.docs.some(d=>d.id===id)) openDoc(id); }
}

// 决定「提交并发布」按钮：数据库在线 → 直接写库（线上也能提交）；否则探测本地服务
let HAS_BACKEND=false, BACKEND_PUSH=false, SUBMIT_MODE='none';  // 'db' | 'local' | 'none'
async function detectBackend(){
  // 页面纯静态读取，但“写文章提交”仍写入数据库（提交后由 webhook 触发重生成静态文件）
  if(SB && SB.url && SB.key){
    SUBMIT_MODE='db';
    $('#edSubmit').style.display='';
    $('#edDownload').classList.add('ghost2');
    $('#edDownload').textContent='⬇ 导出';
    $('#edHint').innerHTML='点「提交并发布」即可存入数据库，稍后自动同步到页面（约十几秒），无需手动处理文件。';
    return;
  }
  try{
    const r=await fetch('/api/health',{cache:'no-store'});
    if(!r.ok) throw 0;
    const j=await r.json();
    HAS_BACKEND=!!j.ok; BACKEND_PUSH=!!j.push;
  }catch(e){ HAS_BACKEND=false; }
  if(HAS_BACKEND){
    SUBMIT_MODE='local';
    $('#edSubmit').style.display='';
    $('#edDownload').classList.add('ghost2');
    $('#edDownload').textContent='⬇ 导出';
    $('#edHint').innerHTML='点「提交并发布」即可直接入库'
      +(BACKEND_PUSH?'并推送到线上':'（本地预览，刷新即见）')
      +'，无需手动处理文件。';
  }
}

function renderFoot(){
  const total=KB.docs.length;
  const internal=KB.docs.filter(d=>d.internal).length;
  const official=total-internal;
  const cats=KB.categories.filter(c=>KB.docs.some(d=>d.cat===c.key)).length;
  // 最近更新日期
  const dates=KB.docs.map(d=>d.updated).filter(Boolean).sort();
  const latest=dates.length?dates[dates.length-1]:'';
  $('#sideFoot').innerHTML=`
    <div class="sf-stat">
      <div class="sf-pill"><b>${total}</b><span>篇知识</span></div>
      <div class="sf-pill"><b>${cats}</b><span>大主题</span></div>
    </div>
    <div class="sf-line"><span class="sf-dot"></span>知识库在线 · 最近更新 ${latest||'—'}</div>
    <div class="sf-src">
      <b>官方权威 ${official} 篇</b>整理自火山引擎 DataTester，篇篇可溯源原文；
      ${internal?`<b>内部沉淀 ${internal} 篇</b>为团队实战经验。`:'并支持团队持续沉淀内部经验。'}
    </div>`;
}

function counts(){
  const m={all:KB.docs.length};
  KB.categories.forEach(c=>m[c.key]=0);
  KB.docs.forEach(d=>m[d.cat]=(m[d.cat]||0)+1);
  return m;
}
function renderCats(){
  const m=counts();
  let h=`<div class="cat ${CUR==='all'?'on':''}" data-k="all">
    <span class="ic">📚</span><span class="nm">全部知识</span><span class="ct">${m.all}</span></div>`;
  KB.categories.forEach(c=>{
    if(!m[c.key]) return;
    h+=`<div class="cat ${CUR===c.key?'on':''}" data-k="${c.key}" title="${esc(c.desc)}">
      <span class="ic">${c.icon}</span><span class="nm">${esc(c.name)}</span><span class="ct">${m[c.key]}</span></div>`;
  });
  $('#cats').innerHTML=h;
  document.querySelectorAll('.cat').forEach(el=>el.onclick=()=>{
    CUR=el.dataset.k; renderCats(); render(); closeSide();
    $('#bodyView').scrollTop=0;
  });
}

function match(){
  let arr=INDEX;
  if(CUR!=='all') arr=arr.filter(x=>x.d.cat===CUR);
  if(Q){
    const terms=Q.toLowerCase().split(/\s+/).filter(Boolean);
    arr=arr.filter(x=>terms.every(t=>x.t.includes(t)));
    // 标题命中优先
    arr=[...arr].sort((a,b)=>{
      const at=a.d.title.toLowerCase(), bt=b.d.title.toLowerCase();
      const as=terms.some(t=>at.includes(t))?1:0, bs=terms.some(t=>bt.includes(t))?1:0;
      return bs-as;
    });
  }else{
    // 不搜索时：按更新日期倒序（新发布的在最上面），同日期内部文章优先
    arr=[...arr].sort((a,b)=>{
      const au=a.d.updated||'', bu=b.d.updated||'';
      if(au!==bu) return bu<au?-1:1;                    // 日期新的在前
      return (b.d.internal?1:0)-(a.d.internal?1:0);      // 同日期内部文章优先
    });
  }
  return arr.map(x=>x.d);
}
function catOf(k){return KB.categories.find(c=>c.key===k)||{icon:'📎',name:'其他'};}

function hi(text){
  if(!Q) return esc(text);
  let h=esc(text);
  Q.toLowerCase().split(/\s+/).filter(Boolean).forEach(t=>{
    if(!t)return;
    const re=new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
    h=h.replace(re,'<mark>$1</mark>');
  });
  return h;
}
function excerpt(d){
  if(Q){
    const t=d.text, low=t.toLowerCase(), term=Q.toLowerCase().split(/\s+/)[0];
    const i=low.indexOf(term);
    if(i>=0){const s=Math.max(0,i-40);return (s>0?'…':'')+t.slice(s,s+140)+'…';}
  }
  return d.text.slice(0,140)+'…';
}

const PAGE=12;                 // 每批渲染卡片数（手机约2屏，分批更多、加载更可感知）
let RES=[], SHOWN=0, IO=null;  // 当前结果集 / 已渲染数 / 滚动观察器
function cardHTML(d){
  const c=catOf(d.cat);
  return `<div class="card" data-id="${d.id}">
      <h3>${hi(d.title)}</h3>
      <div class="excerpt">${hi(excerpt(d))}</div>
      <div class="meta">
        <span class="ct-tag">${c.icon} ${esc(c.name)}</span>
        <span class="mdot">📄 ${(d.text||'').length.toLocaleString()} 字</span>
        ${d.updated?`<span class="mdot">🕐 ${d.updated}</span>`:''}
        <span class="src">阅读 →</span>
      </div></div>`;
}
function bindCards(scope){
  (scope||document).querySelectorAll('.card:not([data-bound])').forEach(el=>{
    el.dataset.bound='1'; el.onclick=()=>openDoc(+el.dataset.id);
  });
}
let LOADING=false;
function _appendBatch(){
  const list=$('#kbList'); if(!list) return;
  const start=SHOWN;
  const next=RES.slice(SHOWN, SHOWN+PAGE);
  list.insertAdjacentHTML('beforeend', next.map(cardHTML).join(''));
  SHOWN+=next.length; bindCards(list);
  // 让本批新卡片错落淡入（可见的瀑布流效果）
  const cards=list.querySelectorAll('.card');
  for(let i=start;i<SHOWN;i++){ const el=cards[i]; if(el){ el.classList.add('new'); el.style.animationDelay=((i-start)*55)+'ms'; } }
  const sen=$('#sentinel');
  if(sen){
    if(SHOWN>=RES.length){
      sen.className='loadmore done'; sen.innerHTML='— 已显示全部 '+RES.length+' 篇 —'; sen.removeAttribute('style');
    }else{
      sen.className='loadmore'; sen.innerHTML='下滑加载更多（已显示 '+SHOWN+' / '+RES.length+'）';
    }
  }
}
// first=true 为首批（立即渲染，秒开）；滚动触发的批次先显示“加载中”停顿一下再出，让用户看得见
function renderMore(first){
  if(LOADING) return;
  if(first){ _appendBatch(); return; }
  if(SHOWN>=RES.length) return;
  LOADING=true;
  const sen=$('#sentinel');
  if(sen){ sen.className='loadmore'; sen.innerHTML='<span class="dot"></span>正在加载更多…'; }
  setTimeout(()=>{ _appendBatch(); LOADING=false; }, 480);
}
function render(){
  RES=match(); SHOWN=0;
  if(IO){ IO.disconnect(); IO=null; }
  $('#stat').innerHTML = Q
    ? `找到 <b>${RES.length}</b> 篇匹配「${esc(Q)}」的知识`
    : `共 <b>${RES.length}</b> 篇 · 全库 <b>${KB.docs.length}</b> 篇 · 每篇可溯源至官方原文`;
  const v=$('#bodyView');
  if(!RES.length){
    v.innerHTML=`<div class="empty"><div class="big">🔍</div>没有找到相关内容，换个关键词试试</div>`;return;
  }
  v.innerHTML=`<div class="list" id="kbList"></div><div id="sentinel" style="height:1px"></div>`;
  renderMore(true);  // 首批立即渲染（秒开）
  // 滚动到底自动加载下一批
  const sen=$('#sentinel');
  if(sen && SHOWN<RES.length){
    IO=new IntersectionObserver(es=>{ if(es[0].isIntersecting) renderMore(); }, {root:v, rootMargin:'80px'});
    IO.observe(sen);
  }
  return;
}

// 正文按需加载：轻量列表无 md，点开文章时从 kb_docs.json 取（取一次缓存整份）
let DOCS_CACHE=null;
async function getMd(id){
  const d=KB.docs.find(x=>x.id===id);
  if(d && d.md) return d.md;                    // 已有正文（内嵌/完整版）
  if(!DOCS_CACHE){
    try{ const r=await fetch('kb_docs.json',{cache:'no-cache'}); if(r.ok) DOCS_CACHE=await r.json(); }
    catch(e){ DOCS_CACHE={}; }
  }
  return (DOCS_CACHE&&DOCS_CACHE[String(id)])||'（正文加载失败，请刷新重试）';
}

// 把正文里“相邻的多张图”并排成一行(.imrow)。
// marked(breaks:true) 会把连续图片行渲染成 <img><br><img>，需按同级相邻 img 分组。
function groupImages(scope){
  const md=(scope||document).querySelector('.md'); if(!md) return;
  const imgs=[...md.querySelectorAll('img')];
  const seen=new Set();
  imgs.forEach(img=>{
    if(seen.has(img)) return;
    // 收集与该 img 同父、仅被 <br> 或空白文本隔开的连续 img
    const run=[img]; let n=img.nextSibling;
    while(n){
      if(n.nodeType===3 && !n.textContent.trim()){ n=n.nextSibling; continue; }
      if(n.nodeType===1 && n.tagName==='BR'){ n=n.nextSibling; continue; }
      if(n.nodeType===1 && n.tagName==='IMG'){ run.push(n); n=n.nextSibling; continue; }
      break;
    }
    if(run.length>=2){
      const row=document.createElement('div'); row.className='imrow';
      img.parentNode.insertBefore(row, img);
      // 移走这些 img 及它们之间的 <br>
      run.forEach((im,idx)=>{
        let br=im.nextSibling;
        row.appendChild(im); seen.add(im);
        // 清掉紧跟的 <br>（并排后不需要换行）
        while(br && ((br.nodeType===1&&br.tagName==='BR')||(br.nodeType===3&&!br.textContent.trim()))){
          const del=br; br=br.nextSibling; if(del.parentNode) del.parentNode.removeChild(del);
        }
      });
    } else { seen.add(img); }
  });
}

async function openDoc(id){
  const d=KB.docs.find(x=>x.id===id); if(!d)return;
  const c=catOf(d.cat);
  const v=$('#bodyView');
  let md=await getMd(id);
  // 去掉正文开头与标题重复的一级标题（页面头部已显示大标题）
  md=(md||'').replace(/^\s*#\s+.*(?:\r?\n)+/, '');
  let html=marked.parse(md);
  const isInternal = d.internal || !/^https?:/.test(d.url||'');
  const srcFoot = isInternal
    ? '本文为营销增长中心内部沉淀'
    : '内容整理自火山引擎 DataTester A/B testing 文档库';
  v.innerHTML=`<div class="reader">
    <div class="rback" id="rback">← 返回列表</div>
    <article class="rhead">
      <h1>${esc(d.title)}</h1>
      <div class="rmeta">
        <span class="ct-tag">${c.icon} ${esc(c.name)}</span>
        ${d.updated?`<span>🕐 ${d.updated}</span>`:''}
        <span>📄 ${d.text.length.toLocaleString()} 字</span>
        <span class="copylink" id="copyLink" data-id="${d.id}">🔗 复制链接</span>
      </div>
    </article>
    <div class="md">${html}</div>
    <div class="rfoot">${srcFoot}</div>
  </div>`;
  v.scrollTop=0;
  groupImages(v);
  try{ if(location.hash!=='#doc='+id) history.replaceState(null,'','#doc='+id); }catch(e){}
  $('#rback').onclick=()=>{ try{history.replaceState(null,'',location.pathname+location.search);}catch(e){} render(); };
  const cl=$('#copyLink');
  if(cl) cl.onclick=async()=>{
    const url=location.origin+location.pathname+'#doc='+cl.dataset.id;
    let ok=false;
    try{ await navigator.clipboard.writeText(url); ok=true; }
    catch(e){
      try{ const ta=document.createElement('textarea'); ta.value=url; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select(); ok=document.execCommand('copy'); ta.remove(); }catch(_){}
    }
    const old=cl.innerHTML;
    cl.innerHTML = ok ? '✅ 链接已复制' : '⚠️ 复制失败，长按地址栏';
    cl.classList.add('copied');
    setTimeout(()=>{ cl.innerHTML=old; cl.classList.remove('copied'); }, 1800);
  };
}

// 搜索
$('#q').addEventListener('input',e=>{
  Q=e.target.value.trim();
  $('#clr').style.display=Q?'block':'none';
  render();
});
$('#clr').onclick=()=>{$('#q').value='';Q='';$('#clr').style.display='none';render();$('#q').focus();};
// 移动端
function closeSide(){$('#aside').classList.remove('open');$('#mmask').classList.remove('on');}
$('#mtoggle').onclick=()=>{$('#aside').classList.toggle('open');$('#mmask').classList.toggle('on');};
$('#mmask').onclick=closeSide;

/* ===== 写文章编辑器 ===== */
// ===== 写文章登录门（参考 vc 后台方案：口令存 Supabase，24h 免验证）=====
const AUTH_KEY='ab_kb_auth_ts', AUTH_TTL=24*3600*1000;
function loggedIn(){
  try{const ts=+localStorage.getItem(AUTH_KEY); return ts && (Date.now()-ts)<AUTH_TTL;}catch(e){return false;}
}
// 点「写文章」：已登录直接进；否则先弹口令门
function requireAuthThenEdit(){
  if(loggedIn()){ openEditor(); return; }
  $('#loginErr').textContent='';
  $('#loginPin').value='';
  $('#loginMask').classList.add('on');
  setTimeout(()=>$('#loginPin').focus(),50);
}
async function doLogin(){
  const pin=$('#loginPin').value.trim();
  const err=$('#loginErr');
  if(!pin){ err.textContent='请输入口令'; return; }
  err.textContent='校验中…';
  try{
    // 口令存 Supabase dashboard_auth 表，不写死在前端
    const rows=await sbGet('dashboard_auth?select=pin&limit=1');
    const real=(rows&&rows[0]&&rows[0].pin)||'';
    if(pin===real){
      try{localStorage.setItem(AUTH_KEY,String(Date.now()));}catch(e){}
      $('#loginMask').classList.remove('on');
      openEditor();
    }else{ err.textContent='口令错误'; }
  }catch(e){ err.textContent='网络错误，请稍后重试'; }
}

function openEditor(){
  // 填充分类下拉（排除兜底 misc 之外都可选，misc 也留着）
  const sel=$('#edCat');
  if(!sel.options.length){
    KB.categories.forEach(c=>{
      const o=document.createElement('option');
      o.value=c.key; o.textContent=`${c.icon} ${c.name}`;
      sel.appendChild(o);
    });
    sel.value='cases';
  }
  $('#editor').classList.add('on'); $('#editorMask').classList.add('on');
  updatePrev(); closeSide();
}
function closeEditor(){$('#editor').classList.remove('on');$('#editorMask').classList.remove('on');}
function edData(){
  return {
    title:$('#edTitle').value.trim(),
    cat:$('#edCat').value,
    kw:$('#edKw').value.trim(),
    md:$('#edMd').value
  };
}
function updatePrev(){
  const d=edData(); const c=catOf(d.cat);
  $('#edPrevTag').innerHTML=`${c.icon} ${esc(c.name)}`;
  $('#edPrevTitle').textContent=d.title||'（未填标题）';
  $('#edPrevBody').innerHTML=marked.parse(d.md||'*在左侧输入 Markdown，这里实时预览…*');
}
function downloadMd(){
  const d=edData();
  if(!d.title){alert('请先填写标题');return;}
  if(!d.md.trim()){alert('正文不能为空');return;}
  const today=new Date().toISOString().slice(0,10);
  const front=`---\ntitle: ${d.title}\ncat: ${d.cat}\nkeywords: ${d.kw}\ndate: ${today}\n---\n\n`;
  const blob=new Blob([front+d.md],{type:'text/markdown;charset=utf-8'});
  // 文件名：安全化标题
  const safe=d.title.replace(/[\/\\:*?"<>|\s]+/g,'_').slice(0,40);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=`${safe}.md`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(a.href);
}
function edMsg(cls,txt){const m=$('#edMsg');m.className='ed-msg '+cls;m.textContent=txt;}
function plainText(md){
  return (md||'').replace(/!\[[^\]]*\]\([^)]*\)/g,'').replace(/<[^>]+>/g,'')
    .replace(/```[\s\S]*?```/g,'').replace(/[#>*`|\-]{1,}/g,' ').replace(/\s+/g,' ').trim();
}
// 直接写入 Supabase（A方案主路径）
async function submitToDB(d){
  const today=new Date().toISOString().slice(0,10);
  const row={
    doc_id: 910000000+Date.now()%90000000,   // 内部文章用9开头唯一id
    title:d.title, cat:d.cat, keywords:(d.kw+' 内部文章').trim(),
    md:d.md, body_text:plainText(d.md), updated:today,
    source_url:'', is_internal:true
  };
  const r=await fetch(SB.url+'/rest/v1/ab_articles',{method:'POST',
    headers:{apikey:SB.key,Authorization:'Bearer '+SB.key,'Content-Type':'application/json',Prefer:'return=minimal'},
    body:JSON.stringify(row)});
  if(!r.ok) throw new Error('数据库写入失败 '+r.status);
}
async function submitArticle(){
  const d=edData();
  if(!d.title){edMsg('err','请先填写标题');return;}
  if(!d.md.trim()){edMsg('err','正文不能为空');return;}
  const btn=$('#edSubmit'); btn.disabled=true;
  edMsg('load','正在提交并发布，请稍候…');
  try{
    if(SUBMIT_MODE==='db'){
      await submitToDB(d);
      // 纯静态：不回连数据库。本地把新文章插入内存，让提交者当场看到；
      // 线上静态文件由数据库变化触发 GitHub Action 重新生成（约十几秒后全网同步）。
      const today=new Date().toISOString().slice(0,10);
      KB.docs.push({id:910000000+Date.now()%90000000,title:d.title,cat:d.cat,
        keywords:(d.kw+' 内部文章').trim(),md:d.md,text:plainText(d.md),
        updated:today,url:'',internal:true});
      KB.meta.total=KB.docs.length;
      edMsg('ok','✓《'+d.title+'》已提交，约十几秒后自动同步到线上。');
    }else{
      const r=await fetch('/api/publish',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({title:d.title,cat:d.cat,keywords:d.kw,md:d.md})});
      const j=await r.json();
      if(!j.ok) throw new Error(j.error||'发布失败');
      const kr=await fetch('kb.json?t='+Date.now(),{cache:'no-store'}); KB=await kr.json();
      edMsg('ok','✓ '+(j.msg||'已发布')+'。正在刷新…');
    }
    INDEX=KB.docs.map(x=>({d:x,t:(x.title+' '+x.keywords+' '+x.text).toLowerCase()}));
    renderCats(); renderFoot();
    setTimeout(()=>{
      closeEditor();
      $('#edTitle').value='';$('#edMd').value='';$('#edKw').value='';
      const doc=KB.docs.find(x=>x.title===d.title);
      CUR='all';Q='';$('#q').value='';renderCats();
      if(doc){render();openDoc(doc.id);} else render();
    },700);
  }catch(e){
    edMsg('err','✗ '+e.message+'（可改用「导出」兜底）');
  }finally{ btn.disabled=false; }
}
$('#writeBtn').onclick=requireAuthThenEdit;
$('#loginBtn').onclick=doLogin;
$('#loginPin').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
$('#loginMask').addEventListener('click',e=>{if(e.target===$('#loginMask'))$('#loginMask').classList.remove('on');});
$('#edClose').onclick=closeEditor;
$('#editorMask').onclick=closeEditor;
$('#edMd').addEventListener('input',updatePrev);
$('#edTitle').addEventListener('input',updatePrev);
$('#edCat').addEventListener('change',updatePrev);
$('#edDownload').onclick=downloadMd;
$('#edSubmit').onclick=submitArticle;

boot();
</script>

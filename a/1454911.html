<script>window.DATA_BASE="../";window.INIT_DOC=1454911;window.INIT_MD="DataTester为您提供实验模版功能，实验模板可以非常快速设置一些实验创建时必填写表单项，或者强制固化表单项里的值。这会方便整个集团建设实验时对表单的控制，提升对表单项的理解清晰度。本文为您介绍实验模板功能的操作指导。\n\n<span id=\"f3e08b10\"></span>\n# 注意事项\n\n仅拥有实验模板相关权限的角色用户才可使用实验模板功能。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/18fbd303a43b453fb928fa8ae5ce8ae2~tplv-goo7wpa0wc-image.image) </span>\n\n\n* 查看/使用实验模版：可以查看实验模版列表，使用模版。\n\n* 新增/配置实验模板：可创建、管理实验模板。\n\n\n<span id=\"4c8948ec\"></span>\n# 创建与管理实验模板\n\n<span id=\"72f7a42f\"></span>\n## 创建实验模板\n\n\n1. 登录并进入DataTester控制台，单击左侧导航栏的 **开放能力** \\> **实验模板**，进入实验模板页面，单击右上角的**新建模板**按钮，创建实验模板。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/3d2857e30c444f84951083bf1d3fca40~tplv-goo7wpa0wc-image.image) </span>\n\n2. 在弹出的页面配置使用模板参数。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/8a5a9d457f7f411d894d828ea50fa657~tplv-goo7wpa0wc-image.image) </span>\n\n   \n   |参数 |配置说明 |\n   |---|---|\n   |**模板名称** & **业务背景** |自定义**模板名称**和**业务背景**，后续实验人员引用模板创建实验时，可通过模板名称和业务背景识别应该使用哪个模板、是否服务业务需求，业务背景可配置为：【xxx版本功能迭代专用】。 |\n   |**实验类型** |根据业务需要选择实验模板是**编程实验\\-服务端**还是**编程实验\\-客户端**的实验模板。 |\n   \n\n3. 单击**创建并进入模板编辑器**，页面跳转至实验模板的详细参数页面，配置实验模板的详细实验参数。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/54cd091005074a2cb93c03fc3339238f~tplv-goo7wpa0wc-image.image) </span>\n\n   * 实验模板参数配置与创建普通编程实验的实验参数配置一致，详情请参见[编程实验](https://www.volcengine.com/docs/6287/65809)。\n\n   * 实验模板参数页面右上方有针对各个实验参数的设置，您可根据需要设置对应参数**是否固化**、**是否禁用**。\n\n      * **是否固化**：是否将实验模板中配置好的参数内容作为该模板的初始值，当引用该模板创建实验时，会直接填充此值。\n\n      * **是否禁用**：如果参数开启禁用，则引用模板创建实验时，参数不可被改动，可以防止一些关键参数配置结果被改动。\n\n4. 完成实验模板参数配置后，单击右上角的**保存配置**，完成实验模板创建，页面返回实验模板页面，您可以查看已创建好的实验模板。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/600638dac286459d81561c326ea0c66a~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"12340a74\"></span>\n## 编辑/修改实验模板\n\n您可以在实验模板页面对已创建好的实验模板进行编辑、复制、删除等操作。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/d251a1007f584d5bae5081d611ae429e~tplv-goo7wpa0wc-image.image) </span>\n\n\n* 鼠标悬浮于实验模板上，您可单击**模板配置**，直接跳转至实验模板参数配置页面，可直接修改实验参数的配置。\n\n* 鼠标悬浮于实验模板右上角的编辑按钮后会展示**编辑**、**复制**、**删除**按钮，您可根据需要单击对应按钮进行操作。\n\n\n<span id=\"1f2ae3b4\"></span>\n# 引用实验模板\n\n创建完成实验模板后，后续实验人员创建实验时，可在实验列表直接引用已创建的实验模板创建实验。\n\n\n1. 登录并进入DataTester控制台，单击左侧导航栏的 **A/B测试** \\> **实验列表**，在页面左上角单击\\*\\*+模板创建实验\\*\\*按钮。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/15a9f57036714d339dcd9d41fc6ee5ad~tplv-goo7wpa0wc-image.image) </span>\n\n2. 在弹出的页面中找到希望引用的实验模板（支持右上方搜索实验模板标题或描述），单击后方的**应用**。\n\n3. 页面跳转至创建实验的实验参数配置页面，页面中根据选择引用的实验模板预填好了部分的参数，您可根据实际实验需要在此基础之上进行调整修改，进而完成实验创建。\n\n\n<span id=\"9b66a62a\"></span>\n# 应用实践\n\n<span id=\"734271a0\"></span>\n## **实践1：锁定实验key的初始类型为json 提升效率**\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/6785f42133c3400cadb5303976a8466e~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"24b24dc8\"></span>\n## **实践2：固化一些默认勾选指标，在模板创建实验时自动勾选**\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/c7b24cf8b7dc4c62a3de974c00ef214a~tplv-goo7wpa0wc-image.image) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

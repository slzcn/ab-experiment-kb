<script>window.DATA_BASE="../";window.INIT_DOC=65802;window.INIT_MD="<span id=\"一-概述\"></span>\n# 概述\n\n「A/B 测试」 在 Android 客户端的SDK 使用的为增长营销套件SDK ，主要的和A/B Test 相关接口有两个：\n\n\n* 实验组分流接口\n\n* 指标上报（事件埋点上报）接口\n\n\n<span id=\"_1-集成sdk\"></span>\n# 1.集成SDK\n\n\n* 如果已经集成了RangerAppLog\\-lite/ RangerAppLog\\-all 可以跳过此部分；\n\n* 如果没有，请参照下面：\n\n\n<span id=\"_1-1-引入仓库\"></span>\n## 1. 1 引入仓库\n\n**Gradle** **7.0 以下：** \n\n```groovy\n// 在 project 级别的 build.gradle 中添加 maven 仓库\n// 在 allprojects 的 repositories 中添加 maven 仓库\nallprojects {\n    repositories {\n        maven {\n            url 'https://artifact.bytedance.com/repository/Volcengine/'\n        }\n        // 其他仓库\n    }\n}\n```\n\n\n**Gradle** **7.0 及以上：** \n\n```typescript\n// 在 project 级别的 setting.gradle 中添加 maven 仓库\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)\n    repositories {\n        // 省略其他\n        maven{\n            url 'https://artifact.bytedance.com/repository/Volcengine/'\n        }\n    }\n}\n```\n\n\n<span id=\"_1-2-引入插件-可选\"></span>\n## 1.2 引入插件(可选)\n\n如需开启全埋点、webview 自动注入、隐私字段代码移除等功能，请执行1.2引入插件。否则可跳过此步骤。\n\n<span id=\"插件依赖\"></span>\n### 1.2.3 插件仓库\n\n**Gradle** **7.0 以下：** \n\n```groovy\n// 在 project 级别的 build.gradle 的 buildscript 的 repositories 中添加 maven 仓库、引入 SDK plugin\nbuildscript {\n    repositories {\n        maven{\n            url 'https://artifact.bytedance.com/repository/Volcengine/'\n        }\n        // 省略其他\n    }\n}\n```\n\n\n**Gradle** **7.0 及以上：** \n\n```typescript\n// setting.gradle 中\npluginManagement {\n    repositories {\n        maven{\n            url 'https://artifact.bytedance.com/repository/Volcengine/'\n        }\n        // 省略其他\n    }\n}\n```\n\n\n<span id=\"3c233644\"></span>\n### 1.2.2 插件依赖\n\n\n<Tabs>\n<Tab zoneid=\"g3sXhhiKHV\" title=\"Gradle 7.0 以下\">\n<TabTitle>Gradle 7.0 以下</TabTitle>\n\n```Groovy\n// 在project 级别的 build.gradle 的 buildscript的repositories中添加maven仓库、引入SDK plugin\nbuildscript {\n    // 省略其他\n    dependencies {\n        classpath 'com.bytedance.applog:RangersAppLog-All-plugin:6.16.10'\n    }\n}\n\n// 在 app module 级别的 build.gradle \n// 默认放到插件列表最后一个声明，如遇到冲突，\n// 可以将其调整到 application / kotlin 等官方插件后的第一个\napply plugin: 'com.bytedance.std.tracker'\n```\n\n\n\n</Tab>\n<Tab zoneid=\"GhiLUFP0SF\" title=\"Gradle 7.0 以上到 8.0 以下\">\n<TabTitle>Gradle 7.0 以上到 8.0 以下</TabTitle>\n\n```Groovy\n// project 级别的 build.gradle 中\nbuildscript {\n    // 省略其他\n    dependencies {\n        classpath 'com.bytedance.applog:RangersAppLog-All-plugin:6.16.10'\n    }\n}\n\n// 在 app module 级别的 build.gradle \n// 默认放到插件列表最后一个声明，如遇到冲突，\n// 可以将其调整到 application / kotlin 等官方插件后的第一个\nplugins {\n    // 省略其他插件\n    id 'com.bytedance.std.tracker'\n}\n```\n\n\n\n</Tab>\n<Tab zoneid=\"JRJUL3bqPV\" title=\"Gradle 8.0 及以上\">\n<TabTitle>Gradle 8.0 及以上</TabTitle>\n\n```Groovy\n// project 级别的 build.gradle 中\nbuildscript {\n    dependencies {\n        // agp8 版本使用新版本插件\n        classpath 'com.bytedance.applog:RangersAppLog-All-plugin-agp8:6.16.10'\n    }\n}\n\n// 在 app module 级别的 build.gradle \n// 默认放到插件列表最后一个声明，如遇到冲突，\n// 可以将其调整到 application / kotlin 等官方插件后的第一个\nplugins {\n    // 省略其他插件\n    id 'com.bytedance.std.tracker'\n}\n```\n\n\n\n</Tab>\n</Tabs>\n\n\n<span id=\"4789e7e2\"></span>\n### 1.2.3 插件使用示例\n\n在 app module 级别的 build.gradle文件中应用 plugin。\n\n\n<Tabs>\n<Tab zoneid=\"btvLXSmi04\" title=\"Gradle 8.0 以下\">\n<TabTitle>Gradle 8.0 以下</TabTitle>\n\n```Groovy\nteaExtension {\n    // 自动注入webview的对接bridge\n    autoInjectWebViewBridge = true\n\n    // 插装黑名单，包路径前缀，针对某些不希望进行插桩的包进行配置\n    // 需要将包名中的 . 替换成 /，可配置多个，通过 , 分割\n    // 示例：blackList = ['dji/upgrade/internal','org/bouncycastle/jcajce']\n    blackList = []\n\n    // 埋点黑名单配置\n    // 仅支持以下配置：\n    // 'MAC_ADDRESS'： mac地址\n    // 'IMEI_MEID'： imei和meid\n    // 'OAID'： oaid\n    // 'ANDROIDID': android id\n     // 'OPERATOR': carrier、mcc_mnc\n    // 'CLIPBOARD':剪切板相关代码\n    // 示例：trackBlackList = ['MAC_ADDRESS', 'IMEI_MEID', 'OPERATOR']\n    trackBlackList = []\n  \n    // 6.14.3 新功能\n    // 关闭接口/类自动跟踪功能\n    // 使用场景举例：当您使用 lite 包时，但又需要 trackBlackList 来移除部分采集代码时，可以使用该功能\n    disableAutoTrack = false\n}\n```\n\n\n\n</Tab>\n<Tab zoneid=\"puHHAeDsAW\" title=\"Gradle 8.0 及以上\">\n<TabTitle>Gradle 8.0 及以上</TabTitle>\n\n```Groovy\n// 新版插件使用调整为 appLog \nappLog {\n    // 自动注入webview的对接bridge\n    // agp8 的打通功能需要使用 6.16.7 及以上版本\n    autoInjectWebViewBridge = true\n\n    // 插装黑名单，包路径前缀，针对某些不希望进行插桩的包进行配置，对标老版插件 blackList\n    // 示例：ignoredInstrumentationPaths = ['dji.upgrade.internal','org.bouncycastle.jcajce']\n    // 写法从 ['dji/upgrade/internal','org/bouncycastle/jcajce'] 调整为 ['dji.upgrade.internal','org.bouncycastle.jcajce']\n    ignoredInstrumentationPaths = []\n\n    // 埋点黑名单配置，对标老版插件 trackBlackList\n    // 仅支持以下配置：\n    // 'MAC_ADDRESS'： mac地址\n    // 'IMEI_MEID'： imei和meid\n    // 'OAID'： oaid\n    // 'ANDROIDID': android id\n    // 'OPERATOR': carrier、mcc_mnc\n    // 'CLIPBOARD':剪切板相关代码\n    // 示例：sensitiveFieldsBlocklist = ['MAC_ADDRESS', 'IMEI_MEID', 'OPERATOR']\n    sensitiveFieldsBlocklist = []\n  \n    // 6.14.3 新功能\n    // 关闭接口/类自动跟踪功能\n    // 使用场景举例：当您使用 lite 包时，但又需要 trackBlackList 来移除部分采集代码时，可以使用该功能\n    disableAutoTrack = false\n}\n```\n\n\n\n</Tab>\n</Tabs>\n\n\n<span id=\"_1-3-引入sdk\"></span>\n## 1.3 引入SDK\n\n在app module级别的build.gradle文件中，在dependencies里引入SDK。\n\n目前提供两个版本的SDK，请根据业务需要择一引用即可。\n\n如您需要使用完整的SDK功能，请集成All版本：\n\n```groovy\n// 在build.gradle文件的dependencies中引入SDK，集成All版本，推荐此版本\nimplementation 'com.bytedance.applog:RangersAppLog-All-cn:6.16.10'\n```\n\n\n如您不需要全埋点采集、圈选功能，仅需要自定义埋点，可集成Lite版本：\n\n```groovy\n// 在build.gradle文件的dependencies中引入SDK，集成Lite版本\nimplementation 'com.bytedance.applog:RangersAppLog-Lite-cn:6.16.10'\n```\n\n\n请注意，上述两个版本只需要二选一集成，否则会导致编译报错。\n\n<span id=\"_1-4-引入调试工具-devtools组件-可选\"></span>\n## 1.4 引入调试工具 \\- DevTools组件(可选)\n\n> 本小节功能在6.12.0+后开始支持。\n\n\n`DevTools`是Debug环境下辅助开发者或测试人员进行应用内埋点验证和SDK接入问题排查的组件。在app module级别的build.gradle文件中，在dependencies里引入`DevTools`。详细接入文档请查阅： [DevTools-Android 快速接入](https://www.volcengine.com/docs/76880/1033614)。\n\n```java\n// debug或测试包中依赖DevTools组件\ndebugImplementation 'com.bytedance.applog:RangersAppLog-DevTools:3.4.6'\n// release下依赖DevTools-No-Op组件\nreleaseImplementation 'com.bytedance.applog:RangersAppLog-DevTools-No-Op:3.4.6'\n```\n\n\n<span id=\"_1-5-实时埋点检测和圈选功能-可选\"></span>\n## 1.5 实时埋点检测和圈选功能(可选)\n\n如需使用[实时埋点检测](https://www.volcengine.com/docs/6285/66054)或[圈选功能](https://www.volcengine.com/docs/6285/66197)，请引入scheme包，并且按照第3章节配置。 否则可跳过此步骤。\n\n⚠️ 请务必确保在正式上线前移除scheme包，仅在debug期间使用，避免合规风险。\n\n```groovy\n// 在build.gradle文件的dependencies中添加\nimplementation 'com.bytedance.applog:RangersAppLog-All-scheme:6.16.10'\n```\n\n\n<span id=\"_1-6-反作弊风控子库-可选\"></span>\n## 1.6 反作弊风控子库(可选)\n\n如需使用广告监测功能，为使其反作弊识别准确度更高，请执行1.5节引入风控子库。否则可跳过此步骤。\n\n```groovy\n// 在build.gradle文件的dependencies中添加\nimplementation 'com.volcengine:metasec_ml:4.3.4'\nimplementation 'com.bytedance.applog:RangersAppLog-All-metasec-cn:6.16.10'\n```\n\n\n<span id=\"_1-7-kotlin相关依赖-可选\"></span>\n## 1.7 Kotlin相关依赖(可选)\n\n如您使用kotlin语言编写项目，请执行1.6节确认kotlin依赖的引入。否则可跳过此步骤。\n\n```groovy\nimplementation 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.3.61'\n```\n\n\n<span id=\"_1-8-手动引入须知\"></span>\n## 1.8 手动引入须知\n\n推荐您远程引入 SDK。如特殊情况需要手动引入，请补充阅读本小节。\n\n请前往[Android SDK包下载页面](https://github.com/volcengine/datarangers-sdk-packages/tree/main/Android)获取对应版本的SDK包。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">Android离线包名称为\\*<code>All-cn-Android_版本号</code>\\*<code>.zip</code>格式。例如：<code>All-cn_Android_6.16.10.zip</code>，其中6.16.10为SDK版本号。</div>\n\n\n```groovy\n必选依赖：\n - if_encryptor-xxx.aar / encryptor-xxx-private.aar：加密库相关\n - RangersAppLog-All-cn-xxx.aar：增长营销主模块\n - RangersAppLog-Log-xxx.aar：增长营销 SDK 内部日志依赖\n - plugin-aggregation-xxx.aar：增长营销 SDK 内部信息聚合模块依赖\n\n非必选依赖：\n - RangersAppLog-All-scheme-xxx.aar：实时埋点检测和圈选功能，请参考 1.5 解释\n - RangersAppLog-All-metasec-cn-xxx.aar：反作弊风控子库，请参考 1.6 解释\n - RangersAppLog-All-plugin-xxx.jar：SDK plugin，主要提供全埋点 / h5 打通 / 黑名单过滤 / 移除部分隐私采集代码功能\n - RangersAppLog-DevTools-xxx.aar：可视化埋点调试工具，可用于埋点流程验证\n\n\n集成方式一，项目中已包含所有 libs 下 aar / jar：\n// app 目录下 build.gradle\nimplementation fileTree(dir: 'libs', include: ['*.jar','*.aar'])\n// 此时可以将以上必须依赖以及部分需要可选依赖添加到 libs 目录下\n\n集成方式二，逐个集成：\n// app 目录下 build.gradle\nimplementation files('libs/encryptor-xxx-private.aar')\nimplementation files('libs/if_encryptor-xxx.aar')\nimplementation files('libs/RangersAppLog-All-cn-xxx.aar')\nimplementation files('libs/RangersAppLog-Log-xxx.aar')\nimplementation files('libs/plugin-aggregation-xxx.aar')\n// 剩余部分按需集成\n// 注：调试工具建议仅 debug 模式即成\ndebugImplementation files('libs/RangersAppLog-DevTools-xxx.aar')\n\n如果离线使用 plugin，请参考以下集成方式：\n// 根目录下 build.gradle\nbuildscript {\n  dependencies {\n    // 增长营销所需的 gradle 插件\n    // 如果放在 app/libs 目录下 xxxdir 可以替换为 app/libs\n    classpath fileTree(include: ['*.jar'], dir: 'xxxdir/RangersAppLog-All-plugin-xxx.jar')\n  }\n}\n\n离线包依赖混淆配置：\n-keep class com.bytedance.applog.picker.DomSender { public *; }\n-keep class com.bytedance.applog.tracker.WebViewUtil { public *; }\n-keep class com.bytedance.applog.metasec.AppLogSecHelper { *; }\n\n-keepclassmembers class * {\n    public void loadUrl(java.lang.String);\n    public void loadUrl(java.lang.String, java.util.Map);\n    public void loadData(java.lang.String, java.lang.String, java.lang.String);\n    public void loadDataWithBaseURL(java.lang.String, java.lang.String, java.lang.String, java.lang.String, java.lang.String);\n}\n```\n\n\n<span id=\"_2-初始化sdk\"></span>\n# 2. 初始化SDK\n\n说明\n\nSDK会在初始化的时候就采集用户信息，请确保您采集用户信息之前已经获得用户授权。\n\n合规建议操作如下：\n\n用户授权后再进行SDK的初始化，取得用户授权前所有的信息都不会采集，预置事件也不会被采集。\n\n<span id=\"_2-1-获取appid\"></span>\n## 2.1 获取appid\n\n在开始集成前，首先需要在集团中拥有一个应用，请参考：[如何创建应用](https://www.volcengine.com/docs/6287/66984)。\n\n\n* SaaS\\-云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/de1df7b557de438893f3013583ee3cfb~tplv-goo7wpa0wc-image.image) </span>\n\n* SaaS\\-非云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/11d05eafc702439cb7bdd70059dc8bad~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"_2-2-获取数据上送地址\"></span>\n## 2.2 获取数据上送地址\n\n进行数据接入上报时，您需要根据当前的环境类型和端类型确认您的数据上报地址，如果上报地址设置错误，后续会导致您无法查询到上报的数据。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">请在上报数据前，务必确认您当前使用的环境类型，根据环境类型配置上报地址。查看当前的环境类型请参见<a href=\"https://www.volcengine.com/docs/6287/1544686\">SaaS云原生/非云原生&私有化环境</a>。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">如果您使用的是SaaS\\-云原生环境，您也需确认您的服务所在的地域，根据所在地域配置上报地址（通常您的服务会在华北2\\-北京地域，部分用户可能会使用其他地域）。SaaS\\-云原生用户查看服务所在地域请参见<a href=\"https://www.volcengine.com/docs/6287/1544685\">支持的地域</a>。</div>\n\n\n\n<span id=\"2b8d50a3\"></span>\n### SaaS\\-云原生 & SaaS\\-非云原生\n\n\n|地址类型 |SaaS\\-云原生环境<br><br>（国内：华北2\\-北京） |SaaS\\-云原生环境<br><br>（海外：亚太东南\\-柔佛） |SaaS\\-非云原生环境 国内环境 |SaaS\\-非云原生 海外BytePlus环境<br><br>（以下 SG 指新加坡） |\n|---|---|---|---|---|\n|数据上报地址 |* SaaS\\-云原生（华北）：https://gator.volces.com<br><br>* 需要配合使用 cn 包：`'com.bytedance.applog:RangersAppLog-All-cn:xxx'` |* https://gator.uba.ap\\-southeast\\-1.volces.com<br><br>* 需要配合使用海外包：'com.bytedance.applog:RangersAppLog\\-All\\-global:xxx' |* 无需配置，使用默认的数据上报地址<br><br>* 需要配合使用 cn 包：`'com.bytedance.applog:RangersAppLog-All-cn:xxx'` |* 无需配置，默认上报到 SG<br><br>* 需要配合使用海外包：`'com.bytedance.applog:RangersAppLog-All-global:xxx'` |\n|分流地址 |https://tab.volces.com |https://tab.ab.ap\\-southeast\\-1.volces.com |无需手动配置 |无需手动配置 |\n\n\n<span id=\"e375c0e9\"></span>\n### 私有化环境\n\n私有化部署场景下，您需要获取部署私有化环境时，自行规划配置的数据上送地址。如您不清楚此地址，请联系您的项目经理或客户成功经理。\n\n<span id=\"_2-3-初始化sdk\"></span>\n## 2.3 初始化SDK\n\n<span id=\"9c6c347b\"></span>\n### 2.3.1 SaaS\\-云原生版本\n\n如您使用SaaS云原生部署版本，请参照如下代码初始化SDK。\n\n```java\npublic class TheApplication extends Application {\n    @Override\n    public void onCreate() {\n        super.onCreate();\n        /* 初始化SDK开始 */\n        // 第一个参数APPID: 参考2.1节获取\n        // 第二个参数CHANNEL: 填写渠道，请注意不能为空\n        final InitConfig config = new InitConfig(\"{{APPID}}\", \"{{CHANNEL}}\");\n        // 设置数据上送地址，各环境各地域的上送地址请参见上文的 获取数据上送地址 章节。\n        UriConfig uriConfig = UriConfig.createByDomain(\"https://****.****.com\", null);\n        // 设置分流地址，各环境各地域的分流地址请参见上文的 获取数据上送地址 章节。\n        uriConfig.setAbUri(\"https://***.****.com\" + UriConfig.PATH_AB);\n        config.setUriConfig(uriConfig);\n        // 是否 init 后自动 start 可改为 false，并请在用户授权后调用 start 开启采集\n        config.setAutoStart(false);\n        \n        config.setAutoTrackEnabled(true); // 全埋点开关，true开启，false关闭\n        config.setAbEnable(true); // 开启 AB 测试 \n        config.setLogEnable(false); // true:开启日志，参考5.4节设置logger，false:关闭日志\n        config.clearABCacheOnUserChange(true); // 默认true，切换用户清空AB版本信息\n        AppLog.setEncryptAndCompress(true); // 加密开关，true开启，false关闭\n        // 初始化一次即可\n        // 如果在 Applition 中初始化建议使用该方法\n        AppLog.init(this, config);\n        // 如果在 Activity 中初始化建议使用该方法\n        AppLog.init(this, config, activity);\n        /* 初始化SDK结束 */\n    }\n}\n```\n\n\n<span id=\"_2-3-1-saas版本\"></span>\n### 2.3.2 SaaS\\-非云原生版本\n\n如您使用SaaS部署版本，请参照如下代码初始化SDK。\n\n```java\npublic class TheApplication extends Application {\n    @Override\n    public void onCreate() {\n        super.onCreate();\n        /* 初始化SDK开始 */\n        // 第一个参数APPID: 参考2.1节获取\n        // 第二个参数CHANNEL: 填写渠道信息，请注意不能为空\n        final InitConfig config = new InitConfig(\"{{APPID}}\", \"{{CHANNEL}}\");\n        // 设置数据上送地址，各环境各地域的上送地址请参见上文的 获取数据上送地址 章节。\n        config.setUriConfig(UriConstants.DEFAULT);\n        // 是否 init 后自动 start 可改为 false，并请在用户授权后调用 start 开启采集\n        config.setAutoStart(false);\n        \n        config.setAbEnable(true); // 开启 AB 测试      \n        config.setAutoTrackEnabled(true); // 全埋点开关，true开启，false关闭\n        config.clearABCacheOnUserChange(true); // 默认true，切换用户清空AB版本信息\n        config.setLogEnable(false); // true:开启日志，参考5.4节设置logger，false:关闭日志\n        AppLog.setEncryptAndCompress(true); // 加密开关，true开启，false关闭\n        // 初始化一次即可 \n        // 如果在 Applition 中初始化建议使用该方法 \n        AppLog.init(this, config); \n        // 如果在 Activity 中初始化建议使用该方法 \n        AppLog.init(this, config, activity); \n        /* 初始化SDK结束 */\n        \n        // 请在用户授权后调用如下方法，start 开始实际采集用户信息+上报：\n        AppLog.start()\n    }\n}\n```\n\n\n<span id=\"_2-3-2-私有化版本\"></span>\n### 2.3.3 私有化版本\n\n如您使用私有化部署版本，请参照如下代码初始化SDK。\n\n```java\npublic class TheApplication extends Application {\n    @Override\n    public void onCreate() {\n        super.onCreate();\n        /* 初始化SDK开始 */\n        // 第一个参数APPID: 参考2.1节获取\n        // 第二个参数CHANNEL: 填写渠道，请注意不能为空\n        final InitConfig config = new InitConfig(\"{{APPID}}\", \"{{CHANNEL}}\");\n        // 设置私有化部署数据上送地址，参考2.2节获取，{{REPORT_URL}} 例如 https://yourdomain.com，注意域名后不要加“/”\n        config.setUriConfig(UriConfig.createByDomain(\"{{REPORT_URL}}\", null));\n        // 是否 init 后自动 start 可改为 false，并请在用户授权后调用 start 开启采集\n        config.setAutoStart(false);\n        \n        config.setAbEnable(true); // 开启 AB 测试      \n        config.setAutoTrackEnabled(true); // 全埋点开关，true开启，false关闭\n        config.clearABCacheOnUserChange(true); // 默认true，切换用户清空AB版本信息\n        config.setLogEnable(false); // true:开启日志，参考5.4节设置logger，false:关闭日志\n        AppLog.setEncryptAndCompress(true); // 加密开关，true开启，false关闭\n        // 初始化一次即可\n        // 如果在 Applition 中初始化建议使用该方法\n        AppLog.init(this, config);\n        // 如果在Activity 中初始化建议使用该方法\n        AppLog.init(this, config, activity);\n        /* 初始化SDK结束 */\n        \n        // 请在用户授权后调用如下方法，start 开始实际采集用户信息+上报：\n        AppLog.start()\n    }\n}\n```\n\n\n<span id=\"9b7b09a2\"></span>\n### 2.3.4 多实例初始化(可选)\n\n多实例初始化，指SDK支持在同包名的App中向多个应用(多个appid)开启埋点，且埋点数据相互隔离，每一个appid对应一个单独的实例。使用场景例如：\n\n\n* 第三方SDK依赖 增长营销套件SDK 做SDK内部产生的埋点时；\n\n* 同一个App或系统中，关联多个埋点应用(多个appid)，共用 增长营销套件SDK 时。\n\n\n```java\n// @since 6.8.0，使用本节功能需先升级增长营销套件SDK到6.8.0及以上\npublic class TheApplication extends Application {\n    \n    @Override\n    public void onCreate() {\n        super.onCreate();\n        /* 多实例初始化SDK开始 实例1*/\n        final InitConfig config1 = new InitConfig(\"APPID1\", \"CHANNEL1\");        \n        // 创建实例\n        IAppLogInstance appLogInst1 = AppLog.newInstance();       \n        // 设置数据上送地址\n        config1.setUriConfig(UriConstants.DEFAULT);        \n       // 开启全埋点事件的上送\n        config1.setAutoTrackEnabled(true); // 全埋点开关，true开启，false关闭\n        config1.setLogEnable(true); // true:开启日志，参考5.4节设置logger，false:关闭日志\n        appLogInst1.setEncryptAndCompress(true); // 加密开关，true开启，false关闭\n        appLogInst1.init(this, config1);\n        \n        //实例2\n       final InitConfig config2 = new InitConfig(\"APPID2\", \"CHANNEL1\");\n       IAppLogInstance appLogInst2 = AppLog.newInstance();\n       config2.setUriConfig(UriConstants.DEFAULT);\n       config2.setAutoTrackEnabled(true);\n       config2.setLogEnable(true); // true:开启日志，参考5.4节设置logger，false:关闭日志\n       appLogInst2.setEncryptAndCompress(true); // 加密开关，true开启，false关闭\n       appLogInst2.init(this, config2);\n        /* 初始化SDK结束 */\n\n      }\n   }\n```\n\n\n<span id=\"_3-延迟初始化与敏感信息采集\"></span>\n# 3.延迟初始化与敏感信息采集\n\n<span id=\"_3-1-延迟初始化\"></span>\n## 3.1 延迟初始化\n\n为确保合规，集成SDK后，会在获得用户授权之后进行SDK的初始化并开始采集信息，请确保您采集用户信息前已得到用户的授权。如您需要延迟初始化SDK，为补偿延迟对启动事件的数据影响，请修改初始化`init`方法：\n\n```java\n/* 初始化SDK */\n// ......其他配置不变\n// 修改初始化init方法，增加第三个参数为当前Activity对象\nAppLog.init(this, mConfig, XXXActivity.this);\n```\n\n\n如您依然想尽早初始化，但在用户授权后开启埋点采集，可以关闭自动开始采集，不过由于开始初始化至用户授权之间的事件将无法采集到设备号，因此会影响广告推广效果归因等分析。\n\n```kotlin\n// Application 通过配置调整非自动开始采集\nconfig.setAutoStart(false);\nAppLog.init(this, config);\n\n// 用户授权后调用如下方法\nAppLog.start()；\n```\n\n\n<span id=\"_3-2-关闭mac地址采集\"></span>\n## 3.2 Oaid 采集配置\n\n> 6.16.10 后自持 360 Oaid 采集，如需采集，请在 App 的 AndroidManifest.xml 进行配置：\n\n\n```Plain\n<queries>\n    <!--    qiku 360 OAID 获取添加    -->\n    <package android:name=\"com.qiku.id\"/>\n</queries>\n```\n\n\n<span id=\"d3dfcb69\"></span>\n## 3.3 关闭MAC地址采集\n\n以下为敏感字段采集的初始化基本配置，`config` 均指初始化时的`InitConfig`。 设备的mac地址采集默认开启。如需关闭：\n\n```java\n// 开关关闭后相关代码不运行，属性不采集，是否上送取决于客户是否外界传入过 MAC \nconfig.setMacEnable(false);\n```\n\n\n如需移除MAC地址采集的相关代码，可以在全埋点插件Plugin中配置：\n\n```groovy\n// 本功能仅支持6.9.0及以上版本\nteaExtension {\n    // ... 其他配置\n    trackBlackList = [\"MAC_ADDRESS\"]\n\n                // 您使用的是 Lite 包，需要移除采集相关代码，\n    // 需要在新版本中添加该此配置，避免 Lite 包内容不齐导致运行闪退，6.14.3 起提供\n    disableAutoTrack = true\n}\n```\n\n\n<span id=\"_3-3-关闭设备imei-meid采集\"></span>\n## 3.4 关闭设备IMEI/MEID采集\n\n设备的imei地址采集默认开启。如需关闭：\n\n```java\n// 开关关闭后相关代码不运行，属性不采集，是否上送取决于客户是否外界传入过 AppImei \nconfig.setImeiEnable(false);\n```\n\n\n如需移除IMEI和MEID采集的相关代码，可以在全埋点Plugin中配置：\n\n```groovy\n// 本功能仅支持6.9.0及以上版本\nteaExtension {\n    // ... 其他配置\n    trackBlackList = [\"IMEI_MEID\"]\n\n    // 您使用的是 Lite 包，需要移除采集相关代码，\n    // 需要在新版本中添加该此配置，避免 Lite 包内容不齐导致运行闪退，6.14.3 起提供\n    disableAutoTrack = true\n}\n```\n\n\n<span id=\"_3-4-关闭oaid采集\"></span>\n## 3.5 关闭OAID采集\n\n设备的OAID信息采集默认开启。如需关闭：\n\n```java\n// 开关关闭后相关代码不运行，属性不采集不上送\nconfig.setOaidEnabled(false);\n```\n\n\n如需移除OAID采集的相关代码，可以在全埋点Plugin中配置：\n\n```groovy\n// 本功能仅支持6.10.1及以上版本\nteaExtension {\n    // ... 其他配置\n    trackBlackList = [ \"OAID\" ]\n\n    // 您使用的是 Lite 包，需要移除采集相关代码，\n    // 需要在新版本中添加该此配置，避免 Lite 包内容不齐导致运行闪退，6.14.3 起提供\n    disableAutoTrack = true\n}\ngroovy\n```\n\n\n<span id=\"_3-5-关闭android-id采集\"></span>\n## 3.6 关闭Android ID采集\n\n注意\n\n关闭 Android ID 会影响 did 卸载重装一致性，请谨慎关闭。\n\n设备的Android ID采集默认开启，如需关闭：\n\n```java\n// 开关关闭后相关代码不运行，属性不采集，关闭后会随机生成\nconfig.setAndroidIdEnabled(false);\n```\n\n\n如需移除Android ID采集代码，可以在全埋点Plugin中配置：\n\n```groovy\n// 本功能仅支持6.10.1及以上版本\nteaExtension {\n    // ... 其他配置\n    trackBlackList = [ \"ANDROIDID\" ]\n\n    // 您使用的是 Lite 包，需要移除采集相关代码，\n    // 需要在新版本中添加该此配置，避免 Lite 包内容不齐导致运行闪退，6.14.3 起提供\n    disableAutoTrack = true\n}\n```\n\n\n<span id=\"_3-6-关闭-iccid-采集\"></span>\n## 3.7 关闭 ICCID 采集\n\n设备的 ICCID 采集默认开启，如需关闭：\n\n```java\n// 开关关闭后相关代码不运行，属性不采集不上送// 本功能仅支持6.14.3及以上版本\nconfig.setIccIdEnabled(false);\n```\n\n\nICCID 目前不支持通过插件移除采集代码。\n\n<span id=\"_3-7-关闭-sn（硬件序列号）-采集\"></span>\n## 3.8 关闭 SN（硬件序列号） 采集\n\n设备的 SN 采集默认开启，如需关闭：\n\n```java\n// 开关关闭后相关代码不运行，属性不采集不上送// 本功能仅支持6.15.0及以上版本\nconfig.setSerialNumberEnable(false);\n```\n\n\nSN 目前不支持通过插件移除采集代码。\n\n<span id=\"_3-8-关闭-gaid-采集\"></span>\n## 3.9 关闭 GAID 采集\n\n设备的 GAID 采集默认方案：\n\n\n* 6.15.0 之前 cn(国内版)与 global(海外版)都默认采集。\n\n* 6.15.0 及之后 cn 默认关闭，global 默认打开。\n\n\n如需关闭：\n\n```java\n// 开关关闭后相关代码不运行，属性不采集，是否上送取决于客户是否外界传入过 Gaid \nconfig.setGaidEnabled(false);\n```\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">⚠️请注意，由于该开关国内外 SDK 包 6.15.0 版本之前都默认开启，可能会导致国内应用包内部的第三方集成了 Google Service 后也尝试获取 GAID，且 GAID 是耗时的，可能在部分机型存在 ANR 问题或者影响设备注册请求响应时间。</div>\n\n\n```java\n// 针对Gaid 获取耗时 SDK 提供了采集超时时间控制，如果超过采集时间还未采集到直接返回空// 默认时间 2s 超时，方法参数 ms// 该方法 6.15.0 提供\nconfig.setGaidTimeOutMilliSeconds(2000)\n```\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">⚠️请注意，由于该开关国内外 SDK 包都默认开启，可能会导致国内应用包内部的第三方集成了 Google Service 后也尝试获取 GAID，且 GAID 是耗时的，可能在部分机型存在 ANR 问题或者影响设备注册请求响应时间。</div>\n\n\n<span id=\"_3-9-关闭运营商信息采集\"></span>\n## **3.10 关闭运营商信息采集**\n\n设备的运营商信息默认采集，如需关闭：\n\n```java\n// 开关关闭后相关代码不运行，属性不采集不上送\nconfig.setOperatorInfoEnabled(false);\n```\n\n\n如需移除运营商信息采集代码，可以在全埋点Plugin中配置：\n\n```java\n// 本功能仅支持6.10.1及以上版本\nteaExtension {\n    // ... 其他配置\n    trackBlackList = [ \"OPERATOR\" ]\n\n    // 您使用的是 Lite 包，需要移除采集相关代码，// 需要在新版本中添加该此配置，避免 Lite 包内容不齐导致运行闪退，6.14.3 起提供\n    disableAutoTrack = true\n}\n```\n\n\n<span id=\"cee6bc12\"></span>\n## 3.11 移除剪切板访问代码\n\n剪切版访问目前用于广告监测默认关闭，剪切板功能开关的相关配置可以参考：隐私合规相关配置中的[开启/关闭/移除剪切板](https://www.volcengine.com/docs/84129/1587773#%E9%9A%90%E7%A7%81%E5%90%88%E8%A7%84%E7%9B%B8%E5%85%B3)章节。\n\n如需移除剪切板访问代码，可以在全埋点 Plugin 中配置：\n\n\n<Tabs>\n<Tab zoneid=\"iP7OipdKbG\" title=\"Gradle 8.0 以下\">\n<TabTitle>Gradle 8.0 以下</TabTitle>\n\n```Groovy\n// 本功能仅支持 6.16.3 及以上版本\nteaExtension {\n    // ... 其他配置\n    trackBlackList = [\"CLIPBOARD\"]\n\n    // 您使用的是 Lite 包，需要移除采集相关代码，\n    // 需要在新版本中添加该此配置，避免 Lite 包内容不齐导致运行闪退，6.14.3 起提供\n    disableAutoTrack = true\n}\n```\n\n\n\n</Tab>\n<Tab zoneid=\"P9RL0PbiAw\" title=\"Gradle 8.0 及以上\">\n<TabTitle>Gradle 8.0 及以上</TabTitle>\n\n```Groovy\n// 本功能仅支持 6.16.3 及以上版本\n// AGP8 版本插件 6.16.3 支持\nappLog {\n    // ... 其他配置\n    sensitiveFieldsBlocklist = [\"CLIPBOARD\"]\n  \n    // 您使用的是 Lite 包，需要移除采集相关代码，\n    // 需要在新版本中添加该此配置，避免 Lite 包内容不齐导致运行闪退，6.14.3 起提供\n    disableAutoTrack = true\n}\n```\n\n\n\n</Tab>\n</Tabs>\n\n\n<span id=\"_4-配置scheme-可选\"></span>\n# 4. 配置Scheme(可选)\n\n如需使用[实时埋点检测](https://www.volcengine.com/docs/6285/66054)或[圈选功能](https://www.volcengine.com/docs/6287/101834)，请配置Scheme。否则可跳过此步骤。\n\n<span id=\"_4-1-获取url-scheme\"></span>\n## 4.1 获取URL Scheme\n\n「应用列表」\\-\\> 接入应用的「详情」\\-\\>「URL Scheme」中可查看您的scheme，一般为`rangersapplog.xxxxx`的形式。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_89741099897431c20ea83d254d68a489.png) </span>\n\n<span id=\"_4-2-添加url-scheme\"></span>\n## 4.2 添加URL Scheme\n\n在app module级别的build.gradle中添加URL Scheme。\n\n```groovy\n// 在android的defaultConfig中添加\nmanifestPlaceholders.put(\"APPLOG_SCHEME\", \"{{URL_SCHEME}}\".toLowerCase())\n```\n\n\n<span id=\"_5-初始化基本配置\"></span>\n# 5. 初始化基本配置\n\n以下为常用的初始化基本配置，`config` 均指初始化时的`InitConfig`。\n\n<span id=\"_5-1-全埋点采集开关\"></span>\n## 5.1 全埋点采集开关\n\n默认全埋点开关开启，如需关闭：\n\n```java\n// 开启全埋点事件的上送\nconfig.setAutoTrackEnabled(true); // true:开启全埋点，false:关闭全埋点\n```\n\n\n开启全埋点后默认会采集页面事件和点击事件，如需定制全埋点采集，配置方法如下：\n\n```java\n// 默认值：AutoTrackEventType.PAGE | AutoTrackEventType.CLICK\n// AutoTrackEventType.ALL: 全埋点所有事件\n// AutoTrackEventType.PAGE: 全埋点页面事件 默认开启\n// AutoTrackEventType.CLICK: 全埋点点击事件 默认开启\n// AutoTrackEventType.PAGE_LEAVE: 全埋点页面时长事件 默认关闭// 本功能仅支持6.11.0及以上版本\nconfig.setAutoTrackEventType(AutoTrackEventType.PAGE | AutoTrackEventType.CLICK | AutoTrackEventType.PAGE_LEAVE);\n```\n\n\n全埋点中的页面浏览事件，默认针对Activity页面。如需开启针对Fragment的bav2b_page事件采集，除如上开关外，还需额外开启Fragment采集开关。\n\n```java\n// 开启Fragment全埋点事件采集\nconfig.setAutoTrackFragmentEnabled(true);\n```\n\n\n<span id=\"_5-2-开启圈选埋点\"></span>\n## 5.2 开启圈选埋点\n\n圈选埋点默认关闭。\n\n```java\n// 开启圈选埋点功能，使用此功能需先开启全埋点\nconfig.setPicker(new Picker(this, config));\n\n// 如果想要对 App 内嵌 h5 打开圈选，请打开 js 注入开关：\nconfig.setH5CollectEnable(true);\n// 注：h5 圈选仅支持原生 WebView 与腾讯 X5 \n```\n\n\n<span id=\"_5-3-ab功能开关\"></span>\n## 5.3 AB功能开关\n\n```plain\nconfig.setAbEnable(true); // 开启 AB 测试\n```\n\n\n<span id=\"_5-4-查看日志打印\"></span>\n## 5.4 查看日志打印\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">⚠️ 请注意，日志打印默认关闭，建议上线生产包关闭。</div>\n\n\n```java\n// 在控制台输出日志，可用于观察用户行为日志上报情况，建议在上线时关闭\nconfig.setLogEnable(true); // true:开启日志，false:关闭日志\nconfig.setLogger(new ILogger() {\n    @Override\n    public void log(String s, Throwable throwable) {\n        Log.d(\"AppLog------->: \", \"\" + s);\n    }\n});\n```\n\n\n<span id=\"_5-5-切换用户清空ab信息开关\"></span>\n## 5.5 切换用户清空AB信息开关\n\n开关默认开启，当切换用户时，清空缓存里命中的AB信息；如果切换用户不想清空缓存可改为false。\n\n```json\nconfig.clearABCacheOnUserChange(true); // 默认true，切换用户清空AB版本信息\n```\n\n\n<span id=\"_5-6-加密设置开关\"></span>\n## 5.6 加密设置开关\n\n加密设置默认开启。您可在debug阶段关闭加密，以便于抓包联调。\n\n```java\n// 加密设置开关，线上版本建议开启\nAppLog.setEncryptAndCompress(true); // true:打开加密，false:关闭加密\n```\n\n\n<span id=\"_5-7-设置app-language-和-app-region\"></span>\n## 5.7 设置APP Language 和 APP Region\n\n```java\n// 修改语言和地区，设置APP Language 和 APP Region\nconfig.setLanguage(...); // 设置APP Language，例如zh-cn \nconfig.setRegion(...); // 设置APP Region，例如cn\n```\n\n\n<span id=\"_5-8-打通内嵌h5页\"></span>\n## 5.8 打通内嵌H5页\n\n如果您的应用同时集成 Web/JS SDK 以及 Android SDK，默认情况下，所有 H5 事件会通过 Web/JS SDK 上报，如果您希望 H5 事件由 Android SDK 接管上报，可以使用打通内嵌 H5 功能，此时 H5 页上产生的事件将通过 Android SDK 上报，而不在 Web/JS SDK 上报，这种接管上报场景下会复用 Android 端设置的`user_unique_id`和公共属性。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">打通功能需要 Web/JS SDK 与 Android SDK 同时集成并彼此配合，且当前版本 Web/JS SDK 打通后默认屏蔽 H5 全埋点功能，因为此时上报都由 Android SDK 接管，如果还想采集 H5 全埋点，需要查看 5.9 小节：原生端采集 H5 全埋点 。 Web/JS SDK 集成请参考<a href=\"https://www.volcengine.com/docs/6287/96071\">《Web/JS SDK 集成》</a> 以及 3.6 小节。</div>\n\n\n```java\n// 注：该功能仅支持原生 WebView 与腾讯 X5// 以下配置需要同时开启，如果以下两个没有同时满足，H5 事件就会继续保持 Web/JS SDK 上报：// Android SDK 开启内嵌H5打通开关\nconfig.setH5BridgeEnable(true);\n// Web/JS SDK 设置 H5 内嵌到原生端并打通\nwindow.collectEvent('init', {\n    // ...... 其他初始化配置\n    enable_native: true \n    // 5.1.3以下版本参数为Native，// 5.1.3以上版本修改为enable_native，但仍然兼容了Native的设置\n})\n\n// 补充：由于此时 Web/JS SDK 屏蔽了 H5 的全埋点功能，// 所以 Web/JS SDK 的全埋点设置开关就失效了，// 想要依然保持 H5 全埋点功能，请查看 4.7 小节\nwindow.collectEvent('init', {\n    // 全埋点设置开关 \n    autotrack: 失效\n})\n```\n\n\n<span id=\"_5-8-1-打通内嵌-h5-页的白名单前置工作\"></span>\n### 5.8.1 打通内嵌 H5 页的白名单前置工作\n\n开关开启后，必须配置打通白名单。仅白名单内配置的域名生效打通，白名单可用通配符方式添加，`*`表示通配符。\n\n```java\n// 内嵌H5页白名单配置// 示例：如需打通 www.volcengine.com 和 www.bytedance.com 两个H5页\nconfig.setH5BridgeAllowlist(Arrays.asList(\"www.volcengine.com\", \"*.bytedance.*\"));\n// 适配 www.bytedance.com 的白名单有多种，请根据业务场景配置白名单，例如：// www.bytedance.com 或 .bytedance. 或 *.*.* 均可实现。\n```\n\n\n如果不过滤任何域名和本地资源文件，可以配置允许所有H5页面打通。该配置优先级高于`setH5BridgeAllowlist`。\n\n```java\n// 允许所有h5打通// 本功能仅支持6.9.7及以上版本\nconfig.setH5BridgeAllowAll(true);\n```\n\n\n<span id=\"_5-8-2-打通内嵌-h5-页的插件注入注意项\"></span>\n### 5.8.2 打通内嵌 H5 页的插件注入注意项\n\n一般情况下，H5 打通需要您参考 1.2 小节集成 plugin 插件，此时注入 Bridge 由 Plugin 插桩完成，但部分场景下，插桩可能不生效（插装失效的场景可能是混淆、被覆盖等等情况），您可以选择手动关闭 SDK 的自动注入 Bridge 能力，然后手动调用注入，此时可以在全埋点插件 Plugin 中增加配置`autoInjectWebViewBridge = false`，然后在需要打通的 WebView 加载H5之前手动注入 Bridge。\n\n\n<Tabs>\n<Tab zoneid=\"Fw2XsLmPcd\" title=\"Gradle 8.0 以下关闭插件自动注入\">\n<TabTitle>Gradle 8.0 以下关闭插件自动注入</TabTitle>\n\n```Groovy\n// 通过插件关闭自动注入\nteaExtension {\n    // 关闭自动注入webview的对接bridge\n    autoInjectWebViewBridge = false\n    // 省略插件的其他使用\n}\n```\n\n\n\n</Tab>\n<Tab zoneid=\"O9TtgGvPBq\" title=\"Gradle 8.0 及以上关闭插件自动注入\">\n<TabTitle>Gradle 8.0 及以上关闭插件自动注入</TabTitle>\n\n```Groovy\n// AGP8 版本插件 6.16.3 支持\nappLog {\n    // 关闭自动注入webview的对接bridge\n    autoInjectWebViewBridge = false\n    // 省略插件的其他使用\n}\n```\n\n\n\n</Tab>\n</Tabs>\n\n\n```Java\n// 本功能仅支持6.13.0及以上版本\nWebView myWebView = findViewById(R.id.webview);\n// 在loadUrl之前注入Bridge\nAppLog.initWebViewBridge(myWebView, url);\nmyWebView.loadUrl(url);\n```\n\n\n<span id=\"_5-9-原生端采集h5全埋点\"></span>\n## 5.9 原生端采集H5全埋点\n\n原生端内嵌 H5 页时，通过打开以下开关，可从原生端全埋点事件采集 H5 页全埋点事件。\n\n使用场景一般有两个：\n\n\n* 由于当前版本 Web/JS SDK 打通后默认屏蔽 H5 全埋点功能，为确保打通后依然可以保留 H5 页全埋点功能。\n\n* 独立使用，在 H5 未集成 Web/JS SDK 的情况下想对应用中的 H5 页开启全埋点功能\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">可以独立使用该功能，无需集成 Web/JS SDK。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">该功能 6.14.4 版本后提供，且目前的 H5 全埋点仅支持进入页面事件与点击事件。</div>\n\n\n\n```java\n// 注：该功能仅支持原生 WebView 与腾讯 X5\n\n// 内嵌H5页面的全埋点事件\nconfig.setH5CollectEnable(true); // true:开启h5全埋点事件，false:关闭h5全埋点事件\n\n// 补充，该功能默认也通过插件方式注入，当插件失效或者想要自己手动注入时，\n// 可以参考 4.6.2 小节，4.6、4.7 虽然功能独立但是都通过统一方法进行注入控制，\n// 不过可以通过各自开关配置是否开启\n```\n\n\n<span id=\"6962b601\"></span>\n## 5.10 全埋点事件采集\n\n默认全埋点开关开启，如需关闭：\n\n```java\nconfig.setAutoTrackEnabled(false);\n```\n\n\n开启全埋点后默认会采集页面事件和点击事件，如需定制全埋点采集，配置方法如下：\n\n```java\n// 默认值：AutoTrackEventType.PAGE | AutoTrackEventType.CLICK\n//\n// AutoTrackEventType.ALL: 全埋点所有事件\n// AutoTrackEventType.PAGE: 全埋点页面事件 默认开启\n// AutoTrackEventType.CLICK: 全埋点点击事件 默认开启\n// AutoTrackEventType.PAGE_LEAVE: 全埋点页面时长事件 默认关闭\n// 本功能仅支持6.11.0及以上版本\nconfig.setAutoTrackEventType(AutoTrackEventType.PAGE | AutoTrackEventType.CLICK | AutoTrackEventType.PAGE_LEAVE);\n```\n\n\n<span id=\"ed87c76e\"></span>\n## 5.11 设置 GPS 坐标\n\n默认不采集 GPS 坐标，如需采集，需要手动设置 GPS 坐标信息，示例：\n\n```java\n// GeoCoordinateSystemConst 为坐标系静态类\n// WGS84 地球坐标系\n// GCJ02 火星坐标系\n// BD09 百度坐标系\n// BDCS 北斗坐标系\n// 本功能仅支持6.10.1及以上版本\nAppLog.setGPSLocation(18.00f, 18.00f, GeoCoordinateSystemConst.WGS84);\n```\n\n\n<span id=\"449232e2\"></span>\n## 5.12 开启崩溃采集\n\n默认不采集应用崩溃事件`$crash`，如需开启：\n\n```java\n// 目前仅支持采集JAVA崩溃\n// 本功能仅支持6.13.0及以上版本\nconfig.setTrackCrashType(AppCrashType.JAVA);\n```\n\n\n<span id=\"685e43a7\"></span>\n## 5.13 开启Fragment页面事件采集\n\n默认Fragment页面事件采集关闭，开启开关后每个Fragment的访问也会记录一次页面访问事件（$bav2b_page）。如需开启：\n\n```java\n// 本功能仅支持6.13.0及以上版本\nconfig.setAutoTrackFragmentEnabled(true);\n```\n\n\n<span id=\"c8dd5015\"></span>\n## 5.14 是否区分鸿蒙设备\n\n数据采集上报会区分是否是鸿蒙系统：\n\n```java\n// 本功能仅支持6.14.3及以上版本\nconfig.setHarmonyEnable(true);\n```\n\n\n<span id=\"_6-权限说明\"></span>\n# 6. 权限说明\n\n增长营销套件Android端SDK权限列表：\n\n\n|**权限** |**说明** |**使用场景和目的** |\n|---|---|---|\n|android.permission.READ_PHONE_STATE |读取IMEI等设备信息作为设备标识 |设备注册：初始化读取，生成设备唯一标识，计算设备数 |\n|android.permission.ACCESS_WIFI_STATE |获取网络状态（wifi） |设备注册和埋点数据采集：采集设备网络（wifi）信息 |\n|android.permission.ACCESS_NETWORK_STATE |获取网络状态 |设备注册和埋点数据采集：采集设备网络信息 |\n|android.permission.INTERNET |发送网络请求 |注册、上报埋点、归因、激活等：上报埋点数据到远程服务器 |\n|com.asus.msa.SupplementaryDID.ACCESS |读取oaid |设备注册和深度链接：跨APP标识设备 |";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

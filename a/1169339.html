<script>window.DATA_BASE="../";window.INIT_DOC=1169339;window.INIT_MD="<span id=\"一-概述\"></span>\n# 一. 概述\n\n<span id=\"什么是平滑生效？\"></span>\n## 什么是平滑生效？\n\n相较于流量立即生效，平滑生效会在设置的时间内把流量生效到设定的大小，例如实验流量设置成30%，平滑生效时间设置成30min，则会按照每分钟生效1%的进度线性生效\n\n<span id=\"什么场景适合平滑生效？\"></span>\n## 什么场景适合平滑生效？\n\n\n* 新建实验/实验放量时，为防止流量太大机器出问题，故希望策略生效时流量能平滑缓慢生效\n\n* 需要根据时间段设置不同平滑放量时间：如高峰期30min完成放量，非高峰10min完成放量\n\n\n<span id=\"二-如何使用\"></span>\n# 二. 如何使用\n\n<span id=\"新建实验\"></span>\n## 新建实验\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_61f5c18630bf66b25b9447e0e761e2e3.png) </span>\n\n\n* 新建实验时，若需要平滑缓慢放量，则流量生效方式选择平滑生效\n\n* 选择平滑生效后，请设置生效时长(以分钟为粒度，不能超过24h即1440min)\n\n\n<span id=\"查看进度\"></span>\n## 查看进度\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_e234e472409893d5c4593ce72e185c6f.png) </span>\n\n\n* 实验开启后，可在实验详情页查看平滑生效的进度\n\n* 支持暂停、回滚、跳过\n\n   * 暂停，暂停平滑放量过程，实验流量 为暂停时刻的值\n\n   * 回滚，实验流量将立刻回滚到0\n\n   * 跳过，实验流量将立刻变为目标值，即创建实验时设置的实验流量\n\n\n<span id=\"实验扩量\"></span>\n## 实验扩量\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_07ebad065ed3f8c764b5b8157ac245e1.png) </span>\n\n\n* 实验扩量时，可选择流量生效的方式，立即生效or平滑生效\n\n* 选择了平滑生效，需设置平滑生效时间(以分钟为粒度，不能超过24h即1440min)\n\n\n<span id=\"实验暂停\"></span>\n## 实验暂停\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_864d2114609776faa8539f21448af087.png) </span>\n\n\n* 实验暂停时，可选择流量生效的方式，立即生效or平滑生效\n\n* 选择了平滑生效，需设置平滑生效时间(以分钟为粒度，不能超过24h即1440min)\n\n\n<span id=\"实验停止\"></span>\n## 实验停止\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_aa95dd0ac7b69a1e61e6e6a4240ed44f.png) </span>\n\n\n* 实验停止时，可选择流量生效的方式，立即生效or平滑生效\n\n* 选择了平滑生效，需设置平滑生效时间(以分钟为粒度，不能超过24h即1440min)\n\n\n<span id=\"三-注意事项\"></span>\n# 三. 注意事项\n\n1、平滑生效期间，不可修改生效方式，不可修改实验流量\n\n2、平滑生效完成后可扩量，扩量时可选择平滑生效\n\n3、平滑生效期间，若暂停实验后恢复，将会重新开始平滑生效\n\n4、平滑生效完成后，若暂停实验再恢复，将会立即生效\n\n5、实验详情展示平滑生效进度，请主动刷新页面查看最新进度";</script>

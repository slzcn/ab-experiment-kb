<script>window.DATA_BASE="../";window.INIT_DOC=191085;window.INIT_MD="<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">UBA数据集成私有化V4.2.0模板支持，用户属性数据集成私有化V4.4.0（含）以上版本支持</div>\n\n\n<span id=\"一、概述\"></span>\n# 一、概述\n\n企业在通过数据集成将其他厂的UBA数据上报至火山DataTester数据服务时，希望不仅同步UBA数据、也希望将用户属性数据同步至火山DataTester数据服务做后续的分析，除此之外也存在一些函数转换的需求，如希望根据指定字段的顺序，按序获取各个field的值，如果获取到值，则赋值给目标field，为了满足此类需求DataTester通过提供插件函数的方式进行支持，详见插件函数说明\n\n<span id=\"二、功能介绍\"></span>\n# 二、功能介绍\n\n<span id=\"_2-1-配置模版\"></span>\n## 2.1 配置模版\n\n<span id=\"_2-1-1uba数据demo模板\"></span>\n### 2.1.1UBA数据Demo模板\n\n```sql\nenv {\n  job.name = kafka_2_kafka\n}\n\nsource {\n    KafkaTableStream {\n        # kafka地址\n        consumer.bootstrap.servers = \"{ip1}:{port},{ip2}:{port}\"\n        # 消费者组名称\n        consumer.group.id = \"test\"\n        # topic名称\n        topics = kafka_source\n        # 临时表名称\n        result_table_name = fake\n        # json格式\n        format.type = json\n        # 数据示例\n        schema = \"{\\\"user_id\\\": \\\"ST_1\\\", \\\"event_name\\\": \\\"abtest_exposure\\\", \\\"app_name\\\": \\\"seatunel_test\\\", \\\"app_id\\\": 10000000, \\\"custom\\\": \\\"{\\\\\\\"A\\\\\\\":\\\\\\\"a\\\\\\\"}\\\", \\\"local_time_ms\\\": 1654831159493, \\\"ab_version\\\": 4, \\\"params\\\": \\\"{\\\\\\\"A\\\\\\\":\\\\\\\"a\\\\\\\"}\\\", \\\"server_time\\\": 1654831159, \\\"log_type\\\": \\\"mario_event\\\"}\"\n    }\n}\n\ntransform {\n    # 如果源数据中没有ssid，则需要使用补充ssid插件\n    SSID {\n        source_id = user_id\n        source_app_id = app_id\n        ssid_psm = \"vpc.device.idsvc\"\n    }\n\n    # 使用json格式化插件，将数据格式化为下游kafka的schema\n    JsonTemplateFormat {\n        # 输出字段名称\n        json_result_name = event\n        # json模板         \n        event = {\n            \"user\":{\n                \"user_unique_id\": user_id,\n                \"ssid\": ssid\n            },\n            \"header\":{\n                \"app_id\": app_id,\n                \"app_name\": app_name,\n                \"custom\": custom\n                \"ab_version\":ab_version\n            },\n            \"params\": params,\n            \"event_name\": event_name\n            \"server_time\": server_time\n            \"log_type\": log_type,\n            \"local_time_ms\": local_time_ms\n        }\n    }\n}\n\nsink {\n    # 将数据输出至sink kafka中\n    Kafka {\n        # 输出字段名称\n        row_field_name = \"event\"\n        # kafka集群地址\n        producer.bootstrap.servers = \"{ip1}:{port},{ip2}:{port}\"\n        # 需要写入数据的topic\n        topics = \"test\" \n    }\n}\n```\n\n\n<span id=\"_2-1-2用户属性demo模板\"></span>\n### 2.1.2用户属性Demo模板\n\n```php\nenv {\n  execution.parallelism = 1\n}\nsource {\n    # KafkaSource样例\n    KafkaTableStream {\n        # kafka server地址\n        consumer.bootstrap.servers = \"192.168.0.197:9192\"\n        # 消费者group id\n        consumer.group.id = \"seatunnel5\"\n        # 需要消费的topic\n        topics = sunday\n        # 消费数据后，生成的flink table name\n        result_table_name = test\n        # topic中数据的scheam，支持json，csv\n        # 需要把所有可能存在的数据均罗列出来\n        format.type = json\n        schema = \"{\\\"user\\\":\\\"test_123\\\",\\\"ssid\\\":\\\"b0354d33-413a-4a98-9e27-c8676f0579ae\\\",\\\"params\\\":{\\\"ab_profile_20_custom\\\":20,\\\"ab_profile_21_custom\\\":21,\\\"ab_profile_22_custom\\\":\\\"22\\\"},\\\"app_id\\\":10000000,\\\"time_ms\\\":1676258783123}\"\n        format.field-delimiter = \",\"\n        format.allow-comments = \"true\"\n    }\n}\ntransform {\n    # 补充ssid插件，如果只有user_unique_id，则必须使用此插件\n    # 如果已自行维护user_unique_id与ssid，则可不使用此插件\n    SSID {\n        source_id = user\n        source_app_id = app_id\n        # 私有化id服务psm，无特殊情况无需修改\n        ssid_psm = \"vpc.device.idsvc\"\n    }\n    # json格式化插件，此样例中json格式，无特殊情况无需修改\n    JsonTemplateFormat {\n      # 输出字段名称\n        json_result_name = event\n        event = {\n            # __profile_set，设置用户属性\n            # __profile_set_once，设置用户属性，如果该属性不存在\n            # __profile_unset，删除用户属性\n            # __profile_append，添加一个属性到数组（仅支持数组类型）\n            # __profile_remove，从数组删除一个属性（仅支持数组类型）\n            # __profile_increment，累加属性（仅支持数字类型）\n            # 此处无需写死，可以通过在source kafka进行配置，来做不同的操作，支持的操作如上所列\n            \"event_name\": \"__profile_set\", \n            \"user\": {\n                # 用户id\n                \"user_unique_id\": user,\n                # 用户ssid\n                \"ssid\": ssid\n            },\n            \"header\": {\n                # 应用id\n                \"app_id\": app_id,\n                # 无特殊情况无需修改\n                \"custom\": \"{}\",\n            },\n            # 需要设置的用户属性具体内容\n            # key应该为已经在tester中注册过的用户属性，比如age\n            # value应该为需要从输入端取值的key的json路径\n            \"params\": {\n                # 解释：从输入端kafka的params.ab_profile_20_custom这个key中取值，并且赋值给tester中的用户属性age\n                \"age\": \"params.ab_profile_20_custom\"\n            },\n            # 无特殊情况无需修改\n            \"extras\": \"{}\",\n            # 设置的时间戳，单位为毫秒，数据流会丢弃7天前的时间戳，建议设置为当前时间\n            \"local_time_ms\": time_ms,\n        }\n    }\n}\nsink {\n    Kafka {\n        # 如无特殊需求，无需修改\n        row_field_name = \"event\"\n        # 如无特殊需求，无需修改\n        topics = \"user_profile\"\n        # kafka server地址\n        producer.bootstrap.servers = \"192.168.0.197:9192\"\n    }\n}\n```\n\n\n<span id=\"_2-2-支持插件函数\"></span>\n## 2.2 支持插件函数\n\n<span id=\"_2-2-1-fieldmerge插件说明\"></span>\n### 2.2.1 FieldMerge插件说明\n\n<span id=\"描述\"></span>\n#### 描述\n\n根据指定字段的顺序，按序获取各个field的值，如果获取到值，则赋值给目标field；如果取不到值或者值为null，则去判断下一个field\n\n<span id=\"字段\"></span>\n#### 字段\n\n\n|<div style=\"text-align: center\"><br>name</div><br> |<div style=\"text-align: center\"><br>type</div><br> |<div style=\"text-align: center\"><br>required</div><br> |<div style=\"text-align: center\"><br>default value</div><br> |\n|---|---|---|---|\n|<div style=\"text-align: center\"><br>merge_field_names</div><br> |<div style=\"text-align: center\"><br>string</div><br> |<div style=\"text-align: center\"><br>yes</div><br> |<div style=\"text-align: center\"><br>\\-</div><br> |\n|<div style=\"text-align: center\"><br>result_field_name</div><br> |<div style=\"text-align: center\"><br>string</div><br> |<div style=\"text-align: center\"><br>yes</div><br> |<div style=\"text-align: center\"><br>\\-</div><br> |\n|<div style=\"text-align: center\"><br>result_field_type</div><br> |<div style=\"text-align: center\"><br>string</div><br> |<div style=\"text-align: center\"><br>yes</div><br> |<div style=\"text-align: center\"><br>\\-</div><br> |\n|<div style=\"text-align: center\"><br>defualt_value</div><br> |<div style=\"text-align: center\"><br>string</div><br> |<div style=\"text-align: center\"><br>no</div><br> |<div style=\"text-align: center\"><br>null</div><br> |\n\n\n\n* merge_field_names\n\n\n需要merge的field names，用','分隔，优先级依次降低\n\n\n* result_field_name\n\n\nmerge后的值的field name\n\n\n* result_field_type\n\n\n支持int, long, float, double, string\n\n\n* default_value\n\n\n如果所有field均未取到值，或者均为null，最后赋值的默认值；值类型需要和result_field_type一致\n\n<span id=\"示例\"></span>\n#### 示例\n\n```php\nFieldMerge {\n    merge_field_names = \"age1,age2,age3\"\n    result_field_name = \"age\"\n    result_field_type = \"int\"\n    default_value = 100\n}\n\n# 如果需要合并多次，则指定多个FieldMerge插件即可\nFieldMerge {\n    merge_field_names = \"language_en,language_cn\"\n    result_field_name = \"language\"\n    result_field_type = \"string\"\n    default_value = \"zh_cn\"\n}\n```\n\n\n**说明**\n\n从上游的数据中，按照age1、age2、age3的顺序，尝试获取value，获取到之后，则赋值给age；如果全都获取不到，则使用默认值100\n\n\n* age1 = 111，age2 = 222，age3 = 333\n\n   * result： age = 111\n\n* （age1 = null，）age2 = 222，age3 = 333\n\n   * result：age = 222\n\n* age1 = \"abc\"，age2 = 222，age3 = 333\n\n   * result：age = 222，虽然age1存在值abc，但是abc无法转换成int值，所以会被抛弃";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。

</script>

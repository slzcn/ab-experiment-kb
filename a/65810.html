<script>window.DATA_BASE="../";window.INIT_DOC=65810;window.INIT_MD="推送通知类实验可以对推送通知的标题、内容、点击动作等进行测试。当您要向现有用户发布通知消息或者开始新的营销通知，但不确定效果如何时，您可以使用火山引擎A/B测试来创建推送通知类实验，通过在您所选的用户群中测试各种通知实验组，来找出最理想的通知文案和消息呈现方式。本文为您介绍DataTester的推送实验应用场景和操作要点。\n\n<span id=\"22312ec5\"></span>\n# **前置条件及限制**\n\n\n|限制/前提条件 |说明 |\n|---|---|\n|支持的实验类型 |* 推送的实验类型为**服务端**实验。<br><br>* 当前支持iOS、Android应用。<br><br><br><div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div><br><br><br><br>* <div data-tips=\"true\" data-tips-type=\"warning\">在推送过程中需要与客户端交互，因此目标受众可使用客户端的属性。</div><br><br><br>* <div data-tips=\"true\" data-tips-type=\"warning\">SaaS\\-云原生环境中，柔佛地域暂不支持。</div><br> |\n|前提条件 |* 使用推送实验前，需先配置好对应的推送通道，详情请参见[推送通道管理](https://www.volcengine.com/docs/6287/71443)。<br><br>* 使用推送实验前，需集成DataTester的数据接入SDK，详情请参见[iOS SDK集成开发指南](https://www.volcengine.com/docs/6287/65801)、[Android SDK集成](https://www.volcengine.com/docs/6287/65802)。 |\n\n\n<span id=\"03116819\"></span>\n# 基本概念\n\n\n* 计划触达人数：调取API触发发送的去重人数。\n\n* 实际触达人数：接收到推送任务的去重人数。\n\n* 目标完成人数：根据设定的目标，完成的去重人数。\n\n* 计划触达次数：调取API触发发送的总数。\n\n* 实际触达次数：接收到推送任务的总数。\n\n* 目标完成次数：根据设定的目标，完成的次数。\n\n\n<span id=\"39f3c062\"></span>\n# 应用场景\n\n推送实验主要用于解决（1）可选方案选择难，无法决策哪种效果佳；（2）变更影响大，不敢轻易变动，担心带来客户舆情这类场景的痛点。例如：\n\n\n* **多文案推送实验** ：市场人员针对候选文案，很难通过人为经验判断哪个效果最好，即可通过开启A/B实验方式，先验小流量分析实验报告，选择适用场景的最优文案。\n\n* **智能文案调优实验：**  在进行多文案推送实验后，我们可以进一步设置智能文案调优实验，将效果更好的文案直接发送给更大范围的用户。\n\n\n**场景示例：** \n\n在购物节到来之际，我们有多种不同文案的push消息可以发送给用户，每种push消息主打不同的痛点，包括低价、舒适、时尚等，文案如下表：\n\n\n|对照组 |2021年度最爆折扣，抢1号0\\-2点折上8折，全场低至3折起，入会下单领百元猫超卡，错过等明年！ |\n|---|---|\n|实验版本1 |双11买什么？舒适百搭牛仔裤，穿搭巨显高级感，即刻挑选新品 |\n|实验版本2 |idol同款，时尚牛仔搭品，双11新品折上折，助你时髦开挂 |\n|实验版本3 |双11折扣燃爆，1号冲刺0\\-2点折上8折，全场低至3折起，会员实付TOP1送Iphone，还有专属大额券领，快来解锁全年最大折扣！ |\n\n\n\n* 在大范围推送之前，我们先将不同的文案编辑成不同的实验版本，配置10%的流量进行实验。\n\n* 一段时间后，我们查看各实验版本的push点击情况、后链路付费率、付费总价等，选择最优的文案策略，给全量用户大范围推送。\n\n\n<span id=\"c85dfe3f\"></span>\n# 操作演示\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_8adbfde7a1fb206ffe0e71329c8005ae.gif) </span>\n\n<span id=\"c6e35283\"></span>\n# 创建实验\n\n在实验列表页点击“+创建实验”，选择用户触达实验\\-推送实验，进入实验创建流程。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">如果您在创建实验入口中找不到用户触达实验，可能是因为功能开关被关闭了，您可联系技术支持人员打开功能开关。</div>\n\n\n<span id=\"3c5e7fe1\"></span>\n## **step1 输入基本信息**\n\n**实验基本信息**相关参数主要用于标识实验、明确实验类型等，配置详情如下。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/fe5dfdfc2e4b479492ab77d3786ec50f~tplv-goo7wpa0wc-image.image) </span>\n\n\n|**参数** |**配置说明** |\n|---|---|\n|**实验名称&实验描述** |* **实验名称**：建议设置为与实验内容相关的名称，如有实验版本迭代可以增加版本号后缀，让您的伙伴能够快速了解到实验是做什么的、在哪个迭代版本。<br><br>* **实验描述** ：实验内容简述，可以让项目相关人员更清晰地知道到这个实验是如何做的，解决什么问题，同时也便于后期查看和管理历史实验时一目了然。 |\n|**实验标签** |您可以在下拉框中选择已存在的实验标签，也可直接输入新标签。<br><br>一般采用业务线、优化方向等实验内容关键词作为标签，用于筛选、归类实验，后续实验创建完成后，在实验列表中可以通过实验标签快速搜索到相关实验。 |\n|**实验负责人** |默认为实验创建者。 |\n|**实验结束后持续观测时长** |推送数据的收集有延后性，请根据实际情况输入实验结束后持续观测时长，最长30天 |\n\n\n<span id=\"8df4c7b3\"></span>\n## **step2 设置实验版本**\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_ea8545dab76f18b30a9f25b87e6f8e81.png) </span>\n\n您可以在配置实验版本页面中添加多个实验版本，分别配置实验的对照版本和各实验版本的推送规则，配置操作类似，核心配置参数如下：\n\n\n1. **是否推送**：可以选择该实验版本是否对用户进行推送；\n\n2. **推送通道及内容设置**：此部分内容根据不同的推送通道进行设置\n\n   1. **推送通道** ：支持「极光通道」、「个推通道」和 Webhook 等通道。Webhook通道可对接自有或其他触达通道，可在推送通道管理中配置，详见[推送通道管理](https://www.volcengine.com/docs/6287/71443)。\n\n   2. **推送平台** ：支持「Android」和「iOS」。\n\n   3. **后续动作** ：\n\n      * 启动应用，指的是用户点击push消息后，直接打开App应用。\n\n      * 自定义行为，指的是用户点击push消息后，将填写的参数透传给客户端，客户端可以拿到参数去实现自己的业务逻辑，比如说进入某个新的页面。\n\n   4. **推送标题** ：字数≤20个汉字（40个字节）\n\n   5. **推送内容** ：字数≤50个汉字（100个字节）\n\n   6. **推送通道说明：** \n\n      （1）极光/个推通道说明\n\n      \n      |平台/推送通道 |极光通道 |个推通道 |\n      |---|---|---|\n      |Android |启动应用：<br><br>（1）角标数字增加。<br><br>（2）通知提醒：响铃、震动、呼吸灯、App在前台依然提醒、可设置优先级、可设置跳转链接。<br><br>自定义行为：<br><br>（1）将kv参数透传给特定应用，具体行为由应用决定。<br><br>（2）角标数字增加。<br><br>（3）通知提醒：响铃、震动、呼吸灯、App在前台依然提醒。可设置优先级。 |启动应用：<br><br>（1）通知提醒：响铃、震动。通知渠道重要性。通知是否可清除。<br><br>自定义行为：<br><br>（1）将kv参数透传给特定应用，具体行为由应用决定。 |\n      |iOS |启动应用：<br><br>（1）角标数字增加。<br><br>（2）通知提醒：iOS可选生产环境、开发环境。<br><br>自定义行为：<br><br>（1）将kv参数透传给特定应用，具体行为由应用决定。<br><br>（2）角标数字增加。<br><br>（3）通知提醒：iOS可选生产环境、开发环境。 |启动应用：<br><br>（1）角标数字增加。<br><br>自定义行为：<br><br>（1）将kv参数透传给特定应用，具体行为由应用决定。<br><br>（2）角标数字增加。 |\n      |备注 |1.极光通道，Android比iOS多了通知提醒（响铃、震动、呼吸灯、App在前台依然提醒、优先级）的选项。<br><br>2.相同平台不同后续动作（启动应用、自定义行为），自定义行为只比启动应用多了kv参数透传。 |iOS的功能符合预期，即自定义比打开应用多了kv选择<br><br>Android自定义透传与打开应用无重叠功能。 |\n      \n\n      （2）Webhook 通道使用说明\n\n      * 创建实验时，可选择已经配置好的 Webhook通道\n\n      * 选择通道后，填写通道对应的字段取值\n\n      * 配置好后可以直接输入白名单测试\n\n         <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_9a0cfd4a2e730e6aa993f36c7670780a.png) </span>\n\n3. **测试用户：**  添加白名单测试用户\n\n4. **频控规则** ：\n\n   * 全局频控：每个用户1天内，最多能接受24条推送消息，且每小时最多1条。您可在火山引擎增长分析设置频控规则。\n\n   * 无频控：1个用户在1天内可能会收到多条Push。\n\n5. **推送时机**\n\n   * 单次立即推送：选择单次立即推送后，开始实验后立即生效。\n\n   * 定时推送：支持定时推送。支持每天/周/月重复例行推送。\n\n   * 事件触发推送：选择事件触发推送后，可设置事件触发规则：触发XX行为之后触发XX行为——\\>运行推送动作。 推送运营场景中，相对于定时推送等手动推送方式，基于用户行为事件触发推送的方式更加贴合用户场景，从而也更容易带来用户转化（比如，在用户将商品添加购物车后给用户发送优惠券，更容易促成用户下单)。\n\n      <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_acd8b955e51519fd04f8078ba1f92b42.png) </span>\n\n      事件触发类型见下表：\n\n      \n      |事件触发类型 |选项 |释义 |举例 |\n      |---|---|---|---|\n      |用户触发 |单个行为 |指触发了某个行为 |用户启动/退出应用时，运行推送动作 |\n      ||多个行为 |指触发了多个行为，比如做了A并且做了B |用户启动应用，并在使用过程中搜索商品，则运行推送动作 |\n      ||多个行为（有顺序） |指触发了多个行为且是按时间顺序，比如做了A之后并且做了B |用户搜索某商品后，退出应用，运行推送动作 |\n      |之后 |等待一段时间 |触发行为等待一定时间后再推送 |用户搜索商品后等待5分钟，运行推送动作 |\n      ||未触发特定行为 |指触发行为后续未触发其他行为 |用户搜索商品后的一天内未有提交订单行为，则运行推送动作 |\n      ||触发特定行为 |指触发行为后续触发了其他行为 |用户搜索商品后，在一天内有提交订单的行为，则运行推送条件 |\n      \n\n      注：事件和过滤条件有数量限制：事件数量<=3、过滤条件<=5。\n\n6. **实验类型设置：** \n\n   1. 常规推送实验\n\n   2. 智能调优推送实验：即文案赛马，可以动态调整流量给到更优的实验版本，如需使用建议实验进组人数超过10万；\n\n7. **实验流量分配设置**\n\n   实验流量分配设置：即分配每个实验版本之间的流量比例分配。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_2443c760cf3ffdc84559aedbbda19804.png) </span>\n\n   可操作项如下：\n\n   * **流量均匀分配\\-开启**：默认为开启状态，开启状态下为强制各实验版本流量均匀分配。\n\n   * **流量均匀分配\\-关闭**：关闭后可调配对照版本和实验版本的流量相对占比。 可通过输入数值，来控制每个实验版本命中的用户比例。例如，当关闭均匀分配后，三个实验版本，可配置对照版本占比20%，实验版本1占比为50%，实验版本2占比为30%，整体总和为100%。\n\n\n<span id=\"91e8a464\"></span>\n## step3 设置生效策略\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/e2eb9e437cf04710aecab9ab6736b277~tplv-goo7wpa0wc-image.image) </span>\n\n\n|**参数** |**配置说明** |\n|---|---|\n|**实验流量** |生效实验的用户占满足用户受众用户比例。系统默认为100%流量，您可以通过建议工具（点击流量计算器）进行流量预估，看设置多少流量合适，详见：[预估实验流量：流量计算器](https://www.volcengine.com/docs/6287/65814)。<br><br>启用受众规则后，系统将**先筛选符合规则的用户**，再按配置的**实验流量比例**生效。<br><br><div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div><br><br><br><div data-tips=\"true\" data-tips-type=\"tip\">实验流量的预估时，通常需要结合实验的业务指标与<strong>MDE</strong>（检验灵敏度）来进行估算，通常实验指标为提升/降低xx（某个业务指标值），那MDE建议以小于这个指标值来进行估算，尽量避免MDE取值较大，无法检测出真实的实验结果。</div><br> |\n|**受众规则** |* 推送实验为特殊的服务端实验，实验发起过程与普通客户端服务拉取数据的方式相反，是推送服务器主动下推。因此在下推之前要明确的选定目标受众，支持将已提前离线构建完毕的「用户分群」作为受众过滤条件，如上图所示。<br><br>* 推送人数预估：点击后可计算出符合规则的用户数量。 |\n\n\n<span id=\"e25353c7\"></span>\n## step4 添加实验指标\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/cda597355f9c446285bfc8daed4d9025~tplv-goo7wpa0wc-image.image) </span>\n\n\n|**参数** |**配置说明** |\n|---|---|\n|**实验默认指标** |推送实验会默认关注与触达与点击相关指标。 |\n|**实验核心指标配置** |* **核心指标配置**：<br><br>   用来决策实验功能是否符合预期的「直接效果指标」或「成功指标」，您可以在下拉框中，在已有的指标组中选择指标作为实验的核心指标，建议合理的进行实验设计，谨慎选择，更多关于实验指标设置的经验指导请查看[确定评估指标](https://www.volcengine.com/docs/6287/65838#_1-%E7%A1%AE%E5%AE%9A%E8%AF%84%E4%BC%B0%E6%8C%87%E6%A0%87)。<br><br>   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div><br>   <br><br>   <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">实验指标配置好后，后续实验创建完成后，如果如有特殊情况需要修改实验指标，请进入实验详情页进行修改。   </div><br>   <br><br>* **监控报警**：可选择目标指标点击“监控报警”，填写具体需要的报警策略，选择是否勾选“效果显著”，以及选择报警策略的生效方式。<br><br>* **编辑指标**：点击图例中3位置处可进入指标编辑页面，对可指标进行名称、指标类型、是否设为必看指标等进行编辑。 |\n|**实验关注指标配置** |对需要关注的指标进行配置。您可以在页面的下拉列表中选择需要关注的指标，也可以在页面单击**新建指标**或**移除指标**按钮，快速调整需要关注的指标。 |\n\n\n<span id=\"62e6e860\"></span>\n# 调试、开启、停止实验\n\n实验创建完成后，您可以在A/B测试\\>实验列表中查看已创建的实验，并查看实验状态。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/fad3f9d5a18e4a47a230b72ca7ce4a64~tplv-goo7wpa0wc-image.image) </span>\n\n\n* **调试中**：新创建完成的实验，实验状态为**调试中**，此阶段您可以邀请已添加为测试用户的用户进行实验测试，确认实验符合预期。\n\n* **进行中**：实验调试完毕后，您可以在实验列表页点击“启动”，即可开启实验。实验开始后，实验的状态变为**进行中**，此时进组用户可实时查看，指标置信度第二日产出。\n\n* **已结束**：实验开始后，当实验时长到达创建实验时配置的**实验时长**后，实验会自动停止；如果没有到达实验时长，您希望立即停止实验，也可在实验列表手动停止实验。停止实验后，实验状态变为**已结束**。\n\n\n<span id=\"eccda838\"></span>\n# 查看实验报告\n\n实验开启后，您也可以在实验列表中，通过实验操作入口点击进入实验报告页面，查看实验报告，详情请参见[实验报告概述](https://www.volcengine.com/docs/6287/1130945)。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

<script>window.DATA_BASE="../";window.INIT_DOC=445193;window.INIT_MD="<span id=\"_1-安装sdk\"></span>\n# 1. 安装SDK\n\n```go\ngo get github.com/volcengine/datatester-go-sdk@v1.0.13\n```\n\n\n\n1. 当前SDK版本：v1.0.13\n\n2. Go版本要求：go1.14及以上版本\n\n\n<span id=\"_2-代码示例\"></span>\n# 2. 使用示例\n\n<span id=\"662e8f42\"></span>\n## 准备工作：获取数据上送地址\n\n进行数据接入上报时，您需要根据当前的环境类型和端类型确认您的数据上报地址，如果上报地址设置错误，后续会导致您无法查询到上报的数据。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">请在上报数据前，务必确认您当前使用的环境类型，根据环境类型配置上报地址。查看当前的环境类型请参见<a href=\"https://www.volcengine.com/docs/84129/1261497\">SaaS云原生/非云原生&私有化环境</a>。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">如果您使用的是SaaS\\-云原生环境，您也需确认您的服务所在的地域，（通常您的服务会在华北2\\-北京地域，部分用户可能会使用其他地域）。SaaS\\-云原生用户查看服务所在地域请参见<a href=\"https://www.volcengine.com/docs/84129/1527757\">支持的地域</a>。</div>\n\n\n\n<span id=\"9a04a191\"></span>\n### SaaS\\-云原生 & SaaS\\-非云原生\n\n\n|地址类型 |SaaS\\-云原生环境<br><br>（国内：华北2\\-北京） |SaaS\\-云原生环境<br><br>（海外：亚太东南\\-柔佛） |SaaS\\-非云原生环境 国内环境 |SaaS\\-非云原生 海外BytePlus环境<br><br>（以下 SG 指新加坡） |\n|---|---|---|---|---|\n|数据上报地址 |* SaaS\\-云原生（华北）：<br><br>   https://gator.volces.com |https://gator.uba.ap\\-southeast\\-1.volces.com |无需手动配置 |https://mcs.tobsnssdk.com |\n|分流地址<br><br>（meta信息地址） |https://tab.volces.com |https://tab.ab.ap\\-southeast\\-1.volces.com |无需手动配置 |https://tab.abtest.bytepluses.com |\n\n\n<span id=\"9a82155e\"></span>\n### 私有化环境\n\n私有化部署场景下，您需要获取部署私有化环境时，自行规划配置的数据上送地址。如您不清楚此地址，请联系您的项目经理或客户成功经理。\n\n<span id=\"86bad8ea\"></span>\n## 2.1 SaaS\\-云原生\n\n```go\npackage main\nimport (\n        \"github.com/volcengine/datatester-go-sdk/client\"\n        \"github.com/volcengine/datatester-go-sdk/config\"\n)\nfunc main() {\n        // token获取方式详见接口描述-AbClient\n        abClient := client.NewClient(\"token\",\n        config.WithMetaHost(\"https://tab.volces.com\"), // 默认使用国内SAAS-非云原生环境的域名，私有化/SaaS-云原生用户需要修改，详情请参见上文的 获取数据上送地址 章节。\n        config.WithTrackHost(\"https://gator.volces.com\") // 默认使用国内SAAS域名-非云原生环境的，私有化/SaaS-云原生用户需要修改，详情请参见上文的 获取数据上送地址 章节。\n        )\n        /*\n           client.NewClient(\"appKey\"),\n           config.WithWorkerNumOnce(20), // 事件上报协程数，一般不需要设置\n           config.WithFetchInterval(60 * time.Second), // meta更新间隔，默认为60s，一般不需要设置\n           config.WithAnonymousConfig(true, true), // 匿名上报配置，第一个参数为开启关闭，第二个参数区分SaaS-非云原生和SaaS-云原生\n           config.WithLogger(log.NewLogrusAdapt(logrus.New()))) // 自定义日志接口，提供默认实现\n        */\n\n        // attributes: 用户属性，仅用于分流，不随埋点上报，可参考https://www.volcengine.com/docs/6287/65826\n        attributes := map[string]interface{}{\n        }\n        // decisionId(ssid): 本地分流用户标识，不用于事件上报，请替换为客户的真实用户标识\n        // trackId(uuid): 事件上报用户标识，用于事件上报，请替换为客户的真实用户标识\n        value, err := abClient.Activate(\"${experiment_key}\", \"decisionId\", \"trackId\", true, attributes)\n        // 未命中实验和ff的场景下返回固定err且不为空，value返回传入的默认值，可按需使用\n        // if err != nil {\n        //   \n        //}\n}\n```\n\n\n<span id=\"2d12a6c2\"></span>\n## 2.2 SaaS\\-非云原生(老客)\n\n```Java\npackage main\nimport (\n        \"github.com/volcengine/datatester-go-sdk/client\"\n        \"github.com/volcengine/datatester-go-sdk/config\"\n)\nfunc main() {\n        // token获取方式详见接口描述-AbClient\n        abClient := client.NewClient(\"token\")\n        /*\n           client.NewClient(\"appKey\"),\n           config.WithWorkerNumOnce(20), // 事件上报协程数，一般不需要设置\n           config.WithFetchInterval(60 * time.Second), // meta更新间隔，默认为60s，一般不需要设置\n           config.WithAnonymousConfig(true, true), // 匿名上报配置，第一个参数为开启关闭，第二个参数区分SaaS-非云原生和SaaS-云原生\n           config.WithLogger(log.NewLogrusAdapt(logrus.New()))) // 自定义日志接口，提供默认实现\n        */\n\n        // attributes: 用户属性，仅用于分流，不随埋点上报，可参考https://www.volcengine.com/docs/6287/65826\n        attributes := map[string]interface{}{\n        }\n        // decisionId(ssid): 本地分流用户标识，不用于事件上报，请替换为客户的真实用户标识\n        // trackId(uuid): 事件上报用户标识，用于事件上报，请替换为客户的真实用户标识\n        value, err := abClient.Activate(\"${experiment_key}\", \"decisionId\", \"trackId\", true, attributes)\n        // 未命中实验和ff的场景下返回固定err且不为空，value返回传入的默认值，可按需使用\n        // if err != nil {\n        //   \n        //}\n}\n```\n\n\n<span id=\"ba4030b2\"></span>\n## 2.3 私有化\n\n```Go\npackage main\nimport (\n        \"github.com/volcengine/datatester-go-sdk/client\"\n        \"github.com/volcengine/datatester-go-sdk/config\"\n)\nfunc main() {\n        // token获取方式详见接口描述-AbClient\n        abClient := client.NewClient(\"token\",\n        config.WithMetaHost(\"\"), // 私有化部署客户一般为产品域名，请根据实际的域名进行替换\n        config.WithTrackHost(\"\"),// 私有化部署客户为埋点数据上报申请的域名，请根据实际的域名进行替换\n        )\n        /*\n           client.NewClient(\"appKey\"),\n           config.WithWorkerNumOnce(20), // 事件上报协程数，一般不需要设置\n           config.WithFetchInterval(60 * time.Second), // meta更新间隔，默认为60s，一般不需要设置\n           config.WithAnonymousConfig(true, true), // 匿名上报配置，第一个参数为开启关闭，第二个参数区分SaaS-非云原生和SaaS-云原生\n           config.WithLogger(log.NewLogrusAdapt(logrus.New()))) // 自定义日志接口，提供默认实现\n        */\n\n        // attributes: 用户属性，仅用于分流，不随埋点上报，可参考https://www.volcengine.com/docs/6287/65826\n        attributes := map[string]interface{}{\n        }\n        // decisionId(ssid): 本地分流用户标识，不用于事件上报，请替换为客户的真实用户标识\n        // trackId(uuid): 事件上报用户标识，用于事件上报，请替换为客户的真实用户标识\n        value, err := abClient.Activate(\"${experiment_key}\", \"decisionId\", \"trackId\", true, attributes)\n        // 未命中实验和ff的场景下返回固定err且不为空，value返回传入的默认值，可按需使用\n        // if err != nil {\n        //   \n        //}\n}\n```\n\n\n<span id=\"_3-接口描述\"></span>\n# 3. 接口描述\n\n<span id=\"_3-1-newclient\"></span>\n## 3.1 NewClient\n\n**接口：** \n\nNewClient(token string, configs ...config.Func) \\*AbClient\n\n**描述：**  初始化ABTest分流\n\n**参数：** \n\n\n* token：表明您的Tester应用。出于安全考虑，此处使用的token=appKey，而非appId。\n\n   在集团中接入一个应用后，您可以在集团相关页面查看应用的AppKey等信息，详情请参考：[如何创建应用](https://www.volcengine.com/docs/6287/66984)。\n\n   * SaaS\\-云原生\n\n      <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/eba094f44e174faea6c7cdcdc7447d2d~tplv-goo7wpa0wc-image.image) </span>\n\n   * SaaS\\-非云原生\n\n      <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b55e61ee067544deaff4939685d1475c~tplv-goo7wpa0wc-image.image) </span>\n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">请尽早初始化AbClient，以免影响您的分流服务和埋点上报服务。   </div>\n   \n\n* config.WithMetaHost：获取元信息的地址，默认为SaaS\\-非云原生国内地址；海外Saas域名：config.MetaHostSG；SaaS\\-云原生/私有化需要设置为产品域名\n\n* config.WithTrackHost：事件上报的地址，默认为SaaS\\-非云原生国内地址；海外Saas域名：config.TrackHostSG；SaaS\\-云原生/私有化需要设置为上报域名\n\n* config.WithFetchInterval(60 \\* time.Second)：meta更新间隔，默认为60s，一般不需要设置\n\n* config.WithWorkerNumOnce(20)：事件上报协程数，一般不需要设置\n\n* config.WithAnonymousConfig(true, true)：匿名上报配置，第一个参数为开启关闭，第二个参数区分saas和私有化；不使用匿名上报的场景下不需要设置\n\n* config.WithLogger(log.NewLogrusAdapt(logrus.New()))：自定义日志接口，提供默认实现\n\n\n<span id=\"_3-2-newclientwithuserabinfo\"></span>\n## 3.2 NewClientWithUserAbInfo\n\n**接口：** \n\nNewClientWithUserAbInfo(token string, userAbInfoHandler handler.UserAbInfoHandler, configs ...config.Func) \\*AbClient\n\n**描述：**  初始化ABTest分流类，传入自定义的userAbInfoHandler，userAbInfoHandler详见文档末尾\n\n<span id=\"_3-3-activate\"></span>\n## 3.3 Activate\n\n**接口：**  func (t \\*AbClient) Activate(variantKey, decisionId, trackId string, defaultValue interface{}, attributes map[string]interface{}) (interface{}, error)\n\n**描述：**  获取特定key的分流结果，并上报曝光事件。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">批量获取分流结果，并上报曝光事件可使用GetExperimentConfigsWithImpressionWithVariantKeys接口，详情请参见下文对应接口的文档。</div>\n\n\n**参数：** \n\nvariantKey：变体的key\n\ndecisionId：本地分流用户标识\n\ntrackId：事件上报用户标识\n\ndefaultValue：变体默认值\n\nattributes：用户属性\n\n**返回值：**  该函数返回命中变体对象，未命中时返回默认值对象\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">1、该接口与所有含有“WithImpression”字样的接口均会自动上报曝光事件，用户可在AbClient初始化时指定domain，调整事件上报地址。</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">2、请务必填写trackId字段，否则上报失效</div>\n\n\n<span id=\"_3-4-getexperimentvariantname\"></span>\n## 3.4 GetExperimentVariantName\n\n**接口：**  func (t \\*AbClient) GetExperimentVariantName(experimentId, decisionId string, attributes map[string]interface{}) (string, error)\n\n**描述：**  获取用户命中的特定实验的版本名称\n\n**参数：** \n\nexperimentId：指定分流的实验Id\n\ndecisionId：本地分流用户标识\n\nattributes：用户属性\n\n**返回值：**  该函数返回用户命中的特定实验的版本名称\n\n<span id=\"_3-5-getexperimentconfigs\"></span>\n## 3.5 GetExperimentConfigs\n\n**接口：**  func (t \\*AbClient) GetExperimentConfigs(experimentId, decisionId string, attributes map[string]interface{}) (map[string]map[string]interface{}, error)\n\n**描述：**  获取用户命中的特定实验的变体详情\n\n**参数：** \n\nexperimentId：指定分流的实验Id\n\ndecisionId：本地分流用户标识\n\nattributes：用户属性\n\n**返回值：**  该函数返回用户命中某个实验的变体详情，通常仅能命中一个变体\n\n**返回值示例**：\n\n```json\n{\n    \"1324\": {\n       \"val\": \"3\",\n       \"vid\": \"27028\"\n    },\n    \"father_code\": {\n       \"val\": \"father_code_2\",\n       \"vid\": \"27028\"\n    },\n    \"grey_rollout\": {\n        \"val\": false,\n        \"vid\": \"27028\"\n    },\n    \"os_name\": {\n         \"val\": \"android_f\",\n         \"vid\": \"27028\"\n     }\n }\n```\n\n\n<span id=\"_3-6-getallexperimentconfigs\"></span>\n## 3.6 GetAllExperimentConfigs\n\n**接口：**  func (t \\*AbClient) GetAllExperimentConfigs(decisionId string, attributes map[string]interface{}) (map[string]map[string]interface{}, error)\n\n**描述：**  获取用户命中的所有实验的变体详情\n\n**参数：** \n\ndecisionId：本地分流用户标识\n\nattributes：用户属性\n\n**返回值：**  该函数返回用户命中所有实验的变体详情，通常命中多个变体\n\n**返回值示例：** \n\n与GetExperimentConfigs返回结构相同\n\n<span id=\"_3-7-getfeatureconfigs\"></span>\n## 3.7 GetFeatureConfigs\n\n**接口：**  func (t \\*AbClient) GetFeatureConfigs(featureId, decisionId string, attributes map[string]interface{}) (map[string]map[string]interface{}, error)\n\n**描述：**  获取用户命中的特定feature的变体详情\n\n**参数：** \n\nfeatureId：feature Id\n\ndecisionId：本地分流用户标识\n\nattributes：用户属性\n\n**返回值：**  该函数返回用户命中某个feature的变体详情，通常仅能命中一个变体\n\n**返回值示例：** \n\n```json\n{\n   \"feature_key\":{\n        \"val\" : \"prod\",\n        \"vid\" : \"20006421\"\n    }\n}\n```\n\n\n<span id=\"_3-8-getallfeatureconfigs\"></span>\n## 3.8 GetAllFeatureConfigs\n\n**接口：**  func (t \\*AbClient) GetAllFeatureConfigs(decisionId string, attributes map[string]interface{}) (map[string]map[string]interface{}, error)\n\n**描述：**  获取用户命中的所有feature的变体详情\n\n**参数：** \n\ndecisionId：本地分流用户标识\n\nattributes：用户属性\n\n**返回值：**  该函数返回用户命中所有feature的变体详情，通常命中多个变体\n\n**返回值示例：** \n\n与GetFeatureConfigs返回结构相同\n\n<span id=\"_3-9-getexperimentvariantnamewithimpression\"></span>\n## 3.9 GetExperimentVariantNameWithImpression\n\n同接口“GetExperimentVariantName”（上报曝光事件）\n\n<span id=\"_3-10-getallexperimentconfigswithimpression\"></span>\n## 3.10 GetAllExperimentConfigsWithImpression\n\n同接口“GetAllExperimentConfigs”（上报曝光事件）\n\n<span id=\"_3-11-getexperimentconfigswithimpression\"></span>\n## 3.11 GetExperimentConfigsWithImpression\n\n同接口“GetExperimentConfigs”（上报曝光事件）\n\n<span id=\"_3-12-getfeatureconfigswithimpression\"></span>\n## 3.12 GetFeatureConfigsWithImpression\n\n同接口“GetFeatureConfigs”（上报曝光事件）\n\n<span id=\"53ff585a\"></span>\n## 3.13 GetExperimentConfigsWithImpressionWithVariantKeys\n\n\n* **接口**：func (t \\*AbClient) GetExperimentConfigsWithImpressionWithVariantKeys(decisionId string, trackId string,variantKeys []string, attributes map[string]interface{}) (map[string]interface{}, error)\n\n* **描述**：获取指定变体list的实验配置，并返回指定变体键的值，主要适用于批量获取分流结果，并上报曝光事件\n\n* **请求参数**：\n\n   \n   |请求参数 |是否必填 |数据类型 |参数说明 |\n   |---|---|---|---|\n   |decisionId |是 |string |分流ID |\n   |trackId |是 |string |上报ID |\n   |variantKeys |是 |[]string |变体列表 |\n   |attributes |否 |map |属性映射 |\n   \n\n* **返回参数**：\n\n   \n   |返回参数 |数据类型 |参数说明 |\n   |---|---|---|\n   |variantsResult |map[string]interface{} |变体对应的值映射，如果变体没有命中任何实验，则变体的值为nil |\n   |error |error |错误信息 |\n   \n\n* **使用示例**：\n\n   * 请求示例：\n\n   ```Go\n   func main() {\n    // client初始化，具体参考NewClient\n    abClient := client.NewClient(\"123\")\n    attributes := make(map[string]interface{})\n    // 变体数组\n    variantKeys := []string{\"father\", \"filter_param\", \"no_hit\"}\n    c, _ := abClient.GetExperimentConfigsWithImpressionWithVariantKeys(\"test1\", \"729212309341513****\", variantKeys, attributes)\n   }\n   ```\n   \n\n   * 返回示例\n\n   ```Go\n   {\n    \"father\": \"a\",\n    \"filter_param\": 123,\n    \"no_hit\": nil\n   }\n   ```\n   \n\n\n<span id=\"_4-其他\"></span>\n# 4. 其他\n\n<span id=\"_4-1-userabinfohandler\"></span>\n## 4.1 UserAbInfoHandler\n\n用户信息处理接口，冻结实验、进组不出组场景下使用\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">冻结实验和进组不出组需要持久化用户的进组信息，SDK提供的默认实现不进行数据持久化；</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">如有业务需要，则实现UserAbInfoHandler接口，结合Redis或其他外部存储对用户进组信息进行持久化处理，初始化AbClient时传入。</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">使用方式：</div>\n\n\n\n1. <div data-tips=\"true\" data-tips-type=\"tip\">使用NewClient初始化AbClient时默认使用空实现，不启用“进组不出组”功能</div>\n\n\n2. <div data-tips=\"true\" data-tips-type=\"tip\">继承UserAbInfoHandler接口，自行实现持久化存储；使用NewClientWithUserAbInfo初始化AbClient，并传入自行实现的UserAbInfoHandler类，则可启用“进组不出组”功能</div>\n\n\n\n使用Redis缓存示例（仅供参考）\n\n```go\nclient.NewClientWithUserAbInfo(\"token\", NewRedisUserAbInfoHandler())\n\ntype RedisAbInfoHandler struct{}\n\nfunc (u *RedisAbInfoHandler) Query(decisionID string) string {\n    // need to implement it yourself\n    return redis.get(decisionID);\n}\n\nfunc (u *RedisAbInfoHandler) CreateOrUpdate(decisionID, experiment2Variant string) bool {\n    // need to implement it yourself\n    return redis.set(decisionID, experiment2Variant);\n}\n\nfunc (u *RedisAbInfoHandler) NeedPersistData() bool {\n    // return true if customize this interface\n    return true\n}\n\nfunc NewRedisUserAbInfoHandler() *RedisAbInfoHandler {\n        return &RedisAbInfoHandler{}\n}\n```\n\n\n<span id=\"_4-2-匿名上报\"></span>\n## 4.2 匿名上报\n\n获取不到uuid的用户，可以通过填充device_id或者web_id进行事件上报\n\n\n1. NewClient时设置匿名上报配置，第一个参数（true/开启，false/关闭）匿名上报，第二个参数（true/saas，false/私有化）\n\n\n```go\nclient.NewClient(\"appKey\", config.WithAnonymousConfig(true, true))\n```\n\n\n\n2. 添加device_id, web_id, bddid到用户属性attributes，trackId固定传入空字符串\"\"\n\n\n```php\ntrackId = \"\";\nattributes[\"device_id\"] = 1234; int64\nattributes[\"web_id\"] = 5678; int64\nattributes[\"bddid\"] = \"91011\"; string\n```\n\n\n\n3. 请求Activate或其他'WithImpression'接口即可匿名上报";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

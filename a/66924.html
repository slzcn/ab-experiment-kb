<script>window.DATA_BASE="../";window.INIT_DOC=66924;window.INIT_MD="<span id=\"一-应用场景\"></span>\n# 一. 应用场景\n\n当您需要火山引擎A/B测试的实验分流信息与其他数据平台进行协同时，如自有的数据系统，那么可以通过如下方法将火山引擎A/B测试的分流信息实时回传给其他数据系统。\n\n<span id=\"二-前置条件\"></span>\n# 二. 前置条件\n\n\n* **客户端实验** ：集成客户端SDK，使用方式参考：[客户端SDK](https://www.volcengine.com/docs/6287/65801)\n\n* **服务端实验** ：集成服务端实验SDK，具体使用方式参考：[服务端SDK](https://www.volcengine.com/docs/6287/65805)\n\n\n<span id=\"三-示例代码\"></span>\n# 三. 示例代码\n\n<span id=\"_1-客户端实验\"></span>\n## 1. 客户端实验\n\n以Android为例：\n\n```Plain Text\nAppLog.setUserUniqueID(\"YourUserAccountId\");\n// 设置您自己的账号体系ID, 并保证其唯一性\nString flightValue = AppLog.getAbConfig(\"flight\\_key\", \"defaultValue\");\nif (\"v1\".equals(flightValue)) {\n//事件中增加对应的事件参数，并进行上报\n} else if (\"v2\".equals(flightValue)) {\n//事件中增加对应的事件参数，并进行上报\n} else {\n// 没有命中实验\n}\n```\n\n\n<span id=\"_2-服务端实验\"></span>\n## 2. 服务端实验\n\n以java为例：\n\n```Plain Text\nJSONObject requestInfo = new JSONObject();\nrequestInfo.put(\"ssid\", ssid);\nJSONObject responseInfo = abEngineTest.getABInfo(requestInfo).getJSONObject(\"configs\");\nString flightValue = responseInfo.getString(\"flight\\_key \");\nswitch (flightValue) {\ncase v1:\n//事件中增加对应的事件参数，并进行上报\ncase v2:\n//事件中增加对应的事件参数，并进行上报\ndefault:\n//没有命中实验\n}\n```\n\n\n<span id=\"_3-注意事项\"></span>\n## 3. 注意事项\n\n\n1. 保证获取实验参数的用户口径和事件上报的用户口径一致；\n\n2. 当没有下发该试验参数（没有命中实验）时，不需要将默认参数上报。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。

(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

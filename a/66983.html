<script>window.DATA_BASE="../";window.INIT_DOC=66983;window.INIT_MD="<span id=\"一-概览\"></span>\n# 一. 概览\n\n在用户管理界面，可以直接查看已加入该集团的用户数量、集团管理员数量、以及无权限用户数量，如下图：\n\n<span>![图片](https://p9-volceps.byteimg.com/tos-cn-i-0000/d0ca240f91074b26a9270a6348d00b09~tplv-noop.png?width=1193&height=313) </span>\n\n<span id=\"二-用户列表\"></span>\n# 二. 用户列表\n\n同时还可看到所有进入该集团的所有用户列表。用户列表中的信息包括了用户的姓名、邮箱、角色及状态，如下图：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_44fd7cf380dc4f2dea94ee4e3277d101.png) </span>\n\n<span id=\"_1-编辑成员角色信息\"></span>\n## 1. 编辑成员角色信息\n\n\n* 拥有集团管理员权限的成员，可以在操作栏点击“编辑”，来进行其他成员角色信息的添加或修改，如下图。\n\n* 同时也可点击“删除”，进行集团成员的删除。\n\n   * **成员被删除后，将不再拥有进入该集团或查看该集团信息的任何权限。** \n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_4772e6a5155de26a488388f807f0a844.png) </span>\n\n<span id=\"_2-邀请用户\"></span>\n## 2. 邀请用户\n\n\n* 拥有邀请权限的集团成员，可点击用户列表中的“邀请用户”按钮，如果是主账号请直接填写账号ID或者名称；如果是子账号，请填写子账号名称@主账号ID，并为其添加完相应的角色信息后，点击“确认”完成邀请流程。\n\n* 如需同时添加多个用户，请点击窗口下方“+添加新用户”按钮。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_69ca741f23e1730a21d5e23a584a5bb0.png) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

    </div>
  </div>

<script>window.DATA_BASE="../";window.INIT_DOC=1130748;window.INIT_MD="产品公开课是针对DataTester付费用户更加快速上手用好产品的系列课程。目前上线的课程覆盖了基础的新手学习内容，后续将不断增加完善课程内容覆盖到全产品模块的内容，除产品公开课外，未来将上线产品最佳实践课，敬请期待！\n\n<span id=\"56223f16\"></span>\n# 学习课程介绍\n\n<span id=\"e0cf6c8b\"></span>\n## DataTester课程介绍\n\nDataTester系列公开课之「产品公开课」主要是围绕产品功能实操展开，同时融入A/B实验的方法论以及业务场景进行讲解，方便使用A/B测试（DataTester）产品的用户能够快速熟悉产品功能，完成实验的上手，并能够在自己的业务中进行实操落地。课程内容包含：\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/6b47d8be09534e10a2c920028a7ae4ee~tplv-goo7wpa0wc-image.image) </span>\n\n\n1. 新手入门：快速了解A/B实验的整体流程，从实验设计到创建实验再到实验报告解读串讲，方便新人快速上手。\n\n2. 技术课程：实验分流、SDK接入、数据集成、开放能力等介绍及实操。\n\n3. 功能精讲：各类型实验、报告解读、指标创建、FeatureFlag等产品功能及实操。\n\n\n<span id=\"eda36cd9\"></span>\n## 其他相关产品课程介绍\n\n\n|**所属产品** |**课程名称** |**课程简介** |**课程受众** |\n|---|---|---|---|\n|增长分析DataFinder |《增长分析DataFinder\\-产品课程》 |**火山引擎增长分析是一个一站式用户分析与运营平台，为企业提供数字化消费者行为分析洞见，优化数字化触点用户体验，支撑精细化用户运营，发现业务的关键增长点，提升企业效益。本系列课程针对新手用户快速上手增长分析产品，内容包含：** <br><br><br>1. 埋点及相关准备工作<br><br>2. 各种分析工具的使用<br><br>3. 广告监测模块的介绍<br><br>4. 埋点数据治理 |本课程适合试用和付费期间想要上手DataFinder产品的用户，包含：数据分析师、运营等。 |\n|客户数据平台VeCDP |《客户数据平台VeCDP\\-产品通用学习》 |**客户数据平台是面向业务增长的客户全域数据赋能平台，帮助企业打破数据孤岛，建立统一的人、物档案，赋能企业以数据驱动全链路营销和深度运营，实现企业数字化转型和增长。本课程包含：** <br><br><br>1. 通用类课程：CDP整体介绍、概念讲解等<br><br>2. 业务类课程：标签建设、数据洞察分析等围绕业务场景与方法论介绍<br><br>3. 技术类课程：数据集成与开发、下游系统对接等功能介绍及实操 |本课程适合一切想要学习和了解CDP产品的用户，包含：数据分析师、运营、市场营销、数据工程师等。 |\n|智能数据洞察DataWind |《智能数据洞察DataWind\\-产品课程》 |**智能数据洞察（DataWind）是一款支持千亿级别数据自助分析的一站式数据分析与协作平台。可打通从数据接入、数据整合、查询分析到全员协同共享的全流程，以数据门户、数字大屏、管理驾驶舱等可视化形态，助力业务用户实现智能洞察，让数据发挥价值。系列课程包含：** <br><br><br>1. **入门系列** 包含《智能数据洞察 DataWind 入门｜业务分析》《智能数据洞察 DataWind 入门｜可视化建模》《智能数据洞察 DataWind 入门｜管理运维》三大部分。<br><br>2. **进阶系列** 包含《智能数据洞察 DataWind 进阶｜可视化查询实操》《智能数据洞察 DataWind 进阶｜仪表盘实操》《智能数据洞察 DataWind 进阶｜函数实操》三大部分。 |本课程适合一切想要学习和了解DataWind产品的用户，包含：业务分析师、数据分析师、数据工程师等。 |\n|大数据研发治理套件DataLeap |《大数据研发治理套件DataLeap\\-产品通用学习》 |**大数据研发治理套件（DataLeap）搭配EMR/LAS等存储计算引擎，快速完成数据集成、开发、运维、治理、资产、安全等全套中台及湖仓一体平台建设，提升数据研发效率、降低管理成本。本课程包含：** <br><br><br>1. 产品介绍：整体通识介绍、基础概念讲解、核心应用场景、核心能力讲解<br><br>2. 2.功能简介：围绕套件下各产品模块重点功能简介<br><br>3. 3.产品实操&使用全流程介绍：结合数据研发，数据资产消费，数据治理的全流程产品实操 |本课程适合数据BP，大数据开发工程师，架构师等。 |\n\n\n<span id=\"如何申请-学习？\"></span>\n# 课程申请\n\n<span id=\"ec004af9\"></span>\n## **第一步：填写报名问卷**\n\n如您需要获得对应学习课程，请您 **扫描以下二维码** 或者 [点击该链接](https://bytedance.larkoffice.com/share/base/form/shrcnjOXDADFm8VxWttTLlzzadg) 填写报名问卷。火山引擎工作人员会在2个工作日内完成报名审核，通过的学员将会收到激活邮件。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/dc447bb5404d414abe9c1aaf1441d0fa~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"3d916f27\"></span>\n## **第二步：完成邮件激活**\n\n收到邮件后，查看邮件信息并点击 **激活账号**，根据提示完成账号激活。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/f5021af3494a48f4b9ce0b9cc9bc48af~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"2661fd3d\"></span>\n## **第三步：登录学习平台**\n\n完成账号激活的 **1～2小时** 后，登录 [学习平台](https://elearning.larkoffice.com/student/) ，选择 **访客账号登录**  **，**  使用邮箱和密码登录即可。\n\n> ❗️**注意：** \n\n> 1）学员请在Chrome浏览器的“无痕模式”下打开网址。\n\n> 2）如果提示 “你没有“eLearning”的使用权限”，则表示用户当前登录了飞书账户，且该飞书账户没有平台登录权限，请选择“**使用其他账户登录**”后或关闭浏览器后新建无痕模式窗口，输入网址，选择 **访客账号登录** 。\n\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/9b056e74ada44e3981bd7d235a50df14~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"0921a391\"></span>\n### **第四步：开启火山引擎数据产品的学习之旅**\n\n成功登录后，您就可以在[课程]页面看到您申请的所有课程，点击即可开启学习之旅！\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/48d0089f758f461092bdb211f4d5f3d3~tplv-goo7wpa0wc-image.image) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。

</script>

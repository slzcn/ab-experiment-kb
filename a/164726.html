<script>window.DATA_BASE="../";window.INIT_DOC=164726;window.INIT_MD="<span id=\"_1-检查项验证\"></span>\n# 1. 检查项验证\n\n（1）SDK是否引入，可以通过远程引入和离线引入两种方式，推荐远程引入，如果需要手动引入，请先下载sdk，之后参考文档手动引入；\n\n（2）检查是否添加source源\n\n（3）检查是否集成SDK初始化代码 （4）检查appid是否为想上报应用的appid\n\n（5）检查是否配置channel渠道，iOS一般默认App Store渠道\n\n（6）检查数据上报地址是否设置正确，saas使用默认即可，如果是私有部署需要配置私有部署的数据上传地址，在做数据上报的时候需要保证手机和电脑访问这个地址是通的，本机可以ping下域名\n\n（7）检查AB开关是否开启：config.abEnable = YES；\n\n（8）检查是否调用实验api ABTestConfigValueForKey；\n\n（9）如果使用实时埋点监测或者圈选功能，需要做以下验证：[为什么实时埋点检测及圈选无法进入](https://www.volcengine.com/docs/6285/106883)。\n\n（10）以上检查验证完之后就可以调用相关api，比如分流、用户、事件等api上报\n\n<span id=\"_2-实验调试\"></span>\n# 2. 实验调试\n\n<span id=\"_2-1-为什么要调试实验\"></span>\n## 2.1 为什么要调试实验\n\n实验上线前需要保证前面的集成过程无误，上线后才能保证实验结果的科学和有效！\n\n<span id=\"_2-2-开启调试状态\"></span>\n## 2.2 开启调试状态\n\n参照[创建实验](https://www.volcengine.com/docs/6287/65809)，使实验处于“调试中” 状态，如下图所示：\n\n\n* 实验状态一共分三种：调试中、运行中、已结束。\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_e0ed28bda2cc3d28400661e127ab6925.png) </span>\n\n<span id=\"_2-3-开始调试验证\"></span>\n## 2.3 开始调试验证\n\n（1）初始化中打开log开关，可以在output中看到Track Launch event相关信息证明sdk初始化成功\n\n\n* objective\\-c\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_5ae8e6a0a1fb7b062dce26c8f585e13e.png) </span>\n\n* Swift\n\n   ```Swift\n   // 在控制台输出日志，可用于观察用户行为日志上报情况，建议在上线时关闭\n   config.showDebugLog = true // true:开启日志，false:关闭日志\n   config.logger = { (log) inprint(log ?? \"log is nil\")} // 开启日志时设置Logger\n   ```\n   \n\n\n（2）通过获取ssid api获取ssid，由于sdk初始化之后会去id服务拿ssid，因此获取ssid前加个2s的延迟\n\n\n* objective\\-c\n\n   ```objectivec\n   #import <RangersApplog/BDAutoTrackNotifications.h>\n   // 在初始化 SDK 之前设置监听\n    [[NSNotificationCenter defaultCenter] addObserver:self\n                                               selector:@selector(onRegisterSuccess:)\n                                                   name:BDAutoTrackNotificationRegisterSuccess object:nil];\n   //SDK 初始化代码部分\n   //然后在 SDK 初始化之后设置回调\n   - (void)onRegisterSuccess:(NSNotification *)noti  {\n       NSString *dids = [noti.userInfo objectForKey:kBDAutoTrackNotificationRangersDeviceID];\n       NSString *ssids = [noti.userInfo objectForKey:kBDAutoTrackNotificationSSID]; \n       NSLog(@\"onRegisterSuccess.dids：%@\", dids); // 获取设备bddid\n       NSLog(@\"onRegisterSuccess.ssids：%@\", ssids); // 获取SSID\n   }\n   ```\n   \n\n* Swift\n\n   ```Swift\n   NotificationCenter.default.addObserver(self, selector: #selector(onRegisterSuccess), name: NSNotification.Name(rawValue: BDAutoTrackNotificationRegisterSuccess), object: nil)\n   \n   func onRegisterSuccess(noti: Notification) {\n       let did = noti.userInfo[kBDAutoTrackNotificationRangersDeviceID]\n       let ssid = noti.userInfo[kBDAutoTrackNotificationSSID]\n       print(\"onRegisterSuccess.dids：\\(did)\")\n       print(\"onRegisterSuccess.ssids：\\(ssid)\")\n   }\n   ```\n   \n\n\n（3）获取到ssid后，将ssid添加到白名单的任意版本做测试，并在右下角点击\"保存\"按钮。如下：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_e9f8aee10969691c5d8e27500d24a6d0.png) </span>\n\n白名单功能说明（详情请参考[用户测试白名单](https://www.volcengine.com/docs/6287/65824)）\n\n\n* 白名单功能主要是用于测试调试实验/feature，添加白名单的用户会被强制命中实验，方便在测试的过程中可以测试实验版本和对照版本的效果。\n\n* 白名单需要添加分流id，客户端实验分流id是ssid，服务端实验分流id使用的decisionid（也就是代码的第一个id），一般我们建议使用uuid，所以我们也会看到有些白名单是uuid。\n\n\n（4）运行app，看右下角返回的实验参数是否为添加白名单对应的版本value，未命中实验会返回默认值\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_68981cb9210f83c4bc0ec647b4134ab4.png) </span>\n\n如果返回的是默认值，需要检查：\n\n\n* ssid添加后是否做保存\n\n* ssid添加的对不对，运行的ssid是不是添加白名单的ssid\n\n* abtest_config接口是否通，在日志中搜索abtest_config，查看接口是否通\n\n* 如果以上都不是，确定是获取实验参数的代码是否在初始化前执行\n\n\n（5）如果实验参数获取正常，那么整个实验调试就OK了\n\n<span id=\"_3-数据验证\"></span>\n# 3. 数据验证\n\n<span id=\"_3-1-埋点验证功能验证\"></span>\n## 3.1 埋点验证功能验证\n\n注意：如果单独购买AB的私有部署版本，只有超管权限可以使用，如果其他成员需要验证，可以使用抓包，saas和同时购买AB和finder的可以正常使用。\n\n功能说明：[https://www.volcengine.com/docs/6285/66054](https://www.volcengine.com/docs/6285/66054)\n\n需要按照实时埋点的相关要求集成，当集成成功后在系统管理\\-数据管理\\-一般事件，点击验证埋点，选择移动端\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_bbcda10c1e996175198202b28f3d2e60.png) </span>\n\n扫码之后会实时看到上报的行为数据，左侧为实时的行为，右侧为对应行为的属性信息\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_3cc677f5c8195655ad0bd7927cded511.png) </span>\n\n<span id=\"_3-2-抓包验证\"></span>\n## 3.2 抓包验证\n\n配置好抓包工具，选择数据上报地址对应的接口，查看app_log中的event_v3的接口，也可以通过抓包看abtest_config接口返回的结果\n\nsaas地址：[http://toblog.volceapplog.com](http://toblog.volceapplog.com)，私有部署需要选择对应的数据上报地址\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_2f7581527acae26fc3c93618d700c8d6.png) </span>\n\n<span id=\"_3-3-系统验证\"></span>\n## 3.3 系统验证\n\n说明：用户细查功能仅SaaS系统支持\n\n在指标管理\\-数据管理验证，上报的自定义事件和自定义属性在事件列表、事件属性和用户属性列表是否存在。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_64da0fb623ccc6f19ad872482fa5e1ad.png) </span>\n\n在全局设置\\-受众管理\\-用户细查，查看上报用户的详细行为，当在用户细查验证数据都OK，整个集成及上报就验证完成\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_e27859a9d3e5baa3c902b0d1c9b30a91.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_817a01ff33c160b3770b585d18ec0a92.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_53309c16a6d82737247b14522f350205.png) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

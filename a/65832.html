<script>window.DATA_BASE="../";window.INIT_DOC=65832;window.INIT_MD="实验创建后，实验协作者可使用DataTester提供的实验诊断工具，从实验角度出发，监查看目标实验测试用户是否正常命中对应的实验版本，如果没有命中可根据诊断原因进一步优化排查。本文为您介绍实验命中诊断工具的使用注意事项和操作指导。\n\n<span id=\"d7dd8301\"></span>\n# 注意事项\n\n\n* **时间限制**：实验诊断时，最多支持回溯的时间周期为3个月，即您最多可诊断近三个月实验的命中情况。\n\n* **实验类型**：当前只有「**调试中**」、「**运行中**」、「**已冻结**」和「**已暂停**」状态的**客户端**实验，可使用实验诊断工具。\n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">「<strong>已冻结</strong>」和「<strong>已暂停</strong>」状态的<strong>客户端</strong>实验可使用实验诊断工具查看在实验运行期间的命中情况。   </div>\n   \n\n* **权限相关**：拥有实验「命中工具」权限的用户，可以使用命中诊断工具；且需要对某个实验进行诊断时，还需同时拥有此实验的查看协作权限。\n\n\n<span id=\"二-应用场景\"></span>\n# 应用场景\n\n如果您在AB实验中出现以下问题，均可使用命中诊断，排查出实验无法命中的详细原因。\n\n\n* 为什么我的测试机明明填了白名单，但是没生效？\n\n* 实验已经开始了，我已经把实验版本的流量权重调到90%，为什么测试机还没命中实验版本？\n\n\n<span id=\"三-实验命中诊断\"></span>\n# 操作指导\n\n<span id=\"_1-诊断入口\"></span>\n## 实验诊断入口\n\n在实验列表页，点击实验名称，随后点击“诊断”操作按钮，如下图所示：\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/abeb120189b94cc0a0e5fcb9c2f65e92~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"_2-如何诊断？\"></span>\n## 实验诊断配置\n\n进入当前实验的诊断工具页面后，您可以配置需要诊断的分流用户、时间窗口、实验版本信息，查询该用户在目标时间窗口内的请求分流情况和命中实验情况。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/ef84a645ba0646e68232e5f099daa426~tplv-goo7wpa0wc-image.image) </span>\n\n\n|参数 |配置说明 |\n|---|---|\n|**测试用户ID** |您可以手工输入目标用户的ssid。 |\n|**预期命中实验ID** |您可以手动输入实验ID，您可以在实验详情的页面URL中获取到对应的实验ID。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/640398273cdc4896b148cef27cdc5b04~tplv-goo7wpa0wc-image.image) </span> |\n|**选择回放时间** |选择需要回放诊断的时间窗口，当前支持最长的回溯周期为近3个月。 |\n\n\n完成配置后，单击**开始诊断**，即可在页面下方查看诊断结果。\n\n<span id=\"_2-1-列表模式\"></span>\n## 实验诊断结果\n\n实验诊断结果为您展示时间窗口中，所有实验分流列表及每次分流请求的详细请求日志，并为您展示未命中的分析结果原因。您可以在实验诊断结果的右上方点击切换结果展示的方式，支持**列表模式**或**时间线模式**。\n\n\n|列表模式 |时间线模式 |\n|---|---|\n|<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/2780b34b7a1b43629ae0b1e1ecdb94a1~tplv-em5hxbkur4-noop.image?width=1663&height=607) </span> |<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/73b7d3521ced400ba9d3608252e44433~tplv-em5hxbkur4-noop.image?width=1653&height=593) </span> |\n\n\n您可以查看每次分流请求的日志JSON详情，您可以结合给出的未命中原因，进一步查看日志中对应的请求参数，进一步明确未命中的解决方案。\n\n<span id=\"_3-用户为什么无法命中实验？\"></span>\n## 参考：未命中原因详细说明\n\n\n|序号 |**未命中原因** |详细解释 |\n|---|---|---|\n|1 |实验状态为关闭 |该实验已关闭，任何用户都无法命中实验。 |\n|2 |互斥层命中规则 |白名单用户，命中同层其它实验。 |\n|3 |不属于流量区间 |该用户分流结果不属于该实验的流量区间，当前实验分配总流量为<实验赋予流量百分比\\>，该用户属于剩余流量空间。 |\n|4 |实验状态为暂停 |该实验当时处于暂停状态时，该用户虽然属于流量区间，但无法命中。 |\n|5 |实验状态为预览/调试 |该实验当时处于调试状态，该用户非白名单用户，无法命中。 |\n|6 |实验状态为冻结 |该实验当时处于冻结状态，该用户冻结前未曝光实验，虽然属于流量区间，但无法命中。 |\n|7 |流量过滤条件不符合 |该用户不满足受众过滤条件，无法命中。<br><br>例如，该用户“操作系统=Windows”，不满足过滤条件“操作系统=MAC/Android”，无法命中。 |\n|8 |未命中多链接实验 |该用户请求URL未命中多链接实验目标URL。 |";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

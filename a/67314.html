<script>window.DATA_BASE="../";window.INIT_DOC=67314;window.INIT_MD="<span id=\"_1-集成\"></span>\n# 1. 集成\n\n<span id=\"_1-1-安装sdk\"></span>\n## 1.1 安装SDK\n\n> 使用npm方式安装\n\n\n```plain\nnpm install @datarangers/sdk-mp\n```\n\n\n<span id=\"_1-2-域名配置准备\"></span>\n## **1.2 域名配置准备**\n\n> 在 「小程序后台\\-开发\\-开发设置\\-服务器域名」 中进行配置，具体可以参考小程序相应的官方文档，如微信小程序文档 https://developers.weixin.qq.com/miniprogram/dev/framework/ability/network.html\n\n\n**SaaS 业务**：将[https://mcs.volceapplog.com](https://mcs.volceapplog.com)，[https://abtest.volceapplog.com](https://abtest.volceapplog.com)添加到小程序后台的“request合法域名”中。\n\n**私有化业务**：将私有化部署的数据上报域名添加到小程序后台的“request合法域名”中，如您不清楚此域名，请联系您的项目经理或客户成功经理。\n\n<span id=\"_1-3-老版本升级\"></span>\n## **1.3 老版本升级**\n\n请注意，如果是SaaS业务，升级SDK到最新版（2.x.x版本）时，需要补充将[https://mcs.volceapplog.com](https://mcs.volceapplog.com)和[https://abtest.volceapplog.com](https://abtest.volceapplog.com)添加到小程序后台的“request合法域名”中，已添加过[https://mcs.ctobsnssdk.com](https://mcs.ctobsnssdk.com)和[https://toblog.ctobsnssdk.com](https://toblog.ctobsnssdk.com)不要立即移除。\n\n<span id=\"_1-4-旧版本说明\"></span>\n## **1.4 旧版本说明**\n\n如果集成旧版本SDK(2.0以下版本)，需要将[https://mcs.ctobsnssdk.com](https://mcs.ctobsnssdk.com)和[https://toblog.ctobsnssdk.com](https://toblog.ctobsnssdk.com) 添加到微信开放平台的请求白名单中。\n\n<span id=\"_2-初始化\"></span>\n# 2. 初始化\n\n<span id=\"_2-1-获取appid\"></span>\n## **2.1 获取appid**\n\n在开始集成前，首先需要在集团中拥有一个应用。 「应用列表」\\-\\> 接入应用的「详情」\\-\\>「应用ID」中可查看您的appid。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_d9d3420909c39945d1f23487a59c257f.png) </span>\n\n<span id=\"_2-2-初始化-sdk示例\"></span>\n## 2.2 初始化 SDK示例\n\n<span id=\"_2-2-1-saas-业务\"></span>\n### 2.2.1 SaaS 业务\n\n```javascript\n// 在入口页面初始化SDK\n// app.js\nimport $$Rangers from '@datarangers/sdk-mp';\n$$Rangers.init({\n    app_id: 0000, // 替换成申请的app_id，参考2.1节获取，注意类型是number而非字符串\n    log: true, // 开启后会控制台会打印日志，开发阶段有助于查看埋点上报过程\n    auto_report: true, // 开启后会上报一些预定义事件，如app_launch、app_terminate等\n    enable_ab_test: true, // 开启ab实验\n});\n$$Rangers.config({\n    mp_name: 'xyz小程序', // 一些预定义属性，可以通过config进行设置mp_version: '1.1.1',\n});\n$$Rangers.send();\nApp({\n    onLaunch: function () {\n        this.$$Rangers = $$Rangers;\n    \n        // 如果想设置用户标识，比如想使用open_id来标识用户，可以在获取到open_id后把值设置给user_unique_id\n        this.$$Rangers.config({\n            user_unique_id: '获取到的open_id', //可以是open_id，也可以union_id等其他业务觉的可以用来标识用户唯一性的值\n        });\n        // 调用event方法上报具体事件\n        this.$$Rangers.event('test_event', {\n            from: 'launch', // 支持任意属性，值支持数字、字符串等\n        });\n    }\n});\n// 其他页面上报事件，如：\n// pages/index/index.js\nPage({\n    onLoad() {\n        getApp().$$Rangers.event('bind_view_tap', {\n            'title': 'chart',\n        });\n    }\n});\n```\n\n\n<span id=\"_2-2-2-私有化业务\"></span>\n### **2.2.2 私有化业务**\n\n私有化业务需要明确设置数据上报域名，如您不清楚此域名，请联系您的项目经理或客户成功经理。\n\n```javascript\n// 在入口页面初始化SDK\n// app.js\nimport $$Rangers from '@datarangers/sdk-mp';\n$$Rangers.init({\n    app_id: 0000, // 替换成申请的app_id，参考2.1节获取，注意类型是number而非字符串\n    channel_domain: \"{{DOMAIN}}\", // 设置私有化部署数据上送域名，如您不清楚此地址，请联系您的项目经理或客户成功经理\n    log: true, // 开启后会控制台会打印日志，开发阶段有助于查看埋点上报过程\n    auto_report: true, // 开启后会上报一些预定义事件，如app_launch、app_terminate等\n    enable_ab_test: true, // 开启ab实验\n    ab_channel_domain: \"{{ABTEST_DOMAIN}}\", // 设置ab分流接口域名，默认为channel_domain的设置\n});\n$$Rangers.config({\n    mp_name: 'xyz小程序', // 一些预定义属性，可以通过config进行设置mp_version: '1.1.1',\n});\n$$Rangers.send();\n\nApp({\n    onLaunch: function () {\n        this.$$Rangers = $$Rangers;\n    \n        // 如果想设置用户标识，比如想使用open_id来标识用户，可以在获取到open_id后把值设置给user_unique_id\n        this.$$Rangers.config({\n            user_unique_id: '获取到的open_id', //可以是open_id，也可以union_id等其他业务觉的可以用来标识用户唯一性的值\n        });\n        // 调用event方法上报具体事件\n        this.$$Rangers.event('test_event', {\n            from: 'launch', // 支持任意属性，值支持数字、字符串等\n        });\n    }\n});\n \n// 其他页面上报事件，如：\n// pages/index/index.js\nPage({\n    onLoad() {\n        getApp().$$Rangers.event('bind_view_tap', {\n            'title': 'chart',\n        });\n    }\n});\n```\n\n\n<span id=\"_3-用户与用户属性\"></span>\n# 3. 用户与用户属性\n\n<span id=\"_3-1-登录态变化调用\"></span>\n## 3.1 登录态变化调用\n\n<span id=\"_3-1-1-账户登录\"></span>\n### 3.1.1 账户登录\n\n如您的产品中有账户体系，请在用户登录后立即设置uuid，以保证用户登录前后口径一致性。\n\n```javascript\n$$Rangers.config({\n    user_unique_id: '{{USER_UNIQUE_ID}}'\n});\n```\n\n\n<span id=\"_3-2-设置用户属性\"></span>\n## 3.2 设置用户属性\n\n<span id=\"_3-2-1-profileset\"></span>\n### 3.2.1 profileSet\n\n设置用户属性，存在则覆盖，不存在则创建。\n\n```javascript\n// 示例：设置用户属性，属性名为key，属性值为value\n$$Rangers.profileSet({\n    key: 'value' // 值支持字符串，数字，数组\n});\n```\n\n\n<span id=\"_3-2-2-profilesetonce\"></span>\n### 3.2.2 profileSetOnce\n\n设置用户属性，存在则不设置，不存在则创建，适合首次相关的用户属性，比如首次访问时间等。\n\n```javascript\n// 示例：设置用户属性，属性名为key_once，属性值为value_once\n$$Rangers.profileSetOnce({\n    key_once: 'value_once' // 值支持字符串，数字，数组\n});\n```\n\n\n<span id=\"_3-2-3-profileincrement\"></span>\n### 3.2.3 profileIncrement\n\n设置数值类型的属性，可进行累加。\n\n```javascript\n// 示例：设置用户属性，属性名为key，属性值为1\n$$Rangers.profileIncrement({\n    key: 1\n});\n```\n\n\n<span id=\"_3-2-4-profileappend\"></span>\n### 3.2.4 profileAppend\n\n设置List类型的用户属性，可持续向List内添加。\n\n```javascript\n// 示例：设置用户属性，属性名为key，原本已有属性值，现添加属性值为value_append\n$$Rangers.profileAppend({\n    key: 'value_append'\n});\n```\n\n\n<span id=\"_3-2-5-profileunset\"></span>\n### 3.2.5 profileUnset\n\n删除用户的属性。\n\n```javascript\n// 示例：删除用户属性，属性名为key\n$$Rangers.profileUnset('key');\n```\n\n\n<span id=\"_4-获取实验参数\"></span>\n# 4. 获取实验参数\n\n版本1.0.9开始，sdk增加了ab实验能力，提供了getVar、getAllVars等方法，这些方法在开启ab实验时才有效，即enable_ab_test: true。「A/B 测试」通常在SDK 初始化后会向分流服务发送一个分流请求（request），在获取到分流服务的响应（response）后，客户端开发可以根据分流的结果参数完成代码分支。\n\n\n* 请注意此步骤的前置条件：已经根据实验的需求方创建好了实验及相关的参数，具体见“[创建实验](https://www.volcengine.com/docs/6287/65809)”。\n\n\n<span id=\"_4-1-getvar\"></span>\n## 4.1 getVar\n\n获取ab实验元信息中的变量对应的值。 一个变量name是和一个vid绑定的，获取成功之后，会把对应的vid设置到sdk上报的公共属性里。\n\n```javascript\nApp({\n  onLaunch: function () {\n    this.$$Rangers = $$Rangers; // 绑定到全局的app，以便其他页面调用。\n    //experiment-key 为实验参数的key ，用户开发做代码分支，default-value 为网络异常时的兜底方案，建议和对照组value一致\n    this.$$Rangers.getVar('experiment-key', 'defaulte-value', function(value) {\n        console.log(value);\n    });\n    //示例\n    this.$$Rangers.getVar('size', '1', function(value) {\n        console.log(value);\n    });\n  }\n});\n```\n\n\n当调用getVar 的方法会自动上报曝光事件（ab_exposure），用于内部处理进组用户的相关统计。\n\n<span id=\"_4-2-getallvars\"></span>\n## 4.2 getAllVars\n\n如果需要获取所有ab实验的进组信息可使用getAllVars方法，但是此方法不会上报曝光事件，因此调用此方法系统不会有数据显示，只做获取进组信息接口使用。\n\n```javascript\nApp({\n  onLaunch: function () {\n    this.$$Rangers = $$Rangers; // 绑定到全局的app，以便其他页面调用。\n    this.$$Rangers.getAllVars(function(data) {\n        //data数据格式如下：\n        // {\n        //   \"aa\": {\"vid\": \"1183\", \"val\": true},\n        //   \"test_before_6d\": {\"vid\": \"2446\", \"val\": \"fail\"}\n        // }\n    });\n  }\n});\n```\n\n\n\n|参数 |必选 |说明 |示例 |\n|---|---|---|---|\n|callback |是 |(data: { [key: string]: { val: any,<br><br>vid: string } }) =\\> void<br><br>获取所有实验数据时候的回调函数。 |{<br><br>\"aa\": {\"vid\": \"1183\", \"val\": true},<br><br>\"test_before_6d\": {\"vid\": \"2446\", \"val\": \"fail\"}<br><br>} |\n\n\n<span id=\"_5-事件与事件属性（实验指标）\"></span>\n# 5. 事件与事件属性（实验指标）\n\n<span id=\"_5-1-上报代码埋点\"></span>\n## 5.1 上报代码埋点\n\n用户行为日志采用事件event+属性params的形式，事件一般对应多个属性，也可以仅有事件没有属性。代码埋点方案一般由数据分析师或产品运营设计。\n\n仅上报事件的代码埋点，示例如下：\n\n```javascript\n// 示例：上报事件event，该事件不包含属性\n// 置于业务逻辑对应位置\napp.$$Rangers.event('event');\n```\n\n\n上报事件和对应属性的代码埋点，示例如下：\n\n```javascript\n// 示例：上报事件event，该事件包含两个属性\n//      一个string类型的属性，属性名为key_string，属性值为value_string\n//.     一个int类型的属性，属性名为key_int，属性值为10\n// 置于业务逻辑对应位置\napp.$$Rangers.event('event', {\n   key_string: 'value_string',\n   key_int: 10\n});\n```\n\n\n<span id=\"_5-2-事件公共属性\"></span>\n## 5.2 事件公共属性\n\n如需在每个事件中都包括某属性，可通过公共属性设置，无需在每个事件中重复设置。公共属性只需设置一次，即可包括在所有代码埋点事件、预置事件和全埋点事件中。\n\n<span id=\"_5-2-1-设置公共属性\"></span>\n### 5.2.1 设置公共属性\n\n```javascript\n// 示例：设置自定义的公共属性，属性名为key_public，属性值为value_public\n$$Rangers.config({\n   key_public: 'value_public'\n});\n```\n\n\n<span id=\"_6-api说明\"></span>\n# 6. API说明\n\n<span id=\"_6-1-init\"></span>\n## **6.1 init**\n\n支持的初始化参数\n\n\n| |字段 |字段值 |字段说明 |\n|---|---|---|---|\n|基础 |app_id |number |业务产品的唯一标识 |\n||log |boolean |设置true后，控制台会打印调试信息 |\n||channel<br><br>别名：report_channel |枚举值：<br><br>cn、sg |上报通道，对应内置的上报域名和ab实验域名，每个应用只能设置唯一一个channel，请根据产品的具体情况，设置合适的channel<br><br>cn表示国内、sg表示新加坡<br><br>默认值为cn<br><br>内置上报域名<br><br>cn：[https://mcs.volceapplog.com](https://mcs.volceapplog.com)<br><br>sg：[https://mcs.tobsnssdk.com](https://mcs.tobsnssdk.com)<br><br>内置ab实验域名<br><br>cn：[https://abtest.volceapplog.com](https://abtest.volceapplog.com)<br><br>sg：[https://toblog.tobsnssdk.com](https://toblog.tobsnssdk.com)即当channel值为cn时<br><br>上报域名为 [https://mcs.volceapplog.com](https://mcs.volceapplog.com)<br><br>ab实验域名为 [https://abtest.volceapplog.com](https://abtest.volceapplog.com) |\n||channel_domain |string |可以自定义上报域名，会覆盖channel设置，通常私有化环境下使用 |\n|自动上报 |auto_report |boolean |设置true后，会自动上报预定义事件，如app_launch、app_terminate、predefine_pageview、on_share等事件 |\n|ab实验 |enable_ab_test |boolean |设置true后，会开启ab实验功能，包括使用getVar、getAllVars等api |\n||ab_channel_domain |string |可以自定义ab实验域名，会覆盖channel设置，通常私有化环境下使用 |\n||clear_ab_cache_on_user_change |boolean |默认切换用户重新获取A/B配置信息，如果要关闭则把clear_ab_cache_on_user_change配置项置为false |\n|缓冲<br><br>（仅2.5.0及以上版本支持） |enable_buffer |boolean |设置true后，将开启缓冲 |\n||buffer_interval |number |缓冲的间隔时间，单位是毫秒，默认值 5000，含义是到达间隔时间后会上报缓冲区的所有事件 |\n||buffer_number |number |缓冲的最大数量，默认值 5，含义是缓冲数量达到该值后会立即上报缓冲区的所有事件 |\n|缓存<br><br>（仅2.5.0及以上版本支持） |enable_cache |boolean |开启后，请求失败的事件会存到storage中，并在用户下一次再进小程序时补充上报 |\n|其他 |enable_profile |boolean |设置true后，可以使用profile相关api |\n||enable_filter_crawler |boolean |设置true后，在爬虫场景下(scene: 1129)不再上报事件 |\n||enable_custom_webid |boolean |首先初始化时开启enable_custom_webid，然后再通过config设置web_id，只有设置web_id后才会初始化完成，web_id的值要求必须是数字或者全是数字的字符串类型<br><br>$$Rangers.init({<br><br>enable_custom_webid: true,<br><br>});<br><br>$$Rangers.config({<br><br>web_id: '9876543210',<br><br>}); |\n\n\n示例\n\n```javascript\n// 参数：InitParams\n// 返回值：void\n$$Rangers.init({\n    app_id: 1338,\n    log: true,\n    auto_report: true,\n    enable_ab_test: true,\n    clear_ab_cache_on_user_change: true,\n    // ...\n});\n```\n\n\n<span id=\"_6-2-config\"></span>\n## **6.2 config**\n\nconfig方法可以调用多次，后面设置会覆盖之前相同的属性字段\n\n\n| |字段 |类型 |说明 |示例 |\n|---|---|---|---|---|\n|用户 |user_unique_id |string |使用业务自身的用户id来设置user_unique_id |$$Rangers.config({<br><br>user_unique_id: 'zhangsan',<br><br>}); |\n|自定义 |自定义属性 |string/number |当属性是公共属性字段时，属性将有明确的位置，放在header下<br><br>当属性不是公共属性字段时，将放在header的custrom下 |$$Rangers.config({<br><br>city: '南京',<br><br>custom_name: 'vikings',<br><br>}); |\n\n\n示例\n\n```javascript\n// 参数：ConfigParams\n// 返回值：void\n$$Rangers.config({\n    city: '南京',\n    custom_name: 'vikings',\n    // ...\n});\n```\n\n\n<span id=\"_6-3-send\"></span>\n## **6.3 send**\n\n当初始化设置完毕之后，必须调用send方法，sdk才真正初始化完毕，之前不会有数据上报。 示例\n\n```javascript\n// 参数：无\n// 返回值：void\n$$Rangers.send();\n```\n\n\n<span id=\"_6-4-event\"></span>\n## **6.4 event**\n\n进行事件上报。 事件命名规范：\n\n\n* 事件命名仅支持字母、数字和下划线，不要使用app_launch、app_terminate等SDK内部自动上报事件名\n\n* 建议事件名和属性统一使用小写\n\n* 事件属性值仅接受number与string类型\n\n* 不要在事件属性中再嵌套object，即属性值不接受object类型\n\n* 如果想要表达事件属性值空的含义，建议用“be_null”，不建议使用\"\"或\" \"\n\n\n示例\n\n```javascript\n// 参数：name: string, params: object\n// 返回值：void\n$$Rangers.event('start_event', {\n    start_time: 1630986183813,\n    path: '...'\n});\n```\n\n\n<span id=\"_6-5-sdk预设公共属性字段\"></span>\n## 6.5 SDK预设公共属性字段\n\nSDK 会在 `config({})` 中默认给一些字段赋值，这些SDK 默认设置的字段可以被覆盖。\n\n请注意，增长分析产品中“分享用户”功能的昵称、头像、地域信息需您主动上报。\n\n\n|**字段** |**类型** |**说明** |**是否自动设置** |**举例** |\n|---|---|---|---|---|\n|platform |string |平台类型 |自动采集 |mp |\n|device_brand |string |设备品牌 |自动 |\"iPhone\" |\n|device_model |string |设备型号 |自动 |\"iPhone 7\" |\n|os_name |string |客户端系统 |自动 |\"ios\" |\n|os_version |string |客户端/操作系统版本 |自动 |\"iOS 10.0.1\" |\n|screen_width |number |屏幕宽度 |自动 |375 |\n|screen_height |number |屏幕高度 |自动 |812 |\n|resolution |string |屏幕分辨率 |自动 |\"375x812\" |\n|access |string |网络类型 |自动 |\"wifi\" |\n|language |string |系统语言 |自动 |\"zh_CN\" |\n|device_id |number |设备id |业务方设置 |67834512 |\n|app_name |string |应用名称 |业务方设置 |\"xxx\" |\n|app_version |string |应用版本 |业务方设置 |\"2.5.0\" |\n|region |string |地区 |业务方设置 |\"cn\" |\n|province |string |省份 |业务方设置 |\"江苏\" |\n|city |string |城市 |业务方设置 |\"南京\" |\n|nick_name |string |昵称 |业务方设置 |\"张三\" |\n|gender |string |性别 |业务方设置 |\"male\" |\n|avatar_url |string |头像 |业务方设置 |\"https://xxx\" |\n|timezone |number |时区 |业务方设置 |8 |\n|tz_offset |number |时区偏移 |业务方设置 |\\-28800 |\n\n\n<span id=\"_6-6-获取平台生成的各种id\"></span>\n## 6.6 获取平台生成的各种ID\n\n获取SDK的token信息，里面包含web_id、ssid、user_unique_id信息。\n\n```typescript\nApp({\n  onLaunch: function () {\n    this.$$Rangers = $$Rangers; // 绑定到全局的app，以便其他页面调用。\n    this.$$Rangers.getToken(function(token) { \n        //token数据内容例如：\n        // {\n        //    \"web_id\":\"6748002161499735560\",\n        //    \"ssid\":\"579bc89a-bd45-4021-8314-669c35f38e3d\",\n        //    \"user_unique_id\":\"xxx\",\n        // }\n    });\n  }\n});\n```\n\n\n<span id=\"_6-7-自定义webid\"></span>\n## 6.7 获取实验版本ID\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">开展AB实验必须调用获取实验参数的api（详情请参见 <strong><ins>获取实验参数</ins></strong> 章节）。如需获取用户所有曝光或命中实验的版本ID（vid）时，可使用此API，此API不会上报abtest_exposure曝光事件。</div>\n\n\n```JSON\n$$Rangers.getAbSdkVersion();\n```\n\n\n<span id=\"d6a8b538\"></span>\n## 6.8 自定义webid\n\n如需更改SDK默认的webid，首先初始化时开启`enable_custom_webid: true`，然后再通过config设置web_id。\n\n```javascript\n$$Rangers.init({\n    // 其他初始化配置\n    enable_custom_webid: true, // 初始化时开启enable_custom_webid\n});\n```\n\n\n开启后，可在其他时机config设置web_id。\n\n```typescript\n$$Rangers.config({\n    web_id: '11111111111111', // webid的值要求纯数字或全是数字的字符串类型\n});\n```\n\n\n需要注意的是，当开启了自定义webid后，必须主动设置webid，SDK才会真正初始化并继续执行后续的流程。此场景适合H5页面在微信小程序中打开，需要传递微信的unionID或者openID给H5页面。\n\n<span id=\"_6-8-预置事件自动上报\"></span>\n## 6.9 预置事件自动上报\n\n使用预置事件自动上报，需要在初始化时配置`auto_report`参数为true。建议您开启此事件。\n\n请注意：自定义事件的事件名请勿与预置事件重名。\n\n小程序预置事件请参考：[小程序预置事件及属性](https://www.volcengine.com/docs/6285/108567)。\n\n<span id=\"_7-小程序第三方框架适配\"></span>\n# 7.小程序第三方框架适配\n\n针对自动上报事件（app_launch、app_terminate等），SDK针对`taro`、`uni-app`第三方框架进行了兼容处理。此兼容需保证 SDK 版本高于 1.1.1。\n\n<span id=\"_7-1-taro框架使用方式\"></span>\n## 7.1 taro框架使用方式\n\n\n* 在 app.jsx 中通过 import 引入 SDK\n\n* 在 App 类前初始化完成 SDK\n\n\n<span id=\"_7-2-uni-app框架使用方式\"></span>\n## 7.2 uni\\-app框架使用方式\n\n\n* 在 main.js 中通过 import 引入 SDK\n\n* 在 App 类前初始化完成 SDK\n\n\n<span id=\"_7-3-预置事件上报排查\"></span>\n## 7.3 预置事件上报排查\n\n如果发现有部分自动事件未上报情况，可以按照下面几种情况排查：\n\n\n* SDK版本需要1.1.1+，并且尽可能的将SDK的初始化放在工程入口最前面；\n\n* 第三方框架需要当前比较新的版本，taro:、uni\\-app: （其他第三方框架目前还未做特别兼容处理，有可能不支持）；\n\n* 同时引入了其他类似功能的SDK，这种情况下尽量将我们的SDK放在其他SDK后面进行初始化（但是依然需要在App类前）。\n\n\n<span id=\"三、调试试验\"></span>\n# 三、调试试验\n\n<span id=\"_1-为什么要调试实验\"></span>\n## **1. 为什么要调试实验**\n\n实验上线前需要保证前面的集成过程无误，上线后才能保证实验结果的科学和有效 ！\n\n<span id=\"_2-开启调试状态\"></span>\n## **2. 开启调试状态**\n\n参照“[创建实验](https://www.volcengine.com/docs/6287/65809)”章节，使实验处于“调试中” 状态，如下图所示：\n\n\n* 实验状态一共分三种：调试中、运行中、已结束。\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_881e54384e796759d8d8ad92ee8c3288.png) </span>\n\n<span id=\"_3-通过接口获取调试设备的统计口径\"></span>\n## **3. 通过接口获取调试设备的统计口径**\n\n分别在微信小程序SDK init和config中打开日志和A/B Test开关，并完成初始化：\n\n\n* 通过6.6中getToken方法获取对应的ssid\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_0afabc23b54e705204c4e9e57cc56f41.png) </span>\n\n<span id=\"_4-添加至白名单\"></span>\n## **4. 添加至白名单**\n\n将您的测试设备 ssid 到白名单中，并在右下角点击\"保存\"按钮。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_552a7bca57c2ab6eae992b3f1cd74ff3.png) </span>\n\n<span id=\"_5-微信小程序参数调试\"></span>\n## **5. 微信小程序参数调试**\n\n设置完上述步骤后，清空缓存并编译，观察ab数据包（即abtest_config接口返回的实验数据），是否获取到了Tester 中的配置。下图中是成功获取到了实验参数：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_b5534d686298af26195b09c1667dd8de.png) </span>\n\n如果您的微信小程序没有发出实验请求，或实验请求为空, 请按下面步骤排查：\n\n\n* 初始化时是否正确设置 enable_ab_test: true；\n\n* 微信小程序是否将“A/B Test域名”和“事件上报域名”添加到 微信开发者后台/开发/开发者设置/服务器域名 \"request合法域名\" 中，具体域名参考1.2～1.4章节。\n\n\n触发实验事件后，您可以在事件数据包头观察到 ab_sdk_version 字段和内容（下图以ab_exposed事件举例，其他事件以此类推）：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_3f1725d1d4d54f502bdc7d7dadc44529.png) </span>\n\n<span id=\"_6-真机或模拟器实验场景调试\"></span>\n## **6. 真机或模拟器实验场景调试**\n\n在实验参数调试正常的情况下，开发或者是QA/PM/运营 同学需要观察实验所在的页面是否符合之前实验设计的预期。\n\n\n* 关于实验设计和准备，请参照“[创建实验](https://www.volcengine.com/docs/6287/65809)”章节。";</script>

</script>

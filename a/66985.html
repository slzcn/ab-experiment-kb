<script>window.DATA_BASE="../";window.INIT_DOC=66985;window.INIT_MD="<span id=\"查看角色信息\"></span>\n# 查看角色信息\n\n在角色管理中可以看到该集团下所有角色的基本信息，如下图：\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/ca37aedd8b834a068b04935a40b2a2ae~tplv-em5hxbkur4-noop.image?width=1664&height=310) </span>\n\n\n* **成员** ，无法看到集团管理相关的菜单，包括用户管理、角色管理和集团信息；\n\n* **管理员** ，可以针对拥有管理权限的应用和产品下的角色，进行添加、删除或者编辑；\n\n* **集团管理员** ，可以针对该集团下所有角色进行增删查改；\n\n\n<span id=\"添加新角色\"></span>\n# 添加新角色\n\n若拥有管理员或以上的身份，可点击右上角“添加新角色”，进行角色的添加，如下图：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_2b66340b142aacd01cf0935547dfb0a9.png) </span>\n\n“添加新角色”页面，如下图：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_e21c40338fca0933284eec8534f9fe02.png) </span>\n\n\n* 填写角色名称；\n\n* 选择为该角色所赋予的身份；\n\n* 选择为该角色开放的应用（可多选），这里的应用指的是您集团下已经接入的应用，例如您的小程序、或APP等；\n\n* 选择为该角色开放的产品和功能（可多选），这里的产品指的是火山引擎增长分析（及其它相关数据产品）以及对应的产品具体功能等；\n\n* 点击“创建”，完成新角色的创建。\n\n\n<span id=\"编辑角色\"></span>\n# 编辑角色\n\n若拥有管理员或以上的身份，可点击具体的“用户数 蓝色数字”或者“编辑”按钮，为该角色的权限进行进一步编辑，如下图：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_db7f152adaeebc2e12583a3354ad3543.png) </span>\n\n“编辑角色”页面，如下图：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_b89d2f4cf78d72ed3994b419c3a8bbe5.png) </span>\n\n\n* 针对为该角色开放的应用进行编辑；\n\n* 针对为该角色开放的产品以及对应产品的具体功能进行编辑；\n\n* 点击”完成“，完成角色的编辑并生效。\n\n\n<span id=\"删除角色\"></span>\n# 删除角色\n\n若拥有管理员或以上的身份，可在操作栏点击”删除“，进行角色的删除，如下图：<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/fb966ab7d878440ca4ecb95f2279ddca~tplv-em5hxbkur4-noop.image?width=2362&height=816) </span>\n\n点击“删除”按钮之后，弹出“弹出角色”页面，如下图：\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/7fd12a54828c4eb2b57c7586ffe70da8~tplv-em5hxbkur4-noop.image?width=802&height=336) </span>\n\n\n* **请注意：** \n\n   \\* 角色一旦删除后，该角色将从所有用户中的角色列表中移除，对应的权限也会一并移除，请在删除之前进行进一步确认；\n\n   \\* 若某一用户仅仅只有一个角色，而该角色被删除，则该用户将无法查看该集团下的任何应用及产品。\n\n* 点击“确定”，完成角色的删除。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

      <label>正文（Markdown）</label>
      <textarea id="edMd" placeholder="# 标题&#10;&#10;正文用 Markdown 书写，支持 **加粗**、列表、表格、代码块…&#10;&#10;## 小节&#10;- 要点一&#10;- 要点二"></textarea>
      <div class="ed-actions">
        <button class="ed-btn" id="edSubmit" style="display:none">✓ 发布文章</button>
      </div>
      <div class="ed-msg" id="edMsg"></div>
      <div class="ed-hint" id="edHint"></div>
    </div>
    <div class="ed-preview" id="edPrev">

    </div>
  </div>
</div>

<script>window.DATA_BASE="../";window.INIT_DOC=101834;window.INIT_MD="您可以在圈选事件中新建网页端或移动端的圈选事件，并查看圈选的所有事件的详细信息。\n\n<span id=\"6fba3714\"></span>\n# 前提条件\n\n在使用此功能之前，请确保已经启用全埋点，即在Web端或App端的SDK中已打开全埋点开关，各端SDK的全埋点功能开关配置请参见各端数据接入SDK文档。\n\n<span id=\"页面介绍\"></span>\n# 页面介绍\n\n「圈选事件」页面如下：\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_692933172952ed7c539417cce13ce569) </span>\n\n\n* 可输入事件名称/事件描述搜索您想查找的事件，可手动切换圈选事件的排序方式，如最近关注、创建日期、包含事件数；\n\n* 可选择网页端圈选事件和移动端圈选事件。\n\n\n<span id=\"网页端圈选\"></span>\n## 网页端圈选\n\n**第一步：点击“+新建圈选事件”\\-网页端；** <span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_d74da249cd3892aeb3653d1f84536901) </span>\n\n**第二步：输入圈选网址的地址，并点击“提交”；** \n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_d52921437407883d15dfbb43897da374) </span>\n\n提示：如果点击提交没有出现圈选工具条，请查看是否已开启了全埋点。\n\n**第三步：圈选元素。** \n\n①若输入的网站之前接过圈选埋点sdk，则可以在新的标签页打开地址对应的页面，顶部会有一个浮动的工具条，如下图（圈选埋点页面）：\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_fef9090d467f51c90ee59cfefcc0409d) </span>\n\n\n* “浏览、圈选、热力图”视角切换：\n\n   * 默认选中“圈选”，正常使用圈选功能；\n\n   * 点击“浏览”会变为浏览网站模式，圈选相关功能不可用；\n\n   * 点击“热力图”，需要选择页面或页面组。 <span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_735840cc8ec41278d806beff8e69c04c) </span>\n\n* 点击“定义页面”按钮，可对整个当前页面进行定义； <span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_b55c1836fa95eef6e08da70f7f997db3) </span>\n\n* 复选框“高亮已定义事件”，默认关闭，打开后整个页面上展示出所有已圈选过的前端控件元素，颜色跟新建圈选有区别； <span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_a1c7608bd4a895eddb56821a374e58fc) </span>\n\n* 点击下拉框“本页已标记元素xx个”，可展开下拉列表，其中列出所有当前页已经定义过的元素型事件； <span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_d8a6846f296c7c0e1a11516dfb3aa3f7) </span>\n\n* 点击”关闭“按钮，即可退出圈选模式变成正常浏览模式，浮动工具条消失。\n\n\n②鼠标在页面上移动时会出现绿色的浮层标记，点击后进入元素圈选，如下图：\n\n\n* 填写事件名称，选择所属页面、勾选限定条件；\n\n* 底部为当前选中元素的小时级（最近48小时，实时数据），触发次数、触发人数变化；\n\n* 点击保存，即可成功保存该元素。\n\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_39131bd99b5007e6512fad99b7b6099c) </span>\n\n\n* 元素事件组分为如下两种情况：\n\n   * 归属于不同页面的相同事件，如导航栏的按钮，请先用通配路径定义相应的页面组，然后在定义元素事件时选择该页面组；\n\n   * 归属于相同页面的列表内的同类事件，忽略“匹配位置”和“匹配内容”选项即可。\n\n\n**第四步：定义页面。** \n\n\n* 可定义新的页面/页面组；\n\n   * 填写页面名称、域名（有三个取值： */http/https，默认选中*）、更多设置等；\n\n   * “定义新的页面/页面组”下，展示当前页面上定义过的页面类事件/页面组，选中任意一个可以查看定义的配置，仅可以修改页面名称；\n\n   * 右侧底部为当前选中元素的小时级（最近48小时，实时数据），触发次数、触发人数变化；\n\n   * 点击保存，即可成功保存该页面。\n\n\n **<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_8ffb3a7fdfeb578ff3a2abe1161e42d3) </span>** \n\n页面组的定义分为如下两种情况：\n\n\n* 通配路径，如定义包含：`http://www.example.com/product/123456.html`的页面组，可以将页面路径设置为：`http://www.example.com/product/\\*`\n\n* 限定参数，如定义事件：汽车电商\\-搜索SUV，符合定义的链接包括`xxx.com/search?keyword=SUV&tab=1`和`xxx.com/search?keyword=SUV&tab=2`，则需要将查询参数设置为`\"keyword=SUV&\\*\"`。\n\n\n**第五步：事件圈选之后可以在各个分析功能中选择和使用，使用方法与一般事件基本相同；也可以在“数据管理\\-圈选事件中”中进行查看和管理。** \n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_fd0077bd1624e9317d8e74d1250efa67) </span>\n\n<span id=\"移动端圈选\"></span>\n## 移动端圈选\n\n可新建圈选事件。**扫码启动圈选，如下步骤：** \n\n**第一步：点击“+新建圈选事件”\\-移动端；** \n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_96aeb26bd7af5289a46233fc385ea72e) </span>\n\n**第二步：微信扫码；** \n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_40141374e2b4527148eda94b4c3b0fb4) </span>\n\n**第三步：在手机浏览器中打开；** <span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_48b5706c7a6d848015cf693a8c052041) </span>\n\n**第四步：选择圈选方式；** <span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_c2c1b72621a36e144f6e5fa095b34634) </span>\n\n\n* 如果圈选启动出错，会显示如下图：<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_f01f717c4dd7fd49ca205c5d4ab1c24a) </span>\n\n* 如果圈选启动成功，可开始进行圈选埋点\n\n   * 点击鼠标开始圈选，如下图： <span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_a0c25e4c14b3f97a805efd5c787a3a8c) </span>\n\n   * 定义圈选元素，选中的元素呈现绿色粗边框、透明底色，可对其进行事件命名、选择所属页面等操作；<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_b37c57e288461c7b0163a5ecc9b500cd) </span>\n\n* 可点击圈选事件的卡片，即可进入圈选事件详情。\n\n   * 圈选事件详情如下图，包含圈选的元素、缩略图、数据预览、事件详情等信息。 <span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_cdee07661f6761f855be3829f6478156) </span>\n\n\n**温馨提示：** \n\n\n* 圈选事件会在事件分析、留存分析、转化分析、用户路径、用户分群的事件配置选项里面显示，如下图： <span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_442f9627a2595decde68c4779f601ca2) </span>\n\n\n\n---\n\n\n\n注：DataFinder 是火山引擎增长分析的曾用名。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

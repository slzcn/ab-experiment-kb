<script>window.DATA_BASE="../";window.INIT_DOC=75274;window.INIT_MD="<span id=\"android\"></span>\n## **Android**\n\n初始化的时候调用 setAutoStart(false); 然后初始化，就不会发送数据，等授权之后再调用 **AppLog.start();** \n\n未初始化之前的数据在内存缓存，有数量限制，300条，初始化后持久存db，无限制。\n\n<span id=\"demo\"></span>\n### **Demo**\n\n```Plain Text\nPHP\n/* 初始化开始 */\nfinal InitConfig config = new InitConfig(\"204701\", \"your_channel\"); // appid和渠道，appid如不清楚请联系客户成功经理\n // 私有化配置，云版可忽略{{REPORT_URL}} 例如 https://yourdomain.com，注意域名后不要加“/”\nconfig.setUriConfig(UriConfig.createByDomain(\"{{REPORT_URL}}\", null));\n // 开启圈选埋点\n config.setPicker(new Picker(this, config));\n // 开启AB测试\n config.setAbEnable(true);\n //开启圈选预置事件开关，true开启，false关闭\n config.setAutoTrackEnabled (truw);\n//是否上报\n config.setAutoStart(false);\n \n AppLog.init(this, config);\n /* 初始化结束 */\n \n //授权后\n AppLog.start();\n\n```\n\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/tos-cn-v-697126/dc36b59cd6a8473d8512346a4ea80a50) </span>\n\n<span id=\"ios\"></span>\n## **iOS**\n\n需要使用 5.6.4 及以上的版本\n\n注意：iOS的延时启动，可能会出现launch的时间戳比event的晚的情况\n\n使用下面的方式初始化：\n\n```Plain Text\n C++ \n // 额外配置结束后，最后初始化SDK \n [BDAutoTrack sharedTrackWithConfig:config]; \n\n```\n\n\n授权之后再调用\n\n```Plain Text\n C++ \n // 初始化之后，可以引用该实例用来上报，不调用则不上报 \n [BDAutoTrack startTrack]; \n\n```\n\n\n不调用 // [BDAutoTrack startTrack]; 数据存储在沙盒数据库，过期时间是七天\n\n<span id=\"demo\"></span>\n### **Demo**\n\n```Plain Text\nC++\n#import <RangersAppLog/BDAutoTrack.h>\n#import <RangersAppLog/BDCommonEnumDefine.h> //设置私有化数据发送地址需要引入的文件\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions { \n   BDAutoTrackConfig *config = [BDAutoTrackConfig new];   \n   // 必须配置   \n   config.appID = @\"your appID\";   \n   config.appName = @\"your appName\";   \n   config.channel = @\"App Store\";       \n   // 初始化实例   \n   BDAutoTrack *track = [BDAutoTrack trackWithConfig:config];       \n   /* 设置私有部署服务器地址 */   \n   BDAutoTrackRequestHostBlock block =     \n^NSString *(BDAutoTrackServiceVendor vendor, BDAutoTrackRequestURLType    requestURLType) {          \n       return @\"{{REPORT_URL}}\"; // 此处为私有部署服务器地址        \n    };  \n    [BDAutoTrack setRequestHostBlock:block]; \n    \n    // 额外配置结束后，最后初始化SDK\n   [BDAutoTrack sharedTrackWithConfig:config]; \n   \n   //自定义事件\n   [BDAutoTrack eventV3:@\"video_play_clicks\" params: NULL];\n   \n   // 初始化之后，可以引用住该实例用来上报，不调用则不上报\n    [BDAutoTrack startTrack];\n\n\n```";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

<script>window.DATA_BASE="../";window.INIT_DOC=489195;window.INIT_MD="了解如何设计实验之前，请先阅读：[A/B实验怎么开](https://www.volcengine.com/docs/6287/75763)\n\n<span id=\"一、a-b实验流程\"></span>\n# 一、A/B实验流程\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_3bdf1ecc31057f5ec24dc974083204b4.png) </span>\n\n<span id=\"二、a-b实验设计举例\"></span>\n# 二、A/B实验设计举例\n\n以下通过一个场景示例为大家展示**如何分析、拆解一个业务问题，设定优化方向、评价指标并设计一个A/B实验来进行效果验证。** \n\n<span id=\"【业务背景】\"></span>\n##  **【业务背景】** \n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">实验的来源：通过分析当前业务问题、提出潜在的解决方案，形成一个「实验idea」</div>\n\n\n**背景**：该产品是一个汽车类App产品，发现App登录率偏低，通过转化漏斗定位问题为触发登录率过低，影响个性化服务的机会。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_e79548449ae47118ce81eca505886e73.png) </span>\n\n根据上面的分析，一个比较自然的想法，就是去提升触发登录率，也就是给未登录用户增加更多的登录入口。那么就面临两个问题：\n\n\n* 在哪里加入口？\n\n* 以什么形式加入口？\n\n\n针对第一个问题，需要定位目前未登录用户的主要流量去向，在这些主要的流量场加入登录入口，效果是最好的。现有未登录可使用的功能，包括但不限于：关注、点赞、进入直播间、保存发布草稿、查看浏览历史等。通过用户路径对未登录用户的行为路径进行分析发现关注、点赞、查看历史等场景流量较多，可以尝试在这些环节加入登录引导。\n\n<span id=\"【实验目标】\"></span>\n## 【实验目标】\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\"><strong>目标</strong>：明确「实验idea」最终想达成的业务目标是什么，根据目标来制定衡量指标</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\"><strong>衡量指标</strong>：用于评价目标是否达成的成功标准。且需要论证是因为施加了实验策略而达成的，因此指标和策略要有明确的业务因果性</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">至此，就形成了完整的 <strong>「实验假设」</strong>：预期通过xxx改进，可对指标A提升n%，从而为产品/用户带来xxxx价值。</div>\n\n\n**目标**：在不影响未登录用户使用体验的前提下，提升登录率，更好地为服务用户\n\n**衡量指标**：登录率\n\n**实验假设：**  通过在每个入口尝试不同的引导方式，可对指标「登录率」提升n%，从而更好的服务用户。\n\n<span id=\"【实验设计】\"></span>\n## 【实验设计】\n\n当下主流的登录引导由弱到强有：非阻断式弹窗/蒙层引导、半屏/全屏面板引导、全屏面板强制登录。针对不同入口，可以实验不同的登录引导方式。\n\n\n|实验模式 |客户端编程实验 |\n|---|---|\n|实验受众 |全体用户，不做任何过滤 |\n|流量大小 |根据样本量计算器计算可得，不同产品、业务形态差异巨大，保险起见在单组数量级过万 |\n|实验时长 |14天及以上 |\n|实验版本 |对照组：线上样式<br><br>全屏面板强制登录<br><br><span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_4c628ae82658e211cdced9c3cb172099.png) </span> |\n||实验组：新样式<br><br>半屏面板引导，增加引导说明<br><br><span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_5d63e1147bb4a6e1ff948cc4ccc0e8d7.png) </span> |\n|监控指标 |核心指标：登录率 |\n||关注指标：登录触发、登录提交、登录成功三个环节的转化率 |\n|评估思路 |* 「登录率」是成功指标<br><br>   * 显著上涨则说明方案有效果，可以直接上线<br><br>   * 显著下降则说明方案有负向影响，需要进一步拆解数据来分析原因<br><br>   * 无显著变化则说明没有明显作用，可以通过拆解用户分层、商品品类的数据来分析是什么原因导致的，如果发现有显著变化的敏感人群或敏感品类可以进一步施加策略做实验 |";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。

</script>

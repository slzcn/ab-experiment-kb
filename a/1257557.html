<script>window.DATA_BASE="../";window.INIT_DOC=1257557;window.INIT_MD="应苹果公司App Store更新/上架APP最新隐私保护政策要求，使用了DataTester的iOS SDK进行数据采集的话，需同时提供APP与SDK相关的隐私配置文件（PrivacyInfo.xcprivacy），说明App 如何处理用户数据。本文为您提供DataTester的iOS SDK的隐私配置文件说明，您需要根据实际使用到的子库情况，将SDK的隐私配置文件说明合入您的APP中。\n\n<span id=\"2641a125\"></span>\n# 获取PrivacyInfo.xcprivacy\n\n单击下方附件链接，下载DataTester的iOS SDK的PrivacyInfo.xcprivacy附件。\n\n<Attachment link=\"https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/0639ad6970e04398b4f1f67416697aaa~tplv-goo7wpa0wc-image.image\" name=\"PrivacyInfo.xcprivacy\">PrivacyInfo.xcprivacy</Attachment>\n\n\n&nbsp;\n\n下载至您本地后，您可打开查看PrivacyInfo.xcprivacy配置详情，其中将一些非所有用户都会使用的部分子库相关配置注释掉了，您需要根据实际使用情况，如果有使用一些特殊子库，需手动修去掉其中的注释，详情可参见下文**查看并修改PrivacyInfo.xcprivacy**。\n\n<span id=\"702fbc66\"></span>\n# 查看并修改PrivacyInfo.xcprivacy\n\nDataTester的PrivacyInfo.xcprivacy中罗列了iOS SDK 采集的隐私数据及使用的隐私 API，其中默认为生效了所有用户均涉及的最小子库集。\n\n```JavaScript\npod 'RangersAppLog', 'SDK-VERSION', \n    :subspecs => [\n        'Core'\n    ]\n```\n\n\n使用了UITracker子库、Exception子库、Unique子库时，您需要手动去掉PrivacyInfo.xcprivacy 中对应子库内容的注释。\n\n<span id=\"a77e0113\"></span>\n## UITracker 子库\n\n该子库一般用于全埋点功能，如果使用了该子库，需要在 NSPrivacyCollectedDataTypes 中增加如下内容（DataTester的PrivacyInfo.xcprivacy文件中默认将此部分内容注释掉了，您手动放开相关注释即可）。\n\n```XML\n<!--    如果使用了 UITracker 子库，请放开 NSPrivacyCollectedDataTypeProductInteraction   -->\n<dict>\n    <key>NSPrivacyCollectedDataType</key>\n    <string>NSPrivacyCollectedDataTypeProductInteraction</string>\n    <key>NSPrivacyCollectedDataTypeLinked</key>\n    <true/>\n    <key>NSPrivacyCollectedDataTypeTracking</key>\n    <false/>\n    <key>NSPrivacyCollectedDataTypePurposes</key>\n    <array>\n        <string>NSPrivacyCollectedDataTypePurposeAnalytics</string>\n    </array>\n</dict>\n```\n\n\n<span id=\"cedfd106\"></span>\n## Exception 子库\n\n该子库一般用于异常采集功能，如果使用了该子库，需要在 NSPrivacyCollectedDataTypes 中增加如下内容（DataTester的PrivacyInfo.xcprivacy文件中默认将此部分内容注释掉了，您手动放开相关注释即可）。\n\n```XML\n<!--    如果使用了 Exception 子库，请放开 NSPrivacyCollectedDataTypeCrashData   -->\n<dict>\n    <key>NSPrivacyCollectedDataType</key>\n    <string>NSPrivacyCollectedDataTypeCrashData</string>\n    <key>NSPrivacyCollectedDataTypeLinked</key>\n    <true/>\n    <key>NSPrivacyCollectedDataTypeTracking</key>\n    <false/>\n    <key>NSPrivacyCollectedDataTypePurposes</key>\n    <array>\n        <string>NSPrivacyCollectedDataTypePurposeAnalytics</string>\n    </array>\n</dict>\n```\n\n\n<span id=\"2600a9d3\"></span>\n## Unique 子库\n\n该子库一般用于 idfa 数据采集，如果使用了该子库，需要开启 NSPrivacyTracking 并设置 TrackingDomains，默认 NSPrivacyTracking 属性是关闭的。\n\n请在 PrivacyInfo.xcprivacy 文件做如下操作\n\n\n1. 移除掉DataTester默认的 NSPrivacyTracking 和 NSPrivacyTrackingDomains 配置（注释掉相关内容即可）。\n\n   ```XML\n   <!--  如果使用了 Unique 子库，请注释掉以下配置 NSPrivacyTracking，NSPrivacyTrackingDomains  -->\n   <key>NSPrivacyTracking</key>\n   <false/>\n   <key>NSPrivacyTrackingDomains</key>\n   <array/>\n   ```\n   \n\n2. 重新配置 NSPrivacyTracking 如下（DataTester的PrivacyInfo.xcprivacy文件中默认将此部分内容注释掉了，您手动放开相关注释即可）。\n\n   ```XML\n   <!--  如果使用了 Unique 子库，请放开下面的 NSPrivacyTracking，NSPrivacyTrackingDomains  -->\n   <key>NSPrivacyTracking</key>\n   <true/>\n   ```\n   \n\n3. 重新配置 NSPrivacyTrackingDomains（DataTester的PrivacyInfo.xcprivacy文件中默认将此部分内容注释掉了，您手动放开相关注释即可）。\n\n   \n   |**DataTester环境类型** |**修改示例** |\n   |---|---|\n   |SaaS\\-非云原生环境 |* CN环境<br><br>   ```XML```<br>```   <key>NSPrivacyTrackingDomains</key>```<br>```   <!--   SaaS 版本 CN 环境，请使用这段     -->```<br>```   <array>```<br>```       <string>klink-tracking.volceapplog.com</string>```<br>```       <string>toblog-tracking.volceapplog.com</string>```<br>```       <string>alink-tracking.volceapplog.com</string>```<br>```       <string>abtest-tracking.volceapplog.com</string>```<br>```       <string>tobapplog-tracking.volceapplog.com</string>```<br>```   </array>```<br>```   ```<br>   <br><br>* SG环境/海外<br><br>   ```XML```<br>```   <key>NSPrivacyTrackingDomains</key>```<br>```   <!--   SaaS 版本 SG 环境，请使用这段     -->```<br>```   <array>```<br>```       <string>toblog-tracking.tobsnssdk.com</string>```<br>```       <string>tobapplog-tracking.tobsnssdk.com</string>```<br>```       <string>toblog-alink-tracking.tobsnssdk.com</string>```<br>```   </array>```<br>```   ```<br>    |\n   |SaaS\\-云原生环境 |```XML```<br>```<key>NSPrivacyTrackingDomains</key>```<br>```<!--   云原生版本，请使用这段     -->```<br>```<array>```<br>```    <string>gator-tracking.datafinder.volces.com</string>```<br>```    <string>tab-tracking.abtest.volces.com</string>```<br>```</array>```<br> |\n   |私有化环境 |```XML```<br>```<key>NSPrivacyTrackingDomains</key>```<br>```<!--   私有化版本，请在此配置自己的 idfa 请求域名     -->```<br>```<array>```<br>```    <string>your tracking domain</string>```<br>```</array>```<br><br><br>其中 `your tracking domain` 需要换成您的 idfa 专用请求域名。 |\n   \n\n\n<span id=\"cf380b5a\"></span>\n# 接入 PrivacyInfo.xcprivacy 配置至APP\n\n将符合您的APP业务场景的SDK PrivacyInfo.xcprivacy文件接入您的APP中，以下为您提供两种接入方式，您可按需参考。\n\n如果需要在 SDK 中单独配置 PrivacyInfo.xcprivacy 文件，则可以跳过这一节，直接查看下一小节。\n\n<span id=\"326a16fa\"></span>\n## 接入方式1：合并至 App 的隐私配置（推荐）\n\n在大部分场景下，建议您直接将SDK 的隐私配置合并至 App 的隐私配置中。即直接将SDK 的 PrivacyInfo.xcprivacy 文件合并至 App 的 PrivacyInfo.xcprivacy 文件中。操作参考如下。\n\n\n1. 单击右键，选择 Open AS \\-\\-\\> Source Code 打开SDK的 PrivacyInfo.xcprivacy 文件.\n\n   <div style=\"text-align: center\">\n   <img src=\"https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/15bd5a39941c437b947c0047d553fe90~tplv-goo7wpa0wc-image.image\" width=\"566px\" />   </div>\n   \n\n2. 将 NSPrivacyAccessedAPITypes 和 NSPrivacyCollectedDataTypes 下的内容拷贝至 App 的 PrivacyInfo.xcprivacy 文件中对应的位置即可。\n\n   \n   |NSPrivacyAccessedAPITypes位置示例 |NSPrivacyCollectedDataTypes位置示例 |\n   |---|---|\n   |<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/d09ebb8d6db846a7a214696304d26444~tplv-goo7wpa0wc-image.image) </span> |<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/459415f4f5cd4544861ccc3503a6f1df~tplv-goo7wpa0wc-image.image) </span> |\n   \n\n3. 如果用到了 idfa 数据，则还需要拷贝 NSPrivacyTrackingDomains 下的内容。\n\n   <div style=\"text-align: center\">\n   <img src=\"https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/d5d0bf8b62564aaa991d9a3f3e935c9b~tplv-goo7wpa0wc-image.image\" width=\"686px\" />   </div>\n   \n\n4. PrivacyInfo.xcprivacy 文件配置完成后，请确保在 Build Phases \\-\\-\\> Copy Bundle Resources 中引入了该文件.\n\n   <div style=\"text-align: center\">\n   <img src=\"https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/79770a870dbe47ccad1aebcbd8aa5b4f~tplv-goo7wpa0wc-image.image\" width=\"580px\" />   </div>\n   \n\n\n<span id=\"2c85274c\"></span>\n## 接入方式2：使用单独的 SDK 隐私配置\n\n如果您是手动引入我们的离线安装包时，将安装包二次封装为 framework 或者 pod 依赖，则建议使用该方式配置。\n\n\n* 若是将我们的 SDK 二次封装为 framework，则将 PrivacyInfo.xcprivacy 文件直接放在 framework 目录下即可。\n\n* 若是将我们的 SDK 二次封装为 pod 依赖，则将 PrivacyInfo.xcprivacy 文件配置在 pod 的 resource_bundles 中即可。\n\n\n<span id=\"642a796a\"></span>\n# 修改SDK集成代码，配置隐私域名\n\n如果使用了 idfa 数据，且用到了 Unique 子库，则需要修改SDK集成配置，按以下步骤配置 idfa 的请求域名。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\"><strong>支持隐私域名配置的 SDK 最低版本为 6.16.6。</strong></div>\n\n\n<span id=\"eff96443\"></span>\n### SaaS 版本\n\n升级 SDK 至 6.16.6 版本即可，不需要额外的配置。\n\n<span id=\"17882145\"></span>\n### 云原生版本\n\n在 Podfile 中引入依赖\n\n```JavaScript\npod 'RangersAppLog', 'SDK-VERSION', \n    :subspecs => [\n        'Unique',\n    ]\n```\n\n\n引入 IDFA 头文件\n\n```objectivec\n#import <RangersAppLog/BDAutoTrack+IDFA.h>\n```\n\n\n在 sdk 初始化之后，配置 idfa 专用域名\n\n```objectivec\n// 云原生模式\nconfig.serviceVendor = BDAutoTrackServiceVendorPrivate;\n[BDAutoTrack setRequestHostBlock:^NSString * _Nullable(BDAutoTrackServiceVendor  _Nonnull vendor, BDAutoTrackRequestURLType requestURLType) {\n    if (requestURLType == BDAutoTrackRequestURLABTest) {\n        return @\"https://tab.volces.com\";\n    }\n     return @\"https://gator.volces.com\";\n}];\n\n// 初始化 sdk\n[BDAutoTrack sharedTrackWithConfig:config];\n\n// 配置 idfa 专用域名\n[BDAutoTrack.sharedTrack setRequestIDFAHostBlock:^NSString * _Nullable(BDAutoTrackServiceVendor  _Nonnull vendor, BDAutoTrackRequestURLType requestURLType) {\n    if (requestURLType == BDAutoTrackRequestURLABTest) {\n        return @\"https://tab-tracking.abtest.volces.com\";\n    }\n    return @\"https://gator-tracking.datafinder.volces.com\";\n}];\n\n// 启动 sdk\n[BDAutoTrack.sharedTrack startTrack];\n```\n\n\n<span id=\"d8ef894b\"></span>\n### 私有化版本\n\n私有化场景下，idfa 的专用域名由用户提供，域名规则上只需要与原先上报的域名不同即可。\n\n\n* idfa 的专用域名与原域名指向的 IP 可以相同\n\n* idfa 的专用域名与原域名可以使用同一个主域\n\n\n在 Podfile 中引入依赖\n\n```JavaScript\npod 'RangersAppLog', 'SDK-VERSION', \n    :subspecs => [\n        'Unique',\n    ]\n```\n\n\n引入 IDFA 头文件\n\n```objectivec\n#import <RangersAppLog/BDAutoTrack+IDFA.h>\n```\n\n\n在 sdk 初始化之后，配置 idfa 专用域名\n\n```JavaScript\n// 私有化模式\nconfig.serviceVendor = BDAutoTrackServiceVendorPrivate;\n[BDAutoTrack setRequestHostBlock:^NSString * _Nullable(BDAutoTrackServiceVendor  _Nonnull vendor, BDAutoTrackRequestURLType requestURLType) {\n    return @\"{{REPORT_URL}}\";\n}];\n\n// 初始化 sdk\n[BDAutoTrack sharedTrackWithConfig:config];\n\n// 配置 idfa 专用域名\n[BDAutoTrack.sharedTrack setRequestIDFAHostBlock:^NSString * _Nullable(BDAutoTrackServiceVendor  _Nonnull vendor, BDAutoTrackRequestURLType requestURLType) {\n    return @\"{{IDFA_REPORT_URL}}\";\n}];\n\n// 启动 sdk\n[BDAutoTrack.sharedTrack startTrack];\n```";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

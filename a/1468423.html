<script>window.DATA_BASE="../";window.INIT_DOC=1468423;window.INIT_MD="DataTester支持**数据查重工具**，如果实验指标数据可能存在重复上报的情况，您可使用数据查重工具进行查找定位，找到疑似重复的数据，进而对重复数据进行处理，避免指标计算不准确。本文为您介绍数据查重工具的使用详情。\n\n<span id=\"981ec81d\"></span>\n# 注意事项\n\n\n* 当前支持对实验指标事件进行**疑似重复数据**进行查重，您可以查重结果作为参考进行数据治理和指标处理。\n\n* 查重任务创建完成后，每日9点会自动运行查重任务，任务运行结束后，会将查重结果消息发送至您配置的飞书Webhook地址中，您可根据消息提示下载查看疑似重复数据。\n\n\n<span id=\"f751bba6\"></span>\n# 进入数据查重工具\n\n\n1. 登录并进入DataTester控制台后，单击页面左侧导航栏的**A/B测试**\\>**实验工具箱**，在工具箱页面选择**数据查重工具**。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/5b5e6561fa064b5e88fa80e35b7616da~tplv-goo7wpa0wc-image.image) </span>\n\n2. 进入数据查重工具页面后，您可查看已创建的查重任务，也可创建新的查重任务。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/f7c9f6cf03bb40e1a90003603a0dfeb7~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"5b64c221\"></span>\n# 创建数据查重任务\n\n\n1. 单击数据查重工具页面右上角的**创建任务**，。在弹出的任务页面中配置查重任务参数。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/d4a2c5e6eb9345be9938debf6f31c720~tplv-goo7wpa0wc-image.image) </span>\n\n   \n   |参数 |配置说明 |\n   |---|---|\n   |任务名称 |自定义数据查重任务的名称。 |\n   |事件名称 |在下拉列表中选择需要查重的指标事件。不支持选择任意事件、任意主动事件这类无查重意义的事件。 |\n   |飞书Webhook地址 |配置查重结果消息通知的飞书Webhook地址。 |\n   \n\n2. 任务配置完成后，单击**创建任务**，即可完成查重任务的配置。\n\n\n<span id=\"65231b23\"></span>\n# 运行数据查重任务\n\n数据查重任务创建完成后，DataTester会在每天9点自动开始运行所有已创建的任务，任务运行完成后，会将运行结果发送至飞书群组中。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">当前暂不支持暂停、删除已创建的数据查重任务，如果您希望暂停或删除任务，可联系技术支持人员协助处理。</div>\n\n\n<span id=\"d50da107\"></span>\n# 下载疑似重复数据\n\n任务运行结束后，您可在数据查重工具页面单击下载按钮下载疑似重复数据，每次下载最多支持下载10,000条数据。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/27121cf75b884a5c8b27cd81cccbe19c~tplv-goo7wpa0wc-image.image) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

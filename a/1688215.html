<script>window.DATA_BASE="../";window.INIT_DOC=1688215;window.INIT_MD="随产品的不断发展、业务类型不断丰富、组织团队不断扩充，通常需要针对目标用户进行大量且广泛的试验，因此在开启实验前需要能够系统规划各团队进行实验的流量，实现更精细化的试验流量管理，**精准调配、灵活调整、充分利用**平台用户流量的同时还要保证试验结果的科学合理。本文为您介绍使用DataTester开展实验前进行流量规划的思路和注意事项。\n\n<span id=\"220ec8d6\"></span>\n# 分流原理\n\n分流服务是A/B实验的产品基础，确保每个用户进入不同实验的随机性和稳定性，才能保障实验结果的置信度。因此了解分流原理，对于实验设计、命中排查、解读报告都至关重要。\n\n<span id=\"faf84d16\"></span>\n## A/B实验分流服务、vid\n\n开设A/B实验，顾名思义，我们至少需要一个A组和一个B组，那么究竟是什么决定了哪些用户被实验命中，以及哪些用户进入A组/B组呢？就是靠A/B实验分流服务。\n\n\n* 分流服务会帮助实验者，从总体流量中抽取部分流量，并将抽取的流量随机地分配进A组与B组之中，尽量减少抽样误差。\n\n* 需要注意的一点是，当分流服务分流完成后，被选中进入实验的用户会被赋予一个“身份信息”——ab_version(又称vid)，这个id标记着流量究竟应该进入实验的哪一组中。\n\n\n<span id=\"bc267eaa\"></span>\n## 分流原理：分流服务的input&output\n\n分流服务的任务是对用户进行随机抽样，并均匀地分配到实验组和对照组中，使其生效不同的功能。\n\n我们先来把分流服务看作是一个“黑盒”。也就是说，抛开分流服务具体包含了什么样的流程和逻辑，先将分流服务看作是一个整体。接着，我们通过输入输出来解释它的工作原理：\n\n\n* 输入：业务端向分流服务发出请求，告诉分流服务用户是谁\n\n* 输出：分流服务返回业务端这个用户是否命中实验，以及用户被分到了哪个实验组。\n\n\n以最简单、通俗的话来说：**实验中，我们向分流服务发出请求（request），告诉分流服务用户是谁，随后分流服务就会告诉我们，这个用户是否被实验命中，以及用户被分到了哪个组里**。\n\n\n* **分流服务的input**\n\n   当我们在向分流服务发出请求（request）的时候，我们要告诉分流服务的信息被称为“**请求参数**”。当中包含的信息有：**用户是谁（用户的分流id【decisionID】）、用户从哪儿来（appkey）、用户符合什么条件（filter）** 。\n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div>\n   \n\n   * <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\"><strong>decisionID</strong>：分流id，需要是唯一标识id，可以使用uuid，did。在实验过程中，究竟使用什么id去标记用户，需要业务方结合实验场景自行裁定。   </div>\n   \n\n   * <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\"><strong>appkey</strong>：应用的唯一标识，请求参数中的appkey标记了用户来源于哪个应用。   </div>\n   \n\n   * <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\"><strong>filter</strong>：实际上就是过滤条件。在开设实验时，实验者可能会为进入实验的流量增加一些限制条件，规定被实验命中的用户必须符合（或不符合）这些条件，进而达到缩小用户群体、精准找到用户的目的。这种限制条件就是filter。在向分流服务发出请求的时候，用户信息中必须带有和过滤条件相对应的属性信息。比如某实验中，实验者规定，被实验命中的必须是北京用户。那么在发出请求时，如果请求信息中不含有用户的定位信息/定位信息不为北京，该用户就会被过滤掉，无法被实验命中。   </div>\n   \n\n   有了这些信息，分流服务就有了“原材料”，并在内部进行加工，对用户进行分流处理。\n\n* **分流服务的output**\n\n   如果用户被实验命中，分流服务会输出该用户的身份信息**vid（ab_version）/vid list**（一个用户可能同时命中不同层的多个实验，因此会输出vid list）和该用户应对应的**实验配置**。如果用户没有被实验命中，那么分流服务则不会输出信息。\n\n\n\n|**对比说明** |**客户端实验** |**服务端实验** |\n|---|---|---|\n|**基本概念**<br><br>（分流服务 & VID） |开设A/B实验，顾名思义，我们至少需要一个A组和一个B组，那么究竟是什么决定了哪些用户被实验命中，以及哪些用户进入A组/B组呢？就是靠A/B实验分流服务。<br><br><br>* 分流服务会帮助实验者，从总体流量中抽取部分流量，并将抽取的流量随机地分配进A组与B组之中，尽量减少抽样误差。<br><br>* 需要注意的一点是，当分流服务分流完成后，被选中进入实验的用户会被赋予一个“身份信息”——ab_version(又称vid)，这个id标记着流量究竟应该进入实验的哪一组中。 ||\n|**实验SDK逻辑** |<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/84687f97b5414a06ba34e99b721df9d2~tplv-goo7wpa0wc-image.image) </span><br><br><br>1. 客户应用侧集成DataTester的客户端SDK。<br><br>2. 当用户打开APP触发客户端SDK初始化时，客户端SDK会向DataTester的**分流服务**发送分流请求，分流服务会**返回对应的分流结果**，APP侧根据分流结果生效对应实验版本的功能。后续分流结果会被存在本地。<br><br>3. APP执行至曝光区代码时，会调用获取实验参数API拿到存在本地的分流结果中的实验进组信息（VID），并自动**上报预置的曝光事件**（abtest_exposure），曝光事件会携带用户命中实验的分组（VID）信息。<br><br>4. 用户在APP进行操作，当触发**实验指标相关埋点**时，会通过客户端SDK上报并落库至数仓中，后续可在实验报告查看相关指标数据。<br><br>5. 客户端SDK每隔10分钟会重新请求一次分流服务拉取最新的分流结果，如果本地有，会覆盖之前缓存的，如果本地没有会把获取的结果存在本地。 |<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/58b3ed97f26e445fb38cb3adcafd482a~tplv-goo7wpa0wc-image.image) </span><br><br><br>1. 客户服务端集成DataTester的服务端SDK，或者部署服务端的分流Agent。<br><br>2. 服务端SDK初始化后会定时调用DataTester的**元数据服务**获取实验元信息（包括实验名称、版本分配、目标受众、白名单等）。<br><br>3. 用户访问C端应用，C端应用向服务端发起请求；服务端SDK使用获取到的实验元信息进行计算，返回实验分流结果。<br><br>4. 服务端同时上报预置的曝光事件，（abtest_exposure），曝光事件会携带用户命中实验的分组（VID）信息。<br><br>5. 服务端的分流结果（版本配置信息）同时会向下游服务传递。<br><br><br><div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div><br><br><br><div data-tips=\"true\" data-tips-type=\"warning\">服务端SDK/分流Agent仅完成实验分流和上报预置的曝光事件，如果您还需上报实验指标数据，可通过集成客户端SDK上报指标事件，或通过HTTP API、数据集成功能集成实验指标数据。</div><br> |";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

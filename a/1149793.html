<script>window.DATA_BASE="../";window.INIT_DOC=1149793;window.INIT_MD="注意\n\n\n* 服务端上报的http接口默认开通，如果您接入的应用没有开通，请联系客户成功经理解决；\n\n* 本文档部分内容对于SaaS、SaaS云原生、私有化不同环境会有差异，请注意区分；\n\n\n<span id=\"_1-请求接口\"></span>\n# 1.请求接口\n\n\n|环境 |Url |Method |\n|---|---|---|\n|SaaS\\-云原生\\-国内地域 |* 单条数据上传：https://gator.volces.com/v2/event/json<br><br>* 批量数据上传（每批次最多50条）：https://gator.volces.com/v2/event/list |POST |\n|SaaS\\-云原生\\-海外地域（柔佛地域） |* 单条数据上传：https://gator.uba.ap\\-southeast\\-1.volces.com/v2/event/json<br><br>* 批量数据上传（每批次最多50条）：https://gator.uba.ap\\-southeast\\-1.volces.com/v2/event/list ||\n|SaaS\\-非云原生\\-国内环境 |* 单条数据上传：https://mcs.ctobsnssdk.com/v2/event/json<br><br>* 批量数据上传（每批次最多50条）：https://mcs.ctobsnssdk.com/v2/event/list ||\n|SaaS\\-非云原生\\-海外环境（BytePlus） |* 单条数据上传：https://mcs.tobsnssdk.com/v2/event/json<br><br>* 批量数据上传（每批次最多50条）：https://mcs.tobsnssdk.com/v2/event/list ||\n|私有化 |* 单条数据上传：https://${host}/v2/event/json<br><br>* 批量数据上传（每批次最多50条）：https://${host}/v2/event/list<br><br><br><div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div><br><br><br><div data-tips=\"true\" data-tips-type=\"tip\">${host}：私有化部署客户为埋点数据上报申请的域名，请根据实际的域名进行替换，客户域名更新后也需要同步更新上报的路径地址。</div><br> ||\n\n\n<span id=\"_2-请求规范\"></span>\n# 2.请求规范\n\n\n1. 请求的header里带\"Content\\-Type: application/json\"以及“X\\-MCS\\-AppKey”，作为app的标识。通过http api上报时，如果用代码及一些工具时，一般请求头上会自动带上User\\-Agent字段，如果手动发送可能会提示User\\-Agent is not allowed，则需要手动在请求头上加入User\\-Agent字段；\n\n2. 请求的body包含user，header，event三个部分，其中的header是埋点数据本身的header；\n\n3. 单次上传events数建议控制在20条以内，超过50条会报413；\n\n4. 上传如采用/v2/event/list接口，json数目建议控制在20条以内，超过50条会报413。\n\n\n<span id=\"_2-1-请求header\"></span>\n## **2.1 请求header**\n\n\n|字段 |类型 |说明 |\n|---|---|---|\n|Content\\-Type |string |application/json |\n|X\\-MCS\\-AppKey |string |您应用的APP Key |\n\n\nAPP Key的获取位置请参考以下截图：\n\n在集团中接入一个应用后，您可以在集团相关页面查看应用的AppKey等信息，详情请参考：[如何创建应用](https://www.volcengine.com/docs/6287/66984)。\n\n\n* SaaS\\-云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/eba094f44e174faea6c7cdcdc7447d2d~tplv-goo7wpa0wc-image.image) </span>\n\n* SaaS\\-非云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b55e61ee067544deaff4939685d1475c~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"_2-2-请求body\"></span>\n## **2.2 请求body**\n\n\n|字段 |类型 |说明 |\n|---|---|---|\n|user |object |user属性字典，详见 2.3。 |\n|header |object |header属性字典，详见 2.4。 |\n|events |[object] |events列表，每个元素为一个事件，详见 2.5。 |\n\n\n<span id=\"_2-3-user格式\"></span>\n## **2.3 user格式**\n\n\n|字段 |类型 |必选 |说明 |\n|---|---|---|---|\n|user_unique_id |string |是 |用户的唯一身份标识，需要保证同一个用户在本应用内全局唯一，即需要与客户端上报一致。 |\n|device_id |string |否 |app端设备标识，注意必须为纯数字。 |\n|web_id |string |否 |web端设备标识，注意必须为纯数字。 |\n\n\n<span id=\"_2-4-header格式\"></span>\n## **2.4 header格式**\n\n\n|字段 |类型 |必选 |说明 |\n|---|---|---|---|\n|app_name |string |否 |应用的英文名称 |\n|app_package |string |否 |包名 |\n|app_channel |string |否 |app分发渠道 |\n|app_version |string |否 |app版本，三段分隔，如1.0.1 |\n|app_platform |string |否 |应用的端，不支持自定义修改。 |\n|access |string |否 |网络类型，落库为network_type。 |\n|carrier |string |否 |运营商类型，落库为network_carrier。 |\n|platform |string |否 |平台类型 |\n|os_name |string |否 |客户端系统，只允许设置为 \"ios\", \"android\", \"web\", \"wap\", \"mac\", \"windows\", \"linux\", \"ipad\", \"iphone\", 其他的值会解析成unknown。 |\n|os_version |string |否 |客户端系统版本号 |\n|device_model |string |否 |设备型号 |\n|ab_sdk_version |string |否 |ab实验分组信息 |\n|traffic_type |string |否 |流量类型 |\n|client_ip |string |否 |客户端ip |\n|custom |json object |否 |自定义header字段,单层json map。上述字段都是保留字段不能使用。自定义事件公共属性放在这，会显示在any_event事件下。 |\n|region |string |否 |所在区域国家(系统设置)，us等，(放在custom中) |\n|language |string |否 |语言(系统设置)，en等，(放在custom中) |\n|app_region |string |否 |国家(app设置)，us等，(放在custom中) |\n|app_language |string |否 |语言(app设置)，en等，(放在custom中) |\n|timezone |string |否 |时区，\\-12~12，(放在custom中) |\n|utm_source |string |否 |推广来源 |\n|utm_campaign |string |否 |推广活动 |\n|utm_medium |string |否 |推广媒介 |\n|utm_content |string |否 |推广内容 |\n|utm_term |string |否 |推广关键词 |\n\n\n<span id=\"_2-5-event格式\"></span>\n## **2.5 event格式**\n\n\n|字段 |类型 |必选 |说明 |\n|---|---|---|---|\n|event |string |是 |事件名 |\n|params |string |是 |事件参数,单层json map |\n|local_time_ms |long |是 |unix_timestamp( 毫秒) |\n\n\n<span id=\"_3-http-response-格式\"></span>\n# 3. HTTP Response 格式\n\n\n|状态码 |返回信息 |含义 |\n|---|---|---|\n|200 |* SaaS\\-非云原生：<br><br>* SaaS\\-云原生： |成功，其中：<br><br><br>* num：为上报成功event数。<br><br>* e：为上报失败的event数，失败的查看events上报格式。<br><br>* SaaS\\-云原生环境中：<br><br>   * 返回的Type取值，为请求到端的接口类型，无实际意义，您无需关注。<br><br>   * 返回的server_time为上报数据的时间戳取值。 |\n|400 |header/user/events empty error.<br><br>get/invalid appid error. |请求格式错误, 查看X\\-MCS\\-AppKey与header，user的定义。 |\n|400 |not found app_key and not found app_id |请求未带上X\\-MCS\\-AppKey，且header中未填写app_id。 |\n|400 |parse POST request error! err: can not parse JSON:... |请求参数解析错误，无法解析json。 |\n|413 |too many element in one request! length: xx , only allow 50 |请求数组过长（只针对/json/list接口，限制50） |\n|413 |too many events in one request! length: 89 , only allow 50 |请求中event数过多（限制50） |\n|500 |UserAgent is not allowed |HTTP请求头的User\\-Agent不合法，包括msnbot、Sosospider、Sosoimagespider、Sogou web、spider、Googlebot、Baiduspider、360Spider、YoudaoBot、YandexBot、EasouSpider、Mediapartners\\-Google、APIs\\-Google、AdsBot\\-Google、JikeSpider、MJ12bot、ia_archiver、Rogerbot、exabot、DOCOMO Sprider、python\\-requests、HttpClient、Go\\-http\\-client、Python\\-urllib、gohttp、curl/、Surf/、Scrapy |\n\n\n<span id=\"_4-请求示例\"></span>\n# 4. 请求示例\n\n<span id=\"_4-1-v2-event-json接口\"></span>\n## 4.1 /v2/event/json接口\n\n```json\ncurl -X POST -H \"Content-Type: application/json\" -H \"X-MCS-AppKey: 12345678key\" -d '{\"user\": {...}, \"header\":{...}, \"events\":{...}}' https://gator.volces.com/v2/event/json\n```\n\n\n请求body：\n\n```json\n{\n    \"user\": {\n         // 建议先在客户端上报用户的user_unique_id，然后再在服务端使用\n        \"user_unique_id\": \"74481585297\"   //用户唯一标示\n    },\n    \"header\": {\n        \"ab_sdk_version\": \"91223,83097\",   //AB实验vid\n        \"app_channel\": \"App Store\",    //App渠道\n        \"app_name\": \"news_article\",    //App名称\n        \"app_package\": \"com.ss.android.article.news\",   //App包名\n        \"app_version\": \"5.1.3\",        //App版本\n        \"client_ip\": \"10.100.1.1\",     //客户端ip地址\n        \"device_model\": \"SM-G9250\",    //设备型号\n        \"os_name\": \"Android\",          //操作系统\n        \"os_version\": \"6.0.1\",         //操作系统版本\n        \"traffic_type\": \"app\",\n        \"custom\":\"{\\\"A\\\":\\\"a\\\"}\"         //事件公共属性\n    },\n    \"events\": [\n        {\n            \"ab_sdk_version\": \"91223,83097\",   //AB实验vid\n            \"event\": \"test_go_detail\",    //事件名称\n            \"params\": \"{\\\"paramName\\\":\\\"a\\\"}\",    //事件属性\n            \"local_time_ms\": 1489573628001   //事件发生时刻的时间戳\n        }\n    ]\n}\n```\n\n\n说明\n\nlocal_time_ms ：这个是毫秒时间戳，标识这个事件发生的时刻。\n\n<span id=\"_4-2-v2-event-list接口\"></span>\n## 4.2 /v2/event/list接口\n\n```json\ncurl -X POST -H \"Content-Type: application/json\" -H \"X-MCS-AppKey: 12345678key\" -d '[{\"user\": {...}, \"header\":{...}, \"events\":{...}}]  https://gator.volces.com/v2/event/list\n```\n\n\n请求body：\n\n```json\n[{\n    \"user\": {\n        \"user_unique_id\": \"74481585297\"   //用户唯一标示\n    },\n    \"header\": {\n        \"ab_sdk_version\": \"91223,83097\",   //AB实验vid\n        \"app_channel\": \"App Store\",    //App渠道\n        \"app_name\": \"news_article\",    //App名称\n        \"app_package\": \"com.ss.android.article.news\",   //App包名\n        \"app_version\": \"5.1.3\",        //App版本\n        \"client_ip\": \"10.100.1.1\",     //客户端ip地址\n        \"device_model\": \"SM-G9250\",    //设备型号\n        \"os_name\": \"Android\",          //操作系统\n        \"os_version\": \"6.0.1\",         //操作系统版本\n        \"traffic_type\": \"app\"\n    },\n    \"events\": [\n        {\n            \"event\": \"test_go_detail\",    //事件名称\n            \"params\": \"{\\\"paramName\\\":\\\"a\\\"}\",    //事件属性\n            \"local_time_ms\": 1489573628001   //事件发生时刻的时间戳\n        }\n    ]\n}]\n```\n\n\n说明\n\nlocal_time_ms ：这个是毫秒时间戳，标识这个事件发生的时刻。\n\n<span id=\"_5-上报用户属性\"></span>\n# 5. 上报用户属性\n\n注意\n\n本节仅适用于【SaaS云原生】、【私有化】版本，SaaS\\-非云原生版本请参考[User Profile API（SaaS）](https://www.volcengine.com/docs/84129/1261782)。\n\n用户属性是通过特殊的事件进行上报，通过设置下面几个event可以修改用户属性：\n\n\n|事件名 |功能 |\n|---|---|\n|__profile_set |设置用户属性。 |\n|__profile_set_once |设置用户属性，属性为set_once，设置后不可更改。 |\n|__profile_increment |增加数值类用户属性的值。 |\n|__profile_unset |删除用户属性。 |\n|__profile_append |增加数组类用户属性的元素。 |\n|__profile_remove |删除数组类用户属性里的元素。 |\n\n\n<span id=\"_5-1-上报用户属性\"></span>\n## 5.1 上报用户属性\n\n用户属性放在`params`中 示例请求，作用为设置一个用户属性age，删除一个用户属性name，body：\n\n```json\n{\n    \"user\": {\n        \"user_unique_id\": \"74481585297\"   //用户唯一标示\n    },\n    \"header\": {\n        \"ab_sdk_version\": \"91223,83097\",   //AB实验vid\n        \"app_channel\": \"App Store\",    //App渠道\n        \"app_name\": \"news_article\",    //App名称\n        \"app_package\": \"com.ss.android.article.news\",   //App包名\n        \"app_version\": \"5.1.3\",        //App版本\n        \"client_ip\": \"10.100.1.1\",     //客户端ip地址\n        \"device_model\": \"SM-G9250\",    //设备型号\n        \"os_name\": \"Android\",          //操作系统\n        \"os_version\": \"6.0.1\",         //操作系统版本\n        \"traffic_type\": \"app\"\n    },\n    \"events\": [\n        {\n            \"event\": \"__profile_set\",    //操作名\n            \"params\": \"{\\\"age\\\": 10}\",    //设置属性\n            \"local_time_ms\": 1489573628001   //事件发生的时间戳\n        }，\n        {\n            \"event\": \"__profile_unset\",    //操作名\n            \"params\": \"{\\\"name\\\":\\\"tom\\\"}\",    //设置属性\n            \"local_time_ms\": 1489573628001   //事件发生的时间戳\n        }\n    ]\n}\n```\n\n\n<span id=\"_5-2-批量上报用户属性\"></span>\n## 5.2 批量上报用户属性\n\n当需要批量上报用户属性时，可以在params里加上一个特殊字段__uuid_list来实现，__uuid_list是一个user_unique_id的列表，params中除__uuid_list字段的其他字段作为这个__uuid_list中所有user_unique_id的属性，参考代码：\n\n```matlab\n{\n    \"user\": {\n        \"user_unique_id\": \"user1\"\n    },\n    \"header\":{\"app_name\":\"init\",\"app_id\":\"10000000\"},\n    \"events\": [\n        {\n            \"event\": \"__profile_set\",\n            \"params\": {\n                \"__uuid_list\": [\"user1\", \"user2\", \"user3\", \"user4\"],\n                \"age\":20\n            }\n        }\n    ]\n}\nmatlab\n```\n\n\n注意\n\n这个列表每次上报限制1000个用户。\n\n<span id=\"_5-3-验证上报的用户属性\"></span>\n## 5.3 验证上报的用户属性\n\n可以在行为细查页面中查看特定用户的数据。\n\n<span id=\"_6-导入历史数据\"></span>\n# 6. 导入历史数据\n\n注意\n\n【SaaS版本】历史数据导入需要隔天才能查看，【SaaS云原生】、【私有化】版本可实时查看。\n\n如果数据的客户端时间超过七天，正常情况下无法导入。如需导入历史数据，需在`header`的`custom`字段中增加历史数据的标识`__is_history`，属性值设置为字符串`\"true\"`。 上报示例如下：\n\n```json\n[{\n   \"user\": {\n       \"user_unique_id\": \"74481585297\"   //用户唯一标示\n   },\n   \"header\": {\n\n       \"custom\": {\n              \"__is_history\": \"true\" //导入历史数据标识，默认为false;\n       }\n   },\n   \"events\": [\n       {\n           \"event\": \"test_go_detail\",    //事件名称\n           \"params\": \"{\\\"paramName\\\":\\\"a\\\"}\",    //事件属性\n           \"local_time_ms\": 1489573628001   //事件发生时刻的时间戳\n       }\n   ]\n}]\n```\n\n\n说明\n\nlocal_time_ms: 这个是毫秒时间戳，标识这个事件发生的时刻，注意不是导数的时间。\n\n上报完成后，需要在界面上点击刷新数据，即可查询到上报的历史数据。\n\n<span id=\"_7-上报数据限制\"></span>\n# 7. 上报数据限制\n\n请参考文档：\n\n\n* 数据格式文档中的数据上报限制：[数据格式](https://www.volcengine.com/docs/6287/1149795#_3-%E4%B8%8A%E6%8A%A5%E6%95%B0%E6%8D%AE%E9%99%90%E5%88%B6)\n\n\n<span id=\"_8-验证数据上报成功\"></span>\n# 8. 验证数据上报成功\n\n如果知道特定的user_unique_id，可以在行为细查里查询。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_5d7ae9d3d6f2bc6da060cb864cb79857.png) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

      <textarea id="edMd" placeholder="# 标题&#10;&#10;正文用 Markdown 书写，支持 **加粗**、列表、表格、代码块…&#10;&#10;## 小节&#10;- 要点一&#10;- 要点二"></textarea>
      <div class="ed-actions">
        <button class="ed-btn" id="edSubmit" style="display:none">✓ 发布文章</button>
      </div>
      <div class="ed-msg" id="edMsg"></div>
      <div class="ed-hint" id="edHint"></div>
    </div>
    <div class="ed-preview" id="edPrev">
      <div class="ed-prev-tag" id="edPrevTag"></div>
      <h1 id="edPrevTitle" style="margin:8px 0 16px"></h1>
      <div class="md" id="edPrevBody"></div>
    </div>
  </div>
</div>

<script src="../app.js"></script>
</body>

<script>window.DATA_BASE="../";window.INIT_DOC=65816;window.INIT_MD="<span id=\"一-概述\"></span>\n# 基本概念\n\n\n|术语 |概念说明 |注意点 |\n|---|---|---|\n|指标 |在互联网行业中，指标通常用于描述在一定时间和条件下，是某种事物或现象的规模、程度、比例、结构等概念，通常由指标名称和指标数值组成。 |指标可以分为**简单计数型指标**和**复合型指标**：<br><br><br>* **简单计数型指标**：是指可通过重复加1这一数学行为而获得数值的指标，如UV（Unique Visit , 独立访客数）、PV（Page View，页面浏览量）。<br><br>* **复合型指标**：是由简单计数型指标经四则运算后得到的，如跳出率、购买转化率。 |\n|指标组 |多个指标的集合。通常，我们会将相关性较强的指标放在同一个分组，方便进行查找使用以及管理，如：xx项目营收指标组、订单指标组、xx页面转化指标组等。<br><br><div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div><br><br><br><br>* <div data-tips=\"true\" data-tips-type=\"tip\">新版指标管理默认按照指标组粒度来展示及管理指标.</div><br><br><br>* <div data-tips=\"true\" data-tips-type=\"tip\">对于历史已经创建的指标，对于公有指标会根据【指标owner<em>指标类型</em>公/私有】来进行数据迁移和分组，即相同owner的相同类型的公有指标，会归到同一个分组中；私有指标每个指标会单独生成一个指标组。</div><br> |**相同类型**的（类型：事件/留存/漏斗指标）才可归属同一个分组中，即：同一个指标组中所有指标类型相同 |\n\n\n<span id=\"二-指标组列表\"></span>\n# 操作指导\n\n登录DataTester产品控制台后，您可单击左侧导航栏的**指标管理**\\>**指标组列表**，进入指标组列表页面。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/71efd29b03024da0b850fb7cf27cee87~tplv-goo7wpa0wc-image.image) </span>\n\n在指标组列表页面，您可以：\n\n\n* **新建指标组**：点击页面右上角“**创建指标组**”，即可开始创建新的指标组。\n\n   创建指标组时，您可以选择创建的指标组类别，包含事件指标、留存指标、漏斗指标，对应的创建操作详细指导请参见[新建事件指标](https://www.volcengine.com/docs/6287/65818)、[新建留存指标](https://www.volcengine.com/docs/6287/101620)、[新建漏斗指标](https://www.volcengine.com/docs/6287/65819)。\n\n* **合并指标组**：可将多个同类型的指标支持合并为一个新的指标组。\n\n* **查看指标组**：\n\n   * **过滤**：默认显示全部使用中的指标。点击状态列的「过滤icon」，可切换展示已下线指标组或全部状态指标。\n\n   * **搜索**：支持输入“指标组名称、描述、创建人”来搜索指标。\n\n   * 点击「指标名称」即可跳转至指标组详情页，查看指标组基本信息、指标口径、指标组权限等，详情请参见[查看指标详情及权限管理](https://www.volcengine.com/docs/6287/178281)。\n\n* **修改指标组：**  点击操作列的「编辑icon」，即可跳转至指标组编辑状态进行修改。\n\n   * 注：仅指标组owner及管理员可编辑指标组，非管理员不可编辑他人的指标组。\n\n* **其他操作**：\n\n   * **下线**：可下线当前指标组。下线前提：当前指标组下所有指标都没有与运行中实验关联。\n\n   * **复制**：可复制当前指标组 。\n\n\n<span id=\"三-实验关注指标\"></span>\n# 指标组应用\n\n在DataTester创建AB实验时，实验指标用于评估各实验版本的策略效果，辅助决策进行AB实验的功能是否能符合业务预期。\n\n通过配置**实验核心指标**和**实验关注指标**，后续实验完成后，会根据您配置的指标为您自动输出指标相关的实验报告，辅助您分析实验结果。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b0abed712fc049b686dba2c6220d4528~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"核心指标\"></span>\n## **核心指标**\n\n核心指标，用来决策实验功能是否符合预期的「直接效果指标」，也叫「成功指标」。只可以设置一个指标为某个实验的核心指标，可在实验报告里面查看实验数据。比如开设「按钮文案」的优化实验，那么「按钮点击率」就是该实验的核心指标。\n\n一般常见的核心指标，如下：\n\n\n* 转化率、uv/au类；\n\n* 人均次数类，如pv/au、pv/uv、sum/au、sum/uv；\n\n* 平均值类，如sum/pv；\n\n\n您可以根据当前业务，去选择或者新建核心指标。\n\n<span id=\"必看指标\"></span>\n## **关注指标 & 必看指标**\n\n\n* 您可以在创建实验的过程中，选择实验过程中需要关注的指标，配置为实验关注指标。实验关注指标通常指实验功能可能对其无直接的因果关联、无法直接带来提升，但一般而言不能对其有显著负向影响。\n\n* 您也可以在创建指标组时指定指标为**必看指标**（指的是必须守护的业务线指标），若某个指标被设置为必看指标，则在该应用下创建实验时，每个实验都会默认选择必看指标为实验关注指标。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。

</script>

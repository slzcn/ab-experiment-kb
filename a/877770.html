<script>window.DATA_BASE="../";window.INIT_DOC=877770;window.INIT_MD="<span id=\"_1-概述\"></span>\n# 1.概述\n\n主被动事件是基于「用户」的主动触发和被动受影响的行为描述。在一些业务场景中，用户既有可能是行为的发起者，也有可能是行为的影响者。行为发起者所触发产生的行为称为「主动事件」，行为影响者所受影响的行为称为「被动事件」，当主动事件和被动事件存在对应关系、成对出现时称为「关系事件」。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_b75699ee57e88659f615d871e1fca6f1.png) </span>\n\n<span id=\"典型场景：社交应用\"></span>\n## 典型场景：社交应用\n\n**场景1:**   用户A关注了用户B。\n\n用户A是关注行为的发起者，触发了一个主动事件，用户B是关注行为的影响者，被动接受了一个事件。\n\n主动事件：用户A关注了用户B\n\n被动事件：用户B被用户A关注\n\n主动事件和被动事件存在对应关系，并在这个场景中成对出现，于是产生了「关系事件」。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_90cdddd59095dce30aaf1e3089b52974.png) </span>\n\n**场景2:**   用户A给用户B发送了一条消息。\n\n主动事件：用户A发送1条消息\n\n被动事件：用户B接收1条消息\n\n**场景3:**   用户A给用户B发了一个红包\n\n主动事件：用户A发了1个红包\n\n被动事件：用户B收到一个红包\n\n**更多场景** ：喜欢与被喜欢、评论与被评论、投诉与被投诉、分享内容与接收内容...\n\n<span id=\"特殊场景\"></span>\n## 特殊场景\n\n**场景描述：**   系统给用户推送通知，客服解决投诉过程中给用户推送了一个优惠券，程序触发了给用户发送了消息。\n\n因为主被动事件是基于「用户」的，所以这种场景下不存在主动事件，主动触发行为的不是用户；\n\n用户是行为的接受者，被动受到影响，只有被动事件。\n\n被动事件：用户收到通知/用户收到优惠券/用户收到推送消息\n\n<span id=\"_2-分析\"></span>\n# 2.分析\n\n<span id=\"转化分析\"></span>\n## 转化分析\n\n<span id=\"用户互关的场景\"></span>\n### 用户互关的场景\n\n关系事件\n\n\n|**事件ID** |**事件名称** |**用户ID** |**目标对象ID** |**发起对象ID** |**是否被动** |**是否关系** |**语义** |\n|---|---|---|---|---|---|---|---|\n|1 |subscribe |A |B |null |否 |是 |A关注B |\n|2 |$inactive_subscribe |B |null |A |是 |是 |B被A关注 |\n|3 |subscribe |B |A |null |否 |否 |B关注A |\n\n\n当我们想统计回关的比例时，需用到被动事件，构建漏斗如下：\n\n第一步：$inactive_subscribe，关联发起对象ID\n\n第二步：subscribe，关联目标对象ID（由于目前不支持list类型的关联属性，本场景下需要用户自己上报一个目标对象的ID）\n\n其他条件：按用户ID分组。\n\n<span id=\"_3-事件和属性变更\"></span>\n# 3.事件和属性变更\n\n关系事件和被动事件比主动事件多出一些预置属性用来加以区分，主要区别见下表：\n\n\n| |事件名称 |预置属性 |展示名 |预置属性类型 |取值说明 |\n|---|---|---|---|---|---|\n|主动事件（关系） |event_name |$target_uuid_list |被动事件UUID |list |手动上报用户ID |\n| | |$inline |是否为关系事件 |string |true，及其它任意值 |\n|被动事件（关系） |$inactive_ |$inactive |是否为被动事件 |string |true，及其它任意值 |\n| | |$inline |是否为关系事件 |string |true，及其它任意值 |\n| | |$source_uuid |主动事件UUID |string |对应的关联事件的 UUID |\n|被动事件（手动） |自定义 |$inactive |是否为被动事件 |string |true，及其它任意值 |\n\n\n用户通过在主动事件中标记当前事件为关系事件（$inline 为 \"true\"）时，系统会自动生成对应的被动事件。系统生成的被动事件会额外设置一个预置属性： \"$source_uuid\"， 为主动事件触发用户的 uuid。\n\n<span id=\"_4-常见问题\"></span>\n# 4.常见问题\n\n<span id=\"_4-1-如何区分主被动事件？\"></span>\n## 4.1 如何区分主被动事件？\n\n被动事件的属性 $inactive 的值为 true，注意目前这个属性的数据类型为 string，而不是 boolean。\n\n上报关系事件时，系统会自动生成被动事件。系统自动生成的被动事件不仅仅会拥有上述预置属性，还会包含 $inline = \"true\" 和 $source_uuid（值为对应主动事件 uuid）这两个属性，同时事件名称中还会自动添加“$inactive_”前缀。\n\n<span id=\"_4-2-被动事件是否会对账单数据计算产生影响？\"></span>\n## 4.2 被动事件是否会对账单数据计算产生影响？\n\n被动事件在计算事件量消耗时默认会被计算在内，但在计算MAU和DAU时不会被计算在内。被禁用的被动事件一样不会产生消耗。\n\n<span id=\"_4-3-上报关系事件时，如果-target-uuid-list中包含多个-uuid，是否会生成多个被动事件？\"></span>\n## 4.3 上报关系事件时，如果$target_uuid_list中包含多个 uuid，是否会生成多个被动事件？\n\n是的。$target_uuid_list 是 list 属性，支持传入多个 uuid。系统会自动为每个受该事件影响的用户生成一个对应的被动事件。\n\n<span id=\"_5-数据上报\"></span>\n# 5.数据上报\n\n我们提供用户触发主动事件时自动生成对应的被动事件的方法。\n\n&nbsp;\n\n为区分主被动事件，我们新增了事件公共属性 $inactive，当 $inactive 为 true 时对应的事件是被动事件。\n\n\n|**属性名称** |**数据类型** |**取值范围** |\n|---|---|---|\n|$inactive |string |\"true\" 被动事件<br><br>\"false\" 主动事件<br><br>其它时，为非被动事件，也可以认为是主动事件 |\n\n\n<span id=\"android\"></span>\n## Android\n\n<span id=\"自动生成关系事件\"></span>\n### 自动生成关系事件\n\n示例代码：\"关联事件\"\n\n```Plain Text\nnew ActionButton (\n    \"关联事件\",\n    new Action ()\n    {\n        @Override public void doAction ()\n        {\n            JSONObject param = new JSONObject ();\n            try {\n                param.put ( \"video_id\", Generator.getRandomNum ( 0, 10000000 ) );\n                param.put ( \"category\", \"主动被动事件\" );\n                param.put ( \"author_id\", Generator.getRandomNum ( 0, 10000 ) );\n                param.put ( \"$inline\", \"true\" );\n                JSONArray uuid_list = new JSONArray ();\n                for (int i = 0; i < Generator.getRandomNum ( 0, 10 ); i++)\n                {\n                    uuid_list.put ( Generator.getRandomNum ( 10000, 99999 ) );\n                }\n                param.put ( \"$target_uuid_list\", uuid_list );\n            }\n            catch (JSONException e)\n            { e.printStackTrace (); }\n            AppLog.onEventV3 ( \"like\", param );\n        }\n    }\n)\n```\n\n\n<span id=\"手动上报被动事件\"></span>\n### 手动上报被动事件\n\n示例代码： \"被动事件\"\n\n```Plain Text\nnew ActionButton (\n    \"被动事件\",\n    new Action ()\n    {\n        @Override public void doAction ()\n        {\n            JSONObject param = new JSONObject ();\n            try {\n                param.put ( \"video_id\", Generator.getRandomNum ( 0, 10000000 ) );\n                param.put ( \"category\", \"主动被动事件\" );\n                param.put ( \"author_id\", Generator.getRandomNum ( 0, 10000 ) );\n                param.put ( \"$inactive\", \"true\" );\n            }\n            catch (JSONException e)\n            { e.printStackTrace (); }\n            AppLog.onEventV3 ( \"like\", param );\n        }\n    }\n)\n```\n\n\n<span id=\"ios\"></span>\n## iOS\n\n<span id=\"示例代码：-主动事件\"></span>\n### 示例代码：\"主动事件\"\n\n```Plain Text\n[BDAutoTrack eventV3:@\"like\" params:@{\n    @\"video_title\": @\"Lady Gaga on Oscar\",\n    @\"category\" : @\"主动被动事件\",\n    @\"$inactive\" : @\"false\"\n}];\n```\n\n\n<span id=\"自动生成关系事件\"></span>\n### 自动生成关系事件\n\n示例代码：\"关联事件\"\n\n```Plain Text\n[BDAutoTrack eventV3:@\"like\" params:@{\n    @\"video_title\": @\"Lady Gaga on Oscar\",\n    @\"category\" : @\"主动被动事件\",\n    @\"$inactive\" : @\"true\",\n    @\"$inline\": @\"true\",\n    @\"$target_uuid_list\" : @[@\"123\", @\"456\", @\"789\"]\n}];\n```\n\n\n<span id=\"手动上报被动事件\"></span>\n### 手动上报被动事件\n\n示例代码：\"被动事件\"\n\n```Plain Text\n[BDAutoTrack eventV3:@\"like\" params:@{\n    @\"video_title\": @\"Lady Gaga on Oscar\",\n    @\"category\" : @\"主动被动事件\",\n    @\"$inactive\" : @\"true\"\n}];\n```\n\n\n<span id=\"jssdk\"></span>\n## JSSDK\n\n<span id=\"示例代码：-主动事件\"></span>\n### 示例代码：\"主动事件\"\n\n```Plain Text\nwindow.collectEvent('like', {\n   from: \"index\",\n   category: \"主动被动事件\",\n   $inactive: \"false\" \n});\n```\n\n\n<span id=\"自动生成关系事件\"></span>\n### 自动生成关系事件\n\n示例代码：\"关联事件\"\n\n```Plain Text\nwindow.collectEvent('like', {\n   from: \"index\",\n   category: \"主动被动事件\",\n   $inactive: \"true\" ,\n   $inline: \"true\",\n   $target_uuid_list: [\"123\",\"456\",\"789\"]\n});\n```\n\n\n<span id=\"手动上报被动事件\"></span>\n### 手动上报被动事件\n\n示例代码：\"被动事件\"\n\n```Plain Text\nwindow.collectEvent('like', {\n   from: \"index\",\n   category: \"主动被动事件\",\n   $inactive: \"true\" ,\n});\n```\n\n\n<span id=\"小程序-sdk\"></span>\n## 小程序 SDK\n\n<span id=\"示例代码：-主动事件\"></span>\n### 示例代码：\"主动事件\"\n\n```Plain Text\napp.$$Rangers.event('like', {\n    from: \"index\",\n   category: \"主动被动事件\",\n   $inactive: \"false\",\n})\n```\n\n\n<span id=\"自动生成关系事件\"></span>\n### 自动生成关系事件\n\n示例代码：\"关联事件\"\n\n```Plain Text\napp.$$Rangers.event('like', {\n   from: \"index\",\n   category: \"主动被动事件\",\n   $inactive: \"true\" ,\n   $inline: \"true\",\n   $target_uuid_list: [\"123\",\"456\",\"789\"]\n});\n```\n\n\n<span id=\"手动上报被动事件\"></span>\n### 手动上报被动事件\n\n示例代码：\"被动事件\"\n\n```Plain Text\napp.$$Rangers.event('like', {\n   from: \"index\",\n   category: \"主动被动事件\",\n   $inactive: \"true\" \n});\n```\n\n\n<span id=\"http-api-服务端上报\"></span>\n## Http Api 服务端上报\n\n<span id=\"示例代码：-主动事件\"></span>\n### 示例代码：\"主动事件\"\n\n```Plain Text\n{\n    \"user\": {\n        // 建议先在客户端上报用户的user_unique_id，然后再在服务端使用\n        \"user_unique_id\": \" 74481585297\"   //用户唯一标示\n    },\n    \"header\": {\n        \"app_channel\": \"App Store\"   //App渠道\n    },\n    \"events\": [\n        {\n            \"event\": \"like\",    //事件名称\n            \"params\": \"{\n                \\\"category\\\":\\\"主动被动事件\\\",\n                \\\"$inactive\\\":\\\"false\\\"\n             }\",    //事件属性\n            \"local_time_ms\": 1489573628001   //事件发生的时间戳\n        }\n    ]\n}\n```\n\n\n<span id=\"自动生成关系事件\"></span>\n### 自动生成关系事件\n\n示例代码：\"关联事件\"\n\n```Plain Text\n{\n    \"user\": {\n        // 建议先在客户端上报用户的user_unique_id，然后再在服务端使用\n        \"user_unique_id\": \" 74481585297\"   //用户唯一标示\n    },\n    \"header\": {\n        \"app_channel\": \"App Store\"   //App渠道\n    },\n    \"events\": [\n        {\n            \"event\": \"like\",    //事件名称\n            \"params\": \"{\n                \\\"category\\\":\\\"主动被动事件\\\",\n                \\\"$inactive\\\":\\\"true\\\",\n                \\\\\"$inline\\\\\":\\\\\"true\\\\\",\n                \\\"$target_uuid_list\\\":[\\\"123\\\",\\\"456\\\",\\\"789\\\"]\n             }\",    //事件属性\n            \"local_time_ms\": 1489573628001   //事件发生的时间戳\n        }\n    ]\n}\n```\n\n\n<span id=\"手动上报被动事件\"></span>\n### 手动上报被动事件\n\n示例代码：\"被动事件\"\n\n```Plain Text\n{\n    \"user\": {\n        // 建议先在客户端上报用户的user_unique_id，然后再在服务端使用\n        \"user_unique_id\": \" 74481585297\"   //用户唯一标示\n    },\n    \"header\": {\n        \"app_channel\": \"App Store\"    //App渠道\n    },\n    \"events\": [\n        {\n            \"event\": \"like\",    //事件名称\n            \"params\": \"{\n                \\\"category\\\":\\\"主动被动事件\\\",\n                \\\"$inactive\\\":\\\"true\\\"\n             }\",    //事件属性\n            \"local_time_ms\": 1489573628001   //事件发生的时间戳\n        }\n    ]\n}\n```";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。

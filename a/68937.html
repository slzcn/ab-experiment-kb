<script>window.DATA_BASE="../";window.INIT_DOC=68937;window.INIT_MD="**1. 专用条款的适用性**\n\n1.1 本专用条款适用于您向火山引擎订购或（和）使用增长营销套件产品和服务（“**本服务**”），本服务具体内容以火山引擎官网\\-产品\\-**大数据\\-增长营销**板块内容为准。本专用条款有特别约定的，适用本专用条款。\n\n1.2 本专用条款同时适用火山引擎官网\\-产品\\-数智平台\\-数据中台板块中的“智能数据洞察”。如果您单独购买智能数据洞察，或者同时购买增长营销套件、智能数据洞察，则与火山引擎签署本条款。“智能数据洞察”，是指基于大数据明细级别分析的增强型ABI平台，以数据洞察为导向，从数据接入、数据整合、到查询、分析，最终以数据门户、大屏、管理驾驶舱的可视化形态呈现给业务用户，让数据发挥价值。\n\n1.3 一旦您订购或使用了本服务，本专用条款将与（1）火山引擎官网公示的[《火山引擎服务条款》](https://www.volcengine.com/docs/6256/64903)与[《火山引擎隐私政策》](https://www.volcengine.com/docs/6256/64902)，（2）[《产品和服务协议》](https://www.volcengine.com/docs/6256/68938)，（3）订购协议/服务订单，（4）《服务等级协议》（如有）,和（5）服务规则等所适用的其他协议共同构成您与火山引擎之间就订购或（和）使用本服务的完整协议。\n\n1.4 本专用条款未明确约定事项，将遵照您与火山引擎订立的其他所适用协议或服务规则的约定。\n\n**2. 服务使用规则**\n\n2.1 您应当使用您合法注册的火山引擎官网账号登录火山引擎官网，通过官网控制台使用本服务。如果您使用API和/或在线SDK的访问密钥，您应参照使用说明使用服务，您应对密钥的完整性和保密性负责，并应采取妥善的安全措施（包括但不限于进行访问权限管理、密钥加密）。\n\n2.2 您理解并同意，火山引擎服务均由技术工具自动完成，除非另有书面约定和/或为履行服务协议下的特别义务（例如在适用情形下进行故障排除、检测等事项），火山引擎对服务过程及结果不进行人工干预。\n\n2.3 火山引擎服务仅限于您根据服务协议的约定针对您的产品自行进行使用。您理解并同意，如您就本服务进行商业使用或以其他方式直接或间接获得收益，则您应事先获得火山引擎的书面许可。若您超出火山引擎授权范围使用、转让、再许可、出租火山引擎向您提供的任何资源、技术支持和服务等（包括向您的关联方转让、再许可、出租），火山引擎有权立即终止前述许可，由此遭致的损失和后果，应由您自行承担，火山引擎不为此承担责任。\n\n2.4 您承诺并保证您使用本服务处理的数据，为您合法合规收集的个人信息等数据。您使用本服务得到的数据处理结果仅直接向您提供且仅可由您下载、访问和处理。\n\n2.5 您在使用本服务过程中，如需要将您在第三方平台（如抖音开放平台，抖店，巨量引擎，巨量千川等，以实际为准）中的数据接入本服务，您授权火山引擎为您提供相应技术服务，特别说明：\n\n2.5.1 您确保您是第三方平台的合法注册用户。\n\n2.5.2 您确保您的的数据收集、使用、传输等处理行为合法合规，符合国家数据安全、个人信息保护相关法律法规。\n\n2.5.3 您确保依据您与第三方平台之间的协议，您有权将该数据导出至您购买的本服务中，并且第三方平台提供相应通用、公开的数据导出功能。\n\n2.5.4 火山引擎作为技术服务方，完全按照您的委托，向您提供技术服务。\n\n2.6 您同意，将遵守《[火山引擎信息与网络安全规则](https://www.volcengine.com/docs/6256/79758)》（“**安全规则**”）。如您违反安全规则或本协议中任一项，包括但不限于在本协议签订时不具备开展业务所需的全部资质许可、履行相关手续，或在本协议有效期内丧失全部或部分资质许可的，火山引擎有权暂停提供服务，要求您在限期内改正。如您在限期内未改正的，火山引擎有权终止本协议，要求您承担违约责任并赔偿火山引擎的相应损失。\n\n**3. 服务试（使）用说明**\n\n3.1 火山引擎可能通过开展邀请测试、公测等方式为您提供免费服务或在一定使用额度内为您提供免费服务，免费试（使）用期限/额度具体以火山引擎官网公布的信息为准。在免费期间或免费额度内，您不需支付费用，火山引擎不排除日后收取费用的可能，届时火山引擎将提前通过在网站内合适版面发布公告或发送站内通知等方式公布收费政策及规范；如果收费期开始后您仍使用相应服务的，您应按届时有效的收

<script>window.DATA_BASE="../";window.INIT_DOC=102277;window.INIT_MD="<span id=\"一-概述\"></span>\n# 一. 概述\n\n**集团管理员**可对集团人员的数据资产进行迁移处理。\n\n\n* 使用场景：\n\n   * 当集团内有用户退出（离开）集团时，**集团管理员**可对退出（离开）集团人员的数据资产进行迁移处理至集团其他人员。\n\n\n<span id=\"二-功能说明\"></span>\n# 二. 功能说明\n\n<span id=\"_2-1-资产范围\"></span>\n## 2.1 资产范围\n\n数据资产包含用户在火山引擎增长营销套件内创建的所有内容，具体包括：\n\n\n* 火山引擎A/B测试\n\n   * 该用户创建的实验\n\n   * 该用户创建的指标\n\n   * 该用户创建的feature\n\n   * 该用户创建的分群\n\n   * 系统管理中，该用户创建的白名单、服务端过滤参数列表、虚拟事件、查询任务\n\n* 火山引擎增长分析\n\n   * 该用户创建的看板及图表\n\n   * 该用户创建的监控任务\n\n   * 该用户创建的分群\n\n   * 该用户创建的虚拟事件\n\n   * 该用户创建的推送任务（push）\n\n   * 该用户创建的推广渠道，推广活动，活动组，Alink\\-链接，联调设备 (tracer)\n\n\n<span id=\"_2-2-流程说明\"></span>\n## 2.2 流程说明\n\n集团管理员可在用户列表中，选择需被转移资产的用户，点击删除，选择资产接收人进行资产转移。\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_8839ecc019a61a93042e6d1ac379b1c3.png) </span>\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_71da1e6df9f6a10d5755ce0af5eedd8a.png) </span>\n\n注：\n\n\n* 用户主动退出集团及资产未被转移前：该用户创建的所有资产的创建者依旧显示该用户的用户名。\n\n* 接收人需为当前未退出集团的用户";</script>

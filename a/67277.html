<script>window.DATA_BASE="../";window.INIT_DOC=67277;window.INIT_MD="若您的实验关联了漏斗指标，您可以在实验报告的**数据指标**页面切换「列表视图」和「漏斗视图」来查看转化漏斗的数据。\n\n<span id=\"一-概述\"></span>\n# 一. 概述\n\n什么是转化漏斗，如何创建、使用转化漏斗？\n\n详见：[新建转化漏斗](https://www.volcengine.com/docs/6287/65819)\n\n<span id=\"二-如何切换视图\"></span>\n# 二. 如何切换视图\n\n实验关联漏斗指标后，您可以在实验报告的**数据指标**页左侧导航栏单击**漏斗指标**，查看转化漏斗的数据。如下：\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/be0b48893c1d4ec18d711e0b5238b99c~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"三-如何查看视图详情\"></span>\n# 三. 如何查看视图详情\n\n<span id=\"_1-列表视图\"></span>\n## 1. 列表视图\n\n\n* 您可通过选择对比不同的实验版本，查看相关漏斗。左侧为对比版本的漏斗，右侧为被对比版本的漏斗。如下：\n\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/9c71f302b97248bb87c33630740e143f~tplv-em5hxbkur4-noop.image?width=1647&height=854) </span>\n\n<span id=\"_1-1-对比版本漏斗\"></span>\n### 1.1 对比版本漏斗\n\n\n* **对比版本的漏斗（左侧）** ：必须选择一个实验版本，候选项为当前实验的所有版本。当选择对照版本时，只展示漏斗，不计算置信度和置信区间等信息。默认为置信的总转化率最高的实验版本；若无置信的实验版本，则展示不置信的总转化率最高的实验版本。\n\n   * 说明：此处的置信区间的计算，参照系为「被对比版本的漏斗」，而非对照版本漏斗。\n\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/d9c82914ccab441280139638d92797e1~tplv-em5hxbkur4-noop.image?width=1639&height=845) </span>\n\n<span id=\"_1-2-被对比版本漏斗\"></span>\n### 1.2 被对比版本漏斗\n\n\n* **被对比版本的漏斗（右侧）** ：可不选任何实验版本，候选项为当前实验的所有版本+「不对比版本」。如果不选择被对比版本，默认使用对照版本作为被对比版本，无置信区间等信息计算。\n\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/7e4232ee6e2a422bb09ee2a5edd5f30c~tplv-em5hxbkur4-noop.image?width=1628&height=848) </span>\n\n\n* 当被对比版本的漏斗选择「不对比版本」时，退化为单一聚焦展现形态。如下图：\n\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/fb64da0470c141baa068f4fb2f116b2e~tplv-em5hxbkur4-noop.image?width=1644&height=801) </span>\n\n<span id=\"_1-3-如何区分各个版本的数据\"></span>\n### 1.3 如何区分各个版本的数据\n\n\n* 可以按照文字的颜色区分。举个例子，对比版本为实验版本1，为蓝色；被对比版本为实验版本2，文字颜色为绿色。如下图：\n\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/1423bb40bead45b99d35770dc20c17f7~tplv-em5hxbkur4-noop.image?width=1650&height=834) </span>\n\n\n* 悬浮卡片和对比版本漏斗的置信区间，是参照被对比版本漏斗计算来的。如下：\n\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/db2e54b6dd9445658d44c99a8dd3437d~tplv-em5hxbkur4-noop.image?width=1641&height=811) </span>\n\n\n* 悬浮卡片，如下红框，左侧数值表示对比版本漏斗触发该事件的人数，右侧表示被对比版本漏斗未触发该事件人数和占比。如下图：\n\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/b7b446e006f245999739c6487197b372~tplv-em5hxbkur4-noop.image?width=1631&height=807) </span>\n\n<span id=\"_2-漏斗视图\"></span>\n## 2. 漏斗视图\n\n<span>![图片](https://p-vcloud.byteimg.com/tos-cn-i-em5hxbkur4/4cad4e8abded49b19c48b0177c78f25d~tplv-em5hxbkur4-noop.image?width=1642&height=813) </span>\n\n对比版本和被对比版本的漏斗配置详情，与列表视图相同。\n\n<span id=\"三-数据计算相关\"></span>\n# 四. 数据计算相关\n\n<span id=\"495c31ce\"></span>\n## 基本概念\n\n\n|术语 |概念介绍 |\n|---|---|\n|转化窗口期 |指过程的转化周期，即为完成每一层转化所需时间的集合，在DataTester中表示为转化窗口期。<br><br>通常来讲，一个过程的转化周期越短越好，尤其是在某些转化周期较长的行业，比如：在线教育行业、B2B电商行业。<br><br>此外，单独查看每一层转化的时间，也能发现一些问题。例如，如果发现从某个渠道导入的流量，在某层转化的消耗时间惊人的一致，这说明该渠道的流量很可能有异常。 |\n|漏斗事件 |每一层事件就是一个节点。而对于节点来说，最核心的指标就是转化率，通过分析整个过程的转化率以及每一层的转化率，可以帮助我们明确优化的方向：找到转化率低的节点，想办法提升它。 |\n|流量 |也就是人群，DataTester的漏斗指标的计算逻辑基于用户人数（UV）来计算人群流量。不同人群在同一个转化路径下的表现情况一定是不一样的，比如淘宝的购物漏斗，男人和女人的转化率不一样，年轻人和老人的转化率也不一样。通过人群分类，我们可以快速查看特定人群的转化率，更能清晰定位问题。 |\n\n\n<span id=\"79e5775d\"></span>\n## 计算逻辑\n\nDataTester按人数（UV）计算漏斗指标：\n\n\n* 整体转化率 = 到达当前漏斗事件的人数 / 第一步漏斗事件的人\n\n* 上一步转化率 = 到达当前漏斗事件的人数 / 上一步漏斗事件的人数\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">DataTester的漏斗指标在创建的时候无需配置实验曝光事件，但是计算漏斗指标结果的时候会把实验曝光事件作为漏斗指标第一步事件之前的过滤事件，触发了实验曝光事件的用户才会参与计算漏斗指标，且实验曝光事件中携带了对应的实验版本VID。</div>\n\n\n<span id=\"22897b46\"></span>\n## 注意事项\n\n\n* 漏斗支持全局的时间和多维过滤器，但不受时间粒度（5分钟级、小时级、天级）影响。实时不支持置信度计算，只支持纯粹的漏斗。\n\n* 如果修改了漏斗的过滤条件、漏斗事件等任何内容，所有使用该漏斗的实验（任何状态），实验详情页和报告页都会相应更新至最新信息。漏斗数据没有缓存，因此实验报告页的漏斗数据也会是更新后的最新数据。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

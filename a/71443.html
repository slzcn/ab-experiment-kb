<script>window.DATA_BASE="../";window.INIT_DOC=71443;window.INIT_MD="<span id=\"_1-概述\"></span>\n# 1. 概述\n\n推送运营目前支持以下触达方式：\n\n\n* App Push：\n\n   * 极光推送\n\n   * 个推推送\n\n   * 友盟推送\n\n* Webhook：\n\n   * 可对接自有或其他触达通道\n\n\n更多触达方式会陆续发布。\n\n<span id=\"_2-app-push\"></span>\n# 2. App Push\n\n<span id=\"_2-1-极光推送\"></span>\n## 2.1 极光推送\n\n使用极光推送进行用户触达，需要按照以下步骤完成极光通道的配置：\n\n\n1. 准备好您的极光推送账号，如果没有请事先注册或购买；\n\n2. 在「推送通道管理/极光推送通道」中配置您的极光账号；\n\n3. 在App中集成极光推送的SDK，获取极光的RegistrationID并通过AppLog SDK上报至火山引擎侧；\n\n\n<span id=\"_2-1-1-准备极光推送账号\"></span>\n### 2.1.1 准备极光推送账号\n\n极光推送有免费版和付费版，如果您想要使用华米OV等厂商推送通道，请购买付费版。\n\n<span id=\"_2-1-2-配置极光推送通道\"></span>\n### 2.1.2 配置极光推送通道\n\n进入 **场景能力**\\>**智能运营**\\>**推送通道** 页面，在**APP Push**页签中，单击**极光推送通道**处的**编辑**按钮，配置极光推送通道。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/63357fc7685c4b2e83ef9768da91a564~tplv-goo7wpa0wc-image.image) </span>\n\n\n|参数 |配置说明 |\n|---|---|\n|AppKey & MasterSecrect |配置极光账号的AppKey、MasterSecrect信息。 |\n|消息通道 |根据实际情况配置各个通道的消息推送策略。支持配置为：**极光通道优先**、**强制极光通道**、**强制厂商通道**和**自定义配置**。<br><br><br>* 默认配置为**极光通道优先**（推荐），如果您有自己的极光配置，可以使用自定义配置。<br><br>* 选择配置为**自定义配置**时：<br><br>   * 您需单击后方的编辑**按钮**，在弹出的侧边框中配置自定义通道。<br><br>   * 自定义配置的内容为 JSON 格式，DataTester会透传给极光通道，各个手机品牌支持的字段和字段配置指导请参考[极光推送文档。](https://docs.jiguang.cn/jpush/server/push/rest_api_v3_push#third_party_channel-%E8%AF%B4%E6%98%8E)<br><br>   * 如果**自定义配置**的 JSON 对象的实际结果与其他三个配置项（**极光通道优先**、**强制极光通道**、**强制厂商通道**）的结果相同，DataTester会自动为您修改为对应的配置项展示。 |\n|推送报告 |如果想使用厂商推送通道或推送报告功能（需要极光 VIP 账号），可在配置界面中勾选。 |\n|用户接受频控限制 |选择用户接收推送消息的频控策略，默认为全局频控，支持选择配置为在全局频控的基础上，增加单通道频控并配置。在全局频控的基础上，增加单通道频控时：<br><br><br>* 在全局频控的基础上配置单通道的频控。<br><br>* 最终频控生效策略为单个通道的频率控制与全局频率控制共同作用的结果。 |\n|通道调用频率限制 |通道调用频率可配置，请填写您极光服务开通的阈值(范围介于50\\-10000，若输入值超出范围则将设置为10000) 如极光普通客户建议600，极光VIP客户建议1200，若需增加阈值可联系您的极光商务。<br><br><br>* 若设置的推送速率超过了通道(或厂商通道)的阈值，会出现部分推送失败的情况。<br><br>* 单次调用支持推送多个用户（会根据用户推送量级调整，阈值上限为1000）。 |\n\n\n<span id=\"_2-1-3-在极光后台配置发送回执（可选，需要极光vip账号）\"></span>\n### 2.1.3 在极光后台配置发送回执（可选，需要极光VIP账号）\n\n如果您使用的极光VIP账号，并想开通推送报告功能，则需要在极光推送后台配置回执URL。\n\n进入极光后台/回执管理，将送达回执和点击回执设置为：\n\n```Plain\nhttps://abtest.volceapplog.com/PushCallback/api/v1/JPush/{DataRangers应用的AppId}\n```\n\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_5771794a005d29dd3dab0e9df41b7388) </span>\n\n<span id=\"_2-1-4-集成极光推送sdk并获取registrationid\"></span>\n### 2.1.4 集成极光推送SDK并获取RegistrationID\n\n极光推送SDK的集成过程请参照极光官方文档：\n\n\n* [极光推送Android SDK集成](https://docs.jiguang.cn//jpush/client/Android/android_guide/)\n\n* [极光推送iOS SDK集成](https://docs.jiguang.cn//jpush/client/iOS/ios_guide_new/)\n\n\n然后，您需要编写代码获得极光的RegistrationID，并作为jpush_registration_id公共属性通过AppLog SDK上报至火山引擎侧。\n\nAndroid代码示例：\n\n```Plain\nString resistrationId = JPushInterface.getRegistrationID (this);\nHashMap<String,Object> param = new HashMap<String,Object> ();\nparam.put (\"jpush_registration_id\",resistrationId);\n//saas环境\nAppLog.setHeaderInfo (param);\n//私有化部署\nAppLog.profileSet(params);\n```\n\n\niOS代码示例：\n\n```Plain\n[JPUSHService registrationIDCompletionHandler:^(int resCode, NSString *registrationID) {\n    if(resCode == 0){\n      NSLog(@\"registrationID获取成功：%@\",registrationID);\n      //saas环境\n      [BDAutoTrack setCustomHeaderBlock:^NSDictionary<NSString *,id> * _Nonnull{\n        return @{@\"jpush_registration_id\":registrationID};\n      }];\n      //私有化部署\n      [BDAutoTrack profileSet:^NSDictionary<NSString *,id> * _Nonnull{\n        return @{@\"jpush_registration_id\":registrationID};\n      }];\n    }\n    else{\n      NSLog(@\"registrationID获取失败，code：%d\",resCode);\n    }\n}];\n```\n\n\n<span id=\"_2-2-个推推送\"></span>\n## 2.2 个推推送\n\n使用个推推送进行用户触达，需要按照以下步骤完成个推通道的配置：\n\n\n1. 准备好您的个推推送账号，如果没有请事先注册或购买；\n\n2. 在「推送通道管理/个推推送通道」中配置您的个推账号；\n\n3. 在App中集成个推推送的SDK，获取个推的ClientID并通过AppLog SDK上报至火山引擎侧；\n\n\n<span id=\"_2-2-1-准备个推推送账号\"></span>\n### 2.2.1 准备个推推送账号\n\n个推推送有免费版和付费版，如果您想要使用推送报告功能，请购买付费版。\n\n<span id=\"_2-2-2-配置个推推送通道\"></span>\n### 2.2.2 配置个推推送通道\n\n进入「运营优化/推送运营/推送通道管理」，编辑个推账号的AppID、AppKey、MasterSecrect等信息，输入账号，并开启。\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_27ffb3f5e17e123f0a8a4871d90f4590) </span>\n\n如果想使用推送报告功能（需要个推VIP账号），请在配置界面中勾选。\n\n<span id=\"_2-2-3-配置个推的发送回执\"></span>\n### 2.2.3 配置个推的发送回执\n\n如果您使用的个推VIP账号，并想开通推送报告功能，则需要联系个推客服配置回执URL。\n\n回执URL设置为：\n\n```Plain\nhttps://console.volcengine.com/PushCallback/api/v1/GeTui/{DataRangers应用的AppId}\n```\n\n\n<span id=\"_2-2-4-集成个推推送sdk并获取clientid\"></span>\n### 2.2.4 集成个推推送SDK并获取ClientID\n\n个推推送SDK的集成过程请参照个推官方文档：\n\n\n* [个推Android SDK集成](http://docs.getui.com/getui/mobile/android/androidstudio/)\n\n* [个推iOS SDK集成](http://docs.getui.com/getui/mobile/ios/xcode/)\n\n\n然后，您需要编写代码获得个推的ClientID，并作为getui_client_id公共属性通过AppLog SDK上报至火山引擎侧。\n\nAndroid代码示例：\n\n```Plain\nString resistrationId = com.igexin.sdk.PushManager.getInstance().getClientid (this);\nHashMap<String,Object> param = new HashMap<String,Object> ();\nparam.put (\"getui_client_id\",resistrationId);\n//saas环境\nAppLog.setHeaderInfo (param);\n//私有化部署\nAppLog.profileSet(params);\n```\n\n\niOS代码示例：\n\n```Plain\n//saas环境\n[BDAutoTrack setCustomHeaderBlock:^NSDictionary<NSString *,id> * _Nonnull{\n        return @{@\"getui_client_id\":GeTuiSdk.clientId};\n}];\n//私有化部署\n[BDAutoTrack profileSet:^NSDictionary<NSString *,id> * _Nonnull{\n        return @{@\"getui_client_id\":GeTuiSdk.clientId};\n}];\n```\n\n\n<span id=\"_2-3-友盟推送\"></span>\n## 2.3 友盟推送\n\n在增长分析平台中使用友盟推送进行用户触达，需要按照以下步骤完成友盟通道的配置：\n\n\n1. 准备好您的友盟推送账号，如果没有请事先注册或购买；\n\n2. 在「推送通道管理/友盟推送通道」中配置您的友盟账号；\n\n3. 在 App 中集成友盟推送的SDK，获取友盟的 RegistrationID并通过AppLog SDK上报至火山引擎侧；\n\n\n<span id=\"_2-3-1-准备友盟推送账号\"></span>\n### 2.3.1 准备友盟推送账号\n\n友盟推送有免费版和 Pro 版，如果您想要使用推送报告功能，请购买 Pro 版。\n\n<span id=\"_2-3-2-配置友盟推送通道\"></span>\n### 2.3.2 配置友盟推送通道\n\n进入「运营优化/推送运营/推送通道管理」，编辑友盟账号AppKey、MasterSecrect等信息，点击保存，并开启友盟推送通道。\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_ef05a25886c55c17a770a63be4ea470a) </span>\n\n如果想使用推送报告功能（需要 U\\-Push Pro 账号），请在配置界面中勾选。\n\n<span id=\"_2-3-3-集成友盟推送-sdk-或-api-并获取-devicetoken\"></span>\n### 2.3.3 集成友盟推送 SDK 或 API 并获取 DeviceToken\n\n友盟推送 SDK 的配置过程请参照友盟官方文档：\n\n\n* [Android SDK 集成文档](https://developer.umeng.com/docs/67966/detail/153908)\n\n* [iOS SDK 集成文档](https://developer.umeng.com/docs/67966/detail/66734)\n\n* [API 集成文档](https://developer.umeng.com/docs/67966/detail/68343)\n\n\n您需要获得友盟的 DeviceToken，并作为 `upush_device_token` 公共属性传递给 DataRangers 的 SDK。\n\n> deviceToken 是【友盟+】消息推送生成的用于标识设备的id，长度为44位，不能定制和修改。同一台设备上不同应用对应的deviceToken不一样。\n\n\n* [Android 获取 DeviceToken](https://www.volcengine.com/docs/6285/65977)\n\n* [iOS13 以上获取 DeviceToken](https://developer.umeng.com/docs/66632/detail/126489)\n\n\nAndroid代码示例：\n\n```Plain\nString resistrationId = mPushAgent.getRegistrationId();\nHashMap<String,Object> param = new HashMap<String,Object> ();\nparam.put (\"upush_device_token\",resistrationId);\n//saas环境\nAppLog.setHeaderInfo (param);\n//私有化部署\nAppLog.profileSet(params);\n```\n\n\niOS13代码示例：\n\n```Plain\n#include <arpa/inet.h>\n- (void)application:(UIApplication *)application didRegisterForRemoteNotificationsWithDeviceToken:(NSData *)deviceToken\n{\n    if (![deviceToken isKindOfClass:[NSData class]]) return;\n    const unsigned *tokenBytes = (const unsigned *)[deviceToken bytes];\n    NSString *hexToken = [NSString stringWithFormat:@\"%08x%08x%08x%08x%08x%08x%08x%08x\",\n                          ntohl(tokenBytes[0]), ntohl(tokenBytes[1]), ntohl(tokenBytes[2]),\n                          ntohl(tokenBytes[3]), ntohl(tokenBytes[4]), ntohl(tokenBytes[5]),\n                          ntohl(tokenBytes[6]), ntohl(tokenBytes[7])];\n    NSLog(@\"deviceToken:%@\",hexToken);\n}\n```\n\n\n```Plain\n//saas环境\n[BDAutoTrack setCustomHeaderBlock:^NSDictionary<NSString *,id> * _Nonnull{\n        return @{@\"upush_device_token\":hexToken};\n}];\n//私有化部署\n[BDAutoTrack profileSet:^NSDictionary<NSString *,id> * _Nonnull{\n        return @{@\"upush_device_token\":hexToken};\n}];\n```\n\n\n<span id=\"_2-3-4-配置友盟的发送、点击回执\"></span>\n### 2.3.4 配置友盟的发送、点击回执\n\n如果您使用的 U\\-Push Pro 账号，并想开通推送报告功能，须进行额外配置。具体可见 U\\-Push Pro [集成文档](https://developer.umeng.com/docs/67966/detail/130645)。\n\nDataFinder 用于接收回执的 URL 如下，须赋值给 `receipt_url`，而 `receipt_type` 须留空。\n\n```Plain\nhttps://console.volcengine.com/PushCallback/api/v1/UPush/{DataRangers应用的AppId}\n```\n\n\n<span id=\"_3-webhook\"></span>\n# 3. Webhook\n\n除了使用系统提供的Push等常用方式触达用户，在实际运营工作中，还可能用到一些较为个性化的触达通道（如网站的站内信），或者希望在触达前进行一些个性化处理（如希望在Push发送前，向客户账号中添加一个红包）。\n\n为了帮助您对接这些自有或个性化的触达通道，系统提供了Webhook接口对接的方式，在触达执行时，会通过回调的方式通知您的服务接口。\n\n<span id=\"cabfd301\"></span>\n## 3.1 自定义接口接入\n\n<span id=\"35451998\"></span>\n### 3.1.1 创建自定义接口接入\n\n新建Webhook通道时，选择接入方式为自定义接口接入，配置详情如下。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b5b85c0358684cbc93bb5e8702df37c8~tplv-goo7wpa0wc-image.image) </span>\n\n\n1. 配置Webhook对接相关参数。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/ae5559887a6948358705e231862d5317~tplv-goo7wpa0wc-image.image) </span>\n\n   \n   |核心配置项 |配置说明 |\n   |---|---|\n   |请求地址 |配置分发的Webhook URL地址。格式示例：`http://localhost:6666/payload`。http/https开头均可支持。 |\n   |鉴权方式&鉴权相关配置 |根据接入的Webhook接入的鉴权要求配置是否需要签名鉴权，以及签名的算法、位置等信息。<br><br>例如，接入的Webhook使用md5_32算法进行签名鉴权，您可以选择对应签名算法后，将对应鉴权的签名Key选择加在Header中，后续DataTester接入Webhook时，会在推送消息的Header中携带此处配置的鉴权信息，签名生成的伪代码如下：<br><br>```Python```<br>```# md5/sha1/sha256摘要算法：直接将密钥拼接在消息body后面进行摘要```<br>```sign = encrypt_algorithm(body + secret_key)```<br>``````<br>```# hmac sha256```<br>```sign = hmac_sha256(body, secret_key)```<br> |\n   |接口发送方式 |支持单次发送和批量发送，选择批量发送时需设置每次发送的ID数量上限(1 \\- 500之间) |\n   \n\n2. 配置消息相关参数。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/10d3c1469d2c4bd1837ea5846e6b25e3~tplv-goo7wpa0wc-image.image) </span>\n\n   \n   |核心配置项 |配置说明 |\n   |---|---|\n   |消息ID机制 |根据需要选择是否需要生成消息ID，使用消息ID时支持**AB平台生成**消息ID或**第三方生成**消息ID。<br><br><br>* AB平台生成：由DataTester自动生成一个消息ID。<br><br>   此种方式下，需将消息ID参数配置在Body、Header或Query中的任意一处，并设置**参数类型**为**保留字**，**默认值**选择为**消息ID**。<br><br>* 第三方生成：消息ID由三方平台生成提供，并由webhook服务端返回。此种方式下，需配置响应数据的消息ID Jsonpath路径，如下图所示：<br><br>   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/bb57f813bbaa4b6a90d12e686e6aa761~tplv-goo7wpa0wc-image.image) </span><br><br><br><div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div><br><br><br><br>* <div data-tips=\"true\" data-tips-type=\"tip\">消息ID主要为了串联发送端、回执端；</div><br><br><br>   * <div data-tips=\"true\" data-tips-type=\"tip\">发送时，每条消息生成/维护一个消息ID</div><br><br><br>   * <div data-tips=\"true\" data-tips-type=\"tip\">而在通过回执接口上报回执事件时，也需要将消息ID带上，DataTester会根据该消息ID，确定任务、批次、实验版本等信息，并上报数据。</div><br><br><br>* <div data-tips=\"true\" data-tips-type=\"tip\">如果选择不生成消息ID，那将无法支持上报回执事件</div><br> |\n   |Body/Header/Query配置 |根据实际消息发送需要，配置后续需要在消息Body、Header、Query中携带的参数。配置要点如下：<br><br><br>* 一定要有用户ID参数，即**参数类型**为**保留字**，**默认值**选择为**用户ID**。<br><br>* 如果需要生成消息ID，一定要有消息ID参数，即**参数类型**为**保留字**，**默认值**选择为**消息ID**。<br><br>* 其他参数可按需添加并配置参数的**参数类型**、**默认值**、**是否必填**。<br><br><br>配置示例如下。<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/c881c10ce330481bbb94d1db6b8f7340~tplv-goo7wpa0wc-image.image) </span><br><br><div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div><br><br><br><div data-tips=\"true\" data-tips-type=\"tip\">如果上述步骤中，<strong>接口发送方式</strong>配置为<strong>批量</strong>，则Header、Query中添加的参数仅支持<strong>常量</strong>类型的参数。</div><br> |\n   |成功/失败响应配置 |分别配置消息推送的成功、失败响应规则，其中HTTP状态码必填，响应体内容可选，配置示例如下：<br><br><span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/8d86f0191d2249e596aa26760c86bd3f~tplv-goo7wpa0wc-image.image) </span><br><br><div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div><br><br><br><div data-tips=\"true\" data-tips-type=\"tip\">判定规则如下：</div><br><br><br><br>* <div data-tips=\"true\" data-tips-type=\"tip\">如果未配置成功和失败：默认根据<strong>Http状态码是否为200</strong>来确定成功与否</div><br><br><br>* <div data-tips=\"true\" data-tips-type=\"tip\">配置了成功和失败响应规则，判定逻辑为：</div><br><br><br>   * <div data-tips=\"true\" data-tips-type=\"tip\">成功：只要有一项成功，便成功</div><br><br><br>   * <div data-tips=\"true\" data-tips-type=\"tip\">失败：只要有一项失败，便失败</div><br><br><br>   * <div data-tips=\"true\" data-tips-type=\"tip\">成功规则优先级高于失败规则</div><br><br><br>   * <div data-tips=\"true\" data-tips-type=\"tip\">若成功和失败规则都未匹配上：未设置成功规则算成功，否则返回未知错误</div><br> |\n   \n\n3. 基本配置。\n\n   为避短时间内发送过多消息给同一用户造成消息打扰，您可根据界面提示配置用户接收消息的频控配置。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/483a702490224a47b94b96ea8790879c~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"1c90ce85\"></span>\n### 3.1.2 回执事件上报\n\n如果您需要收集自定义Webhook通道的到达、点击等回执数据统计报告，可以通过HTTP接口进行回执事件上报。可通过如下回执事件的API进行上报：\n\n**描述**：自定义webhook通道回执回调接口\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">一次请求最多上报500条。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">请求域名和HTTP API埋点上报的保持一致，参考：<a href=\"https://www.volcengine.com/docs/6285/152564#_1-%E8%AF%B7%E6%B1%82%E6%8E%A5%E5%8F%A3\">HTTP API</a>。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">下面path中的channel_id为自定义webhook渠道ID，可在<code>通道配置-webhook</code>页面上获取</div>\n\n\n\n**Path**：/datapush/receipt/api/v2/webhook/{channel_id}\n\n**Method**：POST\n\n**Request**：\n\n```JSON\n[\n    {\n        \"message_id\": \"abc\",  // 消息ID\n        \"type\": \"click/show\" // 表示消息回执的类型，click：点击 show：送达\n    },\n    ...\n]\n```\n\n\n**Response:** \n\n```JSON\n//http status code=200\n{\n    \"code\":0, //0-成功，其他code为失败\n    \"message\":\"\"  //失败原因\n}\n```\n\n\n**上报样例:** \n\n```Plain\ncurl -XPOST -H \"Content-Type: application/json\" 'https://{your_sdk_domain}/datapush/receipt/api/v2/webhook/{channel_id}' -d '\n[\n    {\n        \"message_id\": \"abc\",\n        \"type\": \"show\"\n    },\n    {\n        \"message_id\": \"abc\",\n        \"type\": \"click\"\n    }\n]\n'\n```\n\n\n<span id=\"ec2894f1\"></span>\n## 3.2 标准接口接入\n\nWebhook接口提供单次推送、批量推送两种方式，具体的对接步骤如下：\n\n\n1. 在增长分析平台中创建并配置新的Webhook通道；\n\n2. 开发并上线webhook服务接口。\n\n\n<span id=\"_3-1-创建和配置webhook通道\"></span>\n### 3.2.1 创建和配置webhook通道\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_6b89c950425adfd624b16a4e88679b8d) </span>\n\n进入「分析/推送运营/推送通道管理」，切换到「Webhook」，点击新建通道；\n\n通道名称：尽量用运营和业务人员能够直接理解的名称，如「发送站内信」；\n\n回调的url地址：当触达执行时，增长分析平台会通过这个url调用您的服务实际执行触达；\n\n启用聚合批量推送：确认是否使用批量推送方式；\n\n参数模板：创建任务使用该通道时，需要配置的参数值；当触达执行时，平台会将用户配置的参数值下发给您的服务\n\n自定义扩展参数：自定义的通道透传参数，与参数模板类似，区别是需要设置参数值，且无法在创建推送任务时进行配置\n\n<span id=\"_3-2-开发webhook服务接口\"></span>\n### 3.2.2 开发webhook服务接口\n\n<span id=\"_3-2-1-单次推送\"></span>\n#### 单次推送\n\n单次推送时，增长分析平台会通过POST方法调用webhook接口，传递数据如下：\n\n\n* push_id：用于识别单条消息的uuid\n\n* app_id：应用ID\n\n* sign：签名信息，用于安全校验\n\n* timestamp：消息发送时间戳\n\n* task：推送任务信息：\n\n   * task_id：推送任务id\n\n   * task_name：推送任务名称\n\n   * channel_id：推送通道id\n\n   * channel_name：推送通道名称\n\n   * push_experiment_id: 推送实验id，仅推送实验时下发\n\n   * push_experiment_name：推送实验名称，仅推送实验时下发\n\n* receipt_properties：回执属性打包，通常无需关心此结构内部细节，在上报回执数据时，直接作为属性 map 使用即可\n\n* params：推送参数的名称和取值\n\n   * 参数的个数与名称与webhook渠道定义相同\n\n   * 参数的取值是运营人员在创建活动时填入\n\n* user_info：该条推送消息的用户id\n\n* trigger_event：触发条件\n\n   * 自动推送：此次推送任务相关的用户事件记录，提供了推送的上下文；\n\n   * 手动推送：无此部分，不用处理。\n\n\nWebhook接口调用的请求数据示例如下：\n\n```Plain\n{ \n        \"push_id\":\"882f7c1c-af41-4351-9ec1-04a574597055\", // 用于识别单条消息的uuid\n        \"app_id\": \"234901\", // 应用ID\n        \"sign\": \"f67ebb5fac42feacdee69d77bb0314cf\", // 校验签名信息\n        \"timestamp\":1606789775, // 发送时间戳  \n        \"task\":{ // 推送任务信息\n                \"task_id\":100, // 推送任务id\n                \"task_name\":\"test_push\", // 任务名称\n                \"channel_id\":14,         // 通道id\n                \"channel_name\":\"发优惠券\", // 通道名称\n                \"push_experiment_id\": 129103, // 推送实验id\n                \"push_experiment_name\": \"老用户年终回馈实验\" // 推送实验名称\n            },\n        \"receipt_properties\": { // 回执属性打包，用户通常无需关心此结构内部细节，在发送回执消息时，直接作为属性 map 使用即可\n            \"push_id\": \"882f7c1c-af41-4351-9ec1-04a574597055\",\n            \"user_unique_id\" : \"hulan@163.com\",\n            \"push_config_id\" : 231122, //强需，任务ID，number类型\n            \"push_batch_id\": 2311222343112, //强需，推送的批次ID，number类型\n            \"channel_id\": 14, //强需，本次推送任务的webhook通道id\n            \"channel_type\" : \"webhook\", //可省略，推送通道类型 \n            \"ab_version\": \"231892\", // 实验版本ID。\n            \"push_experiment_id\": 129103, //实验ID   \n            \"task_unit_id\":12  // 强需，推送节点ID  \n         },       \n        \"params\": { // 用户在 webhook 通道中配置的模板参数\n            \"action_type\": \"老用户反馈\", // 自定义模板参数「活动类型」\n            \"bonus_type\": \"抵用金\", // 自定义模板参数「奖励类型」\n            \"count\" : 200, // 自定义模板参数「金额」\n            \"content_message\":\"亲爱的${user_nickname} , 您好！\\n\\r老客户年终回馈，送您${count}元抵用券，给咱娃新年好课选起来咯！\" \n         },\n\n        \"user_info\":{ // 用户ID、自定义用户/公共属性信息 \n            \"user_unique_id\": \"hulan@163.com\", // 推送用户唯一标识\n            \"device_id\": \"EA7583CDA6678BC\", // 可选，用户的设备 ID \n            \"ssid\": \"12345678901\", //可选，用户的唯一ID \n            \"user_nickname\":\"汤圆麻麻\" // 自定义的透传用户公共属性 \n        },   \n         \"trigger_time\":{ // 手动时间触发条件。当推送任务为自动触发时，为空。多用于webhook中确定触达C端终端用户和数据预处理时间\n          \"trigger_type\": 1, //数值型。 1-立即推送，2-定时非例行 3-定时例行 其他值可抛弃 \n          \"trigger_routine\": \"true\", // 是否例行重复发送\n          \"trigger_cycle\": \"daily\", // 若trigger_routine为false，不出现该字段。例行推送时，该字段值候选项为daily、weekly、monthly\n          \"trigger_weekday\": \"MON\", // 只在trigger_cycle为weekly时出现该字段，表明具体推送是星期几，可多选，以逗号分隔。该字段值候选为MON、TUE、WEDS、THU、FRI、SAT、SUN，例如值为\"MON, FRI, SUN\"表示周一、周五和周日发送\n            \"trigger_monthday\": \"1, 10, 20\", // 只在trigger_cycle为weekly时出现该字段，表明具体推送是每月几号，可多选，以逗号分隔。该字段值候选为1-31，例如值为\"1, 10, 20\"表示每月1号、10号、20号发送\n          \"trigger_timestamp\": \"9:00\", // 若trigger_routine为false，不出现该字段。例行推送时，字段值格式为HH:MM，表示在该时间点进行推送\n         \"trigger_datewindow\"：\"2020/01/02-2021/05/20\" // 任务发送时间窗口，格式为“YYYY/MM/DD-YYYY/MM/DD”\n        }\n         \"trigger_events\":{ // 自动事件流触发时记录用户事件行为序列\n        }\n}\n```\n\n\nWebhook接口响应规范要求：\n\n```Plain\n{\n    \"code\":200, // 200表示成功，非200表示失败\n    \"message\": \"Success\" // 消息\n}\n```\n\n\n<span id=\"_3-2-2-批量推送\"></span>\n#### 批量推送\n\n启用批量推送后，增长分析平台会通过POST方法调用webhook接口，请求体则是下面结构的**数组**：\n\n\n* push_id：用于识别单条消息的uuid\n\n* app_id：应用ID\n\n* sign：签名信息，用于安全校验\n\n* timestamp：消息发送时间戳\n\n* task：推送任务信息：\n\n   * task_id：推送任务id\n\n   * task_name：推送任务名称\n\n   * channel_id：推送通道id\n\n   * channel_name：推送通道名称\n\n   * push_experiment_id: 推送实验id，仅推送实验时下发\n\n   * push_experiment_name：推送实验名称，仅推送实验时下发\n\n* receipt_properties：回执属性打包，通常无需关心此结构内部细节，在发送回执消息或上报到达点击数据时，直接作为属性 map 使用即可\n\n* params：推送参数的名称和取值\n\n   * 参数的个数与名称与webhook渠道定义相同\n\n   * 参数的取值是运营人员在创建活动时填入\n\n* user_info：该条推送消息的用户id\n\n* trigger_time：手动推送触发条件。当推送任务为自动活动时，为空。\n\n* trigger_event：触发条件\n\n   * 自动推送：此次推送任务相关的用户事件记录，提供了推送的上下文；\n\n   * 手动推送：无此部分，不用处理。\n\n\nWebhook接口调用的请求数据示例如下：\n\n```Plain\n[    \n    { \n        \"push_id\":\"882f7c1c-af41-4351-9ec1-04a574597055\", // 用于识别单条消息的uuid\n        \"app_id\": \"234901\", // 应用ID\n        \"sign\": \"f67ebb5fac42feacdee69d77bb0314cf\", // 校验签名信息\n        \"timestamp\":1606789775, // 发送时间戳  \n        \"task\":{ // 推送任务信息\n                \"task_id\":100, // 推送任务id\n                \"task_name\":\"test_push\", // 任务名称\n                \"channel_id\":14,         // 通道id\n                \"channel_name\":\"发优惠券\", // 通道名称\n                \"push_experiment_id\": 129103, // 推送实验id\n                \"push_experiment_name\": \"老用户年终回馈实验\" // 推送实验名称\n            },\n        \"receipt_properties\": { // 回执属性打包，用户通常无需关心此结构内部细节，在发送回执消息时，直接作为属性 map 使用即可\n            \"push_id\": \"882f7c1c-af41-4351-9ec1-04a574597055\",\n            \"user_unique_id\" : \"hulan@163.com\",\n            \"push_config_id\" : 231122, //强需，任务ID，number类型\n            \"push_batch_id\": 2311222343112, //强需，推送的批次ID，number类型\n            \"channel_id\": 14, //强需，本次推送任务的webhook通道id\n            \"channel_type\" : \"webhook\", //可省略，推送通道类型 \n            \"ab_version\": \"231892\", // 实验版本ID，推送实验使用\n            \"push_experiment_id\": 129103, //实验ID，推送实验使用   \n            \"task_unit_id\":12  // 强需，推送节点ID\n         },       \n        \"params\": { // 用户在 webhook 通道中配置的模板参数\n            \"action_type\": \"老用户反馈\", // 自定义模板参数「活动类型」\n            \"bonus_type\": \"抵用金\", // 自定义模板参数「奖励类型」\n            \"count\" : 200, // 自定义模板参数「金额」\n            \"content_message\":\"亲爱的${user_nickname} , 您好！\\n\\r老客户年终回馈，送您${count}元抵用券，给咱娃新年好课选起来咯！\" \n         },\n\n        \"user_info\":{ // 用户ID、自定义用户/公共属性信息 \n            \"user_unique_id\": \"hulan@163.com\", // 推送用户唯一标识\n            \"device_id\": \"EA7583CDA6678BC\", // 可选，用户的设备 ID \n            \"ssid\": \"12345678901\", //可选，用户的唯一ID \n            \"user_nickname\":\"汤圆麻麻\" // 自定义的透传用户公共属性 \n        },   \n         \"trigger_time\":{ // 手动时间触发条件。当推送任务为自动触发时，为空。多用于webhook中确定触达C端终端用户和数据预处理时间\n          \"trigger_type\": 1, //数值型。 1-立即推送，2-定时非例行 3-定时例行 其他值可抛弃 \n          \"trigger_routine\": \"true\", // 是否例行重复发送\n          \"trigger_cycle\": \"daily\", // 若trigger_routine为false，不出现该字段。例行推送时，该字段值候选项为daily、weekly、monthly\n          \"trigger_weekday\": \"MON\", // 只在trigger_cycle为weekly时出现该字段，表明具体推送是星期几，可多选，以逗号分隔。该字段值候选为MON、TUE、WEDS、THU、FRI、SAT、SUN，例如值为\"MON, FRI, SUN\"表示周一、周五和周日发送\n            \"trigger_monthday\": \"1, 10, 20\", // 只在trigger_cycle为weekly时出现该字段，表明具体推送是每月几号，可多选，以逗号分隔。该字段值候选为1-31，例如值为\"1, 10, 20\"表示每月1号、10号、20号发送\n          \"trigger_timestamp\": \"9:00\", // 若trigger_routine为false，不出现该字段。例行推送时，字段值格式为HH:MM，表示在该时间点进行推送\n         \"trigger_datewindow\"：\"2020/01/02-2021/05/20\" // 任务发送时间窗口，格式为“YYYY/MM/DD-YYYY/MM/DD”\n        }\n         \"trigger_events\":{ // 自动事件流触发时记录用户事件行为序列\n        }\n    },\n    {},\n]\n```\n\n\nWebhook接口响应规范要求：\n\n\n* HTTP 200 ，Body为空数组， 认为全部发送成功；\n\n* HTTP 200 有 Body，认为部分发送失败，返回详细的报错信息，会产生一个 Response Body 如下代码所示；\n\n* 非 HTTP 200 状态，认为全部失败。\n\n\n针对一次request的response回复body如下所示：\n\n```Plain\n[ \n    { \"success\": true },\n    { \n        \"success\": false,\n        \"fail_reason\": \".....\",\n      // 以下是receipt_properties中参数\n        \"push_id\": \"882f7c1c-af41-4351-9ec1-04a574597055\",\n        \"user_unique_id\" : \"hulan@163.com\",\n        \"push_config_id\" : 231122, \n        \"push_batch_id\": 2311222343112, \n        \"channel_id\": 123, \n        \"channel_type\" : \"webhook\",\n        \"ab_version\": \"231892\", \n        \"push_experiment_id\": 129103\n     },\n     ... \n\n]\n```\n\n\n<span id=\"_3-3-webhook安全校验\"></span>\n### 3.2.3 Webhook安全校验\n\n为了让webhook接口更加安全，您可以对webhook调用进行安全校验。\n\n我们提供了 签名+IP白名单 两种方式的组合进行校验。\n\n<span id=\"_3-3-1-签名校验\"></span>\n#### 签名校验\n\n当收到webhook调用请求时，您可以使用sign参数对请求内容进行校验。\n\n校验方法如下：\n\n```Plain\nsign = md5(\"【app_id】:【task_id】:【push_id】:【user_unique_id】:【timestamp】:【app_secret】\")\n```\n\n\n其中：\n\n\n* app_id、task_id、push_id、user_unique_id、timestamp可以从webhook请求中取得；\n\n* app_secret可以在「推送运营\\通用设置」找到（如下图）\n\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_ae2ac50e733f828ae80be3423e6e5610) </span>\n\n**示例：** \n\n假如appsecret为123456，webhook请求为：\n\n```Plain\n{\n    \"push_id\":\"882f7c1c-af41-4351-9ec1-04a574597055\", // uuid\n    \"app_id\": 165031,\n    \"sign\": \"f67ebb5fac42feacdee69d77bb0314cf\",\n    \"timestamp\":1606789775,\n    \"task\":{ // 推送任务信息\n        \"task_id\":100,\n        \"task_name\":\"test_push\",\n        \"channel_id\":14,\n        \"channel_name\":\"发优惠券\"\n    },\n    \"params\":{ // 推送参数\n        \"key1\":\"value1\",\n        \"key2\":2\n    },\n    \"user_info\":{ // 用户信息\n        \"user_unique_id\":\"69826555537\",\n        \"device_id\":\"3MYRAOL36CVIYK7EDREISWBIA36EQ26KTZOLJMOQIRAXV4VTV5YA01\",\n        \"getui_client_id\":\"\" // optional\n    },\n    \"trigger_events\":[ // 触发条件，自动活动才可能有\n        {\n            \"time\":1587626788, // 事件发生时间\n            \"event_name\":\"gt_init_info\",\n            \"params\":{// 事件参数\n                \"lev\":131,\n                \"coin_left\":392,\n                \"coin_type\":\"钻石\",\n                \"scene_id\":1003,\n                \"user\":\"1018908035\",\n                \"scene_lev\":2\n            }\n        },\n        {\n            \"time\":1587628681,\n            \"event_name\":\"gt_ad_button_click\",\n            \"params\":{\n                \"ad_position\":\"点位1\",\n                \"ad_type\":\"激励视频\",\n                \"ad_position_type\":\"双倍金币\",\n                \"lev\":154,\n                \"scene_id\":1016,\n                \"code_id\":101232,\n                \"user\":\"1018908035\",\n                \"scene_lev\":3\n            }\n        }\n    ]\n}\n```\n\n\n最终计算的sign为：\n\n```Plain\nsign = md5(\"165031:100:882f7c1c-af41-4351-9ec1-04a574597055:69826555537:1606789775:123456\") = \"f67ebb5fac42feacdee69d77bb0314cf\"\n```\n\n\n如果您计算的sign和webhook请求中的sign不同，则请求可能是伪造的。\n\n<span id=\"_3-3-2-ip白名单\"></span>\n#### IP白名单\n\n使用火山引擎增长分析SaaS版，Webhook调用请求会从以下IP地址发出：\n\n\n* 220.243.131.248\n\n* 220.243.131.249\n\n* 123.58.10.224\n\n* 123.58.10.225\n\n\n<span id=\"_3-4-webhook回执事件上报\"></span>\n### 3.2.4 Webhook回执事件上报\n\n<span id=\"_3-4-1-服务端上报\"></span>\n#### 服务端上报\n\n如果您需要Webhook通道的到达、点击等回执数据统计报告，可以通过HTTP接口进行回执事件上报，并增加回执属性。上报方式可参考帮助文档「应用接入\\-服务端接入\\-HTTP API」）。上报地址样例为：\n\n```Plain\nhttps://{your_sdk_domain}/v2/event/list\n```\n\n\n事件/属性的定义如下：\n\n\n|**name** |**是否预置** |**是否必须** |**附带属性** |**解释** |\n|---|---|---|---|---|\n|rangers_push_show |是 |是 |使用receipt_properties 中的属性即可 |消息触达用户上报的事件。主动事件。 |\n|rangers_push_click |是 |是 |使用receipt_properties 中的属性即可 |消息被用户打开时触发上报的事件。如果 Webhook 对接的系统是第三方/自研推送系统，需在客户的 App 端对此事件埋点。主动事件。 |\n|rangers_webhook_XXX |否 |否 |使用receipt_properties 中的属性即可 |客户自定义的 Webhook 回执成功事件，例如站内消息发送成功、优惠券发送成功、支付成功等深度转化事件等，非必须。 |\n\n\n以rangers_push_show举例，上报埋点事件样例：\n\n```Plain\nhttps://{your_sdk_domain}/v2/event/list\n\nPOST\nheader:\nContent-Type: application/json\nX-MCS-AppKey: your_app_key\n\nbody:\n\n[{\n        \"events\": [{\n                \"event\": \"rangers_push_show\", //触达事件名称，必选\n                \"params\": \"{\n                    \\\"push_config_id\\\": 231122, //强需，任务ID，int64类型。\n                    \\\"push_batch_id\\\": 2311222343112, //强需，推送的批次ID，int64类型\n                    \\\"push_id\\\": \\\"21234\\\", //Message ID,string类型\n                    \\\"channel_id\\\": 123, //强需，推送通道ID，int32类型\n                    \\\"channel_type\\\": \\\"\\\",//推送通道类型，string类型\n                    \\\"ab_sdk_version\\\": \\\"\\\",//强需，实验vid，string类型，对应ab_version字段\n                    \\\"$task_unit_id\\\": 231122,//强需，推送节点id，int32类型，对应task_unit_id字段\n                   }\", \n                   \"local_time_ms\": 1608455325028, //事件毫秒时间戳必选\n                  }],\n        \"user\": {\n                \"user_unique_id\": \"hulan@163.com\", //强需，请求体user_info中的user_unique_id字段，string类型\n                \"ssid\": \"12345678901\", //请求体user_info中的ssid字段，string类型\n                \"bddid\": \"EA7583CDA6678BC\", //saas使用bddid字段,上报请求体user_info中的device_id字段，string类型\n                \"device_id\": \"EA7583CDA6678BC\",//私有化使用device_id字段，上报请求体user_info中的device_id字段，string类型\n        },\n        \"header\": {\n                \"app_id\": 234901, //强需，app_id 必须，int32类型\n                \"ab_sdk_version\": \"\", //强需，实验vid，string类型，对应ab_version字段           \n        }\n}]\n```\n\n\nResponse返回值:\n\n```Plain\n{\n    \"Type\": \"Web/Mp(MiniProgram)\",    \n    \"e\": 0,        // 是否有error，0表示正常\n    \"message\": \"success\",    // 输出结果，success表示成功\n    \"sc\": 1,        // 成功处理的条数\n    \"server_time\": 1616587176    // 服务端处理时间\n}\n```\n\n\n<span id=\"_3-4-2-客户端上报\"></span>\n#### 客户端上报\n\n客户端上报回执数据使用埋点sdk，事件上报方式同其他自定义埋点（各版本sdk集成方式参考：[Android SDK接入](https://www.volcengine.com/docs/6285/65980)），回执数据的事件及属性定义如下：\n\n\n|事件名 |**属性** |描述 |\n|---|---|---|\n|rangers_push_show |push_config_id |推送任务id，强需 |\n||push_batch_id |推送批次id，强需 |\n||channel_id |推送通道id，强需 |\n||ab_sdk_version |实验版本id，强需 |\n||push_id |消息id，非必需 |\n||channel_type |推送通道类型，非必需 |\n||$task_unit_id |强需，推送节点id |\n|rangers_push_click |push_config_id |推送任务id，强需 |\n||push_batch_id |推送批次id，强需 |\n||channel_id |推送通道id，强需 |\n||ab_sdk_version |实验版本id，强需 |\n||push_id |消息id，非必需 |\n||channel_type |推送通道类型，非必需 |\n||$task_unit_id |强需，推送节点id |\n\n\n以Android SDK为例：账户登录、事件公共属性、用户属性沿用其他埋点，无需改动，上报消息到达（rangers_push_show）事件demo如下：\n\n```Plain\n// 以rangers_push_show（消息到达）为例\n// 上报event+params\nJSONObject paramsObj = new JSONObject();\ntry {\n    paramsObj.put(\"push_config_id\", 231122); //事件属性 推送任务id 强需\n    paramsObj.put(\"push_batch_id\",20); //推送批次 强需\n    paramsObj.put(\"push_id\",\"21234\");  //消息id。非必需\n    paramsObj.put(\"channel_id\",124);   //强需，推送通道ID\n    paramsObj.put(\"channel_type\",\"21234\"); //推送通道类型，string类型 非必需\n    paramsObj.put(\"ab_sdk_version\",\"21234\"); //强需，实验vid，string类型\n    paramsObj.put(\"$task_unit_id\",124);   //强需，推送节点ID\n} catch (JSONException e) { \n    e.printStackTrace();\n}\nAppLog.onEventV3(\"rangers_push_show\", paramsObj);\n```\n\n\n<span id=\"_4-微信公众号推送（仅私有化部署支持）\"></span>\n## 4. 微信公众号推送（仅私有化部署支持）\n\n<span id=\"_4-1-公众号接入\"></span>\n## 4.1 公众号接入\n\n微信侧接入参考文档 [微信公众号开发接入指南](https://developers.weixin.qq.com/doc/offiaccount/Basic_Information/Access_Overview.html)，填写回调服务器地址URL、Token、EncodingAESKey等信息。回调服务器地址URL可通过「接入微信公众号」\\-「服务URL」获取\n\n在「集团设置」\\-「数据管理」\\-「微信公众号」点击新接入公众号\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_4b6cee7f4d8bb095a3229dd851c58388) </span>\n\n\n* 公众号名称：接入公众号名称\n\n* 公众号AppID：接入公众号在微信侧的AppID，可在“微信公众平台\\-开发\\-基本配置”页中获得\n\n* 获取access_token：\n\n   * 微信服务器：即从微信官方服务器获取access_token\n\n      * Token：接入微信公众平台开发填写的Token\n\n      * secret：即AppSecret，可在“微信公众平台\\-开发\\-基本配置”页中获得\n\n   * 中控服务器：即从您的中控服务器获取access_token\n\n      * 中控服务器地址\n\n      * access_token解析：从返回值解析access_token的JSONPath表达式，如：$result.token\n\n* EncodingAESKey：接入微信公众平台开发填写的EncodingAESKey\n\n\n<span id=\"_4-2-公众号推送\"></span>\n## 4.2 公众号推送\n\n\n* 公众号模板消息\n\n\n微信公众号模版是在微信开放平台后台进行配置，可选择已有的模板进行消息配置，支持配置跳转动作。\n\n\n* 选择公众号：选择「集团设置」\\-「数据管理」\\-「微信公众号」模块接入的公众号\n\n* 模板选择：所选模板可在微信开放平台后台进行配置\n\n* 跳转动作\n\n   * 打开H5：需配置H5跳转链接\n\n   * 打开小程序：需配置跳转到的小程序appID及其具体页面路径\n\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_19d4e0a95c77c7df8ec8cd3cea74a654) </span>\n\n\n* 微信用户标签\n\n\n可通过该页面配置批量修改用户的标签，标签为所选公众号创建的标签\n\n\n* 选择公众号：选择「集团设置」\\-「数据管理」\\-「微信公众号」模块接入的公众号\n\n* 打标签：批量为用户打标签\n\n* 取消标签：批量为用户取消标签\n\n\n<span>![图片](https://lf6-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_0020d92d40c4984a35624f485f42a77f) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。

</script>

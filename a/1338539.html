<script>window.DATA_BASE="../";window.INIT_DOC=1338539;window.INIT_MD="DataTester为您提供任务管理功能，您可以在任务管理页面进行全局的实验指标计算任务的设置与管理操作。本文为您介绍任务管理功能的操作要点。\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">任务管理页面为您提供全局实验相关任务的设置、查询、管理等操作，当前已发布上线全局任务功能，其他细分功能后续会陆续上线，敬请期待。</div>\n\n\n<span id=\"22b29d8b\"></span>\n# 全局任务\n\n<span id=\"81754976\"></span>\n## 应用场景\n\n全局任务页面可设置全局实验指标计算任务的触发时间和任务执行开关，设置后：\n\n\n* 可将无需分析的指标计算任务关闭，节约计算资源，避免因计算资源不足导致的任务排队、更有价值的指标结果产出时间过晚。\n\n* 可设置相关任务的触发时间，以避免由于部分实验指标依赖的数据产出时间晚于默认指标计算任务时间，而导致的指标结果数据不准确的情况。\n\n\n<span id=\"60314a32\"></span>\n## 注意事项\n\n\n* 权限要求：仅集团管理员可修改全局任务设置。\n\n\n<span id=\"7c380eff\"></span>\n## 操作步骤\n\n\n1. 登录DataTester控制台后，在左侧导航栏单击**全局设置**\\>**系统设置**\\>**任务管理**，进入任务管理页面，在**全局任务**页签中，单击编辑按钮，可修改全局任务的触发时间和任务开关。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/5656851e58a247c082ca8350a1e9e696~tplv-goo7wpa0wc-image.image) </span>\n\n2. 修改全局任务配置，完成后单击确定。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/297304aa58f648cbb83465afa29ed09f~tplv-goo7wpa0wc-image.image) </span>\n\n   * 修改任务触发时间：单击左侧任务触发时间选择按钮，可根据业务数据产出时间进行修改设置。如果您的实验依赖某些业务数据的产出，需将任务触发时间设置为业务数据产出后的时间。\n\n   * 修改指标任务开关：根据实验分析的实际诉求，将无用的指标任务关闭，可节约指标计算资源，避免计算任务过多，更有价值的指标结果产出时间过晚。";</script>

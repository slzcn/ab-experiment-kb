<script>window.DATA_BASE="../";window.INIT_DOC=71342;window.INIT_MD="完成广告账户、广告资产等前期准备工作后，您可以在DataTester上创建广告实验，本文为您介绍新建广告实验的操作详情。\n\n<span id=\"1b03f243\"></span>\n# 前提条件\n\n\n* 已完成前期准备工作：\n\n   * DataTester侧：包括集团/DataTester项目、DataTester的旗舰版广告实验功能的产品认证等。\n\n   * 巨量引擎侧：包括有巨量引擎的账号、创建巨量引擎的事件资产完成联调等。\n\n      详情请参见[广告实验概述](https://www.volcengine.com/docs/6287/1113738)。\n\n* 已完成广告账户的授权添加，详情见[添加与管理广告账户](https://www.volcengine.com/docs/6287/1113901)。\n\n* 已完成广告资产的添加，例如广告视频或图片的素材、广告落地页等，详情见[添加与管理资产](https://www.volcengine.com/docs/6287/1113902)。\n\n\n<span id=\"_1-输入基本信息\"></span>\n# 创建广告实验\n\n<span id=\"0061346f\"></span>\n## 进入创建广告实验页面\n\n登录DataTester控制台后，在左侧导航栏单击**场景能力**\\>**广告场景**\\>**广告实验**，进入广告实验页面后单击右上角的**新建实验**按钮，进入广告实验创建页面。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/4f6f13bc819543709af27cb116edc6de~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"f8f3a4f5\"></span>\n## 输入基本信息\n\n输入实验名称、实验描述，实验负责人默认是创建者，实验时长默认30天。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_b67abf00526990ff7a79c50aa12dc5f3.png) </span>\n\n<span id=\"_2-填写项目信息\"></span>\n## 填写项目信息\n\n<span id=\"386992bb\"></span>\n### **账户选择**\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_eb679f83d8b4cf124ee1e68e5867a38e.png) </span>\n\n\n|**参数** |**配置说明** |\n|---|---|\n|投放渠道 |默认选择“巨量引擎”。 |\n|账号选择 |选择已创建的广告账户。如果您是管理员角色，则您将获取所有授权账户的权限；如果您是普通成员角色，则您可以选择自己授权账户以及别人分配给到您的账户。添加广告账户的操作详情请参见[添加与管理广告账户](https://www.volcengine.com/docs/6287/1113901)。 |\n|创建方式 |默认为新建项目，引用已有项目可以直接选择之前创建的项目。 |\n\n\n<span id=\"e0d07179\"></span>\n### **营销目标与场景**\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/65fc846843934d40a8610bd9b5bdd403~tplv-goo7wpa0wc-image.image) </span>\n\n\n|**参数** |**配置说明** |\n|---|---|\n|推广目的 |支持应用推广、销售线索、电商店铺、小程序（当前支持微信小程序）。 |\n|营销场景 |当前只支持短视频/图片。 |\n|广告类型 |支持通投广告和搜索广告两种方式。 |\n\n\n<span id=\"07a3af8b\"></span>\n### **投放内容与目标**\n\n\n* 应用推广：\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_802e22a2f6d65e01b573955e6d689cb8.png) </span>\n\n   \n   |**参数** |**配置说明** |\n   |---|---|\n   |应用 |在下拉框中选择需要推广的应用。下拉框中展示“资产\\-应用管理”中的全部启用的应用包。 |\n   |下载方式 |配置后续广告实验过程中，广告推广目标人群如何下载应用，支持直接下载和落地页下载两种方式。 |\n   |优化目标 |在下拉框中选择通过广告实验优化的目标。<br><br>下拉列表中展示的是要您在巨量后台“事件管理”中创建资产和事件，DataTester侧通过MAPI接口将巨量后台的资产拉取过来展示。 |\n   \n\n* 销售线索/电商店铺/小程序\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b45b60e101d74ae8aca88048baeeea6b~tplv-goo7wpa0wc-image.image) </span>\n\n   \n   |**参数** |**配置说明** |\n   |---|---|\n   |投放内容 |销售线索/电商店铺支持橙子落地页；小程序支持微信小程序。 |\n   |优化目标 |不同的推广场景支持的优化目标不一致，可根据界面下拉框选择。 |\n   \n\n\n<span id=\"69a81ee7\"></span>\n### **投放版位**\n\n\n* 通投智选：系统自动为您筛选投放广告位\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_58088f8e168dab722104963ea0328096.png) </span>\n\n* 首选媒体：您可以指定广告投放位\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_927f52b04f048f12118a7bc66811c063.png) </span>\n\n\n<span id=\"81bfa564\"></span>\n### **用户定向**\n\n您可以在用户定向部分配置后续广告实验的目标推广人群。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/2219eab042c74fab8cbd96c0b1056ad1~tplv-goo7wpa0wc-image.image) </span>\n\n其中：\n\n\n* 自定义人群：可单击自定义人群，跟进界面提示，选择此前已添加至DataTester资产中的人群包。\n\n* 保存为元件包：这里DataTester增加了元件包的概念，已配置好的目标用户可保存为一个元件包，后续创建广告实验时支持直接从已有元件包获取一致的目标人群配置。\n\n\n<span id=\"03506e18\"></span>\n### **排期与预算**\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/a13f6e7a6a2f444ba89e7da7683b03c8~tplv-goo7wpa0wc-image.image) </span>\n\n\n|**参数** |**配置说明** |\n|---|---|\n|投放时间 |支持“从今天起长期投放”以及“设置开始和结束日期”两种方式 |\n|投放时段 |支持“不限”和“指定时段”两种方式 |\n|竞价策略 |支持“稳定成本”、“最优成本”和“最大转化”三种方式 |\n|项目预算 |支持“不限”和“设置预算”两种方式 |\n\n\n<span id=\"2841666c\"></span>\n### **搜索快投**\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_0d9eff28dd567320a4ff435d096e35ec.png) </span>\n\n\n* 通过MAPI直接拉取已选账户下的所有关键词\n\n* 出价系数：自定义输入\n\n\n<span id=\"f8ffe48c\"></span>\n### **第三方监测链接**\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_e9898ed773a0e7dbff2011658ef51b60.png) </span>\n\n\n* 已有链接：您可以在此下拉框中选择巨量引擎中创建的巨量引擎侧的监测链接。销售线索、电商店铺、小程序不支持。\n\n* 自定义：如果您希望使用DataTester侧的监控链接，可点击自定义页签，输入DataTester侧的监测链接。\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">DataTester侧的监测链接需要在DataTester的广告资产中已添加为监测链接资产。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">使用巨量引擎的监测链接时，监测的数据可通过巨量引擎的广告监测链接同步至巨量引擎侧，再通过DataTester侧的广告监测链接同步至DataTester侧；使用DataTester侧监测链接时，可在根据监测链接的配置，决定是否需要将监测数据回传给巨量引擎侧的监控链接。</div>\n\n\n\n<span id=\"e8f88a36\"></span>\n## 配置实验内容\n\n广告内容填写时，需要填写不同的广告版本，在不同实验版本中建议只替换广告的素材内容（建议每一个广告只添加一个素材，AB实验需要控制变量），可以添加多个实验组，目前对照组+实验组的总数上限是5组。具体广告实验各版本中的广告相关的详细配置参数与巨量引擎的广告创建配置一致。\n\n<span id=\"1e766771\"></span>\n### **推广身份**\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_d3d9a2a4326c076a188b69966415f4a4.png) </span>\n\n\n* 推广身份：一共有“抖音号”和“账户信息”两种方式。\n\n* 抖音号选择需要您在巨量后台为广告账户绑定抖音号，我们直接拉取您账户下可以使用的抖音号。\n\n\n<span id=\"7c7d727a\"></span>\n### **广告素材**\n\n\n* 添加素材：\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_d95386ff2a8284966b85d230afa9c003.png) </span>\n\n   点击添加素材会打开资产管理中的素材库，您可以直接选择素材库中的素材，上限10个素材。\n\n* 其他素材内容：\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_6946ce1a261865f69edd4164003070a7.png) </span>\n\n   还有文案标题/文本摘要/原生锚点设置/落地页/产品名称/产品主图/产品卖点/行动号召等元素。\n\n\n<span id=\"8819b603\"></span>\n### **广告设置**\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_a3539bb5683fc0590b4c4107187915c4.png) </span>\n\n\n* 广告评论：是否开启用户评论。\n\n* 动态创意：是否开启智能动态创意。\n\n\n<span id=\"78a71dd3\"></span>\n### **搜索流量**\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_7dcb0f53f6d0d5b50fb0596dc6507b37.png) </span>\n\n\n* 智能拓流：默认启用。\n\n* 关键词：点击编辑可以选择系统推荐的关键词。\n\n\n<span id=\"a4996096\"></span>\n### **广告预算与出价**\n\n\n* 竞价策略/优化目标/深度优化目标/计费方式等字段是直接从巨量引擎项目中拉取过来。\n\n* 预算/出价/深度转化出价：您可以根据自己的需求填写。\n\n\n<span id=\"_3-实验列表\"></span>\n# 查看实验状态与实验结果\n\n\n* 实验状态：实验计划创建之后进入到排期中，因为广告计划需要审核通过后才能投放出去，如果审核过程中计划没有通过，则状态切换为不满足实验条件；实验审核通过后则进入到实验进行中的状态。\n\n* 实验结果：实验对广告曝光量有限制，如果曝光数低于10000，会显示数据量不足。\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_a2629a3d600d3a446350f2896dbfa08b.png) </span>";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。

</script>

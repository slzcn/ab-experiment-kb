<script>window.DATA_BASE="../";window.INIT_DOC=444915;window.INIT_MD="<span id=\"_1-安装sdk\"></span>\n# 1. 安装SDK\n\n<span id=\"_1-1-下载sdk\"></span>\n## 1.1 下载SDK\n\n当前sdk版本：v3.0.0\n\n<Attachment link=\"https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/9aa59ebed5d24ff2a428c01c6e15fc54~tplv-goo7wpa0wc-image.image\" name=\"datatester_python_sdk-3.0.0-py3-none-any.whl\">datatester_python_sdk-3.0.0-py3-none-any.whl</Attachment>\n\n\n&nbsp;\n\n<span id=\"_1-2-pip\"></span>\n## 1.2 pip\n\n支持的范围: Linux + python ≥3.7，≤3.14\n\n```bash\npip install datatester_python_sdk-3.0.0-py3-none-any.whl\n```\n\n\n<span id=\"_2-代码示例\"></span>\n# 2. 代码示例\n\n<span id=\"f04200e4\"></span>\n## 准备工作：获取数据上送地址\n\n进行数据接入上报时，您需要根据当前的环境类型和端类型确认您的数据上报地址，如果上报地址设置错误，后续会导致您无法查询到上报的数据。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">请在上报数据前，务必确认您当前使用的环境类型，根据环境类型配置上报地址。查看当前的环境类型请参见<a href=\"https://www.volcengine.com/docs/84129/1261497\">SaaS云原生/非云原生&私有化环境</a>。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">如果您使用的是SaaS\\-云原生环境，您也需确认您的服务所在的地域，（通常您的服务会在华北2\\-北京地域，部分用户可能会使用其他地域）。SaaS\\-云原生用户查看服务所在地域请参见<a href=\"https://www.volcengine.com/docs/84129/1527757\">支持的地域</a>。</div>\n\n\n\n<span id=\"b6f88a9e\"></span>\n### SaaS\\-云原生 & SaaS\\-非云原生\n\n\n|地址类型 |SaaS\\-云原生环境<br><br>（国内：华北2\\-北京） |SaaS\\-云原生环境<br><br>（海外：亚太东南\\-柔佛） |SaaS\\-非云原生环境 国内环境 |SaaS\\-非云原生 海外BytePlus环境<br><br>（以下 SG 指新加坡） |\n|---|---|---|---|---|\n|数据上报地址 |* SaaS\\-云原生（华北）：<br><br>   https://gator.volces.com |https://gator.uba.ap\\-southeast\\-1.volces.com |无需手动配置 |https://mcs.tobsnssdk.com |\n|分流地址<br><br>（meta信息地址） |https://tab.volces.com |https://tab.ab.ap\\-southeast\\-1.volces.com |无需手动配置 |https://tab.abtest.bytepluses.com |\n\n\n<span id=\"e5956254\"></span>\n### 私有化环境\n\n私有化部署场景下，您需要获取部署私有化环境时，自行规划配置的数据上送地址。如您不清楚此地址，请联系您的项目经理或客户成功经理。\n\n<span id=\"0663c2e3\"></span>\n## 2.1 初始化Client\n\n<span id=\"6a5b9817\"></span>\n### 2.1.1 SaaS\\-云原生\n\n```python\nfrom datatester_python_sdk import AbClient\n\n# 初始化ABTest分流客户端，请注意修改token参数\nab_client = AbClient(\n    token=\"YOUR_TOKEN\", \n    meta_host=\"META_HOST\", \n    track_host=\"TRACK_HOST\"\n)    \n\"\"\"\n参数:\n    token: 获取方式详见接口描述-AbClient\n    meta_host: 获取meta信息的地址，各环境各地域的上送地址请参见上文的 获取数据上送地址 章节。\n    track_host: 事件上报地址，各环境各地域的上送地址请参见上文的 获取数据上送地址 章节。\n    is_onpremise: 缺省值，sdk是否为私有化版本\n    user_info_handler: 缺省值，用户信息对象，进组不出组需要实现该handler\n    max_workers: 缺省值，事件上报线程数，默认为4\n\"\"\"\n\n```\n\n\n<span id=\"77cce1c9\"></span>\n### 2.1.2 SaaS\\-非云原生（老客）\n\n与SaaS\\-云原生使用方式，仅初始化client时不同。SaaS\\-非云原生的老客户，无需指定meta_host与track_host\n\n```Python\nfrom datatester_python_sdk import AbClient\n\n# 初始化ABTest分流客户端，请注意修改token参数\nab_client = AbClient(\n    token=\"YOUR_TOKEN\", \n    meta_host=\"META_HOST\", \n    track_host=\"TRACK_HOST\"\n)      \n\"\"\"\n参数:\n    token: 获取方式详见接口描述-AbClient\n    meta_host: 缺省值，获取meta信息的地址，默认值为SaaS-非云原生版本，私有化用户注意修改\n    track_host: 缺省值，事件上报地址，默认值为SaaS-非云原生版本，私有化用户注意修改\n    is_onpremise: 缺省值，sdk是否为私有化版本\n    user_info_handler: 缺省值，用户信息对象，进组不出组需要实现该handler\n    max_workers: 缺省值，事件上报线程数，默认为4\n\"\"\"\n```\n\n\n<span id=\"7ffcf9ad\"></span>\n### 2.1.3 私有化\n\n与SaaS版本使用方式，仅初始化client时不同。私有化客户需要指定meta_host和track_host为部署时配置的域名。同时指定is_onpremise为True\n\n```Python\nfrom datatester_python_sdk import AbClient\n\n# 初始化ABTest分流客户端，请注意修改token参数\n# meta_host和track_host请修改为部署时配置的域名\nab_client = AbClient(\n    token=\"YOUR_TOKEN\", \n    meta_host=\"META_HOST\",\n    track_host=\"TRACK_HOST\"\n    is_onpremise=True\n)\n\"\"\"\n参数:\n    token: 获取方式详见接口描述-AbClient\n    meta_host: 私有化部署时配置的域名\n    track_host: 私有化部署时配置的域名\n    is_onpremise: 私有化环境需要显示的配置为True\n    user_info_handler: 缺省值，用户信息对象，进组不出组需要实现该handler\n    max_workers: 缺省值，事件上报线程数，默认为4\n\"\"\"\n```\n\n\n<span id=\"a1046bf5\"></span>\n## 2.2 请求分流并获取结果\n\n```Python\nfrom datatester_python_sdk import AbClient\n\n# 具体参数可以查看2.1 初始化Client\nab_client = AbClient(token=\"YOUR_TOKEN\")  \n\n# 定义分流时请求中携带的参数\nattributes = {    \n    \"state\": \"Nanjing\",\n    \"likes_donuts\": True,\n}\n\n# 推荐接口\n# 根据variant key 获取分流后的实验配置\nvariable = ab_client.activate(\n        \"{variant_key}\", \n        \"{decision_id}\", \n        \"{track_id}\", \n        \"{default_value}\", \n        attributes\n        )\n\"\"\"\n参数:\n    variant_key: 变体的key    \n    decision_id: 本地分流用户标识，不用于事件上报，请替换为客户的真实用户标识    \n    track_id: 事件上报用户标识，用于事件上报，请替换为客户的真实用户标识\n    default_value: 当分流未命中时返回该值，根据业务需要使用，可传None\n    attributes: 用户属性，仅用于分流，不随埋点上报，可参考https://www.volcengine.com/docs/6287/65826\n\"\"\"       \n# 各类型参数使用示例\n# number\n# 对照组 = 123 实验组 = 456\nif variable == 123:\n    pass\nelif variable == 456:\n    pass\nelse:\n    pass \n# 对照组 = 111.23 实验组 = 444.56\nif variable == 111.23:\n    pass\nelif variable == 444.56:\n    pass\nelse:\n    pass \n\n# string\n# 对照组=\"aaa\" 实验组=\"bbb\"\nif variable == \"aaa\":\n    pass\nelif variable == \"bbb\":\n    pass\nelse:\n    pass \n\n# bool\n# 对照组=true 实验组=false\nif isinstance(variable, bool) and variable:\n    pass\nelse:\n    pass\n\n# json\n# 对照组={\"key\":\"value_a\"} 实验组={\"key\":\"value_b\"}\nif not isinstance(variable, dict):\n    return\nif variable.get(\"key\", None) == \"value_a\":\n    pass\nelif variable.get(\"key\", None) == \"value_b\":\n    pass\nelse:\n    pass\n```\n\n\n<span id=\"_3-接口描述\"></span>\n# 3. 接口描述\n\n<span id=\"_3-1-abclient\"></span>\n## 3.1 Abclient初始化方法\n\n<span id=\"描述：初始化abtest分流类\"></span>\n#### 描述：初始化ABTest分流类\n\n```python\ndef __init__(self, token=None, meta_host=None, track_host=None, is_onpremise=False, \n            user_info_handler=None，max_workers=4):\n    \"\"\"\n    参数:\n        token: 表明您的Tester应用。出于安全考虑，此处使用的token=appKey，而非appId。\n        meta_host: 设置获取meta信息的地址，SaaS-云原生/私有化用户注意修改\n        track_host: 设置事件上报地址，SaaS-云原生/私有化用户注意修改     \n        is_onpremise: 缺省值，sdk是否为私有化版本        \n        user_info_handler: 缺省值，用户信息对象，进组不出组需要实现该handler\n        max_workers: 缺省值，事件上报线程数，默认为4\n    \"\"\"\n```\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">1、请尽早初始化AbClient，以免影响您的分流服务和埋点上报服务。</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">2、每个应用有且仅有一个分流类AbClient，请确保它在所有线程中的唯一性。</div>\n\n\n在集团中接入一个应用后，您可以在集团相关页面查看应用的AppKey等信息，详情请参考：[如何创建应用](https://www.volcengine.com/docs/6287/66984)。\n\n\n* SaaS\\-云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/eba094f44e174faea6c7cdcdc7447d2d~tplv-goo7wpa0wc-image.image) </span>\n\n* SaaS\\-非云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b55e61ee067544deaff4939685d1475c~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"_3-2-user-info-handler\"></span>\n## 3.2 user_info_handler\n\n<span id=\"描述：进组不出组用户分组信息存储\"></span>\n#### 描述：进组不出组用户分组信息存储\n\n使用方式：\n\n\n1. 初始化AbClient时不指定user_info_handler，则默认使用空实现，不启用“进组不出组”功能。\n\n2. 实现如下UserInfoHandler类，自行实现持久化存储；初始化AbClient时通过user_info_handler参数传入UserInfoHandler对象。\n\n\n```python\nclass UserInfoHandler:\n    def query(decision_id):\n        \"\"\"\n        参数:\n            decision_id: 本地分流用户标识\n        返回值:\n            用户进组信息, 同create_or_update 的入参abInfo\n        \"\"\"\n        \n    def create_or_update(decision_id, abInfo):\n        \"\"\"\n        参数:\n            decision_id: 本地分流用户标识\n            abInfo: 字符串类型，用户进组信息\n        返回值:\n            类型boolean，是否成功更新\n        \"\"\"\n```\n\n\n<span id=\"_3-3-activate\"></span>\n## 3.3 activate\n\n<span id=\"描述：获取特定key的分流结果，并上报曝光事件\"></span>\n#### 描述：获取特定key的分流结果，并上报曝光事件\n\n```python\ndef activate(self, variant_key, decision_id, track_id, default_value, attributes):\n    \"\"\"\n    参数:\n        variant_key: 变体的key\n        decision_id: 本地分流用户标识\n        track_id: 事件上报用户标识\n        default_value: 变体默认值\n        attributes: 用户属性\n    \n    返回值:\n        该函数返回命中版本的参数值，未命中时返回默认值\n    \"\"\"\n```\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">1、含有“with_impression”字样的接口均会自动上报曝光事件。</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">2、事件上报接口请务必填写track_id字段，否则会导致上报失效。</div>\n\n\n<span id=\"返回值示例：\"></span>\n#### 返回值示例：\n\n```plain\n参数类型为string，返回值为str \"a\"\n参数类型为number，返回值为int  123(也可能是float 444.56)\n参数类型为boolean，返回值为bool True\n参数类型为json，返回值为dict {'key': 1}\n```\n\n\n<span id=\"_3-4-get-experiment-variant-name\"></span>\n## 3.4 get_experiment_variant_name\n\n<span id=\"描述：获取用户命中的特定实验的版本名称\"></span>\n#### 描述：获取用户命中的特定实验的版本名称\n\n```python\ndef get_experiment_variant_name(self, experiment_id, decision_id, attributes):\n    \"\"\"\n    参数:\n        experiment_id: 指定分流的实验ID\n        decision_id: 本地分流用户标识\n        attributes: 用户属性\n    \n    返回值:\n        该函数返回用户命中的特定实验的版本名称，\n        如果用户不在实验中或者实验没有启动就返回None。\n    \"\"\"\n```\n\n\n<span id=\"返回值示例：\"></span>\n#### 返回值示例：\n\n返回值为string \"对照版本\" / \"实验版本1\"\n\n<span id=\"_3-5-get-experiment-configs\"></span>\n## 3.5 get_experiment_configs\n\n<span id=\"描述：获取用户命中的特定实验的变体详情\"></span>\n#### 描述：获取用户命中的特定实验的变体详情\n\n```python\ndef get_experiment_configs(self, experiment_id, decision_id, attributes):\n    \"\"\"\n    参数:\n        experiment_id: 指定分流的实验ID\n        decision_id: 本地分流用户标识\n        attributes: 用户属性\n    \n    返回值:\n        该函数返回用户命中的某个实验的变体详情，通常仅能命中一个变体，\n        如果用户不在实验中或者实验没有启动就返回空的dict {}。\n    \"\"\"\n```\n\n\n<span id=\"返回值示例：\"></span>\n#### 返回值示例：\n\n```json\n// dict\n{'age': {'val': 12, 'vid': '160528'}, 'configure': {'val': {'settings': 1}, 'vid': '160528'}, 'fromCN': {'val': True, 'vid': '160528'}, 'name': {'val': 'asd', 'vid': '160528'}}\n```\n\n\n<span id=\"_3-6-get-all-experiment-configs\"></span>\n## 3.6 get_all_experiment_configs\n\n<span id=\"描述：获取用户命中的所有实验的变体详情\"></span>\n#### 描述：获取用户命中的所有实验的变体详情\n\n```python\ndef get_all_experiment_configs(self, decision_id, attributes):\n    \"\"\" \n    参数:\n        decision_id: 本地分流用户标识\n        attributes: 用户属性\n    \n    Returns:\n        该函数返回用户命中的某个实验的变体详情，通常命多个变体，\n        如果用户不在实验中或者实验没有启动就返回空的dict {}。\n    \"\"\"\n```\n\n\n<span id=\"返回值示例：\"></span>\n#### 返回值示例：\n\n与get_experiment_configs返回结构相同\n\n```json\n{'go': {'val': 'v1', 'vid': '83580'}, 'age': {'val': 12, 'vid': '160528'}, 'configure': {'val': {'settings': 1}, 'vid': '160528'}, 'fromCN': {'val': True, 'vid': '160528'}, 'name': {'val': 'asd', 'vid': '160528'}}\n```\n\n\n<span id=\"_3-7-get-feature-configs\"></span>\n## 3.7 get_feature_configs\n\n<span id=\"描述：获取用户命中的特定feature的变体详情\"></span>\n#### 描述：获取用户命中的特定feature的变体详情\n\n```python\ndef get_feature_configs(self, feature_id, decision_id, attributes):\n    \"\"\" \n    参数:\n        feature_id: feature的ID\n        decision_id: 本地分流用户标识\n        attributes: 用户属性\n    \n    返回值:\n        该函数返回用户命中某个feature的变体详情，通常仅能命中一个变体，\n        如果用户不在feature中，或者feature不可用，就返回None。\n    \"\"\"\n```\n\n\n<span id=\"返回值示例：\"></span>\n#### 返回值示例：\n\n```json\n{'servergo': {'val': False, 'vid': '20100615'}}\n```\n\n\n<span id=\"_3-8-get-all-feature-configs\"></span>\n## 3.8 get_all_feature_configs\n\n<span id=\"描述：获取用户命中的所有feature的变体详情\"></span>\n#### 描述：获取用户命中的所有feature的变体详情\n\n```python\ndef get_all_feature_configs(self, decision_id, attributes):\n    \"\"\" \n    参数:\n        decision_id: 本地分流用户标识\n        attributes: 用户属性\n\n    返回值:\n        该函数返回用户命中某个feature的变体详情，通常命中多个变体，\n        如果用户不在feature中，或者feature不可用，就返回None。\n    \"\"\"\n```\n\n\n<span id=\"返回值示例：\"></span>\n#### 返回值示例：\n\n与get_feature_configs返回结构相同\n\n```json\n{'servergo': {'val': False, 'vid': '20100615'}, 'python_key': {'val': 'bbb', 'vid': '20108187'}}\n```\n\n\n<span id=\"_3-9-get-experiment-variant-name-with-impression\"></span>\n## 3.9 get_experiment_variant_name_with_impression\n\n同接口：\"get_experiment_variant_name\"（同时上报曝光事件，需要传入track_id）\n\n<span id=\"_3-10-get-experiment-configs-with-impression\"></span>\n## 3.10 get_experiment_configs_with_impression\n\n同接口：\"get_experiment_configs\"（同时上报曝光事件，需要传入track_id）\n\n<span id=\"_3-11-get-feature-configs-with-impression\"></span>\n## 3.11 get_feature_configs_with_impression\n\n同接口：\"get_feature_configs\"（同时上报曝光事件，需要传入track_id）";</script>

</div>

<!-- 写文章访问控制 -->
<div class="login-mask" id="loginMask">
  <div class="login-box">
    <div class="login-ic">🔒</div>
    <h3>需要授权</h3>
    <p>此操作仅限授权用户</p>
    <input id="loginPin" type="password" inputmode="numeric" placeholder="访问码" autocomplete="off">
    <button class="ed-btn" id="loginBtn">进入编辑</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-tip">登录后 2 小时内免再次验证</div>
  </div>
</div>

<!-- 写文章编辑器 -->
<div class="editor-mask" id="editorMask"></div>
<div class="editor" id="editor">
  <div class="ed-head">
    <b>✍ 写新文章</b>
    <span class="ed-close" id="edClose">✕</span>
  </div>
  <div class="ed-body">
    <div class="ed-form">
      <label>标题</label>
      <input id="edTitle" placeholder="例如：双十一大促实验复盘">
      <label>分类</label>
      <select id="edCat"></select>
      <label>检索关键词（选填，空格分隔）</label>
      <input id="edKw" placeholder="复盘 大促 转化率">
      <label>正文（Markdown）</label>
      <textarea id="edMd" placeholder="# 标题&#10;&#10;正文用 Markdown 书写，支持 **加粗**、列表、表格、代码块…&#10;&#10;## 小节&#10;- 要点一&#10;- 要点二"></textarea>
      <div class="ed-actions">
        <button class="ed-btn" id="edSubmit" style="display:none">✓ 发布文章</button>
      </div>
      <div class="ed-msg" id="edMsg"></div>
      <div class="ed-hint" id="edHint"></div>
    </div>
    <div class="ed-preview" id="edPrev">
      <div class="ed-prev-tag" id="edPrevTag"></div>
      <h1 id="edPrevTitle" style="margin:8px 0 16px"></h1>
      <div class="md" id="edPrevBody"></div>
    </div>
  </div>
</div>

<script src="../app.js?v=fe9876e1"></script>
</body>
</html>

<script>window.DATA_BASE="../";window.INIT_DOC=107713;window.INIT_MD="<span id=\"插件下载\"></span>\n# 插件下载\n\n<Attachment link=\"https://lf3-volc-editor.volccdn.com/obj/volcfe/sop-public/upload_36e81f4feeb74516e0c0d8245be723f6.unitypackage\" name=\"RangersPlugin_v0.0.1.unitypackage\">RangersPlugin_v0.0.1.unitypackage</Attachment>\n\n\n<span id=\"一、导入插件\"></span>\n## 一、导入插件\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_0bd340a08dabbadb14b954b27ce7ad5e.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_c1d5d8b0d89ac1ac0b78d7caab20c722.png) </span>\n\n<span id=\"二、unity场景开发\"></span>\n## 二、Unity场景开发\n\n<span id=\"_1-新建场景，添加按钮\"></span>\n### 1. 新建场景，添加按钮\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_aa64c6eca39b8bfe6de0a82b82a499d8.png) </span>\n\n<span id=\"_2-绑定脚本\"></span>\n### 2. 绑定脚本\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_8e951ab20bcf718ff67ea908ee69ef80.png) </span>\n\n<span id=\"_3-绑定onclick方法\"></span>\n### 3. 绑定Onclick方法\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_756401d310520545d4fab14d0ee31bdd.png) </span>\n\n<span id=\"三、build-setting\"></span>\n## 三、Build Setting\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_5103c3d897bb66f1540f43e982909cea.png) </span>\n\n<span id=\"四、playersettings\"></span>\n## 四、PlayerSettings\n\n\n* Other Settings设置包名和版本号\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_791a6757a399fc01a0190e4349669486.png) </span>\n\n\n* Publish Settings设置mainfest、base gradle和Main gradle\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_d4566097c2ddcf995f4757aad95dcb95.png) </span>\n\n<span id=\"五、android配置\"></span>\n## 五、Android配置\n\n<span id=\"_1-mainfest文件配置\"></span>\n### 1. mainfest文件配置\n\n修改生成好的AndroidMainfest.xml文件，添加自定义的application\n\n```Plain Text\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!-- GENERATED BY UNITY. REMOVE THIS COMMENT TO PREVENT OVERWRITING WHEN EXPORTING AGAIN-->\n<manifest\n    xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    package=\"com.unity3d.player\"\n    xmlns:tools=\"http://schemas.android.com/tools\">\n    <application android:name=\".TheApplication\">\n        <activity android:name=\"com.unity3d.player.UnityPlayerActivity\"\n                  android:theme=\"@style/UnityThemeSelector\">\n            <intent-filter>\n                <action android:name=\"android.intent.action.MAIN\" />\n                <category android:name=\"android.intent.category.LAUNCHER\" />\n            </intent-filter>\n            <meta-data android:name=\"unityplayer.UnityActivity\" android:value=\"true\" />\n        </activity>\n    </application>\n</manifest>\n```\n\n\n<span id=\"_2-base-gradle文件配置仓库\"></span>\n### 2. Base Gradle文件配置仓库\n\n```Plain Text\n// GENERATED BY UNITY. REMOVE THIS COMMENT TO PREVENT OVERWRITING WHEN EXPORTING AGAIN\n\nallprojects {\n    buildscript {\n        repositories {**ARTIFACTORYREPOSITORY**\n            maven {\n                url 'https://artifact.bytedance.com/repository/Volcengine/'\n            }\n            google()\n            jcenter()\n\n        }\n\n        dependencies {\n            // If you are changing the Android Gradle Plugin version, make sure it is compatible with the Gradle version preinstalled with Unity\n                        // See which Gradle version is preinstalled with Unity here https://docs.unity3d.com/Manual/android-gradle-overview.html\n                        // See official Gradle and Android Gradle Plugin compatibility table here https://developer.android.com/studio/releases/gradle-plugin#updating-gradle\n                        // To specify a custom Gradle version in Unity, go do \"Preferences > External Tools\", uncheck \"Gradle Installed with Unity (recommended)\" and specify a path to a custom Gradle version\n            classpath 'com.android.tools.build:gradle:3.4.0'\n            **BUILD_SCRIPT_DEPS**\n        }\n    }\n\n    repositories {**ARTIFACTORYREPOSITORY**\n        maven {\n    url 'https://artifact.bytedance.com/repository/Volcengine/'\n                    }\n        google()\n        jcenter()\n        flatDir {\n            dirs \"${project(':unityLibrary').projectDir}/libs\"\n                }\n\n    }\n}\n\ntask clean(type: Delete) {\n    delete rootProject.buildDir\n}\n```\n\n\n<span id=\"_3-mian-gradle文件配置依赖\"></span>\n### 3. Mian gradle文件配置依赖\n\n```Plain Text\n// GENERATED BY UNITY. REMOVE THIS COMMENT TO PREVENT OVERWRITING WHEN EXPORTING AGAIN\nbuildscript {\n   repositories {\n        mavenCentral()\n      google()\n      jcenter()\n\n      }\n\n   dependencies {\n            classpath 'com.android.tools.build:gradle:3.4.0'\n      }\n}\n\nallprojects {\n   repositories {\n        mavenCentral()\n\n      google()\n      jcenter()\n      flatDir {\n        dirs 'libs'\n            }\n      }\n}\n\napply plugin: 'com.android.library'\n\ndependencies {\n   implementation fileTree(dir: 'libs', include: ['*.jar'])\n   implementation 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.3.61'\n   implementation 'com.bytedance.frameworks.baselib:utility:2.0.11'\n   implementation 'com.bytedance.frameworks:encryptor:0.0.9-rc.2-private'\n   implementation 'com.bytedance.applog:RangersAppLog-Lite-cn:6.3.0'\n\n   **DEPS**}\n\nandroid {\n   compileSdkVersion **APIVERSION**\n   buildToolsVersion '**BUILDTOOLS**'\n\n   defaultConfig {\nconsumerProguardFiles 'proguard-unity.txt'**USER_PROGUARD**\n      minSdkVersion **MINSDKVERSION**\n      targetSdkVersion **TARGETSDKVERSION**\n\n      ndk {\n            abiFilters **ABIFILTERS**\n        }\n      versionCode    **VERSIONCODE**\n      versionName    '**VERSIONNAME**'\n   }\n\n   lintOptions {\n      abortOnError false\n      }\n\n   aaptOptions {\n      noCompress '.unity3d', '.ress', '.resource', '.obb'**STREAMING_ASSETS**\n   }\n\n**SIGN**\n   buildTypes {\n      debug {\n         minifyEnabled **MINIFY_DEBUG**\n         useProguard **PROGUARD_DEBUG**\n         proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-unity.txt'**USER_PROGUARD**\n         jniDebuggable true\n            }\n      release {\n         minifyEnabled **MINIFY_RELEASE**\n         useProguard **PROGUARD_RELEASE**\n         proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-unity.txt'**USER_PROGUARD**\n         **SIGNCONFIG**\n      }\n   }\n**PACKAGING_OPTIONS**\n\n}\n\n**SOURCE_BUILD_SETUP**\n```\n\n\n<span id=\"_4-the-application代码\"></span>\n### 4. The Application代码\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_5b334290027ea8cfe1095dc43b93e41d.png) </span>\n\n```Plain Text\n/* 初始化开始 */\nfinal  InitConfig config = new  InitConfig(\"175128\", \"cuckoo\"); // appid和渠道，appid如不清楚请联系客户成功经理，注意第二个参数 channel 不能为空\n\nconfig.setUriConfig(UriConstants.DEFAULT);//上报地址\nconfig.setAbEnable(true); // 开启 AB 测试\n\n// 是否在控制台输出日志，可用于观察用户行为日志上报情况，上线之前可去掉\nconfig.setLogger(new  ILogger() {\n    @Override\n    public void  log(String s, Throwable throwable) {\n        Log.d(\"AppLog------->: \", \"\"  + s);\n    }\n});\n\n// 加密开关，SDK 5.5.1 及以上版本支持，false 为关闭加密，上线前建议设置为 true\nAppLog.setEncryptAndCompress(false);\nconfig.setAutoStart(true);\nAppLog.init(this, config);\n/* 初始化结束 */\n```\n\n\n<span id=\"六、ios配置\"></span>\n## 六、iOS配置\n\n在Build Setting 平台切换到iOS，在导出工程中找到UnityAppController.mm文件，在didFinishLaunchingWithOptions函数，加入初始化代码\n\n\n* 使用xcode打开工程，执行cocopods相关命令：\n\n\n```Plain Text\npod setup\npod init\n```\n\n\n\n* Podfile配置：\n\n\n```Plain Text\n# Uncomment the next line to define a global platform for your project\n platform :ios, '9.0'\nsource 'https://github.com/volcengine/volcengine-specs.git'\ntarget 'Unity-iPhone' do\n # Comment the next line if you don't want to use dynamic frameworks\n use_frameworks!\n\n # Pods for Unity-iPhone\n\n target 'Unity-iPhone Tests' do\n  inherit! :search_paths\n  # Pods for testing\n end\n\nend\n\ntarget 'UnityFramework' do\n # Comment the next line if you don't want to use dynamic frameworks\n use_frameworks!\n # applog的版本\n pod 'RangersAppLog', '6.2.3',\n   :subspecs => [\n    'Host/CN',\n    'Core',\n    'Unique',\n    'Log',\n    'CBridge'\n   ]\nend\n```\n\n\n\n* 安装依赖\n\n\n```Plain Text\npod install --repo-update\n```\n\n\n\n* 初始化代码,框架默认在UnityAppController.mm文件中，找到didFinishLaunchingWithOptions方法，在return YES的代码前面添加初始化代码\n\n\n```Plain Text\n#import <RangersAppLog/BDAutoTrack.h>\n\n- (BOOL)application:(UIApplication*)application didFinishLaunchingWithOptions:(NSDictionary*)launchOptions\n{\n//Init RangersAppLog\n BDAutoTrackConfig *config = [BDAutoTrackConfig configWithAppID:@\"123456\" launchOptions:launchOptions];\n //debug日志开关，正式版本修改修改为NO\n config.showDebugLog = YES;\n config.logger = ^(NSString * _Nullable log) {\n NSLog(@\"%@\", log);\n };\n config.appName = @\"Unity test app\";\n //加密开关，正式版本修改修改为YES\n config.logNeedEncrypt = NO;\n [BDAutoTrack startTrackWithConfig:config];\n return YES;\n}\n```\n\n\n<span id=\"七、日志查看\"></span>\n## 七、日志查看\n\n<span id=\"_1-android\"></span>\n### 1. Android\n\n\n* 安装插件，右击package，选择view in Package Manager\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_f12574389f874edd740aac75d9e04647.png) </span>\n\n\n* 选择unity_registry，选择按照Android Logcat\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_61c1f355c58bcafce58439f5f3f2fe0b.png) </span>\n\n\n* 插上 手机，在Build Seting正确的情况下，cmd+B就可以编译并运行工程了\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_0ef09966814233c972de0bd3cfa8a715.png) </span>\n\n<span id=\"_2-ios\"></span>\n### 2. iOS\n\n在xCode中查看\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_71f483b653616f8a5bd53ce5d519fb8b.png) </span>\n\n<span id=\"八、插件代码示例\"></span>\n## 八、插件代码示例\n\n```Plain Text\nusing System.Collections;\nusing System.Collections.Generic;\nusing UnityEngine;\nusing System;\npublic class lay_playGame : MonoBehaviour\n{\n    // Start is called before the first frame update\n    void Start()\n    {\n\n    }\n\n    // Update is called once per frame\n    void Update()\n    {\n\n    }\n    public void EventV3()\n    {\n            Dictionary<string, object> param = new Dictionary<string, object>();\n            param.Add(\"aaa\", \"111\");\n            param.Add(\"bbb\", \"222\");\n            RangersAppLog.Wrapper.RangersAppLog.EventV3(\"test\", param);\n            print(\"事件上报\");\n    }\n\n    public void SetCustomHeaderInfo()\n    {\n            RangersAppLog.Wrapper.RangersAppLog.SetCustomHeaderInfo(\"u_h_name\", \"my_first_unity\");\n            print(\"设置消息头\");\n    }\n\n    public void RemoveCustomHeaderInfo()\n    {\n            RangersAppLog.Wrapper.RangersAppLog.RemoveCustomHeaderInfo(\"u_h_name\");\n            print(\"移除消息头\");\n    }\n\n    public void ProfileSet()\n    {\n            Dictionary<string, object> param = new Dictionary<string, object>();\n            param.Add(\"u_p_age\", 100);\n\n            RangersAppLog.Wrapper.RangersAppLog.ProfileSet(param);\n            print(\"调用ProfileSet\");\n    }\n\n    public void ProfileSetOnce()\n    {\n            Dictionary<string, object> param = new Dictionary<string, object>();\n            param.Add(\"u_p_name\", \"i am a unity project\");\n\n            RangersAppLog.Wrapper.RangersAppLog.ProfileSetOnce(param);\n            print(\"调用ProfileSetOnce\");\n\n    }\n\n    public void ProfileUnset()\n    {\n            RangersAppLog.Wrapper.RangersAppLog.ProfileUnset(\"u_p_name\");\n            RangersAppLog.Wrapper.RangersAppLog.ProfileUnset(\"u_p_age\");\n\n    }\n\n    public void ProfileIncrement()\n    {\n            Dictionary<string, object> param = new Dictionary<string, object>();\n            param.Add(\"u_p_age\", 1);\n\n            RangersAppLog.Wrapper.RangersAppLog.ProfileIncrement(param);\n    }\n\n    public void ProfileAppend()\n    {\n            Dictionary<string, object> param = new Dictionary<string, object>();\n            param.Add(\"u_p_fav\", \"游泳\");\n            RangersAppLog.Wrapper.RangersAppLog.ProfileAppend(param);\n            print(\"调用ProfileAppend\");\n\n    }\n    public void GetAllABConfig()\n    {\n            Dictionary<string, object> config = RangersAppLog.Wrapper.RangersAppLog.GetAllAbTestConfig();\n            foreach (var item in config)\n            {\n\n                    print(\"abtest,key is \" + item.Key + \" value is \" + ((Dictionary<string, object>)item.Value)[\"val\"]);\n\n                    object value = RangersAppLog.Wrapper.RangersAppLog.GetABTestConfigValueForKey(item.Key, \"default\");\n                    Type type = value.GetType();\n\n                    print(\"type is\" + type.Name);\n\n                    print(\"abtest,曝光\" + item.Key + \"value is \" + (string)value);\n\n            }\n            print(\"调用GetAllAbTestConfigs\");\n\n    }\n    public void GetAbSdkVersion()\n    {\n            string version = RangersAppLog.Wrapper.RangersAppLog.GetAbSdkVersion();\n            print(\"版本号:\" + version);\n    }\n\n    public void SetExternalVersion()\n    {\n            RangersAppLog.Wrapper.RangersAppLog.SetExternalAbVersion(\"100,101\");\n            print(\"设置SetExternalAbVersion\");\n    }\n\n    public void ChangeUser()\n    {\n            string[] malePetNames = { \"Rufus\", \"Bear\", \"Dakota\", \"Fido\",\n                                              \"Vanya\", \"Samuel\", \"Koani\", \"Volodya\",\n                                              \"Prince\", \"Yiska\" };\n\n            System.Random rnd = new System.Random();\n\n            int index = rnd.Next(malePetNames.Length);\n            string user = malePetNames[index];\n            RangersAppLog.Wrapper.RangersAppLog.SetUserUniqueID(user);\n            print(\"切换用户\" + user);\n\n    }\n\n    public void Flush()\n    {\n            RangersAppLog.Wrapper.RangersAppLog.Flush();\n            print(\"立即推送\");\n    }\n    public void GetSDKLogInfo()\n    {\n            string aid = RangersAppLog.Wrapper.RangersAppLog.GetAid();\n            string did = RangersAppLog.Wrapper.RangersAppLog.GetDeviceId();\n            string iid = RangersAppLog.Wrapper.RangersAppLog.GetInstallId();\n            string uuid = RangersAppLog.Wrapper.RangersAppLog.GetUserUniqueID();\n\n            print(String.Format(\"aid is {0},did is {1},iid is {2},uuid is {3}\", aid, did, iid, uuid));\n    }\n}\n```";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。

</script>

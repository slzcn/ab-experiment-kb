<script>window.DATA_BASE="../";window.INIT_DOC=1355610;window.INIT_MD="<span id=\"c3a7bf9b\"></span>\n# 下载SDK\n\n您可以单击[下载地址](https://www.npmjs.com/package/@datatester/node-sdk)，进入Node.js SDK详情页面，在页面中可查看当前最新的SDK版本，并下载使用对应版本的SDK。\n\n<span id=\"da634e79\"></span>\n# 使用及说明\n\n<span id=\"7705aec4\"></span>\n## 使用示例\n\n以下以1.2.1版本为例，为您介绍Node.js SDK的使用说明。\n\n```JavaScript\nimport AbClient from \"@datatester/node-sdk\";\n// const AbClient = require('@datatester/node-sdk').default\n\n  // 在rangers应用管理中查询token信息\n  const abClient = new AbClient(\"token\");\n\n(async () => {\n  // 因为返回的是promise，业务使用上需要自行处理reject行为\n  try {\n    const conf = await abClient.activate(\n      \"key\",\n      \"decisionId\",\n      \"trackId\",\n      new Map(),\n      \"\"\n    );\n    // 获取key版本配置\n    const config = conf.val;\n  } catch (e) {\n    console.error(e);\n  }\n})();\n```\n\n\n<span id=\"2c8d5618\"></span>\n## 初始化参数\n\n\n|**名词** |**类型** |**说明** |\n|---|---|---|\n|token |string |必填，app 级别的 token，即应用中的App Key，可以在DataTester控制台应用列表中查看。<br><br><br>* SaaS\\-云原生<br><br>   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/7f186b68302f40ae8822331615ea0e71~tplv-goo7wpa0wc-image.image) </span><br><br>* SaaS\\-非云原生<br><br>   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/bd8f8c10d8bd427cbf16fac242976aa4~tplv-goo7wpa0wc-image.image) </span> |\n|metaHost |string |获取 meta 数据服务 host，默认为 AbClient.metaHost.cn。<br><br><div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div><br><br><br><div data-tips=\"true\" data-tips-type=\"tip\">私有化场景需手动按需修改。</div><br> |\n|trackHost |string |上报实验曝光数据，默认为 AbClient.trackHost.cn |\n|interval |number |元数据更新间隔时间，单位秒，默认 60s |\n|metaType |string |分流元数据的来源类型，可选值：'server'，'cdn', 'file'<br><br><br>* server：默认值，由DataTester提供的分流服务<br><br>* 'cdn', 'file'：如果需要使用自建的分流服务，可按需修改为对应类型<br><br>* 配置成‘file’时，仅初始化时对文件读取一次，不会按照 interval 去更新数据 |\n|metaFilePath |string |metaType==='file'时候才生效，元数据文件本地路径，使用前确保应用对文件有可读权限 |\n|metaPath |string |metaType==='cdn'或‘server’时候才生效，默认值：/abmeta/v2/get_abtest_info<br><br>最终的上报地址通过metaHost+metaPath拼接而成，metaType为‘server’时可保持默认值，为‘cdn’时可按需修改。 |\n|enableFile |boolean |开启日志文件保存 |\n|dir |string |enableFile=true时，日志写入的文件路径，默认为当前应用启动的根路径，需确保应用对路径有写权限。 |\n|maxSize |string |日志文件最大值，[配置示例](https://github.com/iccicci/rotating-file-stream#size)。 |\n|level |string |需要记录的日志等级 可选值：'console','info', 'warn', 'error' |\n|formatter |function |对日志做自定义格式化输出，可配置参数请参照 下载的Node.js SDK包中types/plugins/logger/index.d.ts文件，参考其中TLog相关参数。 |\n|trackMaxNum |number |一次上报的事件量个数，可选值 1\\-50，默认每 10 秒会自动上报一次，一次上报 50 条。 |\n|UserAbInfoHandler |object |命中数据（用户的标识ID数据、实验命中版本信息数据）的存储，如果您需要缓存这些数据到本地，以实现实验用户进组不出组的逻辑，需实现此对象，包含查询和保存两个方法：<br><br>```JavaScript```<br>```{```<br>```query: (decisionId: string) => Promise<string>;```<br>```createOrUpdate: (decisionId: string, flight2VersionStr: string) => Promise;```<br>``` }```<br><br><br><br>* decisionId：用户的标识ID，例如用户的uid。<br><br>* flight2VersionStr：实验ID和版本ID的Map结构序列化后的字符串。 |\n\n\n<span id=\"459ab787\"></span>\n# 接口说明\n\n> 接口类型参照nodejs代码中 types/type.d.ts文件。\n\n\n<span id=\"25270116\"></span>\n## 接口列表\n\n<span id=\"0d97f3b3\"></span>\n### 1. 动态调整获取元数据的间隔时间\n\n\n* 接口示例：\n\n   ```JavaScript\n   setInterval(interval: number)\n   ```\n   \n\n* 请求参数：参见下文的请求参数章节。\n\n* 返回参数：`void`\n\n\n<span id=\"7ea728b9\"></span>\n### 2. 命中分流结果名称\n\n\n* 接口示例：\n\n   ```JavaScript\n   getExperimentVariantName(experimentId: string, decisionId: string, attributes: Map<string, any>, options?: TOptions)\n   ```\n   \n\n* 请求参数：参见下文的请求参数章节。\n\n* 返回参数：`Promise<string>`\n\n\n<span id=\"8c60145d\"></span>\n### 3. 命中分流结果名称并曝光实验信息\n\n\n* 接口示例：\n\n   ```JavaScript\n   getExperimentVariantNameWithImpression(experimentId: string, decisionId: string, trackId: string, attributes: Map<string, any>, options?: TOptions)\n   ```\n   \n\n* 请求参数：参见下文的请求参数章节。\n\n* 返回参数：`Promise<string>`\n\n\n<span id=\"81589514\"></span>\n### 4. 命中分流结果配置信息\n\n\n* 接口示例：\n\n   ```JavaScript\n   getExperimentConfigs(experimentId: string, decisionId: string, attributes: Map<string, any>, options?: TOptions)\n   ```\n   \n\n* 请求参数：参见下文的请求参数章节。\n\n* 返回参数：`Promise<TConfig>`，详情请参见下文的返回值(TConfig)章节。\n\n\n<span id=\"f360a8a0\"></span>\n### 5. 命中分流结果配置信息并曝光信息\n\n\n* 接口示例：\n\n   ```JavaScript\n   getExperimentConfigsWithImpression(experimentId: string, decisionId: string, trackId: string, attributes: Map<string, any>, options?: TOptions)\n   ```\n   \n\n* 请求参数：参见下文的请求参数章节。\n\n* 返回参数：`Promise<TConfig>`，详情请参见下文的返回值(TConfig)章节。\n\n\n<span id=\"54e7a769\"></span>\n### 6. 获取 app 下所有实验命中分流结果配置\n\n\n* 接口示例：\n\n   ```JavaScript\n   getAllExperimentConfigs(decisionId: string, attributes: Map<string, any>, options?: TOptions)\n   ```\n   \n\n* 请求参数：参见下文的请求参数章节。\n\n* 返回参数：`Promise<TConfig>`，详情请参见下文的返回值(TConfig)章节。\n\n\n<span id=\"0399b217\"></span>\n### 7. 检验 feature flag 是否命中\n\n\n* 接口示例：\n\n   ```JavaScript\n   verifyFeatureEnabled(featureId: string, decisionId: string, attributes: Map<string, any>, options?: TOptions)\n   ```\n   \n\n* 请求参数：参见下文的请求参数章节。\n\n* 返回参数：`Promise<boolean>`\n\n\n<span id=\"314a2c6c\"></span>\n### 8. feature flag 分流结果配置\n\n\n* 接口示例：\n\n   ```JavaScript\n   getFeatureConfigs(featureId: string, decisionId: string, attributes: Map<string, any>, options?: TOptions)\n   ```\n   \n\n* 请求参数：参见下文的请求参数章节。\n\n* 返回参数：`Promise<TConfig>`，详情请参见下文的返回值(TConfig)章节。\n\n\n<span id=\"07f10af8\"></span>\n### 9. feature flag 分流结果配置并曝光信息\n\n\n* 接口示例：\n\n   ```JavaScript\n   getFeatureConfigsWithImpression(featureId: string, decisionId: string, trackId: string, attributes: Map<string, any>, options?: TOptions)\n   ```\n   \n\n* 请求参数：参见下文的请求参数章节。\n\n* 返回参数：`Promise<TConfig>`，详情请参见下文的返回值(TConfig)章节。\n\n\n<span id=\"37f3ace6\"></span>\n### 10. 命中的所有 feature flag 版本信息\n\n\n* 接口示例：\n\n   ```JavaScript\n   getAllFeatureConfigs(decisionId: string, attributes: Map<string, any>, options?: TOptions)\n   ```\n   \n\n* 请求参数：参见下文的请求参数章节。\n\n* 返回参数：`Promise<TConfig>`，详情请参见下文的返回值(TConfig)章节。\n\n\n<span id=\"243a8cc2\"></span>\n### 11. 获取所有命中的 feature flag id\n\n\n* 接口示例：\n\n   ```JavaScript\n   getEnabledFeatureIds(decisionId: string, attributes: Map<string, any>, options?: TOptions)\n   ```\n   \n\n* 请求参数：参见下文的请求参数章节。\n\n* 返回参数：`Promise<string[]>`\n\n\n<span id=\"fe8561a5\"></span>\n### 12. 根据 key 做分流，并上报实验信息\n\n\n* 接口示例：\n\n   ```JavaScript\n   activate(variantKey: string, decisionId: string, trackId: string, attributes: Map<string, any>, defaultValue: unkown, options?: TOptions)\n   ```\n   \n\n* 请求参数：参见下文的请求参数章节。\n\n* 返回参数：`Promise<{val: any}>`\n\n   返回逻辑：命中的实验信息 \\-\\> 命中的 feature flag 信息 \\-\\> 传入的默认值\n\n\n<span id=\"db6e8bd7\"></span>\n### 13. 主动关闭所有元数据服务的 schedule job\n\n\n* 接口示例：\n\n   ```JavaScript\n   close()\n   ```\n   \n\n* 请求参数：参见下文的请求参数章节。\n\n* 返回参数：`void`\n\n\n<span id=\"760418e6\"></span>\n## 请求入参\n\n\n|**参数** |**类型** |**说明** |\n|---|---|---|\n|interval |number |元数据获取时间间隔 |\n|experimentId |string |实验 id |\n|decisionId |string |决策 ID, 分流口径，和系统中设置的白名单数据行为一致 |\n|featureId |string |feature flag id |\n|trackId |string |上报数据唯一标识，事件上报用户标识，用于事件上报，请替换为客户的真实用户标识 |\n|attributes |Map<string, any\\> |用户自身的属性，用于和创建实验时设置的目标受众的用户属性做比对比 |\n\n\n<span id=\"03f3b6a4\"></span>\n## 返回值(TConfig)\n\n\n|**参数** |**类型** |**说明** |\n|---|---|---|\n|val |string |版本变量 |\n|vid |string |实验版本 id |\n|entity_id |string |决策 ID，分流口径 |\n\n\n<span id=\"d6aaca53\"></span>\n## 不同场景使用说明\n\n<span id=\"f36ca652\"></span>\n### 自定义获取元数据和实验信息曝光地址\n\n\n* SaaS\\-云原生、SaaS\\-非云原生 服务不同区域的配置\n\n\n```JavaScript\nimport AbClient from '@datatester/node-sdk'\n\n// metaHost\n// cn: AbClient.metaHost.cn\n// sg: AbClient.metaHost.sg\n// va: AbClient.metaHost.va\n\n// trackHost\n// cn: AbClient.trackHost.cn\n// sg: AbClient.trackHost.sg\n// va: AbClient.trackHost.va\n\nconst abSdk = new AbClient('token', {\n    trackHost: AbClient.trackHost.sg\n    metaHost: AbClient.metaHost.sg\n})\n```\n\n\n\n* 私有化服务\n\n\n```JavaScript\nimport AbClient from '@datatester/node-sdk'\nconst abSdk = new AbClient('token', {\n    trackHost: '' // 可访问到的上报http接口的host\n    metaHost: ''// 可访问到的获取元数据http接口的host\n})\n```\n\n\n\n* 监听内部日志\n\n> sdk 对外暴露了一个 EventEmitter 的实现，可以对 sdk 内部一些日志进行监听\n\n\n```JavaScript\n// meta获取成功\nabSdk.on(\"meta.success\", (data) => {});\n// meta获取失败\nabSdk.on(\"meta.failure\", (error) => {});\n// ...\n```\n\n\n<span id=\"b101d364\"></span>\n### 使用SDK进行分流\n\n\n* 服务端项目工程中，本地调取分流代码示例如下：\n\n\n```JavaScript\nconst abClient = new AbClient(\"token\")\nconst attrs = new Map()\nattrs.set(\"key\", \"value\")\n\nconst config = testerClient.activate(\"key\", \"decisionId\", \"trackId\", attrs, {val: \"defaultValue\"})\nconst value = config.val\nif (value === 'xx') {\n   // 命中xx\n} else if (value === 'yy') {\n    // 命中yy\n} else {\n    // 兜底\n}\n\n// json类型\nconst jsonValue = JSON.parse(value)\nif (jsonValue['key']) {\n // \n}\n```";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

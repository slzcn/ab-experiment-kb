<script>window.DATA_BASE="../";window.INIT_DOC=101620;window.INIT_MD="留存指标一般是用来验证用户粘性的关键指标，衡量用户的粘性和忠诚度。一般情况下，留存的定义是用户活跃(到访APP或进入了网站)。火山引擎AB测试支持根据您的业务场景及需求，自定义创建留存指标，以分析不同策略对于具体业务或功能的留存影响。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">留存指标类型的指标组，每个指标组仅限创建一个指标。</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">原因：相较于其他事件指标，本身即为一组指标的概念，留存指标默认是30日留存，会在报告页默认展示成30个指标一个组。</div>\n\n\n<span id=\"一、概述\"></span>\n# 典型场景\n\n\n* 场景一：关注某个功能的留存情况——自定义同一事件的留存分析 以拍照App为例，产品更关注【拍摄】功能在用户中的使用情况。通过自定义留存功能，设置初始行为和留存行为都为【拍摄】，即可了解首次使用【拍摄】功能的用户，再次使用此功能的留存情况。\n\n* 场景二：关注某个功能或策略对用户的影响——自定义不同事件的留存分析 以短视频App为例， 短视频内容的好坏决定了用户是否会再次打开App。通过自定义留存功能，选择初始事件是 【播放短视频】，回访事件是【打开APP】，即可了解用户二次打开App的留存情况。\n\n\n<span id=\"d8333840\"></span>\n# 创建留存指标\n\n<span id=\"0fb9082e\"></span>\n## **方式1(推荐)：创建自定义留存指标**\n\n适用场景：先创建自定义的留存指标，后续创建实验时，可选择创建的留存指标作为实验指标。\n\n\n1. 登录DataTester产品控制台后，单击左侧导航栏的**指标管理**\\>**指标组列表**，进入指标组列表页面后单击右上角的「创建指标组」进入指标组创建页面。\n\n2. 配置基本信息。选择**指标组类型**为**留存指标**，并配置指标组名称、指标组描述、负责人信息。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/82c3d034d6644864a645661477aa365d~tplv-goo7wpa0wc-image.image) </span>\n\n3. 配置指标。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/ef7707f08f6d417aaf6022e9e250b2e8~tplv-goo7wpa0wc-image.image) </span>\n\n   \n   |参数 |配置说明 |\n   |---|---|\n   |**指标名称** & **指标描述** |* **指标名称**：必填，建议取与事件内容相关的名称，如“点击登录按钮人均次数”，便于快速知道是关于哪个事件的指标；名称指标组内唯一，最长不超过50个字符。<br><br>* **指标描述**：选填，简述指标代表的含义、计算逻辑、用途等，可以让业务相关人员更加合理的使用指标。 |\n   |**计算口径** |* 配置起始事件和回访事件。留存指标需定义起始事件和回访事件：<br><br>   * 起始事件：即定义留存需要分析的目标用户群，如有使用拍摄功能的用户。<br><br>   * 回访事件：在起始事件发生后的第 n 天做了回访事件的用户，为第 n 日留存用户，如在第n天再次使用拍摄功能<br><br>* 添加过滤条件：起始事件和回访事件均支持对事件增加过滤条件，即对所选用户做进一步的圈选，如仅筛选出新用户查看新用户使用拍摄功能的留存情况。<br><br>* 高级设置：配置灵活属性。详情请参见[高级功能：指标灵活属性](https://www.volcengine.com/docs/6287/1253449)。 |\n   |**指标关系** |组合指标需要填写，指组合指标的计算公式，允许事件编号大写字母、支持一层括号()、加号+、减号\\-、乘号\\*、除号/计算公式可任意组合。 |\n   |**数字格式** |可选择数字/百分比格式，并设置小数位数 |\n   |**必看指标** |开启“设为必看指标”，则每个实验都会自动添加该指标。 |\n   \n\n4. 完成指标添加后，单击右上角的「保存」，完成指标组创建。\n\n\n<span id=\"130132a3\"></span>\n## **方式2：报告页自定义分析**\n\n适用场景：在实验报告页添加起始事件和回访事件，进行自定义留存的分析，一般用于临时的查询分析场景。\n\n\n1. 登录DataTester产品控制台后，单击左侧导航栏的**A/B测试**\\>**实验列表**，进入实验列表页面后，单击实验名称进入实验详情页面。\n\n2. 单击顶部的**数据指标**页签，然后单击左侧**留存指标**侧边栏，您可以在实验报告的流程指标页面进行临时的留存分析。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/4f1b4b22f0264b78821e00b8733ddebc~tplv-goo7wpa0wc-image.image) </span>\n\n   您可以在左侧直接选择已创建的自定义留存指标，也可以在右侧配置页面直接配置流程分析的留存口径，进行临时查询分析。\n\n   * 在报告页留存指标下，可进行留存口径的自定义，留存指标需定义起始事件和回访事件\n\n      * 起始事件: 即定义留存需要分析的目标用户群，如有使用拍摄功能的用户。\n\n      * 回访事件: 在起始事件发生后的第 n 天做了回访事件的用户，为第 n 日留存用户，如在第n天再次使用拍摄功能。\n\n   * 起始事件和回访事件均支持对事件增加过滤条件，即对所选用户做进一步的圈选，如仅筛选出新用户查看新用户使用拍摄功能的留存情况。\n\n3. 定义好起始事件和回访事件后，点击查询，即可查看对应的留存指标。\n\n\n&nbsp;";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

<script>window.DATA_BASE="../";window.INIT_DOC=71442;window.INIT_MD="流程画布是DataTester为您提供的编排自动化触达活动的高级方式，使用流程画布，您可以在用户行为旅程的特定环节对用户进行自动化的触达提醒，以实现用户培育、促进转化等目的。本文为您提供流程画布功能的操作要点。\n\n<span id=\"428d17c3\"></span>\n# 功能概述\n\n流程画布为您提供可视化的用户进入流程配置界面。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/ed268f61a63e46c3b09887171043ad8b~tplv-goo7wpa0wc-image.image) </span>\n\n在流程画布中，您可以：\n\n\n* 设置用户进入流程的条件。\n\n* 通过推送动作、触发条件、流程控制组合用户运营的流程。\n\n* 定义流程的转化目标。\n\n\n<span id=\"cafa1793\"></span>\n# 进入流程画布\n\n您可以从系统导航的 推送运营/流程画布 进入流程画布。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/ca34756140df4ac3be133ba2f8625ed4~tplv-goo7wpa0wc-image.image) </span>\n\n<span id=\"f39c3476\"></span>\n# 创建流程\n\n在流程画布列表单击右上角的「创建流程」按钮，并按照下面的步骤完成流程的创建。\n\n<span id=\"04c136dc\"></span>\n## 设置进入条件\n\n单击流程画布中的**进入条件**设置框来设置用户进入流程的条件。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/5a488e14d40c486b800db1d03b2d7002~tplv-goo7wpa0wc-image.image) </span>\n\n系统支持**定时型**和**触发型**两类进入条件：\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/1ca855d3a1654217898c888556ef06ab~tplv-goo7wpa0wc-image.image) </span>\n\n\n* **定时型条件**：会在设定好的时间点自动启动，筛选符合条件的受众用户并将他们加入流程中。\n\n   * 定时型包括**定时型\\-单次**和**定时型\\-重复**。\n\n   * **定时型\\-重复**的可以选择参与限制：如果选择参与1次，则用户只能进入流程一次；如果选择不限制，则用户在每次循环周期都会进入流程。\n\n* **触发型条件**：会监控用户的行为，并将符合行为条件的用户自动加入流程中。\n\n\n<span id=\"2601662d\"></span>\n## 设置受众用户\n\n\n1. 设置推送人群。\n\n   支持选择**细分用户**或**全部用户**。仅触发型流程支持选择全部用户；选择细分人群时，支持使用行为、属性、分群等条件，筛选出希望进入流程的用户。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/6c8f682a71784bd7a5cc989fccc14f33~tplv-goo7wpa0wc-image.image) </span>\n\n   细分人群的筛选条件支持设置多个，并支持“且”、“或”两层过滤条件逻辑关系。\n\n2. 设置推送范围。推送范围用于测试发送内容，测试用户范围可在**通用设置**\\>**测试白名单**处设置。您可以在任务配置页面选择推送给正式用户/测试用户。\n\n3. 完成配置后您可单击最下方的**预估用户数**，预估当前受众范围的条件下预估可进入流程的用户数，与实验预期一致时，可单击**确定**，完成一个流程节点配置。\n\n\n<span id=\"f7e78074\"></span>\n## 设置节点策略\n\n\n1. 单击流程画布页面的**策略**按钮，配置节点策略。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/c341ba2a4e694ec08e7adcdb140c4dc2~tplv-goo7wpa0wc-image.image) </span>\n\n2. 在弹出的页面上配置节点。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/eb821b72c5004c4885476d0dcfdfb38d~tplv-goo7wpa0wc-image.image) </span>\n\n   系统支持三类不同的节点：\n\n   * **推送动作**节点：这类节点用于向用户发送触达内容，如push；\n\n   * **触发条件**节点：使用触发条件，可以对用户的行为或属性进行判断，以决定后续流程如何执行；\n\n   * **流程控制**节点：用于增加等待时长或跳转到流程的特定节点。\n\n      配置界面示例如下。\n\n   \n   |推送动作节点 |触发条件节点 |流程控制节点 |\n   |---|---|---|\n   |<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b9c2c96021474e9ab80a5af598657f60~tplv-goo7wpa0wc-image.image) </span><br><br>当前支持的推送通道和各通道的配置要点可参见[推送通道管理](https://www.volcengine.com/docs/56651/783941)。 |<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/50d77a057cad4606b251308aa7988369~tplv-goo7wpa0wc-image.image) </span><br><br>支持使用公共属性或用户行为作为触发条件，可根据界面选择触发条件类型及条件详情。 |<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/cacf0cf7b4cb447eaaa58d34180472fb~tplv-goo7wpa0wc-image.image) </span><br><br>可根据界面选择要等到一定时长或跳转至指定的节点。 |\n   \n\n3. 您可根据业务需要配置多个流程控制节点，实现灵活的运营触达目标，如下图所示。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b66a7c5241fc41ea89ca492923b420d9~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"a9ac81b0\"></span>\n## 设置节点分流\n\n\n1. 单击流程画布页面中的分流按钮，即可为对应节点添加实验版本进行分流设置。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/97b5f192fd4c4c379972f036f7c6ff44~tplv-goo7wpa0wc-image.image) </span>\n\n2. 在弹出的页面配置实验版本数量及各个版本的流量分配比例，完成后单击**确定**。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/4b33e180bd2845f88b878aad7d89516d~tplv-goo7wpa0wc-image.image) </span>\n\n3. 返回流程画布后，可对分流出来的节点继续配置推送策略，如果无需推送，可配置为空白对照。\n\n4. 完成配置后，您可以在流程画布中查看并确认分流详情。\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/529c7573f82e43ea841163e7111783db~tplv-goo7wpa0wc-image.image) </span>\n\n\n<span id=\"c7a4398c\"></span>\n## 设置转化目标\n\n单击流程画布页面左上角的设置目标数，可在弹窗中配置转化目标。转化目标主要用来判断和衡量流程中的用户是否按预期完成了转化动作。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/86ac482df59e419498c5764bcc952e2d~tplv-goo7wpa0wc-image.image) </span>\n\n每个流程，可以设置一个首要目标和多个次要目标。\n\n注意：目标完成并非必须在推送之后，首要目标完成会结束流程。因此可能出现用户进入流程后，未走到推送节点就完成了首要目标、结束流程的现象。\n\n<span id=\"1c49ecc4\"></span>\n## 其他流程画布设置\n\n\n* 单击左上角修改名称按钮，即可设置创建的流程画布名称。\n\n* 单击顶部可对流程设置是否需要打开勿扰模式，打开后即可设置勿扰时间段及防打扰策略。\n\n* 单击右上角的「发起审批」，会将流程保存并提交给管理员审批。管理员审批后，到达流程启动时间时，流程会自动启动运行。\n\n\n<span id=\"7b35dc32\"></span>\n# 流程画布报表\n\n点击流程画布名称可以进入流程画布数据报表页面，查看效果数据。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/0453ef602f904fbdb4f068c903113751~tplv-goo7wpa0wc-image.image) </span>\n\n\n* 概览数据指标说明\n\n   * 累计进入人次：进入流程的用户人次\n\n   * 累计触发人次：触发推送的人次\n\n   * 成功发送人次：成功发送的推送人次\n\n   * 实际触达人次：实际触达的推送人次\n\n   * 点击人次：点击推送消息的数量\n\n   * 目标完成人次：完成所设目标的用户人次，包含未推送但是完成目标的用户\n\n* 节点数据指标说明\n\n   * 目标完成人次：在该推送节点之后完成目标的用户人次（注：若有多个推送节点，仅第一个推送节点有目标完成人次值）\n\n   * 目标完成率：目标完成人次/累计进入人次（若未设置目标转化，此处的含义为「节点的累计触发人次/累计进入人次」）";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。

</script>

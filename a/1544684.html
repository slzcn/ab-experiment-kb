<script>window.DATA_BASE="../";window.INIT_DOC=1544684;window.INIT_MD="进行实验指标的埋点数据接入上报时，您需要根据当前的环境类型和端类型确认您的数据上报地址，如果上报地址设置错误，后续会导致您无法查询到上报的数据。\n\n<span id=\"c8d729d2\"></span>\n# 注意事项\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">请在上报数据前，务必确认您当前使用的环境类型，根据环境类型配置上报地址。查看当前的环境类型请参见<a href=\"https://www.volcengine.com/docs/6287/1544686\">SaaS云原生/非云原生&私有化环境</a>。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">如果您使用的是SaaS\\-云原生环境，您也需确认您的服务所在的地域，（通常您的服务会在华北2\\-北京地域，部分用户可能会使用其他地域）。SaaS\\-云原生用户查看服务所在地域请参见<a href=\"https://www.volcengine.com/docs/6287/1544685\">支持的地域</a>。</div>\n\n\n\n<span id=\"9ae0aa48\"></span>\n# 数据上报地址：客户端\n\n\n|端类型 |SaaS\\-云原生环境<br><br>（国内：华北2\\-北京） |SaaS\\-云原生环境<br><br>（海外：亚太东南\\-柔佛） |SaaS\\-非云原生环境 国内环境 |SaaS\\-非云原生 海外BytePlus环境<br><br>（以下 SG 指新加坡） |\n|---|---|---|---|---|\n|iOS |* SaaS\\-云原生（华北）：https://gator.volces.com |* https://gator.uba.ap\\-southeast\\-1.volces.com |引入：'Host/CN' 后，无需配置 |引入：'Host/SG' 后，无需配置 |\n|Android |* SaaS\\-云原生（华北）：https://gator.volces.com<br><br>* 需要配合使用 cn 包：`'com.bytedance.applog:RangersAppLog-All-cn:xxx'` |* https://gator.uba.ap\\-southeast\\-1.volces.com<br><br>* 需要配合使用海外包：'com.bytedance.applog:RangersAppLog\\-All\\-global:xxx' |* 无需配置，使用默认的数据上报地址<br><br>* 需要配合使用 cn 包：`'com.bytedance.applog:RangersAppLog-All-cn:xxx'` |* 无需配置，默认上报到 SG<br><br>* 需要配合使用海外包：`'com.bytedance.applog:RangersAppLog-All-global:xxx'` |\n|HarmonyOS |* SaaS\\-云原生（华北）：https://gator.volces.com |* https://gator.uba.ap\\-southeast\\-1.volces.com |无需配置，使用默认的数据上报地址 |暂不支持 |\n|Web JS |* SaaS\\-云原生（华北）：https://gator.volces.com |* https://gator.uba.ap\\-southeast\\-1.volces.com |`channel: 'cn'`，即使用默认的数据上报地址 |`channel: 'sg'` |\n|Session Replay |* SaaS\\-云原生（华北）：https://gator.volces.com |* https://gator.uba.ap\\-southeast\\-1.volces.com |`http://analytics.volcengineapi.com` |不涉及 |\n|小程序 |* SaaS\\-云原生（华北）：https://gator.volces.com<br><br>* 需在小程序中添加对应上报地址至小程序的白名单中 |* https://gator.uba.ap\\-southeast\\-1.volces.com<br><br>* 需在小程序中添加白名单：https://gator.uba.ap\\-southeast\\-1.volces.com |* `channel: 'cn'`<br><br>* 需在小程序中添加白名单：https://mcs.volceapplog.com |* `channel: 'sg'`<br><br>* 需在小程序中添加白名单：https://mcs.tobsnssdk.com |\n|Windows / Linux |* SaaS\\-云原生（华北）：https://gator.volces.com |* https://gator.uba.ap\\-southeast\\-1.volces.com |无需配置 |* https://toblog.tobsnssdk.com |\n|MacOS |* SaaS\\-云原生（华北）：https://gator.volces.com |* https://gator.uba.ap\\-southeast\\-1.volces.com |无需配置 |* https://toblog.tobsnssdk.com<br><br>* 非c++版本暂不支持 |\n|微信公众号 |* 上报地址在创建接入时自动生成，您可以在控制台页面查看<br><br>* SaaS\\-云原生（华北）：需在微信公众侧添加以下白名单<br><br>> 180.184.102.25<br><br>> 111.62.107.192<br><br>> 111.62.107.22 |* https://gator.uba.ap\\-southeast\\-1.volces.com |* 上报地址在创建接入时自动生成，您可以在控制台页面查看<br><br>* 需在微信公众侧添加以下需配置白名单：<br><br>> 220.243.131.172<br><br>> 220.243.131.173<br><br>> 123.58.10.238<br><br>> 123.58.10.239<br><br>> 101.126.59.78<br><br>> 101.126.59.79<br><br>> 101.126.59.80<br><br>> 101.126.59.81<br><br>> 101.126.59.82 |不支持 |\n|Flutter |* SaaS\\-云原生（华北）：https://gator.volces.com |* https://gator.uba.ap\\-southeast\\-1.volces.com |`host = null`，使用默认的数据上报地址 |暂不支持 |\n\n\n<span id=\"26f3dd9f\"></span>\n# 数据上报地址：服务端\n\n\n|语言类型 |SaaS\\-云原生环境<br><br>（国内：华北2\\-北京） |SaaS\\-云原生环境<br><br>（海外：亚太东南\\-柔佛） |SaaS\\-非云原生环境 |海外BytePlus环境 |\n|---|---|---|---|---|\n|Java/Python/Golang/PHP |* SaaS\\-云原生（华北）：<br><br>   https://gator.volces.com |https://gator.uba.ap\\-southeast\\-1.volces.com |无需手动配置 |无需手动配置 |\n|HTTP |* SaaS\\-云原生（华北）<br><br>   * 单条数据上传：https://gator.volces.com/v2/event/json<br><br>   * 批量数据上传（每批次最多50条）：https://gator.volces.com/v2/event/list |* 单条数据上传：https://gator.uba.ap\\-southeast\\-1.volces.com/v2/event/json<br><br>* 批量数据上传（每批次最多50条）：https://gator.uba.ap\\-southeast\\-1.volces.com/v2/event/list |无需手动配置 |无需手动配置 |\n\n\n<span id=\"c6aaa812\"></span>\n# 分流服务地址\n\n\n|SaaS\\-云原生环境<br><br>（国内：华北2\\-北京&华南1\\-广州） |SaaS\\-云原生环境<br><br>（海外：亚太东南\\-柔佛） |SaaS\\-非云原生环境 |海外BytePlus环境 |\n|---|---|---|---|\n|https://tab.volces.com |https://tab.ab.ap\\-southeast\\-1.volces.com |无需手动配置 |* 客户端：无需手动配置<br><br>* 服务端：https://tab.abtest.bytepluses.com |";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

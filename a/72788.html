<script>window.DATA_BASE="../";window.INIT_DOC=72788;window.INIT_MD="坚果云通过与火山引擎A/B测试合作，进行了活动文案的A/B实验，解决了无法有效找到最佳文案的问题，使得活动分享人数增加117%。\n\n<span id=\"客户简介\"></span>\n## 客户简介[#](https://www.volcengine.com/docs/6281/66668#%E5%AE%A2%E6%88%B7%E7%AE%80%E4%BB%8B)\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/tos-cn-v-697126/9c7d5d9157c14e71905a96a58acf05eb) </span>\n\n坚果云创立于2011年，以为用户提供便捷、安全可靠的云存储为核心目标。坚果云作为一款专业的网盘产品，拥有数据分布式存储、多节点异地灾备、军方级别数据加密等技术的文件同步、共享、备份服务，为用户提供智能文件管理和高效办公解决方案。\n\n<span id=\"面临挑战——如何找到最佳文案？\"></span>\n## 面临挑战——如何找到最佳文案？[#](https://www.volcengine.com/docs/6281/66668#%E9%9D%A2%E4%B8%B4%E6%8C%91%E6%88%98%E2%80%94%E2%80%94%E5%A6%82%E4%BD%95%E6%89%BE%E5%88%B0%E6%9C%80%E4%BD%B3%E6%96%87%E6%A1%88%EF%BC%9F)\n\n为了提升品牌影响力，坚果云经常开展品牌宣传活动，但坚果云经常对活动文案选择感到头疼。\n\n文案中要不要加入时下热梗？哪个关键词可以吸引更多用户参与活动？什么风格的文案可以激励更多用户进行转发分享？选择文案时依靠经验主义拍脑袋还是拉群一起投个票？\n\n如何快速找到效果最佳的文案，如何提升推广活动参与人数，如何最大化市场活动ROI，是坚果云的关注重点。\n\n<span id=\"关键结果\"></span>\n## 关键结果[#](https://www.volcengine.com/docs/6281/66668#%E5%85%B3%E9%94%AE%E7%BB%93%E6%9E%9C)\n\n\n* 活动参与投票人数提升36%\n\n* 活动分享人数提升117%\n\n\n<span id=\"解决方案\"></span>\n## 解决方案[#](https://www.volcengine.com/docs/6281/66668#%E8%A7%A3%E5%86%B3%E6%96%B9%E6%A1%88)\n\n<span id=\"_01-典型场景——转发赢红包\"></span>\n### 01 典型场景——转发赢红包[#](https://www.volcengine.com/docs/6281/66668#_01-%E5%85%B8%E5%9E%8B%E5%9C%BA%E6%99%AF%E2%80%94%E2%80%94%E8%BD%AC%E5%8F%91%E8%B5%A2%E7%BA%A2%E5%8C%85)\n\n坚果云设计了活动H5，用户进入页面中可以投票吐槽工作中的坑，投票结束后可以将链接分享至朋友圈以领取现金红包。\n\n因此，「如何让用户更愿意分享」成为了此次活动的关注焦点，而文案是打动用户的核心部分。\n\n<span>![图片](https://lf3-volc-editor.volccdn.com/obj/tos-cn-v-697126/08336c398ee540ba93de79461bc6c371) </span>\n\n<span id=\"_02-争论焦点——哪种文案风格效果最好\"></span>\n### 02 争论焦点——哪种文案风格效果最好[#](https://www.volcengine.com/docs/6281/66668#_02-%E4%BA%89%E8%AE%BA%E7%84%A6%E7%82%B9%E2%80%94%E2%80%94%E5%93%AA%E7%A7%8D%E6%96%87%E6%A1%88%E9%A3%8E%E6%A0%BC%E6%95%88%E6%9E%9C%E6%9C%80%E5%A5%BD)\n\n坚果云提炼出了两种文案风格：\n\n\n* 现金吸引\n\n   * 认为红包的吸引力更强，利用现金奖励吸引用户积极分享。\n\n   * 文案示例：朋友领到多少钱，你也能拿多少钱！\n\n* 夸奖用户\n\n   * 文案要符合品牌调性，通过唤起用户共鸣以吸引用户主动分享活动。\n\n   * 文案示例：认为时间宝贵的人很多，积极节约时间的人却很少。\n\n\n借鉴竞品文案无法保证方案最终效果，利用经验评估难以有效体现用户当下的想法，借助用户访谈结果则无法避免样本偏差的影响。\n\n有没有一种有效的方式可以解决文案风格选择问题？\n\n<span id=\"_03-解决途径——小流量科学试错\"></span>\n### 03 解决途径——小流量科学试错[#](https://www.volcengine.com/docs/6281/66668#_03-%E8%A7%A3%E5%86%B3%E9%80%94%E5%BE%84%E2%80%94%E2%80%94%E5%B0%8F%E6%B5%81%E9%87%8F%E7%A7%91%E5%AD%A6%E8%AF%95%E9%94%99)\n\n坚果云与火山引擎A/B测试携手合作，通过A/B实验模块分出小流量进行两种风格文案的快速试错。\n\n1）科学分流\n\n坚果云利用火山引擎A/B测试的科学分流能力，保障看到不同文案用户的数量与特征的一致性，保证实验结果不被样本差异所误导。\n\n2）科学评估\n\n坚果云凭借火山引擎A/B测试的先进成熟的统计策略，从置信度、置信区间等多个层面对「活动参与投票人数」、「活动分享人数」等关键指标的表现进行判断。\n\n3）应用方案\n\n坚果云以来自于用户的科学客观的数据结果为决策依据，在95%的置信水平下，「夸奖用户」文案的「活动参与投票人数」指标正向提升36%，「活动分享人数」指标正向提升117%。最终，坚果云在此次推广活动中全量上线了「夸奖用户」文案。\n\n<span id=\"客户价值\"></span>\n## 客户价值[#](https://www.volcengine.com/docs/6281/66668#%E5%AE%A2%E6%88%B7%E4%BB%B7%E5%80%BC)\n\n坚果云通过使用科学快速的文案评估工具，显著提升了活动文案的产出效率，有效规避了应用错误文案的潜在风险，使得每条正式上线的文案都可以稳定带来关键指标的增长。\n\n在与火山引擎A/B测试的合作中，坚果云已经开始尝试「MAB动态流量调优实验」，即同时测试多个文案时，通过流量自动动态调节，让「最佳文案」获得更多流量，有效实现转化率的最大化。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。

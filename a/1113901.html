<script>window.DATA_BASE="../";window.INIT_DOC=1113901;window.INIT_MD="使用DataTester进行广告实验时，您首先需要先添加广告账户，将巨量引擎的账号授权添加到DataTester上，后续通过此广告账户在DataTester上实现资产管理、广告创建等操作。本文为您介绍添加与管理DataTester广告账户的流程。\n\n<span id=\"7abcbab3\"></span>\n# 前提条件\n\n\n* 已完成前期准备工作，包括集团创建、DataTester的项目接入。\n\n* 已完成产品授权。由于广告测试功能为旗舰版专有功能，您需要完成DataTester的旗舰版授权后才可使用广告实验相关功能。\n\n\n操作引导请参见[广告实验概述](https://www.volcengine.com/docs/6287/1113738)中的**准备工作**。\n\n<span id=\"_1-添加广告账户\"></span>\n# 添加广告账户\n\n\n1. 登录DataTester产品控制台后，在左侧导航栏单击点击**场景能力**\\>**广告场景**\\>**账户管理**，进入广告账户页面。\n\n2. 单击页面右上方的【**添加广告账户**】按钮，页面弹出一个授权范围的弹窗。\n\n3. 勾选全部权限后单击**授权**。\n\n   这里需要选择全部权限进行授权，因为后续广告实验依赖通过这些权限获取广告数据，以进行科学的计算分析得出科学的实验报告。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_2be391e38e05054328d326537701d3ce.png) </span>\n\n4. 点击授权之后，页面跳转至媒体侧（巨量引擎）的页面，页面会自动获取并展示可对DataTester授权的巨量引擎账号列表，您可根据需要勾选授权。勾选授权的账号后续会被添加至DataTester的广告账户中。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_2125cd067e409a30cb57231e6cfc0131.png) </span>\n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div>\n   \n\n   * <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">页面展示的巨量引擎的账号列表为当前登录账号下的广告投放账户，其他账户类型，例如账户管家、广告主等类型账号不会展示在这里。   </div>\n   \n\n   * <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">如果您此前未登录巨量引擎，点击授权后需先登录巨量引擎页面后，再继续勾选账号完成授权操作。   </div>\n   \n\n\n<span id=\"2150baf1\"></span>\n# 启用/停用/删除广告账户\n\n授权添加至DataTester的广告账户会在账户管理页面中展现，广告账户被启用后，才可在后续的广告实验中被使用。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">仅管理员可对广告账户进行“停用”、“重新启用”、“删除”等操作。</div>\n\n\n对于已启动的广告账户，后续如果不需要继续使用，也可操作暂停使用。您可以在授权账户列表页面的操作列进行启动、暂停等操作，操作后对应广告账户的状态会随之变更。\n\n<span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/221f570d9b664c5889cc35723c0c6600~tplv-goo7wpa0wc-image.image) </span>\n\n\n* **启用账户**：账户状态为**活跃中**，该广告账户可以正常使用。\n\n* **停用账户**：账户状态为**停用中**，当前账号已被停用，将不可使用该账户创建广告、获取数据。如果需要再次使用此账户，需进行**重新启用**的操作。\n\n* **长期未使用账户**：账号最近 30 天没有收到数据，且未创建广告，账户状态自动变更为**不活跃**。\n\n* **授权失效账户**：授权失效后，账户状态自动变为**已过期**。此账户需重新授权后才可使用。\n\n* **删除账户**：对于不在需要的账户，您也可以在操作列单击删除进行删除。\n\n   <div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">注意   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"warning\" data-wrapper-indent=\"1\">广告账户删除后创建广告中不能再选择该账户，该账户的广告数据也将全部被删除，请您谨慎操作。   </div>\n   \n\n<span id=\"_2-账户操作-分配\"></span>\n# 分配广告账户\n\n如果集团内的其他成员也需要使用该广告账户，则管理员可以将该广告账户分配给其他成员，被分配账户的成员也可以分配账户给其他人。\n\n分配后的成员可以查看该账户的数据、使用该账户进行投放、修改该账户的广告项目、广告等操作；管理员可以移除已分配的成员，移除后该成员的广告账户权限也将全部被回收。\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_9708bb8beb95311232d6b990f056bde1.png) </span>\n\n如图：点击用户名即可授权，移除成员则点击删除按钮\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_14533132b4f38f563c6da8807b91c70b.png) </span>\n\n&nbsp;";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

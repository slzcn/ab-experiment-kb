<script>window.DATA_BASE="../";window.INIT_DOC=910000007;window.INIT_MD="## 从大航海时代说起\n\n- 在大航海时代，各国水手们在海上航行时，最怕的不是狂风巨浪，也不是鲨鱼袭击，而是一种名为 坏血病（scurvy）的可怕病症。\n- 一位名叫詹姆斯·林德的海军外科医生下决心寻找治疗这种病的方法。\n- 他发现坏血病都发生在一般船员身上，而包含他自己在内的船上干部，却没有人得到坏血病。官位大的人不会生病，世界上哪有这个道理？直到有一天，他为了照顾病人到一般船员的餐厅用餐，才有了新的发现。\n\n![](https://raw.githubusercontent.com/slzcn/ab-experiment-kb/main/assets/metric-素材1认识-AB测试课件原件-46839426.jpg)\n\n## 从大航海时代说起\n\n- 一般船员的伙食，只有面包与腌肉，而干部们，却有马铃薯与高丽菜芽可以吃。所以林德医师认为，新鲜蔬果或许可以治疗坏血病。后来，他们遇上了满载柳橙与柠檬的荷兰货船，林德医师就买了柳橙与柠檬来治疗坏血病人，效果非常好。\n- 林德医师再找了些坏血病人，分成两组，吃一样的食物，但有一组病人另外补充了柑橘类水果，结果补充水果的这组，坏血病有明显的改善。\n- 再后来，英国海军开始全面为水兵提供莱姆汁（一种青柠制成的饮品），让船员在大洋上远航时仍能保持健康，最终将英国铸就成了「日不落帝国」。\n\n![](https://raw.githubusercontent.com/slzcn/ab-experiment-kb/main/assets/metric-素材1认识-AB测试课件原件-e921729b.jpg)\n\n## 百年后的 A/B 测试\n\n![](https://raw.githubusercontent.com/slzcn/ab-experiment-kb/main/assets/metric-素材1认识-AB测试课件原件-c6bda0cb.jpg)\n\n![](https://raw.githubusercontent.com/slzcn/ab-experiment-kb/main/assets/metric-素材1认识-AB测试课件原件-756e430a.jpg)\n\n- 今天的 A/B 测试，已经成为一种科学研究中必备的试验方法，在医疗健康、化工农业、信息产业等领域都有重要应用。\n- 它可以利用少量样本对决策进行测试，从而在决策被广泛执行之前准确预测其实施效果。\n- 互联网时代，由于产品的用户主要在线上，试验实施和样本数据采集变得更加方便，从而可以大量进行 A/ B测试，也大大提高了决策的科学性和有效性。\n\n![](https://raw.githubusercontent.com/slzcn/ab-experiment-kb/main/assets/metric-素材1认识-AB测试课件原件-b34743f5.jpg)\n\n## 学习目标\n\nLearning Goals\n\n- 理解 A/B 测试的本质\n- 理解 A/B 测试的核心特性和价值\n- 了解常见的测试目标和测试场景\n\n## 01\n\n什么是 A/B 测试的本质\n\n- CONTENTS\n- 目录\n\n02\n\nA/B 测试的核心特性与价值\n\n常见的测试目标和测试场景\n\n## 什么是 A/B 测试的本质\n\n01 /\n\n## A/B 测试的本质是种【对比手段】\n\n对比手段\n\n对于同一用户群体，通过提供多个不同的方案观察样本数据表现出的差异，来比较这些方案的效果。\n\n## A/B 测试并不是【充分的对比手段】\n\n充分的对比在现实中难以实现\n\n在互联网场景下，我们不可能像提供水果一样，同时给予多套方案让用户自由选取。因此，通常只能将用户群体进行分割。\n\n## A/B 测试的本质是种【小范围随机抽样测试】\n\n小范围随机抽样测试\n\n总体\n\n通过从总体中随机抽取小范围样本，实施不同的策略，并利用样本的数据来推断总体是否存在差异。\n\n- 由样本结论\n- 推断总体结论\n\n抽样\n\n必须小范围抽样的两个原因\n\n- 多套方案不可能同时展现，必然会造成用户的分割。\n- 我们通常期望先通过足够的小样本得到可信结论后再推广给全体。\n\n样本\n\n样本\n\n## 小范围抽样所带来的是可信度的问题\n\n小范围波动几乎不可避免\n\n总体\n\n- 平均身高\n- 168.0 cm\n\n通过小范围随机抽样得到的结果，若和实际总体情况做对比，是存在差异的，体现在数值上便是小范围的数值波动。\n\n随机抽样\n\n样本 1\n\n样本 2\n\n- 平均身高\n- 168.3 cm\n\n- 平均身高\n- 167.5 cm\n\n## A/B 测试的本质\n\nA/B 测试的本质是【基于小范围随机抽样的对比手段】\n\n## A/B 测试的核心特性与价值\n\n  - A/B 测试有什么核心特性？\n  - A/B 测试能带来的价值是什么？\n\n02 /\n\n## 从几个日常工作场景说起\n\n归因难题\n\n- 1. 小王凭着丰富的经验直接修改了产品的页面设计，上线一周后发现指标不升反降，却不知道该不该下线。\n- 2. 小王和小李同时上线了两个产品功能，一周后产品数据有下降，都认为是对方的问题，谁也不肯接锅。\n- 3. 小李辛苦工作一整年，开发了300个功能上线，年终写总结时却写不出在哪些方面贡献了多少的指标提升。\n- … …\n\n## 归因方法：事后通过数据分析归纳原因（后验法）\n\n场景：某销售公司统计当月销售额，发现指标有明显提升，因而通过数据分析定位原因\n\n关键维度观察\n\n常见因素推断\n\n团队 A 持平\n\n团队人数不变\n\n团队 B 提升\n\n没有异常大单\n\n团队 C 持平\n\n新的销售策略\n\n推测为提升原因\n\n## 归因方法：事前通过抽样试验验证原因（先验法）\n\n场景：该销售公司猜测 B 团队的新销售策略可能更加有效，于是在全体团队开展试验进行验证\n\n## A/B 测试的核心特性是先验性\n\n先验性\n\n通过小样本实践得到具有代表性的结论，进而预测全体的情况\n\n## 严谨的实施规范保证 A/B 测试结论可信\n\n要想让结论可信，必须先定位产生错误的源头，尽最大可能进行控制或消除。\n\n## 严谨的实施规范保证 A/B 测试结论可信\n\n由于抽样导致了【不可能完全消除的偏差】，但我们可以通过统计学量化犯错误的概率。\n\n* 统计学根据概率密度曲线可计算出犯错误的概率\n\n## A/B 测试的核心特性是科学性\n\n科学性\n\n- 随机抽样，保证样本特征均匀\n- 控制变量，保证影响因素明确\n- 假设检验，保证决策后果可量化\n\n## A/B 测试带来的价值\n\n- 严格的变量控制，确保基于正确的因果关系进行决策。\n- 量化的决策后果，即使犯错误，我们也可以精确控制影响面\n- 先小范围测试再推广总体，降低决策带来的风险\n\n“事实依据越多，观点就越少。”\n\n## 常见的测试目标和测试场景\n\n  - 产品优化的角度\n  - 增长工作的角度\n  - 增长工作 ≠ 找最优版本\n\n03 /\n\n## 从产品优化的角度看目标和场景\n\n从产品优化的角度看，通常的目标都是为了提升某个具体业务指标（转化率、交易金额、行为次数等）\n\n文案内容\n\n页面布局\n\nUI 设计\n\n运营策略\n\n推荐算法\n\n## 从增长工作的角度看目标和场景\n\n01\n\n02\n\n03\n\n寻找最优方案\n\n建立业务认知\n\n控制潜在风险\n\n为了优化某个业务目标，比如注册转化率，进而针对该目标下的转化页面、激励策略进行试验，找到最优的方案\n\n- 为了找到核心影响因素（产品认知）进行广泛的试验，进而决策后续重点投入/决定放弃的改进方向\n- 总结用户反馈中的某些规律并加以应用，进而改善业务\n\n在小范围测试过程中暴露潜在问题，确认无风险再进行正式的发布\n\n## 增长工作 ≠ 找最优版本：沉淀实践反馈，以灵活应对问题\n\n案例 1 ： 某社区 App 的内容展现样式选型\n\nVS\n\n沉浸流\n\n时间流\n\n![](https://raw.githubusercontent.com/slzcn/ab-experiment-kb/main/assets/metric-素材1认识-AB测试课件原件-0bebce91.png)\n\n## 增长工作 ≠ 找最优版本：建立决策模型，以了解你的用户\n\n案例 2： 电商平台不同品类商品的展示元素\n\n笔记本电脑\n\n奢侈品女装\n\n![](https://raw.githubusercontent.com/slzcn/ab-experiment-kb/main/assets/metric-素材1认识-AB测试课件原件-2cc91cb6.png)\n\n![](https://raw.githubusercontent.com/slzcn/ab-experiment-kb/main/assets/metric-素材1认识-AB测试课件原件-17bf5701.png)\n\n- 决策模型：\n- 款式\n- 价格\n- 品牌\n- 体验\n\n- 决策模型：\n- 核心配置\n- 同类排名\n- 价格区间\n- 折扣（优惠/分期）\n- 定位（工作/游戏）\n- 物流\n\n## 增长工作 ≠ 找最优版本：解决今天的问题，也要解决明天的问题\n\n案例 3： 某金融App，通过文案测试建立写作规范\n\n- •    站在用户的角度思考问题\u000b    •    表述一致\u000b    •    重要信息前置\u000b    •    精简、直接\n- •    … …\n\n- 引导文案\n- 写作原则\n\n![](https://raw.githubusercontent.com/slzcn/ab-experiment-kb/main/assets/metric-素材1认识-AB测试课件原件-f3c9175a.png)\n\n![](https://raw.githubusercontent.com/slzcn/ab-experiment-kb/main/assets/metric-素材1认识-AB测试课件原件-05036b65.png)\n\n测试优化 60 + 引导文案问题\n\n![](https://raw.githubusercontent.com/slzcn/ab-experiment-kb/main/assets/metric-素材1认识-AB测试课件原件-03cecd09.png)\n\n## 课程总结\n\n04 /\n\n## 课程总结\n\n## 感谢聆听，下期再见";</script>

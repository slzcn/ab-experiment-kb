<script>window.DATA_BASE="../";window.INIT_DOC=163135;window.INIT_MD="本文为您介绍在DataTester上使用配置管理功能时必要的基本概念，以及功能使用的通用流程指引，便于新用户快速了解如何使用产品功能。\n\n<span id=\"09580750\"></span>\n# 背景信息\n\n<span id=\"名词解释\"></span>\n## 基本概念\n\nAB实验大家都已经熟悉，此处主要针对FeatureFlag功能使用过程的一些新名词做出解释。为便于理解Feature相关的概念，以下以一个具体的场景为例，为您介绍对应的概念。\n\n示例场景：APP登录这个功能，支持不同的登录方式（微信、QQ、抖音），对APP登录这个功能做功能相关的实验及分析。\n\n\n|**概念** |**详细介绍** |**示例** |\n|---|---|---|\n|Feature |即配置（功能），可通过Feature名称和一个唯一的key来标识这个Feature |* Feature名称：APP登录方式<br><br>* key：app_log_type |\n|变体 |即配置取值，一个Feature可设置多个变体（取值） |* 变体1：1 (微信登录)<br><br>* 变体2：2(QQ登录)<br><br>* 变体3：3(抖音登录) |\n|发布受众 |即生效规则 |安卓用户默认QQ登录、iOS用户默认抖音登录、其他默认微信登录 |\n\n\n<span id=\"ab实验和featureflag的关系\"></span>\n## AB实验和FeatureFlag的关系\n\nAB实验和FeatureFlag是我们打造的适用不同场景的工具：\n\n\n* AB实验用来验证评估不同版本/策略的效果。\n\n* 而FeatureFlag是用来做动态配置、人群定向发布、实验全量等配置下发的工具。\n\n\n\n|**细分** |**详细描述** |\n|---|---|\n|关联性 |* 只需要进行一次产品接入，即可使用AB实验和FeatureFlag<br><br>* 下发链路相同，AB实验可直接固化为FeatureFlag<br><br>* 共用一套请求参数（过滤条件），参数一次注册后均可使用 |\n|区别 |* 两者独立，可同时存在<br><br>   例如，APP登录方式作为常用的动态配置按照线上规则正常下发(比如默认展示QQ登录、微信登录、抖音登录等3种方式供用户选择); 同时可开启一个实验，验证增加一个手机号登录是否有助于提升登录率<br><br>* **若同一个参数既有实验运行中，又有FeatureFlag已全量，遇到冲突时优先级 实验\\>Feature** |\n\n\n<span id=\"af9738f5\"></span>\n# 操作流程指引\n\n\n1. 创建Feature并嵌入代码。\n\n   1. 创建Feature。\n\n      您可以手动创建Feature，操作详情请参见[创建Feature：手动创建](https://www.volcengine.com/docs/6287/66385)，也可以将已创建的实验参数固化为Feature，详情请参见[创建Feature：实验固化/关联](https://www.volcengine.com/docs/6287/65815)。\n\n   2. 嵌入代码代码。\n\n      Feature创建完成后，您需要将Feature相关配置嵌入到业务代码中，详情请参见[嵌入Feature代码](https://www.volcengine.com/docs/6287/164636)。\n\n2. 调试并发布Feature。\n\n   正式发布Feature前，您可以配置白名单用户，用于测试Feature的配置是否符合预期，详情请参见[调试Feature：白名单测试](https://www.volcengine.com/docs/6287/163138)。\n\n3. 管理Feature。\n\n   您可以对Feature的版本、生命周期、权限进行管理操作。";</script>

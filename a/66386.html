<meta property="og:title" content="Feature版本管理">
<meta property="og:description" content="一、功能简介 为方便记录Feature的变更和管理，每次对于Feature重点信息(变体、生效规则等)的变更均会生成新版本(用V1，V2等标识)。 生成的新版本需要发布才会生效 二、如何使用 入口：Feature列表点击">

<script>window.DATA_BASE="../";window.INIT_DOC=66386;window.INIT_MD="<span id=\"一、功能简介\"></span>\n# 一、功能简介\n\n\n* 为方便记录Feature的变更和管理，每次对于Feature重点信息(变体、生效规则等)的变更均会生成新版本(用V1，V2等标识)。\n\n* 生成的新版本需要发布才会生效\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_7343f7c8ff237506d8befe2bf29eb7d6.png) </span>\n\n<span id=\"二、如何使用\"></span>\n# 二、如何使用\n\n\n* 入口：Feature列表点击名称，进入版本列表\n\n* 版本列表分为发布版本和未发布版本\n\n   * 版本列表左侧展示所有的版本列表，可查看各个版本的状态和生效时间、发布流量等\n\n   * 点击某个版本右侧展示该版本的详情(即基本信息、变体和发布受众等)\n\n* 从版本详情页右上角可进行如下操作\n\n   * 创建实验：即使用该Feature创建一个AB实验\n\n   * 发布/回滚：发布即针对该版本做增量发布操作(若发布中/已全量可回滚）；回滚即针对该版本进行回滚操作，（未发布/评审中/已回滚状态无法进行回滚）\n\n   * 禁用：即禁用该版本，禁用后不可编辑、发布该版本，亦不可解禁（未发布/已回滚状态可禁用）\n\n* 版本列表其他功能：\n\n   * 白名单测试：即添加白名单进行测试，可针对发布版本新建白名单\n\n   * 操作日志：可以根据时间查看针对该Feature的操作日志\n\n   * 生命周期管理：\n\n   * 指标监控：\n\n* 版本菜单栏：\n\n   * app选择：可选择不同产品线进行版本详情展示\n\n   * feature状态：\n\n      * 点击关闭后，变体值将不会进行下发，所有流量按照本地默认值生效\n\n      * 点击开启后，在当前Feature的版本列表页选择某个版本进行发布即可\n\n   * 权限设置：\n\n   * 删除：删除后不可恢复；feature状态开启时不可进行删除操作\n\n   * 编辑：点击编辑后跳转到Feature创建页面进行编辑，保存发布后将在当前版本中进行增量发布";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>
<script src="../marked.min.js"></script>
<link rel="stylesheet" href="../app.css?v=97a28a96">
</head>
<body>
<script type="application/json" id="kbdata"></script>
<div class="loading" id="loading"><div class="spin"></div><div class="ld-t">正在加载知识库</div><div class="ld-s">首次加载稍候片刻</div></div>

<div class="app" id="app" style="display:none">
  <div class="mtoggle" id="mtoggle">☰</div>
  <div class="mmask" id="mmask"></div>
  <aside id="aside">
    <div class="brand">
      <h1><span class="logo">AB</span>A/B 实验知识库</h1>
      <p>营销增长中心 · 数据驱动决策手册</p>
    </div>
    <div class="cats" id="cats"></div>
    <div class="write-btn" id="writeBtn">✍ 写新文章</div>
    <a class="admin-link" id="adminLink" href="admin.html">⚙ 管理后台</a>
    <div class="me-entry" id="meEntry"><span class="me-av" id="meAv">👤</span><span class="me-tx" id="meTx">个人空间</span><span class="me-st" id="meSt"></span></div>
    <div class="side-foot" id="sideFoot"></div>
  </aside>

  <main>
    <div class="top">
      <div class="searchbox">
        <span class="si">🔍</span>
        <input id="q" placeholder="搜索实验设计"
          data-ph-prefix="搜索"
          data-ph-kw="实验设计,报告解读,广告投放,假设检验,指标体系,AB通识"
          autocomplete="off">
        <span class="clr" id="clr">✕</span>
      </div>
      <div class="stat" id="stat"></div>
    </div>
    <div class="body" id="listView"></div>
    <div class="body reader-scroll" id="readerView" style="display:none"></div>
  </main>
</div>

<!-- 个人空间面板（前后台共用：登录状态 + 退出入口） -->
<div class="me-mask" id="meMask"></div>
<div class="me-panel" id="mePanel">
  <div class="me-head">
    <span class="me-bigav" id="meBigAv">👤</span>
    <div class="me-info">
      <b id="meName">未登录</b>
      <span id="meStatus">登录后可写文章、进入管理后台</span>
    </div>
    <span class="me-x" id="meClose">✕</span>
  </div>
  <div class="me-acts">
    <a class="me-act" id="meAdmin" href="admin.html"><span>⚙️</span>管理后台</a>
    <button class="me-act" id="meLogin"><span>🔑</span>登录</button>
    <button class="me-act danger" id="meLogout"><span>🚪</span>退出登录</button>
  </div>
</div>

<!-- 写文章访问控制（共用登录门） -->
<div class="login-mask" id="loginMask">
  <div class="login-box">
    <div class="login-ic">🔒</div>
    <h3>需要授权</h3>
    <p>此操作仅限授权用户</p>
    <input id="loginPin" type="password" inputmode="numeric" placeholder="访问码" autocomplete="off">
    <button class="ed-btn" id="loginBtn">进入编辑</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-tip">登录后 2 小时内免再次验证</div>
  </div>
</div>

<!-- 写文章编辑器 -->
<div class="editor-mask" id="editorMask"></div>
<div class="editor" id="editor">
  <div class="ed-head">
    <b>✍ 写新文章</b>
    <span class="ed-close" id="edClose">✕</span>
  </div>
  <div class="ed-body">
    <div class="ed-form">
      <label>标题</label>
      <input id="edTitle" placeholder="例如：双十一大促实验复盘">
      <label>分类</label>
      <select id="edCat"></select>
      <label>检索关键词（选填，空格分隔）</label>
      <input id="edKw" placeholder="复盘 大促 转化率">
      <label>正文（Markdown）</label>
      <textarea id="edMd" placeholder="# 标题&#10;&#10;正文用 Markdown 书写，支持 **加粗**、列表、表格、代码块…&#10;&#10;## 小节&#10;- 要点一&#10;- 要点二"></textarea>
      <div class="ed-actions">
        <button class="ed-btn" id="edSubmit" style="display:none">✓ 发布文章</button>
      </div>
      <div class="ed-hint" id="edHint"></div>
    </div>
    <div class="ed-preview" id="edPrev">
      <div class="ed-prev-tag" id="edPrevTag"></div>
      <h1 id="edPrevTitle" style="margin:8px 0 16px"></h1>
      <div class="md" id="edPrevBody"></div>
    </div>
  </div>
</div>

<!-- 顶部悬浮 toast：发布结果等提示走全站统一规范 -->
<div id="toast"></div>

<script src="../app.js?v=640e650c"></script>
</body>

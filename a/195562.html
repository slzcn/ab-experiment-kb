<script>window.DATA_BASE="../";window.INIT_DOC=195562;window.INIT_MD="<span id=\"_1-安装sdk\"></span>\n# 1. 安装 SDK\n\n<span id=\"_1-1-下载sdk\"></span>\n## 1.1 下载 SDK\n\n当前 SDK 版本：v2.0.27\n\n<Attachment link=\"https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/db3c6551bdf94b0fb707e5b2a6bd7d03~tplv-goo7wpa0wc-image.image\" name=\"datatester-java-sdk-2.0.27.jar\">datatester-java-sdk-2.0.27.jar</Attachment>\n\n\n&nbsp;\n\n<span id=\"_1-2-添加jar包\"></span>\n## 1.2 添加 jar 包\n\n\n1. java 版本需求：Java 8 及更高版本。\n\n2. 导入方式：将 jar 文件添加至项目 Modules。\n\n\n以主流 IDE(IntelliJ IDEA)为例，jar 包添加示例：\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_a41ac6b5214f8e9ba1f51933bcaffe5c.png) </span>\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_009d4740db7e76c34b3ed32087b424fe.png) </span>\n\n<span id=\"_1-3-maven依赖导入\"></span>\n## 1.3 Maven 依赖导入\n\n在成功添加 jar 包后，您需要通过 maven 管理添加必要依赖。\n\n添加依赖方式：将以下代码添加至项目 pom.xml 中\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n\n1. <div data-tips=\"true\" data-tips-type=\"warning\">请务必添加所有必要依赖项。</div>\n\n\n2. <div data-tips=\"true\" data-tips-type=\"warning\">请确保您使用的依赖版本大于或等于 Tester 官方默认版本。</div>\n\n\n3. <div data-tips=\"true\" data-tips-type=\"warning\">请使用当前最新版本，默认修复已有安全漏洞</div>\n\n\n\n```Java\n<dependencies>\n    <dependency>\n        <groupId>com.google.code.gson</groupId>\n        <artifactId>gson</artifactId>\n        <version>2.8.9</version>\n    </dependency>\n\n    <dependency>\n        <groupId>com.alibaba</groupId>\n        <artifactId>fastjson</artifactId>\n        <version>1.2.76</version>\n    </dependency>\n    <dependency>\n        <groupId>com.fasterxml.jackson.core</groupId>\n        <artifactId>jackson-core</artifactId>\n        <version>2.11.4</version>\n    </dependency>\n    <dependency>\n        <groupId>com.fasterxml.jackson.core</groupId>\n        <artifactId>jackson-annotations</artifactId>\n        <version>2.11.4</version>\n    </dependency>\n    <dependency>\n        <groupId>com.fasterxml.jackson.core</groupId>\n        <artifactId>jackson-databind</artifactId>\n        <version>2.11.4</version>\n    </dependency>\n\n    <dependency>\n        <groupId>com.google.guava</groupId>\n        <artifactId>guava</artifactId>\n        <version>27.0.1-jre</version>\n    </dependency>\n    \n    <dependency>\n        <groupId>com.github.zafarkhaja</groupId>\n        <artifactId>java-semver</artifactId>\n        <version>0.9.0</version>\n    </dependency>\n\n    <dependency>\n        <groupId>org.slf4j</groupId>\n        <artifactId>slf4j-api</artifactId>\n        <version>1.7.21</version>\n    </dependency>\n    <dependency>\n        <groupId>org.apache.logging.log4j</groupId>\n        <artifactId>log4j-slf4j-impl</artifactId>\n        <version>2.15.0</version>\n    </dependency>\n    <dependency>\n        <groupId>org.apache.logging.log4j</groupId>\n        <artifactId>log4j-core</artifactId>\n        <version>2.15.0</version>\n    </dependency>\n    <dependency>\n        <groupId>org.apache.logging.log4j</groupId>\n        <artifactId>log4j-api</artifactId>\n        <version>2.15.0</version>\n    </dependency>\n    <dependency>\n        <groupId>com.lmax</groupId>\n        <artifactId>disruptor</artifactId>\n        <version>3.4.2</version>\n    </dependency>\n\n    <dependency>\n        <groupId>org.apache.httpcomponents</groupId>\n        <artifactId>httpclient</artifactId>\n        <version>4.5.8</version>\n    </dependency>\n    <dependency>\n        <groupId>org.apache.httpcomponents.client5</groupId>\n        <artifactId>httpclient5</artifactId>\n        <version>5.0.1</version>\n    </dependency>\n\n    <dependency>\n        <groupId>com.google.protobuf</groupId>\n        <artifactId>protobuf-java</artifactId>\n        <version>2.5.0</version>\n    </dependency>\n    <dependency>\n        <groupId>com.googlecode.protobuf-java-format</groupId>\n        <artifactId>protobuf-java-format</artifactId>\n        <version>1.4</version>\n    </dependency>\n\n</dependencies>\n```\n\n\n<span id=\"b5dc503a\"></span>\n## 1.4 获取数据上送地址\n\n进行数据接入上报时，您需要根据当前的环境类型和端类型确认您的数据上报地址，如果上报地址设置错误，后续会导致您无法查询到上报的数据。\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">请在上报数据前，务必确认您当前使用的环境类型，根据环境类型配置上报地址。查看当前的环境类型请参见<a href=\"https://www.volcengine.com/docs/84129/1261497\">SaaS云原生/非云原生&私有化环境</a>。</div>\n\n\n* <div data-tips=\"true\" data-tips-type=\"warning\">如果您使用的是SaaS\\-云原生环境，您也需确认您的服务所在的地域，（通常您的服务会在华北2\\-北京地域，部分用户可能会使用其他地域）。SaaS\\-云原生用户查看服务所在地域请参见。</div>\n\n\n\n<span id=\"08ed447b\"></span>\n### SaaS\\-云原生 & SaaS\\-非云原生\n\n\n|地址类型 |SaaS\\-云原生环境<br><br>（国内：华北2\\-北京） |SaaS\\-云原生环境<br><br>（海外：亚太东南\\-柔佛） |SaaS\\-非云原生环境 国内环境 |SaaS\\-非云原生 海外BytePlus环境<br><br>（以下 SG 指新加坡） |\n|---|---|---|---|---|\n|数据上报地址 |* SaaS\\-云原生（华北）：<br><br>   https://gator.volces.com |https://gator.uba.ap\\-southeast\\-1.volces.com |无需手动配置 |https://mcs.tobsnssdk.com |\n|分流地址<br><br>（meta信息地址） |https://tab.volces.com |https://tab.ab.ap\\-southeast\\-1.volces.com |无需手动配置 |https://tab.abtest.bytepluses.com |\n\n\n<span id=\"c5ceb591\"></span>\n### 私有化环境\n\n私有化部署场景下，您需要获取部署私有化环境时，自行规划配置的数据上送地址。如您不清楚此地址，请联系您的项目经理或客户成功经理。\n\n<span id=\"_2-代码示例\"></span>\n# 2. 使用示例\n\n<span id=\"34ae6ec6\"></span>\n## 2.1 SaaS\\-云原生\n\n```java\nimport com.bytedance.tester.AbClient;\nimport com.bytedance.tester.model.User;\nimport com.bytedance.tester.model.common.Variable;\nimport com.bytedance.tester.abInfo.UserAbInfoHandler;\nimport com.bytedance.tester.abInfo.MemoryHandler;\nimport java.util.HashMap;\n    \npublic class Example {\n    public static void main(String[] args) {\n        /** 初始化ABTest分流类，appKey获取方式详见接口描述AbClient\n         初始化环境信息，其中：\n         1. appid，appkey为应用的标识，需要替换为真实的appkey和appid\n         2. meta_host: 获取meta信息的地址，各环境各地域的上送地址请参见上文的 获取数据上送地址 章节。\n         3. track_host: 事件上报地址，各环境各地域的上送地址请参见上文的 获取数据上送地址 章节；\n         4. setNewEnv(true):  true: 代表SaaS-云原生环境, false: 代表SaaS-非云原生环境\n        **/\n        AbClient abClient = new AbClient.Builder(\"appkey\", appid).setMetaHost(\"https://tab.volces.com\").setTrackHost(\"https://gator.volces.com\").setNewEnv(true).build();\n        // 开启debug模式，默认打印未命中实验的用户信息\n        abClient.setDebugMode(true); \n        // 声明一个用户，decisionID用于分流，trackID用于事件上报\n        // decisionID: 本地分流用户标识，不用于事件上报，请替换为客户的真实用户标识\n        // trackID:  事件上报用户标识，用于事件上报，请替换为客户的真实用户标识\n        // add: 添加用户属性，仅用于分流，不随埋点上报\n        // build: 生成User对象\n        User user = new User.UserBuilder().create(\"decisionID\", \"trackID\")\n                .setDeviceId(6981329701821561868L) // 可选，非必要\n                .add(\"gender\", \"male\")\n                .add(\"phone\", null)\n                .add(\"is_vip\", false)\n                .add(\"version\", \"1.2.2\")\n                .add(\"age\", 18)\n                .build();\n        \n        // 进组不出组内存实现接口，若用户不配置下列代码，则默认不开启“进组不出组”功能\n        // 持久化存储进组信息，请自行实现 UserAbInfoHandler 接口（推荐）\n        // MemoryHandler为内存存储，仅用于测试，请勿在生产环境使用\n        UserAbInfoHandler memoryHandler = MemoryHandler.getInstance(); \n        abClient.setUserAbInfoHandler(memoryHandler);\n        // 推荐接口\n        String defaultValue = null; // 默认版本值，当分流未命中时返回该值，注意：返回值为包装后的对象，并非defaultValue本身，依然需要使用get方法获取\n        Variable variable1 = abClient.activate(\"variantKey\", user, defaultValue);\n        if(null == variable1) {\n            return;\n        }\n        Object value1 = variable1.getValue();\n        if(null == value1) {\n            return;\n        }\n        if(value1.equals(\"a\")){\n        }\n        else if(value1.equals(\"b\")){\n        }\n    }\n}\n```\n\n\n<span id=\"45ab9cbd\"></span>\n## 2.2 SaaS\\-非云原生(老客)\n\n```Java\nimport com.bytedance.tester.AbClient;\nimport com.bytedance.tester.model.User;\nimport com.bytedance.tester.model.common.Variable;\nimport com.bytedance.tester.abInfo.UserAbInfoHandler;\nimport com.bytedance.tester.abInfo.MemoryHandler;\nimport java.util.HashMap;\n    \npublic class Example {\n    public static void main(String[] args) {\n        // 初始化ABTest分流类，appKey获取方式详见接口描述AbClient\n        AbClient abClient = new AbClient.Builder(\"2b47a1f318d78fd71854815*********\").build();\n        // 开启debug模式，默认打印未命中实验的用户信息\n        abClient.setDebugMode(true); \n        // 声明一个用户，decisionID用于分流，trackID用于事件上报\n        // decisionID: 本地分流用户标识，不用于事件上报，请替换为客户的真实用户标识\n        // trackID:  事件上报用户标识，用于事件上报，请替换为客户的真实用户标识\n        // add: 添加用户属性，仅用于分流，不随埋点上报\n        // build: 生成User对象\n        User user = new User.UserBuilder().create(\"decisionID\", \"trackID\")\n                .setDeviceId(6981329701821561868L) // 可选，非必要\n                .add(\"gender\", \"male\")\n                .add(\"phone\", null)\n                .add(\"is_vip\", false)\n                .add(\"version\", \"1.2.2\")\n                .add(\"age\", 18)\n                .build();\n        \n        // 进组不出组内存实现接口，若用户不配置下列代码，则默认不开启“进组不出组”功能\n        // 持久化存储进组信息，请自行实现 UserAbInfoHandler 接口（推荐）\n        // MemoryHandler为内存存储，仅用于测试，请勿在生产环境使用\n        UserAbInfoHandler memoryHandler = MemoryHandler.getInstance(); \n        abClient.setUserAbInfoHandler(memoryHandler);\n        // 推荐接口\n        String defaultValue = null; // 默认版本值，当分流未命中时返回该值，注意：返回值为包装后的对象，并非defaultValue本身，依然需要使用get方法获取\n        Variable variable1 = abClient.activate(\"variantKey\", user, defaultValue);\n        if(null == variable1) {\n            return;\n        }\n        Object value1 = variable1.getValue();\n        if(null == value1) {\n            return;\n        }\n        if(value1.equals(\"a\")){\n        }\n        else if(value1.equals(\"b\")){\n        }\n    }\n}\n```\n\n\n<span id=\"71b2e441\"></span>\n## 2.3 私有化\n\n```Java\nimport com.bytedance.tester.AbClient;\nimport com.bytedance.tester.model.User;\nimport com.bytedance.tester.model.common.Variable;\nimport com.bytedance.tester.abInfo.UserAbInfoHandler;\nimport com.bytedance.tester.abInfo.MemoryHandler;\nimport java.util.HashMap;\n    \npublic class Example {\n    public static void main(String[] args) {\n        /** 初始化ABTest分流类，appKey获取方式详见接口描述\n         AbClient初始化环境信息，其中：\n         1. meta_host: 获取meta信息的地址，私有化用户按需修改；\n         2. track_host: 事件上报地址，私有化用户按需修改；\n         3.setOnpremise(true): 是否指定上述两个域名，如果指定设为true\n         **/\n         AbClient abClient = new AbClient.Builder(\"2b47a1f318d78fd71854815*********\").setMetaHost(\"xxx\").setTrackHost(\"xxxx\").setOnpremise(true).build();\n        // 开启debug模式，默认打印未命中实验的用户信息\n        abClient.setDebugMode(true); \n        // 声明一个用户，decisionID用于分流，trackID用于事件上报\n        // decisionID: 本地分流用户标识，不用于事件上报，请替换为客户的真实用户标识\n        // trackID:  事件上报用户标识，用于事件上报，请替换为客户的真实用户标识\n        // add: 添加用户属性，仅用于分流，不随埋点上报\n        // build: 生成User对象\n        User user = new User.UserBuilder().create(\"decisionID\", \"trackID\")\n                .setDeviceId(6981329701821561868L) // 可选，非必要\n                .add(\"gender\", \"male\")\n                .add(\"phone\", null)\n                .add(\"is_vip\", false)\n                .add(\"version\", \"1.2.2\")\n                .add(\"age\", 18)\n                .build();\n        // 进组不出组内存实现接口，若用户不配置下列代码，则默认不开启“进组不出组”功能\n        // 持久化存储进组信息，请自行实现 UserAbInfoHandler 接口（推荐）\n        // MemoryHandler为内存存储，仅用于测试，请勿在生产环境使用\n        UserAbInfoHandler memoryHandler = MemoryHandler.getInstance(); \n        abClient.setUserAbInfoHandler(memoryHandler);\n        // 推荐接口\n        String defaultValue = null; // 默认版本值，当分流未命中时返回该值，注意：返回值为包装后的对象，并非defaultValue本身，依然需要使用get方法获取\n        Variable variable1 = abClient.activate(\"variantKey\", user, defaultValue);\n        if(null == variable1) {\n            return;\n        }\n        Object value1 = variable1.getValue();\n        if(null == value1) {\n            return;\n        }\n        if(value1.equals(\"a\")){\n        }\n        else if(value1.equals(\"b\")){\n        }\n    }\n}\n```\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">私有化环境中，如果您希望使用用户分群作为受众条件，则可以在初始化<code>new AbClient</code>中增加<code>.setCohortClient(new HttpCohortClient(app_id, metaHost))</code>的配置。</div>\n\n\n<span id=\"_3-核心类介绍\"></span>\n# 3. 核心类介绍\n\n<span id=\"_3-1-user\"></span>\n## 3.1 User\n\n**描述：**  用户对象，用于表明分流用户的详细属性\n\n**使用方式：**  用分流接口时作为入参，使用方式如下所示\n\n```java\n// 首先通过Builder类创建用户对象，trackId为缺省值，允许为空\nUser.UserBuilder userBuilder = new User.UserBuilder().create(\"decisionId\", \"trackId\");\n// 填充deviceid，用于绑定尚未生成uuid的用户（可选）\nuserBuilder.setDeviceId(6981329701821561868L);\n// 向Builder中填充用户属性\nuserBuilder.add(\"age\", 18);\nuserBuilder.add(\"name\", \"小明\");\nuserBuilder.add(\"is_vip\", true);\n// 生成User对象\nUser user = userBuilder.build();\n```\n\n\n<span id=\"_3-2-variable\"></span>\n## 3.2 Variable\n\n**描述：**  变体对象，用于表明分流结果的详细属性\n\n**使用方式：**  分流接口的返回对象基本类，使用方式如下所示\n\n```java\nString vid = variable.vid; // 变体的ID\nString type = variable.type; // 变体值的数据类型，与Tester平台配置保持一致\n// 通用方法，获取Object对象，具体数据类型需要用户自行判断\nObject o = variable.getValue();\n// 精确数据类型\nString vStr = variable.getString(); // 非字符串类型默认返回null\nint vInt = variable.getInteger(); // 非int类型默认返回0\ndouble vDouble = variable.getDouble(); // 非double类型默认返回0.0\nboolean vBoolean = variable.getBoolean(); // 非boolean类型默认返回false\n```\n\n\n<span id=\"_3-3-userabinfohandler\"></span>\n## 3.3 UserAbInfoHandler\n\n描述：进组不出组接口\n\n接口内容：\n\n```java\npublic interface UserAbInfoHandler {\n    /**\n          * 获取进组信息\n          *  @param decisionId 用户分流ID\n          *  @return key:实验ID  value:进组的变体ID\n          */\n    HashMap<String, String> query(String decisionId);\n\n    /**\n          * 更新进组信息\n          *  @param decisionId 用户分流ID\n          *  @param abInfo 用户进组信息，<experimentID, versionID>\n          *  @return 是否成功更新\n          */\n    boolean createOrUpdate(String decisionId, HashMap<String, String> abInfo);\n}\n```\n\n\n使用方式：\n\n\n1. 初始化AbClient 时 不指定UserAbInfoHandler，则默认使用空实现，不启用“进组不出组”功能。\n\n2. 初始化AbClient时 执行setUserAbInfoHandler，使用默认提供的内存实现MemoryHandler（使用方式见代码示例）。\n\n3. 继承UserAbInfoHandler接口，自行实现持久化存储；初始化A bClient时 通过setUserAbInfoHandler传 入。\n\n\n<span id=\"_3-4-性能参数（私有化专用）\"></span>\n## 3.4 性能参数（私有化专用）\n\nAbClient.eventDispatcher.properties\n\n```java\nAbClient abClient = new AbClient.Builder(\"appKey\").setMetaHost(\"MetaHost\").setTrackHost(\"TrackHost\").setOnpremise(true).build();\nabClient.setThreadCount(4);\nabClient.setQueueSize(102400);\n```\n\n\n<span id=\"_4-接口说明\"></span>\n# 4. 接口说明\n\n<span id=\"_4-1-abclient\"></span>\n## 4.1 AbClient\n\n**接口：** \n\nnew AbClient.Builder(String appKey).setMetaHost(String metaHost).setTrackHost(String trackHost).setOnpremise(boolean isOnpremise).build();\n\n**描述：初始化**ABTest分流类。\n\n**参数：** \n\n\n* appKey：表明您的Tester应用。出于安全考虑，此处请使用appKey而非appID表明您的应用。\n\n   在集团中接入一个应用后，您可以在集团相关页面查看应用的AppKey等信息，详情请参考：[如何创建应用](https://www.volcengine.com/docs/6287/66984)。\n\n   * SaaS\\-云原生\n\n      <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/eba094f44e174faea6c7cdcdc7447d2d~tplv-goo7wpa0wc-image.image) </span>\n\n   * SaaS\\-非云原生\n\n      <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b55e61ee067544deaff4939685d1475c~tplv-goo7wpa0wc-image.image) </span>\n\n* metaHost ：填写获取实验元信息的地址，默认为SaaS\\-非云原生国内线上地址，其他环境参考上文2 .1~2.3。海外Saas域 名：MetaHost.SG\n\n* trackHost ：填写事件上报的地址，默认为SaaS\\-非云原生国内线上地址，其他环境参考上文2 .1~2.3。海外Saas域 名：TrackHost.SG\n\n* isOnpremise(default=false)：表明您的应用是否需要额外配置metaHost和 trackHost\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">1、请尽早初始化 AbClient，以免影响您的分流服务和埋点上报服务。</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">2、每个应用有且仅有一个分流类 AbClient，请确保它在所有线程中的唯一性。</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">\n---\n\n</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">Meta 元信息服务默认使用火山引擎 A/B 平台国内线上地址，请谨慎修改。saas 合法地址请参考代码中 MetaHost 枚举类。私有化客户需修改为部署时 AB 服务的挂载域名。</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">\n---\n\n</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">埋点上报服务默认使用火山引擎 A/B 平台国内线上地址，请谨慎修改。saas 合法地址请参考代码中 TrackHost 枚举类。私有化客户需修改为部署时 AppLog 服务的挂载域名。</div>\n\n\n<span id=\"_4-2-activate\"></span>\n## 4.2 activate\n\n**接口：**  Variable activate(String variantKey, User user, Object defaultValue)\n\n**描述：**  获取特定key的分流结果，并上报曝光事件\n\n**参数：** \n\nvariantKey：变体的key\n\nuser：用户对象\n\ndefaultValue：变体默认值\n\n**返回值：**  该数返回命中变体对象，未命中时返回默认值对象\n\n```java\npublic class Variable {\n    String vid; // 变体id\n    Object val; // 变体值\n    String type; // 变体值的数据类型\n}\n```\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n\n1. <div data-tips=\"true\" data-tips-type=\"tip\">该接口与所有含有“WithImpression”字样的接口均会自动上报曝光事件，用户可在 AbClient 初始化时指定 trackHost，调整事件上报地址。</div>\n\n\n2. <div data-tips=\"true\" data-tips-type=\"tip\">事件上报接口请务必填写User中trackID字段，否则上报失效。</div>\n\n\n\n<span id=\"_4-3-getabinfo\"></span>\n## 4.3 getABInfo\n\n**接口：**  HashMap<String, Variable\\> getABInfo(User user)\n\n**描述：**  获取实验和feature的分流结果\n\n**参数：** \n\nuser：用户对象\n\n**返回值：**  该数返回命中变体的Map对象 ，具体格式如下所示\n\n```json\n{\n  \"key1\": {\n    \"vid\": \"123\",\n    \"value\": \"v1\",\n    \"type\": \"string\"\n  },\n  \"key2\": {\n    \"vid\": \"456\",\n    \"value\": false,\n    \"type\": \"boolean\" \n  },\n  \"key3\": {\n    \"vid\": \"789\",\n    \"value\": 123.45,\n    \"type\": \"double\" \n  }   \n}\n```\n\n\n<span id=\"_4-4-getexperimentvariantname\"></span>\n## 4.4 getExperimentVariantName\n\n**接口：**  String getExperimentVariantName(String experimentId, User user)\n\n**描述：**  获取用户命中的实验版本名称\n\n**参数：** \n\nexperimentId：指定分流的实验ID\n\nuser：用户对象\n\n**返回值：**  该数返回用户命中的实验版本名称\n\n<span id=\"_4-5-getexperimentconfigs\"></span>\n## 4.5 getExperimentConfigs\n\n**接口：**  HashMap<String, Variable\\> getExperimentConfigs(String experimentId, User user)\n\n**描述：**  获取用户命中的特定实验的变体详情\n\n**参数：** \n\nexperimentId：指定分流的实验ID\n\nuser：用户对象\n\n**返回值：** \n\n该数返回命中变体的Ma p对象 ，表明用户命中某个实验的变体详情，通常仅能命中一个变体。\n\n<span id=\"_4-6-getallexperimentconfigs\"></span>\n## 4.6 getAllExperimentConfigs\n\n**接口：**  HashMap<String, Variable\\> getAllExperimentConfigs(User user)\n\n**描述：**  获取用户命中的所有实验的变体详情\n\n**参数：** \n\nuser：用户对象\n\n**返回值：** \n\n该数返回命中变体的Ma p对象 ，表明用户命中所有实验的变体详情，通常命中多个变体。\n\n<span id=\"_4-7-getfeatureconfigs\"></span>\n## 4.7 getFeatureConfigs\n\n**接口：**  HashMap<String, Variable\\> getFeatureConfigs(String featureId, User user)\n\n**描述：**  获取用户命中的特定feature的变体详情\n\n**参数：** \n\nfeatureId：feature ID\n\nuser：用户对象\n\n**返回值：** \n\n返回命中变体的Map对象 ，表明用户命中某个f ature的变体详情，通常仅能命中一个变体。\n\n<span id=\"_4-8-getallfeatureconfigs\"></span>\n## 4.8 getAllFeatureConfigs\n\n**接口：**  HashMap<String, Variable\\> getAllFeatureConfigs(User user)\n\n**描述：**  获用户命中的所有feature的变体详情\n\n**参数：** \n\nuser：用户对象\n\n**返回值：**  返回命中变体的Map对象 ，表明用户命中所有feature的变体详情，通常命中多个变体。\n\n<span id=\"_4-9-getexperimentvariantnamewithimpression\"></span>\n## 4.9 getExperimentVariantNameWithImpression\n\n功能同接口“getExperimentVariantName”（此接口上报曝光事件）\n\n<span id=\"_4-10-getexperimentconfigswithimpression\"></span>\n## 4.10 getExperimentConfigsWithImpression\n\n功能同接口“getExperimentConfigs”（此接口上报曝光事件）\n\n<span id=\"_4-11-getfeatureconfigswithimpression\"></span>\n## 4.11 getFeatureConfigsWithImpression\n\n功能同接口“getFeatureConfigs”（此接口上报曝光事件）\n\n<span id=\"_4-12-setinterval\"></span>\n## 4.12 setInterval\n\n**接口：**  void setInterval(int n)\n\n**描述：**  设置meta元信息更新的时间间隔\n\n**参数：** \n\nn：元信息自动更新时间间隔（单位：秒）\n\n<span id=\"_4-13-setthreadcount\"></span>\n## 4.13 setThreadCount\n\n**接口：**  void setThreadCount(int n)\n\n**描述：**  设置埋点上报服务的最大线程数\n\n**参数：** \n\nn：最大线程数（默认为4）\n\n<span id=\"_4-14-getsuccessevents\"></span>\n## 4.14 getSuccessEvents\n\n**接口：**  int getSuccessEvents()\n\n**描述：**  获上报成功的事件数，用于监测事件上报回调结果\n\n**返回值：**  上成功的事件数\n\n**注意：**  私化版本不支持回调函数\n\n<span id=\"_4-15-getfailevents\"></span>\n## 4.15 getFailEvents\n\n**接口：**  int getFailEvents()\n\n**描述：**  获上报失败的事件数，用于监测事件上报回调结果\n\n**返回值：**  上报失败的事件数\n\n<span id=\"_4-16-getqueueevents\"></span>\n## 4.16 getQueueEvents\n\n**接口：**  int getQueueEvents()\n\n**描述：**  获线程池中剩余事件数，用于监测尚未上报的事件数量\n\n**返回值：**  尚未上报的事件数\n\n<span id=\"_4-17-logger\"></span>\n## 4.17 Logger\n\nABTest服务端SDK使用文件记录log日志 。如果您希望修改日志配置，请编辑文件log4j2.xml，默认的log地址 为./logs\n\n<span id=\"_5-常见问题处理\"></span>\n# 5. 常见问题处理\n\n<span id=\"如何使用redis实现进组不出组逻辑？\"></span>\n## **如何使用Redis实现** **进组不出组逻辑？** \n\n请参考集成示例，redis实现\n\n```java\n/**\n  * 实现 UserAbInfoHandler接口，并实现接口中声明的方法\n  * 进组不出组，Redis实现。\n  */\npublic class NotOutGroupRedisImplement implements UserAbInfoHandler {\n    /**\n          * 存储分流结果\n          *  @param userId   用户ID\n          *  @param hashMap  分流结果参数和值，key=分流参数，value=对应版本的标识\n          *  @return\n     */\n    @Override\n    public boolean createOrUpdate(String userId, HashMap<String, String> hashMap) {\n        long res = 0 ;\n        for (Map.Entry<String, String> entry : hashMap.entrySet()) {\n             res = JedisUtils.getJedis().hset(userId, entry.getKey(), entry.getValue());\n        }\n        return res > 0 ;\n    }\n    /**\n          * 查询用户对应的分组\n          *  @param userId\n          *  @return 用户对应的分流结果  key=分流参数，value=对应版本的标识\n          */\n    @Override\n    public HashMap<String, String> query(String userId) {\n        Map<String, String> resMap = JedisUtils.getJedis().hgetAll(userId);\n        return (HashMap<String, String>) resMap;\n    }\n}\n```\n\n\n在AB分流代码中配置进组不出组的逻辑\n\n```java\nAbClient abClient = new AbClient.Builder(appKey).build();\nNotOutGroupRedisImplement notOutGroupHandler = new NotOutGroupRedisImplement();\nabClient.setUserAbInfoHandler(notOutGroupHandler);\nVariable variable1 = abClient.activate(\"variantKey\", user, defaultValue);\n```\n\n\n<span id=\"f5351ff9\"></span>\n## 如果获取不到 uuid，或者想做匿名用户的服务端实验，如何设置？\n\n用户类中的 `decisionId` 需要使用用户唯一标识，例如客户端设备 ID、SSID 等；`trackId` 用于事件上报，如果用户已登录，设置为对应的实名用户 ID，如果是匿名用户，设置为空字符串 `\"\"`。\n\n匿名用户需要额外设置可关联的设备标识，通常按以下规则选择：\n\n\n|场景 |推荐配置 |是否使用 anonymousId |\n|---|---|---|\n|私有化环境 App 端匿名用户，且有 long 类型设备 ID |`setDeviceId` |不使用 |\n|Web 及小程序匿名用户，且有 long 类型 webId |`setWebId` |不使用 |\n|SaaS\\-非云原生环境匿名用户 |`setBdDid` |不使用 |\n|匿名标识是客户自定义字符串，无法使用 long 类型的 `deviceId` / `webId` 表达，且处于私有化或火山云新环境曝光上报场景 |`setAnonymousId` |使用 |\n\n\n注意：\n\n\n* `decisionId` 用于分流，请设置为稳定的用户唯一标识。\n\n* `trackId` 用于事件上报。匿名用户没有实名 ID 时，建议设置为空字符串 `\"\"`。\n\n* 如果已有可用的 `deviceId`、`webId` 或 SaaS 场景下的 `bdDid`，优先使用这些字段。\n\n* `anonymousId` 是 `deviceId` / `webId` / `bdDid` 之外的补充方案。\n\n\n常规匿名用户配置示例：\n\n```Java\nUser user = new User.UserBuilder().create(\"decisionID\", \"\") // trackId有值设置对应的值，没有值设置空字符串\n        .setDeviceId(6981329701821561868L) // 私有化App端使用此方法\n        .setWebId(7018215618686981329L) // Web及小程序使用此方法\n        .setBdDid(\"H5PPHTEHXLMEGCGROGLY2343242M2LMFIMQE4VIRW76HKYWH4Q01\") // SaaS-非云原生环境使用此方法\n        .build();\n```\n\n\n<span id=\"4f71123d\"></span>\n### 使用 anonymousId 上报匿名用户事件\n\n如果客户侧匿名 ID 是字符串类型，例如自定义匿名 ID、三方匿名 ID 等，无法放入 `deviceId` / `webId` 这类 long 类型字段，可以通过 `anonymousId` 进行匿名用户识别。\n\n使用 `anonymousId` 时，请将 `trackId` 设置为空字符串 `\"\"`，并通过 `setAnonymousId` 设置匿名 ID。用户登录后，如果希望登录实名之后的行为能和匿名之前的行为关联起来，需要继续带上同一个 `anonymousId`，同时把 `trackId` 设置为登录后的实名用户 ID。\n\n注意：\n\n\n* `anonymousId` 适用于私有化/火山云新环境曝光上报场景。\n\n* SaaS\\-非云原生环境匿名用户请使用 `setBdDid`，不使用 `setAnonymousId`。\n\n* 初始化 `AbClient` 时需要配置正确的 `metaHost` 和 `trackHost`。\n\n* 调用 `activate` 或其他带有 `WithImpression` 的接口时，SDK 会自动上报曝光事件。\n\n* 匿名用户场景下，`decisionId` 仍用于分流；`trackId` 用于事件上报，匿名时建议设置为空字符串。\n\n\n<span id=\"5822057b\"></span>\n### anonymousId 匿名用户曝光上报示例\n\n```Java\nimport com.bytedance.tester.AbClient;\nimport com.bytedance.tester.model.User;\nimport com.bytedance.tester.model.common.Variable;\n\npublic class AnonymousIdExample {\n    public static void main(String[] args) {\n        int appId = 123456;\n        AbClient abClient = new AbClient.Builder(\"appKey\", appId)\n                .setMetaHost(\"https://tab.volces.com\")\n                .setTrackHost(\"https://gator.volces.com\")\n                .setNewEnv(true)\n                .build();\n\n        User anonymousUser = new User.UserBuilder()\n                .create(\"anonymous-decision-id\", \"\")\n                .setAnonymousId(\"anonymous-id-001\")\n                .add(\"version\", \"1.2.2\")\n                .build();\n\n        String defaultValue = null;\n        Variable variable = abClient.activate(\"variantKey\", anonymousUser, defaultValue);\n        if (variable == null) {\n            return;\n        }\n\n        Object value = variable.getValue();\n        // 根据业务逻辑使用分流结果 value\n    }\n}\n```\n\n\n<span id=\"0ec38bfa\"></span>\n### anonymousId 匿名转实名关联示例\n\n用户登录后，如果希望实名之后的行为与匿名之前的行为关联，需要在设置实名 `trackId` 的同时，继续带上匿名阶段使用的同一个 `anonymousId`。\n\n```Java\nimport com.bytedance.tester.AbClient;\nimport com.bytedance.tester.model.User;\nimport com.bytedance.tester.model.common.Variable;\n\npublic class AnonymousToLoginExample {\n    public static void main(String[] args) {\n        int appId = 123456;\n        AbClient abClient = new AbClient.Builder(\"appKey\", appId)\n                .setMetaHost(\"https://tab.volces.com\")\n                .setTrackHost(\"https://gator.volces.com\")\n                .setNewEnv(true)\n                .build();\n\n        User loginUser = new User.UserBuilder()\n                .create(\"login-decision-id\", \"login-user-id\")\n                .setAnonymousId(\"anonymous-id-001\")\n                .build();\n\n        Variable variable = abClient.activate(\"variantKey\", loginUser, null);\n        if (variable == null) {\n            return;\n        }\n\n        Object value = variable.getValue();\n        // 登录后的曝光事件会携带 login-user-id 和 anonymous-id-001\n    }\n}\n```";</script>

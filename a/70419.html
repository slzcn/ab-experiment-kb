<script>window.DATA_BASE="../";window.INIT_DOC=70419;window.INIT_MD="为帮助使用【增长营销套件SDK】 的开发者和运营者（以下简称“您”）在符合相关法律法规、政策及标准的规定下开展第三方 SDK 业务，更好地落实用户个人信息保护相关要求，同时，也便于您更清楚地理解增长营销套件数据业务的合规性和已采用的安全保护技术能力，特别是保护个人信息和隐私的方法和措施， 作为【增长营销套件SDK】的提供方，**北京火山引擎科技有限公司**（以下简称“ 火山引擎 ”或“我们”） ，我们特制定《增长营销套件SDK开发者使用合规规范》（以下称“本合规规范”），便于您使用增长营销套件SDK过程中符合相应的合规要求。\n\n<span id=\"2829b33b\"></span>\n### **一、开发者个人信息保护的合规要求**\n\n以下内容主要针对您在使用【增长营销套件SDK】的过程中，有关个人信息采集使用的重点合规要求的解读。\n\n<span id=\"a14d829f\"></span>\n#### **1、SDK业务功能及可选信息配置说明**\n\n<span id=\"16988ea0\"></span>\n##### **1.1业务功能配置说明**\n\n\n* **基本功能**：【**增长营销套件SDK**】的基本业务功能为**增长营销技术服务**。\n\n* **扩展功能**：（1）广告监测（Tracer），是增长分析（Datafinder）的增值服务；（2）设备安全（反作弊），是广告监测（Tracer）的子功能模块。关于扩展功能的配置方式详见：\n\n\n\n|扩展功能 |配置方式 |\n|---|---|\n|广告监测（Tracer） |[广告监测（Tracer）作为增长分析（Datafinder）增值服务，在开通后，需在SDK初始化时，启用延迟深度链接，config.enableDeferredALink()](https://www.volcengine.com/docs/84129/1261604#_1-1-3-sdk%E9%9B%86%E6%88%90) |\n|设备安全（反作弊） |反作弊功能作为广告监测（Tracer）的子功能模块，配置项为config.setMetaSecEnabled(false) 。该模块于2023年9月已不再对新/老用户提供产品服务，存量老用户使用该模块不再维护更新。 |\n\n\n**接入说明**：SDK初始化不会获取个人信息。请务必在用户同意您App中的隐私政策后，再进行增长营销套件SDK的初始化； 用户同意隐私政策之前，避免动态申请涉及用户个人信息的敏感设备权限； 用户同意隐私政策前，您应避免私自采集和上报个人信息。当您的App未向用户提供服务时，例如App在后台运行时，请勿请求增长营销套件SDK的相关服务。具体的初始化时机可以详细查阅相关接入文档的内容。\\*\\*具体接入文档链接：\\*\\*https://www.volcengine.com/docs/6285/101647（含IOS、Android 、Web/JS、小程序）\n\n<span id=\"29317c6b\"></span>\n##### **1.2信息采集**\n\n **【必要信息】增长营销套件** **SDK** **合作所需的基础信息**\n\n\n| |**功能描述** |**个人信息采集类型与字段** |**收集目的** |\n|---|---|---|---|\n|Android端 |增长营销技术服务 |宿主app（即开发者app）自身进程信息 |用户数据分析，判断当前进程是否为主进程 |\n|||操作系统api版本（系统属性） |数据分析需要，区分不同设备系统版本 |\n|iOS端 ||手机系统重启时间 |数据分析需要 |\n|||磁盘总空间 |数据分析需要 |\n|||系统总内存空间 |数据分析需要 |\n|||越狱状态 |数据分析需要 |\n|||IDFV |用于数据分析，服务端根据设备识别码生成设备唯一标识ID |\n|||屏幕分辨率 |数据分析需要 |\n|||CPU信息 |数据分析需要 |\n|Harmony端 ||应用匿名标识符（AAID） |用于数据分析，服务端根据设备识别码生成设备唯一标识ID |\n|||开放设备标识符（ODID） |用于数据分析，服务端根据设备识别码生成设备唯一标识ID |\n|||应用安装时间 |数据分析需要 |\n|||应用更新时间 |数据分析需要 |\n|||屏幕分辨率 |数据分析需要 |\n|||CPU信息 |数据分析需要 |\n|Android、iOS、Harmony端 ||应用信息 ：开发者应用名、应用包名、版本号等信息 |数据分析需要 |\n|||其他信息： 设备时区 |数据分析、AB测试 |\n|||系统国家/区域信息 |数据分析需要 |\n|||系统语言 |数据分析需要 |\n|||网络访问模式 |数据分析需要 |\n|||应用发布渠道 |数据分析需要 |\n|||MCC移动国家码 |数据分析需要 |\n|||MNC移动网络码 |数据分析需要 |\n|||应用内语言 |数据分析需要 |\n|||应用内地区/国家 |数据分析需要 |\n|||设备品牌 |数据分析需要，区分不同设备品牌 |\n|||设备型号 |数据分析需要，区分不同设备型号 |\n|||操作系统 |数据分析需要，区分不同设备系统版本 |\n|小程序端 ||设备品牌 |数据分析需要 |\n|||设备型号 |数据分析需要 |\n|||客户端系统 |数据分析需要 |\n|||客户端/操作系统版本 |数据分析需要 |\n|||屏幕宽度 |数据分析需要 |\n|||屏幕高度 |数据分析需要 |\n|||网络类型 |数据分析需要 |\n|||系统语言 |数据分析需要 |\n|web端 ||浏览器型号 |数据分析需要，区分不同浏览器 |\n|||浏览器版本 |数据分析需要 |\n|||设备型号 |数据分析需要，区分不同设备 |\n|||操作系统 |数据分析需要，区分不同设备操作系统 |\n|||操作系统版本 |数据分析需要 |\n|||设备屏幕宽高 |数据分析需要 |\n|||时区 |数据分析需要 |\n|||浏览器系统语言 |数据分析需要 |\n\n\n **【可选信息】您可以基于数据分析目的，选择是否使用增长营销套件** **SDK** **获取**\n\n\n| |功能描述 |个人信息采集类型与字段 |收集目的 |\n|---|---|---|---|\n|Android端 |增长营销技术服务 |设备的mac地址 |用于数据分析，服务端根据设备识别码生成设备唯一标识ID |\n|||oaid |数据分析，跨APP标识设备 |\n|||设备MEID |用于数据分析，服务端根据设备识别码生成设备唯一标识ID |\n|||设备ICCID |用于数据分析，服务端根据设备识别码生成设备唯一标识ID |\n|||设备IMEI |用于数据分析，服务端根据设备识别码生成设备唯一标识ID |\n|||Android ID |数据分析需要，服务端根据设备识别码生成设备唯一标识ID |\n|||运营商信息 |数据分析需要 |\n|||设备硬件序列号 |用于数据分析，服务端根据设备识别码生成设备唯一标识ID |\n|||google advertising ID (GAID) |数据分析需要 |\n|||屏幕密度 |数据分析需要 |\n|||屏幕分辨率 |数据分析需要 |\n|||CPU信息 |数据分析需要 |\n|iOS端 ||IDFA |用于数据分析，服务端根据设备识别码生成设备唯一标识ID |\n|Harmony端 ||广告标识符（OAID） |用于数据分析，服务端根据设备识别码生成设备唯一标识ID |\n|||运营商信息 |数据分析需要 |\n|Android、IOS端 ||剪切板信息 |广告归因分析 |\n|||精确地理位置信息 |数据分析需要 |\n\n\n**SDK可选个人信息的配置说明**\n\nSDK不同版本获取的字段信息会有差异，为了保证终端用户的安全和服务的可行性，火山引擎会不断更新SDK版本以提升安全性，SDK版本更新火山引擎会向您以发送站内信等方式告知，请您及时更新SDK版本，因更新不及时产生的任何问题，由您自行解决并承担全部责任。\n\n\n|个人信息采集字段 |配置方式 |\n|---|---|\n|设备的mac地址 |[如需将设备的 MAC 地址采集关闭可将config.setMacEnable设置为false](https://www.volcengine.com/docs/84129/1261741#_3-3-%E5%85%B3%E9%97%AD-mac-%E5%9C%B0%E5%9D%80%E9%87%87%E9%9B%86) |\n|oaid |[如需将设备 OAID 信息采集关闭可将config.setOaidEnabled设置为false](https://www.volcengine.com/docs/84129/1261741#_3-5-%E5%85%B3%E9%97%AD-oaid-%E9%87%87%E9%9B%86) |\n|设备IMEI/MEID |[如需将设备 IMEI 地址采集关闭可将config.setImeiEnable设置为false](https://www.volcengine.com/docs/84129/1261741#_3-4-%E5%85%B3%E9%97%AD%E8%AE%BE%E5%A4%87-imei-meid-%E9%87%87%E9%9B%86) |\n|设备ICCID |[如需将设备 ICCID 采集关闭可将config.setIccIdEnabled设置为false](https://www.volcengine.com/docs/84129/1261741#_3-7-%E5%85%B3%E9%97%AD-iccid-%E9%87%87%E9%9B%86) |\n|Android ID |[如需将设备 Android ID 采集关闭可将config.setAndroidIdEnabled设置为false](https://www.volcengine.com/docs/84129/1261741#_3-6-%E5%85%B3%E9%97%AD-android-id-%E9%87%87%E9%9B%86) |\n|运营商信息（MCC、MNC） |[如需将设备运营商信息采集关闭可将config.setOperatorInfoEnabled设置为false](https://www.volcengine.com/docs/84129/1261741#_3-10-%E5%85%B3%E9%97%AD%E8%BF%90%E8%90%A5%E5%95%86%E4%BF%A1%E6%81%AF%E9%87%87%E9%9B%86) |\n|设备硬件序列号 |[如需将设备 SN 采集关闭可将config.setSerialNumberEnable设置为false](https://www.volcengine.com/docs/84129/1261741#_3-8-%E5%85%B3%E9%97%AD-sn%EF%BC%88%E7%A1%AC%E4%BB%B6%E5%BA%8F%E5%88%97%E5%8F%B7%EF%BC%89-%E9%87%87%E9%9B%86) |\n|google advertising ID (GAID) |[如需将设备 GAID 采集关闭可将config.setGaidEnabled设置为false](https://www.volcengine.com/docs/84129/1261741#_3-9-%E5%85%B3%E9%97%AD-gaid-%E9%87%87%E9%9B%86) |\n|IDFA |[设备IDFA的采集通过Unique子库完成。引入Unique子库即开启采集，移除Unique子库即关闭采集。](https://www.volcengine.com/docs/84129/1261736#_4-8-%E5%85%B3%E9%97%AD%E8%AE%BE%E5%A4%87idfa%E9%87%87%E9%9B%86) |\n|屏幕分辨率/密度 |[如需将设备屏幕分辨率 / 屏幕密度采集关闭可将config.setDisplayDensityAndDpiEnabled设置为false](https://www.volcengine.com/docs/84129/1261741#_3-13-%E5%85%B3%E9%97%AD%E5%B1%8F%E5%B9%95%E5%88%86%E8%BE%A8%E7%8E%87-%E5%B1%8F%E5%B9%95%E5%AF%86%E5%BA%A6%E9%87%87%E9%9B%86) |\n|CPU信息 |[如需将设备 CPU 架构采集关闭可将config.setCPUAbiEnabled设置为false](https://www.volcengine.com/docs/84129/1261741#_3-12-%E5%85%B3%E9%97%AD-cpu-%E6%9E%B6%E6%9E%84%E9%87%87%E9%9B%86) |\n|剪切板信息 |[Android端如需将剪切版访问关闭可将AppLog.setClipboardEnabled设置为false](https://www.volcengine.com/docs/84129/1261741#_3-11-%E7%A7%BB%E9%99%A4%E5%89%AA%E5%88%87%E6%9D%BF%E8%AE%BF%E9%97%AE%E4%BB%A3%E7%A0%81)<br><br>[iOS端如需将剪切版访问关闭可将config.enableDeferredALink设置为NO](https://www.volcengine.com/docs/84129/1261736#_4-12-%E5%85%B3%E9%97%AD%E5%89%AA%E5%88%87%E6%9D%BF%E9%87%87%E9%9B%86) |\n|精确地理位置信息 |[iOS端如需采集，请引入 Location 子库](https://www.volcengine.com/docs/84129/1261736#_4-10-%E8%AE%BE%E7%BD%AEgps%E5%9D%90%E6%A0%87)<br><br>```Plain```<br>```pod 'RangersAppLog', 'SDK-VERSION',```<br>``` :subspecs => [```<br>``` 'Location', #GPS采集```<br>``` ]```<br><br><br>[Android端如需采集，需要手动上传 GPS 坐标信息，示例：](https://www.volcengine.com/docs/84129/1261741#_3-12-%E5%85%B3%E9%97%AD-cpu-%E6%9E%B6%E6%9E%84%E9%87%87%E9%9B%86)<br><br>`AppLog.setGPSLocation(18.00f, 18.00f, GeoCoordinateSystemConst.WGS84)` |\n\n\n<span id=\"f3660c69\"></span>\n##### 1.3权限申请\n\n**增长营销套件 Android 端 SDK 还将向终端用户请求如下权限：** \n\n **【必要权限】增长营销套件SDK合作所需的基础权限**\n\n\n| |**权限** |**说明** |**收集目的与时机** |\n|---|---|---|---|\n|Android端 |android.permission.INTERNET |发送网络请求 |注册、上报埋点、归因、激活等：上报埋点数据到远程服务器 |\n|Harmony 端 |ohos.permission.INTERNET |发送网络请求 |注册、上报埋点、归因、激活等：上报埋点数据到远程服务器 |\n||ohos.permission.STORE_PERSISTENT_DATA |持久化设备 ID |卸载重装可以确保唯一 |\n||ohos.permission.GET_WIFI_INFO |读取 wifi 信息获取 |数据分析需要 |\n||ohos.permission.GET_NETWORK_INFO |获取网络信息 |数据分析需要 |\n\n\n **【可选权限】开发者可以基于数据分析目的，选择是否使用增长营销套件SDK获取**\n\n对于增长营销套件 SDK可选申请的系统权限，您可以参考相关如下表格的内容，详细了解相关权限与各业务功能的关系及其申请时机，因相关权限的不申请将会对其对应的功能造成影响，您可以结合业务实际需要进行合理配置。\n\nSDK初始化及业务功能调用时机要求：确保在用户同意您App中的隐私政策后，再进行增长营销套件SDK的初始化。用户同意隐私政策前，您应避免私自采集和上报个人信息。当您的App未向用户提供服务时，例如App在后台运行时，请勿请求增长营销套件SDK的相关服务。\n\n\n| |**权限** |**说明** |**收集目的与时机** |\n|---|---|---|---|\n|Android端 |android.permission.READ_PHONE_STATE |读取IMEI等设备信息作为设备标识 |设备注册：初始化读取，生成设备唯一标识，计算设备数 |\n||android.permission.ACCESS_WIFI_STATE |获取网络状态（wifi） |设备注册和埋点数据采集：采集设备网络（wifi）信息 |\n||android.permission.ACCESS_NETWORK_STATE |获取网络状态 |设备注册和埋点数据采集：采集设备网络信息 |\n||com.asus.msa.SupplementaryDID.ACCESS |读取oaid |设备注册和深度链接：跨APP标识设备 |\n|iOS端 |NSUserTrackingUsageDescription |读取IDFA信息作为设备标识 |初始化读取，生成设备唯一标识，计算设备数 |\n||NSLocationAlwaysUsageDescription |获取地理位置 |用于获取经纬度信息，数据分析需要。请注意：sdk不主动声明、申请权限，当开发者主动选择使用相应功能时，请自行完成适配。 |\n||NSLocationWhenInUseUsageDescription |获取地理位置 ||\n||NSLocationAlwaysAndWhenInUseUsageDescription |获取地理位置 ||\n|Harmony 端 |ohos.permission.APP_TRACKING_CONSENT |读取oaid |设备注册和深度链接：跨APP标识设备 |\n\n\n<span id=\"ef59cd6f\"></span>\n##### **1.4 SDK可按照不同频次、精度收集个人信息的配置说明**\n\n收集频次方面，增长营销套件SDK的数据采集仅在App调用/最终用户触发相关功能时触发，不涉及定时逻辑等频次控制选项。收集精度方面，主要涉及定位相关功能，主要通过权限进行控制，增长营销套件 SDK通过可选权限让App可以控制是否申请精确地理位置权限或粗略地理位置权限。\n\n**特别说明，如开发者接入的【增长营销套件SDK】版本集成并启用了设备安全SDK相关服务，我们可能会按照《** [设备安全SDK隐私政策](https://www.volcengine.com/docs/6504/166009) **》有关声明采集、处理数据。** \n\n**特别说明**，【埋点开发工具 (DevTools 组件）】是【增长营销套件SDK】的组成部分，是面向开发者的调试工具，该工具帮助您对埋点内容和格式进行检查，提供了实时事件查看、实时接入状态查看、实时日志查看、实时网络请求查看等功能。该工具不会收集个人信息。您可以自行选择是否接入埋点开发工具 (DevTools 组件）。\\*\\*DevTools 组件接入与配置文档链接：\\*\\*https://www.volcengine.com/docs/76880/1033592（含IOS、Android 、Web/JS、小程序）。\n\n<span id=\"9cbfe65e\"></span>\n#### **2、SDK隐私政策披露示例**\n\n**SDK名称**：增长营销套件SDK\n\n**涉及个人信息**：设备标识符（IMEI、IDFA、IDFV、Android ID、MAC、OAID、ICCID、设备硬件序列号等相关信息）、应用信息、设备参数及系统信息（设备品牌、设备型号、操作系统、操作系统api版本、屏幕分辨率、磁盘使用情况、内存使用情况、CPU信息、时区、系统语言等）、运营商信息、移动设备国家编码（MCC）、移动设备网络编码（MNC）、IP地址等相关信息。\n\n**合作方主体**：北京火山引擎科技有限公司\n\n**使用目的**：数据分析\n\n**使用场景**：用户数据采集与分析\n\n**收集方式**：SDK自行采集\n\n**官网链接**：https://www.volcengine.com/\n\n**隐私政策链接**：https://www.volcengine.com/docs/6285/72216\n\n<span id=\"665b1fb4\"></span>\n#### **3、最终用户同意方式的示例**\n\nApp首次运行时应当有隐私弹窗，隐私弹窗中应公示简版隐私政策内容并附完整版隐私政策链接，并明确提示用户阅读并选择是否同意隐私政策；隐私弹窗应提供同意按钮和拒绝同意的按钮，并由用户主动选择。\n\n**披露示例：** \n\n<div style=\"text-align: center\">\n<img src=\"https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/386b4b1d2191429d97a4bfb71190273e~tplv-goo7wpa0wc-image.image\" width=\"364px\" /></div>\n\n\n<span id=\"41ea0619\"></span>\n#### **4、最终用户行使权利的配置说明**\n\n开发者在产品中集成【增长营销套件SDK】后，增长营销套件SDK的正常运行会收集必要的用户信息用于【增长营销技术服务】目的。开发者应根据相关法律法规为用户提供行使个人信息主体权利的路径或功能， 需要增长营销套件 SDK配合的，请与增长营销套件 SDK及时进行联系，我们将与开发者协同妥善解决最终用户的诉求。\n\n<span id=\"91ae9d10\"></span>\n### **二、您使用【增长营销套件SDK】服务时的合规注意事项**\n\n您接入【增长营销套件SDK】前，应当仔细阅读【增长营销套件 SDK 】服务相关协议约定、本规范、用户协议、隐私政策等内容，并依据相关内容对您APP的《隐私政策》及您APP采集、处理个人信息的情况进行合规自查。\n\n1、您知悉并认可：【增长营销套件 SDK 】本身所采集的数据并不能识别特定自然人的身份。我们按照相关合作协议的约定代表您采集、处理数据，您作为个人信息处理者应承担个人信息保护的法律责任。\n\n2、您已认真阅读并理解【增长营销套件 SDK 】相关协议约定、本合规规范、用户协议、隐私政策、采集个人信息及获取用户权限的接入/配置说明等约定，并承诺针对【增长营销套件 SDK 】采集、处理相关个人信息，您已取得了用户的授权和同意，并保证您不会违反国家相关法律法规、相关国家标准以及双方约定的目的。\n\n3、您承诺遵守未成年人保护及儿童个人信息保护的相关法律法规，如果您的APP可能会对不满十四周岁的儿童用户提供服务，您承诺已采取相关措施并保证已获得其监护人的授权同意。\n\n4、您的APP隐私政策应当符合与数据安全、个人信息保护相关的国家法律法规、国家标准、相关监管要求及您与火山引擎约定，并将【增长营销套件】 SDK的相关信息在隐私政策中向您的用户进行充分告知。开发者在产品中集成【增长营销套件】SDK后，【增长营销套件】SDK的正常运行会收集必要的用户信息用于【增长营销技术服务】目的。 请开发者根据集成【增长营销套件】SDK的实际情况，在您APP的隐私政策中，对【增长营销套件】SDK以及数据采集情况进行披露。建议：确认您所接入的【增长营销套件】SDK版本和功能模块；根据上述版本和模块，从隐私政策中确定与【增长营销套件】SDK交互的数据内容；在您APP的隐私政策中，以文字或列表的方式向公众披露【增长营销套件】 SDK的相关信息。\n\n您应当保证《隐私政策》的独立性和明显提示性，即《隐私政策》应单独成文，APP首次运行时会通过弹窗等明显方式提示用户阅读《隐私政策》， **用户确认同意《隐私政策》后，再启用本SDK进行个人信息的采集与处理** 。\n\n您保证已在APP的隐私政策中明确告知用户已选择【火山引擎】作为合作方进行数据分析合作，并向您的用户告知【增长营销套件SDK】采集使用个人信息的目的、方式和范围等情况。\n\n5、 增长营销套件SDK支持对应用的新增、激活、留存、性能等统计性指标进行分析，为此SDK将调用剪切板对链接点击、分享、下载安装等相关统计信息进行归因分析。如您开启本功能，您应在您的《隐私政策》中增加相关内容，以告知并获得您的用户的授权同意。如“为了分析应用新增、激活、留存、性能等统计性指标，我们可能会调用剪切板对链接点击、分享、下载安装等相关统计信息进行归因分析，请您放心，我们不会收集您的隐私信息。”\n\n6、如因您违反火山引擎的协议约定、本合规规范、用户协议、隐私政策等约定，导致您的用户或第三方对火山引擎主张任何形式的索赔或权利要求，或导致火山引擎因此产生任何法律纠纷的，您将负责解决并承担全部责任，如因此给火山引擎及其关联主体造成损失的，您应赔偿因此给火山引擎及其关联主体造成的全部损失。\n\n<span id=\"cb41ca29\"></span>\n### **三、火山引擎的数据安全保护能力**\n\n火山引擎非常重视数据安全，将努力采取合理的安全措施（包括技术方面和管理方面）来保护数据安全，防止您提供的数据信息被不当使用或未经授权的情况下被访问、公开披露、使用、修改、损坏、丢失或泄漏。我们会使用不低于行业同行的加密技术、匿名化处理及相关合理可行的手段保护数据安全，并使用安全保护机制防止您的数据信息遭到恶意攻击，并建立专门的安全部门、安全管理制度、数据安全流程保障您的个人信息安全。我们采取严格的数据使用和访问制度，确保只有授权人员才可访问您的个人信息，并适时对数据和技术进行安全审计。尽管已经采取了上述合理有效措施，并已经遵守了相关法律规定要求的标准，但请您理解，由于技术的限制以及可能存在的各种恶意手段，在互联网行业，即便竭尽所能加强安全措施，也不可能始终保证信息百分之百的安全，我们将尽力确保您提供给我们的数据信息的安全性。\n\n您知悉并理解，您接入我们的服务所用的系统和通讯网络，有可能因我们可控范围外的因素而出现问题。因此，我们强烈建议您采取积极措施保护数据信息的安全，包括但不限于使用复杂密码、定期修改密码、不将自己的账号密码及相关数据信息透露给他人。我们会制定应急处理预案，并在发生数据安全事件时立即启动应急预案，努力阻止这些安全事件的影响和后果扩大。一旦发生数据安全事件（泄露、丢失）后，我们将按照法律法规的要求，及时向您告知：安全事件的基本情况和可能的影响、我们已经采取或将要采取的处置措施、您可自主防范和降低风险的建议、对您的补救措施。我们将及时将事件相关情况以推送通知、邮件、信函、短信及相关形式告知您，难以逐一告知时，我们会采取合理、有效的方式发布公告。同时，我们还将按照相关监管部门要求，上报用户信息安全事件的处置情况。但一旦您离开火山引擎及相关服务，浏览或使用其他网站、服务及内容资源，我们将没有能力和直接义务保护您在火山引擎及相关服务之外的软件、网站提交的任何数据信息，无论您登录、浏览或使用上述软件、网站是否基于【增长营销套件SDK】服务的链接或引导。";</script>

    <div class="login-err" id="loginErr"></div>
    <div class="login-tip">登录后 2 小时内免再次验证</div>
  </div>
</div>

<!-- 写文章编辑器 -->
<div class="editor-mask" id="editorMask"></div>
<div class="editor" id="editor">
  <div class="ed-head">
    <b>✍ 写新文章</b>
    <span class="ed-close" id="edClose">✕</span>
  </div>
  <div class="ed-body">
    <div class="ed-form">
      <label>标题</label>
      <input id="edTitle" placeholder="例如：双十一大促实验复盘">
      <label>分类</label>
      <select id="edCat"></select>
      <label>检索关键词（选填，空格分隔）</label>
      <input id="edKw" placeholder="复盘 大促 转化率">
      <label>正文（Markdown）</label>
      <textarea id="edMd" placeholder="# 标题&#10;&#10;正文用 Markdown 书写，支持 **加粗**、列表、表格、代码块…&#10;&#10;## 小节&#10;- 要点一&#10;- 要点二"></textarea>
      <div class="ed-actions">
        <button class="ed-btn" id="edSubmit" style="display:none">✓ 发布文章</button>
      </div>
      <div class="ed-msg" id="edMsg"></div>
      <div class="ed-hint" id="edHint"></div>
    </div>
    <div class="ed-preview" id="edPrev">
      <div class="ed-prev-tag" id="edPrevTag"></div>
      <h1 id="edPrevTitle" style="margin:8px 0 16px"></h1>
      <div class="md" id="edPrevBody"></div>
    </div>
  </div>
</div>

<script src="../app.js?v=3de2203d"></script>
</body>
</html>

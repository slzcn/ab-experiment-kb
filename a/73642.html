<script>window.DATA_BASE="../";window.INIT_DOC=73642;window.INIT_MD="<span id=\"_1-使用方式\"></span>\n# 1. 使用方式\n\n\n1. agent为docker镜像，需要部署到业务环境\n\n2. 通过http接口访问，获取分流结果\n\n3. 支持服务端SDK的主要功能\n\n\n<span id=\"_2-服务部署\"></span>\n# 2. 服务部署\n\n\n1. 下载镜像，当前agent版本：v1.0.3\n\n\n**saas**\n\n<Attachment link=\"https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_e098ac41e97cf9ab8771f39a14f3b68c.gz\" name=\"datatester-docker-agent_v1.0.3.tar.gz\">datatester-docker-agent_v1.0.3.tar.gz</Attachment>\n\n\n&nbsp;\n\n**私有化**\n\n<Attachment link=\"https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_c28db17555fb817cb4a42151fbdc1660.gz\" name=\"datatester-docker-agent-onpremise_v1.0.3.tar.gz\">datatester-docker-agent-onpremise_v1.0.3.tar.gz</Attachment>\n\n\n\n2. 安装docker\n\n3. 启动服务\n\n4. 加载镜像\n\n\n```bash\n# 加载镜像\ndocker  load -i datatester-docker-agent*.tar.gz\n# 查询load的镜像id\ndocker  images\n```\n\n\n<span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_cf0bf94a5cbb3a0dba4521fe1c691727.png) </span>\n\n\n5. 运行\n\n\n<span id=\"saas\"></span>\n#### saas\n\n*docker* run \\-p {宿主机端口}:6789 {镜像id} {appKey} {metaInterval} {region}\n\n所有参数都是必选，其中appkey可在界面获取：\n\n在集团中接入一个应用后，您可以在集团相关页面查看应用的AppKey等信息，详情请参考：[如何创建应用](https://www.volcengine.com/docs/6287/66984)。\n\n\n* SaaS\\-云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/7f186b68302f40ae8822331615ea0e71~tplv-goo7wpa0wc-image.image) </span>\n\n* SaaS\\-非云原生\n\n   <span>![图片](https://p9-arcosite.byteimg.com/tos-cn-i-goo7wpa0wc/b55e61ee067544deaff4939685d1475c~tplv-goo7wpa0wc-image.image) </span>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">1、宿主机端口根据业务需要进行配置</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">2、镜像id替换为实际的id，参照示例图片中的c8323aee9721</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">3、metaInterval为拉取元数据的时间间隔，单位为秒，建议设置为60秒</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">4、region区分国内和海外环境，国内为CN，海外为SG</div>\n\n\n示例：\n\n\n* docker run \\-p 6789:6789 380b4fc3dcf0 3ac7ff2fad9d005f97857596a9078 60 CN\n\n* docker run \\-p 6789:6789 380b4fc3dcf0 3ac7ff2fad9d005f97857596a9078 20 CN\n\n* docker run \\-p 6789:6789 380b4fc3dcf0 65877c795467314d04d9fa0ee33 60 SG\n\n\n<span id=\"私有化\"></span>\n#### 私有化\n\n\n* *docker* run \\-p {宿主机端口}:6789 {镜像id} {appKey} {metaInterval}\n\n\n所有参数都是必选\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">1、宿主机端口根据业务需要进行配置</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">2、镜像id替换为实际的id，参照示例图片中的c8323aee9721</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">3、为了获取appKey，您需要在火山引擎A/B平台进行接入，并于\"集团设置\\-应用列表\\-应用ID\"处获取appKey</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">4、metaInterval为拉取元数据的时间间隔，单位为秒，建议设置为60秒</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">5、私有化部署时会有产品域名和上报域名，productHost替换为产品域名，eventHost替换为上报域名</div>\n\n\n示例：\n\n\n* docker run \\-p 6789:6789 380b4fc3dcf0 7857596a9078f97857596a907 60 http://product.cc https://product.com\n\n* docker run \\-p 6789:6789 380b4fc3dcf0 7857596a9078f97857596a907 20 http://product.cc https://product.com\n\n\n<span id=\"_3-接口描述\"></span>\n# 3. 接口描述\n\n<span id=\"_3-1-健康检查接口\"></span>\n## 3.1 健康检查接口\n\n**接口：/ping**\n\n**方法: GET**\n\n**描述：健康检查**\n\n**请求参数：无**\n\n**返回值：固定值**\n\n```json\n{\n    \"message\": \"pong\"\n}\n```\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\">注意</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"warning\">除健康检查接口外，其余所有接口都是HTTP POST</div>\n\n\n<span id=\"_3-2-activate\"></span>\n## 3.2 activate\n\n**接口：/activate**\n\n**描述：**  获取特定key的分流结果，并上报曝光事件\n\n**请求参数：** \n\n```json\n{\n    \"variant_key\": \"variantKey\", // 特定的key, 即实验中配置的参数名\n    \"decision_id\": \"decisionID\", // 本地分流用户标识，不用于事件上报，请替换为客户的真实用户标识\n    \"track_id\": \"uuid\", // 事件上报用户标识，用于事件上报，请替换为客户的真实用户标识\n    \"attributes\": {      // 用户属性，仅用于分流，不随埋点上报\n        \"name\": \"user_name\",\n        \"age\": 20,\n        \"is_android\": true,\n        \"pay\": 123.456\n    }\n}\n```\n\n\n**返回值：**  返回命中变体对象\n\n```json\n// 未命中\n{\n    \"data\": {},\n    \"code\": 200,\n    \"message\": \"\"\n}\n// variant_key=\"string\"\n{\n    \"data\": {\n        \"string\": {\n            \"val\": \"bbb\",\n            \"vid\": \"23357\"\n        }\n    },\n    \"code\": 200,\n    \"message\": \"\"\n}\n// variant_key=\"number\"\n{\n    \"data\": {\n        \"number\": {\n            \"val\": 456,\n            \"vid\": \"23357\"\n        }\n    },\n    \"code\": 200,\n    \"message\": \"\"\n}\n// variant_key=\"boolean\"\n{\n    \"data\": {\n        \"boolean\": {\n            \"val\": false,\n            \"vid\": \"23357\"\n        }\n    },\n    \"code\": 200,\n    \"message\": \"\"\n}\n// variant_key=\"json\"\n{\n    \"data\": {\n        \"json\": {\n            \"val\": {\n                \"count\": 2,\n                \"ver\": \"b\"\n            },\n            \"vid\": \"23357\"\n        }\n    },\n    \"code\": 200,\n    \"message\": \"\"\n}\n// 参数错误  code为203，message为错误信息\n{\n    \"data\": {},\n    \"code\": 203,\n    \"message\": \"variant_key is empty\"\n}\n// 其他错误  code为205，message为错误信息\n{\n    \"data\": {},\n    \"code\": 205,\n    \"message\": \"xxxx\"\n}\n```\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">1、该接口与所有含有“WithImpression”字样的接口均会自动上报曝光事件</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">2、variant_key、decision_id、track_id必选</div>\n\n\n<span id=\"_3-3-getexperimentconfigs\"></span>\n## 3.3 getExperimentConfigs\n\n**接口：/getExperimentConfigs**\n\n**描述：**  获取用户命中的特定实验的变体详情\n\n**请求参数：** \n\n```json\n{\n    \"decision_id\": \"decisionID\", // 本地分流用户标识，不用于事件上报，请替换为客户的真实用户标识\n    \"track_id\": \"uuid\", // 事件上报用户标识，用于事件上报，请替换为客户的真实用户标识\n    \"attributes\": {      // 用户属性，仅用于分流，不随埋点上报\n        \"name\": \"user_name\",\n        \"age\": 20,\n        \"is_android\": true,\n        \"pay\": 123.456\n    },\n    \"experiment_id\": \"123456\" // 特定实验的id\n}\n```\n\n\n**返回值：**  返回命中变体的对象，表明用户命中某个实验的变体详情，通常仅能命中一个变体。\n\n```json\n// 未命中实验\n{\n    \"data\": {},\n    \"code\": 200,\n    \"message\": \"\"\n}\n// 命中实验\n{\n    \"data\": {\n        \"number\": {\n            \"val\": 456,\n            \"vid\": \"23357\"\n        },\n        \"boolean\": {\n            \"val\": false,\n            \"vid\": \"23357\"\n        },\n        \"string\": {\n            \"val\": \"bbb\",\n            \"vid\": \"23357\"\n        },\n        \"json\": {\n            \"val\": {\n                \"count\": 2,\n                \"ver\": \"b\"\n            },\n            \"vid\": \"23357\"\n        }\n    },\n    \"code\": 200,\n    \"message\": \"\"\n}\n// 参数错误  code为203，message为错误信息\n{\n    \"data\": {},\n    \"code\": 203,\n    \"message\": \"experiment_id is empty\"\n}\n// 其他错误  code为205，message为错误信息\n{\n    \"data\": {},\n    \"code\": 205,\n    \"message\": \"failed to find experiment[333333]\"\n}\n```\n\n\n<span id=\"_3-4-getexperimentconfigswithimpression\"></span>\n## 3.4 getExperimentConfigsWithImpression\n\n**接口：/getExperimentConfigsWithImpression**\n\n请求响应与接口“getExperimentConfigs”相同，会自动上报曝光事件\n\n<span id=\"_3-5-getallexperimentconfigs\"></span>\n## 3.5 getAllExperimentConfigs\n\n**接口：/getAllExperimentConfigs**\n\n**描述：**  获取用户命中的所有实验的变体详情\n\n**请求参数：** \n\n```json\n{\n    \"decision_id\": \"decisionID\", // 本地分流用户标识，不用于事件上报，请替换为客户的真实用户标识\n    \"attributes\": {      // 用户属性，仅用于分流，不随埋点上报\n        \"name\": \"user_name\",\n        \"age\": 20,\n        \"is_android\": true,\n        \"pay\": 123.456\n    }\n}\n```\n\n\n**返回值：**  返回命中变体详情，通常命中多个变体。\n\n```json\n// 未命中实验\n{\n    \"data\": {},\n    \"code\": 200,\n    \"message\": \"\"\n}\n// 命中\n{\n    \"data\": {\n        \"number\": {\n            \"val\": 456,\n            \"vid\": \"23357\"\n        },\n        \"boolean\": {\n            \"val\": false,\n            \"vid\": \"23357\"\n        },\n        \"string\": {\n            \"val\": \"bbb\",\n            \"vid\": \"23357\"\n        },\n        \"json\": {\n            \"val\": {\n                \"count\": 2,\n                \"ver\": \"b\"\n            },\n            \"vid\": \"23357\"\n        },\n        \"config\": {\n            \"val\": \"off\",\n            \"vid\": \"23361\"\n        }\n    },\n    \"code\": 200,\n    \"message\": \"\"\n}\n// 参数错误  code为203，message为错误信息\n{\n    \"data\": {},\n    \"code\": 203,\n    \"message\": \"decision_id is empty\"\n}\n// 其他错误  code为205，message为错误信息\n{\n    \"data\": {},\n    \"code\": 205,\n    \"message\": \"xxxxx\"\n}\n```\n\n\n<span id=\"_3-6-getfeatureconfigs\"></span>\n## 3.6 getFeatureConfigs\n\n**接口：/getFeatureConfigs**\n\n**描述：**  获取用户命中的特定feature的变体详情\n\n**请求参数：** \n\n```json\n{\n    \"decision_id\": \"decisionID\", // 本地分流用户标识，不用于事件上报，请替换为客户的真实用户标识\n    \"track_id\": \"uuid\", // 事件上报用户标识，用于事件上报，请替换为客户的真实用户标识\n    \"attributes\": {      // 用户属性，仅用于分流，不随埋点上报\n        \"name\": \"user_name\",\n        \"age\": 20,\n        \"is_android\": true,\n        \"pay\": 123.456\n    },\n    \"feature_id\": \"123456\" // 特定feature的id\n}\n```\n\n\n**返回值：**  返回命中变体的对象，表明用户命中某个feature的变体详情，通常仅能命中一个变体。\n\n```json\n// 未命中\n{\n    \"data\": {},\n    \"code\": 200,\n    \"message\": \"\"\n}\n// 命中ff\n{\n    \"data\": {\n        \"feature_str\": {\n            \"val\": \"false\",\n            \"vid\": \"20000044\"\n        }\n    },\n    \"code\": 200,\n    \"message\": \"\"\n}\n// 命中ff\n{\n    \"data\": {\n        \"feature_key_number\": {\n            \"val\": 3,\n            \"vid\": \"20000058\"\n        }\n    },\n    \"code\": 200,\n    \"message\": \"\"\n}\n// 参数错误  code为203，message为错误信息\n{\n    \"data\": {},\n    \"code\": 203,\n    \"message\": \"feature_id is empty\"\n}\n// 其他错误  code为205，message为错误信息\n{\n    \"data\": {},\n    \"code\": 205,\n    \"message\": \"failed to find feature[333333]\"\n}\n```\n\n\n<span id=\"_3-7-getfeatureconfigswithimpression\"></span>\n## 3.7 getFeatureConfigsWithImpression\n\n**接口：/getFeatureConfigsWithImpression**\n\n请求响应与接口“getFeatureConfigs”相同，会自动上报曝光事件\n\n<span id=\"_3-8-getallfeatureconfigs\"></span>\n## 3.8 getAllFeatureConfigs\n\n**接口：/getAllFeatureConfigs**\n\n**描述：**  获取用户命中的所有feature的变体详情\n\n**请求参数：** \n\n```json\n{\n    \"decision_id\": \"decisionID\", // 本地分流用户标识，不用于事件上报，请替换为客户的真实用户标识\n    \"attributes\": {      // 用户属性，仅用于分流，不随埋点上报\n        \"name\": \"user_name\",\n        \"age\": 20,\n        \"is_android\": true,\n        \"pay\": 123.456\n    }\n}\n```\n\n\n**返回值：**  返回命中变体详情，通常命中多个变体。\n\n```json\n// 未命中\n{\n    \"data\": {},\n    \"code\": 200,\n    \"message\": \"\"\n}\n// 命中\n{\n    \"data\": {\n        \"feature_str\": {\n            \"val\": \"false\",\n            \"vid\": \"20000044\"\n        },\n        \"feature_key_number\": {\n            \"val\": 1,\n            \"vid\": \"20000056\"\n        }\n    },\n    \"code\": 200,\n    \"message\": \"\"\n}\n// 参数错误  code为203，message为错误信息\n{\n    \"data\": {},\n    \"code\": 203,\n    \"message\": \"decision_id is empty\"\n}\n// 其他错误  code为205，message为错误信息\n{\n    \"data\": {},\n    \"code\": 205,\n    \"message\": \"xxxxx\"\n}\n```\n\n\n<span id=\"_4-其他\"></span>\n# 4. 其他\n\n<span id=\"使用场景\"></span>\n## 使用场景\n\nagent为单节点，性能相当于单个服务端SDK，建议仅在试用阶段、请求量相对较小的场景下使用，大流量接入场景下还是优先使用服务端SDK。";</script>
<script>/* 首屏提速：解析 HTML 时立即并行预取轻量列表 kb_index.json（不等 JS 执行完再 fetch，消除串行等待）。
 * 缓存 key 与下方 dataUrl 同规则（每 10 分钟），保证 preload 与后续 fetch URL 一致才能命中。*/
(function(){try{var b=(window.DATA_BASE||'');var v=Math.floor(Date.now()/600000);var l=document.createElement('link');l.rel='preload';l.as='fetch';l.href=b+'kb_index.json?v='+v;document.head.appendChild(l);}catch(e){}})();
</script>

wvZm9yZWlnbk9iamVjdD48L2c+PHBhdGggZD0iTSA1NTkuMzcgMTEyIEwgNTc1LjYzIDExMiIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMDAwMDAwIiBzdHJva2UtbWl0ZXJsaW1pdD0iMTAiIHBvaW50ZXItZXZlbnRzPSJzdHJva2UiLz48cGF0aCBkPSJNIDU1NC4xMiAxMTIgTCA1NjEuMTIgMTA4LjUgTCA1NTkuMzcgMTEyIEwgNTYxLjEyIDExNS41IFoiIGZpbGw9IiMwMDAwMDAiIHN0cm9rZT0iIzAwMDAwMCIgc3Ryb2tlLW1pdGVybGltaXQ9IjEwIiBwb2ludGVyLWV2ZW50cz0iYWxsIi8+PHBhdGggZD0iTSA1ODAuODggMTEyIEwgNTczLjg4IDExNS41IEwgNTc1LjYzIDExMiBMIDU3My44OCAxMDguNSBaIiBmaWxsPSIjMDAwMDAwIiBzdHJva2U9IiMwMDAwMDAiIHN0cm9rZS1taXRlcmxpbWl0PSIxMCIgcG9pbnRlci1ldmVudHM9ImFsbCIvPjwvZz48L3N2Zz4=\" />\n\n您需要将巨量引擎广告投放账户授权给DataTester，后续即可DataTester上操作巨量广告账户。\n\n<span id=\"5f5dbb98\"></span>\n# 注意事项\n\n使用DataTester的广告实验时：\n\n\n* 实验部分：按使用量进行计量计费，通过上报事件MAU\\*0.035的计量进行收费。\n\n* 广告部分：依据巨量引擎的扣费规则，在巨量引擎侧进行扣费，费用不体现在DataTester账单中。\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\">说明</div>\n\n\n<div data-tips=\"true\" data-tips-type=\"tip\">SaaS\\-云原生环境中，柔佛地域暂不支持。</div>\n\n\n<span id=\"38418cd0\"></span>\n# 准备工作\n\n<span id=\"df606e2e\"></span>\n## step1：获得产品授权\n\n\n* **注册火山引擎账号并创建集团**\n\n   注册一个火山引擎账号后，登录 [A/B 测试控制台](https://console.volcengine.com/datatester)，单击**新建集团**，输入集团名称，创建一个属于您团队成员的团队空间。在集团中您和您的成员可以接入应用并进行 A/B 实验，操作详情请参见[快速入门：管理员（云原生）](https://www.volcengine.com/docs/6287/166070)。\n\n* **获取产品授权**\n\n   提供集团ID并提供给对接的销售人员，销售人员会提交内部申请后为您开通广告实验的操作权限。集团ID获取操作请参见[如何在增长分析和AB测试中找到集团id](https://www.volcengine.com/docs/6287/1113918)。\n\n\n<span id=\"_2-应用接入\"></span>\n## step2：创建DataTester项目并接入应用\n\n\n1. **项目接入**\n\n   在项目管理配置页面新建项目，根据界面提示配置项目名称等参数，完成后可在项目列表页面获取自动生成的APPID。操作详情请参见[快速入门：管理员（云原生）](https://www.volcengine.com/docs/6287/166070)。\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_94a32b85b1237330ec4f371c589f5bdb.png) </span>\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_6876da972e8aba87516d749219abeb16.png) </span>\n\n2. （可选）SDK集成&接入数据。\n\n   <div data-tips=\"true\" data-tips-type=\"tip\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">说明   </div>\n   \n\n   * <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">SDK集成栏目仅适用于移动端应用等需要客户端集成的场景，对于投放电商店铺或者销售线索等不涉及到安卓或者iOS等移动端应用的场景，不需要集成SDK，此场景在后续创建广告实验时，在“<strong>项目类型</strong>”栏目选择“<strong>广告投放</strong>”即可。   </div>\n   \n\n   * <div data-tips=\"true\" data-tips-type=\"tip\" data-wrapper-indent=\"1\">对于<strong>广告投放</strong>场景下，确实需要集成移动端SDK的例场景，例如<strong>投放目标</strong>为<strong>应用下载</strong>等类型时，具体集成和调试步骤详见后文的“添加与管理资产\\-应用管理”部分。   </div>\n   \n\n   DataTester项目创建成功并获取到APPID等信息后，您还需通过SDK进行数据接入操作，如下所示：\n\n   <span>![图片](https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_81ebb2e7c7e6cb8c23d26190bfe76f65.png) </span>\n\n   点击`立即接入`按照步骤成功接入即可。\n\n   <div data-tips=\"true\" data-tips-type=\"warning\" data-tips-is-title=\"true\" data-wrapper-indent=\"1\">注意   </div>\n   \n\n   * <div data-tips=\"true\" data-tips-type=\"warning\" data-wrapper-indent=\"1\">仅IOS、Android客户端需要进行相关接入操作。   </div>\n   \n\n   * <div data-tips=\"true\" data-tips-type=\"warning\" data-wrapper-indent=\"1\">SDK初始化的APPID一定要替换成DataTester这里的APPID。   </div>\n   \n\n   <div data-tips=\"true\" data-tips-type=\"warning\" data-wrapper-indent=\"1\"><img src=\"https://portal.volccdn.com/obj/volcfe/cloud-universal-doc/upload_a01b0e5facb9ccead66e6f3e00b1a3c1.png\" width=\"800px\" />   </div>\n   \n\n\n<span id=\"_3-datatester侧广告资产准备\"></span>\n# 广告实验通用创建流程\n\n<span id=\"02669508\"></span>\n## step1：巨量引擎侧准备\n\n\n* 您需要准备一个巨量引擎的账号。\n\n   通常使用DataTester进行广告实验的用户，已经在使用巨量引擎进行广告投放，已经具备巨量引擎账号，且已创建广告相关项目、管理广告相关资产，如果您已有巨量引擎账号可直接使用对应账号即可，无需另外新建一个账号。\n\n* 在巨量引擎中创建资产、事件，在事件资产管理中添加监测链接，并完成联调。操作详情请查看：[应用「API回传」技术开发说明-四、整体使用流程](https://event-manager.oceanengine.com/docs/8650/195164/#%E5%9B%9B%E3%80%81%E6%95%B4%E4%BD%93%E4%BD%BF%E7%94%A8%E6%B5%81%E7%A8%8B)。\n\n\n<span id=\"9df4dcb7\"></span>\n## step2：DataTester侧准备\n\n<span id=\"fc8f4f4a\"></span>\n### 授权巨量广告账户至DataTester\n\n您需要在DataTester侧添加一个广告账户，并将DataTester侧的广告账户与巨量引擎侧的账号关联，授权DataTester有对应账号的权限，可调用巨量引擎的MAPI进行后续的资产同步、创建广告等操作权限。操作详情请参见[广告账户管理](https://www.volcengine.com/docs/6287/1113901)。\n\n<span id=\"66dbb1d1\"></span>\n### 添加广告资产\n\n您需要将广告实验所需的广告资产，包括：广告素材/人群包/落地页/应用资产/广告监测链接管理等添加或同步至DataTester侧，以便后续创建广告实验时选择使用。添加广告资产操作详情请参见[资产管理](https://www.volcengine.com/docs/6287/1113902)。\n\n<span id=\"_5-广告实验创建\"></span>\n## step3：DataTester侧创建广告实验\n\n当广告资产全部准备完毕之后，您可以开启广告实验，详细步骤可以参考[新建广告实验](https://www.volcengine.com/docs/6287/71342)。\n\n<span id=\"6a6bcb3b\"></span>\n## step4：后续步骤——投放管理\n\n如果您已完成广告实验，明确更优的广告策略，可参考更优的广告策略继续大流量的广告投放。在DataTester侧投放广告的操作指导可以参见[投放管理](https://www.volcengine.com/docs/6287/1127464)。";</script>
